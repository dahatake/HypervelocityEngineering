<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="AAD-WEB インフォグラフィック">
  <desc>AAD-WEB（Web App Design）4ステップのデータフロー: service-catalog-matrix.md入力 → Step.1/2.1/2.2/2.3 → 各成果物</desc>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: "Segoe UI", "Noto Sans JP", Arial, sans-serif; }
    .in  { fill: #5B8DD9; stroke: #1f3a5a; stroke-width: 1; }
    .agt { fill: #4A90D9; stroke: #1f3a5a; stroke-width: 1.5; }
    .par { fill: #8B5CF6; stroke: #4a1d96; stroke-width: 1.5; }
    .out { fill: #E8A838; stroke: #8B5A00; stroke-width: 1.5; }
    .ln  { stroke: #555; stroke-width: 1.2; fill: none; marker-end: url(#arr); }
    .bt  { fill: white; font-weight: bold; font-size: 10px; }
    .bs  { fill: white; font-size: 9px; }
    .lbl { fill: #333; font-size: 10px; }
    .ttl { font-size: 15px; font-weight: bold; fill: #1f3a5a; }
  </style>
  <text x="440" y="28" text-anchor="middle" class="ttl">AAD-WEB データフロー（入力→Agent→出力）</text>
  <!-- Input -->
  <rect x="10" y="100" width="155" height="28" rx="4" class="in"/>
  <text x="87" y="118" text-anchor="middle" class="bt">service-catalog-matrix.md</text>
  <!-- Step 1 -->
  <line x1="165" y1="114" x2="190" y2="114" class="ln"/>
  <rect x="190" y="92" width="120" height="44" rx="5" class="agt"/>
  <text x="250" y="110" text-anchor="middle" class="bt">Step.1</text>
  <text x="250" y="124" text-anchor="middle" class="bs">Arch-UI-List</text>
  <line x1="310" y1="114" x2="340" y2="114" class="ln"/>
  <rect x="340" y="100" width="140" height="28" rx="4" class="out"/>
  <text x="410" y="118" text-anchor="middle" class="bt">screen-catalog.md</text>
  <!-- Fork from screen-catalog to 2.1 and 2.2 -->
  <polyline points="410,128 410,160 520,160 520,175" class="ln"/>
  <polyline points="410,128 410,250 520,250 520,235" class="ln"/>
  <!-- Step 2.1 -->
  <rect x="460" y="175" width="120" height="44" rx="5" class="par"/>
  <text x="520" y="193" text-anchor="middle" class="bt">Step.2.1（並列）</text>
  <text x="520" y="207" text-anchor="middle" class="bs">Arch-UI-Detail</text>
  <line x1="580" y1="197" x2="610" y2="197" class="ln"/>
  <rect x="610" y="183" width="140" height="28" rx="4" class="out"/>
  <text x="680" y="201" text-anchor="middle" class="bt">docs/screen/*.md</text>
  <!-- Step 2.2 -->
  <rect x="460" y="235" width="120" height="44" rx="5" class="par"/>
  <text x="520" y="253" text-anchor="middle" class="bt">Step.2.2（並列）</text>
  <text x="520" y="267" text-anchor="middle" class="bs">Arch-Microservice-ServiceDetail</text>
  <line x1="580" y1="257" x2="610" y2="257" class="ln"/>
  <rect x="610" y="243" width="140" height="28" rx="4" class="out"/>
  <text x="680" y="261" text-anchor="middle" class="bt">docs/services/*.md</text>
  <!-- Join to Step 2.3 -->
  <polyline points="520,219 520,310 460,310 460,330" class="ln"/>
  <polyline points="520,279 520,310" style="stroke:#555;stroke-width:1.2;fill:none;"/>
  <!-- Step 2.3 -->
  <rect x="360" y="330" width="120" height="44" rx="5" class="agt"/>
  <text x="420" y="348" text-anchor="middle" class="bt">Step.2.3</text>
  <text x="420" y="362" text-anchor="middle" class="bs">Arch-TDD-TestSpec</text>
  <line x1="480" y1="352" x2="510" y2="352" class="ln"/>
  <rect x="510" y="338" width="155" height="28" rx="4" class="out"/>
  <text x="587" y="356" text-anchor="middle" class="bt">docs/test-specs/*.md</text>
  <!-- Legend -->
  <rect x="10" y="360" width="14" height="14" rx="2" class="in"/>
  <text x="30" y="371" class="lbl">入力</text>
  <rect x="80" y="360" width="14" height="14" rx="2" class="agt"/>
  <text x="100" y="371" class="lbl">Agent（直列）</text>
  <rect x="200" y="360" width="14" height="14" rx="2" class="par"/>
  <text x="220" y="371" class="lbl">Agent（並列）</text>
  <rect x="330" y="360" width="14" height="14" rx="2" class="out"/>
  <text x="350" y="371" class="lbl">出力</text>
</svg>
