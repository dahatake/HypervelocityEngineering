  <line x1="640" y1="448" x2="640" y2="474" stroke="#e36209" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ======================== WAVE 4 ======================== -->
  <rect x="0" y="476" width="1200" height="20" fill="#fff3e0" opacity="0.9"/>
