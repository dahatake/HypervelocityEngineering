  <rect x="90" y="504" width="260" height="38" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="220" y="527" text-anchor="middle" font-size="10" fill="#24292e">docs-generated/components/*.md</text>
  <!-- Step 4 agent -->
  <rect x="430" y="501" width="270" height="48" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="565" y="521" text-anchor="middle" font-size="12" font-weight="bold" fill="#24292e">Doc-ComponentIndex</text>
  <text x="565" y="537" text-anchor="middle" font-size="10" fill="#586069">レイヤー2成果物の要約インデックス</text>
  <!-- Step 4 output -->
  <rect x="800" y="508" width="360" height="38" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="980" y="531" text-anchor="middle" font-size="10" fill="#24292e">docs-generated/component-index.md</text>
  <line x1="350" y1="523" x2="430" y2="525" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="525" x2="800" y2="527" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dependency arrow Wave 4→5 -->
  <line x1="565" y1="549" x2="565" y2="575" stroke="#e36209" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ======================== WAVE 5 ======================== -->
  <rect x="0" y="577" width="1200" height="20" fill="#ede7f6" opacity="0.9"/>
  <text x="45" y="591" text-anchor="middle" font-size="11" font-weight="bold" fill="#6f42c1">Wave 5</text>
  <text x="700" y="591" text-anchor="middle" font-size="10" fill="#6f42c1">アーキテクチャ分析ドキュメント（4エージェント並列実行）</text>

  <!-- Shared input Wave 5 -->
  <rect x="90" y="604" width="260" height="45" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="220" y="624" text-anchor="middle" font-size="10" fill="#24292e">docs-generated/component-index.md</text>
  <text x="220" y="639" text-anchor="middle" font-size="9" fill="#586069">（Wave 4 成果物）</text>

