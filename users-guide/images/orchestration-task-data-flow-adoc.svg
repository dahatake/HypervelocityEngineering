  <text x="460" y="624" text-anchor="middle" font-size="10" font-weight="bold" fill="#24292e">Doc-ArchOverview</text>
  <text x="460" y="640" text-anchor="middle" font-size="9" fill="#586069">アーキテクチャ概要</text>

  <rect x="560" y="604" width="180" height="55" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="650" y="624" text-anchor="middle" font-size="10" font-weight="bold" fill="#24292e">Doc-DependencyMap</text>
  <text x="650" y="640" text-anchor="middle" font-size="9" fill="#586069">依存関係マップ</text>

  <rect x="750" y="604" width="160" height="55" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="830" y="624" text-anchor="middle" font-size="10" font-weight="bold" fill="#24292e">Doc-InfraDeps</text>
  <text x="830" y="640" text-anchor="middle" font-size="9" fill="#586069">インフラ依存分析</text>

  <rect x="920" y="604" width="165" height="55" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="1002" y="624" text-anchor="middle" font-size="10" font-weight="bold" fill="#24292e">Doc-NFRAnalysis</text>
  <text x="1002" y="640" text-anchor="middle" font-size="9" fill="#586069">非機能要件分析</text>

  <line x1="350" y1="626" x2="370" y2="631" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Shared output Wave 5 -->
  <rect x="440" y="675" width="400" height="30" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="640" y="694" text-anchor="middle" font-size="10" fill="#24292e">docs-generated/architecture/*.md</text>

  <!-- Dependency arrow Wave 5→6 -->
  <line x1="640" y1="705" x2="640" y2="731" stroke="#e36209" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ======================== WAVE 6 ======================== -->
  <rect x="0" y="733" width="1200" height="20" fill="#e8f0fe" opacity="0.9"/>
  <text x="45" y="747" text-anchor="middle" font-size="11" font-weight="bold" fill="#0366d6">Wave 6</text>
  <text x="700" y="747" text-anchor="middle" font-size="10" fill="#0366d6">ガイドドキュメント生成（3エージェント並列実行）</text>

  <!-- Shared input Wave 6 -->
  <rect x="90" y="760" width="260" height="45" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="220" y="780" text-anchor="middle" font-size="10" fill="#24292e">docs-generated/architecture/*.md</text>
  <text x="220" y="796" text-anchor="middle" font-size="9" fill="#586069">（Wave 5 成果物）</text>

  <!-- 3 parallel agents Wave 6 -->
  <rect x="400" y="760" width="200" height="55" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="500" y="780" text-anchor="middle" font-size="12" font-weight="bold" fill="#24292e">Doc-Onboarding</text>
  <text x="500" y="796" text-anchor="middle" font-size="9" fill="#586069">オンボーディングガイド</text>

  <rect x="620" y="760" width="200" height="55" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="720" y="780" text-anchor="middle" font-size="12" font-weight="bold" fill="#24292e">Doc-Refactoring</text>
  <text x="720" y="796" text-anchor="middle" font-size="9" fill="#586069">リファクタリングガイド</text>

  <rect x="840" y="760" width="200" height="55" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="940" y="780" text-anchor="middle" font-size="12" font-weight="bold" fill="#24292e">Doc-Migration</text>
  <text x="940" y="796" text-anchor="middle" font-size="9" fill="#586069">移行アセスメント</text>

  <line x1="350" y1="783" x2="400" y2="787" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Shared output Wave 6 -->
  <rect x="440" y="830" width="400" height="30" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="640" y="849" text-anchor="middle" font-size="10" fill="#24292e">docs-generated/guides/*.md</text>

  <!-- Legend -->
  <rect x="90" y="900" width="960" height="60" rx="8" fill="white" stroke="#d1d5da" stroke-width="1"/>
  <text x="570" y="917" text-anchor="middle" font-size="10" font-weight="bold" fill="#24292e">凡例</text>
  <rect x="110" y="925" width="12" height="12" rx="2" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="127" y="935" font-size="10" fill="#24292e">入力ファイル</text>
  <rect x="240" y="925" width="12" height="12" rx="2" fill="#e8d5f5" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="257" y="935" font-size="10" fill="#24292e">Custom Agent</text>
  <rect x="380" y="925" width="12" height="12" rx="2" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="397" y="935" font-size="10" fill="#24292e">成果物</text>
  <line x1="490" y1="931" x2="520" y2="931" stroke="#e36209" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="530" y="935" font-size="10" fill="#24292e">Wave 依存（縦方向）</text>
  <text x="700" y="935" font-size="10" fill="#e36209" font-weight="bold">同一 Wave 内のエージェントは並列実行可</text>
</svg>
