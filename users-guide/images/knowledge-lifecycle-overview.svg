<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 860" font-family="system-ui, -apple-system, sans-serif">
  <title>knowledge/ ライフサイクル全体図</title>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#586069"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0366d6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1300" height="860" fill="#f6f8fa"/>

  <!-- Title -->
  <text x="650" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#24292e">knowledge/ ライフサイクル全体図</text>

  <!-- ===== ROW 1: Input Sources ===== -->
  <!-- original-docs/ -->
  <rect x="30" y="70" width="200" height="70" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="2"/>
  <text x="130" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#0366d6">original-docs/</text>
  <text x="130" y="120" text-anchor="middle" font-size="10" fill="#586069">既存ビジネス分析ドキュメント</text>

  <!-- qa/ -->
  <rect x="290" y="70" width="200" height="70" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="2"/>
  <text x="390" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#0366d6">qa/</text>
  <text x="390" y="120" text-anchor="middle" font-size="10" fill="#586069">質問票・回答ファイル</text>

  <!-- src/ -->
  <rect x="1050" y="70" width="200" height="70" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="2"/>
  <text x="1150" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#0366d6">src/ 等</text>
  <text x="1150" y="120" text-anchor="middle" font-size="10" fill="#586069">既存ソースコード</text>

  <!-- ===== ROW 2: Workflows ===== -->
  <!-- AQOD Workflow -->
  <rect x="30" y="220" width="200" height="70" rx="8" fill="#fff8e6" stroke="#e36209" stroke-width="2"/>
  <text x="130" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#e36209">AQOD ワークフロー</text>
  <text x="130" y="268" text-anchor="middle" font-size="10" fill="#586069">原本から質問票を自動生成</text>
  <text x="130" y="282" text-anchor="middle" font-size="10" fill="#586069">aqod</text>

  <!-- AKM Workflow -->
  <rect x="290" y="220" width="200" height="70" rx="8" fill="#fff8e6" stroke="#e36209" stroke-width="2"/>
  <text x="390" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#e36209">AKM ワークフロー</text>
  <text x="390" y="268" text-anchor="middle" font-size="10" fill="#586069">D01〜D21 分類・生成</text>
  <text x="390" y="282" text-anchor="middle" font-size="10" fill="#586069">akm</text>

  <!-- ADOC Workflow -->
  <rect x="1050" y="220" width="200" height="70" rx="8" fill="#fff8e6" stroke="#e36209" stroke-width="2"/>
  <text x="1150" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#e36209">ADOC ワークフロー</text>
  <text x="1150" y="268" text-anchor="middle" font-size="10" fill="#586069">技術文書を自動生成</text>
  <text x="1150" y="282" text-anchor="middle" font-size="10" fill="#586069">adoc</text>

  <!-- ===== ROW 3: Core outputs ===== -->
  <!-- knowledge/D01-D21 (large central box) -->
  <rect x="200" y="390" width="300" height="90" rx="8" fill="#d0e7ff" stroke="#0366d6" stroke-width="2.5"/>
  <text x="350" y="425" text-anchor="middle" font-size="14" font-weight="bold" fill="#0366d6">knowledge/</text>
  <text x="350" y="447" text-anchor="middle" font-size="12" fill="#0366d6">D01〜D21 文書クラス</text>
  <text x="350" y="466" text-anchor="middle" font-size="10" fill="#586069">業務要件の一元管理</text>

  <!-- docs-generated/ -->
  <rect x="1050" y="390" width="200" height="70" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="1150" y="420" text-anchor="middle" font-size="13" font-weight="bold" fill="#28a745">docs-generated/</text>
  <text x="1150" y="440" text-anchor="middle" font-size="10" fill="#586069">技術文書群</text>
  <text x="1150" y="456" text-anchor="middle" font-size="10" fill="#586069">inventory / files / components...</text>

  <!-- ===== ROW 4: Consumers ===== -->
  <!-- Custom Agents -->
  <rect x="150" y="580" width="400" height="80" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="350" y="612" text-anchor="middle" font-size="13" font-weight="bold" fill="#6f42c1">Custom Agents</text>
  <text x="350" y="632" text-anchor="middle" font-size="11" fill="#6f42c1">Arch-* / Dev-* / QA-* (65 agents)</text>
  <text x="350" y="650" text-anchor="middle" font-size="10" fill="#586069">設計・実装・QA ワークフロー全体で自動参照</text>

  <!-- ===== ARROWS ===== -->
  <!-- original-docs/ → AQOD -->
  <line x1="130" y1="140" x2="130" y2="218" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- original-docs/ → AKM (dashed) -->
  <path d="M 230 105 Q 390 160 390 218" stroke="#586069" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="330" y="165" font-size="9" fill="#586069" transform="rotate(-20, 330, 165)">直接取り込み</text>

  <!-- qa/ → AKM -->
  <line x1="390" y1="140" x2="390" y2="218" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AQOD → qa/ (right arrow) -->
  <path d="M 230 255 Q 260 170 288 130" stroke="#586069" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="263" y="198" font-size="9" fill="#e36209">生成</text>

  <!-- AKM → knowledge/ -->
  <line x1="390" y1="290" x2="390" y2="388" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- src/ → ADOC -->
  <line x1="1150" y1="140" x2="1150" y2="218" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ADOC → docs-generated/ -->
  <line x1="1150" y1="290" x2="1150" y2="388" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- knowledge/ → Custom Agents (down arrow) -->
  <line x1="350" y1="482" x2="350" y2="578" stroke="#0366d6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="360" y="538" font-size="10" fill="#0366d6">自動参照</text>

  <!-- Iterative refinement cycle arrow -->
  <path d="M 550 620 Q 700 700 700 760 Q 700 800 600 810 Q 450 820 400 810 Q 300 800 290 760 Q 280 720 290 680 Q 300 640 400 640" stroke="#e36209" stroke-width="2" fill="none" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="700" y="775" text-anchor="middle" font-size="11" font-weight="bold" fill="#e36209">反復精緻化サイクル</text>
  <text x="700" y="792" text-anchor="middle" font-size="9" fill="#586069">初回 → 補完 → 開発中の気づき → 既存資産取り込み</text>

  <!-- Horizontal separator between knowledge zone and rest -->
  <line x1="580" y1="390" x2="1040" y2="390" stroke="#e1e4e8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="580" y1="480" x2="1040" y2="480" stroke="#e1e4e8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Connection docs-generated/ → knowledge/ reference (optional) -->
  <path d="M 1050 425 Q 900 425 520 435" stroke="#586069" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="790" y="415" font-size="9" fill="#586069">整合確認に活用</text>

  <!-- ===== LEGEND ===== -->
  <rect x="640" y="550" width="280" height="140" rx="8" fill="white" stroke="#e1e4e8" stroke-width="1"/>
  <text x="780" y="574" text-anchor="middle" font-size="12" font-weight="bold" fill="#24292e">凡例</text>
  <rect x="654" y="584" width="14" height="14" rx="3" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="674" y="596" font-size="10" fill="#24292e">入力データ / ファイル</text>
  <rect x="654" y="606" width="14" height="14" rx="3" fill="#fff8e6" stroke="#e36209" stroke-width="1.5"/>
  <text x="674" y="618" font-size="10" fill="#24292e">ワークフロー</text>
  <rect x="654" y="628" width="14" height="14" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="674" y="640" font-size="10" fill="#24292e">成果物 / 出力</text>
  <rect x="654" y="650" width="14" height="14" rx="3" fill="#e8d5f5" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="674" y="662" font-size="10" fill="#24292e">Custom Agent</text>
  <line x1="654" y1="678" x2="668" y2="678" stroke="#e36209" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="674" y="682" font-size="10" fill="#24292e">反復精緻化サイクル</text>

  <!-- 3 sources annotation -->
  <text x="650" y="70" font-size="11" font-weight="bold" fill="#586069">情報源 1</text>
  <text x="650" y="86" font-size="10" fill="#586069">original-docs/ + qa/</text>
  <line x1="640" y1="90" x2="535" y2="105" stroke="#e1e4e8" stroke-width="1"/>
  <text x="1000" y="70" font-size="11" font-weight="bold" fill="#586069">情報源 3</text>
  <text x="1000" y="86" font-size="10" fill="#586069">既存ソースコード</text>
  <line x1="1040" y1="90" x2="1052" y2="105" stroke="#e1e4e8" stroke-width="1"/>
</svg>
