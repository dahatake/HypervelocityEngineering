<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">ASDW-WEB インフォグラフィック</title>
  <desc id="desc">入力ファイル、Workflow、Custom Agentタスク、出力ファイルの関係を示す。</desc>
  <style>
    text { font-family: "Trebuchet MS", Verdana, Arial, sans-serif; fill: #1f2937; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 16px; fill: #4b5563; }
    .panel { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 12; ry: 12; }
    .head { font-size: 20px; font-weight: 700; }
    .item { font-size: 14px; }
    .workflow { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 10; ry: 10; }
    .task { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 10; ry: 10; }
    .legend { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; ry: 10; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .small { font-size: 12px; fill: #475569; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <text x="40" y="50" class="title">ASDW-WEB Orchestration Overview</text>
  <text x="40" y="78" class="subtitle">読み順: 左（入力）→ 中央（Workflow / Custom Agent）→ 右（成果物）</text>

  <rect class="panel" x="40" y="120" width="420" height="620"/>
  <text x="70" y="160" class="head">入力（主なファイル）</text>
  <text x="70" y="200" class="item">• docs/catalog/app-catalog.md</text>
  <text x="70" y="230" class="item">• docs/catalog/service-catalog-matrix.md</text>
  <text x="70" y="260" class="item">• docs/services/ / docs/screen/</text>
  <text x="70" y="290" class="item">• docs/catalog/test-strategy.md</text>
  <text x="70" y="320" class="item">• docs/test-specs/*.md</text>
  <text x="70" y="350" class="item">• src/data/sample-data.json</text>
  <text x="70" y="380" class="item">• resource_group（Issue 入力）</text>

  <rect class="workflow" x="520" y="200" width="520" height="120"/>
  <text x="550" y="245" class="head">auto-app-dev-microservice-web-reusable.yml</text>
  <text x="550" y="275" class="item">Issue Template: web-app-dev.yml</text>
  <text x="550" y="300" class="item">Label: auto-app-dev-microservice-web</text>

  <rect class="task" x="520" y="360" width="520" height="310"/>
  <text x="550" y="402" class="head">Custom Agent タスク（抜粋）</text>
  <text x="550" y="438" class="item">1) Dev-Microservice-Azure-DataDesign / DataDeploy</text>
  <text x="550" y="466" class="item">2) ComputeDesign / AddServiceDesign / AddServiceDeploy</text>
  <text x="550" y="494" class="item">3) Arch-TDD-TestSpec → ServiceTestCoding → ServiceCoding</text>
  <text x="550" y="522" class="item">4) UITestCoding → UICoding → UIDeploy → E2ETesting</text>
  <text x="550" y="550" class="item">5) QA-AzureArchitectureReview / QA-AzureDependencyReview</text>
  <text x="550" y="594" class="small">※ Custom Agent = 各 Step の実行タスク</text>
  <text x="550" y="620" class="small">※ Step.4.1 と Step.4.2 は Step.3.3 後に並列</text>

  <rect class="panel" x="1100" y="120" width="460" height="620"/>
  <text x="1130" y="160" class="head">出力（主な成果物）</text>
  <text x="1130" y="200" class="item">• docs/azure/azure-services-data.md</text>
  <text x="1130" y="230" class="item">• src/api/{serviceId}-*/</text>
  <text x="1130" y="260" class="item">• src/app/</text>
  <text x="1130" y="290" class="item">• .github/workflows/azure-static-web-apps-*.yml</text>
  <text x="1130" y="320" class="item">• docs/azure/azure-architecture-review-report.md</text>
  <text x="1130" y="350" class="item">• docs/azure/dependency-review-report.md</text>
  <text x="1130" y="380" class="item">• E2E 実行結果（artifact）</text>

  <path class="arrow" d="M460 270 L520 260"/>
  <path class="arrow" d="M1040 260 L1100 260"/>
  <path class="arrow" d="M780 320 L780 360"/>
  <path class="arrow" d="M1040 520 L1100 520"/>

  <rect class="legend" x="40" y="780" width="1520" height="100"/>
  <text x="70" y="818" class="item">凡例: 青=Workflow、緑=Custom Agent タスク、灰=入出力ファイル</text>
  <text x="70" y="848" class="item">色のセマンティクスと読み順を固定し、監査時に実装差分を追跡しやすくしています。</text>
</svg>
