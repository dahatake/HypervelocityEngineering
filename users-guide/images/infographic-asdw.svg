<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 800" role="img" aria-labelledby="title desc">
  <title id="title">ASDW インフォグラフィック</title>
  <desc id="desc">ASDW の入力から auto-app-dev-microservice-azure.yml の20ステップ、TDD RED/GREEN サイクル、出力成果物を示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#334155"/></marker>
  </defs>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
    .zone { stroke: #94a3b8; stroke-width: 1.5; rx: 10; ry: 10; }
    .inputZone { fill: #f8fafc; } .processZone { fill: #eff6ff; } .outputZone { fill: #f0fdf4; }
    .zoneTitle { font-size: 18px; font-weight: 700; }
    .file { fill: #fff; stroke: #64748b; stroke-width: 1.5; rx: 8; ry: 8; }
    .workflow { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 10; ry: 10; }
    .step { fill: #e0ecff; stroke: #1d4ed8; stroke-width: 1.4; rx: 8; ry: 8; }
    .agent { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.1; rx: 10; ry: 10; }
    .node { font-size: 10px; font-weight: 600; }
    .tiny { font-size: 8px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 1.9; fill: none; marker-end: url(#arrow); }
    .label { rx: 12; ry: 12; }
    .labelText { font-size: 12px; font-weight: 700; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
    .cycle { fill: none; stroke: #dc2626; stroke-width: 2; stroke-dasharray: 6 4; }
  </style>

  <rect x="20" y="20" width="320" height="760" class="zone inputZone"/>
  <rect x="360" y="20" width="1340" height="760" class="zone processZone"/>
  <rect x="1720" y="20" width="260" height="760" class="zone outputZone"/>
  <text x="40" y="52" class="zoneTitle" fill="#64748b">INPUT</text>
  <text x="380" y="52" class="zoneTitle" fill="#1d4ed8">PROCESS</text>
  <text x="1740" y="52" class="zoneTitle" fill="#15803d">OUTPUT</text>

  <g id="input-zone">
    <rect x="50" y="90" width="260" height="80" class="file"/><text x="62" y="120" class="node">docs/catalog/, docs/screen/, docs/services/</text><text x="62" y="140" class="tiny">AAD 設計成果物</text>
    <rect x="50" y="185" width="260" height="80" class="file"/><text x="62" y="215" class="node">docs/test-specs/</text><text x="62" y="235" class="tiny">TDD仕様（service/agent/ui）</text>
    <rect x="50" y="280" width="260" height="80" class="file"/><text x="62" y="310" class="node">docs/azure/ + resource_group</text><text x="62" y="330" class="tiny">デプロイ前提情報</text>
  </g>

  <g id="process-zone">
    <rect x="390" y="80" width="1280" height="660" class="workflow"/>
    <text x="414" y="110" class="node" fill="#1d4ed8">Workflow: auto-app-dev-microservice-azure.yml</text>

    <!-- row 1 -->
    <g>
      <rect x="410" y="140" width="92" height="78" class="step"/><text x="416" y="157" class="node">1.1</text><rect x="416" y="163" width="80" height="20" class="agent"/><text x="419" y="176" class="tiny">Dev-Microservice-Azure-DataDesign</text>
      <rect x="512" y="140" width="92" height="78" class="step"/><text x="518" y="157" class="node">1.2</text><rect x="518" y="163" width="80" height="20" class="agent"/><text x="521" y="176" class="tiny">Dev-Microservice-Azure-DataDeploy</text>
      <rect x="614" y="140" width="92" height="78" class="step"/><text x="620" y="157" class="node">2.1</text><rect x="620" y="163" width="80" height="20" class="agent"/><text x="623" y="176" class="tiny">Dev-Microservice-Azure-ComputeDesign</text>
      <rect x="716" y="140" width="92" height="78" class="step"/><text x="722" y="157" class="node">2.2</text><rect x="722" y="163" width="80" height="20" class="agent"/><text x="725" y="176" class="tiny">Dev-Microservice-Azure-AddServiceDesign</text>
      <rect x="818" y="140" width="92" height="78" class="step"/><text x="824" y="157" class="node">2.3</text><rect x="824" y="163" width="80" height="20" class="agent"/><text x="827" y="176" class="tiny">Dev-Microservice-Azure-AddServiceDeploy</text>
      <rect x="920" y="140" width="92" height="78" class="step"/><text x="926" y="157" class="node">2.3TC</text><rect x="926" y="163" width="80" height="20" class="agent"/><text x="929" y="176" class="tiny">Dev-Microservice-Azure-ServiceTestCoding</text>
      <rect x="1022" y="140" width="92" height="78" class="step"/><text x="1028" y="157" class="node">2.4</text><rect x="1028" y="163" width="80" height="20" class="agent"/><text x="1031" y="176" class="tiny">Dev-Microservice-Azure-ServiceCoding-AzureFunctions</text>
      <rect x="1124" y="140" width="92" height="78" class="step"/><text x="1130" y="157" class="node">2.5</text><rect x="1130" y="163" width="80" height="20" class="agent"/><text x="1133" y="176" class="tiny">Dev-Microservice-Azure-ComputeDeploy-AzureFunctions</text>
      <rect x="1226" y="140" width="92" height="78" class="step"/><text x="1232" y="157" class="node">2.6</text><rect x="1232" y="163" width="80" height="20" class="agent"/><text x="1235" y="176" class="tiny">Arch-AIAgentDesign</text>
      <rect x="1328" y="140" width="92" height="78" class="step"/><text x="1334" y="157" class="node">2.7T</text><rect x="1334" y="163" width="80" height="20" class="agent"/><text x="1337" y="176" class="tiny">Arch-TDD-TestSpec</text>
      <rect x="1430" y="140" width="92" height="78" class="step"/><text x="1436" y="157" class="node">2.7TC</text><rect x="1436" y="163" width="80" height="20" class="agent"/><text x="1439" y="176" class="tiny">Dev-Microservice-Azure-AgentTestCoding</text>
      <rect x="1532" y="140" width="92" height="78" class="step"/><text x="1538" y="157" class="node">2.7</text><rect x="1538" y="163" width="80" height="20" class="agent"/><text x="1541" y="176" class="tiny">Dev-Microservice-Azure-AgentCoding</text>
    </g>

    <!-- row 2 -->
    <g>
      <rect x="600" y="310" width="110" height="78" class="step"/><text x="607" y="327" class="node">2.8</text><rect x="607" y="333" width="96" height="20" class="agent"/><text x="610" y="346" class="tiny">Dev-Microservice-Azure-AgentDeploy</text>
      <rect x="740" y="250" width="110" height="50" class="step"/><text x="747" y="267" class="node">3.0T</text><rect x="747" y="272" width="96" height="18" class="agent"/><text x="750" y="284" class="tiny">Arch-TDD-TestSpec</text>
      <rect x="740" y="310" width="110" height="78" class="step"/><text x="747" y="327" class="node">3.0TC</text><rect x="747" y="333" width="96" height="20" class="agent"/><text x="750" y="346" class="tiny">Dev-Microservice-Azure-UITestCoding</text>
      <rect x="880" y="310" width="110" height="78" class="step"/><text x="887" y="327" class="node">3.1</text><rect x="887" y="333" width="96" height="20" class="agent"/><text x="890" y="346" class="tiny">Dev-Microservice-Azure-UICoding</text>
      <rect x="1020" y="310" width="110" height="78" class="step"/><text x="1027" y="327" class="node">3.2</text><rect x="1027" y="333" width="96" height="20" class="agent"/><text x="1030" y="346" class="tiny">Dev-Microservice-Azure-UIDeploy-AzureStaticWebApps</text>
    </g>

    <rect x="920" y="250" width="92" height="50" class="step"/><text x="926" y="267" class="node">2.3T</text><rect x="926" y="272" width="80" height="18" class="agent"/><text x="929" y="284" class="tiny">Arch-TDD-TestSpec</text>

    <!-- row 3 parallel -->
    <g>
      <rect x="900" y="500" width="140" height="86" class="step"/><text x="908" y="520" class="node">4.1</text><rect x="908" y="528" width="124" height="22" class="agent"/><text x="912" y="543" class="tiny">QA-AzureArchitectureReview</text>
      <rect x="1080" y="500" width="140" height="86" class="step"/><text x="1088" y="520" class="node">4.2</text><rect x="1088" y="528" width="124" height="22" class="agent"/><text x="1092" y="543" class="tiny">QA-AzureDependencyReview</text>
    </g>

    <path d="M930 218 C930 260, 1080 260, 1080 310" class="arrow"/>
    <path d="M1020 218 C1020 260, 1080 260, 1080 310" class="arrow"/>

    <path d="M410 220 L512 220" class="arrow"/>
    <path d="M604 220 L614 220" class="arrow"/>
    <path d="M706 220 L716 220" class="arrow"/>
    <path d="M808 220 L818 220" class="arrow"/>
    <path d="M910 220 C930 220, 940 240, 960 250" class="arrow"/>
    <path d="M1012 275 C1030 275, 1030 220, 1022 220" class="arrow"/>
    <path d="M1012 220 L1022 220" class="arrow"/>
    <path d="M1114 220 L1124 220" class="arrow"/>
    <path d="M1216 220 L1226 220" class="arrow"/>
    <path d="M1318 220 L1328 220" class="arrow"/>
    <path d="M1420 220 L1430 220" class="arrow"/>
    <path d="M1522 220 L1532 220" class="arrow"/>
    <path d="M1624 220 C1660 220, 1660 275, 850 275" class="arrow"/>
    <path d="M710 349 C725 349, 735 280, 740 280" class="arrow"/>
    <path d="M795 300 L795 310" class="arrow"/>
    <path d="M850 349 L880 349" class="arrow"/>
    <path d="M990 349 L1020 349" class="arrow"/>
    <path d="M1075 388 C1075 450, 970 450, 970 500" class="arrow"/>
    <path d="M1075 388 C1075 450, 1150 450, 1150 500" class="arrow"/>

    <path d="M925 262 C960 300, 1020 300, 1035 262" class="cycle"/>
    <text x="962" y="287" class="tiny" fill="#dc2626">TDD RED→GREEN</text>
    <path d="M1435 262 C1470 300, 1530 300, 1545 262" class="cycle"/>
    <text x="1473" y="287" class="tiny" fill="#dc2626">TDD RED→GREEN</text>
    <path d="M742 398 C790 430, 860 430, 885 398" class="cycle"/>
    <text x="786" y="420" class="tiny" fill="#dc2626">UI TDD</text>

    <rect x="410" y="690" width="104" height="24" fill="#64748b" class="label"/><text x="462" y="702" class="labelText">asdw:ready</text>
    <rect x="526" y="690" width="118" height="24" fill="#1d4ed8" class="label"/><text x="585" y="702" class="labelText">asdw:running</text>
    <rect x="656" y="690" width="104" height="24" fill="#15803d" class="label"/><text x="708" y="702" class="labelText">asdw:done</text>
  </g>

  <g id="output-zone">
    <rect x="1740" y="110" width="220" height="78" class="file"/><text x="1752" y="140" class="node">src/api/</text><text x="1752" y="160" class="tiny">サービス実装</text>
    <rect x="1740" y="200" width="220" height="78" class="file"/><text x="1752" y="230" class="node">src/agent/</text><text x="1752" y="250" class="tiny">Agent 実装</text>
    <rect x="1740" y="290" width="220" height="78" class="file"/><text x="1752" y="320" class="node">src/app/</text><text x="1752" y="340" class="tiny">UI 実装</text>
    <rect x="1740" y="380" width="220" height="78" class="file"/><text x="1752" y="410" class="node">test/</text><text x="1752" y="430" class="tiny">api/agent/ui テスト</text>
    <rect x="1740" y="470" width="220" height="78" class="file"/><text x="1752" y="500" class="node">infra/azure/ + .github/workflows/</text><text x="1752" y="520" class="tiny">デプロイ自動化</text>
    <rect x="1740" y="560" width="220" height="78" class="file"/><text x="1752" y="590" class="node">docs/azure/</text><text x="1752" y="610" class="tiny">レビュー/依存性レポート</text>
  </g>

  <g id="connections">
    <path d="M310 130 C350 130, 360 165, 410 165" class="arrow"/>
    <path d="M310 225 C360 225, 370 185, 614 185" class="arrow"/>
    <path d="M310 320 C370 320, 390 200, 818 200" class="arrow"/>
    <path d="M1220 540 C1650 540, 1680 590, 1740 590" class="arrow"/>
    <path d="M1130 586 C1620 586, 1680 500, 1740 500" class="arrow"/>
    <path d="M1530 220 C1650 220, 1700 140, 1740 140" class="arrow"/>
    <path d="M1530 220 C1650 220, 1700 230, 1740 230" class="arrow"/>
    <path d="M990 350 C1650 350, 1700 320, 1740 320" class="arrow"/>
    <path d="M850 350 C1650 350, 1700 410, 1740 410" class="arrow"/>
    <text x="1168" y="485" class="tiny">並列</text>
  </g>
</svg>
