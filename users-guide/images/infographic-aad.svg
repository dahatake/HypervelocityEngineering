    <path d="M1360 216 C1360 250, 1295 250, 1295 285" class="arrow"/>
    <circle cx="1205" cy="394" r="5" class="join"/>
    <path d="M1115 371 L1205 394" class="arrow"/>
    <path d="M1295 371 L1205 394" class="arrow"/>
