<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 700" role="img" aria-labelledby="title desc">
  <title id="title">AAD インフォグラフィック</title>
  <desc id="desc">AAD の入力ファイル、auto-app-detail-design.yml の13ステップ（7.1/7.2並列と7.3合流）、出力成果物を示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <pattern id="wf" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#bfdbfe" stroke-width="2"/>
    </pattern>
  </defs>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
    .zone { stroke: #94a3b8; stroke-width: 1.5; rx: 10; ry: 10; }
    .inputZone { fill: #f8fafc; }
    .processZone { fill: #eff6ff; }
    .outputZone { fill: #f0fdf4; }
    .zoneTitle { font-size: 18px; font-weight: 700; }
    .workflow { fill: url(#wf); stroke: #1d4ed8; stroke-width: 2; rx: 10; ry: 10; }
    .file { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; rx: 8; ry: 8; }
    .step { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.6; rx: 8; ry: 8; }
    .agent { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.3; rx: 10; ry: 10; }
    .skill { fill: #f5f3ff; stroke: #7c3aed; stroke-dasharray: 4 3; stroke-width: 1.1; rx: 8; ry: 8; }
    .node { font-size: 11px; font-weight: 600; }
    .tiny { font-size: 10px; fill: #475569; }
    .label { rx: 12; ry: 12; }
    .labelText { font-size: 12px; font-weight: 700; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .join { fill: #334155; }
  </style>

  <rect x="20" y="20" width="300" height="660" class="zone inputZone"/>
  <rect x="340" y="20" width="1160" height="660" class="zone processZone"/>
  <rect x="1520" y="20" width="260" height="660" class="zone outputZone"/>
  <text x="40" y="52" class="zoneTitle" fill="#64748b">INPUT</text>
  <text x="360" y="52" class="zoneTitle" fill="#1d4ed8">PROCESS</text>
  <text x="1540" y="52" class="zoneTitle" fill="#15803d">OUTPUT</text>

  <g id="input-zone">
    <rect x="50" y="90" width="240" height="74" class="file"/>
    <text x="62" y="118" class="node">docs/catalog/app-catalog.md</text>
    <text x="62" y="138" class="tiny">AAS 成果物</text>
    <rect x="50" y="180" width="240" height="74" class="file"/>
    <text x="62" y="208" class="node">docs/catalog/use-case-catalog.md</text>
    <text x="62" y="228" class="tiny">業務ユースケース</text>
    <rect x="50" y="270" width="240" height="74" class="file"/>
    <text x="62" y="298" class="node">knowledge/ (D01〜D21)</text>
    <text x="62" y="318" class="tiny">任意コンテキスト入力</text>
  </g>

  <g id="process-zone">
    <rect x="370" y="78" width="1100" height="560" class="workflow"/>
    <text x="396" y="108" class="node" fill="#1d4ed8">Workflow: auto-app-detail-design.yml</text>

    <g id="steps-top">
      <rect x="390" y="130" width="135" height="86" class="step"/><text x="398" y="148" class="node">step-1.1</text><rect x="398" y="154" width="119" height="22" class="agent"/><text x="402" y="169" class="tiny">Arch-Microservice-DomainAnalytics</text><rect x="398" y="181" width="119" height="18" class="skill"/><text x="402" y="194" class="tiny">Skill refs</text>
      <rect x="540" y="130" width="135" height="86" class="step"/><text x="548" y="148" class="node">step-1.2</text><rect x="548" y="154" width="119" height="22" class="agent"/><text x="552" y="169" class="tiny">Arch-Microservice-ServiceIdentify</text><rect x="548" y="181" width="119" height="18" class="skill"/><text x="552" y="194" class="tiny">Skill refs</text>
      <rect x="690" y="130" width="135" height="86" class="step"/><text x="698" y="148" class="node">step-2</text><rect x="698" y="154" width="119" height="22" class="agent"/><text x="702" y="169" class="tiny">Arch-DataModeling</text><rect x="698" y="181" width="119" height="18" class="skill"/><text x="702" y="194" class="tiny">Skill refs</text>
      <rect x="840" y="130" width="135" height="86" class="step"/><text x="848" y="148" class="node">step-3</text><rect x="848" y="154" width="119" height="22" class="agent"/><text x="852" y="169" class="tiny">Arch-DataCatalog</text><rect x="848" y="181" width="119" height="18" class="skill"/><text x="852" y="194" class="tiny">Skill refs</text>
      <rect x="990" y="130" width="135" height="86" class="step"/><text x="998" y="148" class="node">step-4</text><rect x="998" y="154" width="119" height="22" class="agent"/><text x="1002" y="169" class="tiny">Arch-UI-List</text><rect x="998" y="181" width="119" height="18" class="skill"/><text x="1002" y="194" class="tiny">Skill refs</text>
      <rect x="1140" y="130" width="135" height="86" class="step"/><text x="1148" y="148" class="node">step-5</text><rect x="1148" y="154" width="119" height="22" class="agent"/><text x="1152" y="169" class="tiny">Arch-Microservice-ServiceCatalog</text><rect x="1148" y="181" width="119" height="18" class="skill"/><text x="1152" y="194" class="tiny">Skill refs</text>
      <rect x="1290" y="130" width="135" height="86" class="step"/><text x="1298" y="148" class="node">step-6</text><rect x="1298" y="154" width="119" height="22" class="agent"/><text x="1302" y="169" class="tiny">Arch-TDD-TestStrategy</text><rect x="1298" y="181" width="119" height="18" class="skill"/><text x="1302" y="194" class="tiny">Skill refs</text>
    </g>

    <g id="steps-mid">
      <rect x="1040" y="285" width="150" height="86" class="step"/><text x="1048" y="304" class="node">step-7.1</text><rect x="1048" y="311" width="134" height="22" class="agent"/><text x="1052" y="326" class="tiny">Arch-UI-Detail</text><rect x="1048" y="338" width="134" height="18" class="skill"/><text x="1052" y="351" class="tiny">Skill refs</text>
      <rect x="1220" y="285" width="150" height="86" class="step"/><text x="1228" y="304" class="node">step-7.2</text><rect x="1228" y="311" width="134" height="22" class="agent"/><text x="1232" y="326" class="tiny">Arch-Microservice-ServiceDetail</text><rect x="1228" y="338" width="134" height="18" class="skill"/><text x="1232" y="351" class="tiny">Skill refs</text>
      <rect x="1130" y="420" width="150" height="86" class="step"/><text x="1138" y="439" class="node">step-7.3</text><rect x="1138" y="446" width="134" height="22" class="agent"/><text x="1142" y="461" class="tiny">Arch-TDD-TestSpec</text><rect x="1138" y="473" width="134" height="18" class="skill"/><text x="1142" y="486" class="tiny">Skill refs</text>
      <rect x="800" y="420" width="150" height="86" class="step"/><text x="808" y="439" class="node">step-8.1</text><rect x="808" y="446" width="134" height="22" class="agent"/><text x="812" y="461" class="tiny">Arch-AIAgentDesign</text><rect x="808" y="473" width="134" height="18" class="skill"/><text x="812" y="486" class="tiny">Skill refs</text>
      <rect x="620" y="420" width="150" height="86" class="step"/><text x="628" y="439" class="node">step-8.2</text><rect x="628" y="446" width="134" height="22" class="agent"/><text x="632" y="461" class="tiny">Arch-AIAgentDesign</text><rect x="628" y="473" width="134" height="18" class="skill"/><text x="632" y="486" class="tiny">Skill refs</text>
      <rect x="440" y="420" width="150" height="86" class="step"/><text x="448" y="439" class="node">step-8.3</text><rect x="448" y="446" width="134" height="22" class="agent"/><text x="452" y="461" class="tiny">Arch-AIAgentDesign</text><rect x="448" y="473" width="134" height="18" class="skill"/><text x="452" y="486" class="tiny">Skill refs</text>
    </g>

    <rect x="390" y="560" width="96" height="24" fill="#64748b" class="label"/><text x="438" y="572" class="labelText">aad:ready</text>
    <rect x="500" y="560" width="112" height="24" fill="#1d4ed8" class="label"/><text x="556" y="572" class="labelText">aad:running</text>
    <rect x="626" y="560" width="96" height="24" fill="#15803d" class="label"/><text x="674" y="572" class="labelText">aad:done</text>
  </g>

  <g id="output-zone">
    <rect x="1545" y="110" width="210" height="90" class="file"/>
    <text x="1558" y="138" class="node">docs/catalog/</text>
    <text x="1558" y="158" class="tiny">domain/data/screen/service/test</text>
    <rect x="1545" y="220" width="210" height="74" class="file"/>
