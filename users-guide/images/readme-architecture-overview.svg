<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" role="img" aria-labelledby="title desc">
  <title id="title">README用アーキテクチャ概要図</title>
  <desc id="desc">入力情報源、knowledgeを中核とした反復精緻化、3つの実行方式とDAG、Custom Agent群、出力成果物の関係図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: system-ui, "Segoe UI", -apple-system, Arial, sans-serif; fill: #1f2937; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #475569; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; rx: 12; }
      .node { stroke-width: 1.4; rx: 10; }
      .file { fill: #95A5A6; stroke: #5d6d73; }
      .arch { fill: #4A90D9; stroke: #1f3a5a; }
      .dev { fill: #50C878; stroke: #1b5e20; }
      .doc { fill: #9B59B6; stroke: #4a235a; }
      .qa { fill: #E67E22; stroke: #7e3d00; }
      .km { fill: #F39C12; stroke: #7a4f00; stroke-width: 2.2; }
      .light { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 8; }
      .h { font-size: 17px; font-weight: 700; }
      .t { font-size: 12.5px; }
      .t-bold { font-size: 12.5px; font-weight: 700; }
      .light-text { fill: #ffffff; font-size: 12.5px; font-weight: 700; }
      .link { stroke: #334155; stroke-width: 1.9; fill: none; marker-end: url(#arrow); }
      .link-dash { stroke: #1d4ed8; stroke-width: 1.9; stroke-dasharray: 8 5; fill: none; marker-end: url(#arrow); }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 10; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="920" fill="transparent"/>
  <text x="30" y="48" class="title">アーキテクチャ概要（入力 / 処理 / 出力）</text>
  <text x="30" y="72" class="subtitle">knowledge/ を中核に、3方式の実行オーケストレーションと Custom Agent 群が docs/src/Azure/PR を生成</text>

  <!-- Panels -->
  <rect x="20" y="90" width="280" height="730" class="panel"/>
  <text x="40" y="118" class="h">入力（情報源）</text>

  <rect x="320" y="90" width="560" height="730" class="panel"/>
  <text x="340" y="118" class="h">処理（中核ストア + 実行方式 + DAG）</text>

  <rect x="900" y="90" width="280" height="730" class="panel"/>
  <text x="920" y="118" class="h">出力（成果物）</text>

  <!-- Input nodes -->
  <rect x="40" y="150" width="240" height="86" class="node file"/>
  <text x="58" y="184" class="t-bold">original-docs/</text>
  <text x="58" y="206" class="t">既存の要求定義書・設計書（原本）</text>

  <rect x="40" y="264" width="240" height="86" class="node file"/>
  <text x="58" y="298" class="t-bold">qa/</text>
  <text x="58" y="320" class="t">質問票（開発中 + aqod 自動生成）</text>

  <rect x="40" y="378" width="240" height="86" class="node file"/>
  <text x="58" y="412" class="t-bold">Work IQ / 外部データソース</text>
  <text x="58" y="434" class="t">方式3のオプション（MCP経由参照）</text>

  <!-- Core knowledge cycle -->
  <rect x="340" y="154" width="172" height="70" class="node qa"/>
  <text x="360" y="184" class="t-bold">aqod</text>
  <text x="360" y="205" class="t">original-docs→qa</text>

  <rect x="532" y="154" width="172" height="70" class="node km"/>
  <text x="552" y="184" class="t-bold">akm</text>
  <text x="552" y="205" class="t">qa/original-docs→knowledge</text>

  <rect x="724" y="140" width="136" height="98" class="node km"/>
  <text x="742" y="174" class="t-bold">knowledge/</text>
  <text x="742" y="196" class="t">D01〜D21</text>
  <text x="742" y="216" class="t">全Agent参照</text>

  <path d="M 280 193 C 305 193, 316 189, 340 189" class="link"/>
  <path d="M 280 307 C 406 307, 470 257, 532 189" class="link"/>
  <path d="M 512 189 C 520 189, 524 189, 532 189" class="link"/>
  <path d="M 704 189 C 714 189, 716 189, 724 189" class="link"/>
  <path d="M 860 189 C 870 189, 872 260, 356 260" class="link-dash"/>
  <path d="M 340 224 C 250 248, 180 248, 160 264" class="link-dash"/>
  <text x="546" y="274" class="t" fill="#1d4ed8">反復精緻化: aqod → qa → akm → knowledge</text>

  <!-- 3 execution modes -->
  <rect x="340" y="296" width="520" height="70" class="light"/>
  <text x="356" y="325" class="t-bold">方式1: Copilot cloud agent 手動実行</text>
  <text x="356" y="346" class="t">Issue → 手動 Agent assign</text>

  <rect x="340" y="376" width="520" height="70" class="light"/>
  <text x="356" y="405" class="t-bold">方式2: ワークフローオーケストレーション Web</text>
  <text x="356" y="426" class="t">Issue Template → Bootstrap → Sub Issues 自動生成 → Copilot 自動 assign</text>

  <rect x="340" y="456" width="520" height="70" class="light"/>
  <text x="356" y="485" class="t-bold">方式3: ワークフローオーケストレーション ローカル</text>
  <text x="356" y="506" class="t">hve Python パッケージ → Copilot CLI SDK → DAG 並列実行</text>

  <path d="M 280 421 C 306 421, 318 491, 340 491" class="link-dash"/>
  <text x="46" y="494" class="t" fill="#1d4ed8">方式3のみ外部データ参照</text>

  <!-- Supporting workflows -->
  <rect x="340" y="540" width="168" height="44" class="node km"/>
  <text x="356" y="567" class="t-bold">補助: akm</text>
  <rect x="520" y="540" width="168" height="44" class="node qa"/>
  <text x="536" y="567" class="t-bold">補助: aqod</text>
  <rect x="700" y="540" width="160" height="44" class="node doc"/>
  <text x="716" y="567" class="light-text">補助: adoc</text>

  <!-- DAG steps -->
  <rect x="340" y="598" width="520" height="210" class="light"/>
  <text x="356" y="624" class="t-bold">ワークフロー（DAGステップ群）</text>

  <rect x="356" y="640" width="150" height="56" class="node arch"/>
  <text x="374" y="664" class="light-text">01 要求定義</text>
  <text x="374" y="682" class="light-text">（手動）</text>

  <rect x="530" y="640" width="180" height="56" class="node arch"/>
  <text x="548" y="664" class="light-text">02 アプリ設計（aas）</text>

  <rect x="356" y="724" width="158" height="66" class="node arch"/>
  <text x="374" y="750" class="light-text">03/05 Microservice</text>
  <text x="374" y="770" class="light-text">aad / asdw</text>

  <rect x="530" y="724" width="158" height="66" class="node arch"/>
  <text x="548" y="750" class="light-text">04/06 Batch</text>
  <text x="548" y="770" class="light-text">abd / abdv</text>

  <rect x="704" y="724" width="146" height="66" class="node arch"/>
  <text x="722" y="750" class="light-text">07/08 AI Agent</text>
  <text x="722" y="770" class="light-text">設計→実装（手動）</text>

  <path d="M 506 668 C 514 668, 522 668, 530 668" class="link"/>
  <path d="M 620 696 C 620 708, 435 708, 435 724" class="link"/>
  <path d="M 620 696 C 620 708, 609 708, 609 724" class="link"/>
  <path d="M 620 696 C 620 708, 777 708, 777 724" class="link"/>

  <!-- Custom Agent categories -->
  <rect x="900" y="150" width="280" height="208" class="light"/>
  <text x="916" y="176" class="t-bold">Custom Agent（64 + KnowledgeManager 1 = 65）</text>
  <rect x="916" y="192" width="14" height="14" class="node arch"/><text x="938" y="204" class="t">Arch-*（23）: 設計 → docs/</text>
  <rect x="916" y="218" width="14" height="14" class="node dev"/><text x="938" y="230" class="t">Dev-*（17）: 実装 → src/ + Azure</text>
  <rect x="916" y="244" width="14" height="14" class="node doc"/><text x="938" y="256" class="t">Doc-*（19）: 文書生成 → docs-generated/</text>
  <rect x="916" y="270" width="14" height="14" class="node qa"/><text x="938" y="282" class="t">QA-*（5）: 品質確認</text>
  <rect x="916" y="296" width="14" height="14" class="node km"/><text x="938" y="308" class="t">KnowledgeManager（1）: knowledge管理</text>

  <path d="M 860 491 C 880 491, 890 260, 900 260" class="link"/>
  <path d="M 792 189 C 872 189, 880 188, 900 188" class="link-dash"/>

  <!-- Outputs -->
  <rect x="920" y="392" width="240" height="70" class="node file"/>
  <text x="938" y="421" class="t-bold">docs/</text>
  <text x="938" y="442" class="t">設計ドキュメント</text>

  <rect x="920" y="472" width="240" height="70" class="node file"/>
  <text x="938" y="501" class="t-bold">src/</text>
  <text x="938" y="522" class="t">ソースコード</text>

  <rect x="920" y="552" width="240" height="70" class="node file"/>
  <text x="938" y="581" class="t-bold">docs-generated/</text>
  <text x="938" y="602" class="t">ソースコード由来の技術文書</text>

  <rect x="920" y="632" width="240" height="70" class="node dev"/>
  <text x="938" y="661" class="light-text">Azure</text>
  <text x="938" y="682" class="light-text">デプロイ / リソース作成</text>

  <rect x="920" y="712" width="240" height="70" class="node qa"/>
  <text x="938" y="741" class="t-bold">PR</text>
  <text x="938" y="762" class="t">レビュー → マージ</text>

  <path d="M 1180 204 C 1188 204, 1190 428, 1160 428" class="link"/>
  <path d="M 1180 230 C 1188 230, 1190 508, 1160 508" class="link"/>
  <path d="M 1180 256 C 1188 256, 1190 588, 1160 588" class="link"/>
  <path d="M 1180 282 C 1188 282, 1190 748, 1160 748" class="link"/>
  <path d="M 1180 230 C 1188 230, 1190 668, 1160 668" class="link"/>

  <!-- Legend -->
  <rect x="20" y="836" width="1160" height="68" class="legend"/>
  <text x="38" y="862" class="t-bold">凡例</text>
  <rect x="92" y="850" width="14" height="14" class="node arch"/><text x="112" y="862" class="t">Arch-*</text>
  <rect x="172" y="850" width="14" height="14" class="node dev"/><text x="192" y="862" class="t">Dev-*</text>
  <rect x="252" y="850" width="14" height="14" class="node doc"/><text x="272" y="862" class="t">Doc-*</text>
  <rect x="332" y="850" width="14" height="14" class="node qa"/><text x="352" y="862" class="t">QA-*</text>
  <rect x="404" y="850" width="14" height="14" class="node km"/><text x="424" y="862" class="t">KnowledgeManager</text>
  <rect x="548" y="850" width="14" height="14" class="node file"/><text x="568" y="862" class="t">ファイル/ディレクトリ</text>
  <line x1="730" y1="857" x2="770" y2="857" class="link"/><text x="778" y="862" class="t">Read/Write（実線）</text>
  <line x1="920" y1="857" x2="960" y2="857" class="link-dash"/><text x="968" y="862" class="t">参照/反復（破線）</text>
</svg>
