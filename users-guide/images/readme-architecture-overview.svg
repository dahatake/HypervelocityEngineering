<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960" role="img" aria-labelledby="title desc">
  <title id="title">README 用アーキテクチャ概要図</title>
  <desc id="desc">Issue Template と hve CLI を入口に、HVE Cloud Agent Orchestrator Dispatcher と workflow registry が Workflow を選択し、Custom Agent が knowledge、docs、src、qa、Azure、PR を生成する全体図。凡例と読み順を含む。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: "Noto Sans CJK JP", "Noto Sans JP", "IPAexGothic", "IPAGothic", "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, -apple-system, "Segoe UI", Arial, sans-serif; fill: #1f2937; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #475569; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 16; }
      .card { rx: 12; ry: 12; stroke-width: 1.5; }
      .entry { fill: #e0f2fe; stroke: #0369a1; }
      .workflow { fill: #dbeafe; stroke: #1d4ed8; }
      .store { fill: #fef3c7; stroke: #d97706; }
      .agent { fill: #ede9fe; stroke: #7c3aed; }
      .output { fill: #dcfce7; stroke: #15803d; }
      .ops { fill: #fff7ed; stroke: #ea580c; }
      .label { font-size: 17px; font-weight: 700; }
      .body { font-size: 12.5px; }
      .small { font-size: 11.5px; fill: #475569; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrow-dash { fill: none; stroke: #0f766e; stroke-width: 2.4; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 12; }
      .order { fill: #0f172a; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="960" fill="#ffffff"/>
  <text x="32" y="48" class="title">HVE の全体像（入口 → Workflow → Custom Agent → 成果物）</text>
  <text x="32" y="74" class="subtitle">README では実装確認済みの入口・Workflow ID・主要ディレクトリだけを要約しています</text>

  <rect x="24" y="104" width="300" height="700" class="panel"/>
  <text x="44" y="134" class="label">1. 入口 / 入力</text>

  <rect x="44" y="162" width="260" height="92" class="card entry"/>
  <text x="62" y="190" class="label">Issue Template</text>
  <text x="62" y="214" class="body">`.github/ISSUE_TEMPLATE/*.yml`</text>
  <text x="62" y="234" class="small">12 種のフォームで Web 実行を開始</text>

  <rect x="44" y="278" width="260" height="92" class="card entry"/>
  <text x="62" y="306" class="label">hve CLI</text>
  <text x="62" y="330" class="body">`run` / `orchestrate` / `resume`</text>
  <text x="62" y="350" class="small">ローカル PC から同じ Workflow DAG を実行</text>

  <rect x="44" y="394" width="260" height="88" class="card store"/>
  <text x="62" y="422" class="label">original-docs/</text>
  <text x="62" y="446" class="body">既存の要求定義・設計原本</text>

  <rect x="44" y="506" width="260" height="88" class="card store"/>
  <text x="62" y="534" class="label">qa/</text>
  <text x="62" y="558" class="body">質問票・回答済み QA ドキュメント</text>

  <rect x="44" y="618" width="260" height="112" class="card ops"/>
  <text x="62" y="646" class="label">補助入力</text>
  <text x="62" y="670" class="body">`docs/`, `src/`, `sample/`, `data/`</text>
  <text x="62" y="692" class="small">Workflow に応じて既存成果物やサンプルを参照</text>

  <rect x="352" y="104" width="560" height="700" class="panel"/>
  <text x="372" y="134" class="label">2. オーケストレーション</text>

  <rect x="372" y="164" width="520" height="88" class="card workflow"/>
  <text x="390" y="192" class="label">HVE Cloud Agent Orchestrator Dispatcher</text>
  <text x="390" y="216" class="body">`auto-orchestrator-dispatcher.yml`</text>
  <text x="390" y="236" class="small">Issue ラベルから対象 Workflow を選択して reusable workflow に振り分け</text>

  <rect x="372" y="278" width="520" height="114" class="card workflow"/>
  <text x="390" y="306" class="label">Workflow registry（11 ID）</text>
  <text x="390" y="330" class="body">`ard`, `aas`, `aad-web`, `asdw-web`, `abd`, `abdv`</text>
  <text x="390" y="352" class="body">`aag`, `aagd`, `akm`, `aqod`, `adoc`</text>
  <text x="390" y="374" class="small">`aad` / `asdw` は後方互換エイリアス</text>

  <rect x="372" y="420" width="250" height="104" class="card store"/>
  <text x="390" y="448" class="label">AQOD → AKM</text>
  <text x="390" y="472" class="body">`original-docs/` と `qa/` を循環参照</text>
  <text x="390" y="494" class="small">質問票生成 → 回答統合 → knowledge 更新</text>

  <rect x="642" y="420" width="250" height="104" class="card store"/>
  <text x="660" y="448" class="label">knowledge/</text>
  <text x="660" y="472" class="body">D01〜D21 業務要件ドキュメント</text>
  <text x="660" y="494" class="small">設計・実装 Agent の共通コンテキスト</text>

  <rect x="372" y="552" width="520" height="222" class="card agent"/>
  <text x="390" y="580" class="label">Custom Agent 群</text>
  <text x="390" y="604" class="body">`Arch-*`: 分析・設計</text>
  <text x="390" y="626" class="body">`Dev-*`: 実装・デプロイ</text>
  <text x="390" y="648" class="body">`Doc-*`: 技術文書生成</text>
  <text x="390" y="670" class="body">`QA-*`: 品質確認・レビュー</text>
  <text x="390" y="692" class="body">`KnowledgeManager`, `E2ETesting-Playwright`</text>
  <text x="390" y="720" class="small">Workflow / Step ごとに `.github/agents/*.agent.md` を割り当て</text>
  <text x="390" y="742" class="small">同じ Agent 定義を Web 実行と CLI 実行で共有</text>

  <rect x="940" y="104" width="316" height="700" class="panel"/>
  <text x="960" y="134" class="label">3. 成果物 / 出力先</text>

  <rect x="960" y="170" width="276" height="84" class="card output"/>
  <text x="978" y="198" class="label">docs/</text>
  <text x="978" y="222" class="body">設計ドキュメント</text>

  <rect x="960" y="272" width="276" height="84" class="card output"/>
  <text x="978" y="300" class="label">src/ / test/</text>
  <text x="978" y="324" class="body">アプリ実装・テスト</text>

  <rect x="960" y="374" width="276" height="84" class="card output"/>
  <text x="978" y="402" class="label">knowledge/ / qa/</text>
  <text x="978" y="426" class="body">要件知識・質問票</text>

  <rect x="960" y="476" width="276" height="84" class="card output"/>
  <text x="978" y="504" class="label">docs-generated/</text>
  <text x="978" y="528" class="body">ソースコード由来の技術文書</text>

  <rect x="960" y="578" width="276" height="84" class="card output"/>
  <text x="978" y="606" class="label">Azure / infra/</text>
  <text x="978" y="630" class="body">デプロイ・リソース定義</text>

  <rect x="960" y="680" width="276" height="84" class="card output"/>
  <text x="978" y="708" class="label">Issue / PR / レビュー</text>
  <text x="978" y="732" class="body">GitHub 上の進捗管理とマージ</text>

  <circle cx="52" cy="150" r="14" class="order"/>
  <text x="47" y="155" fill="#ffffff" font-size="12" font-weight="700">1</text>
  <circle cx="380" cy="150" r="14" class="order"/>
  <text x="375" y="155" fill="#ffffff" font-size="12" font-weight="700">2</text>
  <circle cx="948" cy="150" r="14" class="order"/>
  <text x="943" y="155" fill="#ffffff" font-size="12" font-weight="700">3</text>

  <path d="M 304 208 C 330 208, 340 208, 372 208" class="arrow"/>
  <path d="M 304 324 C 330 324, 340 324, 372 324" class="arrow"/>
  <path d="M 304 438 C 334 438, 340 462, 372 462" class="arrow"/>
  <path d="M 304 550 C 336 550, 340 476, 372 476" class="arrow"/>
  <path d="M 622 472 C 632 472, 634 472, 642 472" class="arrow"/>
  <path d="M 892 334 C 926 334, 934 212, 960 212" class="arrow"/>
  <path d="M 892 334 C 926 334, 934 314, 960 314" class="arrow"/>
  <path d="M 892 334 C 926 334, 934 416, 960 416" class="arrow"/>
  <path d="M 892 334 C 926 334, 934 518, 960 518" class="arrow"/>
  <path d="M 892 334 C 926 334, 934 620, 960 620" class="arrow"/>
  <path d="M 892 334 C 926 334, 934 722, 960 722" class="arrow"/>
  <path d="M 768 524 C 768 540, 768 540, 768 552" class="arrow-dash"/>

  <rect x="24" y="830" width="1232" height="106" class="legend"/>
  <text x="42" y="858" class="label">凡例</text>
  <rect x="110" y="844" width="18" height="18" class="card entry"/><text x="136" y="858" class="body">入口 / 実行開始点</text>
  <rect x="296" y="844" width="18" height="18" class="card workflow"/><text x="322" y="858" class="body">Workflow / Dispatcher</text>
  <rect x="518" y="844" width="18" height="18" class="card store"/><text x="544" y="858" class="body">共有ストア / 入力データ</text>
  <rect x="756" y="844" width="18" height="18" class="card agent"/><text x="782" y="858" class="body">Custom Agent</text>
  <rect x="932" y="844" width="18" height="18" class="card output"/><text x="958" y="858" class="body">成果物</text>
  <line x1="110" y1="894" x2="170" y2="894" class="arrow"/><text x="180" y="899" class="body">主経路（入口 → Workflow → 出力）</text>
  <line x1="540" y1="894" x2="600" y2="894" class="arrow-dash"/><text x="610" y="899" class="body">反復 / 参照（AQOD・AKM・knowledge 連携）</text>
  <text x="1010" y="899" class="body">読み順: ①入口 → ②オーケストレーション → ③成果物</text>
</svg>
