<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 940" role="img" aria-labelledby="title desc">
  <title id="title">Orchestration Workflow File I/O Map</title>
  <desc id="desc">8つのワークフローと主要ディレクトリのRead/Write関係を示すスイムレーン図</desc>
  <style>
    text { font-family: system-ui, -apple-system, Segoe UI, sans-serif; fill: #1f2937; }
    .h1 { font-size: 24px; font-weight: 700; }
    .h2 { font-size: 13px; font-weight: 700; }
    .label { font-size: 12px; }
    .dir { font-size: 13px; font-weight: 600; }
    .grid { stroke: #cbd5e1; stroke-width: 1; fill: none; }
    .lane { stroke: #94a3b8; stroke-width: 1.2; fill: #f8fafc; }
    .file { fill: #95A5A6; }
    .arch { fill: #4A90D9; }
    .dev { fill: #50C878; }
    .doc { fill: #9B59B6; }
    .qa { fill: #E67E22; }
    .km { fill: #F39C12; }
    .markR { fill: #1d4ed8; font-size: 15px; font-weight: 700; }
    .markW { fill: #15803d; font-size: 15px; font-weight: 700; }
  </style>

  <rect x="0" y="0" width="1760" height="940" fill="transparent"/>
  <text x="36" y="42" class="h1">Workflow × File I/O（Read/Write）</text>

  <g transform="translate(36,68)">
    <line x1="0" y1="8" x2="64" y2="8" stroke="#1d4ed8" stroke-width="3" stroke-dasharray="8 6"/>
    <polygon points="64,8 54,2 54,14" fill="none" stroke="#1d4ed8" stroke-width="2"/>
    <text x="74" y="13" class="label">Read（青・破線・中抜き矢印）</text>
    <line x1="360" y1="8" x2="424" y2="8" stroke="#15803d" stroke-width="3"/>
    <polygon points="424,8 414,2 414,14" fill="#15803d"/>
    <text x="434" y="13" class="label">Write（緑・実線・塗り矢印）</text>
  </g>

  <g transform="translate(30,110)">
    <rect x="0" y="0" width="250" height="62" class="file" rx="6"/>
    <text x="20" y="36" class="h2">Directory</text>

    <rect x="250" y="0" width="180" height="62" class="km" rx="6"/>
    <text x="322" y="28" class="h2">AKM</text><text x="300" y="46" class="label">KnowledgeManager</text>

    <rect x="430" y="0" width="180" height="62" class="qa" rx="6"/>
    <text x="500" y="28" class="h2">AQOD</text><text x="480" y="46" class="label">QA-DocConsistency</text>

    <rect x="610" y="0" width="180" height="62" class="doc" rx="6"/>
    <text x="682" y="28" class="h2">ADOC</text><text x="655" y="46" class="label">Doc-* Agents</text>

    <rect x="790" y="0" width="180" height="62" class="arch" rx="6"/>
    <text x="864" y="28" class="h2">AAS</text><text x="840" y="46" class="label">Arch-*</text>

    <rect x="970" y="0" width="180" height="62" class="arch" rx="6"/>
    <text x="1042" y="28" class="h2">AAD</text><text x="1020" y="46" class="label">Arch-*</text>

    <rect x="1150" y="0" width="180" height="62" class="arch" rx="6"/>
    <text x="1222" y="28" class="h2">ABD</text><text x="1200" y="46" class="label">Arch-Batch-*</text>

    <rect x="1330" y="0" width="180" height="62" class="dev" rx="6"/>
    <text x="1400" y="28" class="h2">ASDW</text><text x="1383" y="46" class="label">Dev-Microservice-*</text>

    <rect x="1510" y="0" width="180" height="62" class="dev" rx="6"/>
    <text x="1584" y="28" class="h2">ABDV</text><text x="1572" y="46" class="label">Dev-Batch-*</text>

    <rect x="0" y="62" width="1690" height="684" class="lane"/>

    <!-- Grid rows -->
    <g class="grid">
      <line x1="0" y1="138" x2="1690" y2="138"/>
      <line x1="0" y1="214" x2="1690" y2="214"/>
      <line x1="0" y1="290" x2="1690" y2="290"/>
      <line x1="0" y1="366" x2="1690" y2="366"/>
      <line x1="0" y1="442" x2="1690" y2="442"/>
      <line x1="0" y1="518" x2="1690" y2="518"/>
      <line x1="0" y1="594" x2="1690" y2="594"/>
      <line x1="0" y1="670" x2="1690" y2="670"/>
      <line x1="250" y1="62" x2="250" y2="746"/>
      <line x1="430" y1="62" x2="430" y2="746"/>
      <line x1="610" y1="62" x2="610" y2="746"/>
      <line x1="790" y1="62" x2="790" y2="746"/>
      <line x1="970" y1="62" x2="970" y2="746"/>
      <line x1="1150" y1="62" x2="1150" y2="746"/>
      <line x1="1330" y1="62" x2="1330" y2="746"/>
      <line x1="1510" y1="62" x2="1510" y2="746"/>
    </g>

    <!-- Directory labels -->
    <text x="16" y="106" class="dir">original-docs/</text>
    <text x="16" y="182" class="dir">qa/</text>
    <text x="16" y="258" class="dir">knowledge/</text>
    <text x="16" y="334" class="dir">src/</text>
    <text x="16" y="410" class="dir">docs/catalog/</text>
    <text x="16" y="486" class="dir">docs/batch/</text>
    <text x="16" y="562" class="dir">docs-generated/</text>
    <text x="16" y="638" class="dir">test/</text>
    <text x="16" y="714" class="dir">infra/</text>

    <!-- Marks: AKM -->
    <text x="320" y="106" class="markR">R◁</text>
    <text x="320" y="182" class="markR">R◁</text>
    <text x="320" y="258" class="markW">W▶</text>

    <!-- AQOD -->
    <text x="500" y="106" class="markR">R◁</text>
    <text x="500" y="182" class="markW">W▶</text>

    <!-- ADOC -->
    <text x="680" y="258" class="markR">R◁</text>
    <text x="680" y="334" class="markR">R◁</text>
    <text x="680" y="562" class="markW">W▶</text>

    <!-- AAS -->
    <text x="860" y="258" class="markR">R◁</text>
    <text x="860" y="410" class="markW">W▶</text>

    <!-- AAD -->
    <text x="1040" y="258" class="markR">R◁</text>
    <text x="1040" y="410" class="markR">R◁ / W▶</text>

    <!-- ABD -->
    <text x="1220" y="258" class="markR">R◁</text>
    <text x="1220" y="410" class="markR">R◁</text>
    <text x="1220" y="486" class="markW">W▶</text>

    <!-- ASDW -->
    <text x="1400" y="258" class="markR">R◁</text>
    <text x="1400" y="410" class="markR">R◁</text>
    <text x="1400" y="334" class="markW">W▶</text>
    <text x="1400" y="638" class="markW">W▶</text>
    <text x="1400" y="714" class="markW">W▶</text>

    <!-- ABDV -->
    <text x="1580" y="258" class="markR">R◁</text>
    <text x="1580" y="486" class="markR">R◁</text>
    <text x="1580" y="334" class="markW">W▶</text>
    <text x="1580" y="638" class="markW">W▶</text>
  </g>
</svg>
