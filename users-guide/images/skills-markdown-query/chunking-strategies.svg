<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" role="img"
     aria-labelledby="t d" font-family="Segoe UI, Hiragino Sans, Meiryo, sans-serif">
  <title id="t">Chunking Strategy 4 種の比較</title>
  <desc id="d">同一 Markdown 入力に対する 4 つの分割方式の出力チャンク境界比較。</desc>

  <defs>
    <style><![CDATA[
      .ttl { font-size: 20px; font-weight: 700; fill: #1A1A1A; }
      .meta { font-size: 11px; fill: #555; }
      .h { font-size: 14px; font-weight: 700; fill: #1A1A1A; }
      .lbl { font-size: 12px; fill: #1A1A1A; }
      .sm  { font-size: 11px; fill: #1A1A1A; }
      .doc { font-family: Consolas, monospace; font-size: 10.5px; fill: #1A1A1A; }
      .b   { fill: white; stroke-width: 1.4; }
      .c-h    { stroke: #006B3C; fill: #E8F5EE; }
      .c-hr   { stroke: #0066CC; fill: #E8F1FB; }
      .c-fw   { stroke: #B85C00; fill: #FBEEDB; }
      .c-sem  { stroke: #6B2C91; fill: #F1EBF5; }
      .doc-bg { fill: #FAFAFA; stroke: #525252; stroke-width: 1; }
      .legend-box { fill: white; stroke: #525252; stroke-width: 1; }
    ]]></style>
  </defs>

  <text x="20" y="28" class="ttl">Chunking Strategy 比較 — 同一入力 → 4 種の境界の違い</text>
  <text x="20" y="46" class="meta">SoT: mdq/strategies.py + mdq/strategies_semantic.py (v0.5.0)  ·  既定値はコード定数を参照。</text>

  <!-- =================== Sample document =================== -->
  <rect x="20" y="60" width="380" height="620" rx="6" class="doc-bg"/>
  <text x="35" y="80" class="h">入力サンプル (sample.md)</text>
  <text x="35" y="98" class="sm" fill="#555">行番号付き。約 1,600 字想定。</text>

  <g transform="translate(35,116)" class="doc">
    <text y="0"  fill="#006B3C">L01: # 製品概要</text>
    <text y="16">L02: 本ページは製品 A の機能と運用…</text>
    <text y="32">L03: 想定読者は管理者と開発者。</text>
    <text y="48" fill="#006B3C">L04: ## 機能 1: 索引</text>
    <text y="64">L05: 索引は SQLite + FTS5 で…</text>
    <text y="80">L06: 物理ファイルは lang × strategy …</text>
    <text y="96">L07: 増分更新は SHA1 と mtime で…</text>
    <text y="112" fill="#006B3C">L08: ### 1.1 走査対象</text>
    <text y="128">L09: 既定 11 ディレクトリを再帰…</text>
    <text y="144" fill="#006B3C">L10: ### 1.2 走査除外</text>
    <text y="160">L11: .mdq/ と .git/ は除外。</text>
    <text y="176" fill="#006B3C">L12: ## 機能 2: 検索</text>
    <text y="192">L13: 検索は BM25 既定…</text>
    <text y="208">L14: 短い固有名詞は heading…</text>
    <text y="224">L15: 物語的質問は semantic…</text>
    <text y="240" fill="#006B3C">L16: ## 機能 3: 監視</text>
    <text y="256">L17: watchdog があれば自動再索引。</text>
    <text y="272">L18: debounce 500ms / burst 100…</text>
    <text y="288" fill="#006B3C">L19: ## 運用と FAQ</text>
    <text y="304">L20: Q: 索引が壊れた</text>
    <text y="320">L21: A: rm -rf .mdq/ で再構築。</text>
    <text y="336">L22: Q: 大きな PDF を…</text>
    <text y="352">L23: A: 本ツールは Markdown のみ…</text>
    <text y="378" fill="#525252">…(本文継続、合計 ~1,600 字)…</text>

    <text y="410" fill="#B85C00">凡例:</text>
    <text y="426" fill="#006B3C">緑 = 見出し行</text>
    <text y="442" fill="#1A1A1A">黒 = 本文</text>
  </g>

  <!-- =================== heading =================== -->
  <g transform="translate(420,60)">
    <rect x="0" y="0" width="330" height="155" rx="6" class="b c-h"/>
    <text x="12" y="20" class="h" fill="#006B3C">① heading (既定 / legacy)</text>
    <text x="12" y="38" class="sm">境界 = 各見出し開始行。max_chunk_chars 超過時のみ等幅分割。</text>
    <text x="12" y="56" class="sm">overlap なし。`part_index` で同一 heading の連番管理。</text>
    <text x="12" y="78" class="lbl" font-weight="700">出力チャンク:</text>
    <text x="12" y="96" class="sm">▸ C1: # 製品概要 (L01–L03)</text>
    <text x="12" y="112" class="sm">▸ C2: ## 機能 1: 索引 (L04–L07)</text>
    <text x="12" y="128" class="sm">▸ C3: ### 1.1 走査対象 (L08–L09) / ▸ C4: ### 1.2 (L10–L11)</text>
    <text x="12" y="144" class="sm">▸ C5: ## 機能 2 (L12–L15) / ▸ C6: ## 機能 3 / ▸ C7: ## 運用…</text>
  </g>

  <!-- =================== heading_recursive =================== -->
  <g transform="translate(760,60)">
    <rect x="0" y="0" width="320" height="155" rx="6" class="b c-hr"/>
    <text x="12" y="20" class="h" fill="#0066CC">② heading_recursive</text>
    <text x="12" y="38" class="sm">max=2,000 字超過時に <tspan font-family="Consolas" fill="#0066CC">_subdivide</tspan> で段落単位再分割。</text>
    <text x="12" y="56" class="sm">overlap_paragraphs=1 (既定) で末尾段落を次チャンク先頭に複製。</text>
    <text x="12" y="78" class="lbl" font-weight="700">出力チャンク:</text>
    <text x="12" y="96" class="sm">▸ C1: # 製品概要 (L01–L03)</text>
    <text x="12" y="112" class="sm">▸ C2a: ## 機能 1 [前半 L04–L06]</text>
    <text x="12" y="128" class="sm">▸ C2b: ## 機能 1 [overlap L06 + L07] (parent=C2a)</text>
    <text x="12" y="144" class="sm">▸ C3, C4, … 以降は heading と同様</text>
  </g>

  <!-- =================== fixed_window =================== -->
  <g transform="translate(420,235)">
    <rect x="0" y="0" width="330" height="170" rx="6" class="b c-fw"/>
    <text x="12" y="20" class="h" fill="#B85C00">③ fixed_window</text>
    <text x="12" y="38" class="sm">window=1,000 字 / overlap=200 字。見出しは無視 (フラット分割)。</text>
    <text x="12" y="56" class="sm">heading_path は分割位置直前の最寄り見出しを継承。</text>
    <text x="12" y="78" class="lbl" font-weight="700">出力チャンク:</text>
    <text x="12" y="96" class="sm">▸ W1: 0–1,000 字 (L01 〜 L13 途中)</text>
    <text x="12" y="112" class="sm">▸ W2: 800–1,800 字 (L11 〜 L21 / 200 字 overlap)</text>
    <text x="12" y="128" class="sm">▸ … 以降スライディングウィンドウで継続</text>
    <text x="12" y="152" class="sm" font-style="italic" fill="#8B0000">用途: コード断片や ID 検索で見出し情報が当てにならない時。</text>
  </g>

  <!-- =================== semantic_paragraph =================== -->
  <g transform="translate(760,235)">
    <rect x="0" y="0" width="320" height="170" rx="6" class="b c-sem"/>
    <text x="12" y="20" class="h" fill="#6B2C91">④ semantic_paragraph (任意拡張 [semantic])</text>
    <text x="12" y="38" class="sm">Kamradt 二分探索 (percentile 50–99) で意味境界自動推定。</text>
    <text x="12" y="56" class="sm">min=200 / max=1,000 字。見出しは hard boundary として尊重。</text>
    <text x="12" y="78" class="lbl" font-weight="700">出力チャンク:</text>
    <text x="12" y="96" class="sm">▸ S1: 製品概要 + 機能 1 導入 (L01–L05 / 意味的に近接)</text>
    <text x="12" y="112" class="sm">▸ S2: 索引内部 (L06–L11 / SHA1+走査範囲)</text>
    <text x="12" y="128" class="sm">▸ S3: 検索 (L12–L15) / ▸ S4: 監視 (L16–L18)</text>
    <text x="12" y="144" class="sm">▸ S5: FAQ (L19–L23)</text>
    <text x="12" y="160" class="sm" font-style="italic" fill="#8B0000">埋め込み: fastembed BAAI/bge-m3 (既定) → chunks.chunk_embedding 列。</text>
  </g>

  <!-- =================== Selection guide =================== -->
  <g transform="translate(420,420)">
    <rect x="0" y="0" width="660" height="180" rx="6" class="legend-box"/>
    <text x="12" y="22" class="h">選定ガイド (query_router.py の判定と整合)</text>

    <text x="12" y="46" class="lbl" font-weight="700" fill="#006B3C">heading</text>
    <text x="100" y="46" class="sm">→ ID 検索 / 引用 (Rule 1, 2) / 短い固有名詞 (Rule 3) / 概要語 (Rule 4)</text>

    <text x="12" y="68" class="lbl" font-weight="700" fill="#0066CC">heading_recursive</text>
    <text x="160" y="68" class="sm">→ 既定 (Rule 7) / 長い見出しを過大チャンク化させたくない場合</text>

    <text x="12" y="90" class="lbl" font-weight="700" fill="#B85C00">fixed_window</text>
    <text x="160" y="90" class="sm">→ コード断片 (Rule 6) / 見出しが疎な議事録・ログ</text>

    <text x="12" y="112" class="lbl" font-weight="700" fill="#6B2C91">semantic_paragraph</text>
    <text x="160" y="112" class="sm">→ 物語的質問 (Rule 5) / 概念検索。`[semantic]` extra 必須。</text>

    <text x="12" y="140" class="sm" font-style="italic">補足: 索引は <tspan font-family="Consolas">.mdq/index-&lt;lang&gt;-&lt;strategy&gt;.sqlite</tspan> として strategy ごとに別ファイル。</text>
    <text x="12" y="158" class="sm" font-style="italic">利用予定の strategy だけ事前に <tspan font-family="Consolas">python -m mdq index --strategy …</tspan> で索引化すれば良い。</text>
  </g>

  <!-- =================== Legend (palette) =================== -->
  <g transform="translate(420,610)">
    <rect x="0" y="0" width="660" height="70" rx="6" class="legend-box"/>
    <text x="12" y="22" class="h">配色 (WCAG AA, 対背景白 ≥ 4.5:1)</text>
    <g transform="translate(12,32)">
      <rect x="0" y="6" width="14" height="14" class="b c-h"/>
      <text x="20" y="18" class="sm">heading (#006B3C)</text>
      <rect x="170" y="6" width="14" height="14" class="b c-hr"/>
      <text x="190" y="18" class="sm">heading_recursive (#0066CC)</text>
      <rect x="370" y="6" width="14" height="14" class="b c-fw"/>
      <text x="390" y="18" class="sm">fixed_window (#B85C00)</text>
      <g transform="translate(0,22)">
        <rect x="0" y="6" width="14" height="14" class="b c-sem"/>
        <text x="20" y="18" class="sm">semantic_paragraph (#6B2C91)</text>
      </g>
    </g>
  </g>
</svg>
