<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 390" role="img" aria-label="AAS 8ステップチェーン図">
  <desc>AAS（App Architecture Design）: 8ステップ直列チェーン。Step.1 Arch-ApplicationAnalytics → Step.2 Arch-ArchitectureCandidateAnalyzer → Step.3.1 Arch-Microservice-DomainAnalytics → Step.3.2 Arch-Microservice-ServiceIdentify → Step.4 Arch-DataModeling → Step.5 Arch-DataCatalog → Step.6 Arch-Microservice-ServiceCatalog → Step.7 Arch-TDD-TestStrategy</desc>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: "Segoe UI", "Noto Sans JP", Arial, sans-serif; }
    .box { fill: #4A90D9; stroke: #1f3a5a; stroke-width: 1.5; }
    .bt { fill: white; font-weight: bold; font-size: 10px; }
    .bs { fill: white; font-size: 9px; }
    .ln { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .out { fill: #E8A838; stroke: #8B5A00; stroke-width: 1.5; }
    .ttl { font-size: 15px; font-weight: bold; fill: #1f3a5a; }
  </style>
  <text x="450" y="28" text-anchor="middle" class="ttl">AAS — App Architecture Design（8ステップ直列）</text>
  <!-- Row 1: Steps 1,2,3.1,3.2 -->
  <rect x="20" y="50" width="110" height="58" rx="5" class="box"/>
  <text x="75" y="69" text-anchor="middle" class="bt">Step.1</text>
  <text x="75" y="82" text-anchor="middle" class="bs">Arch-Application</text>
  <text x="75" y="95" text-anchor="middle" class="bs">Analytics</text>
  <line x1="130" y1="79" x2="153" y2="79" class="ln"/>
  <rect x="153" y="50" width="120" height="58" rx="5" class="box"/>
  <text x="213" y="69" text-anchor="middle" class="bt">Step.2</text>
  <text x="213" y="82" text-anchor="middle" class="bs">Arch-Architecture</text>
  <text x="213" y="95" text-anchor="middle" class="bs">CandidateAnalyzer</text>
  <line x1="273" y1="79" x2="296" y2="79" class="ln"/>
  <rect x="296" y="50" width="120" height="58" rx="5" class="box"/>
  <text x="356" y="69" text-anchor="middle" class="bt">Step.3.1</text>
  <text x="356" y="82" text-anchor="middle" class="bs">Arch-Microservice</text>
  <text x="356" y="95" text-anchor="middle" class="bs">DomainAnalytics</text>
  <line x1="416" y1="79" x2="439" y2="79" class="ln"/>
  <rect x="439" y="50" width="120" height="58" rx="5" class="box"/>
  <text x="499" y="69" text-anchor="middle" class="bt">Step.3.2</text>
  <text x="499" y="82" text-anchor="middle" class="bs">Arch-Microservice</text>
  <text x="499" y="95" text-anchor="middle" class="bs">ServiceIdentify</text>
  <!-- Connector row 1 to row 2 -->
  <polyline points="559,79 590,79 590,167 75,167 75,180" class="ln"/>
  <!-- Row 2: Steps 4,5,6,7 -->
  <rect x="20" y="180" width="110" height="58" rx="5" class="box"/>
  <text x="75" y="199" text-anchor="middle" class="bt">Step.4</text>
  <text x="75" y="212" text-anchor="middle" class="bs">Arch-Data</text>
  <text x="75" y="225" text-anchor="middle" class="bs">Modeling</text>
  <line x1="130" y1="209" x2="153" y2="209" class="ln"/>
  <rect x="153" y="180" width="110" height="58" rx="5" class="box"/>
  <text x="208" y="199" text-anchor="middle" class="bt">Step.5</text>
  <text x="208" y="212" text-anchor="middle" class="bs">Arch-Data</text>
  <text x="208" y="225" text-anchor="middle" class="bs">Catalog</text>
  <line x1="263" y1="209" x2="286" y2="209" class="ln"/>
  <rect x="286" y="180" width="120" height="58" rx="5" class="box"/>
  <text x="346" y="199" text-anchor="middle" class="bt">Step.6</text>
  <text x="346" y="212" text-anchor="middle" class="bs">Arch-Microservice</text>
  <text x="346" y="225" text-anchor="middle" class="bs">ServiceCatalog</text>
  <line x1="406" y1="209" x2="429" y2="209" class="ln"/>
  <rect x="429" y="180" width="110" height="58" rx="5" class="box"/>
  <text x="484" y="199" text-anchor="middle" class="bt">Step.7</text>
  <text x="484" y="212" text-anchor="middle" class="bs">Arch-TDD</text>
  <text x="484" y="225" text-anchor="middle" class="bs">TestStrategy</text>
  <!-- Output -->
  <line x1="539" y1="209" x2="562" y2="209" class="ln"/>
  <rect x="562" y="180" width="140" height="58" rx="5" class="out"/>
  <text x="632" y="199" text-anchor="middle" class="bt" style="fill:white;">成果物</text>
  <text x="632" y="212" text-anchor="middle" class="bs" style="fill:white;">docs/catalog/</text>
  <text x="632" y="225" text-anchor="middle" class="bs" style="fill:white;">test-strategy.md</text>
  <!-- Legend -->
  <rect x="20" y="280" width="16" height="16" rx="3" class="box"/>
  <text x="42" y="293" style="font-size:11px;fill:#333;">Custom Agent</text>
  <rect x="160" y="280" width="16" height="16" rx="3" class="out"/>
  <text x="182" y="293" style="font-size:11px;fill:#333;">成果物（出力）</text>
  <!-- Step labels -->
  <text x="20" y="325" style="font-size:10px;fill:#555;">Step.1: アプリリスト  Step.2: アーキテクチャ推薦  Step.3.1: ドメイン分析  Step.3.2: サービス一覧</text>
  <text x="20" y="342" style="font-size:10px;fill:#555;">Step.4: データモデル  Step.5: データカタログ  Step.6: サービスカタログ  Step.7: テスト戦略書</text>
</svg>
