<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" role="img" aria-label="AAS ステップ別ファイル I/O 図">
  <desc>AAS（Architecture Design）: 各 StepDef が消費・生成するファイルの I/O 図（workflow_registry.py L204-246 根拠）</desc>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: "Segoe UI", "Noto Sans JP", Arial, sans-serif; }
    .step { fill: #4A90D9; stroke: #1a4d80; stroke-width: 1.5; }
    .in   { fill: #EAF4FB; stroke: #7a9ab5; stroke-width: 1; }
    .out  { fill: #FEF9E7; stroke: #c8a600; stroke-width: 1; }
    .ln   { stroke: #555; stroke-width: 1.3; fill: none; marker-end: url(#arr); }
    .wt   { fill: white; font-weight: bold; font-size: 10px; }
    .ws   { fill: white; font-size: 9px; }
    .it   { fill: #334; font-size: 8.5px; }
    .ttl  { font-size: 15px; font-weight: bold; fill: #1f3a5a; }
    .sub  { font-size: 10px; fill: #555; }
  </style>

  <text x="400" y="26" text-anchor="middle" class="ttl">AAS — ステップ別ファイル I/O 図</text>
  <text x="400" y="42" text-anchor="middle" class="sub">根拠: hve/workflow_registry.py AAS WorkflowDef (L204-246)</text>

  <!-- Step 1 -->
  <rect x="275" y="58" width="250" height="44" rx="7" class="step"/>
  <text x="400" y="76" text-anchor="middle" class="wt">Step.1 — アプリケーションリストの作成</text>
  <text x="400" y="91" text-anchor="middle" class="ws">Arch-ApplicationAnalytics</text>
  <rect x="30" y="56" width="215" height="48" rx="5" class="in"/>
  <text x="137" y="72" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">入力</text>
  <text x="137" y="85" text-anchor="middle" class="it">knowledge/ D01〜D21（ユースケース等）</text>
  <text x="137" y="98" text-anchor="middle" class="it">original-docs/</text>
  <line x1="245" y1="80" x2="275" y2="80" class="ln"/>
  <rect x="555" y="56" width="215" height="34" rx="5" class="out"/>
  <text x="662" y="72" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">出力</text>
  <text x="662" y="85" text-anchor="middle" class="it">docs/catalog/app-catalog.md</text>
  <line x1="525" y1="80" x2="555" y2="80" class="ln"/>

  <line x1="400" y1="102" x2="400" y2="122" class="ln"/>

  <!-- Step 2 -->
  <rect x="275" y="122" width="250" height="44" rx="7" class="step"/>
  <text x="400" y="140" text-anchor="middle" class="wt">Step.2 — ソフトウェアアーキテクチャの推薦</text>
  <text x="400" y="155" text-anchor="middle" class="ws">Arch-ArchitectureCandidateAnalyzer</text>
  <rect x="30" y="120" width="215" height="34" rx="5" class="in"/>
  <text x="137" y="136" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">入力</text>
  <text x="137" y="149" text-anchor="middle" class="it">docs/catalog/app-catalog.md</text>
  <line x1="245" y1="144" x2="275" y2="144" class="ln"/>
  <rect x="555" y="120" width="215" height="34" rx="5" class="out"/>
  <text x="662" y="136" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">出力</text>
  <text x="662" y="149" text-anchor="middle" class="it">docs/catalog/app-catalog.md（更新）</text>
