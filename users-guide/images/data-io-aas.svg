  <text x="400" y="219" text-anchor="middle" class="ws">Arch-Microservice-DomainAnalytics</text>
  <rect x="30" y="184" width="215" height="34" rx="5" class="in"/>
  <text x="137" y="200" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">入力</text>
  <text x="137" y="213" text-anchor="middle" class="it">docs/catalog/app-catalog.md</text>
