  <rect x="555" y="184" width="215" height="34" rx="5" class="out"/>
  <text x="662" y="200" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">出力</text>
  <text x="662" y="213" text-anchor="middle" class="it">docs/catalog/domain-analytics.md</text>
  <line x1="525" y1="208" x2="555" y2="208" class="ln"/>

  <line x1="400" y1="230" x2="400" y2="250" class="ln"/>

  <!-- Step 3.2 -->
  <rect x="275" y="250" width="250" height="44" rx="7" class="step"/>
  <text x="400" y="268" text-anchor="middle" class="wt">Step.3.2 — サービス一覧抽出</text>
  <text x="400" y="283" text-anchor="middle" class="ws">Arch-Microservice-ServiceIdentify</text>
  <rect x="30" y="248" width="215" height="34" rx="5" class="in"/>
  <text x="137" y="264" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">入力</text>
  <text x="137" y="277" text-anchor="middle" class="it">docs/catalog/domain-analytics.md</text>
  <line x1="245" y1="272" x2="275" y2="272" class="ln"/>
  <rect x="555" y="248" width="215" height="34" rx="5" class="out"/>
  <text x="662" y="264" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">出力</text>
  <text x="662" y="277" text-anchor="middle" class="it">docs/catalog/service-catalog-matrix.md</text>
  <line x1="525" y1="272" x2="555" y2="272" class="ln"/>

  <line x1="400" y1="294" x2="400" y2="314" class="ln"/>

  <!-- Step 4 -->
  <rect x="275" y="314" width="250" height="44" rx="7" class="step"/>
  <text x="400" y="332" text-anchor="middle" class="wt">Step.4 — データモデル</text>
  <text x="400" y="347" text-anchor="middle" class="ws">Arch-DataModeling</text>
  <rect x="30" y="312" width="215" height="34" rx="5" class="in"/>
  <text x="137" y="328" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">入力</text>
  <text x="137" y="341" text-anchor="middle" class="it">docs/catalog/service-catalog-matrix.md</text>
  <line x1="245" y1="336" x2="275" y2="336" class="ln"/>
  <rect x="555" y="312" width="215" height="34" rx="5" class="out"/>
  <text x="662" y="328" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">出力</text>
  <text x="662" y="341" text-anchor="middle" class="it">docs/catalog/data-model.md</text>
  <line x1="525" y1="336" x2="555" y2="336" class="ln"/>

  <line x1="400" y1="358" x2="400" y2="378" class="ln"/>

  <!-- Step 5 -->
  <rect x="275" y="378" width="250" height="44" rx="7" class="step"/>
  <text x="400" y="396" text-anchor="middle" class="wt">Step.5 — データカタログ作成</text>
  <text x="400" y="411" text-anchor="middle" class="ws">Arch-DataCatalog</text>
  <rect x="555" y="376" width="215" height="34" rx="5" class="out"/>
  <text x="662" y="392" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">出力</text>
  <text x="662" y="405" text-anchor="middle" class="it">docs/catalog/data-catalog.md</text>
  <line x1="525" y1="400" x2="555" y2="400" class="ln"/>

  <line x1="400" y1="422" x2="400" y2="442" class="ln"/>

  <!-- Step 6 -->
  <rect x="275" y="442" width="250" height="44" rx="7" class="step"/>
  <text x="400" y="460" text-anchor="middle" class="wt">Step.6 — サービスカタログ</text>
  <text x="400" y="475" text-anchor="middle" class="ws">Arch-Microservice-ServiceCatalog</text>
  <rect x="555" y="440" width="215" height="34" rx="5" class="out"/>
  <text x="662" y="456" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">出力</text>
  <text x="662" y="469" text-anchor="middle" class="it">docs/catalog/service-catalog.md</text>
  <line x1="525" y1="464" x2="555" y2="464" class="ln"/>

  <line x1="400" y1="486" x2="400" y2="506" class="ln"/>

  <!-- Step 7 -->
  <rect x="275" y="506" width="250" height="44" rx="7" class="step"/>
  <text x="400" y="524" text-anchor="middle" class="wt">Step.7 — テスト戦略書</text>
  <text x="400" y="539" text-anchor="middle" class="ws">Arch-TDD-TestStrategy</text>
  <rect x="555" y="504" width="215" height="34" rx="5" class="out"/>
  <text x="662" y="520" text-anchor="middle" style="font-weight:bold;font-size:9.5px;fill:#334;">出力</text>
  <text x="662" y="533" text-anchor="middle" class="it">docs/catalog/test-strategy.md</text>
  <line x1="525" y1="528" x2="555" y2="528" class="ln"/>

  <!-- Legend -->
  <rect x="30" y="590" width="14" height="14" rx="3" class="step"/>
  <text x="50" y="601" style="font-size:11px;fill:#333;">Arch Agent（設計）</text>
  <rect x="280" y="590" width="14" height="14" rx="3" class="in"/>
  <text x="300" y="601" style="font-size:11px;fill:#333;">入力ファイル</text>
  <rect x="480" y="590" width="14" height="14" rx="3" class="out"/>
  <text x="500" y="601" style="font-size:11px;fill:#333;">出力ファイル</text>
