<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <title>AAG: AI Agent 設計 データフロー</title>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#586069"/>
    </marker>
  </defs>

  <rect width="1200" height="400" fill="#f6f8fa" rx="12"/>

  <text x="600" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#24292e">AAG: AI Agent 設計 データフロー</text>
  <text x="600" y="56" text-anchor="middle" font-size="11" fill="#586069">各 Custom Agent の入出力ファイル</text>

  <text x="175" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#0366d6">入力ファイル</text>
  <text x="565" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#6f42c1">Custom Agent</text>
  <text x="980" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#28a745">成果物</text>

  <!-- Step 1 -->
  <text x="565" y="98" text-anchor="middle" font-size="10" fill="#959da5" font-weight="bold">Step 1（AI Agent アプリケーション定義）</text>
  <rect x="20" y="105" width="310" height="80" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="175" y="123" text-anchor="middle" font-size="10" fill="#24292e">docs/catalog/use-case-catalog.md</text>
  <text x="175" y="138" text-anchor="middle" font-size="10" fill="#24292e">docs/catalog/app-catalog.md</text>
  <text x="175" y="153" text-anchor="middle" font-size="10" fill="#24292e">docs/catalog/service-catalog-matrix.md</text>
  <text x="175" y="168" text-anchor="middle" font-size="10" fill="#24292e">docs/domain-analytics.md</text>
  <text x="175" y="183" text-anchor="middle" font-size="10" fill="#24292e">docs/data-model.md / docs/services/*.md</text>
  <rect x="430" y="120" width="270" height="48" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="565" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#24292e">Arch-AIAgentDesign-Step1</text>
  <text x="565" y="156" text-anchor="middle" font-size="10" fill="#586069">AI Agent アプリケーション定義</text>
  <rect x="800" y="125" width="360" height="38" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="980" y="148" text-anchor="middle" font-size="10" fill="#24292e">docs/agent/agent-application-definition.md</text>
  <line x1="330" y1="145" x2="430" y2="144" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="144" x2="800" y2="144" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <text x="565" y="207" text-anchor="middle" font-size="10" fill="#959da5" font-weight="bold">Step 2（AI Agent 粒度設計）</text>
  <line x1="565" y1="168" x2="565" y2="210" stroke="#e36209" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <rect x="20" y="217" width="310" height="65" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="175" y="235" text-anchor="middle" font-size="10" fill="#24292e">docs/agent/agent-application-definition.md</text>
  <text x="175" y="250" text-anchor="middle" font-size="10" fill="#24292e">docs/catalog/service-catalog-matrix.md</text>
  <text x="175" y="265" text-anchor="middle" font-size="10" fill="#24292e">docs/domain-analytics.md / data-model.md</text>
  <text x="175" y="278" text-anchor="middle" font-size="10" fill="#24292e">docs/catalog/app-catalog.md</text>
  <rect x="430" y="227" width="270" height="48" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="565" y="247" text-anchor="middle" font-size="11" font-weight="bold" fill="#24292e">Arch-AIAgentDesign-Step2</text>
  <text x="565" y="263" text-anchor="middle" font-size="10" fill="#586069">粒度設計＋アーキテクチャ骨格</text>
  <rect x="800" y="234" width="360" height="38" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="980" y="257" text-anchor="middle" font-size="10" fill="#24292e">docs/agent/agent-architecture.md</text>
  <line x1="330" y1="250" x2="430" y2="251" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="251" x2="800" y2="253" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <text x="565" y="304" text-anchor="middle" font-size="10" fill="#959da5" font-weight="bold">Step 3（AI Agent 詳細設計）</text>
  <line x1="565" y1="275" x2="565" y2="307" stroke="#e36209" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <rect x="20" y="314" width="310" height="65" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="175" y="332" text-anchor="middle" font-size="10" fill="#24292e">docs/agent/agent-application-definition.md</text>
  <text x="175" y="347" text-anchor="middle" font-size="10" fill="#24292e">docs/agent/agent-architecture.md</text>
  <text x="175" y="362" text-anchor="middle" font-size="10" fill="#24292e">docs/catalog/service-catalog-matrix.md</text>
  <text x="175" y="375" text-anchor="middle" font-size="10" fill="#24292e">docs/services/*.md / docs/catalog/app-catalog.md</text>
  <rect x="430" y="320" width="270" height="55" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="565" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="#24292e">Arch-AIAgentDesign-Step3</text>
  <text x="565" y="358" text-anchor="middle" font-size="10" fill="#586069">Agent 詳細設計＋Agent カタログ</text>
  <rect x="800" y="320" width="360" height="55" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="980" y="340" text-anchor="middle" font-size="10" fill="#24292e">docs/agent/agent-detail-&lt;Agent-ID&gt;-&lt;Name&gt;.md</text>
  <text x="980" y="358" text-anchor="middle" font-size="10" fill="#24292e">docs/ai-agent-catalog.md</text>
  <line x1="330" y1="347" x2="430" y2="347" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="347" x2="800" y2="347" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
