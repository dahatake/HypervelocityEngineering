<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 820" font-family="system-ui, -apple-system, sans-serif">
  <title>Step.4.2 全体フロー図: 事業分析ドキュメントから knowledge/ 生成までのフロー</title>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#586069"/>
    </marker>
    <marker id="arr-dashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#586069"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="820" fill="#f6f8fa" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#24292e">Step.4.2 全体フロー図</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#586069">事業分析ドキュメントから knowledge/ 生成までのフロー</text>

  <!-- Node A: Step.1 (orange workflow) - top center -->
  <rect x="250" y="80" width="300" height="75" rx="8" fill="#fff8e6" stroke="#e36209" stroke-width="2"/>
  <text x="400" y="106" text-anchor="middle" font-size="12" font-weight="bold" fill="#24292e">Step.1</text>
  <text x="400" y="122" text-anchor="middle" font-size="11" fill="#24292e">事業分析ドキュメント作成</text>
  <text x="400" y="138" text-anchor="middle" font-size="10" fill="#586069">(M365 Copilot 等)</text>

  <!-- Node B: Step.2 (gray manual) - left center -->
  <rect x="60" y="240" width="280" height="75" rx="8" fill="#f1f1f1" stroke="#959da5" stroke-width="2"/>
  <text x="200" y="266" text-anchor="middle" font-size="12" font-weight="bold" fill="#24292e">Step.2</text>
  <text x="200" y="282" text-anchor="middle" font-size="11" fill="#24292e">D01-D21 充足判定</text>
  <text x="200" y="298" text-anchor="middle" font-size="10" fill="#586069">(手動 Prompt)</text>

  <!-- Arrow A→B (diagonal) -->
  <line x1="330" y1="155" x2="255" y2="240" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node C: Step.4 (orange workflow) - center -->
  <rect x="250" y="400" width="300" height="75" rx="8" fill="#fff8e6" stroke="#e36209" stroke-width="2"/>
  <text x="400" y="426" text-anchor="middle" font-size="12" font-weight="bold" fill="#24292e">Step.4</text>
  <text x="400" y="442" text-anchor="middle" font-size="11" fill="#24292e">qa/ 質問票の作成</text>
  <text x="400" y="458" text-anchor="middle" font-size="10" fill="#586069">(auto-qa / Issue / VS Code)</text>

  <!-- Arrow B→C (diagonal) -->
  <line x1="255" y1="315" x2="330" y2="400" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow A→C (dashed, goes right side) -->
  <path d="M 520 155 Q 620 280 520 400" stroke="#586069" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arr-dashed)"/>
  <text x="625" y="270" text-anchor="middle" font-size="9" fill="#586069">直接</text>
  <text x="625" y="282" text-anchor="middle" font-size="9" fill="#586069">接続可</text>

  <!-- Arrow A→C direct line label -->

  <!-- Node D: User action (blue input) -->
  <rect x="250" y="545" width="300" height="60" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="2"/>
  <text x="400" y="571" text-anchor="middle" font-size="12" font-weight="bold" fill="#24292e">ユーザーが質問に回答</text>
  <text x="400" y="589" text-anchor="middle" font-size="10" fill="#586069">（手動操作）</text>

  <!-- Arrow C→D -->
  <line x1="400" y1="475" x2="400" y2="545" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node E: KnowledgeManager (purple agent) -->
  <rect x="200" y="670" width="400" height="65" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="400" y="695" text-anchor="middle" font-size="12" font-weight="bold" fill="#24292e">KnowledgeManager</text>
  <text x="400" y="713" text-anchor="middle" font-size="11" fill="#24292e">D01-D21 分類・ステータス生成</text>

  <!-- Arrow D→E -->
  <line x1="400" y1="605" x2="400" y2="670" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node F: Output (green) - removed, will place below E but we're running low -->
  <!-- Actually, let me restructure: F should be at y~755 -->
  <!-- Node F: Output artifact (green) -->
  <rect x="200" y="755" width="400" height="50" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="400" y="777" text-anchor="middle" font-size="11" font-weight="bold" fill="#24292e">カバレッジギャップの特定</text>
  <text x="400" y="793" text-anchor="middle" font-size="10" fill="#586069">不足ドキュメント作成</text>

  <!-- Arrow E→F -->
  <line x1="400" y1="735" x2="400" y2="755" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Legend box -->
  <rect x="560" y="640" width="210" height="155" rx="8" fill="white" stroke="#d1d5da" stroke-width="1.5"/>
  <text x="665" y="660" text-anchor="middle" font-size="11" font-weight="bold" fill="#24292e">凡例</text>
  <rect x="575" y="670" width="16" height="14" rx="3" fill="#fff8e6" stroke="#e36209" stroke-width="1.5"/>
  <text x="598" y="681" font-size="10" fill="#24292e">ワークフロー / プロセス</text>
  <rect x="575" y="694" width="16" height="14" rx="3" fill="#f1f1f1" stroke="#959da5" stroke-width="1.5"/>
  <text x="598" y="705" font-size="10" fill="#24292e">手動操作</text>
  <rect x="575" y="718" width="16" height="14" rx="3" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="598" y="729" font-size="10" fill="#24292e">入力 / ユーザー操作</text>
  <rect x="575" y="742" width="16" height="14" rx="3" fill="#e8d5f5" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="598" y="753" font-size="10" fill="#24292e">Custom Agent</text>
  <rect x="575" y="766" width="16" height="14" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="598" y="777" font-size="10" fill="#24292e">成果物 / 出力</text>
</svg>
