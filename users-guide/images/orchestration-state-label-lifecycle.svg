<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Orchestration State Label Lifecycle</title>
  <desc id="desc">各オーケストレーションで共通利用される state label の遷移。initialized から ready、running、done へ進み、必要に応じて blocked に遷移する。</desc>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 14px; fill: #334155; }
    .node { stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
    .init { fill: #e0f2fe; }
    .ready { fill: #dcfce7; }
    .running { fill: #fef9c3; }
    .done { fill: #ede9fe; }
    .blocked { fill: #fee2e2; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 13px; fill: #475569; }
    .arrow { stroke: #1d4ed8; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .warn { stroke: #dc2626; stroke-width: 3; fill: none; marker-end: url(#arrowWarn); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowWarn" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="24" y="42" class="title">State Label Lifecycle（aas/aad/asdw/abd/abdv/akm/aqod/adoc 共通）</text>
  <text x="24" y="70" class="subtitle">workflow_registry.py の state_labels と各 auto-*.yml の状態遷移ロジックに対応</text>

  <rect x="50" y="150" width="190" height="88" class="node init"/>
  <text x="75" y="188" class="label">:initialized</text>
  <text x="75" y="212" class="small">bootstrap 済み</text>

  <rect x="300" y="150" width="170" height="88" class="node ready"/>
  <text x="340" y="188" class="label">:ready</text>
  <text x="324" y="212" class="small">依存解決済み</text>

  <rect x="530" y="150" width="180" height="88" class="node running"/>
  <text x="562" y="188" class="label">:running</text>
  <text x="562" y="212" class="small">Copilot 実行中</text>

  <rect x="770" y="150" width="150" height="88" class="node done"/>
  <text x="812" y="188" class="label">:done</text>
  <text x="798" y="212" class="small">完了トリガー</text>

  <rect x="980" y="275" width="160" height="88" class="node blocked"/>
  <text x="1008" y="313" class="label">:blocked</text>
  <text x="1004" y="337" class="small">要手動対処</text>

  <path d="M240 194 L300 194" class="arrow"/>
  <path d="M470 194 L530 194" class="arrow"/>
  <path d="M710 194 L770 194" class="arrow"/>
  <path d="M620 238 C760 320, 900 320, 980 319" class="warn"/>

  <text x="560" y="112" class="small">正常系</text>
  <text x="760" y="288" class="small">依存未解決・試行上限超過など</text>
</svg>
