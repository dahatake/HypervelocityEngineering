<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 980" role="img" aria-label="ASDW-WEB ステップ別ファイル I/O 図">
  <desc>ASDW-WEB（Web App Dev and Deploy）: 各 StepDef が消費・生成するファイルの I/O 図（workflow_registry.py L275-354 根拠）</desc>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: "Segoe UI", "Noto Sans JP", Arial, sans-serif; }
    .s-data { fill: #2471A3; stroke: #154360; stroke-width: 1.5; }
    .s-svc  { fill: #1E8449; stroke: #0b3a20; stroke-width: 1.5; }
    .s-ui   { fill: #7D3C98; stroke: #4a235a; stroke-width: 1.5; }
    .s-qa   { fill: #E67E22; stroke: #7e3d00; stroke-width: 1.5; }
    .in     { fill: #EAF4FB; stroke: #7a9ab5; stroke-width: 1; }
    .out    { fill: #FEF9E7; stroke: #c8a600; stroke-width: 1; }
    .cont   { fill: #F4F6F7; stroke: #a0aab4; stroke-width: 1; stroke-dasharray: 4 3; }
    .ln     { stroke: #555; stroke-width: 1.3; fill: none; marker-end: url(#arr); }
    .wt     { fill: white; font-weight: bold; font-size: 9.5px; }
    .ws     { fill: white; font-size: 8.5px; }
    .it     { fill: #334; font-size: 8.5px; }
    .ttl    { font-size: 15px; font-weight: bold; fill: #1f3a5a; }
    .sub    { font-size: 10px; fill: #555; }
    .grp    { font-size: 10px; font-weight: bold; fill: #556; }
  </style>

  <text x="400" y="26" text-anchor="middle" class="ttl">ASDW-WEB — ステップ別ファイル I/O 図</text>
  <text x="400" y="42" text-anchor="middle" class="sub">根拠: hve/workflow_registry.py ASDW-WEB WorkflowDef (L275-354)</text>

  <!-- ===== Group 1: データ ===== -->
  <rect x="10" y="52" width="780" height="128" rx="6" class="cont"/>
  <text x="20" y="68" class="grp">【コンテナ 1】データ</text>

  <!-- Step 1.1 -->
  <rect x="270" y="72" width="260" height="40" rx="5" class="s-data"/>
  <text x="400" y="88" text-anchor="middle" class="wt">Step.1.1 — Azure データストア選定</text>
  <text x="400" y="102" text-anchor="middle" class="ws">Dev-Microservice-Azure-DataDesign</text>
  <rect x="30" y="72" width="215" height="30" rx="4" class="in"/>
  <text x="137" y="88" text-anchor="middle" class="it">docs/services/*.md / docs/catalog/data-model.md</text>
  <line x1="245" y1="87" x2="270" y2="87" class="ln"/>
  <rect x="555" y="72" width="215" height="30" rx="4" class="out"/>
  <text x="662" y="88" text-anchor="middle" class="it">docs/azure/azure-services-data.md</text>
  <line x1="530" y1="87" x2="555" y2="87" class="ln"/>
  <line x1="400" y1="112" x2="400" y2="130" class="ln"/>

  <!-- Step 1.2 -->
  <rect x="270" y="130" width="260" height="40" rx="5" class="s-data"/>
  <text x="400" y="146" text-anchor="middle" class="wt">Step.1.2 — Azure データサービス Deploy</text>
  <text x="400" y="160" text-anchor="middle" class="ws">Dev-Microservice-Azure-DataDeploy</text>
  <rect x="555" y="130" width="215" height="30" rx="4" class="out"/>
  <text x="662" y="146" text-anchor="middle" class="it">infra/azure/create-*.sh（データ）</text>
  <line x1="530" y1="145" x2="555" y2="145" class="ln"/>

  <line x1="400" y1="170" x2="400" y2="192" class="ln"/>

  <!-- ===== Group 2: マイクロサービス ===== -->
  <rect x="10" y="192" width="780" height="400" rx="6" class="cont"/>
  <text x="20" y="208" class="grp">【コンテナ 2】マイクロサービス作成</text>

  <!-- Step 2.1 -->
  <rect x="270" y="210" width="260" height="40" rx="5" class="s-svc"/>
  <text x="400" y="226" text-anchor="middle" class="wt">Step.2.1 — Azure コンピュート選定</text>
  <text x="400" y="240" text-anchor="middle" class="ws">Dev-Microservice-Azure-ComputeDesign</text>
  <rect x="555" y="210" width="215" height="30" rx="4" class="out"/>
  <text x="662" y="226" text-anchor="middle" class="it">docs/azure/azure-services-compute.md</text>
  <line x1="530" y1="225" x2="555" y2="225" class="ln"/>
  <line x1="400" y1="250" x2="400" y2="268" class="ln"/>

  <!-- Step 2.2 -->
  <rect x="270" y="268" width="260" height="40" rx="5" class="s-svc"/>
  <text x="400" y="284" text-anchor="middle" class="wt">Step.2.2 — 追加 Azure サービス選定</text>
  <text x="400" y="298" text-anchor="middle" class="ws">Dev-Microservice-Azure-AddServiceDesign</text>
  <rect x="555" y="268" width="215" height="30" rx="4" class="out"/>
  <text x="662" y="284" text-anchor="middle" class="it">docs/azure/azure-services-additional.md</text>
  <line x1="530" y1="283" x2="555" y2="283" class="ln"/>
  <line x1="400" y1="308" x2="400" y2="326" class="ln"/>

  <!-- Step 2.3 -->
  <rect x="270" y="326" width="260" height="40" rx="5" class="s-svc"/>
  <text x="400" y="342" text-anchor="middle" class="wt">Step.2.3 — 追加 Azure サービス Deploy</text>
  <text x="400" y="356" text-anchor="middle" class="ws">Dev-Microservice-Azure-AddServiceDeploy</text>
  <line x1="400" y1="366" x2="400" y2="384" class="ln"/>

  <!-- Step 2.3T -->
  <rect x="270" y="384" width="260" height="40" rx="5" class="s-svc"/>
  <text x="400" y="400" text-anchor="middle" class="wt">Step.2.3T — サービス テスト仕様書（TDD RED）</text>
  <text x="400" y="414" text-anchor="middle" class="ws">Arch-TDD-TestSpec</text>
  <rect x="555" y="384" width="215" height="30" rx="4" class="out"/>
  <text x="662" y="400" text-anchor="middle" class="it">docs/test-specs/{serviceId}-test-spec.md</text>
  <line x1="530" y1="399" x2="555" y2="399" class="ln"/>
  <line x1="400" y1="424" x2="400" y2="442" class="ln"/>

  <!-- Step 2.3TC -->
  <rect x="270" y="442" width="260" height="40" rx="5" class="s-svc"/>
  <text x="400" y="458" text-anchor="middle" class="wt">Step.2.3TC — サービス テストコード生成（TDD RED）</text>
  <text x="400" y="472" text-anchor="middle" class="ws">Dev-Microservice-Azure-ServiceTestCoding</text>
  <rect x="555" y="442" width="215" height="30" rx="4" class="out"/>
  <text x="662" y="458" text-anchor="middle" class="it">test/api/{ServiceName}.Tests/（全 FAIL）</text>
  <line x1="530" y1="457" x2="555" y2="457" class="ln"/>

  <!-- Step 2.4 -->
  <line x1="400" y1="482" x2="400" y2="492" class="ln"/>
  <rect x="270" y="492" width="260" height="40" rx="5" class="s-svc"/>
  <text x="400" y="508" text-anchor="middle" class="wt">Step.2.4 — サービスコード実装（TDD GREEN）</text>
  <text x="400" y="522" text-anchor="middle" class="ws">Dev-Microservice-Azure-ServiceCoding-AzureFunctions</text>
  <rect x="555" y="492" width="215" height="30" rx="4" class="out"/>
  <text x="662" y="508" text-anchor="middle" class="it">src/{ServiceID}-{ServiceName}/</text>
  <line x1="530" y1="507" x2="555" y2="507" class="ln"/>

  <!-- Step 2.5 — Azure Compute Deploy (depends_on 2.4) -->
  <line x1="400" y1="532" x2="400" y2="542" class="ln"/>
  <rect x="270" y="542" width="260" height="40" rx="5" class="s-svc"/>
  <text x="400" y="558" text-anchor="middle" class="wt">Step.2.5 — Azure Compute Deploy</text>
  <text x="400" y="572" text-anchor="middle" class="ws">Dev-Microservice-Azure-ComputeDeploy-AzureFunctions</text>
  <line x1="400" y1="582" x2="400" y2="600" class="ln"/>

  <!-- ===== Group 3: UI ===== -->
  <rect x="10" y="600" width="780" height="204" rx="6" class="cont"/>
  <text x="20" y="616" class="grp">【コンテナ 3】UI 作成</text>

  <!-- Step 3.0T -->
  <rect x="270" y="618" width="260" height="40" rx="5" class="s-ui"/>
  <text x="400" y="634" text-anchor="middle" class="wt">Step.3.0T — UI テスト仕様書（TDD RED）</text>
  <text x="400" y="648" text-anchor="middle" class="ws">Arch-TDD-TestSpec</text>
  <rect x="555" y="618" width="215" height="30" rx="4" class="out"/>
  <text x="662" y="634" text-anchor="middle" class="it">docs/test-specs/{screenId}-test-spec.md</text>
  <line x1="530" y1="633" x2="555" y2="633" class="ln"/>
  <line x1="400" y1="658" x2="400" y2="676" class="ln"/>

  <!-- Step 3.0TC -->
  <rect x="270" y="676" width="260" height="40" rx="5" class="s-ui"/>
  <text x="400" y="692" text-anchor="middle" class="wt">Step.3.0TC — UI テストコード生成（TDD RED）</text>
  <text x="400" y="706" text-anchor="middle" class="ws">Dev-Microservice-Azure-UITestCoding</text>
  <rect x="555" y="676" width="215" height="30" rx="4" class="out"/>
  <text x="662" y="692" text-anchor="middle" class="it">test/ui/（全 FAIL）</text>
  <line x1="530" y1="691" x2="555" y2="691" class="ln"/>
  <line x1="400" y1="716" x2="400" y2="734" class="ln"/>

  <!-- Step 3.1 -->
  <rect x="270" y="734" width="260" height="40" rx="5" class="s-ui"/>
  <text x="400" y="750" text-anchor="middle" class="wt">Step.3.1 — UI 実装（TDD GREEN）</text>
  <text x="400" y="764" text-anchor="middle" class="ws">Dev-Microservice-Azure-UICoding</text>
  <rect x="555" y="734" width="215" height="30" rx="4" class="out"/>
  <text x="662" y="750" text-anchor="middle" class="it">src/ui/{AppID}/</text>
  <line x1="530" y1="749" x2="555" y2="749" class="ln"/>
  <line x1="400" y1="774" x2="400" y2="784" class="ln"/>

  <!-- Step 3.2 (last step before QA) -->
  <rect x="270" y="784" width="260" height="40" rx="5" class="s-ui"/>
  <text x="400" y="800" text-anchor="middle" class="wt">Step.3.2 — Web アプリ Deploy（Azure SWA）</text>
  <text x="400" y="814" text-anchor="middle" class="ws">Dev-Microservice-Azure-UIDeploy-AzureStaticWebApps</text>
  <rect x="555" y="784" width="215" height="30" rx="4" class="out"/>
  <text x="662" y="800" text-anchor="middle" class="it">infra/azure/create-*.sh（Web App）</text>
  <line x1="530" y1="799" x2="555" y2="799" class="ln"/>

  <line x1="400" y1="824" x2="400" y2="844" class="ln"/>

  <!-- ===== Group 4: QA ===== -->
  <rect x="10" y="844" width="780" height="94" rx="6" class="cont"/>
  <text x="20" y="860" class="grp">【コンテナ 4】アーキテクチャレビュー（Step.4.1 / Step.4.2 は並列）</text>

  <!-- Step 4.1 -->
  <rect x="30" y="862" width="335" height="40" rx="5" class="s-qa"/>
  <text x="197" y="878" text-anchor="middle" class="wt">Step.4.1 — WAF アーキテクチャレビュー</text>
  <text x="197" y="892" text-anchor="middle" class="ws">QA-AzureArchitectureReview</text>
  <!-- Step 4.2 -->
  <rect x="435" y="862" width="335" height="40" rx="5" class="s-qa"/>
  <text x="602" y="878" text-anchor="middle" class="wt">Step.4.2 — 整合性チェック</text>
  <text x="602" y="892" text-anchor="middle" class="ws">QA-AzureDependencyReview</text>

  <line x1="197" y1="844" x2="197" y2="862" class="ln"/>
  <line x1="602" y1="844" x2="602" y2="862" class="ln"/>

  <!-- Legend -->
  <rect x="10" y="952" width="14" height="12" rx="2" class="s-data"/>
  <text x="30" y="963" style="font-size:10px;fill:#333;">データ</text>
  <rect x="100" y="952" width="14" height="12" rx="2" class="s-svc"/>
  <text x="120" y="963" style="font-size:10px;fill:#333;">マイクロサービス</text>
  <rect x="250" y="952" width="14" height="12" rx="2" class="s-ui"/>
  <text x="270" y="963" style="font-size:10px;fill:#333;">UI</text>
  <rect x="320" y="952" width="14" height="12" rx="2" class="s-qa"/>
  <text x="340" y="963" style="font-size:10px;fill:#333;">QA/レビュー</text>
  <rect x="450" y="952" width="14" height="12" rx="2" class="in"/>
  <text x="470" y="963" style="font-size:10px;fill:#333;">入力ファイル</text>
  <rect x="580" y="952" width="14" height="12" rx="2" class="out"/>
  <text x="600" y="963" style="font-size:10px;fill:#333;">出力ファイル</text>
</svg>
