<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ASDW-WEB チェーン図</title>
  <desc id="desc">Custom Agent をタスクとして、Step 1.1 から 4.2 までの依存関係を示す図。Step 4.1 と 4.2 は並列。</desc>
  <style>
    text { font-family: "Trebuchet MS", Verdana, Arial, sans-serif; fill: #1f2937; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 16px; fill: #4b5563; }
    .box { rx: 10; ry: 10; stroke-width: 2; }
    .data { fill: #dbeafe; stroke: #1d4ed8; }
    .service { fill: #dcfce7; stroke: #15803d; }
    .ui { fill: #f3e8ff; stroke: #7e22ce; }
    .qa { fill: #ffedd5; stroke: #c2410c; }
    .legend { fill: #f8fafc; stroke: #94a3b8; }
    .step { font-size: 14px; font-weight: 600; }
    .agent { font-size: 12px; fill: #374151; }
    .arrow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .note { font-size: 13px; fill: #334155; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">ASDW-WEB Agent Chain（実装整合）</text>
  <text x="40" y="76" class="subtitle">読み順: 左上 → 右下。Custom Agent は各 Step の実行タスクを表す。</text>

  <!-- Step boxes -->
  <rect class="box data" x="60" y="130" width="280" height="72"/>
  <text class="step" x="80" y="160">Step.1.1 データストア選定</text>
  <text class="agent" x="80" y="183">Dev-Microservice-Azure-DataDesign</text>

  <rect class="box data" x="380" y="130" width="280" height="72"/>
  <text class="step" x="400" y="160">Step.1.2 データ Deploy</text>
  <text class="agent" x="400" y="183">Dev-Microservice-Azure-DataDeploy</text>

  <rect class="box service" x="700" y="130" width="280" height="72"/>
  <text class="step" x="720" y="160">Step.2.1 コンピュート選定</text>
  <text class="agent" x="720" y="183">Dev-Microservice-Azure-ComputeDesign</text>

  <rect class="box service" x="1020" y="130" width="280" height="72"/>
  <text class="step" x="1040" y="160">Step.2.2 追加サービス選定</text>
  <text class="agent" x="1040" y="183">Dev-Microservice-Azure-AddServiceDesign</text>

  <rect class="box service" x="60" y="260" width="280" height="72"/>
  <text class="step" x="80" y="290">Step.2.3 追加サービス Deploy</text>
  <text class="agent" x="80" y="313">Dev-Microservice-Azure-AddServiceDeploy</text>

  <rect class="box service" x="380" y="260" width="280" height="72"/>
  <text class="step" x="400" y="290">Step.2.3T テスト仕様書</text>
  <text class="agent" x="400" y="313">Arch-TDD-TestSpec</text>

  <rect class="box service" x="700" y="260" width="280" height="72"/>
  <text class="step" x="720" y="290">Step.2.3TC テストコード</text>
  <text class="agent" x="720" y="313">Dev-Microservice-Azure-ServiceTestCoding</text>

  <rect class="box service" x="1020" y="260" width="280" height="72"/>
  <text class="step" x="1040" y="290">Step.2.4 サービス実装</text>
  <text class="agent" x="1040" y="313">Dev-Microservice-Azure-ServiceCoding-AzureFunctions</text>

  <rect class="box service" x="60" y="390" width="280" height="72"/>
  <text class="step" x="80" y="420">Step.2.5 Compute Deploy</text>
  <text class="agent" x="80" y="443">Dev-Microservice-Azure-ComputeDeploy-AzureFunctions</text>

  <rect class="box ui" x="380" y="390" width="280" height="72"/>
  <text class="step" x="400" y="420">Step.3.0T UI テスト仕様書</text>
  <text class="agent" x="400" y="443">Arch-TDD-TestSpec</text>

  <rect class="box ui" x="700" y="390" width="280" height="72"/>
  <text class="step" x="720" y="420">Step.3.0TC UI テストコード</text>
  <text class="agent" x="720" y="443">Dev-Microservice-Azure-UITestCoding</text>

  <rect class="box ui" x="1020" y="390" width="280" height="72"/>
  <text class="step" x="1040" y="420">Step.3.1 UI 実装</text>
  <text class="agent" x="1040" y="443">Dev-Microservice-Azure-UICoding</text>

  <rect class="box ui" x="60" y="520" width="280" height="72"/>
  <text class="step" x="80" y="550">Step.3.2 SWA Deploy</text>
  <text class="agent" x="80" y="573">Dev-Microservice-Azure-UIDeploy-AzureStaticWebApps</text>

  <rect class="box ui" x="380" y="520" width="280" height="72"/>
  <text class="step" x="400" y="550">Step.3.3 UI E2E</text>
  <text class="agent" x="400" y="573">E2ETesting-Playwright</text>

  <rect class="box qa" x="700" y="520" width="280" height="72"/>
  <text class="step" x="720" y="550">Step.4.1 WAF レビュー</text>
  <text class="agent" x="720" y="573">QA-AzureArchitectureReview</text>

  <rect class="box qa" x="1020" y="520" width="280" height="72"/>
  <text class="step" x="1040" y="550">Step.4.2 整合性チェック</text>
  <text class="agent" x="1040" y="573">QA-AzureDependencyReview</text>

  <!-- Arrows -->
  <path class="arrow" d="M340 166 L380 166"/>
  <path class="arrow" d="M660 166 L700 166"/>
  <path class="arrow" d="M980 166 L1020 166"/>
  <path class="arrow" d="M1160 202 L200 260"/>
  <path class="arrow" d="M340 296 L380 296"/>
  <path class="arrow" d="M660 296 L700 296"/>
  <path class="arrow" d="M980 296 L1020 296"/>
  <path class="arrow" d="M1160 332 L200 390"/>
  <path class="arrow" d="M340 426 L380 426"/>
  <path class="arrow" d="M660 426 L700 426"/>
  <path class="arrow" d="M980 426 L1020 426"/>
  <path class="arrow" d="M1160 462 L200 520"/>
  <path class="arrow" d="M340 556 L380 556"/>
  <path class="arrow" d="M660 556 L700 556"/>
  <path class="arrow" d="M660 556 L1020 556"/>

  <rect class="legend" x="60" y="670" width="1240" height="170" rx="10" ry="10"/>
  <text x="84" y="704" class="step">凡例</text>
  <rect class="box data" x="84" y="720" width="180" height="34"/><text x="104" y="742" class="agent">データ系 Step</text>
  <rect class="box service" x="284" y="720" width="220" height="34"/><text x="304" y="742" class="agent">サービス実装系 Step</text>
  <rect class="box ui" x="524" y="720" width="180" height="34"/><text x="544" y="742" class="agent">UI 系 Step</text>
  <rect class="box qa" x="724" y="720" width="180" height="34"/><text x="744" y="742" class="agent">レビュー系 Step</text>
  <text x="84" y="786" class="note">色のセマンティクス: 青=データ、緑=サービス、紫=UI、橙=品質レビュー</text>
  <text x="84" y="812" class="note">読み順: 左上から右下。Step.4.1 / Step.4.2 は Step.3.3 完了後に並列で起動。</text>
</svg>
