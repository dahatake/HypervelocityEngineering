<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="system-ui, -apple-system, sans-serif">
  <title>AQOD: Original Docs Review データフロー（D01〜D21 fan-out + 横断レビュー）</title>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#586069"/>
    </marker>
  </defs>

  <rect width="1200" height="540" fill="#f6f8fa" rx="12"/>

  <text x="600" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#24292e">AQOD: Original Docs Review データフロー</text>
  <text x="600" y="52" text-anchor="middle" font-size="11" fill="#586069">Step 1 は D01〜D21 を 21 並列 fan-out（max_parallel=21）。Step 2 で横断整合性レビュー。</text>

  <text x="175" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#0366d6">入力ファイル</text>
  <text x="565" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#6f42c1">Prompt（タスク）</text>
  <text x="980" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#28a745">成果物</text>

  <!-- ==================== Step 1 fan-out ==================== -->
  <text x="565" y="100" text-anchor="middle" font-size="10" fill="#959da5" font-weight="bold">Step 1: original-docs 質問票生成（fan-out: D01〜D21 を 21 並列）</text>
  <rect x="20" y="110" width="310" height="110" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="175" y="131" text-anchor="middle" font-size="10" fill="#24292e">original-docs/**/*（target_scope 配下）</text>
  <text x="175" y="151" text-anchor="middle" font-size="10" fill="#24292e">knowledge/D{NN}-*.md（参照用）</text>
  <text x="175" y="166" text-anchor="middle" font-size="9" fill="#586069">required_skills: knowledge-lookup</text>
  <text x="175" y="186" text-anchor="middle" font-size="10" fill="#24292e">パラメータ: target_scope / depth /</text>
  <text x="175" y="200" text-anchor="middle" font-size="10" fill="#24292e">focus_areas</text>

  <rect x="430" y="110" width="270" height="110" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="565" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#24292e">QA-DocConsistency</text>
  <text x="565" y="153" text-anchor="middle" font-size="9" fill="#9a3412" font-weight="bold">[fan-out × 21: D01, D02, ..., D21]</text>
  <text x="565" y="171" text-anchor="middle" font-size="10" fill="#586069">Dxx ごとに original-docs 横断分析</text>
  <text x="565" y="187" text-anchor="middle" font-size="10" fill="#586069">論理矛盾・欠落・捏造リスク検出</text>
  <text x="565" y="207" text-anchor="middle" font-size="9" fill="#586069">独立 Copilot session で並列実行</text>

  <rect x="800" y="115" width="360" height="100" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="980" y="138" text-anchor="middle" font-size="10" fill="#24292e">qa/D01-original-docs-questionnaire.md</text>
  <text x="980" y="155" text-anchor="middle" font-size="10" fill="#24292e">...</text>
  <text x="980" y="172" text-anchor="middle" font-size="10" fill="#24292e">qa/D21-original-docs-questionnaire.md</text>
  <text x="980" y="190" text-anchor="middle" font-size="9" fill="#586069">（21 個の独立質問票）</text>
  <text x="980" y="206" text-anchor="middle" font-size="9" fill="#586069">output_paths_template:</text>
  <text x="980" y="220" text-anchor="middle" font-size="9" fill="#586069">qa/{key}-original-docs-questionnaire.md</text>

  <line x1="330" y1="165" x2="430" y2="165" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="165" x2="800" y2="165" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ==================== Step 2 ==================== -->
  <text x="565" y="252" text-anchor="middle" font-size="10" fill="#959da5" font-weight="bold">Step 2: original-docs 横断整合性レビュー</text>
  <line x1="565" y1="220" x2="565" y2="255" stroke="#e36209" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <rect x="20" y="262" width="310" height="62" rx="8" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="175" y="284" text-anchor="middle" font-size="10" fill="#24292e">qa/D01〜D21-original-docs-</text>
  <text x="175" y="298" text-anchor="middle" font-size="10" fill="#24292e">questionnaire.md（全 21 件）</text>
  <text x="175" y="316" text-anchor="middle" font-size="10" fill="#24292e">knowledge/D{NN}-*.md（参照用）</text>

  <rect x="430" y="262" width="270" height="62" rx="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="565" y="284" text-anchor="middle" font-size="11" font-weight="bold" fill="#24292e">QA-DocConsistency</text>
  <text x="565" y="302" text-anchor="middle" font-size="10" fill="#586069">D01〜D21 横断質問票の統合</text>
  <text x="565" y="318" text-anchor="middle" font-size="9" fill="#959da5">required_skills: knowledge-lookup</text>

  <rect x="800" y="265" width="360" height="56" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="980" y="287" text-anchor="middle" font-size="10" fill="#24292e">qa/original-docs-cross-</text>
  <text x="980" y="301" text-anchor="middle" font-size="10" fill="#24292e">questionnaire.md</text>
  <text x="980" y="316" text-anchor="middle" font-size="9" fill="#586069">（統合 / 横断整合性レビュー結果）</text>

  <line x1="330" y1="293" x2="430" y2="293" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="293" x2="800" y2="293" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ==================== Legend ==================== -->
  <rect x="20" y="345" width="1160" height="180" rx="10" fill="#fff7ed" stroke="#c2410c" stroke-width="1.5"/>
  <text x="40" y="368" font-size="12" font-weight="bold" fill="#9a3412">凡例 / 読み方</text>
  <rect x="40" y="378" width="22" height="14" fill="#e8f0fe" stroke="#0366d6" stroke-width="1.5"/>
  <text x="72" y="390" font-size="11" fill="#24292e">入力ファイル / パラメータ</text>
  <rect x="240" y="378" width="22" height="14" fill="#e8d5f5" stroke="#6f42c1" stroke-width="2"/>
  <text x="272" y="390" font-size="11" fill="#24292e">Prompt</text>
  <rect x="400" y="378" width="22" height="14" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="432" y="390" font-size="11" fill="#24292e">成果物ファイル</text>
  <line x1="560" y1="385" x2="600" y2="385" stroke="#586069" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="610" y="389" font-size="11" fill="#24292e">データフロー</text>
  <line x1="730" y1="380" x2="770" y2="390" stroke="#e36209" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="780" y="389" font-size="11" fill="#24292e">ステップ依存（DAG）</text>
  <text x="40" y="416" font-size="11" fill="#24292e">• Step 1 は D01〜D21 を 21 並列で fan-out（hve/workflow_registry.py AQOD.max_parallel=21）。</text>
  <text x="40" y="434" font-size="11" fill="#24292e">• 各 fan-out 子ステップは独立した質問票（qa/{key}-original-docs-questionnaire.md）を生成。</text>
  <text x="40" y="452" font-size="11" fill="#24292e">• Step 2 は全 21 件の完了を待って AND join し、横断整合性レビューを実施。</text>
  <text x="40" y="470" font-size="11" fill="#24292e">• 出典: hve/workflow_registry.py AQOD WorkflowDef（fanout_static_keys = D01〜D21）。</text>
  <text x="40" y="492" font-size="11" font-weight="bold" fill="#9a3412">関連 Prompt ファイル:</text>
  <text x="40" y="510" font-size="10" fill="#24292e">.github/prompts/QA-DocConsistency.prompt.md</text>
</svg>
