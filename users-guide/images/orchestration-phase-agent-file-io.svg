<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 760" role="img" aria-labelledby="title desc">
  <title id="title">Phase Guide Agent File I/O</title>
  <desc id="desc">フェーズ別ガイドで使う主要ワークフローと Custom Agent のファイル入出力を示す図。青が Read、緑が Write。</desc>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .sub { font-size: 13px; fill: #4b5563; }
    .phase { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 10; ry: 10; }
    .io { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 8; ry: 8; }
    .r { stroke: #1d4ed8; stroke-width: 2.8; fill: none; marker-end: url(#aR); }
    .w { stroke: #15803d; stroke-width: 2.8; fill: none; marker-end: url(#aW); }
    .lbl { font-size: 12px; fill: #374151; }
    .p { font-size: 16px; font-weight: 700; }
  </style>
  <defs>
    <marker id="aR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1d4ed8"/>
    </marker>
    <marker id="aW" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#15803d"/>
    </marker>
  </defs>

  <text x="24" y="38" class="title">フェーズ別ガイド: Custom Agent ファイル I/O マップ</text>
  <text x="24" y="62" class="sub">workflow_registry.py / users-guide/02〜06, km-guide.md, original-docs-review.md, sourcecode-documentation.md の対応関係</text>

  <!-- Phase blocks -->
  <rect x="40" y="110" width="300" height="88" class="phase"/>
  <text x="58" y="145" class="p">AAS / AAD / ABD</text>
  <text x="58" y="169" class="lbl">Arch-* 設計系 Agent</text>

  <rect x="40" y="230" width="300" height="88" class="phase"/>
  <text x="58" y="265" class="p">ASDW / ABDV</text>
  <text x="58" y="289" class="lbl">Dev-* 実装・デプロイ Agent</text>

  <rect x="40" y="350" width="300" height="88" class="phase"/>
  <text x="58" y="385" class="p">AKM / AQOD</text>
  <text x="58" y="409" class="lbl">KnowledgeManager / QA-DocConsistency</text>

  <rect x="40" y="470" width="300" height="88" class="phase"/>
  <text x="58" y="505" class="p">ADOC</text>
  <text x="58" y="529" class="lbl">Doc-* ドキュメント生成 Agent</text>

  <!-- IO blocks -->
  <rect x="450" y="100" width="210" height="70" class="io"/>
  <text x="472" y="140">original-docs/</text>

  <rect x="450" y="190" width="210" height="70" class="io"/>
  <text x="528" y="230">qa/</text>

  <rect x="450" y="280" width="210" height="70" class="io"/>
  <text x="500" y="320">knowledge/</text>

  <rect x="450" y="370" width="210" height="70" class="io"/>
  <text x="514" y="410">docs/</text>

  <rect x="450" y="460" width="210" height="70" class="io"/>
  <text x="514" y="500">src/</text>

  <rect x="450" y="550" width="210" height="70" class="io"/>
  <text x="476" y="590">docs-generated/</text>

  <rect x="760" y="235" width="300" height="260" class="io"/>
  <text x="790" y="270" class="p">主要な R/W 関係</text>
  <text x="790" y="302" class="lbl">R: original-docs/qa/knowledge/docs/src</text>
  <text x="790" y="328" class="lbl">W: qa/knowledge/docs/test/infra/docs-generated</text>
  <text x="790" y="366" class="lbl">青矢印: Read / 緑矢印: Write</text>
  <text x="790" y="392" class="lbl">※ ワークフローごとに入出力は一部異なる</text>
  <text x="790" y="430" class="lbl">詳細: users-guide/workflow-reference.md</text>

  <!-- Read arrows -->
  <path d="M340 392 C390 392, 410 135, 450 135" class="r"/>
  <path d="M340 392 C390 392, 410 225, 450 225" class="r"/>
  <path d="M340 154 C390 154, 410 315, 450 315" class="r"/>
  <path d="M340 154 C390 154, 410 405, 450 405" class="r"/>
  <path d="M340 505 C390 505, 410 495, 450 495" class="r"/>

  <!-- Write arrows -->
  <path d="M340 392 C390 392, 410 225, 450 225" class="w"/>
  <path d="M340 392 C390 392, 410 315, 450 315" class="w"/>
  <path d="M340 154 C390 154, 410 405, 450 405" class="w"/>
  <path d="M340 505 C390 505, 410 585, 450 585" class="w"/>

  <path d="M660 315 C700 315, 720 315, 760 315" class="r"/>
  <path d="M660 405 C700 405, 720 405, 760 405" class="w"/>
</svg>
