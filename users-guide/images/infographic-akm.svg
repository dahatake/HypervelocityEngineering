<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">AKM インフォグラフィック（Work IQ 入力対応）</title>
  <desc id="desc">AKM の sources 分岐（qa / original-docs / workiq のマルチ選択）、Work IQ 先行ステージ、auto-knowledge-management.yml の KnowledgeManager 実行、knowledge 出力と反復精緻化ループを示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#334155"/></marker>
  </defs>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
    .zone { stroke: #94a3b8; stroke-width: 1.5; rx: 10; ry: 10; }
    .inputZone { fill: #f8fafc; } .processZone { fill: #eff6ff; } .outputZone { fill: #f0fdf4; }
    .zoneTitle { font-size: 18px; font-weight: 700; }
    .file { fill: #fff; stroke: #64748b; stroke-width: 1.5; rx: 8; ry: 8; }
    .workiq { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; rx: 8; ry: 8; }
    .workflow { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 10; ry: 10; }
    .step { fill: #e0ecff; stroke: #1d4ed8; stroke-width: 1.5; rx: 8; ry: 8; }
    .preStage { fill: #ffedd5; stroke: #ea580c; stroke-width: 2; rx: 10; ry: 10; }
    .agent { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.4; rx: 12; ry: 12; }
    .node { font-size: 12px; font-weight: 600; }
    .tiny { font-size: 11px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .workiqArrow { stroke: #ea580c; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .loop { fill: none; stroke: #7c3aed; stroke-width: 2; stroke-dasharray: 6 4; marker-end: url(#arrow); }
    .label { rx: 12; ry: 12; }
    .labelText { font-size: 12px; font-weight: 700; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
    .badge { font-size: 10px; font-weight: 700; fill: #ea580c; }
  </style>

  <rect x="20" y="20" width="260" height="500" class="zone inputZone"/>
  <rect x="300" y="20" width="620" height="500" class="zone processZone"/>
  <rect x="940" y="20" width="240" height="500" class="zone outputZone"/>
  <text x="40" y="52" class="zoneTitle" fill="#64748b">INPUT (マルチ選択)</text>
  <text x="320" y="52" class="zoneTitle" fill="#1d4ed8">PROCESS</text>
  <text x="960" y="52" class="zoneTitle" fill="#15803d">OUTPUT</text>

  <g id="input-zone">
    <rect x="40" y="80" width="220" height="62" class="file"/>
    <text x="52" y="106" class="node">qa（既定 ON）</text>
    <text x="52" y="126" class="tiny">qa/*.md（質問票）</text>

    <rect x="40" y="155" width="220" height="62" class="file"/>
    <text x="52" y="181" class="node">original-docs（既定 ON）</text>
    <text x="52" y="201" class="tiny">original-docs/</text>

    <rect x="40" y="230" width="220" height="62" class="workiq"/>
    <text x="52" y="256" class="node" fill="#9a3412">workiq（任意）</text>
    <text x="52" y="276" class="tiny">Microsoft 365 Copilot</text>

    <text x="40" y="320" class="tiny">--sources qa,original-docs,workiq</text>
    <text x="40" y="340" class="tiny">(hve ローカル CLI のみ。Cloud Agent は対象外)</text>
    <text x="40" y="370" class="tiny">後方互換: qa / original-docs / both 単体も受理</text>
  </g>

  <g id="process-zone">
    <rect x="330" y="90" width="560" height="380" class="workflow"/>
    <text x="352" y="120" class="node" fill="#1d4ed8">Workflow: auto-knowledge-management.yml + hve CLI</text>

    <rect x="350" y="145" width="520" height="78" class="preStage"/>
    <text x="370" y="175" class="node" fill="#9a3412">Pre-DAG: AKM Work IQ 取り込み（workiq 選択時）</text>
    <text x="370" y="197" class="tiny">_run_akm_workiq_ingest: Work IQ → knowledge/Dxx-*.md を起票/差分更新</text>
    <text x="370" y="215" class="tiny">対象 Dxx 絞り込み: --workiq-dxx D01,D04 (省略=全 D01〜D21)</text>

    <rect x="350" y="245" width="520" height="180" class="step"/>
    <text x="370" y="275" class="node">DAG step-1: 取り込み → 差分マージ</text>
    <rect x="370" y="298" width="480" height="42" class="agent"/>
    <text x="390" y="324" class="node">KnowledgeManager Agent</text>
    <text x="370" y="362" class="tiny">qa / original-docs を順次処理し、Work IQ 由来の既存 Dxx を保護しつつ差分マージ</text>
    <text x="370" y="382" class="tiny">D01〜D21 更新 / 状態集計 / 矛盾検知</text>

    <rect x="330" y="490" width="96" height="24" fill="#64748b" class="label"/><text x="378" y="502" class="labelText">akm:ready</text>
    <rect x="440" y="490" width="112" height="24" fill="#1d4ed8" class="label"/><text x="496" y="502" class="labelText">akm:running</text>
    <rect x="566" y="490" width="96" height="24" fill="#15803d" class="label"/><text x="614" y="502" class="labelText">akm:done</text>
  </g>

  <g id="output-zone">
    <rect x="960" y="120" width="200" height="82" class="file"/><text x="972" y="152" class="node">knowledge/D01〜D21-*.md</text>
    <rect x="960" y="220" width="200" height="82" class="file"/><text x="972" y="252" class="node">knowledge/business-requirement-</text><text x="972" y="270" class="tiny">document-status.md</text>
  </g>

  <g id="connections">
    <path d="M260 110 C290 110, 320 180, 350 270" class="arrow"/>
    <path d="M260 185 C290 185, 320 230, 350 290" class="arrow"/>
    <path d="M260 260 C290 260, 320 200, 350 184" class="workiqArrow"/>
    <text x="290" y="220" class="badge">workiq → Pre-DAG</text>
    <path d="M610 223 L610 245" class="workiqArrow"/>
    <path d="M870 320 C900 320, 920 180, 960 160" class="arrow"/>
    <path d="M870 340 C900 340, 920 260, 960 260" class="arrow"/>
    <path d="M1060 302 C1060 440, 500 440, 500 425" class="loop"/>
    <text x="1068" y="370" class="tiny">反復精緻化ループ</text>
  </g>
</svg>
