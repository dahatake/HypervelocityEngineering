<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">README 用 3 段構造フロー図</title>
  <desc id="desc">Tier 1 の要求定義から Tier 2 のアーキテクチャ設計へ進み、Tier 3 で Web / Batch / AI Agent 系へ分岐する。凡例と読み順を含む。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: "Noto Sans CJK JP", "Noto Sans JP", "IPAexGothic", "IPAGothic", "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, -apple-system, "Segoe UI", Arial, sans-serif; fill: #1f2937; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #475569; }
      .tier { rx: 18; ry: 18; stroke-width: 1.8; }
      .tier1 { fill: #fef3c7; stroke: #d97706; }
      .tier2 { fill: #dbeafe; stroke: #2563eb; }
      .tier3 { fill: #dcfce7; stroke: #16a34a; }
      .support { fill: #ede9fe; stroke: #7c3aed; }
      .label { font-size: 20px; font-weight: 700; }
      .body { font-size: 14px; }
      .small { font-size: 12px; fill: #475569; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.6; marker-end: url(#arrow); }
      .guide { fill: #0f172a; }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 12; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#ffffff"/>
  <text x="32" y="48" class="title">3 段構造で見る Phase の進み方</text>
  <text x="32" y="72" class="subtitle">README では Phase の読み順を Tier で要約し、詳細な Step は users-guide に委譲します</text>

  <circle cx="70" cy="138" r="16" class="guide"/>
  <text x="64" y="144" fill="#ffffff" font-size="13" font-weight="700">1</text>
  <rect x="100" y="100" width="1080" height="120" class="tier tier1"/>
  <text x="130" y="138" class="label">Tier 1 — 要求定義</text>
  <text x="130" y="170" class="body">`ard`（自動化入口） / `01-business-requirement.md`（手動整理）</text>
  <text x="130" y="194" class="small">企業・事業分析、ユースケース整理、requirements の前提固め</text>

  <circle cx="70" cy="348" r="16" class="guide"/>
  <text x="64" y="354" fill="#ffffff" font-size="13" font-weight="700">2</text>
  <rect x="100" y="290" width="1080" height="120" class="tier tier2"/>
  <text x="130" y="328" class="label">Tier 2 — アプリケーションアーキテクチャ設計</text>
  <text x="130" y="360" class="body">`aas` → APP / アーキテクチャ候補 / 設計方針を確定</text>
  <text x="130" y="384" class="small">ここで決まった方針に応じて Tier 3 の設計・実装系 Workflow へ分岐</text>

  <circle cx="70" cy="558" r="16" class="guide"/>
  <text x="64" y="564" fill="#ffffff" font-size="13" font-weight="700">3</text>
  <rect x="100" y="480" width="320" height="166" class="tier tier3"/>
  <text x="128" y="518" class="label">Web / Microservice</text>
  <text x="128" y="550" class="body">設計: `aad-web`</text>
  <text x="128" y="576" class="body">実装: `asdw-web`</text>
  <text x="128" y="606" class="small">サービス設計、UI、API、Azure 配備</text>

  <rect x="480" y="480" width="320" height="166" class="tier tier3"/>
  <text x="508" y="518" class="label">Batch</text>
  <text x="508" y="550" class="body">設計: `abd`</text>
  <text x="508" y="576" class="body">実装: `abdv`</text>
  <text x="508" y="606" class="small">ジョブ設計、データ設計、Functions 配備</text>

  <rect x="860" y="480" width="320" height="166" class="tier tier3"/>
  <text x="888" y="518" class="label">AI Agent</text>
  <text x="888" y="550" class="body">設計: `aag`</text>
  <text x="888" y="576" class="body">詳細設計・実装: `aagd`</text>
  <text x="888" y="606" class="small">Agent 定義、テスト、Foundry / Azure 配備</text>

  <rect x="952" y="116" width="198" height="78" class="tier support"/>
  <text x="972" y="146" class="body" font-weight="700">横断系 Workflow</text>
  <text x="972" y="168" class="small">`akm` / `aqod` / `adoc`</text>
  <text x="972" y="186" class="small">Phase 全体を補助</text>

  <path d="M 640 220 C 640 248, 640 262, 640 290" class="arrow"/>
  <path d="M 640 410 C 640 444, 260 444, 260 480" class="arrow"/>
  <path d="M 640 410 C 640 444, 640 444, 640 480" class="arrow"/>
  <path d="M 640 410 C 640 444, 1020 444, 1020 480" class="arrow"/>

  <rect x="24" y="684" width="1232" height="56" class="legend"/>
  <text x="42" y="716" class="body" font-weight="700">凡例</text>
  <rect x="112" y="700" width="18" height="18" class="tier tier1"/><text x="138" y="714" class="body">Tier 1: 要求定義</text>
  <rect x="306" y="700" width="18" height="18" class="tier tier2"/><text x="332" y="714" class="body">Tier 2: アーキテクチャ設計</text>
  <rect x="568" y="700" width="18" height="18" class="tier tier3"/><text x="594" y="714" class="body">Tier 3: 実装・展開</text>
  <rect x="820" y="700" width="18" height="18" class="tier support"/><text x="846" y="714" class="body">横断系: knowledge / QA / Documentation 補助</text>
  <text x="1120" y="714" class="body">読み順: ① → ② → ③</text>
</svg>
