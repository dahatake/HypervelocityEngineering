<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 1020" role="img" aria-labelledby="title desc">
  <title id="title">オーケストレーション全体データフロー</title>
  <desc id="desc">8ワークフローの入力と出力ディレクトリの関係。実線は書き込み、破線は読み取り参照。</desc>
  <defs>
    <marker id="arrow-solid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
    </marker>
    <style>
      text { font-family: system-ui, sans-serif; fill: #1f2937; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 15px; fill: #475569; }
      .h { font-size: 18px; font-weight: 700; }
      .t { font-size: 13px; }
      .small { font-size: 12px; fill: #334155; }
      .frame { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 12; }
      .file { fill: #95A5A6; stroke: #5d6d73; stroke-width: 1.2; rx: 10; }
      .wf { stroke-width: 1.6; rx: 10; }
      .arch { fill: #4A90D9; stroke: #1f3a5a; }
      .dev { fill: #50C878; stroke: #1b5e20; }
      .doc { fill: #9B59B6; stroke: #4a235a; }
      .qa { fill: #E67E22; stroke: #7e3d00; }
      .km { fill: #F39C12; stroke: #7a4f00; stroke-width: 2.6; }
      .wftext-light { fill: #ffffff; font-size: 13px; font-weight: 700; }
      .wftext-dark { fill: #111827; font-size: 13px; font-weight: 700; }
      .read { stroke: #1d4ed8; stroke-width: 2; stroke-dasharray: 8 5; fill: none; marker-end: url(#arrow-dashed); }
      .write { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow-solid); }
      .legend-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1700" height="1020" fill="transparent"/>
  <text x="40" y="52" class="title">オーケストレーション全体データフロー（8ワークフロー）</text>
  <text x="40" y="80" class="subtitle">破線=読み取り参照 / 実線=書き込み。knowledge/ 参照を設計・実装ワークフローへ強調表示。</text>

  <rect x="30" y="110" width="360" height="830" class="frame"/>
  <text x="50" y="146" class="h">入力ディレクトリ（左列）</text>
  <rect x="60" y="180" width="300" height="96" class="file"/>
  <text x="80" y="220" class="h">original-docs/</text>
  <text x="80" y="245" class="t">既存ビジネス文書（AQOD/AKM入力）</text>

  <rect x="60" y="304" width="300" height="96" class="file"/>
  <text x="80" y="344" class="h">qa/</text>
  <text x="80" y="369" class="t">質問票（AKM入力）</text>

  <rect x="60" y="428" width="300" height="96" class="file"/>
  <text x="80" y="468" class="h">src/</text>
  <text x="80" y="493" class="t">既存コード（ADOC入力）</text>

  <rect x="60" y="552" width="300" height="130" class="file"/>
  <text x="80" y="592" class="h">knowledge/</text>
  <text x="80" y="617" class="t">業務要件 D01〜D21</text>
  <text x="80" y="641" class="t">AAS/AAD/ASDW/ABD/ABDV/ADOC が参照</text>

  <rect x="430" y="110" width="840" height="830" class="frame"/>
  <text x="450" y="146" class="h">ワークフロー（中央）</text>

  <rect x="460" y="180" width="360" height="90" class="wf qa"/>
  <text x="480" y="215" class="wftext-dark">AQOD（QA-DocConsistency）</text>
  <text x="480" y="238" class="wftext-dark">original-docs/ → qa/</text>

  <rect x="860" y="180" width="360" height="90" class="wf km"/>
  <text x="880" y="215" class="wftext-dark">AKM（KnowledgeManager）</text>
  <text x="880" y="238" class="wftext-dark">original-docs/ + qa/ → knowledge/</text>

  <rect x="460" y="300" width="360" height="90" class="wf arch"/>
  <text x="480" y="335" class="wftext-light">AAS（Arch-*）</text>
  <text x="480" y="358" class="wftext-light">knowledge/ 参照 → docs/catalog/</text>

  <rect x="860" y="300" width="360" height="90" class="wf arch"/>
  <text x="880" y="335" class="wftext-light">AAD（Arch-*）</text>
  <text x="880" y="358" class="wftext-light">knowledge/ 参照 → docs/</text>

  <rect x="460" y="420" width="360" height="90" class="wf dev"/>
  <text x="480" y="455" class="wftext-dark">ASDW（Dev-*）</text>
  <text x="480" y="478" class="wftext-dark">knowledge/ 参照 → src/, test/, infra/</text>

  <rect x="860" y="420" width="360" height="90" class="wf arch"/>
  <text x="880" y="455" class="wftext-light">ABD（Arch-Batch-*）</text>
  <text x="880" y="478" class="wftext-light">knowledge/ 参照 → docs/batch/</text>

  <rect x="460" y="540" width="360" height="90" class="wf dev"/>
  <text x="480" y="575" class="wftext-dark">ABDV（Dev-Batch-*）</text>
  <text x="480" y="598" class="wftext-dark">knowledge/ 参照 → src/, test/</text>

  <rect x="860" y="540" width="360" height="90" class="wf doc"/>
  <text x="880" y="575" class="wftext-light">ADOC（Doc-*）</text>
  <text x="880" y="598" class="wftext-light">src/ + knowledge/ 参照 → docs-generated/</text>

  <rect x="460" y="700" width="760" height="110" class="legend-box"/>
  <text x="490" y="735" class="h">凡例（Agentカテゴリ色）</text>
  <text x="490" y="760" class="small">青: Arch-* / 緑: Dev-* / 紫: Doc-* / 橙: QA-* / 金: KnowledgeManager / 灰: ファイル・ディレクトリ</text>
  <line x1="490" y1="785" x2="610" y2="785" class="read"/>
  <text x="620" y="790" class="small">読み取り参照（破線）</text>
  <line x1="820" y1="785" x2="940" y2="785" class="write"/>
  <text x="950" y="790" class="small">書き込み（実線）</text>

  <rect x="1310" y="110" width="360" height="830" class="frame"/>
  <text x="1330" y="146" class="h">出力ディレクトリ（右列）</text>

  <rect x="1340" y="180" width="300" height="96" class="file"/>
  <text x="1360" y="220" class="h">qa/</text>
  <text x="1360" y="245" class="t">AQOD 出力（質問票）</text>

  <rect x="1340" y="304" width="300" height="96" class="file"/>
  <text x="1360" y="344" class="h">knowledge/</text>
  <text x="1360" y="369" class="t">AKM 出力（D01〜D21）</text>

  <rect x="1340" y="428" width="300" height="96" class="file"/>
  <text x="1360" y="468" class="h">docs/</text>
  <text x="1360" y="493" class="t">AAS/AAD/ABD の設計成果物</text>

  <rect x="1340" y="552" width="300" height="96" class="file"/>
  <text x="1360" y="592" class="h">docs-generated/</text>
  <text x="1360" y="617" class="t">ADOC の生成ドキュメント</text>

  <rect x="1340" y="676" width="300" height="96" class="file"/>
  <text x="1360" y="716" class="h">src/</text>
  <text x="1360" y="741" class="t">ASDW/ABDV 実装出力（test/infra 含む）</text>

  <rect x="1340" y="800" width="300" height="96" class="file"/>
  <text x="1360" y="840" class="h">work/</text>
  <text x="1360" y="865" class="t">各ワークフローの計画・検証記録</text>

  <!-- Input to workflow -->
  <path d="M 360 228 C 405 228, 415 228, 460 225" class="read"/>
  <path d="M 360 228 C 605 228, 615 228, 860 225" class="read"/>
  <path d="M 360 352 C 605 352, 615 228, 860 225" class="read"/>
  <path d="M 360 476 C 605 476, 615 586, 860 586" class="read"/>

  <!-- Knowledge references -->
  <path d="M 360 616 C 405 616, 415 336, 460 336" class="read"/>
  <path d="M 360 616 C 605 616, 615 336, 860 336" class="read"/>
  <path d="M 360 616 C 405 616, 415 456, 460 456" class="read"/>
  <path d="M 360 616 C 605 616, 615 456, 860 456" class="read"/>
  <path d="M 360 616 C 405 616, 415 576, 460 576" class="read"/>
  <path d="M 360 616 C 605 616, 615 576, 860 576" class="read"/>

  <!-- Workflow to outputs -->
  <path d="M 820 225 C 1070 225, 1090 225, 1340 228" class="write"/>
  <path d="M 1220 225 C 1275 225, 1285 348, 1340 352" class="write"/>
  <path d="M 820 336 C 1070 336, 1090 460, 1340 468" class="write"/>
  <path d="M 1220 336 C 1275 336, 1285 452, 1340 468" class="write"/>
  <path d="M 1220 456 C 1275 456, 1285 468, 1340 468" class="write"/>
  <path d="M 820 456 C 1070 456, 1090 716, 1340 716" class="write"/>
  <path d="M 820 576 C 1070 576, 1090 716, 1340 716" class="write"/>
  <path d="M 1220 576 C 1275 576, 1285 592, 1340 592" class="write"/>

  <!-- Work output hint -->
  <path d="M 1220 225 C 1275 225, 1285 840, 1340 840" class="write"/>
  <path d="M 1220 336 C 1275 336, 1285 840, 1340 840" class="write"/>
  <path d="M 1220 456 C 1275 456, 1285 840, 1340 840" class="write"/>
  <path d="M 1220 576 C 1275 576, 1285 840, 1340 840" class="write"/>

</svg>
