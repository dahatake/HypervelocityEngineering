<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="980" viewBox="0 0 1700 980" role="img" aria-labelledby="title desc">
  <title id="title">ASDW-WEB データフロー図</title>
  <desc id="desc">入力ファイルからCustom Agentタスクを経由して出力ファイルへ到達する関係を示す。</desc>
  <style>
    text { font-family: "Trebuchet MS", Verdana, Arial, sans-serif; fill: #1f2937; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #4b5563; }
    .col-title { font-size: 18px; font-weight: 700; }
    .card { rx: 9; ry: 9; stroke-width: 2; }
    .input { fill: #e2e8f0; stroke: #475569; }
    .agent { fill: #dcfce7; stroke: #15803d; }
    .output { fill: #ede9fe; stroke: #6d28d9; }
    .label { font-size: 13px; }
    .step { font-size: 12px; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .legend { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; ry: 10; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <text x="40" y="50" class="title">ASDW-WEB データフロー（入力 → Agent → 出力）</text>
  <text x="40" y="78" class="subtitle">読み順: 上から下。各行は「1 Step の代表的なファイルフロー」を示す。</text>

  <text x="120" y="130" class="col-title">入力ファイル</text>
  <text x="740" y="130" class="col-title">Custom Agent（タスク）</text>
  <text x="1260" y="130" class="col-title">出力ファイル</text>

  <!-- Row 1 -->
  <rect class="card input" x="60" y="170" width="500" height="72"/>
  <text class="label" x="80" y="198">docs/catalog/data-model.md</text>
  <text class="label" x="80" y="220">docs/catalog/service-catalog.md / domain-analytics.md</text>
  <rect class="card agent" x="650" y="170" width="420" height="72"/>
  <text class="label" x="670" y="198">Dev-Microservice-Azure-DataDesign</text>
  <text class="step" x="670" y="220">Step.1.1</text>
  <rect class="card output" x="1160" y="170" width="500" height="72"/>
  <text class="label" x="1180" y="210">docs/azure/azure-services-data.md</text>

  <!-- Row 2 -->
  <rect class="card input" x="60" y="270" width="500" height="72"/>
  <text class="label" x="80" y="298">docs/test-specs/{serviceId}-test-spec.md</text>
  <text class="label" x="80" y="320">docs/services/ / service-catalog-matrix.md</text>
  <rect class="card agent" x="650" y="270" width="420" height="72"/>
  <text class="label" x="670" y="298">Dev-Microservice-Azure-ServiceTestCoding</text>
  <text class="step" x="670" y="320">Step.2.3TC</text>
  <rect class="card output" x="1160" y="270" width="500" height="72"/>
  <text class="label" x="1180" y="310">test/api/{ServiceName}.Tests/</text>

  <!-- Row 3 -->
  <rect class="card input" x="60" y="370" width="500" height="72"/>
  <text class="label" x="80" y="398">docs/catalog/service-catalog.md</text>
  <text class="label" x="80" y="420">src/api/ / resource_group</text>
  <rect class="card agent" x="650" y="370" width="420" height="72"/>
  <text class="label" x="670" y="398">Dev-Microservice-Azure-ComputeDeploy-AzureFunctions</text>
  <text class="step" x="670" y="420">Step.2.5</text>
  <rect class="card output" x="1160" y="370" width="500" height="72"/>
  <text class="label" x="1180" y="398">infra/azure/create-azure-api-resources-prep.sh</text>
  <text class="label" x="1180" y="420">infra/azure/verify-api-resources.sh</text>

  <!-- Row 4 -->
  <rect class="card input" x="60" y="470" width="500" height="72"/>
  <text class="label" x="80" y="498">docs/screen/ / service-catalog-matrix.md</text>
  <text class="label" x="80" y="520">docs/catalog/test-strategy.md</text>
  <rect class="card agent" x="650" y="470" width="420" height="72"/>
  <text class="label" x="670" y="498">Arch-TDD-TestSpec</text>
  <text class="step" x="670" y="520">Step.3.0T</text>
  <rect class="card output" x="1160" y="470" width="500" height="72"/>
  <text class="label" x="1180" y="510">docs/test-specs/{screenId}-test-spec.md</text>

  <!-- Row 5 -->
  <rect class="card input" x="60" y="570" width="500" height="72"/>
  <text class="label" x="80" y="598">src/app/ / service-catalog-matrix.md</text>
  <text class="label" x="80" y="620">docs/test-specs/</text>
  <rect class="card agent" x="650" y="570" width="420" height="72"/>
  <text class="label" x="670" y="598">E2ETesting-Playwright</text>
  <text class="step" x="670" y="620">Step.3.3</text>
  <rect class="card output" x="1160" y="570" width="500" height="72"/>
  <text class="label" x="1180" y="610">E2E 実行結果（artifact）</text>

  <!-- Row 6 -->
  <rect class="card input" x="60" y="670" width="500" height="72"/>
  <text class="label" x="80" y="698">docs/catalog/service-catalog-matrix.md</text>
  <text class="label" x="80" y="720">src/ / infra/</text>
  <rect class="card agent" x="650" y="670" width="420" height="72"/>
  <text class="label" x="670" y="698">QA-AzureDependencyReview</text>
  <text class="step" x="670" y="720">Step.4.2</text>
  <rect class="card output" x="1160" y="670" width="500" height="72"/>
  <text class="label" x="1180" y="710">docs/azure/dependency-review-report.md</text>

  <!-- Arrows per row -->
  <path class="arrow" d="M560 206 L650 206"/>
  <path class="arrow" d="M1070 206 L1160 206"/>
  <path class="arrow" d="M560 306 L650 306"/>
  <path class="arrow" d="M1070 306 L1160 306"/>
  <path class="arrow" d="M560 406 L650 406"/>
  <path class="arrow" d="M1070 406 L1160 406"/>
  <path class="arrow" d="M560 506 L650 506"/>
  <path class="arrow" d="M1070 506 L1160 506"/>
  <path class="arrow" d="M560 606 L650 606"/>
  <path class="arrow" d="M1070 606 L1160 606"/>
  <path class="arrow" d="M560 706 L650 706"/>
  <path class="arrow" d="M1070 706 L1160 706"/>

  <rect class="legend" x="60" y="790" width="1600" height="150"/>
  <text class="label" x="90" y="828">凡例: 灰=入力ファイル、緑=Custom Agent タスク、紫=出力ファイル</text>
  <text class="label" x="90" y="858">色のセマンティクス: ファイルと実行主体を視覚的に分離し、監査時の差分確認を容易化</text>
  <text class="label" x="90" y="888">読み順: 上から下へ。各行で「入力 → Agent → 出力」の関係を追跡する</text>
</svg>
