  # ============================================================

  - option_key: enable_auto_merge
    issue_form_field_id: enable_auto_merge
    hve_config_attr: null
    hve_cli_flag: "--enable-auto-merge"
    applies_to: issue_form_only
    notes: >
      PR 完全自動化（Approve & Auto-merge）。SDKConfig フィールドなし。
      CLI フラグ --enable-auto-merge は AKM 専用ワークフローパラメータとして存在するが
      SDKConfig には反映されない。hve への大規模 auto merge 実装は Phase 6 スコープ外。
      diff-spec: docs/design-discussions/orchestration-route-diff-spec.md §3.2

