    notes: "QA 用モデル（省略時は model を継承）。config.py:116, __main__.py:605"

  - option_key: branch
    issue_form_field_id: branch
    hve_config_attr: base_branch
    hve_cli_flag: "--branch"
    applies_to: common
    notes: "ベースブランチ。Issue Form ID は branch、SDKConfig は base_branch。config.py:118, __main__.py:870"

  - option_key: enable_qa
    issue_form_field_id: enable_qa
