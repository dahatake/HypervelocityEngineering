# Option Parity Matrix — Issue Form / SDKConfig / CLI 対応表
#
# 目的: Issue Template 系フィールドと hve 系（SDKConfig フラグ / CLI 引数）の対応を
#       一元管理し、乖離を自動検出するための SSoT fixture。
#
# applies_to 値:
#   common        : Issue Form + SDKConfig の両系統に存在するオプション。
#                   hve_cli_flag が非 null の場合は CLI にも存在することを検証する。
#   issue_form_only: Issue Form のみに存在し、hve SDKConfig には対応フィールドがない。
#   hve_only      : hve SDKConfig のみに存在し、Issue Form には露出しない。
#
# 根拠ファイル:
#   hve/config.py:111-     (SDKConfig dataclass フィールド定義)
#   hve/__main__.py:566-   (orchestrate サブコマンド CLI 引数定義)
#   .github/ISSUE_TEMPLATE/*.yml  (Issue Form フィールド ID)
#   docs/design-discussions/orchestration-route-diff-spec.md (差分仕様)
#
schema_version: "1.0"

# SDKConfig フィールドのカバレッジチェック除外リスト。
# 以下はインフラ設定・出力制御・実行時内部フラグであり Issue Form に露出しない。
sdkconfig_internal_fields:
  - additional_prompt               # CLI 経由のみ (--additional-prompt)
  - auto_coding_agent_review_auto_approval  # hve 内部の自動承認フラグ
  - available_tools                 # SDK ツール許可リスト（内部、CLI/環境変数経由）
  - cli_args                        # SDK 追加 CLI 引数（内部）
  - cli_path                        # Copilot CLI パス（インフラ）
  - cli_url                         # 外部 CLI サーバー URL（インフラ）
  - context_injection_max_chars     # 各フェーズの注入文字数上限（チューニング、HVE_CONTEXT_INJECTION_MAX_CHARS）
  - create_issues                   # GitHub Issue 作成（hve 固有インフラ）
  - create_pr                       # GitHub PR 作成（hve 固有インフラ）
  - custom_agents_config            # SDK Custom Agent 設定（内部）
  - dry_run                         # ドライランモード（テスト用）
  - final_only                      # 最終出力のみ表示（出力制御）
  - force_interactive               # TTY 判定バイパス（QA 内部）
  - fork_on_retry                   # Sub-11: Fork-integration の失敗時自動フォーク（内部、HVE_FORK_ON_RETRY）
  - excluded_tools                  # SDK ツール除外リスト（内部、CLI/環境変数経由）
  - github_token                    # 認証トークン（インフラ）
  - ignore_paths                    # git add 除外パス（ファイル管理）
  - log_level                       # CLI ログレベル（出力制御）
  - max_diff_chars                  # git diff 最大文字数（チューニング）
  - max_parallel                    # 並列実行上限（チューニング）
  - mcp_servers                     # MCP Server 設定（SDK 内部）
  - model_override                  # 緊急回避用モデル上書き
  - no_color                        # ANSI カラー無効化（出力制御）
  - qa_answer_mode                  # QA 回答モード（QA 内部）
  - qa_auto_defaults                # QA 全問デフォルト採用（QA 内部）
  - qa_input_timeout_seconds        # QA 回答タイムアウト（タイムアウト）
  - quiet                           # 出力抑制（レガシー互換）
  - repo                            # リポジトリ指定（インフラ）
  - require_input_artifacts         # strict モード（実行時内部）
  - review_base_ref                 # git diff 基点（レビュー内部）
  - review_timeout_seconds          # レビュータイムアウト（タイムアウト）
  - run_id                          # 実行 ID（内部トラッキング）
  - screen_reader                   # スクリーンリーダーモード（アクセシビリティ）
  - self_improve_goal               # SI タスクゴール（SI 詳細設定）
  - self_improve_max_requests       # SI リクエスト上限（コストリミット）
  - self_improve_max_tokens         # SI トークン上限（コストリミット）
  - self_improve_scope              # SI 実行単位（SI 内部）
  - self_improve_skip               # SI 無効フラグ（SI 内部）
  - self_improve_success_criteria   # SI 成功基準（SI 内部）
  - self_improve_target_scope       # SI 対象パス（SI 内部）
  - session_id_prefix               # Resume 用セッション prefix（内部）
  - show_banner                     # バナー表示制御（出力制御）
  - show_reasoning                  # 推論表示（出力制御）
  - show_stream                     # トークンストリーム表示（出力制御）
  - timeout_seconds                 # idle タイムアウト（タイムアウト）
  - timestamp_style                 # タイムスタンプ表示位置（出力制御）
  - unattended                      # 全自動モード（自動化用）
  - verbose                         # 詳細出力（レガシー互換）
  - verbosity                       # 出力レベル（出力制御）
  - workiq_akm_ingest_dxx           # AKM Work IQ 取り込み Dxx フィルタ（内部、HVE_WORKIQ_AKM_INGEST_DXX）
  - workiq_akm_ingest_enabled       # AKM Work IQ 取り込み有効フラグ（内部、HVE_WORKIQ_AKM_INGEST_ENABLED）

# Issue Form フィールド ID のカバレッジチェック除外リスト。
# 以下はワークフロー固有パラメータ・UI 入力ゲート・テキスト入力で選択式オプションではない。
issue_form_internal_fields:
  - additional_comment      # ユーザー向けテキスト補足（UI 用、web-app-dev.yml 等）
  - additional_context      # self-improve.yml 専用テキスト補足
  - app_ids                 # ワークフロー固有パラメータ（APP-ID 指定）
  - batch_job_ids           # ワークフロー固有パラメータ（batch-dev.yml 専用）
  - confirmation            # self-improve.yml UI 確認ゲート
  - depth                   # AQOD 専用パラメータ（original-docs-review.yml）
  - doc_purpose             # ADOC 専用パラメータ（sourcecode-to-documentation.yml）
  - exclude_patterns        # ADOC 専用パラメータ
  - focus_areas             # AQOD 専用パラメータ
  - force_refresh           # AKM 専用パラメータ（knowledge-management.yml）
  - improvement_targets     # self-improve.yml 専用
  - max_file_lines          # ADOC 専用パラメータ
  - max_iterations          # self-improve.yml 専用（self_improve_max_iterations の別名）
  - quality_threshold       # self-improve.yml 専用（self_improve_quality_threshold の別名）
  - resource_group          # ワークフロー固有パラメータ（Azure RG 名）
  - sources                 # AKM 専用パラメータ（knowledge-management.yml）
  - steps                   # ワークフロー固有パラメータ（ステップ選択）
  - target_dirs             # ADOC 専用パラメータ
  - target_files            # AKM 専用パラメータ
  - target_scope            # AQOD / self-improve 専用パラメータ
  - task_goal               # self-improve.yml 専用
  - usecase_id              # ワークフロー固有パラメータ（APP-ID 系）

options:
  # ============================================================
  # common: Issue Form と SDKConfig の両系統に存在するオプション
  # ============================================================

  - option_key: model
    issue_form_field_id: model
    hve_config_attr: model
    hve_cli_flag: "--model"
    applies_to: common
    notes: "使用モデル選択。Auto + MODEL_CHOICES の5種。config.py:MODEL_CHOICES, __main__.py:590"

  - option_key: review_model
    issue_form_field_id: review_model
    hve_config_attr: review_model
    hve_cli_flag: "--review-model"
    applies_to: common
    notes: "レビュー専用モデル（省略時は model を継承）。config.py:115, __main__.py:596"

  - option_key: qa_model
    issue_form_field_id: qa_model
    hve_config_attr: qa_model
    hve_cli_flag: "--qa-model"
