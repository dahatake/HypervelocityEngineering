<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-eval' qrc:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' qrc:;" />
  <title>HVE PTY Terminal</title>
  <link rel="stylesheet" href="vendor/xterm/css/xterm.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1e1e1e;
      overflow: hidden;
      font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
    }
    #term {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 4px;
    }
    .xterm .xterm-viewport { background-color: #1e1e1e !important; }
  </style>
</head>
<body>
  <div id="term"></div>
  <!-- xterm.js UMD bundles expose globals: window.Terminal / window.FitAddon -->
  <script src="vendor/xterm/lib/xterm.js"></script>
  <script src="vendor/xterm-addon-fit/lib/addon-fit.js"></script>
  <!--
    QWebChannel runtime is injected by Qt itself via qrc:/qtwebchannel/qwebchannel.js.
    See: https://doc.qt.io/qt-6/qtwebchannel-javascript.html
  -->
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
