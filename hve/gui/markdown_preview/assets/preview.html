<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Preview</title>
<link rel="stylesheet" href="katex.min.css">
<style>
  body { font-family: -apple-system, "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif; padding: 16px; line-height: 1.6; color: #222; }
  h1, h2, h3 { border-bottom: 1px solid #eee; padding-bottom: 4px; }
  code { background: #f5f5f5; padding: 1px 4px; border-radius: 3px; font-family: Consolas, "Yu Gothic UI", monospace; }
  pre { background: #f5f5f5; padding: 8px; border-radius: 4px; overflow-x: auto; }
  pre code { background: transparent; padding: 0; }
  table { border-collapse: collapse; margin: 8px 0; }
  th, td { border: 1px solid #ccc; padding: 4px 8px; }
  blockquote { border-left: 3px solid #ccc; margin: 8px 0; padding: 0 12px; color: #555; }
  /* Pygments 出力用の最低限スタイル (実際の色は CodeHighlighter が style.css を埋め込む) */
  div.highlight pre { margin: 0; }
</style>
</head>
<body>
<div id="content">{{CONTENT}}</div>
<!--
  Mermaid / KaTeX は LICENSE-third-party.md の手順で手動配置される。
  未配置時は script のロードが 404 となるがページ自体は表示される。
-->
<script src="mermaid.min.js" onerror="window.__noMermaid=true"></script>
<script src="katex.min.js" onerror="window.__noKatex=true"></script>
<script src="katex-auto-render.min.js" onerror="window.__noKatexAuto=true"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (!window.__noMermaid && window.mermaid) {
      try {
        mermaid.initialize({ startOnLoad: false, theme: 'default' });
        mermaid.run({ querySelector: 'div.mermaid' });
      } catch (e) { console.error('mermaid init failed:', e); }
    }
    if (!window.__noKatexAuto && window.renderMathInElement) {
      try {
        renderMathInElement(document.body, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false }
          ],
          throwOnError: false
        });
      } catch (e) { console.error('katex render failed:', e); }
    }
  });
</script>
</body>
</html>
