# Azure MCP Server / Azure CLI 認証フロー manifest
#
# 適用条件: MCP サーバ名が "azure" / "az" / "azure-mcp" 等。
# 認証フロー:
#   1. `az login` を PTY 実行 (ブラウザが自動起動、サブスクリプション選択ダイアログが出る)
#   2. 完了後、`copilot` に Azure MCP のツール一覧確認プロンプトを流して疎通する

id: azure_mcp
display_name: "Azure MCP"

match:
  mcp_server_name_regex: "^(azure|az)(-mcp)?$"

pre_auth_commands:
  - argv: ["az", "login"]
    # Azure CLI が `az login` 成功時に出力する代表的なメッセージ。
    # 既知の出力例:
    #   "You have logged in. Now let us find all the subscriptions to which you have access..."
    # 日本語ロケールでも英語パスは併記される傾向だが、保証はない。
    # サブスクリプションが選択され "Subscription is set to" が出るのが確定シグナル。
    success_regex: "(?i)(Subscription is set to|Tenant.*Subscription)"
    failure_regex: "(?i)(ERROR|authentication failed|AADSTS)"
    timeout: 600

copilot_seed_prompt: |
  Azure MCP サーバから利用可能なツール一覧を取得し、認証が正しく行われていることを確認してください。

success_regex: "(?i)(tool|tools).{0,40}(available|registered|listed)"
failure_regex: "(?i)(unauthorized|forbidden|authentication failed)"
timeout_total: 900

notes_md: |
  ## Azure MCP 認証手順

  1. `az login` 実行時、規定ブラウザが開きます。Microsoft アカウントでサインインしてください。
  2. **複数サブスクリプションがある場合**、ターミナルに番号付きリストが表示されます。
     - 矢印キー (↑↓) で対象を選び **Enter** で確定してください。
     - もしくは表示された番号を入力して **Enter**。
  3. "Subscription is set to ..." が出れば成功です。
  4. 続いて Copilot CLI から Azure MCP の疎通確認が走ります。
