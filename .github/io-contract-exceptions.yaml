# IO Contract validation exceptions
#
# Used by .github/scripts/validate-io-contract.py to skip producer/consumer
# integrity checks for paths that are:
#   - Statically bundled in the repository (not produced by any agent)
#   - Provided by external systems (not in scope of agent catalog)
#   - Agents whose io_contract is known to be incomplete (transitional)

# Static/repo-bundled paths (no producer needed)
static_paths:
  - "users-guide/01-business-requirement.md"
  - "users-guide/08-ai-agent.md"
  - "docs/templates/atdd-template.md"
  - "docs/templates/testspec-vs-teststrategy.md"
  - "data/sample-data.json"
  - "src/data/sample-data.json"
  - ".github/skills/microservice-design-guide/references/microservice-definition.md"
  - "qa/"
  # Directory-only references (treated as static for now; actual file producers
  # are matched via path globs below)
  - "docs/usecase/"
  - "test/"
  - "test/api/"
  - "test/agent/"
  - "test/ui/"
  - "test/dataflow/"
  # Cross-WORK references (handled by orchestrator at runtime)
  - "{WORK}../QA-CodeQualityScan/artifacts/scan-result.json"
  # Path missing in inventory due to extraction quirk; documented in
  # work/IO-Consistency/T5.1/verification-report.md
  - "docs/architectural-requirements-app-xx.md"  # template literal, not a real producible file
  - "docs/architectural-requirements-app-*.md"   # per-APP file, manually authored
  # Variable-name divergence: legacy aliases retained for backward compat with
  # older docs/branches. Current canonical paths are produced by current agents.
  - "docs/screen/{画面ID}-*.md"
  - "docs/screen/{画面ID}-description.md"
  - "docs/services/SVC-*.md"
  - "docs/agent/agent-detail-{agentId}-*.md"
  # Directory-only references (producers output specific files within)
  - "src/agent/"
  - "src/api/"
  - "infra/"
  - "infra/azure/"
  - "config/"
  - ".github/workflows/"
  - "test/api/<ServiceName>.Tests/"
  - "test/SVC-*/smoke-test.sh"
  # KnowledgeManager-specific manual/external inputs (handled via kind:static)
  - "work/kpi/fork-kpi-<run_id>.jsonl"
  - "app_location=src/app/"  # extraction artifact (Bicep param syntax)

# External system paths (out of scope)
external_paths: []

# Agents whose contract is incomplete (skip integrity but still schema-validate)
skip_agents:
  # Doc-* agents take generic file lists as input; their inputs are not strict producer/consumer pairs.
  - "Doc-APISpec"
  - "Doc-ArchOverview"
  - "Doc-CICDSummary"
  - "Doc-ComponentDesign"
  - "Doc-ComponentIndex"
  - "Doc-ConfigSummary"
  - "Doc-DataModel"
  - "Doc-DependencyMap"
  - "Doc-FileInventory"
  - "Doc-FileSummary"
  - "Doc-InfraDeps"
  - "Doc-LargeFileSummary"
  - "Doc-Migration"
  - "Doc-NFRAnalysis"
  - "Doc-Onboarding"
  - "Doc-Refactoring"
  - "Doc-TechDebt"
  - "Doc-TestSpecSummary"
  - "Doc-TestSummary"
