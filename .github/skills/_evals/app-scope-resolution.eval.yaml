skill: app-scope-resolution
skill_path: .github/skills/planning/app-scope-resolution/SKILL.md
description: APP-ID に基づくスコープ解決ルール。Issue body から APP-ID を取得し、app-catalog.md との紐付けで対象サービス・画面・エンティティを特定する。AAD-WEB/ASDW-WEB/ABD/ABDV では app-arch-catalog.md の推薦アーキテクチャで自動フィルタリングする。

test_cases:
  # --- 正のテストケース ---
  - id: resolve-app-id-from-issue-body
    input: "Issue body に <!-- app-id: APP-03 --> が記載されている。対象サービスと画面を特定してほしい"
    expected_trigger: true
    verify:
      - type: action
        detail: "docs/catalog/app-catalog.md を参照して APP-03 に紐付くサービス・画面・エンティティを特定する"
    reason: "USE FOR: APP-ID scope resolution に該当する"

  - id: identify-services-for-app
    input: "APP-ID のスコープを解決してください。app-catalog.md から APP-05 に属するサービス一覧を取得する"
    expected_trigger: true
    verify:
      - type: action
        detail: "APP-05 に紐付くサービス一覧をカンマ区切りで取得する（N:N 関係）"
    reason: "WHEN: APP-ID のスコープ解決 に該当する"

  - id: aad-web-no-app-id-uses-arch-filter
    input: "aad-web ワークフローで APP-ID が未指定の場合、何を対象にするか"
    expected_trigger: true
    verify:
      - type: action
        detail: "docs/catalog/app-arch-catalog.md の A) サマリ表（全APP横断）を参照し、推薦アーキテクチャ = Webフロントエンド + クラウド の APP-ID のみを対象にする"
    reason: "AAD-WEB では APP-ID 未指定時に全対象とせず推薦アーキテクチャでフィルタリングする"

  - id: abd-no-app-id-uses-arch-filter
    input: "abd ワークフローで APP-ID が未指定の場合、何を対象にするか"
    expected_trigger: true
    verify:
      - type: action
        detail: "docs/catalog/app-arch-catalog.md の A) サマリ表（全APP横断）を参照し、推薦アーキテクチャ = データバッチ処理 または バッチ の APP-ID のみを対象にする"
    reason: "ABD では APP-ID 未指定時に全対象とせず推薦アーキテクチャでフィルタリングする"

  # --- 負のテストケース ---
  - id: not-for-service-implementation
    input: "SVC-10 の get_ticket_status エンドポイントを Python で実装してほしい"
    expected_trigger: false
    expected_skill: null
    reason: "DO NOT USE FOR: service implementation に該当する。実装は Dev 系 Agent が担当"

  - id: not-for-data-modeling
    input: "ポイント管理ドメインのエンティティ関連図（erDiagram）を作成してほしい"
    expected_trigger: false
    expected_skill: null
    reason: "DO NOT USE FOR: data modeling に該当する。データモデリングは Arch-DataModeling Agent が担当"

  # --- エッジケース ---
  - id: edge-app-id-in-html-comment-vs-plain-text
    input: "Issue body に 'APP-ID: APP-07' とプレーンテキストで書かれている（HTMLコメント形式ではない）"
    expected_trigger: true
    verify:
      - type: action
        detail: "HTMLコメント形式で見つからない場合、Issue body 本文から APP-ID らしき記述を検索するフォールバックを実行する"
    reason: "APP 取得手順のステップ2（フォールバック: Issue body 本文から検索）に該当するエッジケース"
