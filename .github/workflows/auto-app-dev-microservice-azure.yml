name: ASDW Orchestrator

# auto-app-dev-microservice ラベル付き Issue の opened/labeled/closed イベントで起動
#
# 設計メモ:
#   - Issue Template の labels: でラベルを付与した場合、GitHub は issues.labeled イベントを
#     発火せず issues.opened のみを発火する（GitHub Community Discussion #26753）。
#   - そのため opened イベントも監視し、ジョブレベル if で対象ラベルを持つ Issue のみ実行する。
#   - opened イベント時は github.event.label が null のため LABEL_NAME は空文字列になる。
#   - 既存の冪等化ガード（asdw:initialized チェック）により、opened + labeled が同時発火しても安全。
on:
  issues:
    types: [opened, labeled, closed]

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    if: >
      github.event.action != 'opened'
      || (
        contains(github.event.issue.labels.*.name, 'auto-app-dev-microservice')
        && contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
      )
    concurrency:
      group: asdw-orchestrator-${{ github.event.issue.number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}

    steps:
      # ----------------------------------------------------------------
      # 1. 実行ゲート: auto-app-dev-microservice ラベルあり + asdw:initialized なし
      # ----------------------------------------------------------------
      - name: 実行ゲートチェック
        id: gate
        env:
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: "${{ github.event.label.name || '' }}"
        run: |
          set -euo pipefail

          # Issue title を API 経由で安全に取得（YAML 展開問題を回避）
          ISSUE_TITLE=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          export ISSUE_TITLE

          # labeled イベントの処理
          if [[ "${EVENT_ACTION}" == "labeled" ]]; then
            if [[ "${LABEL_NAME}" == "asdw:done" ]]; then
              echo "mode=state_transition" >> "$GITHUB_OUTPUT"
              echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
              exit 0
            elif [[ "${LABEL_NAME}" == "auto-app-dev-microservice" ]]; then
              # auto-app-dev-microservice ラベルが後から付与された場合:
              # 下の has_asdw / has_init チェックが未初期化かどうかを判定し、未初期化なら initialize に進む。
              # 既に asdw:initialized 済みの場合は has_init チェックで skip になる。
              echo "auto-app-dev-microservice labeled イベント: initialize ゲートチェックへ進みます。"
            else
              echo "asdw:done / auto-app-dev-microservice 以外の labeled イベント（${LABEL_NAME}）。スキップ。"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # closed イベントの処理
          if [[ "${EVENT_ACTION}" == "closed" ]]; then
            # [ASDW] Sub Issue のみ処理
            if [[ "${ISSUE_TITLE}" =~ ^\[ASDW\] ]]; then
              # ---- ラベル一覧はイベントペイロードのものを使用（API 呼び出しを削減） ----
              # 既に asdw:done がついていれば labeled イベントが後で来るのでスキップ
              has_done=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          print('true' if 'asdw:done' in labels else 'false')
          PY
              )
              if [[ "${has_done}" == "true" ]]; then
                echo "既に asdw:done ラベル済み。closed イベントをスキップ（labeled イベントで処理済み or 処理中）。"
                echo "mode=skip" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              # asdw:done がない場合は closed イベントから直接 state_transition を起動
              echo "mode=state_transition" >> "$GITHUB_OUTPUT"
              echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "closed イベント: [ASDW] Sub Issue 以外のためスキップ。"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # [ASDW] プレフィックスを持つ Sub Issue は初期化をスキップ
          # （Sub Issue の opened イベントによる再帰的な初期化を防止）
          if [[ "${ISSUE_TITLE}" =~ ^\[ASDW\] ]]; then
            echo "[ASDW] Sub Issue のため初期化対象外。スキップ。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ---- リアルタイムにラベル一覧を API 経由で取得（payload はスナップショットのため） ----
          ISSUE_LABELS=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.dumps([l['name'] for l in json.load(sys.stdin).get('labels',[])]))")
          echo "リアルタイムラベル: ${ISSUE_LABELS}"
          # auto-app-dev-microservice ラベルを持つか確認
          has_asdw=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          print('true' if 'auto-app-dev-microservice' in labels else 'false')
          PY
          )

          if [[ "${has_asdw}" != "true" ]]; then
            echo "auto-app-dev-microservice ラベルなし。スキップ。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # asdw:initialized / asdw:ready / asdw:running / asdw:done / asdw:blocked
          # のいずれかを持つ場合はスキップ（冪等化・Sub Issue への誤再初期化防止）
          has_init=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          skip_labels = {'asdw:initialized', 'asdw:ready', 'asdw:running', 'asdw:done', 'asdw:blocked'}
          print('true' if any(l in skip_labels for l in labels) else 'false')
          PY
          )

          if [[ "${has_init}" == "true" ]]; then
            echo "asdw:* ラベル済み。スキップ（冪等化）。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=initialize" >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: ゲート結果のデバッグ出力
        if: always()
        env:
          GATE_MODE: ${{ steps.gate.outputs.mode }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          echo "::notice::ゲート判定結果: mode=${GATE_MODE}, event=${EVENT_ACTION}, issue=#${ISSUE_NUMBER}"
          if [[ "${GATE_MODE}" == "skip" ]]; then
            echo "::notice::Issue #${ISSUE_NUMBER} のゲートチェックは skip でした（event: ${EVENT_ACTION}）"
          fi

      # ----------------------------------------------------------------
      # 2. ラベル bootstrap
      # ----------------------------------------------------------------
      - name: ラベル bootstrap
        if: steps.gate.outputs.mode == 'initialize'
        run: |
          set -euo pipefail

          # ラベルを作成する関数（422 = 既存の場合は無視）
          create_label() {
            local name="$1"
            local color="$2"
            local desc="$3"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/labels" \
              -d "{\"name\":\"${name}\",\"color\":\"${color}\",\"description\":\"${desc}\"}")
            if [[ "${http_code}" == "201" ]]; then
              echo "ラベル作成: ${name}"
            elif [[ "${http_code}" == "422" ]]; then
              echo "ラベル既存（スキップ）: ${name}"
            else
              echo "ラベル作成エラー: ${name} HTTP ${http_code}"
            fi
            sleep 1
          }

          create_label "auto-app-dev-microservice" "1D76DB" "run full microservice app development workflow on Azure"
          create_label "asdw:initialized"           "C5DEF5" ""
          create_label "asdw:ready"                 "0075CA" ""
          create_label "asdw:running"               "E4E669" ""
          create_label "asdw:done"                  "0E8A16" ""
          create_label "asdw:blocked"               "D73A4A" ""
          create_label "asdw:test-failed"           "EE0701" "test execution failed (TDD RED not confirmed or GREEN not reached)"
          create_label "auto-context-review"       "1D76DB" "auto context review trigger for copilot-auto-review workflow"
          create_label "auto-qa"                    "BFD4F2" "auto qa trigger for copilot-auto-qa workflow"
          create_label "auto-approve-ready"          "1D76DB" "Ready for auto-approve and auto-merge"

      # ----------------------------------------------------------------
      # 2.5. 即時 asdw:initialized 付与（二重実行防止）
      # ----------------------------------------------------------------
      - name: 即時 asdw:initialized 付与（二重実行防止）
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail
          max_retries=5
          attempt=1
          http_code=""
          while (( attempt <= max_retries )); do
            http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/labels" \
              -d '{"labels":["asdw:initialized"]}')
            if [[ "${http_code}" =~ ^2 ]]; then
              echo "asdw:initialized を Issue #${ISSUE_NUMBER} に付与しました。（HTTP ${http_code}）"
              break
            fi
            if (( attempt == max_retries )); then
              echo "ERROR: asdw:initialized の付与に失敗しました。HTTP ${http_code}（試行回数: ${attempt}/${max_retries}）" >&2
              exit 1
            fi
            echo "WARN: asdw:initialized の付与に失敗しました。HTTP ${http_code}（試行回数: ${attempt}/${max_retries}）。リトライします..." >&2
            sleep $(( 2 ** (attempt - 1) ))
            attempt=$(( attempt + 1 ))
          done

      # ----------------------------------------------------------------
      # 2.6. リポジトリ checkout（state_transition で auto-close.sh を利用するため）
      # ----------------------------------------------------------------
      - name: Checkout repository
        if: steps.gate.outputs.mode != 'skip'
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 3. Issue body パース & Step Issue 生成
      # ----------------------------------------------------------------
      - name: 成果物ディレクトリの事前作成
        if: steps.gate.outputs.mode == 'initialize'
        run: |
          # 成果物ディレクトリの事前作成
          mkdir -p docs/catalog
          mkdir -p docs/batch
          mkdir -p docs/batch/jobs
          mkdir -p docs/services
          mkdir -p docs/screen
          mkdir -p docs/test-specs
          mkdir -p docs/agent
          mkdir -p docs/azure
          mkdir -p docs/usecase

      - name: Issue 初期化とStep Issue 生成
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail

          # Issue body を API 経由で安全に取得（YAML 展開問題を回避）
          ISSUE_BODY=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          export ISSUE_BODY

          if [[ -z "${COPILOT_PAT}" ]]; then
            echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインは全てスキップされます。" >&2
          fi

          ROOT_ISSUE="${ISSUE_NUMBER}"

          # ---- ユーティリティ関数 ----

          # リトライ付き curl
          api_call() {
            local method="$1"; shift
            local url="$1"; shift
            local data="${1:-}"
            local max_retry=5
            local wait=1
            local http_code response body

            for i in $(seq 1 "${max_retry}"); do
              if [[ -n "${data}" ]]; then
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  -H "Content-Type: application/json" \
                  "${url}" \
                  -d "${data}")
              else
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${url}")
              fi
              http_code=$(echo "${response}" | tail -1)
              body=$(echo "${response}" | head -n -1)
              if [[ "${http_code}" =~ ^2 ]]; then
                echo "${body}"
                return 0
              fi
              echo "API エラー: HTTP ${http_code}、${wait}秒後にリトライ (${i}/${max_retry})" >&2
              sleep "${wait}"
              wait=$((wait * 2))
            done
            echo "API 呼び出し失敗: ${method} ${url}" >&2
            return 1
          }

          # Issue 作成
          create_issue() {
            local title="$1"
            local body="$2"
            local labels_json="$3"
            local data
            data=$(python3 - "${title}" "${body}" "${labels_json}" <<'PY'
          import json, sys
          title = sys.argv[1]
          body  = sys.argv[2]
          labels = json.loads(sys.argv[3])
          print(json.dumps({'title': title, 'body': body, 'labels': labels}))
          PY
          )
            api_call POST "https://api.github.com/repos/${REPO}/issues" "${data}"
          }

          # Sub Issue 紐付け
          link_sub_issue() {
            local parent_num="$1"
            local child_id="$2"
            local data="{\"sub_issue_id\":${child_id}}"
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${parent_num}/sub_issues" \
              "${data}" || true
            sleep 1
          }

          # ラベル付与
          add_label() {
            local issue_num="$1"
            local label="$2"
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/labels" \
              "{\"labels\":[\"${label}\"]}" > /dev/null
            sleep 1
          }

          # アサイン
          assign_copilot() {
            local issue_num="$1"
            local custom_agent="${2:-}"
            local base_branch="${3:-main}"
            local custom_instructions="${4:-}"
            local model_raw="${5:-}"
            local selected_model
            if [[ -z "${model_raw}" || "${model_raw}" == "Auto" ]]; then
              selected_model="claude-opus-4-7"
            else
              selected_model="${model_raw}"
            fi

            echo "=== Copilot アサイン開始: Issue #${issue_num} ==="
            echo "  custom_agent: ${custom_agent}"
            echo "  base_branch: ${base_branch}"

            # 冪等化ガード: 既に copilot-swe-agent がアサインされている場合はスキップ
            local current_assignees
            current_assignees=$(curl -s \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}" \
              | python3 /dev/fd/3 3<<'PY'
          import sys, json
          try:
              d = json.load(sys.stdin)
              if not isinstance(d, dict):
                  print('false')
                  sys.exit(0)
              assignees = [a.get('login', '') for a in d.get('assignees', [])]
              print('true' if 'copilot-swe-agent' in assignees or 'Copilot' in assignees else 'false')
          except Exception:
              print('false')
          PY
            ) || true

            if [[ "${current_assignees}" == "true" ]]; then
              echo "  copilot-swe-agent は既にアサイン済みです。スキップします。"
              return 0
            fi

            # 冪等化ガード: 対象 Issue に紐づく Open な PR が既に存在する場合はスキップ
            local existing_prs
            existing_prs=$(curl -s \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/timeline?per_page=100" \
              | python3 /dev/fd/3 3<<'PY'
          import sys, json
          try:
              events = json.load(sys.stdin)
              if not isinstance(events, list):
                  print('false')
                  sys.exit(0)
          except Exception:
              print('false')
              sys.exit(0)
          for e in events:
              if e.get('event') == 'cross-referenced':
                  source = e.get('source', {}).get('issue', {})
                  pr = source.get('pull_request', {})
                  if pr and source.get('state') == 'open':
                      print('true')
                      sys.exit(0)
          print('false')
          PY
            ) || true

            if [[ "${existing_prs}" == "true" ]]; then
              echo "  Issue #${issue_num} に紐づく Open な PR が既に存在します。スキップします。"
              return 0
            fi

            if [[ -z "${COPILOT_PAT}" ]]; then
              echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインをスキップします。" >&2
              return 1
            fi

            local OWNER="${REPO%/*}"
            local REPO_NAME="${REPO#*/}"

            local max_assign_retry=3
            local assign_wait=5
            local assign_success=false

            for assign_attempt in $(seq 1 "${max_assign_retry}"); do
              echo "  アサイン試行 ${assign_attempt}/${max_assign_retry}..."

              # 1回のクエリで bot_id / issue_node_id / repo_node_id をまとめて取得
              local query_result
              query_result=$(GH_TOKEN="${COPILOT_PAT}" gh api graphql \
                -f query="
          query(\$issueNumber: Int!) {
            repository(owner: \"${OWNER}\", name: \"${REPO_NAME}\") {
              id
              issue(number: \$issueNumber) { id }
              suggestedActors(capabilities: [CAN_BE_ASSIGNED], first: 100) {
                nodes {
                  login
                  ... on Bot { id databaseId }
                }
              }
            }
          }
                " \
                -F issueNumber="${issue_num}" \
                2>&1) || true

              echo "  GraphQL クエリ結果: ${query_result}"

              if [[ -z "${query_result}" ]]; then
                echo "WARNING: GraphQL クエリの実行に失敗しました。試行 ${assign_attempt}/${max_assign_retry}" >&2
                sleep "${assign_wait}"
                assign_wait=$((assign_wait * 2))
                continue
              fi

              local bot_id issue_node_id repo_node_id
              IFS=$'\t' read -r bot_id issue_node_id repo_node_id < <(echo "${query_result}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          d = json.load(sys.stdin)
          repo = d.get('data', {}).get('repository', {})
          bot = ''
          for a in repo.get('suggestedActors', {}).get('nodes', []):
              if a.get('login') == 'copilot-swe-agent':
                  bot = a.get('id', '')
                  break
          issue = repo.get('issue', {}).get('id', '')
          print(bot + '\t' + issue + '\t' + repo.get('id', ''))
          PY
              ) || true

              if [[ -z "${bot_id}" ]]; then
                echo "WARNING: copilot-swe-agent の Bot ID を取得できませんでした。試行 ${assign_attempt}/${max_assign_retry}" >&2
                sleep "${assign_wait}"
                assign_wait=$((assign_wait * 2))
                continue
              fi
              if [[ -z "${issue_node_id}" ]]; then
                echo "WARNING: Issue #${issue_num} の Node ID を取得できませんでした。試行 ${assign_attempt}/${max_assign_retry}" >&2
                sleep "${assign_wait}"
                assign_wait=$((assign_wait * 2))
                continue
              fi
              if [[ -z "${repo_node_id}" ]]; then
                echo "WARNING: Repository の Node ID を取得できませんでした。試行 ${assign_attempt}/${max_assign_retry}" >&2
                sleep "${assign_wait}"
                assign_wait=$((assign_wait * 2))
                continue
              fi
              echo "  Bot ID: ${bot_id}, Issue Node ID: ${issue_node_id}, Repo Node ID: ${repo_node_id}"

              # addAssigneesToAssignable mutation（全変数を -f/-f フラグで渡す・インジェクション防止）
              local result
              result=$(GH_TOKEN="${COPILOT_PAT}" gh api graphql \
                -H 'GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection' \
                -f query="
          mutation(\$assignableId: ID!, \$botId: ID!, \$targetRepositoryId: ID!, \$baseRef: String!, \$customInstructions: String!, \$customAgent: String!, \$model: String!) {
            addAssigneesToAssignable(input: {
              assignableId: \$assignableId,
              assigneeIds: [\$botId],
              agentAssignment: {
                targetRepositoryId: \$targetRepositoryId,
                baseRef: \$baseRef,
                customInstructions: \$customInstructions,
                customAgent: \$customAgent,
                model: \"\"
              }
            }) {
              assignable {
                ... on Issue {
                  id
                  title
                  assignees(first: 10) {
                    nodes { login }
                  }
                }
              }
            }
          }
                " \
                -f assignableId="${issue_node_id}" \
                -f botId="${bot_id}" \
                -f targetRepositoryId="${repo_node_id}" \
                -f baseRef="${base_branch}" \
                -f customInstructions="${custom_instructions}" \
                -f customAgent="${custom_agent}" \
                -f model="${selected_model}" \
                2>&1) || true

              echo "  GraphQL mutation レスポンス: ${result}"

              # mutation レスポンスのエラーチェック
              local has_errors
              has_errors=$(echo "${result}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          try:
              d = json.load(sys.stdin)
              print('true' if d.get('errors') else 'false')
          except Exception:
              print('true')
          PY
              ) || true

              if [[ "${has_errors}" == "true" ]]; then
                echo "WARNING: GraphQL mutation にエラーが含まれています。試行 ${assign_attempt}/${max_assign_retry}" >&2
                sleep "${assign_wait}"
                assign_wait=$((assign_wait * 2))
                continue
              fi

              # copilot-swe-agent が assignees に含まれるか検証
              local is_assigned
              is_assigned=$(echo "${result}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          try:
              d = json.load(sys.stdin)
              nodes = d.get('data', {}).get('addAssigneesToAssignable', {}).get('assignable', {}).get('assignees', {}).get('nodes', [])
              print('true' if any(a.get('login') in ('copilot-swe-agent', 'Copilot') for a in nodes) else 'false')
          except Exception:
              print('false')
          PY
              ) || true

              if [[ "${is_assigned}" == "true" ]]; then
                echo "  copilot-swe-agent のアサインを確認しました。"
                assign_success=true
                break
              fi

              echo "WARNING: copilot-swe-agent が assignees に含まれていません。試行 ${assign_attempt}/${max_assign_retry}" >&2
              sleep "${assign_wait}"
              assign_wait=$((assign_wait * 2))
            done

            if [[ "${assign_success}" != "true" ]]; then
              local fail_msg
              fail_msg=$(printf '⚠️ Copilot cloud agent (copilot-swe-agent) を Issue #%s にアサインできませんでした。\n\n手動でアサインする手順:\n1. Issue #%s を開く\n2. 右サイドバーの「Assignees」から `copilot-swe-agent` を選択する\n\n失敗原因として考えられるもの:\n- `COPILOT_PAT` の権限不足または失効\n- Copilot cloud agent が有効化されていない\n- GraphQL API の一時的な障害' "${issue_num}" "${issue_num}")
              post_comment "${issue_num}" "${fail_msg}" || true
              echo "WARNING: Issue #${issue_num} へのアサイン失敗通知を投稿しました。" >&2
              return 1
            fi

            echo "=== Copilot アサイン完了: Issue #${issue_num} ==="
            sleep 2
          }

          # コメント投稿
          post_comment() {
            local issue_num="$1"
            local comment_body="$2"
            local data
            data=$(python3 -c "import sys,json; print(json.dumps({'body': sys.argv[1]}))" "${comment_body}")
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/comments" \
              "${data}" > /dev/null
            sleep 1
          }

          # Issue body から Custom Agent 名を抽出
          extract_model() {
            local body="$1"
            echo "${body}" | python3 /dev/fd/3 3<<'PY'
            import sys, re
            body = sys.stdin.read()
            m = re.search(r'###\s*使用するモデル\s*\n+([^\n#]+)', body)
            if not m:
                print("")
                raise SystemExit(0)
            val = m.group(1).strip()
            allowed = {"Auto", "claude-opus-4-7", "claude-opus-4.6", "claude-sonnet-4.6", "gpt-5.4", "gpt-5.3-codex", "gemini-2.5-pro"}
            print(val if val in allowed else "")
            PY
          }

          resolve_model() {
            local raw="$1"
            if [[ -z "${raw}" || "${raw}" == "Auto" ]]; then
              echo "claude-opus-4-7"
            else
              echo "${raw}"
            fi
          }

          extract_custom_agent() {
            local body="$1"
            echo "${body}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'## Custom Agent\s*\n\s*`([^`]+)`', body)
          print(m.group(1) if m else '')
          PY
          }

          # ---- Issue body パース ----
          PARSED=$(python3 - <<'PYEOF'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")

          # ブランチ名抽出（input フォームの値）
          branch = "main"
          m = re.search(r"###\s*対象ブランチ\s*\n+(.+)", body)
          if m:
              branch = m.group(1).strip()
              if not branch or branch == "_No response_":
                  branch = "main"

          # リソースグループ名抽出
          resource_group = ""
          m = re.search(r"###\s*リソースグループ名\s*\n+(.+)", body)
          if m:
              resource_group = m.group(1).strip()
              if resource_group == "_No response_":
                  resource_group = ""

          # 実行するステップからスキップ対象を検出
          skip_steps = set()
          exec_section = re.search(
              r"###\s*実行するステップ\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if exec_section:
              section_text = exec_section.group(1)
              all_items = re.findall(
                  r"-\s*\[[ xX]\]\s*Step\.(\d+)",
                  section_text
              )
              all_steps = set(all_items)
              checked_items = re.findall(
                  r"-\s*\[[xX]\]\s*Step\.(\d+)",
                  section_text
              )
              exec_steps = set(checked_items)
              skip_steps = all_steps - exec_steps
              # チェックが1つもない場合は「全ステップ実行」とみなしてスキップなし
              if not exec_steps and all_steps:
                  skip_steps = set()

          # 追加コメント抽出
          additional_comment = ""
          m = re.search(r"###\s*追加コメント[^\n]*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              additional_comment = m.group(1).strip()
              if additional_comment == "_No response_":
                  additional_comment = ""

          # ユースケースID抽出
          usecase_id = ""
          m = re.search(r"###\s*ユースケースID\s*\n+(.+)", body)
          if m:
              usecase_id = m.group(1).strip()
              if usecase_id == "_No response_":
                  usecase_id = ""

          # レビュー設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          # 後方互換: 旧形式「スキップする」はロジック反転（未チェック → 有効）
          auto_context_review = False
          review_section = re.search(
              r"###\s*レビュー設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if review_section:
              section_text = review_section.group(1)
              if re.search(r"スキップする", section_text):
                  # 旧形式（後方互換）: 未チェック = スキップしない = 有効
                  auto_context_review = not bool(re.search(r"-\s*\[[xX]\]", section_text))
              else:
                  # 新形式: チェック → 有効
                  auto_context_review = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # 質問票設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          # 後方互換: 旧形式「スキップする」はロジック反転（未チェック → 有効）
          auto_qa = False
          qa_section = re.search(
              r"###\s*質問票設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if qa_section:
              section_text = qa_section.group(1)
              if re.search(r"スキップする", section_text):
                  # 旧形式（後方互換）: 未チェック = スキップしない = 有効
                  auto_qa = not bool(re.search(r"-\s*\[[xX]\]", section_text))
              else:
                  # 新形式: チェック → 有効
                  auto_qa = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # PR完全自動化設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          auto_merge = False
          merge_section = re.search(
              r"###\s*PR完全自動化設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if merge_section:
              section_text = merge_section.group(1)
              auto_merge = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # APP-ID 抽出（複数 APP-ID に対応：カンマ区切りで分割・正規化）
          app_ids_raw = ""
          m = re.search(r"###\s*対象アプリケーション.*?\n+(.+)", body)
          if m:
              app_ids_raw = m.group(1).strip()
              if app_ids_raw == "_No response_":
                  app_ids_raw = ""

          # カンマ区切りで分割し、空要素を除去
          app_ids_list = [s.strip() for s in app_ids_raw.split(",") if s.strip()] if app_ids_raw else []
          # 後方互換: 単一 APP-ID の場合は app_id にも設定
          app_id = app_ids_list[0] if len(app_ids_list) == 1 else ""

          result = {"branch": branch, "resource_group": resource_group, "skip_steps": list(skip_steps), "additional_comment": additional_comment, "usecase_id": usecase_id, "auto_context_review": auto_context_review, "auto_qa": auto_qa, "auto_merge": auto_merge, "app_ids": app_ids_list, "app_id": app_id}
          print(json.dumps(result))
          PYEOF
          )

          BRANCH=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['branch'])")
          RESOURCE_GROUP=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['resource_group'])")
          SKIP_STEPS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(' '.join(d['skip_steps']))")
          ADDITIONAL_COMMENT=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['additional_comment'])")
          USECASE_ID=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('usecase_id',''))")
          AUTO_CONTEXT_REVIEW=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_context_review') else 'false')")
          AUTO_QA=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_qa') else 'false')")
          AUTO_MERGE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_merge') else 'false')")
          MODEL_RAW=$(extract_model "${ISSUE_BODY}")
          SELECTED_MODEL=$(resolve_model "${MODEL_RAW}")
          APP_IDS_JSON=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('app_ids',[])))")
          APP_IDS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(', '.join(d.get('app_ids',[])))")
          APP_ID=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('app_id',''))")

          echo "対象ブランチ: ${BRANCH}"
          echo "リソースグループ名: ${RESOURCE_GROUP}"
          echo "スキップ Steps: ${SKIP_STEPS}"
          echo "ユースケースID: ${USECASE_ID}"
          echo "対象アプリケーション: ${APP_IDS}"
          echo "セルフレビュー (auto-context-review): ${AUTO_CONTEXT_REVIEW}"
          echo "質問票 (auto-qa): ${AUTO_QA}"
          echo "PR完全自動化 (auto-merge): ${AUTO_MERGE}"

          # ---- ROOT_REF（リソースグループメタコメント含む）----
          ROOT_REF=$(printf '<!-- root-issue: #%s -->\n<!-- branch: %s -->\n<!-- resource-group: %s -->\n<!-- app-ids: %s -->\n<!-- auto-context-review: %s -->\n<!-- auto-qa: %s -->\n<!-- auto-merge: %s -->' \
            "${ROOT_ISSUE}" "${BRANCH}" "${RESOURCE_GROUP}" "${APP_IDS}" "${AUTO_CONTEXT_REVIEW}" "${AUTO_QA}" "${AUTO_MERGE}")

          # 追加コメントが存在する場合のフッター
          if [[ -n "${ADDITIONAL_COMMENT}" ]]; then
            ADDITIONAL_SECTION=$(printf '\n\n## 追加コメント\n%s' "${ADDITIONAL_COMMENT}")
          else
            ADDITIONAL_SECTION=""
          fi

          # ---- Root Issue の title に APP-ID(s) を追記 ----
          if [[ -n "${APP_IDS}" ]]; then
            CURRENT_TITLE=$(curl -sf \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))") || CURRENT_TITLE=""
            if [[ -n "${CURRENT_TITLE}" ]] && [[ "${CURRENT_TITLE}" != *"(${APP_IDS})"* ]]; then
              NEW_TITLE="${CURRENT_TITLE} (${APP_IDS})"
              api_call PATCH "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
                "$(python3 -c "import sys,json; print(json.dumps({'title': sys.argv[1]}))" "${NEW_TITLE}")" > /dev/null || true
              echo "Root Issue #${ROOT_ISSUE} のタイトルに APP-ID(s) を追記しました: ${NEW_TITLE}"
            fi
          fi

          # ---- Root Issue body からスキップ対象のステップ行を除去して更新 ----
          # （注意: ISSUE_BODY シェル変数は古い値のまま。パースは完了済みなので影響なし）
          if [[ -n "${SKIP_STEPS}" ]]; then
            echo "Root Issue body から未チェックのステップを除去します..."

            PATCH_JSON_FILE=$(mktemp)

            python3 - "${SKIP_STEPS}" "${PATCH_JSON_FILE}" <<'PYBODY'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")
          skip_steps_str = sys.argv[1]
          output_file = sys.argv[2]

          skip_steps = set(skip_steps_str.split()) if skip_steps_str.strip() else set()

          if skip_steps:
              lines = body.split('\n')
              new_lines = []
              for line in lines:
                  # 未チェック行のみ除去（チェック済み行 - [x] は残す）
                  m = re.match(r'^\s*-\s*\[[ ]\]\s*Step\.(\d+)\b', line)
                  if m and m.group(1) in skip_steps:
                      continue
                  new_lines.append(line)

              # 連続空行を最大2行に制限
              cleaned = []
              blank_count = 0
              for line in new_lines:
                  if line.strip() == '':
                      blank_count += 1
                      if blank_count <= 2:
                          cleaned.append(line)
                  else:
                      blank_count = 0
                      cleaned.append(line)

              body = '\n'.join(cleaned)

          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump({'body': body}, f, ensure_ascii=False)
          PYBODY

            api_call PATCH \
              "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
              "$(cat "${PATCH_JSON_FILE}")" > /dev/null \
              && echo "Root Issue #${ROOT_ISSUE} の body を更新しました（未チェックのステップ行を除去）。" \
              || echo "WARNING: Root Issue body の更新に失敗しました。処理を続行します。" >&2

            rm -f "${PATCH_JSON_FILE}"

            # PYBODY が body を更新したため、PYREVIEW 用に最新の body を再取得する
            _refreshed=$(gh api "/repos/${REPO}/issues/${ROOT_ISSUE}" --jq '.body // ""' 2>/dev/null) \
              && ISSUE_BODY="${_refreshed}" && export ISSUE_BODY \
              || echo "WARNING: ISSUE_BODY の再取得に失敗しました。スキップステップ除去後の body で auto-context-review タグが埋め込まれない可能性があります。" >&2
          else
            echo "全ステップ実行のため Root Issue body の更新は不要です。"
          fi

          # ---- Root Issue に auto-context-review タグを埋め込み ----
          REVIEW_TAG_FILE=$(mktemp)
          python3 - "${AUTO_CONTEXT_REVIEW}" "${AUTO_MERGE}" "${REVIEW_TAG_FILE}" <<'PYREVIEW'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")
          auto_context_review = sys.argv[1]
          auto_merge = sys.argv[2]
          output_file = sys.argv[3]

          context_tag = f"<!-- auto-context-review: {auto_context_review} -->"
          merge_tag = f"<!-- auto-merge: {auto_merge} -->"
          context_pat = re.compile(r'<!--\s*auto-context-review:\s*(true|false)\s*-->')
          merge_pat = re.compile(r'<!--\s*auto-merge:\s*(true|false)\s*-->')

          if context_pat.search(body):
              body = context_pat.sub(context_tag, body)
          else:
              body = body.rstrip() + "\n" + context_tag + "\n"

          if merge_pat.search(body):
              body = merge_pat.sub(merge_tag, body)
          else:
              body = body.rstrip() + "\n" + merge_tag + "\n"

          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump({'body': body}, f, ensure_ascii=False)
          PYREVIEW

          api_call PATCH \
            "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
            "$(cat "${REVIEW_TAG_FILE}")" > /dev/null \
            && echo "Root Issue #${ROOT_ISSUE} に auto-context-review / auto-merge タグを埋め込みました（auto-context-review: ${AUTO_CONTEXT_REVIEW}, auto-merge: ${AUTO_MERGE}）。" \
            || echo "WARNING: Root Issue body の auto-context-review / auto-merge タグ埋め込みに失敗しました。" >&2

          rm -f "${REVIEW_TAG_FILE}"

          add_label "${ROOT_ISSUE}" "asdw:initialized"
          echo "asdw:initialized を付与しました。"

          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-context-review"
            echo "Root Issue #${ROOT_ISSUE} に auto-context-review ラベルを付与しました。"
          fi

          if [[ "${AUTO_QA}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-qa"
            echo "Root Issue #${ROOT_ISSUE} に auto-qa ラベルを付与しました。"
          fi

          if [[ "${AUTO_MERGE}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-approve-ready"
            echo "Root Issue #${ROOT_ISSUE} に auto-approve-ready ラベルを付与しました。"
          fi
          if [[ -n "${SELECTED_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "model/${SELECTED_MODEL}" || true
          fi

          # skip_step helper: SKIP_STEPS に Step 番号が含まれていれば true
          skip_step() { echo " ${SKIP_STEPS} " | grep -q " $1 "; }

          # ---- APP-ID スコープセクション（複数 APP-ID 対応）----
          if [[ -n "${APP_IDS}" ]]; then
            APP_ID_SECTION=$(APP_IDS="${APP_IDS}" python3 -c 'import os; ids=[s.strip() for s in os.environ.get("APP_IDS","").split(",") if s.strip()]; id_list=", ".join("`"+aid+"`" for aid in ids); print("\\n\\n## 対象アプリケーション\\n- APP-ID: "+id_list+"\\n- この Step では上記 APP-ID に関連するサービス/エンティティ/画面のみを対象とする\\n- `docs/catalog/app-catalog.md` を参照し、対象 APP-ID に紐づく項目を特定する\\n- 共有サービス/エンティティ（複数 APP で利用されるもの）も対象に含む")')
          else
            APP_ID_SECTION=""
          fi

          # Step Issue タイトルに APP-ID(s) を付加するサフィックス
          APP_ID_SUFFIX="${APP_IDS:+ (${APP_IDS})}"

          # Step Issue に付与するラベルセット
          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]] && [[ "${AUTO_QA}" == "true" ]]; then
            STEP_LABELS='["auto-app-dev-microservice","auto-context-review","auto-qa"]'
          elif [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
            STEP_LABELS='["auto-app-dev-microservice","auto-context-review"]'
          elif [[ "${AUTO_QA}" == "true" ]]; then
            STEP_LABELS='["auto-app-dev-microservice","auto-qa"]'
          else
            STEP_LABELS='["auto-app-dev-microservice"]'
          fi

          if [[ "${AUTO_MERGE}" == "true" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c '. + ["auto-approve-ready"]')
          fi
          if [[ -n "${SELECTED_MODEL}" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c --arg ml "model/${SELECTED_MODEL}" '. + [$ml]')
          fi

          # ---- Step Issue 生成 ----
          S1_NUM=""  S1_ID=""
          S11_NUM="" S11_ID=""
          S12_NUM="" S12_ID=""
          S2_NUM=""  S2_ID=""
          S21_NUM="" S21_ID=""
          S22_NUM="" S22_ID=""
          S23_NUM="" S23_ID=""
          S23TC_NUM="" S23TC_ID=""
          S24_NUM="" S24_ID=""
          S25_NUM="" S25_ID=""
          S26_NUM="" S26_ID=""
          S27T_NUM="" S27T_ID=""
          S27TC_NUM="" S27TC_ID=""
          S27_NUM="" S27_ID=""
          S28_NUM="" S28_ID=""
          S3_NUM=""  S3_ID=""
          S30TC_NUM="" S30TC_ID=""
          S31_NUM="" S31_ID=""
          S32_NUM="" S32_ID=""
          S4_NUM=""  S4_ID=""
          S41_NUM="" S41_ID=""
          S42_NUM="" S42_ID=""

          # ---- Step.1 コンテナ + サブステップ ----
          if ! skip_step "1"; then
            BODY_S1=$(printf '%s\n## Step.1 コンテナ\nStep.1 はコンテナ Issue。Sub Task（Step.1.1, Step.1.2）の完了を待つ。%s' \
              "${ROOT_REF}" "${ADDITIONAL_SECTION}")
            RESP=$(create_issue \
              "[ASDW] Step.1: データ（コンテナ）${APP_ID_SUFFIX}" \
              "${BODY_S1}" \
              "${STEP_LABELS}")
            S1_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
            S1_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
            echo "Step.1 作成: #${S1_NUM}"
            sleep 3

            # ---- Step.1.1 ----
            BODY_S11=$(printf '%s\n## 目的\nPolyglot Persistenceに基づき、対象エンティティの最適Azureデータストア選定と根拠/整合性方針を文書化する（APP-ID 指定時はスコープ内のエンティティのみ）。\n\n## 入力\n- `docs/catalog/data-model.md`\n- `docs/catalog/service-catalog.md`\n- `docs/catalog/domain-analytics.md`\n- `docs/catalog/app-catalog.md`（アプリケーション一覧 — 対象 APP-ID のスコープ判定根拠。存在しない場合はスコープ絞り込みなしで全件処理）\n- （任意）`docs/templates/agent-playbook.md`\n\n## 出力\n- `docs/azure/azure-services-data.md`\n\n## Custom Agent\n`Dev-Microservice-Azure-DataDesign` を使用\n\n## 完了条件\n- `docs/azure/azure-services-data.md` が作成されている\n- 完了時に自身に `asdw:done` ラベルを付与すること%s%s' \
              "${ROOT_REF}" "${APP_ID_SECTION}" "${ADDITIONAL_SECTION}")
            RESP=$(create_issue \
              "[ASDW] Step.1.1: Azure データストア選定${APP_ID_SUFFIX}" \
              "${BODY_S11}" \
              "${STEP_LABELS}")
            S11_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
            S11_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
            echo "Step.1.1 作成: #${S11_NUM}"
