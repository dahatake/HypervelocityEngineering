            sleep 3

            # ---- Step.4.1 ----
            BODY_S41=$(printf '%s\n## 目的\nデプロイ済みAzureリソースを棚卸しし、Azure Well-Architected Framework（5本柱）と Azure Security Benchmark v3 を根拠にアーキテクチャ/セキュリティをレビューして、日本語のMermaid図付きレポートを生成する（APP-ID 指定時はスコープ内のリソースのみ）。\n\n## 入力\n- リソースグループ名: `%s`\n- `docs/catalog/use-case-catalog.md`\n- `docs/catalog/service-catalog-matrix.md`\n- `docs/azure/azure-services-compute.md`\n- `docs/azure/azure-services-data.md`\n- `docs/azure/azure-services-additional.md`\n- `docs/catalog/app-catalog.md`（アプリケーション一覧 — 対象 APP-ID のスコープ判定根拠。存在しない場合はスコープ絞り込みなしで全件処理）\n\n## 出力\n- `docs/azure/azure-architecture-review-report.md`\n\n## Custom Agent\n`QA-AzureArchitectureReview` を使用\n\n## 依存\n- Step.3（UI 作成コンテナ）が `asdw:done` であること\n- Step.4.2 と並列実行可能\n\n## 完了条件\n- `docs/azure/azure-architecture-review-report.md` が作成されている\n- 完了時に自身に `asdw:done` ラベルを付与すること%s%s' \
              "${ROOT_REF}" "${RESOURCE_GROUP}" "${APP_ID_SECTION}" "${ADDITIONAL_SECTION}")
            RESP=$(create_issue \
              "[ASDW] Step.4.1: WAF アーキテクチャレビュー${APP_ID_SUFFIX}" \
              "${BODY_S41}" \
              "${STEP_LABELS}")
            S41_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
            S41_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
            echo "Step.4.1 作成: #${S41_NUM}"
            sleep 3

            # ---- Step.4.2 ----
            BODY_S42=$(printf '%s\n## 目的\nサービスカタログ準拠で Azure 依存（参照・設定・IaC）を証跡付きで点検し、必要なら最小差分で修正する（APP-ID 指定時はスコープ内の依存のみ）。\n\n## 入力\n- リソースグループ名: `%s`\n- `docs/catalog/service-catalog-matrix.md`\n- `docs/azure/azure-services-compute.md`\n- `docs/azure/azure-services-data.md`\n- `docs/catalog/app-catalog.md`（アプリケーション一覧 — 対象 APP-ID のスコープ判定根拠。存在しない場合はスコープ絞り込みなしで全件処理）\n- `src/app/`, `src/api/`, `infra/`, `config/`, `.github/workflows/`\n\n## 出力\n- `docs/azure/dependency-review-report.md`\n\n## Custom Agent\n`QA-AzureDependencyReview` を使用\n\n## 依存\n- Step.3（UI 作成コンテナ）が `asdw:done` であること\n- Step.4.1 と並列実行可能\n\n## 完了条件\n- `docs/azure/dependency-review-report.md` が作成されている\n- 完了時に自身に `asdw:done` ラベルを付与すること%s%s' \
              "${ROOT_REF}" "${RESOURCE_GROUP}" "${APP_ID_SECTION}" "${ADDITIONAL_SECTION}")
            RESP=$(create_issue \
              "[ASDW] Step.4.2: 整合性チェック${APP_ID_SUFFIX}" \
              "${BODY_S42}" \
              "${STEP_LABELS}")
            S42_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
            S42_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
            echo "Step.4.2 作成: #${S42_NUM}"
            sleep 3
          else
            echo "Step.4 はスキップされました。"
          fi

          # ---- Sub Issue 紐付け ----
          echo "Sub Issue 紐付けを開始します..."

          # Root → Step.1, Step.2, Step.3, Step.4（コンテナ）
          [[ -n "${S1_ID}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S1_ID}"; echo "Root → Step.1 紐付け完了"; }
          [[ -n "${S2_ID}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S2_ID}"; echo "Root → Step.2 紐付け完了"; }
          [[ -n "${S3_ID}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S3_ID}"; echo "Root → Step.3 紐付け完了"; }
          [[ -n "${S4_ID}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S4_ID}"; echo "Root → Step.4 紐付け完了"; }

          # Step.1 → Step.1.1, Step.1.2
          [[ -n "${S1_NUM}" && -n "${S11_ID}" ]] && { link_sub_issue "${S1_NUM}" "${S11_ID}"; echo "Step.1 → Step.1.1 紐付け完了"; }
          [[ -n "${S1_NUM}" && -n "${S12_ID}" ]] && { link_sub_issue "${S1_NUM}" "${S12_ID}"; echo "Step.1 → Step.1.2 紐付け完了"; }

          # Step.2 → Step.2.1〜2.6 + Step.2.3TC
          [[ -n "${S2_NUM}" && -n "${S21_ID}" ]] && { link_sub_issue "${S2_NUM}" "${S21_ID}"; echo "Step.2 → Step.2.1 紐付け完了"; }
          [[ -n "${S2_NUM}" && -n "${S22_ID}" ]] && { link_sub_issue "${S2_NUM}" "${S22_ID}"; echo "Step.2 → Step.2.2 紐付け完了"; }
          [[ -n "${S2_NUM}" && -n "${S23_ID}" ]] && { link_sub_issue "${S2_NUM}" "${S23_ID}"; echo "Step.2 → Step.2.3 紐付け完了"; }
          [[ -n "${S2_NUM}" && -n "${S23TC_ID}" ]] && { link_sub_issue "${S2_NUM}" "${S23TC_ID}"; echo "Step.2 → Step.2.3TC 紐付け完了"; }
          [[ -n "${S2_NUM}" && -n "${S24_ID}" ]] && { link_sub_issue "${S2_NUM}" "${S24_ID}"; echo "Step.2 → Step.2.4 紐付け完了"; }
          [[ -n "${S2_NUM}" && -n "${S25_ID}" ]] && { link_sub_issue "${S2_NUM}" "${S25_ID}"; echo "Step.2 → Step.2.5 紐付け完了"; }
          [[ -n "${S2_NUM}" && -n "${S26_ID}" ]] && { link_sub_issue "${S2_NUM}" "${S26_ID}"; echo "Step.2 → Step.2.6 紐付け完了"; }
          [[ -n "${S2_NUM}" && -n "${S27T_ID}" ]] && { link_sub_issue "${S2_NUM}" "${S27T_ID}"; echo "Step.2 → Step.2.7T 紐付け完了"; }
          [[ -n "${S2_NUM}" && -n "${S27TC_ID}" ]] && { link_sub_issue "${S2_NUM}" "${S27TC_ID}"; echo "Step.2 → Step.2.7TC 紐付け完了"; }
          [[ -n "${S2_NUM}" && -n "${S27_ID}" ]] && { link_sub_issue "${S2_NUM}" "${S27_ID}"; echo "Step.2 → Step.2.7 紐付け完了"; }
          [[ -n "${S2_NUM}" && -n "${S28_ID}" ]] && { link_sub_issue "${S2_NUM}" "${S28_ID}"; echo "Step.2 → Step.2.8 紐付け完了"; }

          # Step.3 → Step.3.0TC, Step.3.1, Step.3.2
          [[ -n "${S3_NUM}" && -n "${S30TC_ID}" ]] && { link_sub_issue "${S3_NUM}" "${S30TC_ID}"; echo "Step.3 → Step.3.0TC 紐付け完了"; }
          [[ -n "${S3_NUM}" && -n "${S31_ID}" ]] && { link_sub_issue "${S3_NUM}" "${S31_ID}"; echo "Step.3 → Step.3.1 紐付け完了"; }
          [[ -n "${S3_NUM}" && -n "${S32_ID}" ]] && { link_sub_issue "${S3_NUM}" "${S32_ID}"; echo "Step.3 → Step.3.2 紐付け完了"; }

          # Step.4 → Step.4.1, Step.4.2
          [[ -n "${S4_NUM}" && -n "${S41_ID}" ]] && { link_sub_issue "${S4_NUM}" "${S41_ID}"; echo "Step.4 → Step.4.1 紐付け完了"; }
          [[ -n "${S4_NUM}" && -n "${S42_ID}" ]] && { link_sub_issue "${S4_NUM}" "${S42_ID}"; echo "Step.4 → Step.4.2 紐付け完了"; }

          # ---- 最初の leaf Step を起動（Step.1.1 → Step.2.1 → Step.3.0TC → Step.3.1 → Step.4.1/4.2 の順でフォールバック）----
          if [[ -n "${S11_NUM}" ]]; then
            add_label "${S11_NUM}" "asdw:ready"
            CA=$(extract_custom_agent "${BODY_S11}")
            if assign_copilot "${S11_NUM}" "${CA}" "${BRANCH}" "" "${SELECTED_MODEL}"; then
              add_label "${S11_NUM}" "asdw:running"
              echo "Step.1.1 に copilot アサイン + asdw:running 付与完了"
            else
              echo "WARNING: Step.1.1 へのアサイン失敗。asdw:running は付与しません。"
            fi
          elif [[ -n "${S21_NUM}" ]]; then
            add_label "${S21_NUM}" "asdw:ready"
            CA=$(extract_custom_agent "${BODY_S21}")
            if assign_copilot "${S21_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S21_NUM}" "asdw:running"
              echo "Step.1 がスキップ済み: Step.2.1 (#${S21_NUM}) を起動しました。"
            else
              echo "WARNING: Step.2.1 へのアサイン失敗。asdw:running は付与しません。"
            fi
          elif [[ -n "${S30TC_NUM}" ]]; then
            add_label "${S30TC_NUM}" "asdw:ready"
            CA=$(extract_custom_agent "${BODY_S30TC}")
            if assign_copilot "${S30TC_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S30TC_NUM}" "asdw:running"
              echo "Step.1/2 がスキップ済み: Step.3.0TC (#${S30TC_NUM}) を起動しました。"
            else
              echo "WARNING: Step.3.0TC へのアサイン失敗。asdw:running は付与しません。"
            fi
          elif [[ -n "${S31_NUM}" ]]; then
            add_label "${S31_NUM}" "asdw:ready"
            CA=$(extract_custom_agent "${BODY_S31}")
            if assign_copilot "${S31_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S31_NUM}" "asdw:running"
              echo "Step.1/2 がスキップ済み: Step.3.1 (#${S31_NUM}) を起動しました。"
            else
              echo "WARNING: Step.3.1 へのアサイン失敗。asdw:running は付与しません。"
            fi
          elif [[ -n "${S41_NUM}" ]] || [[ -n "${S42_NUM}" ]]; then
            if [[ -n "${S41_NUM}" ]]; then
              add_label "${S41_NUM}" "asdw:ready"
              CA=$(extract_custom_agent "${BODY_S41}")
              if assign_copilot "${S41_NUM}" "${CA}" "${BRANCH}" ""; then
                add_label "${S41_NUM}" "asdw:running"
                echo "Step.1/2/3 がスキップ済み: Step.4.1 (#${S41_NUM}) を起動しました。"
              else
                echo "WARNING: Step.4.1 へのアサイン失敗。asdw:running は付与しません。"
              fi
            fi
            if [[ -n "${S42_NUM}" ]]; then
              add_label "${S42_NUM}" "asdw:ready"
              CA=$(extract_custom_agent "${BODY_S42}")
              if assign_copilot "${S42_NUM}" "${CA}" "${BRANCH}" ""; then
                add_label "${S42_NUM}" "asdw:running"
                echo "Step.1/2/3 がスキップ済み: Step.4.2 (#${S42_NUM}) を起動しました。"
              else
                echo "WARNING: Step.4.2 へのアサイン失敗。asdw:running は付与しません。"
              fi
            fi
          else
            echo "起動可能な leaf Step が存在しません。初期化をスキップします。"
          fi

          echo "初期化完了。"

      # ----------------------------------------------------------------
      # 4. 状態遷移: asdw:done ラベル付与時
      # ----------------------------------------------------------------
      - name: 状態遷移処理
        if: steps.gate.outputs.mode == 'state_transition'
        env:
          DONE_ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail

          # Issue の body と title を API 経由で安全に取得（YAML 展開問題を回避）
          _ISSUE_JSON=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}")
          DONE_ISSUE_BODY=$(echo "${_ISSUE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          DONE_ISSUE_TITLE=$(echo "${_ISSUE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          export DONE_ISSUE_BODY DONE_ISSUE_TITLE

          # closed イベント由来の場合: asdw:done ラベルをまだ持っていなければ付与する
          # （labeled(asdw:done) イベントと closed イベントのどちらで state_transition に来ても正しく動作するための冪等処理）
          _HAS_DONE_LABEL=$(echo "${_ISSUE_JSON}" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          labels = [l['name'] for l in d.get('labels', [])]
          print('true' if 'asdw:done' in labels else 'false')
          ")
          if [[ "${_HAS_DONE_LABEL}" == "false" ]]; then
            echo "asdw:done ラベルを付与します（closed イベント由来）..."
            # add_label関数の定義より前なので直接curl（リトライなし・エラーは無視）
            curl -s -o /dev/null \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}/labels" \
              -d '{"labels":["asdw:done"]}' || true
            echo "asdw:done ラベルを付与しました。"
            sleep 2
          fi

          if [[ -z "${COPILOT_PAT}" ]]; then
            echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインは全てスキップされます。" >&2
          fi

          # ---- ユーティリティ関数（再定義） ----
          api_call() {
            local method="$1"; shift
            local url="$1"; shift
            local data="${1:-}"
            local max_retry=5
            local wait=1
            local http_code response body

            for i in $(seq 1 "${max_retry}"); do
              if [[ -n "${data}" ]]; then
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  -H "Content-Type: application/json" \
                  "${url}" \
                  -d "${data}")
              else
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${url}")
              fi
              http_code=$(echo "${response}" | tail -1)
              body=$(echo "${response}" | head -n -1)
              if [[ "${http_code}" =~ ^2 ]]; then
                echo "${body}"
                return 0
              fi
              echo "API エラー: HTTP ${http_code}、${wait}秒後にリトライ (${i}/${max_retry})" >&2
              sleep "${wait}"
              wait=$((wait * 2))
            done
            echo "API 呼び出し失敗: ${method} ${url}" >&2
            return 1
          }

          add_label() {
            local issue_num="$1"
            local label="$2"
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/labels" \
              "{\"labels\":[\"${label}\"]}" > /dev/null
            sleep 1
          }

          assign_copilot() {
            local issue_num="$1"
            local custom_agent="${2:-}"
            local base_branch="${3:-main}"
            local custom_instructions="${4:-}"
            local model_raw="${5:-}"
            local selected_model
            if [[ -z "${model_raw}" || "${model_raw}" == "Auto" ]]; then
              selected_model="claude-opus-4-7"
            else
              selected_model="${model_raw}"
            fi

            echo "=== Copilot アサイン開始: Issue #${issue_num} ==="
            echo "  custom_agent: ${custom_agent}"
            echo "  base_branch: ${base_branch}"

            # 冪等化ガード: 既に copilot-swe-agent がアサインされている場合はスキップ
            local current_assignees
            current_assignees=$(curl -s \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}" \
              | python3 /dev/fd/3 3<<'PY'
          import sys, json
          try:
              d = json.load(sys.stdin)
              if not isinstance(d, dict):
                  print('false')
                  sys.exit(0)
              assignees = [a.get('login', '') for a in d.get('assignees', [])]
              print('true' if 'copilot-swe-agent' in assignees or 'Copilot' in assignees else 'false')
          except Exception:
              print('false')
          PY
            ) || true

            if [[ "${current_assignees}" == "true" ]]; then
              echo "  copilot-swe-agent は既にアサイン済みです。スキップします。"
              return 0
            fi

            # 冪等化ガード: 対象 Issue に紐づく Open な PR が既に存在する場合はスキップ
            local existing_prs
            existing_prs=$(curl -s \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/timeline?per_page=100" \
              | python3 /dev/fd/3 3<<'PY'
          import sys, json
          try:
              events = json.load(sys.stdin)
              if not isinstance(events, list):
                  print('false')
                  sys.exit(0)
          except Exception:
              print('false')
              sys.exit(0)
          for e in events:
              if e.get('event') == 'cross-referenced':
                  source = e.get('source', {}).get('issue', {})
                  pr = source.get('pull_request', {})
                  if pr and source.get('state') == 'open':
                      print('true')
                      sys.exit(0)
          print('false')
          PY
            ) || true

            if [[ "${existing_prs}" == "true" ]]; then
              echo "  Issue #${issue_num} に紐づく Open な PR が既に存在します。スキップします。"
              return 0
            fi

            if [[ -z "${COPILOT_PAT}" ]]; then
              echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインをスキップします。" >&2
              return 1
            fi

            local OWNER="${REPO%/*}"
            local REPO_NAME="${REPO#*/}"

            local max_assign_retry=3
            local assign_wait=5
            local assign_success=false

            for assign_attempt in $(seq 1 "${max_assign_retry}"); do
              echo "  アサイン試行 ${assign_attempt}/${max_assign_retry}..."

              # 1回のクエリで bot_id / issue_node_id / repo_node_id をまとめて取得
              local query_result
              query_result=$(GH_TOKEN="${COPILOT_PAT}" gh api graphql \
                -f query="
          query(\$issueNumber: Int!) {
            repository(owner: \"${OWNER}\", name: \"${REPO_NAME}\") {
              id
              issue(number: \$issueNumber) { id }
              suggestedActors(capabilities: [CAN_BE_ASSIGNED], first: 100) {
                nodes {
                  login
                  ... on Bot { id databaseId }
                }
              }
            }
          }
                " \
                -F issueNumber="${issue_num}" \
                2>&1) || true

              echo "  GraphQL クエリ結果: ${query_result}"

              if [[ -z "${query_result}" ]]; then
                echo "WARNING: GraphQL クエリの実行に失敗しました。試行 ${assign_attempt}/${max_assign_retry}" >&2
                sleep "${assign_wait}"
                assign_wait=$((assign_wait * 2))
                continue
              fi

              local bot_id issue_node_id repo_node_id
              IFS=$'\t' read -r bot_id issue_node_id repo_node_id < <(echo "${query_result}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          d = json.load(sys.stdin)
          repo = d.get('data', {}).get('repository', {})
          bot = ''
          for a in repo.get('suggestedActors', {}).get('nodes', []):
              if a.get('login') == 'copilot-swe-agent':
                  bot = a.get('id', '')
                  break
          issue = repo.get('issue', {}).get('id', '')
          print(bot + '\t' + issue + '\t' + repo.get('id', ''))
          PY
              ) || true

              if [[ -z "${bot_id}" ]]; then
                echo "WARNING: copilot-swe-agent の Bot ID を取得できませんでした。試行 ${assign_attempt}/${max_assign_retry}" >&2
                sleep "${assign_wait}"
                assign_wait=$((assign_wait * 2))
                continue
              fi
              if [[ -z "${issue_node_id}" ]]; then
                echo "WARNING: Issue #${issue_num} の Node ID を取得できませんでした。試行 ${assign_attempt}/${max_assign_retry}" >&2
                sleep "${assign_wait}"
                assign_wait=$((assign_wait * 2))
                continue
              fi
              if [[ -z "${repo_node_id}" ]]; then
                echo "WARNING: Repository の Node ID を取得できませんでした。試行 ${assign_attempt}/${max_assign_retry}" >&2
                sleep "${assign_wait}"
                assign_wait=$((assign_wait * 2))
                continue
              fi
              echo "  Bot ID: ${bot_id}, Issue Node ID: ${issue_node_id}, Repo Node ID: ${repo_node_id}"

              # addAssigneesToAssignable mutation（全変数を -f/-f フラグで渡す・インジェクション防止）
              local result
              result=$(GH_TOKEN="${COPILOT_PAT}" gh api graphql \
                -H 'GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection' \
                -f query="
          mutation(\$assignableId: ID!, \$botId: ID!, \$targetRepositoryId: ID!, \$baseRef: String!, \$customInstructions: String!, \$customAgent: String!, \$model: String!) {
            addAssigneesToAssignable(input: {
              assignableId: \$assignableId,
              assigneeIds: [\$botId],
              agentAssignment: {
                targetRepositoryId: \$targetRepositoryId,
                baseRef: \$baseRef,
                customInstructions: \$customInstructions,
                customAgent: \$customAgent,
                model: \"\"
              }
            }) {
              assignable {
                ... on Issue {
                  id
                  title
                  assignees(first: 10) {
                    nodes { login }
                  }
                }
              }
            }
          }
                " \
                -f assignableId="${issue_node_id}" \
                -f botId="${bot_id}" \
                -f targetRepositoryId="${repo_node_id}" \
                -f baseRef="${base_branch}" \
                -f customInstructions="${custom_instructions}" \
                -f customAgent="${custom_agent}" \
                -f model="${selected_model}" \
                2>&1) || true

              echo "  GraphQL mutation レスポンス: ${result}"

              # mutation レスポンスのエラーチェック
              local has_errors
              has_errors=$(echo "${result}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          try:
              d = json.load(sys.stdin)
              print('true' if d.get('errors') else 'false')
          except Exception:
              print('true')
          PY
              ) || true

              if [[ "${has_errors}" == "true" ]]; then
                echo "WARNING: GraphQL mutation にエラーが含まれています。試行 ${assign_attempt}/${max_assign_retry}" >&2
                sleep "${assign_wait}"
                assign_wait=$((assign_wait * 2))
                continue
              fi

              # copilot-swe-agent が assignees に含まれるか検証
              local is_assigned
              is_assigned=$(echo "${result}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          try:
              d = json.load(sys.stdin)
              nodes = d.get('data', {}).get('addAssigneesToAssignable', {}).get('assignable', {}).get('assignees', {}).get('nodes', [])
              print('true' if any(a.get('login') in ('copilot-swe-agent', 'Copilot') for a in nodes) else 'false')
          except Exception:
              print('false')
          PY
              ) || true

              if [[ "${is_assigned}" == "true" ]]; then
                echo "  copilot-swe-agent のアサインを確認しました。"
                assign_success=true
                break
              fi

              echo "WARNING: copilot-swe-agent が assignees に含まれていません。試行 ${assign_attempt}/${max_assign_retry}" >&2
              sleep "${assign_wait}"
              assign_wait=$((assign_wait * 2))
            done

            if [[ "${assign_success}" != "true" ]]; then
              local fail_msg
              fail_msg=$(printf '⚠️ Copilot cloud agent (copilot-swe-agent) を Issue #%s にアサインできませんでした。\n\n手動でアサインする手順:\n1. Issue #%s を開く\n2. 右サイドバーの「Assignees」から `copilot-swe-agent` を選択する\n\n失敗原因として考えられるもの:\n- `COPILOT_PAT` の権限不足または失効\n- Copilot cloud agent が有効化されていない\n- GraphQL API の一時的な障害' "${issue_num}" "${issue_num}")
              post_comment "${issue_num}" "${fail_msg}" || true
              echo "WARNING: Issue #${issue_num} へのアサイン失敗通知を投稿しました。" >&2
              return 1
            fi

            echo "=== Copilot アサイン完了: Issue #${issue_num} ==="
            sleep 2
          }

          post_comment() {
            local issue_num="$1"
            local body="$2"
            local data
            data=$(python3 -c "import sys,json; print(json.dumps({'body': sys.argv[1]}))" "${body}")
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/comments" \
              "${data}" > /dev/null
            sleep 1
          }

          # Issue body から Custom Agent 名を抽出
          extract_custom_agent() {
            local body="$1"
            echo "${body}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'## Custom Agent\s*\n\s*`([^`]+)`', body)
          print(m.group(1) if m else '')
          PY
          }

          activate_issue() {
            local issue_num="$1"
            local issue_body
            issue_body=$(curl -sf \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))") || true
            local agent_name
            agent_name=$(extract_custom_agent "${issue_body}") || true
            add_label "${issue_num}" "asdw:ready"
            if assign_copilot "${issue_num}" "${agent_name}" "${BRANCH:-main}" ""; then
              add_label "${issue_num}" "asdw:running"
              echo "Issue #${issue_num} を asdw:ready + copilot アサイン + asdw:running に設定しました。(custom_agent: ${agent_name})"
            else
              echo "WARNING: Issue #${issue_num} へのアサイン失敗。asdw:running は付与しません。"
            fi
          }

          # ---- done Issue の title から Step 番号を特定 ----
          STEP_MATCH=$(echo "${DONE_ISSUE_TITLE}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          title = sys.stdin.read().strip()
          m = re.search(r'\[ASDW\] Step\.(\d+(?:\.\d+)?[A-Z]{0,2})', title)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${STEP_MATCH}" ]]; then
            echo "Step 番号が特定できません（title: ${DONE_ISSUE_TITLE}）。スキップ。"
            exit 0
          fi

          echo "完了した Step: ${STEP_MATCH}"

          # ---- Root Issue 番号の取得 ----
          ROOT_ISSUE=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!-- root-issue: #(\d+) -->', body)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${ROOT_ISSUE}" ]]; then
            echo "Root Issue 番号が取得できません。スキップ。"
            exit 0
          fi

          echo "Root Issue: #${ROOT_ISSUE}"

          # ---- ブランチ名の取得 ----
          BRANCH=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!-- branch: (.+?) -->', body)
          print(m.group(1).strip() if m else 'main')
          PY
          )

          echo "対象ブランチ: ${BRANCH}"

          # ---- auto-context-review / auto-qa PR ラベル付与 ----
          AUTO_CONTEXT_REVIEW=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!--\s*auto-context-review:\s*(true|false)\s*-->', body)
          print(m.group(1) if m else 'false')
          PY
          )
          AUTO_QA=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!--\s*auto-qa:\s*(true|false)\s*-->', body)
          print(m.group(1) if m else 'false')
          PY
          )
          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]] || [[ "${AUTO_QA}" == "true" ]]; then
            # Timeline API で Issue を close する open PR を逆引き（gh pr list --search では "closes:#N" 構文が機能しないため）
            LINKED_PRS=$(gh api "/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}/timeline?per_page=100" \
              --jq '[.[] | select(.event == "cross-referenced" and .source.type == "pull_request" and .source.issue.state == "open") | .source.issue.number] | unique | .[]' \
              2>/dev/null || true)
            if [[ -n "${LINKED_PRS}" ]]; then
              while IFS= read -r pr_num; do
                if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
                  gh pr edit "${pr_num}" --repo "${REPO}" --add-label "auto-context-review" 2>/dev/null \
                    && echo "PR #${pr_num} に auto-context-review ラベルを付与しました。" \
                    || echo "WARNING: PR #${pr_num} への auto-context-review ラベル付与に失敗しました。" >&2
                fi
                if [[ "${AUTO_QA}" == "true" ]]; then
                  gh pr edit "${pr_num}" --repo "${REPO}" --add-label "auto-qa" 2>/dev/null \
                    && echo "PR #${pr_num} に auto-qa ラベルを付与しました。" \
                    || echo "WARNING: PR #${pr_num} への auto-qa ラベル付与に失敗しました。" >&2
                fi
              done <<< "${LINKED_PRS}"
            fi
          fi

          # ---- Root Issue の Sub Issues を取得して Step Issue を特定 ----
          get_sub_issue_number() {
            local pattern="$1"
            # Root Issue から全 Sub Issues を取得
            local resp
            resp=$(api_call GET \
              "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues")
            echo "${resp}" | python3 /dev/fd/3 "${pattern}" 3<<'PY'
          import sys, re, json
          issues = json.load(sys.stdin)
          pattern = sys.argv[1]
          for issue in issues:
              title = issue.get('title', '')
              if re.search(pattern, title):
                  print(issue['number'])
                  break
          PY
          }

          get_sub_issue_number_from_parent() {
            local parent_num="$1"
            local pattern="$2"
            local resp
            resp=$(api_call GET \
              "https://api.github.com/repos/${REPO}/issues/${parent_num}/sub_issues")
            echo "${resp}" | python3 /dev/fd/3 "${pattern}" 3<<'PY'
          import sys, re, json
          issues = json.load(sys.stdin)
          pattern = sys.argv[1]
          for issue in issues:
              title = issue.get('title', '')
              if re.search(pattern, title):
                  print(issue['number'])
                  break
          PY
          }

          # ---- 依存関係マップに基づき次 Step を特定 & 起動 ----
          case "${STEP_MATCH}" in

            "1.1")
              # Step.1.1 完了 → Step.1.2 を起動
              S1_NUM=$(get_sub_issue_number '\[ASDW\] Step\.1:')
              if [[ -n "${S1_NUM}" ]]; then
                S12_NUM=$(get_sub_issue_number_from_parent "${S1_NUM}" '\[ASDW\] Step\.1\.2:')
                if [[ -n "${S12_NUM}" ]]; then
                  activate_issue "${S12_NUM}"
                else
                  echo "WARNING: Step.1.2 が見つかりません。"
                fi
              else
                echo "WARNING: Step.1 コンテナが見つかりません。"
              fi
              ;;

            "1.2")
              # Step.1.2 完了 → Step.1 コンテナに asdw:done → Step.2.1 を起動
              S1_NUM=$(get_sub_issue_number '\[ASDW\] Step\.1:')
              if [[ -n "${S1_NUM}" ]]; then
                add_label "${S1_NUM}" "asdw:done"
                echo "Step.1 コンテナに asdw:done を付与しました。"
              fi
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S21_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.1:')
                if [[ -n "${S21_NUM}" ]]; then
                  activate_issue "${S21_NUM}"
                else
                  echo "WARNING: Step.2.1 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.1")
              # Step.2.1 完了 → Step.2.2 を起動
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S22_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.2:')
                if [[ -n "${S22_NUM}" ]]; then
                  activate_issue "${S22_NUM}"
                else
                  echo "WARNING: Step.2.2 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.2")
              # Step.2.2 完了 → Step.2.3 を起動
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S23_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.3:')
                if [[ -n "${S23_NUM}" ]]; then
                  activate_issue "${S23_NUM}"
                else
                  echo "WARNING: Step.2.3 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.3")
              # Step.2.3 完了 → Step.2.3TC (TDD RED テストコード生成) を起動
              # テスト仕様書 (docs/test-specs/{serviceId}-test-spec.md) は設計ワークフロー AAD Step.7.3 で生成済みとして前提
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S23TC_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.3TC:')
                if [[ -n "${S23TC_NUM}" ]]; then
                  activate_issue "${S23TC_NUM}"
                else
                  echo "WARNING: Step.2.3TC が見つかりません。Step.2.4 にフォールバック。"
                  S24_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.4:')
                  if [[ -n "${S24_NUM}" ]]; then
                    activate_issue "${S24_NUM}"
                  else
                    echo "WARNING: Step.2.4 も見つかりません。"
                  fi
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.3TC")
              # Step.2.3TC 完了 → Step.2.4 を起動
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S24_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.4:')
                if [[ -n "${S24_NUM}" ]]; then
                  activate_issue "${S24_NUM}"
                else
                  echo "WARNING: Step.2.4 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.4")
              # Step.2.4 完了 → Step.2.5 を起動
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S25_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.5:')
                if [[ -n "${S25_NUM}" ]]; then
                  activate_issue "${S25_NUM}"
                else
                  echo "WARNING: Step.2.5 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.5")
              # Step.2.5 完了 → Step.2.6 を起動
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S26_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.6:')
                if [[ -n "${S26_NUM}" ]]; then
                  activate_issue "${S26_NUM}"
                else
                  echo "WARNING: Step.2.6 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.6")
              # Step.2.6 完了 → Step.2.7T (AI Agent テスト仕様書 TDD RED) を起動
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S27T_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.7T:')
                if [[ -n "${S27T_NUM}" ]]; then
                  activate_issue "${S27T_NUM}"
                else
                  echo "WARNING: Step.2.7T が見つかりません。Step.2.7TC にフォールバック。"
                  S27TC_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.7TC:')
                  if [[ -n "${S27TC_NUM}" ]]; then
                    activate_issue "${S27TC_NUM}"
                  else
                    echo "WARNING: Step.2.7TC が見つかりません。Step.2.7 にフォールバック。"
                    S27_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.7:')
                    if [[ -n "${S27_NUM}" ]]; then
                      activate_issue "${S27_NUM}"
                    else
                      echo "WARNING: Step.2.7 も見つかりません。Step.2.8 にフォールバック。"
                      S28_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.8:')
                      if [[ -n "${S28_NUM}" ]]; then
                        activate_issue "${S28_NUM}"
                      else
                        echo "WARNING: Step.2.8 も見つかりません。Step.2 コンテナを完了扱いにします。"
                        add_label "${S2_NUM}" "asdw:done"
                        echo "Step.2 コンテナに asdw:done を付与しました。"
                        S3_NUM=$(get_sub_issue_number '\[ASDW\] Step\.3:')
                        if [[ -n "${S3_NUM}" ]]; then
                          S30TC_NUM=$(get_sub_issue_number_from_parent "${S3_NUM}" '\[ASDW\] Step\.3\.0TC:')
                          if [[ -n "${S30TC_NUM}" ]]; then
                            activate_issue "${S30TC_NUM}"
                          else
                            echo "WARNING: Step.3.0TC が見つかりません。Step.3.1 にフォールバック。"
                            S31_NUM=$(get_sub_issue_number_from_parent "${S3_NUM}" '\[ASDW\] Step\.3\.1:')
                            if [[ -n "${S31_NUM}" ]]; then
                              activate_issue "${S31_NUM}"
                            else
                              echo "WARNING: Step.3.1 も見つかりません。"
                            fi
                          fi
                        else
                          echo "WARNING: Step.3 コンテナが見つかりません。"
                        fi
                      fi
                    fi
                  fi
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.7T")
              # Step.2.7T 完了 → Step.2.7TC (AI Agent テストコード生成 TDD RED) を起動
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S27TC_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.7TC:')
                if [[ -n "${S27TC_NUM}" ]]; then
                  activate_issue "${S27TC_NUM}"
                else
                  echo "WARNING: Step.2.7TC が見つかりません。Step.2.7 にフォールバック。"
                  S27_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.7:')
                  if [[ -n "${S27_NUM}" ]]; then
                    activate_issue "${S27_NUM}"
                  else
                    echo "WARNING: Step.2.7 も見つかりません。"
                  fi
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.7TC")
              # Step.2.7TC 完了 → Step.2.7 (AI Agent 実装 TDD GREEN) を起動
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S27_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.7:')
                if [[ -n "${S27_NUM}" ]]; then
                  activate_issue "${S27_NUM}"
                else
                  echo "WARNING: Step.2.7 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.7")
              # Step.2.7 完了 → Step.2.8 (AI Agent Deploy) を起動
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S28_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\[ASDW\] Step\.2\.8:')
                if [[ -n "${S28_NUM}" ]]; then
                  activate_issue "${S28_NUM}"
                else
                  echo "WARNING: Step.2.8 が見つかりません。Step.2 コンテナを完了扱いにします。"
                  add_label "${S2_NUM}" "asdw:done"
                  echo "Step.2 コンテナに asdw:done を付与しました。"
                  S3_NUM=$(get_sub_issue_number '\[ASDW\] Step\.3:')
                  if [[ -n "${S3_NUM}" ]]; then
                    S30TC_NUM=$(get_sub_issue_number_from_parent "${S3_NUM}" '\[ASDW\] Step\.3\.0TC:')
                    if [[ -n "${S30TC_NUM}" ]]; then
                      activate_issue "${S30TC_NUM}"
                    else
                      echo "WARNING: Step.3.0TC が見つかりません。Step.3.1 にフォールバック。"
                      S31_NUM=$(get_sub_issue_number_from_parent "${S3_NUM}" '\[ASDW\] Step\.3\.1:')
                      if [[ -n "${S31_NUM}" ]]; then
                        activate_issue "${S31_NUM}"
                      else
                        echo "WARNING: Step.3.1 も見つかりません。"
                      fi
                    fi
                  else
                    echo "WARNING: Step.3 コンテナが見つかりません。"
                  fi
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.8")
              # Step.2.8 完了 → Step.2 コンテナに asdw:done → Step.3.0TC (TDD RED) を起動
              # テスト仕様書 (docs/test-specs/{screenId}-test-spec.md) は設計ワークフロー AAD Step.7.3 で生成済みとして前提
              S2_NUM=$(get_sub_issue_number '\[ASDW\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                add_label "${S2_NUM}" "asdw:done"
                echo "Step.2 コンテナに asdw:done を付与しました。"
              fi
              S3_NUM=$(get_sub_issue_number '\[ASDW\] Step\.3:')
              if [[ -n "${S3_NUM}" ]]; then
                S30TC_NUM=$(get_sub_issue_number_from_parent "${S3_NUM}" '\[ASDW\] Step\.3\.0TC:')
                if [[ -n "${S30TC_NUM}" ]]; then
                  activate_issue "${S30TC_NUM}"
                else
                  echo "WARNING: Step.3.0TC が見つかりません。Step.3.1 にフォールバック。"
                  S31_NUM=$(get_sub_issue_number_from_parent "${S3_NUM}" '\[ASDW\] Step\.3\.1:')
                  if [[ -n "${S31_NUM}" ]]; then
                    activate_issue "${S31_NUM}"
                  else
                    echo "WARNING: Step.3.1 も見つかりません。"
                  fi
                fi
              else
                echo "WARNING: Step.3 コンテナが見つかりません。"
              fi
              ;;

            "3.0TC")
              # Step.3.0TC 完了 → Step.3.1 を起動
              S3_NUM=$(get_sub_issue_number '\[ASDW\] Step\.3:')
              if [[ -n "${S3_NUM}" ]]; then
                S31_NUM=$(get_sub_issue_number_from_parent "${S3_NUM}" '\[ASDW\] Step\.3\.1:')
                if [[ -n "${S31_NUM}" ]]; then
                  activate_issue "${S31_NUM}"
                else
                  echo "WARNING: Step.3.1 が見つかりません。"
                fi
              else
                echo "WARNING: Step.3 コンテナが見つかりません。"
              fi
              ;;

            "3.1")
              # Step.3.1 完了 → Step.3.2 を起動
              S3_NUM=$(get_sub_issue_number '\[ASDW\] Step\.3:')
              if [[ -n "${S3_NUM}" ]]; then
                S32_NUM=$(get_sub_issue_number_from_parent "${S3_NUM}" '\[ASDW\] Step\.3\.2:')
                if [[ -n "${S32_NUM}" ]]; then
                  activate_issue "${S32_NUM}"
                else
                  echo "WARNING: Step.3.2 が見つかりません。"
                fi
              else
                echo "WARNING: Step.3 コンテナが見つかりません。"
              fi
              ;;

            "3.2")
              # Step.3.2 完了 → Step.3 コンテナに asdw:done → Step.4.1 + Step.4.2 を並列起動
              S3_NUM=$(get_sub_issue_number '\[ASDW\] Step\.3:')
              if [[ -n "${S3_NUM}" ]]; then
                add_label "${S3_NUM}" "asdw:done"
                echo "Step.3 コンテナに asdw:done を付与しました。"
              fi
              S4_NUM=$(get_sub_issue_number '\[ASDW\] Step\.4:')
              if [[ -n "${S4_NUM}" ]]; then
                S41_NUM=$(get_sub_issue_number_from_parent "${S4_NUM}" '\[ASDW\] Step\.4\.1:')
                S42_NUM=$(get_sub_issue_number_from_parent "${S4_NUM}" '\[ASDW\] Step\.4\.2:')
                if [[ -n "${S41_NUM}" ]]; then
                  activate_issue "${S41_NUM}"
                  echo "Step.4.1 を起動しました（並列実行）。"
                else
                  echo "WARNING: Step.4.1 が見つかりません。"
                fi
                if [[ -n "${S42_NUM}" ]]; then
                  activate_issue "${S42_NUM}"
                  echo "Step.4.2 を起動しました（並列実行）。"
                else
                  echo "WARNING: Step.4.2 が見つかりません。"
                fi
              else
                echo "WARNING: Step.4 コンテナが見つかりません。"
              fi
              ;;

            "4.1"|"4.2")
              # Step.4.1 or Step.4.2 完了 → 両方完了確認 → Step.4 コンテナに asdw:done → Root に asdw:done + 完了コメント
              S4_NUM=$(get_sub_issue_number '\[ASDW\] Step\.4:')
              if [[ -n "${S4_NUM}" ]]; then
                # Step.4.1 と Step.4.2 の両方が asdw:done かチェック
                S4_SUBS=$(api_call GET \
                  "https://api.github.com/repos/${REPO}/issues/${S4_NUM}/sub_issues")
                BOTH_DONE=$(echo "${S4_SUBS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          issues = json.load(sys.stdin)
          # Step.4.1 と Step.4.2 の label に asdw:done が含まれるか確認
          done_count = 0
          for issue in issues:
              labels = [l['name'] for l in issue.get('labels', [])]
              if 'asdw:done' in labels:
                  done_count += 1
          # 両方(2つ)が done なら true
          print('true' if done_count >= 2 else 'false')
          PY
                )
                if [[ "${BOTH_DONE}" == "true" ]]; then
                  add_label "${S4_NUM}" "asdw:done"
                  echo "Step.4 コンテナに asdw:done を付与しました。"
                  # Root Issue に asdw:done を付与してワークフロー完了を示す
                  add_label "${ROOT_ISSUE}" "asdw:done"
                  echo "Root Issue #${ROOT_ISSUE} に asdw:done を付与しました。"
                  # Root Issue に完了コメント
                  post_comment "${ROOT_ISSUE}" "🎉 全ての開発ステップが完了しました！Root Issue #${ROOT_ISSUE} の Web App on Azure 開発ワークフローが正常に終了しました。"
                  echo "Root Issue #${ROOT_ISSUE} に完了コメントを投稿しました。"
                else
                  echo "Step.4 の両方の Sub Issue がまだ完了していません。もう一方の完了を待ちます。"
                fi
              else
                echo "WARNING: Step.4 コンテナが見つかりません。"
              fi
              ;;

            *)
              echo "未定義の Step: ${STEP_MATCH}。スキップ。"
              ;;
          esac
          # ── 自動クローズ判定（auto-merge 有効時）──────────────
          if [[ -f "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh" ]]; then
            source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh"

            # コンテナ Issue の自動クローズ判定
            _AC_CONTAINER_NUM=""
            if [[ "${DONE_ISSUE_TITLE}" =~ ^\[ASDW\]\ Step\.[0-9]+\.[0-9] ]]; then
              _AC_PARENT_STEP=$(echo "${DONE_ISSUE_TITLE}" \
                | grep -oP '\[ASDW\]\s*Step\.\K\d+' | head -1)
              if [[ -n "${_AC_PARENT_STEP}" ]]; then
                _AC_CONTAINER_NUM=$(gh api --paginate \
                  "/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues?per_page=100" \
                  --jq ".[] | select(.title | test(\"\\\\[ASDW\\\\] Step\\\\.${_AC_PARENT_STEP}:\")) | .number" \
                  2>/dev/null | head -1) || _AC_CONTAINER_NUM=""
              fi
            fi

            if [[ -n "${_AC_CONTAINER_NUM}" && "${_AC_CONTAINER_NUM}" =~ ^[0-9]+$ ]]; then
              echo "=== コンテナ Issue #${_AC_CONTAINER_NUM} の自動クローズ判定 ==="
              auto_close_container_if_done "${_AC_CONTAINER_NUM}" "${REPO}" || true
            fi

            echo "=== Root Issue #${ROOT_ISSUE} の自動クローズ判定 ==="
            auto_close_root_if_all_done "${ROOT_ISSUE}" "${REPO}" || true
          fi
