name: Deploy Agent AGT-06-03 — AccountInquiryAgent

on:
  push:
    branches: [main]
    paths:
      - "src/agent/AGT-06-03-AccountInquiryAgent/**"
      - ".github/workflows/deploy-agent-AGT-06-03-AccountInquiryAgent.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "デプロイ環境"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-agent-AGT-06-03
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: dahatake-royal2
  AI_PROJECT_NAME: royal2-aiproj-app05
  AGENT_ID: AGT-06-03
  AGENT_NAME: AccountInquiryAgent
  AGENT_DIR: AGT-06-03-AccountInquiryAgent

jobs:
  # ------------------------------------------------------------------ build
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd src/agent/${{ env.AGENT_DIR }}
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install azure-ai-agents azure-identity
          fi

      - name: Validate agent-config.json
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("src/agent/${{ env.AGENT_DIR }}/agent-config.json") as f:
              config = json.load(f)
          expected_id = "${{ env.AGENT_ID }}"
          expected_name = "${{ env.AGENT_NAME }}"
          assert config.get("agentId") == expected_id, \
              f"agentId mismatch: expected={expected_id}, got={config.get('agentId')}"
          assert config.get("agentName") == expected_name, \
              f"agentName mismatch: expected={expected_name}, got={config.get('agentName')}"
          print(f"agent-config.json validated: {config['agentId']} - {config['agentName']}")
          EOF

      - name: Validate system prompt
        run: |
          test -f src/agent/${{ env.AGENT_DIR }}/prompts/system-prompt.md \
            && echo "system-prompt.md exists" \
            || echo "WARNING: system-prompt.md not found, default prompt will be used"

  # ------------------------------------------------------------------ deploy
  deploy:
    name: Deploy to Azure AI Foundry
    needs: build
    runs-on: ubuntu-latest
    environment: production
    outputs:
      endpoint: ${{ steps.get-endpoint.outputs.endpoint }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deployment dependencies
        run: pip install azure-ai-agents azure-identity

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AI Foundry Endpoint
        id: get-endpoint
        env:
          AI_SERVICES_NAME: royal2-aiservices-app05
        run: |
          BASE=$(az cognitiveservices account show \
            --name "${AI_SERVICES_NAME}" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.endpoints.\"AI Foundry API\"" \
            --output tsv)
          if [ -z "$BASE" ]; then
            echo "ERROR: AI Services '${{ env.AI_SERVICES_NAME }}' の AI Foundry API エンドポイントが取得できませんでした" >&2
            exit 1
          fi
          ENDPOINT="${BASE%/}/api/projects/${{ env.AI_PROJECT_NAME }}"
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "AI Foundry Agent Service Endpoint: $ENDPOINT"

      - name: Deploy agent ${{ env.AGENT_ID }}
        env:
          AZURE_AI_FOUNDRY_ENDPOINT: ${{ steps.get-endpoint.outputs.endpoint }}
          AZURE_AI_FOUNDRY_MODEL: ${{ secrets.AZURE_AI_FOUNDRY_MODEL || 'gpt-4o' }}
        run: |
          python3 infra/azure/create-azure-agent-resources/deploy_agents.py \
            --project-endpoint "$AZURE_AI_FOUNDRY_ENDPOINT" \
            --model "${AZURE_AI_FOUNDRY_MODEL:-gpt-4o}" \
            --agent-filter "${{ env.AGENT_ID }}"

  # ------------------------------------------------------------------ smoke-test
  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install azure-ai-agents azure-identity

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke test — verify agent registration
        env:
          AZURE_AI_FOUNDRY_ENDPOINT: ${{ needs.deploy.outputs.endpoint }}
        run: |
          python3 infra/azure/create-azure-agent-resources/verify_agents.py \
            --project-endpoint "$AZURE_AI_FOUNDRY_ENDPOINT" \
            --agent-ids "${{ env.AGENT_ID }}:${{ env.AGENT_NAME }}"
