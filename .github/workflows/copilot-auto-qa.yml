name: Copilot PR 質問票作成指示

# auto-qa ラベルが PR に付与されており、かつ PR が ready（非 draft）状態の場合に、
# 自動的に質問票作成指示コメントを PR に投稿する。
# （Copilot が自分で判断できない全ての事について選択式の質問票を作成し、デフォルト回答案を付けて提示する）
#
# トリガー条件:
#   - labeled: PR にラベルが付与された時（ジョブ if で auto-qa + !draft をチェック）
#   - ready_for_review: PR が draft → ready に変更された時（ジョブ if でラベル + !draft をチェック）
#   → どちらの操作順序でも動作する（ラベル→ready / ready→ラベル）
#
# ジョブ実行条件:
#   - PR に auto-qa ラベルが付与されていること
#   - PR が draft でないこと（ready 状態）
#   - すべてを満たす場合のみジョブが実行される
#
# opt-out チェック（ステップレベル）:
#   - PR body の <!-- START COPILOT ORIGINAL PROMPT --> より前の部分のみを対象に
#     <!-- auto-qa: false --> の有無をチェックする
#   - Copilot が元 Issue body を PR body に引用している場合でも誤マッチしない
#   - opt-out マーカーが検出された場合、後続ステップ（guard, post comment）をスキップする
#
# 冪等化:
#   - 同一 PR に対する重複コメントを防止（<!-- copilot-auto-qa-posted --> マーカーで判定）
#   - 再質問したい場合は、既存コメントを削除してから auto-qa ラベルを削除→再付与
#
# 注意:
#   - pull_request_target を使用（ベースブランチのワークフロー定義で実行されるため、
#     Copilot が作成した PR でも自動的に発火する）
#   - COPILOT_PAT 優先、未設定時は GITHUB_TOKEN にフォールバック
#   - ${{ }} 式をシェル変数に直接展開せず、env 経由で渡す（スクリプトインジェクション対策）

on:
  pull_request_target:
    types: [labeled, ready_for_review]

concurrency:
  group: copilot-auto-qa-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  issues: write

jobs:
  auto-qa:
    if: >
      contains(github.event.pull_request.labels.*.name, 'auto-qa')
      && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BODY: ${{ github.event.pull_request.body }}

    steps:
      - name: Check opt-out marker in PR body (excluding quoted sections)
        id: optout
        run: |
          set -euo pipefail
          # <!-- START COPILOT ORIGINAL PROMPT --> 以降（Copilot による元 Issue 引用部分）を除外し、
          # PR 本文のみを対象に opt-out マーカーをチェックする
          PR_BODY_HEAD=$(printf '%s' "${PR_BODY}" | sed '/<!-- START COPILOT ORIGINAL PROMPT -->/,$d')
          if printf '%s' "${PR_BODY_HEAD}" | grep -qF '<!-- auto-qa: false -->'; then
            echo "PR body の先頭部分に opt-out マーカーが含まれています。後続ステップをスキップします。"
            echo "opted_out=true" >> "${GITHUB_OUTPUT}"
          else
            echo "opted_out=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check for existing QA comment
        id: guard
        if: steps.optout.outputs.opted_out != 'true'
        run: |
          set -euo pipefail
          MARKER="<!-- copilot-auto-qa-posted -->"
          existing=0
          if existing=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq "[.[] | select(.body | contains(\"${MARKER}\"))] | length" \
            2>/dev/null); then
            :
          else
            existing=0
          fi
          if [ "${existing:-0}" -gt 0 ]; then
            echo "質問票作成指示コメントは既に投稿済みです。スキップします。"
            echo "posted=true" >> "${GITHUB_OUTPUT}"
          else
            echo "posted=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Post auto QA instruction to Copilot
        if: steps.optout.outputs.opted_out != 'true' && steps.guard.outputs.posted != 'true'
        env:
          COMMENT_BODY: |
            <!-- copilot-auto-qa-posted -->
            @copilot

            あなたが自分で判断できない全ての事については、質問事項を15～100個リストアップして、選択式の質問票を作成して、私の回答を得るようにしてください。私が答えなかった場合に備えて、目的を考慮して、複数の選択肢から最良のものをデフォルトの回答案として作成します。その回答の理由も作成してください。

            捏造は絶対に禁止です。
        run: |
          set -euo pipefail
          if gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "${COMMENT_BODY}"; then
            echo "✅ 質問票作成指示コメントを PR #${PR_NUMBER} に投稿しました。"
          else
            echo "::error::PR #${PR_NUMBER} へのコメント投稿に失敗しました。"
            exit 1
          fi
