name: Copilot Auto Feedback

on:
  pull_request_target:
    types: [labeled, ready_for_review]
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      target_issue:
        description: 'テスト対象 Issue 番号'
        required: true
        type: string
      target_pr:
        description: 'テスト対象 PR 番号（PR 経路の場合）'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'ドライラン（書き込み操作をスキップ）'
        required: false
        type: boolean
        default: true
      simulate_label:
        description: 'シミュレートするラベル名（例: aas:qa-ready）'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-qa:
    concurrency:
      group: copilot-auto-qa-${{ github.event_name == 'workflow_dispatch' && inputs.target_pr || github.event.pull_request.number }}
      cancel-in-progress: false
    if: >
      (github.event_name == 'pull_request_target'
      && contains(github.event.pull_request.labels.*.name, 'auto-qa')
      && !contains(github.event.pull_request.labels.*.name, 'qa-questionnaire-pr'))
      || (github.event_name == 'workflow_dispatch' && inputs.target_pr != '')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.target_issue || github.event.issue.number }}
      PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.target_pr || github.event.pull_request.number }}
      SIMULATE_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_label || '' }}
      PR_BODY: ${{ github.event.pull_request.body }}

    steps:
      - name: Check opt-out marker in PR body (excluding quoted sections)
        id: optout
        run: |
          set -euo pipefail
          # <!-- START COPILOT ORIGINAL PROMPT --> 以降（Copilot による元 Issue 引用部分）を除外し、
          # PR 本文のみを対象に opt-out マーカーをチェックする
          PR_BODY_HEAD=$(printf '%s' "${PR_BODY}" | sed '/<!-- START COPILOT ORIGINAL PROMPT -->/,$d')
          if printf '%s' "${PR_BODY_HEAD}" | grep -qF '<!-- auto-qa: false -->'; then
            echo "PR body の先頭部分に opt-out マーカーが含まれています。後続ステップをスキップします。"
            echo "opted_out=true" >> "${GITHUB_OUTPUT}"
          else
            echo "opted_out=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check for existing QA comment
        id: guard
        if: steps.optout.outputs.opted_out != 'true'
        run: |
          set -euo pipefail
          MARKER="<!-- copilot-auto-qa-posted -->"
          existing=0
          if existing=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq "[.[] | select(.body | contains(\"${MARKER}\"))] | length" \
            2>/dev/null); then
            :
          else
            existing=0
          fi
          if [ "${existing:-0}" -gt 0 ]; then
            echo "質問票作成指示コメントは既に投稿済みです。スキップします。"
            echo "posted=true" >> "${GITHUB_OUTPUT}"
          else
            echo "posted=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Post auto QA instruction to Copilot
        if: steps.optout.outputs.opted_out != 'true' && steps.guard.outputs.posted != 'true'
        env:
          COMMENT_BODY: |
            <!-- copilot-auto-qa-posted -->
            @copilot

            あなたは、私の依頼を実行する前に、目的達成に必要な確認事項を整理し、優先順位付きの質問票を作るアシスタントです。

            ## あなたの役割
            - 私の依頼内容を読み取り、まず「このタスクの目的」を1〜3文で要約してください。
            - そのうえで、目的達成に必要な確認事項を、あなたが自動生成した「分類項目」に整理してください。
            - 質問は単なる列挙ではなく、各分類項目ごとに重要度を判定し、重要度順に出力してください。

            ## 最重要ルール
            - 捏造は禁止です。
            - 不明な情報を、事実であるかのように補完してはいけません。
            - 私が未回答の項目については、「既定値」「仮置き」「推奨案」などのラベルを付け、事実と区別してください。
            - 「何が分からないか」だけでなく、「その不明点が目的達成にどれほど影響するか」を評価してください。
            - 質問数は固定で無理に増やさず、目的達成に必要なものだけを出してください。
            - 原則として、私に回答を求めるのは「最重要」と「高」の項目を優先し、「中」「低」は未回答でも既定値で進められるようにしてください。

            ## 分類項目の作り方
            私の依頼に応じて、質問の分類項目を自動生成してください。
            分類項目は依頼内容に応じて変えて構いませんが、必要に応じて以下の観点を参考にしてください。
            - 目的・成功条件
            - 成果物の種類
            - 対象読者・利用者
            - スコープ
            - 制約条件
            - 優先順位
            - 期限・スケジュール
            - 前提情報・入力データ
            - 参照元・根拠
            - トーン・形式
            - 品質基準
            - 実行方法・運用条件

            ## 重要度の判定基準
            各質問について、次の4段階で重要度を判定してください。

            - 最重要:
              未確認のままだと、目的を取り違える、成果物の方向性が大きくずれる、または作業開始自体が危険/不可能になる項目
            - 高:
              品質や適合性に大きく影響し、できれば先に確認すべき項目
            - 中:
              なくても仮置きで進められるが、精度や満足度に影響する項目
            - 低:
              後から調整可能で、未回答でも大勢に影響しにくい項目

            ## 質問の作り方
            - 質問は、できるだけ選択式で作成してください。
            - 必要に応じて「その他」や「自由記述」を追加してください。
            - 各質問には、未回答時の既定値候補を1つ提示してください。
            - 既定値候補には、なぜそれが妥当かの理由を簡潔に添えてください。
            - 既定値候補は、目的達成の観点から最も合理的なものを選んでください。
            - 既定値候補は、事実ではなく仮置き案として明記してください。

            ## 出力手順
            以下の順番で出力してください。

            ### 1. 目的の要約
            - 私の依頼の目的
            - あなたの理解
            - この時点で不足している主要論点

            ### 2. 自動生成した分類項目
            各分類項目について、以下を示してください。
            - 分類名
            - この分類が必要な理由
            - 分類全体の重要度（最重要 / 高 / 中 / 低）

            ### 3. 優先順位付き質問票
            重要度ごとに見出しを分け、質問を一覧化してください。
            見出しの順番は以下の通りです。
            - 最重要
            - 高
            - 中
            - 低

            各質問は以下の形式で出力してください。

            [質問ID]
            - 分類項目:
            - 重要度:
            - 確認したいこと:
            - 質問文:
            - 選択肢:
              1.
              2.
              3.
              4. その他
            - 未回答時の既定値候補:
            - 既定値候補の理由:
            - 未回答のまま進めた場合の影響:

            ### 4. 回答優先ガイド
            最後に、私が先に答えるべき質問をまとめてください。
            - まず回答が必要な質問（最重要）
            - 次に回答推奨の質問（高）
            - 後回しでもよい質問（中・低）

            ### 5. 未回答時の処理方針
            - 私が未回答だった場合に、どの質問は既定値で進めるか
            - どの質問は未回答のままだと進行停止にすべきか
            - 既定値で進める場合の注意点

            ## 追加ルール
            - 私の依頼が曖昧でも、いきなり大量の質問を出さず、まず目的に直結する分類を優先してください。
            - 重複質問は禁止です。
            - 似た質問は統合してください。
            - 不明点が多い場合でも、優先順位を崩さず、重要度順に整理してください。
            - 私が回答しやすいように、質問文は短く明確にしてください。
            - 必要に応じて、あなた自身が推奨する初期設定案もまとめてください。

            **重要**: qa/ 配下に質問票ファイルを作成するとともに、**質問票の全質問・全選択肢・全既定値候補・全既定値候補の理由・全重要度判定・全「未回答のまま進めた場合の影響」を省略なくこの PR のコメントとしても投稿してください**。レビュワーが PR 単体で全設問と重要度、および未回答のまま進めた場合の影響を把握できるようにするためです。サマリーのみの投稿は禁止です。

            ## QA Context Usage

            この QA 質問票と回答は、後続の実装 Step および Review で参照されます。以下のルールを厳守してください:
            - `qa/` 配下に保存した回答ファイルのパスをこのコメント内に明記してください。
            - 後続タスクを担当する Copilot は、この Root Issue / Step に対応する `qa/` 配下の QA 回答ファイルを必ず参照したうえで成果物を作成してください。
            - QA 回答は成果物の前提要件として扱い、成果物に反映してください。
            - QA 回答を成果物に反映しない場合は、その理由を完了コメントまたは成果物内に記録してください。
        run: |
          set -euo pipefail
          dry_run_guard() {
            local cmd_desc="$1"
            shift
            if [ "${DRY_RUN}" = "true" ]; then
              echo "::notice::[DRY RUN] スキップ: ${cmd_desc}"
              echo "[DRY RUN] would execute: ${cmd_desc}"
              return 0
            fi
            "$@"
          }
          if dry_run_guard "PR への auto-qa 指示コメント投稿" \
            gh pr comment "${PR_NUMBER}" \
              --repo "${REPO}" \
              --body "${COMMENT_BODY}"; then
            echo "✅ 優先順位付き質問票作成指示コメントを PR #${PR_NUMBER} に投稿しました。"
            if [ "${DRY_RUN}" = "true" ]; then
              echo "::group::DRY RUN Summary"
              echo "[DRY RUN] target_issue=${ISSUE_NUMBER}"
              echo "[DRY RUN] target_pr=${PR_NUMBER}"
              echo "[DRY RUN] simulate_label=${SIMULATE_LABEL}"
              echo "[DRY RUN] === Skipped writes ==="
              echo "[DRY RUN] would execute: gh pr comment ${PR_NUMBER} --body \"<COMMENT_BODY (500 chars preview)>\""
              echo "[DRY RUN] === Read-only checks executed ==="
              echo "[DRY RUN] existing QA comment check: OK"
              echo "::endgroup::"
            fi
          else
            echo "::error::PR #${PR_NUMBER} へのコメント投稿に失敗しました。"
            exit 1
          fi

  auto-review:
    concurrency:
      group: copilot-auto-review-${{ github.event_name == 'workflow_dispatch' && inputs.target_pr || github.event.pull_request.number }}
      cancel-in-progress: false
    if: >
      (github.event_name == 'pull_request_target'
      && contains(github.event.pull_request.labels.*.name, 'auto-context-review'))
      || (github.event_name == 'workflow_dispatch' && inputs.target_pr != '')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.target_issue || github.event.issue.number }}
      PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.target_pr || github.event.pull_request.number }}
      SIMULATE_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_label || '' }}
      PR_BODY: ${{ github.event.pull_request.body }}

    steps:
      - name: Check opt-out marker in PR body (excluding quoted sections)
        id: optout
        run: |
          set -euo pipefail
          # <!-- START COPILOT ORIGINAL PROMPT --> 以降（Copilot による元 Issue 引用部分）を除外し、
          # PR 本文のみを対象に opt-out マーカーをチェックする
          PR_BODY_HEAD=$(printf '%s' "${PR_BODY}" | sed '/<!-- START COPILOT ORIGINAL PROMPT -->/,$d')
          if printf '%s' "${PR_BODY_HEAD}" | grep -qF '<!-- auto-context-review: false -->'; then
            echo "PR body の先頭部分に opt-out マーカーが含まれています。後続ステップをスキップします。"
            echo "opted_out=true" >> "${GITHUB_OUTPUT}"
          else
            echo "opted_out=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check for existing review comment
        id: guard
        if: steps.optout.outputs.opted_out != 'true'
        run: |
          set -euo pipefail
          MARKER="<!-- copilot-auto-review-posted -->"
          existing=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq "[.[] | select(.body | contains(\"${MARKER}\"))] | length" \
            2>&1) || existing="0"
          if [ "${existing:-0}" -gt 0 ] 2>/dev/null; then
            echo "レビュー指示コメントは既に投稿済みです。スキップします。"
            echo "posted=true" >> "${GITHUB_OUTPUT}"
          else
            echo "posted=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Post auto review instruction to Copilot
        if: steps.optout.outputs.opted_out != 'true' && steps.guard.outputs.posted != 'true'
        env:
          COMMENT_BODY: |
            <!-- copilot-auto-review-posted -->
            @copilot

            ## 敵対的レビュー指示（Adversarial Review）

            あなたは今から **敵対的レビュアー** として振る舞ってください。
            あなたはこの PR の成果物の作成者 **ではありません**。
            作成者の意図に共感せず、問題の発見に集中してください。

            ### 指示

            1. この PR の変更内容と、紐づく Issue の目的・受け入れ条件（AC）を確認してください。
            2. 以下の **5つの検証軸** で問題を網羅的に検出してください:

            | 軸 | 検証内容 |
            |----|---------|
            | **要件充足性** | Issue の目的・AC を満たしているか。欠落している要件はないか |
            | **技術的正確性** | ロジック・データモデル・API設計・構文に誤りがないか |
            | **整合性** | 他ステップの成果物・既存ドキュメント・用語との矛盾がないか |
            | **非機能品質** | パフォーマンス・セキュリティ・保守性・テスト可能性 |
            | **捏造検出** | TBD/不明と書くべき箇所が根拠なく具体的な値で埋められていないか |

            3. 各問題に **Critical / Major / Minor** の重大度を付けてください:
               - **Critical**: 要件未達・データ破損リスク・セキュリティ脆弱性（修正必須）
               - **Major**: 設計上の懸念・整合性問題・テスト漏れ（修正推奨）
               - **Minor**: 表記揺れ・改善提案・スタイル（任意修正）

            4. 問題を **0〜30個** リストアップしてください（問題がない場合は 0 件でよい。存在しない問題を作ってはいけない）。
            5. **捏造は絶対に禁止です**。存在しない問題を指摘してはいけません。全ての指摘に根拠を明記してください。

            ### 出力フォーマット（必須）

            以下の構造化フォーマットで出力してください:

            | No. | 軸 | 重大度 | 指摘箇所 | 問題の説明 | 修正案 |
            |-----|-----|--------|---------|-----------|--------|
            | 1 | [軸名] | [Critical/Major/Minor] | [ファイルパスまたはセクション] | [具体的な問題] | [具体的な修正案] |

            ### 実行手順（厳守）

            以下の手順を **この順番で** 実行してください。

            #### ステップ 1: レビュー（指摘リスト作成）
            5 つの検証軸で成果物を検証し、指摘事項を Critical / Major / Minor に分類して一覧化してください。

            #### ステップ 2: 修正実行
            - **Critical の指摘は全て修正**してください。
            - **Major の指摘は修正を検討**し、修正しない場合は理由を記載してください。
            - Minor は任意ですが、修正可能なものは修正してください。
            - 修正完了後、修正内容の概要を箇条書きで報告してください。

            #### ステップ 3: 修正後の残存 Critical カウント
            ステップ 2 の修正実行後に、**まだ未解決の Critical が何件残っているか**を再カウントしてください。

            #### ステップ 4: 最終サマリー + 合格判定
            **修正後**の残存件数に基づいて、以下の形式で出力してください:

            ### サマリー（修正後）
            - Critical（残存）: X件
            - Major（残存）: Y件
            - Minor（残存）: Z件
            - **合格判定**: ✅ PASS（残存 Critical = 0 の場合）/ ❌ FAIL（残存 Critical > 0 の場合）

            **重要**: 合格判定の直後に、以下のいずれかの HTML コメントマーカーを **必ず** 出力:
            - 残存 Critical = 0: `<!-- review-verdict: PASS -->`
            - 残存 Critical > 0: `<!-- review-verdict: FAIL -->`

            #### ステップ 5: 成果物反映レポート

            ステップ 4 の出力後、以下の形式で成果物反映レポートを **必ず** 出力してください:

            ## Review Improvement Application

            ### Review Findings Applied
            - [ ] Critical findings fixed (or N/A if none)
            - [ ] Major findings fixed or explicitly justified
            - [ ] Minor findings reviewed

            ### Modified Artifacts
            <!-- 修正したファイルがある場合はパスをリスト。なければ「変更なし」と記載 -->

            ### Remaining Findings
            | No. | Severity | Reason not fixed |
            |---|---|---|
            <!-- 未修正の指摘がある場合のみ記載。全修正済みの場合は「なし」と記載 -->

            ### Verdict After Fix
            <!-- review-verdict-after-fix: PASS/FAIL -->

            捏造は絶対に禁止です。
        run: |
          set -euo pipefail
          dry_run_guard() {
            local cmd_desc="$1"
            shift
            if [ "${DRY_RUN}" = "true" ]; then
              echo "::notice::[DRY RUN] スキップ: ${cmd_desc}"
              echo "[DRY RUN] would execute: ${cmd_desc}"
              return 0
            fi
            "$@"
          }
          if dry_run_guard "PR への auto-review 指示コメント投稿" \
            gh pr comment "${PR_NUMBER}" \
              --repo "${REPO}" \
              --body "${COMMENT_BODY}"; then
            echo "✅ 敵対的レビュー指示コメントを PR #${PR_NUMBER} に投稿しました。"
            if [ "${DRY_RUN}" = "true" ]; then
              echo "::group::DRY RUN Summary"
              echo "[DRY RUN] target_issue=${ISSUE_NUMBER}"
              echo "[DRY RUN] target_pr=${PR_NUMBER}"
              echo "[DRY RUN] simulate_label=${SIMULATE_LABEL}"
              echo "[DRY RUN] === Skipped writes ==="
              echo "[DRY RUN] would execute: gh pr comment ${PR_NUMBER} --body \"<COMMENT_BODY (500 chars preview)>\""
              echo "[DRY RUN] === Read-only checks executed ==="
              echo "[DRY RUN] existing review comment check: OK"
              echo "::endgroup::"
            fi
          else
            echo "::error::PR #${PR_NUMBER} へのコメント投稿に失敗しました。"
            exit 1
          fi

  auto-qa-on-issue:
    # Issue に *:qa-ready ラベルが付与された時に事前 QA 質問票を投稿する
    concurrency:
      group: copilot-auto-pre-qa-${{ github.event_name == 'workflow_dispatch' && inputs.target_issue || github.event.issue.number }}
      cancel-in-progress: false
    if: >
      (github.event_name == 'issues'
      && github.event.action == 'labeled'
      && contains(fromJSON('["aas:qa-ready","aad:qa-ready","aad-web:qa-ready","asdw:qa-ready","asdw-web:qa-ready","abd:qa-ready","abdv:qa-ready","aag:qa-ready","aagd:qa-ready","akm:qa-ready","aqod:qa-ready","adoc:qa-ready"]'), github.event.label.name))
      || (github.event_name == 'workflow_dispatch'
      && contains(fromJSON('["aas:qa-ready","aad:qa-ready","aad-web:qa-ready","asdw:qa-ready","asdw-web:qa-ready","abd:qa-ready","abdv:qa-ready","aag:qa-ready","aagd:qa-ready","akm:qa-ready","aqod:qa-ready","adoc:qa-ready"]'), inputs.simulate_label))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.target_issue || github.event.issue.number }}
      PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.target_pr || github.event.pull_request.number }}
      QA_READY_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_label || github.event.label.name }}
      SIMULATE_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_label || '' }}

    steps:
      - name: Diagnostic — トリガー条件確認
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "action=${{ github.event.action }}"
          echo "label.name=${{ github.event.label.name }}"
          echo "issue.number=${{ github.event.issue.number }}"
          echo "ref=${{ github.ref }}"

      - name: 冪等性ガード（既に事前 QA 投稿済みならスキップ）
        id: guard
        run: |
          set -euo pipefail
          MARKER="<!-- copilot-auto-pre-qa-posted -->"
          existing=0
          if existing=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            --paginate \
            --jq "[.[] | select(.body | contains(\"${MARKER}\"))] | length" \
            2>/dev/null); then
            :
          else
            existing=0
          fi
          if [ "${existing:-0}" -gt 0 ]; then
            echo "事前 QA 指示コメントは既に投稿済みです。スキップします。"
            echo "posted=true" >> "${GITHUB_OUTPUT}"
          else
            echo "posted=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: pre-QA prompt source を checkout
        if: steps.guard.outputs.posted != 'true' || vars.ENABLE_COPILOT_QA_ASSIGN != 'false'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.guard.outputs.posted != 'true' || vars.ENABLE_COPILOT_QA_ASSIGN != 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: hve をインストール
        if: steps.guard.outputs.posted != 'true' || vars.ENABLE_COPILOT_QA_ASSIGN != 'false'
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Issue に事前 QA 質問票生成指示を投稿
        if: steps.guard.outputs.posted != 'true'
        run: |
          set -euo pipefail
          dry_run_guard() {
            local cmd_desc="$1"
            shift
            if [ "${DRY_RUN}" = "true" ]; then
              echo "::notice::[DRY RUN] スキップ: ${cmd_desc}"
              echo "[DRY RUN] would execute: ${cmd_desc}"
              return 0
            fi
            "$@"
          }
          COMMENT_BODY="$(python3 -m hve emit-prompt pre-qa --comment-body)" || {
            echo "::error::hve emit-prompt の実行に失敗しました。"
            exit 1
          }
          if [ -z "${COMMENT_BODY}" ]; then
            echo "::error::COMMENT_BODY が空です。hve emit-prompt の出力を確認してください。"
            exit 1
          fi
          echo "::group::COMMENT_BODY preview (先頭500文字)"
          printf '%s' "${COMMENT_BODY}" | head -c 500
          echo
          echo "::endgroup::"
          if dry_run_guard "Issue への pre-QA 指示コメント投稿" \
            gh issue comment "${ISSUE_NUMBER}" \
              --repo "${REPO}" \
              --body "${COMMENT_BODY}"; then
            echo "✅ 事前 QA 質問票作成指示コメントを Issue #${ISSUE_NUMBER} に投稿しました。"
            if [ "${DRY_RUN}" = "true" ]; then
              echo "::group::DRY RUN Summary"
              echo "[DRY RUN] target_issue=${ISSUE_NUMBER}"
              echo "[DRY RUN] target_pr=${PR_NUMBER}"
              echo "[DRY RUN] simulate_label=${SIMULATE_LABEL}"
              echo "[DRY RUN] === Skipped writes ==="
              echo "[DRY RUN] would execute: gh issue comment ${ISSUE_NUMBER} --body \"<COMMENT_BODY (500 chars preview)>\""
              echo "[DRY RUN] === Read-only checks executed ==="
              echo "[DRY RUN] issue_data fetched: OK"
              echo "[DRY RUN] pre-qa prompt generated by hve: OK"
              echo "::endgroup::"
            fi
          else
            echo "::error::Issue #${ISSUE_NUMBER} へのコメント投稿に失敗しました。"
            exit 1
          fi

      - name: Copilot を Issue にアサインして qa-drafting へ遷移
        if: ${{ vars.ENABLE_COPILOT_QA_ASSIGN != 'false' }}
        run: |
          set -euo pipefail
          dry_run_guard() {
            local cmd_desc="$1"
            shift
            if [ "${DRY_RUN}" = "true" ]; then
              echo "::notice::[DRY RUN] スキップ: ${cmd_desc}"
              echo "[DRY RUN] would execute: ${cmd_desc}"
              return 0
            fi
            "$@"
          }
          issue_data=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}") || {
            echo "::error::Issue #${ISSUE_NUMBER} の取得に失敗しました。"
            exit 1
          }

          issue_labels=$(printf '%s' "${issue_data}" | python3 -c "
          import sys, json
          print(json.dumps([l['name'] for l in json.load(sys.stdin).get('labels', [])]))
          " 2>/dev/null || echo '[]')
          QA_DRAFTING_LABEL="${QA_READY_LABEL/:qa-ready/:qa-drafting}"

          if printf '%s' "${issue_labels}" | python3 -c "
          import sys, json
          labels = json.load(sys.stdin)
          target = sys.argv[1]
          print('true' if target in labels else 'false')
          " "${QA_DRAFTING_LABEL}" | grep -q '^true$'; then
            echo "Issue #${ISSUE_NUMBER} は既に ${QA_DRAFTING_LABEL} 状態です。"
            exit 0
          fi

          BRANCH=$(printf '%s' "${issue_data}" | python3 -c "
          import sys, json, re
          body = json.load(sys.stdin).get('body', '')
          m = re.search(r'<!--\s*branch:\s*([^\s-][^-]*?)\s*-->', body)
          print(m.group(1).strip() if m else 'main')
          " 2>/dev/null || echo 'main')
          CUSTOM_AGENT=$(printf '%s' "${issue_data}" | python3 -c "
          import sys, json, re
          body = json.load(sys.stdin).get('body', '')
          m = re.search(r'## Custom Agent\s*\n\s*\`([^\`]+)\`', body)
          print(m.group(1) if m else '')
          " 2>/dev/null || echo '')
          SELECTED_MODEL=$(printf '%s' "${issue_data}" | python3 -c "
          import sys, json, re
          body = json.load(sys.stdin).get('body', '')
          m = re.search(r'<!--\s*model:\s*([^\s-][^-]*?)\s*-->', body)
          print(m.group(1).strip() if m else '')
          " 2>/dev/null || echo '')

          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/copilot-assign.sh"
          if ! dry_run_guard "Issue への Copilot アサイン" \
            assign_copilot "${ISSUE_NUMBER}" "${CUSTOM_AGENT}" "${BRANCH}" "" "${SELECTED_MODEL}"; then
            echo "::error::Issue #${ISSUE_NUMBER} への Copilot アサインに失敗しました。"
            exit 1
          fi

          dry_run_guard "qa-ready ラベル除去" \
            gh api -X DELETE \
              "/repos/${REPO}/issues/${ISSUE_NUMBER}/labels/${QA_READY_LABEL}" \
              --silent 2>/dev/null || true
          dry_run_guard "qa-drafting ラベル付与" \
            gh issue edit "${ISSUE_NUMBER}" \
              --repo "${REPO}" \
              --add-label "${QA_DRAFTING_LABEL}" || {
              echo "::error::${QA_DRAFTING_LABEL} ラベル付与に失敗しました。"
              exit 1
            }
          echo "✅ Issue #${ISSUE_NUMBER} に Copilot をアサインし、${QA_DRAFTING_LABEL} へ遷移しました。"
          if [ "${DRY_RUN}" = "true" ]; then
            echo "::group::DRY RUN Summary"
            echo "[DRY RUN] target_issue=${ISSUE_NUMBER}"
            echo "[DRY RUN] target_pr=${PR_NUMBER}"
            echo "[DRY RUN] simulate_label=${SIMULATE_LABEL}"
            echo "[DRY RUN] === Skipped writes ==="
            echo "[DRY RUN] would execute: assign_copilot ${ISSUE_NUMBER} ${CUSTOM_AGENT} ${BRANCH} '' ${SELECTED_MODEL}"
            echo "[DRY RUN] would execute: gh api -X DELETE /repos/${REPO}/issues/${ISSUE_NUMBER}/labels/${QA_READY_LABEL}"
            echo "[DRY RUN] would execute: gh issue edit ${ISSUE_NUMBER} --add-label \"${QA_DRAFTING_LABEL}\""
            echo "[DRY RUN] === Read-only checks executed ==="
            echo "[DRY RUN] issue_data fetched: OK"
            echo "[DRY RUN] custom_agent extracted: ${CUSTOM_AGENT:-}"
            echo "[DRY RUN] branch extracted: ${BRANCH:-main}"
            echo "::endgroup::"
          fi
