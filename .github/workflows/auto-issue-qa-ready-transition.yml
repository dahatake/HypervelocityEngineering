name: Issue QA-Ready to Ready Transition

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened]
  workflow_dispatch:
    inputs:
      target_issue:
        description: 'テスト対象 Issue 番号'
        required: true
        type: string
      target_pr:
        description: 'テスト対象 PR 番号（PR 経路の場合）'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'ドライラン（書き込み操作をスキップ）'
        required: false
        type: boolean
        default: true
      simulate_label:
        description: 'シミュレートするラベル名（例: aas:qa-ready）'
        required: false
        type: string
        default: ''

concurrency:
  group: issue-qa-ready-transition-${{ github.event_name == 'workflow_dispatch' && inputs.target_issue || github.event.issue.number || format('pr-{0}', github.event.pull_request.number) }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  transition:
    # Issue コメントが投稿された時に、*:qa-ready ラベルを持つ Issue を *:ready に遷移させる
    # トリガー条件:
    #   - <!-- auto-qa-default-answered --> マーカー付きコメント
    #   - または @copilot メンション付きの OWNER/MEMBER/COLLABORATOR コメント
    if: >
      github.event_name != 'pull_request_target'
      && !github.event.issue.pull_request
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.target_issue || github.event.issue.number }}
      PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.target_pr || github.event.pull_request.number }}
      SIMULATE_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_label || '' }}
      COMMENT_BODY: ${{ github.event.comment.body }}
      COMMENT_AUTHOR_ASSOC: ${{ github.event.comment.author_association }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: workflow_dispatch 対象が PR でないことを確認
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          issue_data=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" 2>/dev/null) || {
            echo "::error::Issue #${ISSUE_NUMBER} の取得に失敗しました。"
            exit 1
          }
          is_pr=$(printf '%s' "${issue_data}" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print('true' if data.get('pull_request') else 'false')
          " 2>/dev/null || echo 'false')
          if [ "${is_pr}" = "true" ]; then
            echo "::error::target_issue=${ISSUE_NUMBER} は PR です。Issue 番号を指定してください。"
            exit 1
          fi

      - name: Issue の *:qa-ready / *:qa-drafting ラベル確認
        id: detect-qa-ready
        run: |
          set -euo pipefail
          if [ "${DRY_RUN}" = "true" ] && [ -n "${SIMULATE_LABEL}" ]; then
            echo "qa_ready_label=${SIMULATE_LABEL}" >> "${GITHUB_OUTPUT}"
            echo "[DRY RUN] simulate_label=${SIMULATE_LABEL} を qa-ready ラベルとして使用します。"
            exit 0
          fi
          issue_data=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" 2>/dev/null) || issue_data=''
          if [ -z "${issue_data}" ]; then
            echo "qa_ready_label=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          qa_ready_label=$(echo "${issue_data}" | python3 -c "
          import sys, json
          labels = [l['name'] for l in json.load(sys.stdin).get('labels', [])]
          qa_labels = [l for l in labels if l.endswith(':qa-ready') or l.endswith(':qa-drafting')]
          print(qa_labels[0] if qa_labels else '')
          " 2>/dev/null || echo '')
          echo "qa_ready_label=${qa_ready_label}" >> "${GITHUB_OUTPUT}"
          if [ -z "${qa_ready_label}" ]; then
            echo "このIssueには *:qa-ready / *:qa-drafting ラベルがありません。スキップします。"
          fi

      - name: コメントがQA回答かどうか確認
        id: detect-answer
        if: steps.detect-qa-ready.outputs.qa_ready_label != ''
        run: |
          set -euo pipefail
          if [ "${DRY_RUN}" = "true" ] && [ -z "${COMMENT_BODY}" ]; then
            echo "detect=dry-run-force-answer" >> "${GITHUB_OUTPUT}"
            echo "is_answer=true" >> "${GITHUB_OUTPUT}"
            echo "[DRY RUN] workflow_dispatch 実行のため QA 回答判定を true 扱いにします。"
            exit 0
          fi
          is_answer="false"

          # 条件1: <!-- auto-qa-default-answered --> マーカー付きコメント
          if printf '%s' "${COMMENT_BODY}" | grep -q '<!-- auto-qa-default-answered -->'; then
            is_answer="true"
            echo "detect=auto-qa-default-answered" >> "${GITHUB_OUTPUT}"
          fi

          # 条件2: @copilot メンション付きの OWNER/MEMBER/COLLABORATOR コメント
          if [ "${is_answer}" != "true" ]; then
            if printf '%s' "${COMMENT_BODY}" | grep -q '@copilot'; then
              if [ "${COMMENT_AUTHOR_ASSOC}" = "OWNER" ] || \
                 [ "${COMMENT_AUTHOR_ASSOC}" = "MEMBER" ] || \
                 [ "${COMMENT_AUTHOR_ASSOC}" = "COLLABORATOR" ]; then
                is_answer="true"
                echo "detect=copilot-mention-by-collaborator" >> "${GITHUB_OUTPUT}"
              fi
            fi
          fi

          echo "is_answer=${is_answer}" >> "${GITHUB_OUTPUT}"

      - name: QA 回答コンテキストを Issue body に注入（冪等性マーカー付き）
        id: inject-qa-context
        # QA 回答本文と URL をメインタスク開始前に Issue body へ直接注入する。
        # Copilot が URL を読みに行く必要なく、QA 回答が確実に参照されるようにする。
        # <!-- hve-qa-context-injected --> マーカーで重複注入を防ぐ。
        # 旧マーカー <!-- hve-qa-summary-linked --> も確認し、後方互換を維持する。
        if: >
          steps.detect-qa-ready.outputs.qa_ready_label != ''
          && steps.detect-answer.outputs.is_answer == 'true'
        run: |
          set -euo pipefail
          echo "qa_comment_found=false" >> "${GITHUB_OUTPUT}"
          dry_run_guard() {
            local cmd_desc="$1"
            shift
            if [ "${DRY_RUN}" = "true" ]; then
              echo "::notice::[DRY RUN] スキップ: ${cmd_desc}"
              echo "[DRY RUN] would execute: ${cmd_desc}"
              return 0
            fi
            "$@"
          }
          NEW_MARKER="<!-- hve-qa-context-injected -->"
          OLD_MARKER="<!-- hve-qa-summary-linked -->"

          # 冪等性チェック: 新マーカーが既に存在すればスキップ
          # 旧マーカー（URL のみ追記）が存在する場合は新セクションを追記する（本文注入にアップグレード）
          current_body=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            --jq '.body // ""' 2>/dev/null) || {
            echo "WARNING: Issue body の取得に失敗しました。QA コンテキスト注入をスキップします。"
            exit 0
          }
          if printf '%s' "${current_body}" | grep -qF "${NEW_MARKER}"; then
            echo "QA コンテキストは既に注入済みです（新マーカー）。スキップします。"
            exit 0
          fi
          # 旧マーカーがある場合でも新マーカーがなければ注入を実行（本文注入へのアップグレード）
          if printf '%s' "${current_body}" | grep -qF "${OLD_MARKER}"; then
            echo "旧マーカーが存在しますが、新形式（本文注入）への追記を実行します。"
          fi

          # QA 回答コメントを取得（最新の既定値回答コメント、または
          # @copilot を含む人間ユーザーの回答コメント）
          # --paginate はページごとに配列を出力するため --jq '.[]' で NDJSON 化し
          # jq -rs で全ページを集約してから最後の一致を選択する。
          qa_comment_json=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            --paginate \
            --jq '.[]' \
            2>/dev/null | jq -rs '
              [
                .[]
                | select(
                    (
                      ((.body // "") | contains("<!-- auto-qa-default-answered -->"))
                    )
                    or
                    (
                      ((.body // "") | contains("@copilot"))
                      and
                      (((.body // "") | contains("<!-- copilot-auto-pre-qa-posted -->")) | not)
                      and
                      (
                        (.author_association // "") == "OWNER"
                        or (.author_association // "") == "MEMBER"
                        or (.author_association // "") == "COLLABORATOR"
                      )
                      and
                      ((.user.type // "") != "Bot")
                      and
                      ((.user.login // "") != "github-actions[bot]")
                      and
                      ((.user.login // "") != "copilot[bot]")
                      and
                      ((.user.login // "") != "copilot-swe-agent[bot]")
                    )
                  )
              ]
              | last
              | {url: (.html_url // ""), body: (.body // "")}
            ') || {
            echo "WARNING: QA コメント一覧の取得に失敗しました。QA コンテキスト注入をスキップします。"
            exit 0
          }

          qa_comment_url=$(printf '%s' "${qa_comment_json}" | jq -r '.url // ""')
          qa_comment_body=$(printf '%s' "${qa_comment_json}" | jq -r '.body // ""')

          if [ -z "${qa_comment_url}" ]; then
            if [ "${DRY_RUN}" = "true" ]; then
              echo "[DRY RUN] QA 回答コメント未検出のため、プレースホルダで注入処理を継続します。"
              qa_comment_url="https://github.com/${REPO}/issues/${ISSUE_NUMBER}#issuecomment-dry-run-placeholder"
              qa_comment_body="> （DRY RUN: QA 回答コメント未投稿のためプレースホルダ）"
            else
              echo "QA 回答未検出: 回答コメントがまだ投稿されていないため、Issue body への注入をスキップします。"
              exit 0
            fi
          fi

          # QA 回答本文が空または「質問なし」の場合の処理
          qa_body_trimmed=$(printf '%s' "${qa_comment_body}" | sed 's/<!--[^>]*-->//g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "${qa_body_trimmed}" ] || printf '%s' "${qa_body_trimmed}" | grep -qi '質問なし\|no question\|N/A'; then
            qa_display_body="> （QA 回答本文が空または「質問なし」です）"
          else
            qa_display_body="${qa_comment_body}"
          fi

          # Issue body に QA コンテキストセクションを注入（URL + 本文）
          # 環境変数経由でユーザー制御コンテンツを渡し、printf で安全に構築する
          APPEND_TEXT=$(printf '\n\n---\n## 📋 Pre-execution QA context\n\nThe following QA answers must be treated as required input for this task.\n\nSource comment:\n%s\n\n%s\n\n<!-- qa-reference-instruction-start -->\n## 🔒 PR 本文に必須セクション（CI 検証あり）\n\n完成 PR の本文に **必ず** 以下のセクションを含めてください（`verify-qa-reference-in-pr.yml` で検証されます）:\n\n<!-- qa-reference-start -->\n## Referenced QA Files\n- qa/<参照したQA回答ファイルのパス>\n<!-- qa-reference-end -->\n\nQA 参照が不要な場合は、同セクション内に「参照なし: 理由 = <理由>」と明記してください。\n\n**現在の検証モード**: 段階導入中（warning → required 予定）\n<!-- qa-reference-instruction-end -->\n\n%s' \
            "${qa_comment_url}" "${qa_display_body}" "${NEW_MARKER}") || {
            echo "WARNING: QA セクション生成に失敗しました。フォールバックでシンプルな追記を行います。"
            APPEND_TEXT=$(printf '\n\n---\n## 📋 Pre-execution QA context\n\nSource comment:\n%s\n\n<!-- qa-reference-instruction-start -->\n## 🔒 PR 本文に必須セクション（CI 検証あり）\n\n完成 PR の本文に **必ず** 以下のセクションを含めてください（`verify-qa-reference-in-pr.yml` で検証されます）:\n\n<!-- qa-reference-start -->\n## Referenced QA Files\n- qa/<参照したQA回答ファイルのパス>\n<!-- qa-reference-end -->\n\nQA 参照が不要な場合は、同セクション内に「参照なし: 理由 = <理由>」と明記してください。\n\n**現在の検証モード**: 段階導入中（warning → required 予定）\n<!-- qa-reference-instruction-end -->\n\n%s' \
              "${qa_comment_url}" "${NEW_MARKER}")
          }
          NEW_BODY="${current_body}${APPEND_TEXT}"
          dry_run_guard "Issue body への QA コンテキスト注入" \
            gh api -X PATCH "/repos/${REPO}/issues/${ISSUE_NUMBER}" \
              --field "body=${NEW_BODY}" \
              --silent || {
              echo "WARNING: Issue body の更新に失敗しました。qa-ready のまま維持します。"
              exit 0
            }
          echo "qa_comment_found=true" >> "${GITHUB_OUTPUT}"
          echo "✅ QA 回答コンテキスト（URL + 本文）を Issue #${ISSUE_NUMBER} の body に注入しました。"

      - name: qa-ready → ready 遷移（ラベル入替え + Copilot アサイン）
        # QA 本文注入の後に実行する（注入完了後に Copilot をアサインするため）
        if: >
          steps.detect-qa-ready.outputs.qa_ready_label != ''
          && steps.detect-answer.outputs.is_answer == 'true'
          && steps.inject-qa-context.outputs.qa_comment_found == 'true'
        env:
          QA_READY_LABEL: ${{ steps.detect-qa-ready.outputs.qa_ready_label }}
        run: |
          set -euo pipefail
          dry_run_guard() {
            local cmd_desc="$1"
            shift
            if [ "${DRY_RUN}" = "true" ]; then
              echo "::notice::[DRY RUN] スキップ: ${cmd_desc}"
              echo "[DRY RUN] would execute: ${cmd_desc}"
              return 0
            fi
            "$@"
          }

          # ready ラベルを qa-ready / qa-drafting ラベルから生成
          READY_LABEL="${QA_READY_LABEL/:qa-ready/:ready}"
          READY_LABEL="${READY_LABEL/:qa-drafting/:ready}"
          echo "遷移: ${QA_READY_LABEL} → ${READY_LABEL}"

          # *:qa-ready ラベルを除去
          dry_run_guard "qa-ready ラベル除去" \
            gh api -X DELETE \
              "/repos/${REPO}/issues/${ISSUE_NUMBER}/labels/${QA_READY_LABEL}" \
              --silent 2>/dev/null || true
          sleep 1

          # *:ready ラベルを付与
          dry_run_guard "ready ラベル付与" \
            gh issue edit "${ISSUE_NUMBER}" \
              --repo "${REPO}" \
              --add-label "${READY_LABEL}" || true
          sleep 1

          # Issue body からカスタムエージェント・ブランチ・モデルを抽出して Copilot アサイン
          issue_data=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}") || issue_data=''
          BRANCH=$(echo "${issue_data}" | python3 -c "
          import sys, json, re
          body = json.load(sys.stdin).get('body', '')
          m = re.search(r'<!--\s*branch:\s*([^\s-][^-]*?)\s*-->', body)
          print(m.group(1).strip() if m else 'main')
          " 2>/dev/null || echo 'main')
          CUSTOM_AGENT=$(echo "${issue_data}" | python3 -c "
          import sys, json, re
          body = json.load(sys.stdin).get('body', '')
          m = re.search(r'## Custom Agent\s*\n\s*\`([^\`]+)\`', body)
          print(m.group(1) if m else '')
          " 2>/dev/null || echo '')
          SELECTED_MODEL=$(echo "${issue_data}" | python3 -c "
          import sys, json, re
          body = json.load(sys.stdin).get('body', '')
          m = re.search(r'<!--\s*model:\s*([^\s-][^-]*?)\s*-->', body)
          print(m.group(1).strip() if m else '')
          " 2>/dev/null || echo '')

          # Copilot アサイン（assign-copilot.sh 使用）
          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/copilot-assign.sh"
          if dry_run_guard "Copilot アサイン" \
            assign_copilot "${ISSUE_NUMBER}" "${CUSTOM_AGENT}" "${BRANCH}" "" "${SELECTED_MODEL}"; then
            # *:running ラベルを付与
            RUNNING_LABEL="${READY_LABEL/:ready/:running}"
            dry_run_guard "running ラベル付与" \
              gh issue edit "${ISSUE_NUMBER}" \
                --repo "${REPO}" \
                --add-label "${RUNNING_LABEL}" || true
            echo "✅ ${ISSUE_NUMBER} に Copilot アサイン + ${RUNNING_LABEL} 付与完了"
          else
            echo "WARNING: Issue #${ISSUE_NUMBER} への Copilot アサインに失敗しました。"
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            echo "::group::DRY RUN Summary"
            echo "[DRY RUN] target_issue=${ISSUE_NUMBER}"
            echo "[DRY RUN] target_pr=${PR_NUMBER}"
            echo "[DRY RUN] simulate_label=${SIMULATE_LABEL}"
            echo "[DRY RUN] === Skipped writes ==="
            echo "[DRY RUN] would execute: gh api -X PATCH /repos/${REPO}/issues/${ISSUE_NUMBER}"
            echo "[DRY RUN] would execute: gh api -X DELETE /repos/${REPO}/issues/${ISSUE_NUMBER}/labels/${QA_READY_LABEL}"
            echo "[DRY RUN] would execute: gh issue edit ${ISSUE_NUMBER} --add-label \"${READY_LABEL}\""
            echo "[DRY RUN] would execute: assign_copilot ${ISSUE_NUMBER} ${CUSTOM_AGENT} ${BRANCH} '' ${SELECTED_MODEL}"
            echo "[DRY RUN] would execute: gh issue edit ${ISSUE_NUMBER} --add-label \"${RUNNING_LABEL}\""
            echo "[DRY RUN] === Read-only checks executed ==="
            echo "[DRY RUN] issue_data fetched: OK"
            echo "[DRY RUN] custom_agent extracted: ${CUSTOM_AGENT:-}"
            echo "[DRY RUN] branch extracted: ${BRANCH:-main}"
            echo "::endgroup::"
          fi

  transition-pr-opened:
    if: >
      github.event_name == 'pull_request_target'
      && github.event.pull_request.user.type == 'Bot'
      && (
        github.event.pull_request.user.login == 'Copilot'
        || github.event.pull_request.user.login == 'copilot-swe-agent'
        || github.event.pull_request.user.login == 'copilot-swe-agent[bot]'
        || github.event.pull_request.user.login == 'copilot[bot]'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
      PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}

    steps:
      - name: Copilot PR かどうか確認
        id: check-copilot
        run: |
          set -euo pipefail
          IS_COPILOT_LOGIN="false"
          if [ "${PR_AUTHOR_LOGIN}" = "Copilot" ] || \
             [ "${PR_AUTHOR_LOGIN}" = "copilot-swe-agent" ] || \
             [ "${PR_AUTHOR_LOGIN}" = "copilot-swe-agent[bot]" ] || \
             [ "${PR_AUTHOR_LOGIN}" = "copilot[bot]" ]; then
            IS_COPILOT_LOGIN="true"
          fi
          if [ "${IS_COPILOT_LOGIN}" = "true" ] && [ "${PR_AUTHOR_TYPE}" = "Bot" ]; then
            echo "is_copilot=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_copilot=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: PR body から parent-issue を解決
        id: resolve-issue
        if: steps.check-copilot.outputs.is_copilot == 'true'
        run: |
          set -euo pipefail
          issue_number=$(printf '%s' "${PR_BODY}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'<!--\s*parent-issue:\s*#([0-9]+)\s*-->', body or '')
          print(m.group(1) if m else '')
          " 2>/dev/null || echo '')
          echo "issue_number=${issue_number}" >> "${GITHUB_OUTPUT}"
          if [ -z "${issue_number}" ]; then
            echo "PR body から parent-issue を解決できませんでした。スキップします。"
          fi

      - name: Issue の *:qa-ready / *:qa-drafting ラベル確認
        id: detect-qa-ready
        if: steps.check-copilot.outputs.is_copilot == 'true' && steps.resolve-issue.outputs.issue_number != ''
        env:
          ISSUE_NUMBER: ${{ steps.resolve-issue.outputs.issue_number }}
        run: |
          set -euo pipefail
          issue_data=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" 2>/dev/null) || issue_data=''
          if [ -z "${issue_data}" ]; then
            echo "qa_ready_label=" >> "${GITHUB_OUTPUT}"
            echo "Issue #${ISSUE_NUMBER} を取得できませんでした。"
            exit 0
          fi
          qa_ready_label=$(echo "${issue_data}" | python3 -c "
          import sys, json
          labels = [l['name'] for l in json.load(sys.stdin).get('labels', [])]
          qa_labels = [l for l in labels if l.endswith(':qa-ready') or l.endswith(':qa-drafting')]
          print(qa_labels[0] if qa_labels else '')
          " 2>/dev/null || echo '')
          echo "qa_ready_label=${qa_ready_label}" >> "${GITHUB_OUTPUT}"
          if [ -z "${qa_ready_label}" ]; then
            echo "Issue #${ISSUE_NUMBER} に *:qa-ready / *:qa-drafting ラベルがないためスキップします。"
          fi

      - name: hve-qa-context-injected マーカーを付与
        id: inject-qa-context-pr
        if: steps.check-copilot.outputs.is_copilot == 'true' && steps.resolve-issue.outputs.issue_number != '' && steps.detect-qa-ready.outputs.qa_ready_label != ''
        env:
          ISSUE_NUMBER: ${{ steps.resolve-issue.outputs.issue_number }}
        run: |
          set -euo pipefail
          echo "qa_comment_found=false" >> "${GITHUB_OUTPUT}"
          MARKER="<!-- hve-qa-context-injected -->"
          current_body=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" --jq '.body // ""' 2>/dev/null) || {
            echo "Issue body の取得に失敗しました。"
            exit 0
          }
          if printf '%s' "${current_body}" | grep -qF "${MARKER}"; then
            echo "qa_comment_found=true" >> "${GITHUB_OUTPUT}"
            echo "既に hve-qa-context-injected マーカーが存在します。"
            exit 0
          fi
          append=$(printf '\n\n%s\n' "${MARKER}")
          new_body="${current_body}${append}"
          gh api -X PATCH "/repos/${REPO}/issues/${ISSUE_NUMBER}" --field "body=${new_body}" --silent 2>/dev/null || {
            echo "Issue body へのマーカー付与に失敗しました。"
            exit 0
          }
          echo "qa_comment_found=true" >> "${GITHUB_OUTPUT}"

      - name: qa-ready / qa-drafting → ready 遷移（PR opened 経路）
        if: >
          steps.check-copilot.outputs.is_copilot == 'true'
          && steps.resolve-issue.outputs.issue_number != ''
          && steps.detect-qa-ready.outputs.qa_ready_label != ''
          && steps.inject-qa-context-pr.outputs.qa_comment_found == 'true'
        env:
          ISSUE_NUMBER: ${{ steps.resolve-issue.outputs.issue_number }}
          QA_READY_LABEL: ${{ steps.detect-qa-ready.outputs.qa_ready_label }}
        run: |
          set -euo pipefail
          READY_LABEL="${QA_READY_LABEL/:qa-ready/:ready}"
          READY_LABEL="${READY_LABEL/:qa-drafting/:ready}"
          RUNNING_LABEL="${READY_LABEL/:ready/:running}"
          gh api -X DELETE "/repos/${REPO}/issues/${ISSUE_NUMBER}/labels/${QA_READY_LABEL}" --silent 2>/dev/null || true
          gh issue edit "${ISSUE_NUMBER}" --repo "${REPO}" --add-label "${READY_LABEL}" || true
          gh issue edit "${ISSUE_NUMBER}" --repo "${REPO}" --add-label "${RUNNING_LABEL}" || true
          echo "PR opened 経路で遷移完了: ${QA_READY_LABEL} → ${READY_LABEL}, ${RUNNING_LABEL}"
