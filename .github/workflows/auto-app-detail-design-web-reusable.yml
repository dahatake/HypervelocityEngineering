                  "https://api.github.com/repos/${REPO}/issues/${S7_NUM}/sub_issues")
                NEXT_ACTION=$(echo "${S7_SUBS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json, re
          issues = json.load(sys.stdin)
          s71_done = any(
              'aad-web:done' in [l['name'] for l in i.get('labels', [])]
              for i in issues if re.search(r'\] Step\.7\.1:', i.get('title', ''))
          )
          s72_done = any(
              'aad-web:done' in [l['name'] for l in i.get('labels', [])]
              for i in issues if re.search(r'\] Step\.7\.2:', i.get('title', ''))
          )
          s73_issue = next(
              (i for i in issues if re.search(r'\] Step\.7\.3:', i.get('title', ''))),
              None
          )
          if s71_done and s72_done:
              if s73_issue:
                  print(f"activate_73:{s73_issue['number']}")
              else:
                  print("done_s7")
          else:
              print("wait")
          PY
                )
                case "${NEXT_ACTION}" in
                  done_s7)
                    add_label "${S7_NUM}" "aad-web:done"
                    echo "Step.7 コンテナに aad-web:done を付与しました。"
