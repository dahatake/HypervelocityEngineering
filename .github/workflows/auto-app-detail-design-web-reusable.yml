name: "AAD-WEB: Web App Design (Reusable)"

# auto-app-detail-design-web 系ラベル付き Issue の opened/labeled/closed イベントで起動
#
# 設計メモ:
#   - Issue Template の labels: でラベルを付与した場合、GitHub は issues.labeled イベントを
#     発火せず issues.opened のみを発火する（GitHub Community Discussion #26753）。
#   - そのため opened イベントも監視し、ジョブレベル if で対象ラベルを持つ Issue のみ実行する。
#   - opened イベント時は github.event.label が null のため LABEL_NAME は空文字列になる。
#   - 既存の冪等化ガード（aad-web:initialized チェック）により、opened + labeled が同時発火しても安全。
on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: ''
      issue_number:
        required: true
        type: string
      event_action:
        required: false
        type: string
        default: ''
      label_name:
        required: false
        type: string
        default: ''
      issue_labels:
        required: false
        type: string
        default: '[]'
      enable_agentic_retrieval:
        required: false
        type: string
        default: 'auto'
      agentic_data_source_modes:
        required: false
        type: string
        default: 'indexer'
      foundry_mcp_integration:
        required: false
        type: string
        default: 'true'

      runner_type:
        description: "実行 Runner 種別: github-hosted | self-hosted"
        required: false
        type: string
        default: "github-hosted"

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ${{ fromJSON(inputs.runner_type == 'self-hosted' && '["self-hosted","linux","x64","aca"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 360
    concurrency:
      group: aad-web-orchestrator-${{ inputs.issue_number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}

    steps:
      # ----------------------------------------------------------------
      # 1. 実行ゲート: auto-app-detail-design-web 系ラベルあり + aad-web:initialized なし
      # ----------------------------------------------------------------
      - name: 実行ゲートチェック
        id: gate
        env:
          ISSUE_LABELS: ${{ inputs.issue_labels }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EVENT_ACTION: ${{ inputs.event_action }}
          LABEL_NAME: "${{ inputs.label_name }}"
        run: |
          set -euo pipefail

          if ! ISSUE_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}"); then
            echo "WARNING: Issue API 取得に失敗しました。スキップします。" >&2
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ISSUE_TITLE=$(echo "${ISSUE_RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          ISSUE_LABELS=$(echo "${ISSUE_RESPONSE}" | python3 -c "import sys,json; print(json.dumps([l['name'] for l in json.load(sys.stdin).get('labels',[])]))")
          export ISSUE_TITLE
          echo "リアルタイムラベル: ${ISSUE_LABELS}"

          if [[ "${EVENT_ACTION}" == "labeled" ]]; then
            if [[ "${LABEL_NAME}" == "aad-web:done" ]]; then
              if [[ "${ISSUE_TITLE}" =~ ^\[AAD-WEB\] ]]; then
                echo "Sub Issue ([AAD-WEB] タイトル) への aad-web:done 付与を検知: state_transition に進みます。"
                echo "mode=state_transition" >> "$GITHUB_OUTPUT"
                echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "Root Issue への aad-web:done 付与を検知: ワークフローはスキップします。"
                echo "mode=skip" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            elif [[ "${LABEL_NAME}" == "auto-app-detail-design" || "${LABEL_NAME}" == "auto-app-detail-design-web" ]]; then
              echo "auto-app-detail-design-web 系ラベルの labeled イベント: initialize ゲートチェックへ進みます。"
            else
              echo "aad-web:done / auto-app-detail-design 系以外の labeled イベント（${LABEL_NAME}）。スキップ。"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [[ "${EVENT_ACTION}" == "closed" ]]; then
            if [[ "${ISSUE_TITLE}" =~ ^\[AAD-WEB\] ]]; then
              has_done=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          print('true' if 'aad-web:done' in labels else 'false')
          PY
              )
              if [[ "${has_done}" == "true" ]]; then
                # aad-web:done labeled 時は Issue 未クローズのため自動クローズ判定が失敗する。
                # closed イベントで再度コンテナ自動クローズ判定のみ実行する。
                echo "aad-web:done ラベル済み + closed イベント: コンテナ自動クローズ判定のみ実行。"
                echo "mode=container_close_check" >> "$GITHUB_OUTPUT"
                echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "mode=state_transition" >> "$GITHUB_OUTPUT"
              echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "closed イベント: [AAD-WEB] Sub Issue 以外のためスキップ。"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [[ "${ISSUE_TITLE}" =~ ^\[AAD-WEB\] ]]; then
            echo "[AAD-WEB] Sub Issue のため初期化対象外。スキップ。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_aad=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          triggers = {'auto-app-detail-design', 'auto-app-detail-design-web', 'auto-app-detail-design'}
          print('true' if any(l in triggers for l in labels) else 'false')
          PY
          )

          if [[ "${has_aad}" != "true" ]]; then
            echo "auto-app-detail-design-web 系ラベルなし。スキップ。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_init=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          skip_labels = {'aad-web:initialized', 'aad-web:ready', 'aad-web:running', 'aad-web:done', 'aad-web:blocked', 'aad-web:qa-ready'}
          print('true' if any(l in skip_labels for l in labels) else 'false')
          PY
          )

          if [[ "${has_init}" == "true" ]]; then
            echo "aad-web:* ラベル済み。スキップ（冪等化）。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=initialize" >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: ゲート結果のデバッグ出力
        if: always()
        env:
          GATE_MODE: ${{ steps.gate.outputs.mode }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EVENT_ACTION: ${{ inputs.event_action }}
        run: |
          echo "::notice::ゲート判定結果: mode=${GATE_MODE}, event=${EVENT_ACTION}, issue=#${ISSUE_NUMBER}"
          if [[ "${GATE_MODE}" == "skip" ]]; then
            echo "::notice::Issue #${ISSUE_NUMBER} のゲートチェックは skip でした（event: ${EVENT_ACTION}）"
          fi

      # ----------------------------------------------------------------
      # 2. ラベル bootstrap
      # ----------------------------------------------------------------
      - name: ラベル bootstrap
        if: steps.gate.outputs.mode == 'initialize'
        run: |
          set -euo pipefail

          # ラベル作成関数（インライン定義: checkout 前でも動作可能にするため）
          create_label() {
            local name="$1" color="$2" desc="${3:-}"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/labels" \
              -d "{\"name\":\"${name}\",\"color\":\"${color}\",\"description\":\"${desc}\"}")
            case "${http_code}" in
              201) echo "ラベル作成: ${name}" ;;
              422) echo "ラベル既存（スキップ）: ${name}" ;;
              *)   echo "ラベル作成エラー: ${name} HTTP ${http_code}" ;;
            esac
            sleep 1
          }

          create_label "auto-app-detail-design-web"   "1D76DB" "Web App Design ワークフロートリガー"
                    create_label "auto-app-detail-design"       "0E8A16" "旧 AAD トリガー（後方互換エイリアス）"
          create_label "aad-web:initialized"   "C5DEF5" ""
          create_label "aad-web:ready"         "0075CA" ""
          create_label "aad-web:running"       "E4E669" ""
          create_label "aad-web:done"          "0E8A16" ""
          create_label "aad-web:blocked"       "D73A4A" ""
          create_label "auto-context-review" "1D76DB" "auto context review trigger for copilot-auto-review workflow"
          create_label "auto-qa"             "BFD4F2" "auto qa trigger for copilot-auto-qa workflow"
          create_label "auto-approve-ready" "1D76DB" "Ready for auto-approve and auto-merge"

      # ----------------------------------------------------------------
      # 2.5 aad-web:initialized 即時付与（二重実行防止）
      # ----------------------------------------------------------------
      - name: 即時 aad-web:initialized 付与（二重実行防止）
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail
          echo "二重実行防止のため aad-web:initialized を即座に付与します..."
          success=0
          for attempt in 1 2 3; do
            echo "aad-web:initialized 付与試行 ${attempt}/3..."
            if curl -sf -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/labels" \
              -d '{"labels":["aad-web:initialized"]}' > /dev/null; then
              success=1
              break
            fi
            echo "WARN: aad-web:initialized の付与に失敗しました。リトライします..." >&2
            sleep 2
          done
          if [[ "${success}" -ne 1 ]]; then
            echo "ERROR: aad-web:initialized の付与に失敗しました（3回試行後も失敗）。" >&2
            exit 1
          fi
          echo "aad-web:initialized を Issue #${ISSUE_NUMBER} に付与しました。"

      # ----------------------------------------------------------------
      # 2.7. リポジトリ checkout（aad-common.sh を利用するため）
      # ----------------------------------------------------------------
      - name: Checkout repository
        if: steps.gate.outputs.mode != 'skip'
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2.8. 成果物ディレクトリの事前作成
      # ----------------------------------------------------------------
      - name: 成果物ディレクトリの事前作成
        if: steps.gate.outputs.mode != 'skip'
        run: |
          # 成果物ディレクトリの事前作成
          mkdir -p docs/catalog
          mkdir -p docs/batch
          mkdir -p docs/batch/jobs
          mkdir -p docs/services
          mkdir -p docs/screen
          mkdir -p docs/test-specs
          mkdir -p docs/agent
          mkdir -p docs/azure
          mkdir -p docs/usecase

      # ----------------------------------------------------------------
      # 3. Issue body パース & Step Issue 生成
      # ----------------------------------------------------------------
      - name: Issue 初期化とStep Issue 生成
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
          INPUT_ENABLE_AGENTIC_RETRIEVAL: ${{ inputs.enable_agentic_retrieval }}
          INPUT_AGENTIC_DATA_SOURCE_MODES: ${{ inputs.agentic_data_source_modes }}
          INPUT_FOUNDRY_MCP_INTEGRATION: ${{ inputs.foundry_mcp_integration }}
        run: |
          set -euo pipefail

          ISSUE_BODY=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          export ISSUE_BODY

          if [[ -z "${COPILOT_PAT}" ]]; then
            echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインは全てスキップされます。" >&2
          fi

          ROOT_ISSUE="${ISSUE_NUMBER}"

          # ---- ユーティリティ関数 ----
          source "${GITHUB_WORKSPACE}/.github/scripts/aad-common.sh"
          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/assign-copilot.sh"

          # ERR トラップを関数にも継承させる
          set -E
          # トラップ内では -e による即時終了を防ぎ、post_comment 失敗は握りつぶす
          trap 'set +e; trap - ERR; post_comment "${ROOT_ISSUE}" "⚠️ ワークフローエラー: Step 処理中に予期しないエラーが発生しました (exit code: $?)" || true' ERR

          create_issue() {
            local title="$1"
            local body="$2"
            local labels_json="$3"
            local data
            data=$(python3 - "${title}" "${body}" "${labels_json}" <<'PY'
          import json, sys
          title = sys.argv[1]
          body  = sys.argv[2]
          labels = json.loads(sys.argv[3])
          print(json.dumps({'title': title, 'body': body, 'labels': labels}))
          PY
          )
            api_call POST "https://api.github.com/repos/${REPO}/issues" "${data}"
          }

          link_sub_issue() {
            local parent_num="$1"
            local child_id="$2"
            local data="{\"sub_issue_id\":${child_id}}"
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${parent_num}/sub_issues" \
              "${data}" || true
            sleep 1
          }

          # ---- Issue body パース ----
          PARSED=$(python3 - <<'PYEOF'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")

          branch = "main"
          m = re.search(r"###\s*対象ブランチ\s*\n+(.+)", body)
          if m:
              branch = m.group(1).strip()
              if not branch or branch == "_No response_":
                  branch = "main"

          skip_steps = set()
          exec_section = re.search(
              r"###\s*実行するステップ\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if exec_section:
              section_text = exec_section.group(1)
              all_items = re.findall(
                  r"-\s*\[[ xX]\]\s*Step\.(\d+(?:\.\d+)?)",
                  section_text
              )
              all_steps = set(all_items)
              checked_items = re.findall(
                  r"-\s*\[[xX]\]\s*Step\.(\d+(?:\.\d+)?)",
                  section_text
              )
              exec_steps = set(checked_items)
              skip_steps = all_steps - exec_steps
              if not exec_steps and all_steps:
                  skip_steps = set()

          additional_comment = ""
          m = re.search(r"###\s*追加コメント[^\n]*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              additional_comment = m.group(1).strip()
              if additional_comment == "_No response_":
                  additional_comment = ""

          # レビュー設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          # 後方互換: 旧形式「スキップする」はロジック反転（未チェック → 有効）
          auto_context_review = False
          review_section = re.search(
              r"###\s*レビュー設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if review_section:
              section_text = review_section.group(1)
              if re.search(r"スキップする", section_text):
                  # 旧形式（後方互換）: 未チェック = スキップしない = 有効
                  auto_context_review = not bool(re.search(r"-\s*\[[xX]\]", section_text))
              else:
                  # 新形式: チェック → 有効
                  auto_context_review = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # 質問票設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          # 後方互換: 旧形式「スキップする」はロジック反転（未チェック → 有効）
          auto_qa = False
          qa_section = re.search(
              r"###\s*質問票設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if qa_section:
              section_text = qa_section.group(1)
              if re.search(r"スキップする", section_text):
                  # 旧形式（後方互換）: 未チェック = スキップしない = 有効
                  auto_qa = not bool(re.search(r"-\s*\[[xX]\]", section_text))
              else:
                  # 新形式: チェック → 有効
                  auto_qa = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # PR完全自動化設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          auto_merge = False
          merge_section = re.search(
              r"###\s*PR完全自動化設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if merge_section:
              section_text = merge_section.group(1)
              auto_merge = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # APP-ID 抽出（カンマ区切りで分割・正規化）
          # regex は「対象アプリケーション」で始まるセクションヘッダにマッチ
          # 後方互換: 旧ラベル「メモ」付きヘッダ（「対象アプリケーション (APP-ID) メモ」）にもマッチする
          app_ids_raw = ""
          m = re.search(r"###\s*対象アプリケーション[^\n]*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              app_ids_raw = m.group(1).strip()
              if app_ids_raw == "_No response_":
                  app_ids_raw = ""

          # カンマ/改行/空白で分割し、許容形式の APP-ID のみ採用
          app_ids_list = []
          if app_ids_raw:
              for token in re.split(r"[\s,]+", app_ids_raw):
                  normalized = token.strip().upper()
                  if normalized and re.fullmatch(r"APP-\d{2,}", normalized):
                      if normalized not in app_ids_list:
                          app_ids_list.append(normalized)

          # 自己改善設定
          enable_self_improve = False
          si_section = re.search(r"###\s*自己改善ループ設定\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
          if si_section:
              enable_self_improve = bool(re.search(r"-\s*\[[xX]\]", si_section.group(1)))

          self_improve_max_iterations = "3"
          m = re.search(r"###\s*自己改善\s*最大イテレーション数.*?\n+(.+)", body)
          if m:
              val = m.group(1).strip()
              n = re.match(r"(\d+)", val)
              if n:
                  self_improve_max_iterations = n.group(1)

          self_improve_quality_threshold = "80"
          q = re.search(r"###\s*自己改善\s*品質スコア閾値.*?\n+(.+)", body)
          if q:
              val = q.group(1).strip()
              n = re.match(r"(\d+)", val)
              if n:
                  self_improve_quality_threshold = n.group(1)

          # Remote MCP Server 設定: "作成する" → True、"作成しない" → False、未指定 → True (後方互換)
          create_remote_mcp_server = True
          mcp_section = re.search(
              r"###\s*Remote MCP Server 実装\s*\n+(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if mcp_section:
              val = mcp_section.group(1).strip()
              if "作成しない" in val:
                  create_remote_mcp_server = False
              elif "作成する" in val:
                  create_remote_mcp_server = True

          result = {"branch": branch, "skip_steps": list(skip_steps), "additional_comment": additional_comment, "auto_context_review": auto_context_review, "auto_qa": auto_qa, "auto_merge": auto_merge, "app_ids": app_ids_list, "enable_self_improve": enable_self_improve, "self_improve_max_iterations": self_improve_max_iterations, "self_improve_quality_threshold": self_improve_quality_threshold, "create_remote_mcp_server": create_remote_mcp_server}
          print(json.dumps(result))
          PYEOF
          )

          BRANCH=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['branch'])")
          SKIP_STEPS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(' '.join(d['skip_steps']))")
          ADDITIONAL_COMMENT=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['additional_comment'])")
          AUTO_CONTEXT_REVIEW=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_context_review') else 'false')")
          AUTO_QA=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_qa') else 'false')")
          AUTO_MERGE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_merge') else 'false')")
          ENABLE_SELF_IMPROVE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('enable_self_improve') else 'false')")
          SELF_IMPROVE_MAX_ITER=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('self_improve_max_iterations','3'))")
          SELF_IMPROVE_QUALITY_THRESHOLD=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('self_improve_quality_threshold','80'))")
          APP_IDS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(', '.join(d.get('app_ids',[])))")
          CREATE_REMOTE_MCP_SERVER=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('create_remote_mcp_server', True) else 'false')")
          ENABLE_AGENTIC_RETRIEVAL=$(python3 - "${INPUT_ENABLE_AGENTIC_RETRIEVAL:-auto}" <<'PY'
          import sys
          value = (sys.argv[1] or "auto").strip().lower()
          print(value if value in {"auto", "yes", "no"} else "auto")
          PY
          )
          AGENTIC_DATA_SOURCE_MODES=$(python3 - "${INPUT_AGENTIC_DATA_SOURCE_MODES:-indexer}" <<'PY'
          import re, sys
          raw = (sys.argv[1] or "indexer").lower()
          tokens = [t for t in re.split(r"[\s,]+", raw) if t]
          values = []
          for token in tokens:
              if token in {"indexer", "push"} and token not in values:
                  values.append(token)
          if not values:
              values = ["indexer"]
          print(",".join(values))
          PY
          )
          FOUNDRY_MCP_INTEGRATION=$(python3 - "${INPUT_FOUNDRY_MCP_INTEGRATION:-true}" <<'PY'
          import sys
          value = (sys.argv[1] or "true").strip().lower()
          print("false" if value == "false" else "true")
          PY
          )
          if [[ "${ENABLE_AGENTIC_RETRIEVAL}" == "no" ]]; then
            FOUNDRY_MCP_INTEGRATION="false"
          fi

          MODEL_RAW=$(extract_model "${ISSUE_BODY}")
          SELECTED_MODEL=$(resolve_model "${MODEL_RAW}")
          REVIEW_MODEL_RAW=$(extract_review_model "${ISSUE_BODY}")
          SELECTED_REVIEW_MODEL=$(resolve_model "${REVIEW_MODEL_RAW}")
          QA_MODEL_RAW=$(extract_qa_model "${ISSUE_BODY}")
          SELECTED_QA_MODEL=$(resolve_model "${QA_MODEL_RAW}")

          echo "対象ブランチ: ${BRANCH}"
          echo "スキップ Steps: ${SKIP_STEPS}"
          echo "セルフレビュー (auto-context-review): ${AUTO_CONTEXT_REVIEW}"
          echo "質問票 (auto-qa): ${AUTO_QA}"
          echo "PR完全自動化 (auto-merge): ${AUTO_MERGE}"
          echo "Agentic Retrieval: ${ENABLE_AGENTIC_RETRIEVAL}, data_source_modes=${AGENTIC_DATA_SOURCE_MODES}, foundry_mcp_integration=${FOUNDRY_MCP_INTEGRATION}"
          echo "対象 APP-IDs（フィルタ前）: ${APP_IDS:-（未指定 = 推薦アーキテクチャから自動選択）}"

          # ---- 推薦アーキテクチャ APP-ID フィルタ ----
          FILTER_RESULT=$(python3 -m hve.app_arch_filter \
            --workflow aad-web \
            ${APP_IDS:+--app-ids "${APP_IDS}"} \
            --catalog docs/catalog/app-arch-catalog.md) || {
            echo "ERROR: app-arch-catalog.md が見つからないか読み取れません。処理を中止します。" >&2
            post_comment "${ROOT_ISSUE}" "⚠️ エラー: \`docs/catalog/app-arch-catalog.md\` が見つかりません。Architecture Design (AAS) を先に実行してください。"
            exit 1
          }

          FILTER_ERROR=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',''))" 2>/dev/null || echo "")
          if [[ -n "${FILTER_ERROR}" ]]; then
            echo "ERROR: app-arch filter エラー: ${FILTER_ERROR}" >&2
            post_comment "${ROOT_ISSUE}" "⚠️ エラー: app-arch filter: ${FILTER_ERROR}"
            exit 1
          fi

          APP_IDS_JSON=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('matched_app_ids',[])))")
          APP_IDS=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(', '.join(d.get('matched_app_ids',[])))")
          APP_ID=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); ids=d.get('matched_app_ids',[]); print(ids[0] if len(ids)==1 else '')")
          APP_ARCH_SCOPE_SECTION=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('markdown_section',''))")

          echo "対象 APP-IDs（フィルタ後）: ${APP_IDS:-（0件）}"

          if [[ -z "${APP_IDS}" ]]; then
            echo "推薦アーキテクチャ APP-ID フィルタ: 対象 APP-ID が 0 件です。Step Issue を作成しません。"
            post_comment "${ROOT_ISSUE}" "ℹ️ 推薦アーキテクチャ \`Webフロントエンド + クラウド\` に該当する APP-ID が見つかりませんでした。\`docs/catalog/app-arch-catalog.md\` の \`A) サマリ表（全APP横断）\` を確認してください。"
            exit 0
          fi

          export APP_IDS APP_IDS_JSON APP_ID APP_ARCH_SCOPE_SECTION

          if [[ -n "${SKIP_STEPS}" ]]; then
            echo "Root Issue body から未チェックのステップを除去します..."

            PATCH_JSON_FILE=$(mktemp)

            python3 - "${SKIP_STEPS}" "${PATCH_JSON_FILE}" <<'PYBODY'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")
          skip_steps_str = sys.argv[1]
          output_file = sys.argv[2]

          skip_steps = set(skip_steps_str.split()) if skip_steps_str.strip() else set()

          if skip_steps:
              lines = body.split('\n')
              new_lines = []
              for line in lines:
                  m = re.match(r'^\s*-\s*\[[ ]\]\s*Step\.(\d+(?:\.\d+)?)\b', line)
                  if m and m.group(1) in skip_steps:
                      continue
                  new_lines.append(line)

              cleaned = []
              blank_count = 0
              for line in new_lines:
                  if line.strip() == '':
                      blank_count += 1
                      if blank_count <= 2:
                          cleaned.append(line)
                  else:
                      blank_count = 0
                      cleaned.append(line)

              body = '\n'.join(cleaned)

          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump({'body': body}, f, ensure_ascii=False)
          PYBODY

            api_call PATCH \
              "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
              "$(cat "${PATCH_JSON_FILE}")" > /dev/null \
              && echo "Root Issue #${ROOT_ISSUE} の body を更新しました。" \
              || echo "WARNING: Root Issue body の更新に失敗しました。処理を続行します。" >&2

            rm -f "${PATCH_JSON_FILE}"

            _refreshed=$(gh api "/repos/${REPO}/issues/${ROOT_ISSUE}" --jq '.body // ""' 2>/dev/null) \
              && ISSUE_BODY="${_refreshed}" && export ISSUE_BODY \
              || echo "WARNING: ISSUE_BODY の再取得に失敗しました。" >&2
          else
            echo "全ステップ実行のため Root Issue body の更新は不要です。"
          fi

          REVIEW_TAG_FILE=$(mktemp)
          python3 - "${AUTO_CONTEXT_REVIEW}" "${AUTO_MERGE}" "${BRANCH}" "${ENABLE_SELF_IMPROVE}" "${SELF_IMPROVE_MAX_ITER}" "${SELF_IMPROVE_QUALITY_THRESHOLD}" "${CREATE_REMOTE_MCP_SERVER}" "${ENABLE_AGENTIC_RETRIEVAL}" "${AGENTIC_DATA_SOURCE_MODES}" "${FOUNDRY_MCP_INTEGRATION}" "${REVIEW_TAG_FILE}" <<'PYMERGE'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")
          auto_context_review = sys.argv[1]
          auto_merge = sys.argv[2]
          branch = sys.argv[3]
          enable_si = sys.argv[4]
          si_max_iter = sys.argv[5]
          si_quality_threshold = sys.argv[6]
          create_remote_mcp_server = sys.argv[7]
          enable_agentic_retrieval = sys.argv[8]
          agentic_data_source_modes = sys.argv[9]
          foundry_mcp_integration = sys.argv[10]
          output_file = sys.argv[11]

          tags = [
              ("auto-context-review", auto_context_review),
              ("auto-merge", auto_merge),
              ("branch", branch),
              ("enable-self-improve", enable_si),
              ("self-improve-max-iterations", si_max_iter),
              ("self-improve-quality-threshold", si_quality_threshold),
              ("create-remote-mcp-server", create_remote_mcp_server),
              ("enable-agentic-retrieval", enable_agentic_retrieval),
              ("agentic-data-source-modes", agentic_data_source_modes),
              ("foundry-mcp-integration", foundry_mcp_integration),
          ]

          for key, value in tags:
              tag = f"<!-- {key}: {value} -->"
              pat = re.compile(rf"<!--\s*{re.escape(key)}\s*:[^>]*-->")
              if pat.search(body):
                  body = pat.sub(tag, body, count=1)
              else:
                  body = body.rstrip() + "\n" + tag + "\n"

          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump({'body': body}, f, ensure_ascii=False)
          PYMERGE

          api_call PATCH \
            "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
            "$(cat "${REVIEW_TAG_FILE}")" > /dev/null \
            && echo "Root Issue #${ROOT_ISSUE} に auto-context-review / auto-merge / branch / self-improve / agentic-retrieval タグを埋め込みました。" \
            || echo "WARNING: Root Issue body のタグ埋め込みに失敗しました。" >&2

          rm -f "${REVIEW_TAG_FILE}"

          # ---- Root Issue に aad-web:initialized を付与 ----
          add_label "${ROOT_ISSUE}" "aad-web:initialized"
          echo "aad-web:initialized を付与しました。"

          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-context-review"
            echo "Root Issue #${ROOT_ISSUE} に auto-context-review ラベルを付与しました。"
          fi

          if [[ "${AUTO_QA}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-qa"
            echo "Root Issue #${ROOT_ISSUE} に auto-qa ラベルを付与しました。"
          fi

          if [[ "${AUTO_MERGE}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-approve-ready"
            echo "Root Issue #${ROOT_ISSUE} に auto-approve-ready ラベルを付与しました。"
          fi
          if [[ -n "${SELECTED_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "model/${SELECTED_MODEL}" || true
          fi
          if [[ -n "${SELECTED_REVIEW_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "review-model/${SELECTED_REVIEW_MODEL}" || true
          fi
          if [[ -n "${SELECTED_QA_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "qa-model/${SELECTED_QA_MODEL}" || true
          fi

          # ---- Step Issue 生成 ----
          S1_NUM="" S1_ID=""
          S11_NUM="" S11_ID=""
          S12_NUM="" S12_ID=""
          S2_NUM="" S2_ID=""
          S3_NUM="" S3_ID=""
          S4_NUM="" S4_ID=""
          S5_NUM="" S5_ID=""
          S6_NUM="" S6_ID=""
          S7_NUM="" S7_ID=""
          S71_NUM="" S71_ID=""
          S72_NUM="" S72_ID=""
          S73_NUM="" S73_ID=""
          S8_NUM="" S8_ID=""
          S81_NUM="" S81_ID=""
          S82_NUM="" S82_ID=""
          S83_NUM="" S83_ID=""

          # app-ids は branch の直後に配置（HVE _build_root_ref() と同じ順序）
          APP_IDS_TAG=""
          if [[ -n "${APP_IDS}" ]]; then
            APP_IDS_TAG=$(printf '\n<!-- app-ids: %s -->' "${APP_IDS}")
          fi

          ROOT_REF=$(printf '<!-- root-issue: #%s -->\n<!-- branch: %s -->%s\n<!-- auto-context-review: %s -->\n<!-- auto-qa: %s -->\n<!-- auto-merge: %s -->\n<!-- create-remote-mcp-server: %s -->\n<!-- enable-agentic-retrieval: %s -->\n<!-- agentic-data-source-modes: %s -->\n<!-- foundry-mcp-integration: %s -->' \
            "${ROOT_ISSUE}" "${BRANCH}" "${APP_IDS_TAG}" "${AUTO_CONTEXT_REVIEW}" "${AUTO_QA}" "${AUTO_MERGE}" "${CREATE_REMOTE_MCP_SERVER}" "${ENABLE_AGENTIC_RETRIEVAL}" "${AGENTIC_DATA_SOURCE_MODES}" "${FOUNDRY_MCP_INTEGRATION}")

          # 追加コンテキスト参照セクション（QA/Review 反映ルール — Phase 3 追加）
          QA_REVIEW_SECTION=$(printf '\n\n## 追加コンテキストの参照\n\n以下が存在する場合は必ず参照してください。存在しない情報は推測せず、必要に応じて不足事項として記録してください。\n\n- `qa/` 配下の、この Root Issue / Step / PR に関連する QA 回答\n- この PR または関連 Issue のレビュー指摘\n- Self-Improve 結果または改善計画（存在する場合のみ）\n- `## 入力` に記載された前 Step 成果物\n- 追加で注入された既存成果物・reuse context\n\n参照した QA / Review / Self-Improve の内容は、成果物へ反映してください。反映しない場合は理由を完了コメントまたは成果物内に記録してください。')
          if [[ -n "${ADDITIONAL_COMMENT}" ]]; then
            ADDITIONAL_SECTION="${QA_REVIEW_SECTION}$(printf '\n\n## 追加コメント\n%s' "${ADDITIONAL_COMMENT}")"
          else
            ADDITIONAL_SECTION="${QA_REVIEW_SECTION}"
          fi

          if [[ -n "${APP_IDS}" ]]; then
            FORMATTED_APP_IDS=$(printf '%s' "${APP_IDS}" | sed -E 's/[[:space:]]*,[[:space:]]*/,/g; s/^ *//; s/ *$//' | sed 's/,/`, `/g; s/^/`/; s/$/`/')
          else
            FORMATTED_APP_IDS=""
          fi

          # ---- APP-ID スコープセクション ----
          # ASDW _build_app_id_section() と同等の文言
          # コンテナ Issue には追加しない（Agent 不使用のため）
          if [[ -n "${APP_IDS}" ]]; then
            APP_ID_SECTION=$(printf '\n\n## 対象アプリケーション\n- APP-ID: %s\n- この Step では上記 APP-ID に関連するサービス/エンティティ/画面のみを対象とする\n- `docs/catalog/app-catalog.md` を参照し、対象 APP-ID に紐づく項目を特定する\n- 共有サービス/エンティティ（複数 APP で利用されるもの）も対象に含む' "${FORMATTED_APP_IDS}")
          else
            APP_ID_SECTION=""
          fi

          # Step.1.1 専用: ドメイン分析は全ドメイン横断のため「重点スコープ」として扱う
          if [[ -n "${APP_IDS}" ]]; then
            APP_ID_SECTION_S11=$(printf '\n\n## 参考: 重点アプリケーション\n- APP-ID: %s\n- ドメイン分析は全ドメインを対象とするが、上記 APP-ID に関連するドメインを重点的に分析すること\n- `docs/catalog/app-catalog.md` を参照し、全体構造を把握した上で重点 APP-ID のドメインを詳細化すること' "${FORMATTED_APP_IDS}")
          else
            APP_ID_SECTION_S11=""
          fi

          skip_step() { echo " ${SKIP_STEPS} " | grep -q " $1 "; }

          # Remote MCP Server 設計観点セクション（create_remote_mcp_server=true の場合のみ）
          if [[ "${CREATE_REMOTE_MCP_SERVER}" == "true" ]]; then
            REMOTE_MCP_DESIGN_SECTION=$(printf '\n\n## Remote MCP Server 設計観点\n\n`create-remote-mcp-server` が `true` のため、対象 API を Remote MCP Server として公開するための設計観点を含めてください。\n\n### 設計に含めること\n\n- どの API ユースケースを MCP Tool / Resource / Prompt として公開するか\n- MCP Tool の入力スキーマ、出力スキーマ\n- REST API と MCP 公開層の責務分離\n- MCP 固有の入出力変換を adapter 層に閉じ込める方針\n- 認証・認可方針\n- エラー応答方針\n- ログ・監視方針\n- 実行環境非依存のインターフェース定義\n- 実装フェーズで SDK / Transport / Cloud Service を選定する前提\n\n### 設計で固定しないこと\n\n- 特定 MCP SDK\n- 特定 Transport\n- 特定 Cloud Compute\n- 特定 Cloud Provider 固有サービス')
          else
            REMOTE_MCP_DESIGN_SECTION=""
          fi

          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]] && [[ "${AUTO_QA}" == "true" ]]; then
            STEP_LABELS='["auto-app-detail-design-web","auto-context-review","auto-qa"]'
          elif [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
            STEP_LABELS='["auto-app-detail-design-web","auto-context-review"]'
          elif [[ "${AUTO_QA}" == "true" ]]; then
            STEP_LABELS='["auto-app-detail-design-web","auto-qa"]'
          else
            STEP_LABELS='["auto-app-detail-design-web"]'
          fi

          if [[ "${AUTO_MERGE}" == "true" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c '. + ["auto-approve-ready"]')
          fi
          if [[ -n "${SELECTED_MODEL}" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c --arg ml "model/${SELECTED_MODEL}" '. + [$ml]')
          fi
          if [[ -n "${SELECTED_REVIEW_MODEL}" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c --arg rml "review-model/${SELECTED_REVIEW_MODEL}" '. + [$rml]')
          fi
          if [[ -n "${SELECTED_QA_MODEL}" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c --arg qml "qa-model/${SELECTED_QA_MODEL}" '. + [$qml]')
          fi

          # ---- Step.1 ----
          if ! skip_step "1"; then
            BODY_S1=$(printf '%s\n## Step.1 コンテナ\nStep.1 はコンテナ Issue。Sub Task（Step.1.1, Step.1.2）の完了を待つ。\n\n## 前提条件\n- `docs/catalog/app-catalog.md` が存在すること（App Architecture Design の成果物）\n- `docs/catalog/app-arch-catalog.md` が存在すること（App Architecture Design の成果物）%s' \
              "${ROOT_REF}" "${ADDITIONAL_SECTION}")
            if RESP=$(create_issue \
              "[AAD-WEB] Step.1: ドメイン分析 + サービス一覧抽出" \
              "${BODY_S1}" \
              "${STEP_LABELS}"); then
              S1_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
              S1_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
              echo "Step.1 作成: #${S1_NUM}"
              sleep 3
            else
              post_comment "${ROOT_ISSUE}" "⚠️ Step Issue 生成失敗: [AAD-WEB] Step.1: ドメイン分析 + サービス一覧抽出 (ワークフローログを確認し、再実行または手動対応してください)" || true
              echo "ERROR: create_issue failed for: [AAD-WEB] Step.1: ドメイン分析 + サービス一覧抽出" >&2
            fi

            # Step.1.1
            BODY_S11=$(printf '%s\n## 目的\nユースケース文書を根拠に、DDD観点でドメイン分析を行い、docs/catalog/domain-analytics.md を作成する。\n\n## 前提条件\n- `docs/catalog/app-catalog.md` が存在すること（App Architecture Design の成果物）\n\n## 入力\n- `docs/catalog/use-case-catalog.md`\n- `docs/catalog/app-catalog.md`（アプリケーション一覧）\n\n## 出力\n- `docs/catalog/domain-analytics.md`\n\n## Custom Agent\n`Arch-Microservice-DomainAnalytics` を使用\n\n## 依存\n- フェーズ2の最初のStepとして実行（前段の依存はフェーズ1の成果物のみ）\n\n## 完了条件\n- `docs/catalog/domain-analytics.md` が作成されている\n- 完了時に自身に `aad-web:done` ラベルを付与すること%s%s' \
              "${ROOT_REF}" "${APP_ID_SECTION_S11}" "${ADDITIONAL_SECTION}")
            if RESP=$(create_issue \
              "[AAD-WEB] Step.1.1: ドメイン分析" \
              "${BODY_S11}" \
              "${STEP_LABELS}"); then
              S11_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
              S11_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
              echo "Step.1.1 作成: #${S11_NUM}"
              sleep 3
            else
              post_comment "${ROOT_ISSUE}" "⚠️ Step Issue 生成失敗: [AAD-WEB] Step.1.1: ドメイン分析 (ワークフローログを確認し、再実行または手動対応してください)" || true
              echo "ERROR: create_issue failed for: [AAD-WEB] Step.1.1: ドメイン分析" >&2
            fi

            # Step.1.2
            BODY_S12=$(printf '%s\n## 目的\nユースケース文書とドメイン分析結果を根拠に、サービス一覧を抽出し、docs/catalog/service-catalog.md を作成する。\n\n## 入力\n- `docs/catalog/use-case-catalog.md`\n- `docs/catalog/domain-analytics.md`\n- `docs/catalog/app-catalog.md`（アプリケーション一覧）\n\n## 出力\n- `docs/catalog/service-catalog.md`\n\n## Custom Agent\n`Arch-Microservice-ServiceIdentify` を使用\n\n## 依存\n- Step.1.1（ドメイン分析）が `aad-web:done` であること\n\n## アプリケーション粒度\n📋 `docs/catalog/app-catalog.md` のアプリケーション一覧（APP-ID）を参照し、各サービス候補に APP-ID との紐付け（N:N）を行うこと。\n\n## 完了条件\n- `docs/catalog/service-catalog.md` が作成されている\n- 完了時に自身に `aad-web:done` ラベルを付与すること%s%s' \
              "${ROOT_REF}" "${APP_ID_SECTION}" "${ADDITIONAL_SECTION}")
            if RESP=$(create_issue \
              "[AAD-WEB] Step.1.2: サービス一覧抽出" \
              "${BODY_S12}" \
              "${STEP_LABELS}"); then
              S12_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
              S12_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
              echo "Step.1.2 作成: #${S12_NUM}"
              sleep 3
            else
              post_comment "${ROOT_ISSUE}" "⚠️ Step Issue 生成失敗: [AAD-WEB] Step.1.2: サービス一覧抽出 (ワークフローログを確認し、再実行または手動対応してください)" || true
              echo "ERROR: create_issue failed for: [AAD-WEB] Step.1.2: サービス一覧抽出" >&2
            fi
          fi

