                S81_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
                echo "Step.8.1 作成: #${S81_NUM}"
                sleep 3
              else
                post_comment "${ROOT_ISSUE}" "⚠️ Step Issue 生成失敗: [AAD-WEB] Step.8.1: AI Agent アプリケーション定義 (ワークフローログを確認し、再実行または手動対応してください)" || true
                echo "ERROR: create_issue failed for: [AAD-WEB] Step.8.1: AI Agent アプリケーション定義" >&2
              fi
            fi

            # Step.8.2
            if ! skip_step "8.2"; then
              BODY_S82=$(printf '%s\n## 目的\nStep.8.1 のアプリケーション定義を入力として、AI Agent の粒度設計（Single/Multi 判断）とアーキテクチャ骨格を設計する。\n\n## 入力\n- `docs/agent/agent-application-definition.md`（Step.8.1 の成果物）\n- `docs/catalog/service-catalog-matrix.md`\n- `docs/catalog/domain-analytics.md`\n- `docs/catalog/data-model.md`\n- `docs/catalog/app-catalog.md`（アプリケーション一覧）\n- `users-guide/08-ai-agent.md`（設計ガイドライン Step 2）\n\n## 出力\n- `docs/agent/agent-architecture.md`\n\n## Custom Agent\n`Arch-AIAgentDesign-Step2` を使用\n\n## 依存\n- Step.8.1（AI Agent アプリケーション定義）が `aad-web:done` であること\n\n## 完了条件\n- `docs/agent/agent-architecture.md` が作成されている\n- 完了時に自身に `aad-web:done` ラベルを付与すること%s%s' \
                "${ROOT_REF}" "${APP_ID_SECTION}" "${ADDITIONAL_SECTION}")
              if RESP=$(create_issue \
                "[AAD-WEB] Step.8.2: AI Agent 粒度設計" \
                "${BODY_S82}" \
                "${STEP_LABELS}"); then
                S82_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
                S82_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
                echo "Step.8.2 作成: #${S82_NUM}"
                sleep 3
              else
                post_comment "${ROOT_ISSUE}" "⚠️ Step Issue 生成失敗: [AAD-WEB] Step.8.2: AI Agent 粒度設計 (ワークフローログを確認し、再実行または手動対応してください)" || true
                echo "ERROR: create_issue failed for: [AAD-WEB] Step.8.2: AI Agent 粒度設計" >&2
              fi
            fi

            # Step.8.3
            if ! skip_step "8.3"; then
              BODY_S83=$(printf '%s\n## 目的\nStep.8.2 の Agent Catalog の各 Agent について詳細設計書を作成し、Agent 一覧を更新する。\n\n## 入力\n- `docs/agent/agent-architecture.md`（Step.8.2 の成果物）\n- `docs/agent/agent-application-definition.md`（Step.8.1 の成果物）\n- `docs/catalog/service-catalog-matrix.md`\n- `docs/services/SVC-*.md`（関連サービスのみ）\n- `docs/catalog/app-catalog.md`（アプリケーション一覧）\n- `users-guide/08-ai-agent.md`（設計ガイドライン Step 3）\n\n## 出力\n- `docs/agent/agent-detail-<Agent-ID>-<Agent名>.md`（Agent ごとに1ファイル）\n- `docs/ai-agent-catalog.md`（Agent 一覧）\n\n## Custom Agent\n`Arch-AIAgentDesign-Step3` を使用\n\n## 依存\n- Step.8.2（AI Agent 粒度設計）が `aad-web:done` であること\n\n## 完了条件\n- `docs/agent/` 配下に Agent ごとの詳細設計書が作成されている\n- `docs/ai-agent-catalog.md` が作成/更新されている\n- 完了時に自身に `aad-web:done` ラベルを付与すること%s%s' \
                "${ROOT_REF}" "${APP_ID_SECTION}" "${ADDITIONAL_SECTION}")
              if RESP=$(create_issue \
                "[AAD-WEB] Step.8.3: AI Agent 詳細設計" \
                "${BODY_S83}" \
                "${STEP_LABELS}"); then
                S83_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
                S83_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
                echo "Step.8.3 作成: #${S83_NUM}"
                sleep 3
              else
                post_comment "${ROOT_ISSUE}" "⚠️ Step Issue 生成失敗: [AAD-WEB] Step.8.3: AI Agent 詳細設計 (ワークフローログを確認し、再実行または手動対応してください)" || true
                echo "ERROR: create_issue failed for: [AAD-WEB] Step.8.3: AI Agent 詳細設計" >&2
              fi
            fi
          fi

          # ---- Sub Issue 紐付け ----
          echo "Sub Issue 紐付けを開始します..."

          if [[ -n "${S1_NUM}" ]]; then
            link_sub_issue "${ROOT_ISSUE}" "${S1_ID}"
            echo "Root → Step.1 紐付け完了"
            if [[ -n "${S11_NUM}" ]]; then
              link_sub_issue "${S1_NUM}" "${S11_ID}"
              echo "Step.1 → Step.1.1 紐付け完了"
            fi
            if [[ -n "${S12_NUM}" ]]; then
              link_sub_issue "${S1_NUM}" "${S12_ID}"
              echo "Step.1 → Step.1.2 紐付け完了"
            fi
          fi

          [[ -n "${S2_NUM}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S2_ID}"; echo "Root → Step.2 紐付け完了"; }
          [[ -n "${S3_NUM}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S3_ID}"; echo "Root → Step.3 紐付け完了"; }
          [[ -n "${S4_NUM}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S4_ID}"; echo "Root → Step.4 紐付け完了"; }
          [[ -n "${S5_NUM}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S5_ID}"; echo "Root → Step.5 紐付け完了"; }
          [[ -n "${S6_NUM}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S6_ID}"; echo "Root → Step.6 紐付け完了"; }

          if [[ -n "${S7_NUM}" ]]; then
            link_sub_issue "${ROOT_ISSUE}" "${S7_ID}"
            echo "Root → Step.7 紐付け完了"
            if [[ -n "${S71_NUM}" ]]; then
              link_sub_issue "${S7_NUM}" "${S71_ID}"
              echo "Step.7 → Step.7.1 紐付け完了"
            fi
            if [[ -n "${S72_NUM}" ]]; then
              link_sub_issue "${S7_NUM}" "${S72_ID}"
              echo "Step.7 → Step.7.2 紐付け完了"
            fi
            if [[ -n "${S73_NUM}" ]]; then
              link_sub_issue "${S7_NUM}" "${S73_ID}"
              echo "Step.7 → Step.7.3 紐付け完了"
            fi
          fi

          if [[ -n "${S8_NUM}" ]]; then
            link_sub_issue "${ROOT_ISSUE}" "${S8_ID}"
            echo "Root → Step.8 紐付け完了"
            if [[ -n "${S81_NUM}" ]]; then
              link_sub_issue "${S8_NUM}" "${S81_ID}"
              echo "Step.8 → Step.8.1 紐付け完了"
            fi
            if [[ -n "${S82_NUM}" ]]; then
              link_sub_issue "${S8_NUM}" "${S82_ID}"
              echo "Step.8 → Step.8.2 紐付け完了"
            fi
            if [[ -n "${S83_NUM}" ]]; then
              link_sub_issue "${S8_NUM}" "${S83_ID}"
              echo "Step.8 → Step.8.3 紐付け完了"
            fi
          fi

          # ---- 最初に実行すべき Step を起動 ----
          if [[ -n "${S11_NUM}" ]]; then
            if [[ "${AUTO_QA}" == "true" ]]; then
              add_label "${S11_NUM}" "aad-web:qa-ready"
              echo "Step.1.1 (#${S11_NUM}) に aad-web:qa-ready を付与しました（QA 完了待ち）。Copilot アサインは QA 回答後に実行されます。"
            else
              add_label "${S11_NUM}" "aad-web:ready"
              CA=$(extract_custom_agent "${BODY_S11}")
              if assign_copilot "${S11_NUM}" "${CA}" "${BRANCH}" ""; then
                add_label "${S11_NUM}" "aad-web:running"
                echo "Step.1.1 に copilot アサイン + aad-web:running 付与完了"
              else
                echo "WARNING: Step.1.1 へのアサイン失敗。aad-web:running は付与しません。"
              fi
            fi
          elif [[ -n "${S2_NUM}" ]]; then
            add_label "${S2_NUM}" "aad-web:ready"
            CA=$(extract_custom_agent "${BODY_S2}")
            if assign_copilot "${S2_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S2_NUM}" "aad-web:running"
              echo "Step.1 がスキップ済み: Step.2 (#${S2_NUM}) を起動しました。"
            else
              echo "WARNING: Step.2 へのアサイン失敗。aad-web:running は付与しません。"
            fi
          elif [[ -n "${S3_NUM}" ]]; then
            add_label "${S3_NUM}" "aad-web:ready"
            CA=$(extract_custom_agent "${BODY_S3}")
            if assign_copilot "${S3_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S3_NUM}" "aad-web:running"
              echo "Step.1/2 がスキップ済み: Step.3 (#${S3_NUM}) を起動しました。"
            else
              echo "WARNING: Step.3 へのアサイン失敗。aad-web:running は付与しません。"
            fi
          elif [[ -n "${S4_NUM}" ]]; then
            add_label "${S4_NUM}" "aad-web:ready"
            CA=$(extract_custom_agent "${BODY_S4}")
            if assign_copilot "${S4_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S4_NUM}" "aad-web:running"
              echo "Step.1/2/3 がスキップ済み: Step.4 (#${S4_NUM}) を起動しました。"
            else
              echo "WARNING: Step.4 へのアサイン失敗。aad-web:running は付与しません。"
            fi
          elif [[ -n "${S5_NUM}" ]]; then
            add_label "${S5_NUM}" "aad-web:ready"
            CA=$(extract_custom_agent "${BODY_S5}")
            if assign_copilot "${S5_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S5_NUM}" "aad-web:running"
              echo "Step.1/2/3/4 がスキップ済み: Step.5 (#${S5_NUM}) を起動しました。"
            else
              echo "WARNING: Step.5 へのアサイン失敗。aad-web:running は付与しません。"
            fi
          elif [[ -n "${S6_NUM}" ]]; then
            add_label "${S6_NUM}" "aad-web:ready"
            CA=$(extract_custom_agent "${BODY_S6}")
            if assign_copilot "${S6_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S6_NUM}" "aad-web:running"
              echo "Step.1/2/3/4/5 がスキップ済み: Step.6 (#${S6_NUM}) を起動しました。"
            else
              echo "WARNING: Step.6 へのアサイン失敗。aad-web:running は付与しません。"
            fi
          elif [[ -n "${S71_NUM}" ]] || [[ -n "${S72_NUM}" ]]; then
            if [[ -n "${S71_NUM}" ]]; then
              add_label "${S71_NUM}" "aad-web:ready"
              CA=$(extract_custom_agent "${BODY_S71}")
              if assign_copilot "${S71_NUM}" "${CA}" "${BRANCH}" ""; then
                add_label "${S71_NUM}" "aad-web:running"
                echo "Step.7.1 (#${S71_NUM}) を起動しました。"
              else
                echo "WARNING: Step.7.1 へのアサイン失敗。aad-web:running は付与しません。"
              fi
            fi
            if [[ -n "${S72_NUM}" ]]; then
              add_label "${S72_NUM}" "aad-web:ready"
              CA=$(extract_custom_agent "${BODY_S72}")
              if assign_copilot "${S72_NUM}" "${CA}" "${BRANCH}" ""; then
                add_label "${S72_NUM}" "aad-web:running"
                echo "Step.7.2 (#${S72_NUM}) を起動しました。"
              else
                echo "WARNING: Step.7.2 へのアサイン失敗。aad-web:running は付与しません。"
              fi
            fi
          elif [[ -n "${S73_NUM}" ]]; then
            add_label "${S73_NUM}" "aad-web:ready"
            CA=$(extract_custom_agent "${BODY_S73}")
            if assign_copilot "${S73_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S73_NUM}" "aad-web:running"
              echo "Step.7.1/7.2 がスキップ済み: Step.7.3 (#${S73_NUM}) を起動しました。"
            else
              echo "WARNING: Step.7.3 へのアサイン失敗。aad-web:running は付与しません。"
            fi
          elif [[ -n "${S81_NUM}" ]]; then
            add_label "${S81_NUM}" "aad-web:ready"
            CA=$(extract_custom_agent "${BODY_S81}")
            if assign_copilot "${S81_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S81_NUM}" "aad-web:running"
              echo "Step.8.1 (#${S81_NUM}) を起動しました。"
            else
              echo "WARNING: Step.8.1 へのアサイン失敗。aad-web:running は付与しません。"
            fi
          else
            echo "実行すべき Step が存在しません（全 Step スキップ）。"
          fi

          echo "初期化完了。"

      # ----------------------------------------------------------------
      # 4. 状態遷移: aad-web:done ラベル付与時
      # ----------------------------------------------------------------
      - name: 状態遷移処理
        if: steps.gate.outputs.mode == 'state_transition'
        env:
          DONE_ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail

          _ISSUE_JSON=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}")
          DONE_ISSUE_BODY=$(echo "${_ISSUE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          DONE_ISSUE_TITLE=$(echo "${_ISSUE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          export DONE_ISSUE_BODY DONE_ISSUE_TITLE

          _HAS_DONE_LABEL=$(echo "${_ISSUE_JSON}" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          labels = [l['name'] for l in d.get('labels', [])]
          print('true' if 'aad-web:done' in labels else 'false')
          ")
          if [[ "${_HAS_DONE_LABEL}" == "false" ]]; then
            echo "aad-web:done ラベルを付与します（closed イベント由来）..."
            curl -s -o /dev/null \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}/labels" \
              -d '{"labels":["aad-web:done"]}' || true
            echo "aad-web:done ラベルを付与しました。"
            sleep 2
          fi

          if [[ -z "${COPILOT_PAT}" ]]; then
            echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインは全てスキップされます。" >&2
          fi

          # ---- ユーティリティ関数 ----
          source "${GITHUB_WORKSPACE}/.github/scripts/aad-common.sh"

          activate_issue() {
            local issue_num="$1"
            local issue_body
            issue_body=$(curl -sf \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))") || true
            local agent_name
            agent_name=$(extract_custom_agent "${issue_body}") || true
            add_label "${issue_num}" "aad-web:ready"
            if assign_copilot "${issue_num}" "${agent_name}" "${BRANCH:-main}" ""; then
              add_label "${issue_num}" "aad-web:running"
              echo "Issue #${issue_num} を aad-web:ready + copilot アサイン + aad-web:running に設定しました。(custom_agent: ${agent_name})"
            else
              echo "WARNING: Issue #${issue_num} へのアサイン失敗。aad-web:running は付与しません。"
            fi
          }

          # ---- done Issue の title から Step 番号を特定 ----
          STEP_MATCH=$(echo "${DONE_ISSUE_TITLE}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          title = sys.stdin.read().strip()
          m = re.search(r'\] Step\.(\d+(?:\.\d+)?)', title)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${STEP_MATCH}" ]]; then
            echo "Step 番号が特定できません（title: ${DONE_ISSUE_TITLE}）。スキップ。"
            exit 0
          fi

          echo "完了した Step: ${STEP_MATCH}"

          # ---- Root Issue 番号の取得 ----
          ROOT_ISSUE=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!-- root-issue: #(\d+) -->', body)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${ROOT_ISSUE}" ]]; then
            echo "Root Issue 番号が取得できません。スキップ。"
            exit 0
          fi

          echo "Root Issue: #${ROOT_ISSUE}"

          # ERR トラップを関数にも継承させる
          set -E
          # トラップ内では -e による即時終了を防ぎ、post_comment 失敗は握りつぶす
          trap 'set +e; trap - ERR; post_comment "${ROOT_ISSUE}" "⚠️ ワークフローエラー: Step 処理中に予期しないエラーが発生しました (exit code: $?)" || true' ERR

          # ---- ブランチ名の取得 ----
          BRANCH=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!-- branch: (.+?) -->', body)
          print(m.group(1).strip() if m else 'main')
          PY
          )

          echo "対象ブランチ: ${BRANCH}"

          # ---- auto-context-review / auto-qa PR ラベル付与 ----
          AUTO_CONTEXT_REVIEW=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!--\s*auto-context-review:\s*(true|false)\s*-->', body)
          print(m.group(1) if m else 'false')
          PY
          )
          AUTO_QA=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!--\s*auto-qa:\s*(true|false)\s*-->', body)
          print(m.group(1) if m else 'false')
          PY
          )
          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]] || [[ "${AUTO_QA}" == "true" ]]; then
            LINKED_PRS=$(gh api "/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}/timeline?per_page=100" \
              --jq '[.[] | select(.event == "cross-referenced" and .source.type == "pull_request" and .source.issue.state == "open") | .source.issue.number] | unique | .[]' \
              2>/dev/null || true)
            if [[ -n "${LINKED_PRS}" ]]; then
              while IFS= read -r pr_num; do
                if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
                  gh pr edit "${pr_num}" --repo "${REPO}" --add-label "auto-context-review" 2>/dev/null \
                    && echo "PR #${pr_num} に auto-context-review ラベルを付与しました。" \
                    || echo "WARNING: PR #${pr_num} への auto-context-review ラベル付与に失敗しました。" >&2
                fi
                if [[ "${AUTO_QA}" == "true" ]]; then
                  gh pr edit "${pr_num}" --repo "${REPO}" --add-label "auto-qa" 2>/dev/null \
                    && echo "PR #${pr_num} に auto-qa ラベルを付与しました。" \
                    || echo "WARNING: PR #${pr_num} への auto-qa ラベル付与に失敗しました。" >&2
                fi
              done <<< "${LINKED_PRS}"
            fi
          fi

          # ---- Root Issue の Sub Issues を取得して Step Issue を特定 ----
          get_sub_issue_number() {
            local pattern="$1"
            local resp
            resp=$(api_call GET \
              "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues")
            echo "${resp}" | python3 /dev/fd/3 "${pattern}" 3<<'PY'
          import sys, re, json
          issues = json.load(sys.stdin)
          pattern = sys.argv[1]
          for issue in issues:
              title = issue.get('title', '')
              if re.search(pattern, title):
                  print(issue['number'])
                  break
          PY
          }

          get_sub_issue_number_from_parent() {
            local parent_num="$1"
            local pattern="$2"
            local resp
            resp=$(api_call GET \
              "https://api.github.com/repos/${REPO}/issues/${parent_num}/sub_issues")
            echo "${resp}" | python3 /dev/fd/3 "${pattern}" 3<<'PY'
          import sys, re, json
          issues = json.load(sys.stdin)
          pattern = sys.argv[1]
          for issue in issues:
              title = issue.get('title', '')
              if re.search(pattern, title):
                  print(issue['number'])
                  break
          PY
          }

          # ---- 依存関係マップに基づき次 Step を特定 & 起動 ----
          case "${STEP_MATCH}" in
            "1.1")
              # Step.1.1 完了 → Step.1.2 を ready + assign
              S1_NUM=$(get_sub_issue_number '\] Step\.1:')
              if [[ -n "${S1_NUM}" ]]; then
                S12_NUM=$(get_sub_issue_number_from_parent "${S1_NUM}" '\] Step\.1\.2:')
                if [[ -n "${S12_NUM}" ]]; then
                  activate_issue "${S12_NUM}"
                fi
              fi
              ;;

            "1.2")
              # Step.1.2 完了 → Step.1 コンテナに aad-web:done + Step.2 を ready + assign
              S1_NUM=$(get_sub_issue_number '\] Step\.1:')
              [[ -n "${S1_NUM}" ]] && add_label "${S1_NUM}" "aad-web:done"
              S2_NUM=$(get_sub_issue_number '\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                activate_issue "${S2_NUM}"
              else
                S3_NUM=$(get_sub_issue_number '\] Step\.3:')
                if [[ -n "${S3_NUM}" ]]; then
                  activate_issue "${S3_NUM}"
                else
                  S4_NUM=$(get_sub_issue_number '\] Step\.4:')
                  [[ -n "${S4_NUM}" ]] && activate_issue "${S4_NUM}"
                fi
              fi
              ;;

            "2")
              # Step.2 完了 → Step.3 を ready + assign（なければ Step.4 へ）
              S3_NUM=$(get_sub_issue_number '\] Step\.3:')
              if [[ -n "${S3_NUM}" ]]; then
                activate_issue "${S3_NUM}"
              else
                S4_NUM=$(get_sub_issue_number '\] Step\.4:')
                if [[ -n "${S4_NUM}" ]]; then
