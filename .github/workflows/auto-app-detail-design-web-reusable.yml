              S4_NUM=$(get_sub_issue_number '\] Step\.4:')
              if [[ -n "${S4_NUM}" ]]; then
                activate_issue "${S4_NUM}"
              else
                S5_NUM=$(get_sub_issue_number '\] Step\.5:')
                [[ -n "${S5_NUM}" ]] && activate_issue "${S5_NUM}"
              fi
              ;;

            "4")
              # Step.4 完了 → Step.5 を ready + assign
              S5_NUM=$(get_sub_issue_number '\] Step\.5:')
              if [[ -n "${S5_NUM}" ]]; then
                activate_issue "${S5_NUM}"
              else
                S6_NUM=$(get_sub_issue_number '\] Step\.6:')
                if [[ -n "${S6_NUM}" ]]; then
