                  S72_NUM=$(get_sub_issue_number_from_parent "${S7_NUM}" '\] Step\.7\.2:')
                  [[ -n "${S71_NUM}" ]] && activate_issue "${S71_NUM}"
                  [[ -n "${S72_NUM}" ]] && activate_issue "${S72_NUM}"
                fi
              fi
              ;;

            "6")
              # Step.6 完了 → Step.7.1 と Step.7.2 を並列で ready + assign
              S7_NUM=$(get_sub_issue_number '\] Step\.7:')
