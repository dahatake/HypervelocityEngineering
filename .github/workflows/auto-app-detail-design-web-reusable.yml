                        | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if 'aad-web:done' in [l['name'] for l in d.get('labels',[])] else 'false')")
                    else
                      # Step.6 がスキップされた場合は依存完了とみなす
                      S6_DONE="true"
                    fi
                    if [[ "${S6_DONE}" == "true" ]]; then
                      activate_issue "${S73_NUM}"
