                    add_label "${ROOT_ISSUE}" "aad-web:done"
                    _done_msg=$(printf '🎉 全ての設計書生成ステップが完了しました！Root Issue #%s のワークフローが正常に終了しました。\n\n**主な成果物（AI Agent 設計含む）:**\n- `docs/catalog/domain-analytics.md` — ドメイン分析\n- `docs/catalog/service-catalog.md` — サービス一覧\n- `docs/catalog/data-model.md` — データモデル\n- `docs/catalog/screen-catalog.md` — 画面一覧\n- `docs/catalog/service-catalog-matrix.md` — サービスカタログ\n- `docs/screen/` — 画面定義書群\n- `docs/services/` — マイクロサービス定義書群\n- `docs/test-specs/` — TDDテスト仕様書群\n- `docs/agent/` — AI Agent 設計書群\n- `docs/ai-agent-catalog.md` — AI Agent 一覧' "${ROOT_ISSUE}")
                    post_comment "${ROOT_ISSUE}" "${_done_msg}"
