                    [[ -n "${S72_NUM}" ]] && activate_issue "${S72_NUM}"
                  fi
                fi
              fi
              ;;

            "5")
              # Step.5 完了 → Step.6 を ready + assign（なければ Step.7.1/7.2 を並列起動）
              S6_NUM=$(get_sub_issue_number '\] Step\.6:')
              if [[ -n "${S6_NUM}" ]]; then
                activate_issue "${S6_NUM}"
              else
                S7_NUM=$(get_sub_issue_number '\] Step\.7:')
