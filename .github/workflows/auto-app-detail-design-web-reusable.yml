                      add_label "${S7_NUM}" "aad-web:blocked"
                      add_label "${ROOT_ISSUE}" "aad-web:blocked"
                      add_label "${S73_NUM}" "aad-web:blocked"
                      block_msg=$'⚠️ **Step.7.3（テスト仕様書）がスキップされました**\n'
                      block_msg+=$'\nStep.6（テスト戦略書）が完了していないため、Step.7.3 を起動できませんでした。'
                      block_msg+=$'\nテスト仕様書は TDD プロセスの重要な成果物です。ワークフローは `aad-web:blocked` 状態です。'
                      block_msg+=$'\n\n**手動で Step.7.3 を起動する手順:**'
