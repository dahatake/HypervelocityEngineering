name: Copilot PR body への Closes #N 自動補完

# Copilot cloud agent が PR を作成した際に、PR body への Closes #N 補完を自動で行う。
#
# 注意: GitHub 公式機能が Issue 側に PR リンクコメントを自動投稿するため、
#   本ワークフローは PR body の `Closes #N` 補完を主目的とする。
#   （GitHub 公式機能は Issue クローズ連動のため PR body に `Closes #N` を書かない。
#    本ワークフローがその補完を担っている。）
#
# 問題: Copilot cloud agent は PR body に Closes #N / Fixes #N を記載しないため、
#   PR マージ時に Issue が自動クローズされない。
#
# 処理フロー:
#   1. PR 作成者が Copilot かどうか確認（copilot-swe-agent[bot] / Copilot Bot）
#   2. 冪等化チェック（<!-- link-copilot-pr-to-issue-done --> マーカーで重複防止）
#   3. 元 Issue 番号を .github/scripts/pr-common.sh の find_issue_number() で特定:
#      Method 1  : GraphQL closingIssuesReferences
#      Method 2  : PR body の Closes/Fixes/Resolves #N（既にリンクあり → body 追記スキップ）
#      Method 2.5: PR body の <!-- parent-issue: #N -->
#      Method 2.6: PR コメントの <!-- sync-issue-labels-done --> マーカー
#      Method 2.7: PR body の Issue-NNN パスパターン（存在確認付き）
#      Method 3  : Copilot がアサインされた Open Issue のタイトル逆引き
#      特定できない場合は PR に警告コメントを投稿
#   4. Issue が特定できた場合:
#      - PR body に既に Closes/Fixes/Resolves がない場合: PR body 先頭に
#        <!-- parent-issue: #N --> を補完し、Closes #N を追記
#      - 冪等化マーカー <!-- link-copilot-pr-to-issue-done --> を PR にコメント投稿
#
# 注意:
#   - pull_request_target を使用（Copilot が作成した PR のブランチには
#     ワークフロー定義がない可能性があるため、ベースブランチの定義で実行）
#   - COPILOT_PAT 優先、未設定時は GITHUB_TOKEN にフォールバック
#   - ${{ }} 式をシェル変数に直接展開せず、env 経由で渡す（スクリプトインジェクション対策）
#   - API 操作ステップは continue-on-error: true により、失敗しても PR 作成を妨げない

on:
  pull_request_target:
    types: [opened]

concurrency:
  group: link-copilot-pr-to-issue-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  link-pr-to-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
      PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}

    steps:
      - name: Copilot PR かどうか確認
        id: check-copilot
        run: |
          set -euo pipefail
          # PR 作成者が Copilot Bot（copilot-swe-agent / copilot-swe-agent[bot] / Copilot 等）かどうか確認
          IS_COPILOT_LOGIN="false"
          if [ "${PR_AUTHOR_LOGIN}" = "Copilot" ] || \
             [ "${PR_AUTHOR_LOGIN}" = "copilot-swe-agent" ] || \
             [ "${PR_AUTHOR_LOGIN}" = "copilot-swe-agent[bot]" ] || \
             [ "${PR_AUTHOR_LOGIN}" = "copilot[bot]" ]; then
            IS_COPILOT_LOGIN="true"
          fi

          if [ "${IS_COPILOT_LOGIN}" = "true" ] && [ "${PR_AUTHOR_TYPE}" = "Bot" ]; then
            echo "✅ Copilot PR を検出: #${PR_NUMBER} (login: ${PR_AUTHOR_LOGIN}, type: ${PR_AUTHOR_TYPE})"
            echo "is_copilot=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Copilot PR ではありません (login: ${PR_AUTHOR_LOGIN}, type: ${PR_AUTHOR_TYPE})。スキップします。"
            echo "is_copilot=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: 冪等化チェック（処理済みか確認）
        if: steps.check-copilot.outputs.is_copilot == 'true'
        id: guard
        run: |
          set -euo pipefail
          MARKER="<!-- link-copilot-pr-to-issue-done -->"
          existing=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' 2>/dev/null \
            | jq -s --arg marker "${MARKER}" '[.[] | select(.body | contains($marker))] | length' \
            2>/dev/null) || existing=0
          if [ "${existing:-0}" -gt 0 ]; then
            echo "既に処理済みです。スキップします。"
            echo "done=true" >> "${GITHUB_OUTPUT}"
          else
            echo "done=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: リポジトリをチェックアウト（共通スクリプト読み込みのため）
        if: steps.check-copilot.outputs.is_copilot == 'true' && steps.guard.outputs.done != 'true'
        uses: actions/checkout@v4

      - name: 元 Issue 番号を特定
        if: steps.check-copilot.outputs.is_copilot == 'true' && steps.guard.outputs.done != 'true'
        id: find-issue
        env:
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          source "${GITHUB_WORKSPACE}/.github/scripts/pr-common.sh"
          find_issue_number

          if [ -n "${ISSUE_NUMBER}" ]; then
            # PR body に既に Closes/Fixes/Resolves がある場合は body 追記不要
            EXISTING=$(echo "${PR_BODY}" \
              | grep -oiP '(?:fix(?:es)?|close[sd]?|resolve[sd]?)\s+(?:[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+)?#\K[0-9]+' \
              | head -1) || EXISTING=""
            if [ -n "${EXISTING}" ]; then
              echo "needs_body_update=false" >> "${GITHUB_OUTPUT}"
            else
              echo "needs_body_update=true" >> "${GITHUB_OUTPUT}"
            fi
          else
            echo "needs_body_update=false" >> "${GITHUB_OUTPUT}"
          fi
          echo "issue_number=${ISSUE_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: "PR body に Closes #N と parent-issue マーカーを追記"
        if: >
          steps.check-copilot.outputs.is_copilot == 'true' &&
          steps.guard.outputs.done != 'true' &&
          steps.find-issue.outputs.issue_number != '' &&
          steps.find-issue.outputs.needs_body_update == 'true'
        continue-on-error: true
        env:
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.issue_number }}
        run: |
          set -euo pipefail
          # 全体末尾の空白・改行を除去してから parent-issue マーカー + Closes #N を追記
          TRIMMED_BODY=$(printf '%s' "${PR_BODY}" | perl -0pe 's/\s*\z//')
          PARENT_MARKER="<!-- parent-issue: #${ISSUE_NUMBER} -->"
          PARENT_MARKER_REGEX="<!--[[:space:]]*parent-issue:[[:space:]]*#${ISSUE_NUMBER}[[:space:]]*-->"
          if ! printf '%s' "${TRIMMED_BODY}" | grep -Eq "${PARENT_MARKER_REGEX}"; then
            NEW_BODY=$(printf '%s\n%s\n\nCloses #%s' "${PARENT_MARKER}" "${TRIMMED_BODY}" "${ISSUE_NUMBER}")
          else
            NEW_BODY=$(printf '%s\n\nCloses #%s' "${TRIMMED_BODY}" "${ISSUE_NUMBER}")
          fi
          gh pr edit "${PR_NUMBER}" --repo "${REPO}" --body "${NEW_BODY}"
          echo "✅ PR body に parent-issue マーカーと Closes #${ISSUE_NUMBER} を追記しました。"

      - name: Issue 特定成功時に冪等化マーカーを PR に投稿
        if: >
          steps.check-copilot.outputs.is_copilot == 'true' &&
          steps.guard.outputs.done != 'true' &&
          steps.find-issue.outputs.issue_number != ''
        continue-on-error: true
        env:
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.issue_number }}
        run: |
          set -euo pipefail

          # 冪等化マーカーを PR に投稿
          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "<!-- link-copilot-pr-to-issue-done -->"
          echo "✅ 冪等化マーカーを PR #${PR_NUMBER} に投稿しました。"

      - name: Issue が特定できない場合の警告コメントを PR に投稿
        if: >
          steps.check-copilot.outputs.is_copilot == 'true' &&
          steps.guard.outputs.done != 'true' &&
          steps.find-issue.outputs.issue_number == ''
        continue-on-error: true
        run: |
          set -euo pipefail

          # PR body から Issue 番号のヒントを抽出（/Issue<digits>/ パターンのみ対象）
          HINT_ISSUE=$(echo "${PR_BODY}" | grep -oP '/Issue-\K[0-9]+(?=/)' | head -1) || HINT_ISSUE=""
          if [ -n "${HINT_ISSUE}" ]; then
            HINT_MSG=$(printf '\n\n> 💡 **ヒント**: PR body に `Issue-%s` への参照があります。Issue #%s が削除・移動済みの場合は、新規 Issue を作成して `Closes #N` を追記してください。' \
              "${HINT_ISSUE}" "${HINT_ISSUE}")
          else
            HINT_MSG=""
          fi

          COMMENT=$(printf '%s\n\n## ⚠️ 元 Issue を特定できませんでした\n\n%s%s\n\n%s' \
            '<!-- link-copilot-pr-to-issue-done -->' \
            '元 Issue を特定できませんでした。手動で `Closes #N` を PR body に追記してください。' \
            "${HINT_MSG}" \
            '> ℹ️ このコメントは `link-copilot-pr-to-issue.yml` によって自動投稿されました。')

          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "${COMMENT}"
          echo "⚠️ 警告コメントを PR #${PR_NUMBER} に投稿しました。"
