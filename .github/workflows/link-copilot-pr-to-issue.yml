name: Copilot PR ↔ Issue リンク自動設定

# Copilot coding agent が PR を作成した際に、元 Issue との紐付けを自動で行う。
#
# 問題: Copilot coding agent は PR body に Closes #N / Fixes #N を記載しないため、
#   Issue の Development セクションに PR リンクが表示されない。
#
# 処理フロー:
#   1. PR 作成者が Copilot かどうか確認（copilot-swe-agent[bot] / Copilot Bot）
#   2. 冪等化チェック（<!-- link-copilot-pr-to-issue-done --> マーカーで重複防止）
#   3. 元 Issue 番号を以下の優先順で特定:
#      (a) PR body に既に Closes/Fixes/Resolves #N がある場合、その番号を抽出（body 追記はスキップ）
#      (b) PR body の <!-- parent-issue: #N -->
#      (c) Copilot がアサインされた Open Issue を検索（一意に特定できる場合のみ採用）
#      (d) 特定できない場合は PR に警告コメントを投稿
#   4. Issue が特定できた場合:
#      - (a) 以外: PR body に Closes #N を追記
#      - Issue に「Copilot が PR を作成しました」コメントを投稿
#
# 注意:
#   - pull_request_target を使用（Copilot が作成した PR のブランチには
#     ワークフロー定義がない可能性があるため、ベースブランチの定義で実行）
#   - COPILOT_PAT 優先、未設定時は GITHUB_TOKEN にフォールバック
#   - ${{ }} 式をシェル変数に直接展開せず、env 経由で渡す（スクリプトインジェクション対策）
#   - API 操作ステップは continue-on-error: true により、失敗しても PR 作成を妨げない

on:
  pull_request_target:
    types: [opened]

concurrency:
  group: link-copilot-pr-to-issue-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  link-pr-to-issue:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
      PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}

    steps:
      - name: Copilot PR かどうか確認
        id: check-copilot
        run: |
          set -euo pipefail
          # PR 作成者が Copilot Bot（copilot-swe-agent / copilot-swe-agent[bot] / Copilot 等）かどうか確認
          IS_COPILOT_LOGIN="false"
          if [ "${PR_AUTHOR_LOGIN}" = "Copilot" ] || \
             [ "${PR_AUTHOR_LOGIN}" = "copilot-swe-agent" ] || \
             [ "${PR_AUTHOR_LOGIN}" = "copilot-swe-agent[bot]" ] || \
             [ "${PR_AUTHOR_LOGIN}" = "copilot[bot]" ]; then
            IS_COPILOT_LOGIN="true"
          fi

          if [ "${IS_COPILOT_LOGIN}" = "true" ] && [ "${PR_AUTHOR_TYPE}" = "Bot" ]; then
            echo "✅ Copilot PR を検出: #${PR_NUMBER} (login: ${PR_AUTHOR_LOGIN}, type: ${PR_AUTHOR_TYPE})"
            echo "is_copilot=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Copilot PR ではありません (login: ${PR_AUTHOR_LOGIN}, type: ${PR_AUTHOR_TYPE})。スキップします。"
            echo "is_copilot=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: 冪等化チェック（処理済みか確認）
        if: steps.check-copilot.outputs.is_copilot == 'true'
        id: guard
        run: |
          set -euo pipefail
          MARKER="<!-- link-copilot-pr-to-issue-done -->"
          existing=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' 2>/dev/null \
            | jq -s --arg marker "${MARKER}" '[.[] | select(.body | contains($marker))] | length' \
            2>/dev/null) || existing=0
          if [ "${existing:-0}" -gt 0 ]; then
            echo "既に処理済みです。スキップします。"
            echo "done=true" >> "${GITHUB_OUTPUT}"
          else
            echo "done=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: 元 Issue 番号を特定
        if: steps.check-copilot.outputs.is_copilot == 'true' && steps.guard.outputs.done != 'true'
        id: find-issue
        run: |
          set -euo pipefail
          ISSUE_NUMBER=""
          NEEDS_BODY_UPDATE="true"

          # (a) PR body に既に Closes/Fixes/Resolves #N がある場合、番号を抽出（body 追記は不要）
          echo "=== (a) PR body の既存リンクを確認 ==="
          EXISTING=$(echo "${PR_BODY}" \
            | grep -oiP '(?:fix(?:es)?|close[sd]?|resolve[sd]?)\s+(?:[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+)?#\K[0-9]+' \
            | head -1) || EXISTING=""
          if [ -n "${EXISTING}" ]; then
            echo "✅ (a) PR body に既にリンクあり: Issue #${EXISTING}。body 追記をスキップします。"
            ISSUE_NUMBER="${EXISTING}"
            NEEDS_BODY_UPDATE="false"
          fi

          # (b) PR body の <!-- parent-issue: #N --> を確認
          if [ -z "${ISSUE_NUMBER}" ]; then
            echo "=== (b) PR body の <!-- parent-issue: #N --> を確認 ==="
            PARENT_ISSUE=$(echo "${PR_BODY}" \
              | grep -oP '<!--\s*parent-issue:\s*#\K[0-9]+' \
              | head -1) || PARENT_ISSUE=""
            if [ -n "${PARENT_ISSUE}" ]; then
              echo "✅ (b) parent-issue: #${PARENT_ISSUE}"
              ISSUE_NUMBER="${PARENT_ISSUE}"
            fi
          fi

          # (c) Copilot アサイン済み Open Issue を検索（一意に特定できる場合のみ採用）
          if [ -z "${ISSUE_NUMBER}" ]; then
            echo "=== (c) copilot-swe-agent アサイン済み Open Issue を検索 ==="
            CANDIDATES=$(gh api \
              "/repos/${REPO}/issues?assignee=copilot-swe-agent&state=open&sort=updated&direction=desc&per_page=10" \
              --jq '[.[] | select(.pull_request == null) | .number] | join(" ")' \
              2>/dev/null) || CANDIDATES=""

            if [ -z "${CANDIDATES}" ]; then
              echo "=== (c) Copilot アサイン済み Open Issue を検索 ==="
              CANDIDATES=$(gh api \
                "/repos/${REPO}/issues?assignee=Copilot&state=open&sort=updated&direction=desc&per_page=10" \
                --jq '[.[] | select(.pull_request == null) | .number] | join(" ")' \
                2>/dev/null) || CANDIDATES=""
            fi

            if [ -n "${CANDIDATES}" ]; then
              # 候補が一意な場合のみ採用（複数ある場合は誤リンクを防ぐため警告のみ）
              # shellcheck disable=SC2086
              set -- ${CANDIDATES}
              CANDIDATE_COUNT=$#
              if [ "${CANDIDATE_COUNT}" -eq 1 ]; then
                ISSUE_NUMBER="$1"
                echo "✅ (c) 一意に特定された Issue #${ISSUE_NUMBER}"
              else
                echo "⚠️ (c) Copilot アサイン済みの Open Issue が複数見つかったため、自動で Closes を付与しません: ${CANDIDATES}"
              fi
            fi
          fi

          if [ -n "${ISSUE_NUMBER}" ]; then
            echo "issue_number=${ISSUE_NUMBER}" >> "${GITHUB_OUTPUT}"
            echo "needs_body_update=${NEEDS_BODY_UPDATE}" >> "${GITHUB_OUTPUT}"
          else
            echo "(d) Issue 番号を特定できませんでした。"
            echo "issue_number=" >> "${GITHUB_OUTPUT}"
            echo "needs_body_update=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: PR body に Closes #N を追記
        if: >
          steps.check-copilot.outputs.is_copilot == 'true' &&
          steps.guard.outputs.done != 'true' &&
          steps.find-issue.outputs.issue_number != '' &&
          steps.find-issue.outputs.needs_body_update == 'true'
        continue-on-error: true
        env:
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.issue_number }}
        run: |
          set -euo pipefail
          # 全体末尾の空白・改行を除去してから Closes #N を追記
          TRIMMED_BODY=$(printf '%s' "${PR_BODY}" | perl -0pe 's/\s*\z//')
          NEW_BODY=$(printf '%s\n\nCloses #%s' "${TRIMMED_BODY}" "${ISSUE_NUMBER}")
          gh pr edit "${PR_NUMBER}" --repo "${REPO}" --body "${NEW_BODY}"
          echo "✅ PR body に Closes #${ISSUE_NUMBER} を追記しました。"

      - name: Issue に PR リンクコメントを投稿（冪等化マーカーも PR に付与）
        if: >
          steps.check-copilot.outputs.is_copilot == 'true' &&
          steps.guard.outputs.done != 'true' &&
          steps.find-issue.outputs.issue_number != ''
        continue-on-error: true
        env:
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.issue_number }}
        run: |
          set -euo pipefail

          ISSUE_COMMENT=$(printf '🔗 **Copilot が PR を作成しました**: #%s\n\n> ℹ️ このコメントは `link-copilot-pr-to-issue.yml` によって自動投稿されました。' \
            "${PR_NUMBER}")
          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${REPO}" \
            --body "${ISSUE_COMMENT}"
          echo "✅ Issue #${ISSUE_NUMBER} にコメントを投稿しました。"

          # 冪等化マーカーを PR に投稿
          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "<!-- link-copilot-pr-to-issue-done -->"

      - name: Issue が特定できない場合の警告コメントを PR に投稿
        if: >
          steps.check-copilot.outputs.is_copilot == 'true' &&
          steps.guard.outputs.done != 'true' &&
          steps.find-issue.outputs.issue_number == ''
        continue-on-error: true
        run: |
          set -euo pipefail

          COMMENT=$(printf '%s\n\n## ⚠️ 元 Issue を特定できませんでした\n\n%s\n\n%s' \
            '<!-- link-copilot-pr-to-issue-done -->' \
            '元 Issue を特定できませんでした。手動で `Closes #N` を PR body に追記してください。' \
            '> ℹ️ このコメントは `link-copilot-pr-to-issue.yml` によって自動投稿されました。')

          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "${COMMENT}"
          echo "⚠️ 警告コメントを PR #${PR_NUMBER} に投稿しました。"
