name: Original Docs Review Orchestrator

on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: ''
      issue_number:
        required: true
        type: string
      event_action:
        required: false
        type: string
        default: ''
      label_name:
        required: false
        type: string
        default: ''
      issue_labels:
        required: false
        type: string
        default: '[]'
      runner_type:
        description: "実行 Runner 種別: github-hosted | self-hosted"
        required: false
        type: string
        default: "github-hosted"

permissions:
  issues: write
  contents: read

jobs:
  orchestrate:
    runs-on: ${{ fromJSON(inputs.runner_type == 'self-hosted' && '["self-hosted","linux","x64","aca"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 360
    concurrency:
      group: aqod-orchestrator-${{ inputs.issue_number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}
      LABEL_ORIGINAL_DOCS_REVIEW: original-docs-review

    steps:
      - name: 実行ゲートチェック
        id: gate
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EVENT_ACTION: ${{ inputs.event_action }}
          LABEL_NAME: "${{ inputs.label_name }}"
        run: |
          set -euo pipefail

          ISSUE_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}")

          ISSUE_TITLE=$(echo "${ISSUE_RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          ISSUE_LABELS=$(echo "${ISSUE_RESPONSE}" | python3 -c "import sys,json; print(json.dumps([l['name'] for l in json.load(sys.stdin).get('labels',[])]))")
          export ISSUE_TITLE

          if [[ "${EVENT_ACTION}" == "labeled" ]] && [[ "${LABEL_NAME}" != "${LABEL_ORIGINAL_DOCS_REVIEW}" ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_aqod=$(ISSUE_LABELS="${ISSUE_LABELS}" \
            LABEL_ORIGINAL_DOCS_REVIEW="${LABEL_ORIGINAL_DOCS_REVIEW}" \
            python3 - <<'PY'
          import os, json
          labels = json.loads(os.environ.get("ISSUE_LABELS", "[]"))
          trigger_label = os.environ.get("LABEL_ORIGINAL_DOCS_REVIEW", "original-docs-review")
          print("true" if trigger_label in labels else "false")
          PY
          )
          if [[ "${has_aqod}" != "true" ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_init=$(ISSUE_LABELS="${ISSUE_LABELS}" python3 - <<'PY'
          import os, json
          labels = json.loads(os.environ.get("ISSUE_LABELS", "[]"))
          skip_labels = {'aqod:initialized', 'aqod:ready', 'aqod:running', 'aqod:done', 'aqod:blocked'}
          print('true' if any(l in skip_labels for l in labels) else 'false')
          PY
          )
          if [[ "${has_init}" == "true" ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=initialize" >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: ラベル bootstrap
        if: steps.gate.outputs.mode == 'initialize'
        run: |
          set -euo pipefail
          create_label() {
            local name="$1"
            local color="$2"
            local desc="$3"
            curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/labels" \
              -d "{\"name\":\"${name}\",\"color\":\"${color}\",\"description\":\"${desc}\"}" >/dev/null || true
          }
          create_label "${LABEL_ORIGINAL_DOCS_REVIEW}" "0E8A16" "run original docs review workflow (cross-analysis questionnaire generation)"
          create_label "aqod:initialized" "C5DEF5" ""
          create_label "aqod:ready" "0075CA" ""
          create_label "aqod:running" "E4E669" ""
          create_label "aqod:done" "0E8A16" ""
          create_label "aqod:blocked" "D73A4A" ""
          create_label "auto-context-review" "1D76DB" "auto context review trigger for copilot-auto-review workflow"
          create_label "auto-qa" "BFD4F2" "auto qa trigger for copilot-auto-qa workflow"
          create_label "auto-approve-ready" "1D76DB" "Ready for auto-approve and auto-merge"

      - name: 即時 aqod:initialized 付与
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail
          curl -sf -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/labels" \
            -d '{"labels":["aqod:initialized"]}' >/dev/null

      - name: Checkout repository
        if: steps.gate.outputs.mode == 'initialize'
        uses: actions/checkout@v4

      - name: Step Issue 生成
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail
          source "${GITHUB_WORKSPACE}/.github/scripts/akm-common.sh"
          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/assign-copilot.sh"
          ISSUE_BODY=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          export ISSUE_BODY

          PARSED=$(python3 - <<'PYEOF'
          import os, re, json
          body = os.environ.get("ISSUE_BODY", "")
          def section(name):
              m = re.search(rf"###\s*{re.escape(name)}\s*\n+(.*?)(?=\n###|\Z)", body, re.DOTALL)
              if not m:
                  return ""
              v = m.group(1).strip()
              return "" if v == "_No response_" else v

          def first_line(name, default=""):
              text = section(name)
              if not text:
                  return default
              lines = [ln.strip() for ln in text.splitlines() if ln.strip()]
              return lines[0] if lines else default

          target_scope = first_line("対象スコープ", "original-docs/")
          depth = first_line("分析の深さ", "standard")
          focus_areas = first_line("重点観点（任意）", "")
          model = first_line("使用するモデル", "Auto")
          branch = first_line("対象ブランチ", "main")
          if not branch or branch == "_No response_":
              branch = "main"
          qa_section = section("質問票設定")
          auto_qa = bool(qa_section and re.search(r"-\s*\[[xX]\]", qa_section))
          review_section = section("レビュー設定")
          auto_context_review = bool(review_section and re.search(r"-\s*\[[xX]\]", review_section))
          sec = section("PR完全自動化設定")
          auto_merge = bool(re.search(r"-\s*\[[xX]\]", sec))

          # 自己改善設定
          si_section = section("自己改善ループ設定")
          enable_self_improve = bool(si_section and re.search(r"-\s*\[[xX]\]", si_section))
          si_max_iter_raw = first_line("自己改善 最大イテレーション数", "3 (デフォルト)")
          n = re.match(r"(\d+)", si_max_iter_raw.strip())
          self_improve_max_iterations = n.group(1) if n else "3"
          si_qual_raw = first_line("自己改善 品質スコア閾値", "80 (デフォルト)")
          q = re.match(r"(\d+)", si_qual_raw.strip())
          self_improve_quality_threshold = q.group(1) if q else "80"

          print(json.dumps({
              "target_scope": target_scope or "original-docs/",
              "depth": depth if depth in ("standard", "lightweight") else "standard",
              "focus_areas": focus_areas,
              "model": model or "Auto",
              "branch": branch,
              "auto_qa": auto_qa,
              "auto_context_review": auto_context_review,
              "auto_merge": auto_merge,
              "enable_self_improve": enable_self_improve,
              "self_improve_max_iterations": self_improve_max_iterations,
              "self_improve_quality_threshold": self_improve_quality_threshold,
          }, ensure_ascii=False))
          PYEOF
          )

          TARGET_SCOPE=$(echo "${PARSED}" | python3 -c "import sys,json; print(json.load(sys.stdin)['target_scope'])")
          DEPTH=$(echo "${PARSED}" | python3 -c "import sys,json; print(json.load(sys.stdin)['depth'])")
          FOCUS_AREAS=$(echo "${PARSED}" | python3 -c "import sys,json; print(json.load(sys.stdin)['focus_areas'])")
          MODEL=$(echo "${PARSED}" | python3 -c "import sys,json; print(json.load(sys.stdin)['model'])")
          BRANCH=$(echo "${PARSED}" | python3 -c "import sys,json; print(json.load(sys.stdin)['branch'])")
          AUTO_QA=$(echo "${PARSED}" | python3 -c "import sys,json; print('true' if json.load(sys.stdin)['auto_qa'] else 'false')")
          AUTO_CONTEXT_REVIEW=$(echo "${PARSED}" | python3 -c "import sys,json; print('true' if json.load(sys.stdin).get('auto_context_review') else 'false')")
          AUTO_MERGE=$(echo "${PARSED}" | python3 -c "import sys,json; print('true' if json.load(sys.stdin)['auto_merge'] else 'false')")
          ENABLE_SELF_IMPROVE=$(echo "${PARSED}" | python3 -c "import sys,json; print('true' if json.load(sys.stdin)['enable_self_improve'] else 'false')")
          SELF_IMPROVE_MAX_ITER=$(echo "${PARSED}" | python3 -c "import sys,json; print(json.load(sys.stdin)['self_improve_max_iterations'])")
          SELF_IMPROVE_QUALITY_THRESHOLD=$(echo "${PARSED}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('self_improve_quality_threshold','80'))")
          MODEL_RAW=$(extract_model "${ISSUE_BODY}")
          SELECTED_MODEL=$(resolve_model "${MODEL_RAW}")
          REVIEW_MODEL_RAW=$(extract_review_model "${ISSUE_BODY}")
          SELECTED_REVIEW_MODEL=$(resolve_model "${REVIEW_MODEL_RAW}")
          QA_MODEL_RAW=$(extract_qa_model "${ISSUE_BODY}")
          SELECTED_QA_MODEL=$(resolve_model "${QA_MODEL_RAW}")
          export TARGET_SCOPE DEPTH FOCUS_AREAS MODEL BRANCH AUTO_QA AUTO_CONTEXT_REVIEW AUTO_MERGE ENABLE_SELF_IMPROVE SELF_IMPROVE_MAX_ITER SELF_IMPROVE_QUALITY_THRESHOLD

          # ---- Root Issue body に branch / auto-qa / auto-merge / self-improve タグを埋め込み ----
          _ROOT_TAG_FILE=$(mktemp)
          python3 - "${BRANCH}" "${AUTO_QA}" "${AUTO_CONTEXT_REVIEW}" "${AUTO_MERGE}" "${ENABLE_SELF_IMPROVE}" "${SELF_IMPROVE_MAX_ITER}" "${SELF_IMPROVE_QUALITY_THRESHOLD}" "${_ROOT_TAG_FILE}" <<'PYTAGS'
          import sys, os, re, json
          body = os.environ.get("ISSUE_BODY", "")
          branch = sys.argv[1]
          auto_qa = sys.argv[2]
          auto_context_review = sys.argv[3]
          auto_merge = sys.argv[4]
          enable_si = sys.argv[5]
          si_max_iter = sys.argv[6]
          si_quality_threshold = sys.argv[7]
          output_file = sys.argv[8]
          tags = [
              ("branch", branch),
              ("auto-qa", auto_qa),
              ("auto-context-review", auto_context_review),
              ("auto-merge", auto_merge),
              ("enable-self-improve", enable_si),
              ("self-improve-max-iterations", si_max_iter),
              ("self-improve-quality-threshold", si_quality_threshold),
          ]
          for key, value in tags:
              tag = f"<!-- {key}: {value} -->"
              pat = re.compile(rf"<!--\s*{re.escape(key)}\s*:[^>]*-->")
              if pat.search(body):
                  body = pat.sub(tag, body, count=1)
              else:
                  body = body.rstrip() + "\n" + tag + "\n"
          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump({'body': body}, f, ensure_ascii=False)
          PYTAGS
          curl -sf -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            -d "$(cat "${_ROOT_TAG_FILE}")" > /dev/null \
            && echo "Root Issue body に branch / auto-qa / auto-merge / self-improve タグを埋め込みました。" \
            || echo "WARNING: Root Issue body のタグ埋め込みに失敗しました。" >&2
          rm -f "${_ROOT_TAG_FILE}"

          if [[ "${AUTO_QA}" == "true" ]]; then
            add_label "${ISSUE_NUMBER}" "auto-qa"
            echo "Root Issue #${ISSUE_NUMBER} に auto-qa ラベルを付与しました。"
          fi

          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
            add_label "${ISSUE_NUMBER}" "auto-context-review"
            echo "Root Issue #${ISSUE_NUMBER} に auto-context-review ラベルを付与しました。"
          fi
          if [[ -n "${SELECTED_MODEL}" ]]; then
            add_label "${ISSUE_NUMBER}" "model/${SELECTED_MODEL}" || true
          fi
          if [[ -n "${SELECTED_REVIEW_MODEL}" ]]; then
            add_label "${ISSUE_NUMBER}" "review-model/${SELECTED_REVIEW_MODEL}" || true
          fi
          if [[ -n "${SELECTED_QA_MODEL}" ]]; then
            add_label "${ISSUE_NUMBER}" "qa-model/${SELECTED_QA_MODEL}" || true
          fi

          STEP_TITLE="[AQOD] original-docs 質問票生成"
          STEP_BODY=$(python3 - <<'PYEOF'
          from pathlib import Path
          import os
          issue_num = os.environ["ISSUE_NUMBER"]
          target_scope = os.environ["TARGET_SCOPE"]
          depth = os.environ["DEPTH"]
          focus_areas = os.environ["FOCUS_AREAS"]
          model = os.environ["MODEL"]
          auto_merge = os.environ["AUTO_MERGE"]
          auto_context_review = os.environ.get("AUTO_CONTEXT_REVIEW", "false")
          template = Path(".github/scripts/templates/aqod/step-1.md").read_text(encoding="utf-8")
          root_ref = "\n".join([
              f"<!-- root-issue: #{issue_num} -->",
              f"<!-- branch: {os.environ.get('BRANCH', 'main')} -->",
              "<!-- auto-review: true -->",
              f"<!-- auto-context-review: {auto_context_review} -->",
              f"<!-- auto-qa: {os.environ.get('AUTO_QA', 'false')} -->",
              "<!-- mode: original-docs-questionnaire -->",
          ])
          additional = (
              "\n\n## 追加コンテキストの参照\n\n"
              "以下が存在する場合は必ず参照してください。存在しない情報は推測せず、必要に応じて不足事項として記録してください。\n\n"
              "- `qa/` 配下の、この Root Issue / Step / PR に関連する QA 回答\n"
              "- この PR または関連 Issue のレビュー指摘\n"
              "- Self-Improve 結果または改善計画（存在する場合のみ）\n"
              "- `## 入力` に記載された前 Step 成果物\n"
              "- 追加で注入された既存成果物・reuse context\n\n"
              "参照した QA / Review / Self-Improve の内容は、成果物へ反映してください。反映しない場合は理由を完了コメントまたは成果物内に記録してください。"
              f"\n\n## 追加コメント\n- model: {model}\n- auto-merge: {auto_merge}"
          )
          body = (template
              .replace("{root_ref}", root_ref)
              .replace("{aqod_target_scope}", target_scope)
              .replace("{aqod_depth}", depth)
              .replace("{aqod_focus_areas}", focus_areas)
              .replace("{additional_section}", additional)
          )
          print(body)
          PYEOF
          )

          LABELS='["aqod:ready"]'
          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
            LABELS=$(echo "${LABELS}" | jq -c '. + ["auto-context-review"]')
          fi
          if [[ "${AUTO_QA}" == "true" ]]; then
            LABELS=$(echo "${LABELS}" | jq -c '. + ["auto-qa"]')
          fi
          if [[ "${AUTO_MERGE}" == "true" ]]; then
            LABELS=$(echo "${LABELS}" | jq -c '. + ["auto-approve-ready"]')
          fi
          if [[ -n "${SELECTED_MODEL}" ]]; then
            LABELS=$(echo "${LABELS}" | jq -c --arg ml "model/${SELECTED_MODEL}" '. + [$ml]')
          fi
          if [[ -n "${SELECTED_REVIEW_MODEL}" ]]; then
            LABELS=$(echo "${LABELS}" | jq -c --arg rml "review-model/${SELECTED_REVIEW_MODEL}" '. + [$rml]')
          fi
          if [[ -n "${SELECTED_QA_MODEL}" ]]; then
            LABELS=$(echo "${LABELS}" | jq -c --arg qml "qa-model/${SELECTED_QA_MODEL}" '. + [$qml]')
          fi

          STEP_RESPONSE=$(create_issue "${STEP_TITLE}" "${STEP_BODY}" "${LABELS}")
          STEP_NUM=$(echo "${STEP_RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('number',''))")
          STEP_NODE_ID=$(echo "${STEP_RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('node_id',''))")

          if [[ -n "${STEP_NODE_ID}" ]]; then
            link_sub_issue "${ISSUE_NUMBER}" "${STEP_NODE_ID}" || true
          fi

          assign_copilot "${STEP_NUM}" "QA-DocConsistency" "${BRANCH:-main}" "mode: original-docs-questionnaire" || true
          post_comment "${ISSUE_NUMBER}" "✅ AQOD Step Issue を作成しました: #${STEP_NUM}"

  self-improve:
    needs: orchestrate
    if: needs.orchestrate.result == 'success'
    runs-on: ${{ fromJSON(inputs.runner_type == 'self-hosted' && '["self-hosted","linux","x64","aca"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Parse Self-Improve settings
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          body=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" --jq '.body // ""' 2>/dev/null || true)
          # HTML コメント形式（workflow init で埋め込まれた場合）を優先
          enable=$(printf '%s' "${body}" | sed -n 's/^.*<!-- enable-self-improve: *\([^>]*\) *-->.*$/\1/p' | head -1 | tr '[:upper:]' '[:lower:]' | xargs || true)
          max_iter=$(printf '%s' "${body}" | sed -n 's/^.*<!-- self-improve-max-iterations: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          branch=$(printf "%s" "${body}" | sed -n 's/^.*<!-- branch: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          quality_threshold=$(printf '%s' "${body}" | sed -n 's/^.*<!-- self-improve-quality-threshold: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          # フォールバック: Issue Form Markdown 形式
          if [[ -z "${enable}" ]]; then
            enable=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善ループ設定.*?\n(.*?)(?=###|\Z)', body, re.DOTALL)
          print('true' if (m and re.search(r'-\s*\[[xX]\]', m.group(1))) else 'false')
          " 2>/dev/null || echo "false")
          fi
          if [[ -z "${max_iter}" ]]; then
            max_iter=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善\s*最大イテレーション数.*?\n+(.+)', body)
          if m:
              n = re.match(r'(\d+)', m.group(1).strip())
              print(n.group(1) if n else '3')
          else:
              print('3')
          " 2>/dev/null || echo "3")
          fi
          if [[ -z "${quality_threshold}" ]]; then
            quality_threshold=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善\s*品質スコア閾値.*?\n+(.+)', body)
          if m:
              n = re.match(r'(\d+)', m.group(1).strip())
              print(n.group(1) if n else '80')
          else:
              print('80')
          " 2>/dev/null || echo "80")
          fi
          if [[ -z "${branch}" ]]; then
            branch=$(printf "%s" "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*対象ブランチ.*?\n+(.+)', body)
          if m:
              val = m.group(1).strip()
              print(val if val and val != '_No response_' else 'main')
          else:
              print('main')
          " 2>/dev/null || echo "main")
          fi
          [[ -z "${enable}" ]] && enable="false"
          [[ -z "${max_iter}" ]] && max_iter="3"
          [[ -z "${quality_threshold}" ]] && quality_threshold="80"
          echo "enable=${enable}" >> "$GITHUB_OUTPUT"
          echo "max_iter=${max_iter}" >> "$GITHUB_OUTPUT"
          echo "quality_threshold=${quality_threshold}" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          ref: ${{ steps.parse.outputs.branch }}

      - name: Skip Self-Improve when branch is missing
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch == ''
        run: |
          echo "Skip Self-Improve: issue body に branch 情報がありません。"
      - uses: actions/setup-python@v5
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          node-version: "20"
      - name: Install dependencies
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        run: |
          pip install ruff pytest pytest-cov
          npm install -g markdownlint-cli
      - name: Run Self-Improve
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        env:
          MAX_ITERATIONS: ${{ steps.parse.outputs.max_iter }}
          QUALITY_THRESHOLD: ${{ steps.parse.outputs.quality_threshold }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import os
          from hve.self_improve import run_improvement_loop
          from hve.config import SDKConfig
          config = SDKConfig.from_env()
          config.auto_self_improve = True
          config.self_improve_scope = "workflow"
          config.self_improve_max_iterations = int(os.environ.get('MAX_ITERATIONS', '3'))
          config.self_improve_quality_threshold = int(os.environ.get('QUALITY_THRESHOLD', '80'))
          result = run_improvement_loop(config=config, repo_root='.')
          print(f'Self-Improve: {result["stopped_reason"]} (score={result["final_score"]})')
