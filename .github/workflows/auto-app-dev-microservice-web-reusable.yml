            # ---- Step.3.0T (TDD RED: UI テスト仕様書) ----
            BODY_S30T=$(printf '%s\n## 目的\nTDD RED フェーズ: 画面定義書・テスト戦略書に基づき、画面用 TDD テスト仕様書を生成する（APP-ID 指定時はスコープ内の画面のみ）。\n\n## 追加要件\n- UI テスト仕様書には **Jest 単体テスト** と **Playwright E2E テスト** の両カテゴリを含めること\n\n## 入力\n- `docs/catalog/test-strategy.md`\n- `docs/catalog/service-catalog-matrix.md`\n- `docs/screen/{screenId}-*.md`\n- `docs/catalog/data-model.md`\n- `docs/catalog/domain-analytics.md`\n- `docs/catalog/app-catalog.md`（アプリケーション一覧 — 対象 APP-ID のスコープ判定根拠。存在しない場合はスコープ絞り込みなしで全件処理）\n\n## 出力\n- `docs/test-specs/{screenId}-test-spec.md`（画面別テスト仕様書）\n\n## Custom Agent\n`Arch-TDD-TestSpec` を使用\n\n## 依存\n- Step.2.5（Azure Compute Deploy）が `asdw-web:done` であること\n- `docs/catalog/test-strategy.md` が存在すること\n\n## 完了条件\n- `docs/test-specs/` 配下に画面別テスト仕様書が生成されている\n- 生成したテスト仕様書へのリンクを Issue コメントに記載している\n- 完了時に自身に `asdw-web:done` ラベルを付与すること%s%s' \
