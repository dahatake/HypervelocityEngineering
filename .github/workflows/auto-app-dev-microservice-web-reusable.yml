name: "ASDW-WEB: Web App Dev & Deploy (Reusable)"

# auto-app-dev-microservice-web 系ラベル付き Issue の opened/labeled/closed イベントで起動
#
# 設計メモ:
#   - Issue Template の labels: でラベルを付与した場合、GitHub は issues.labeled イベントを
#     発火せず issues.opened のみを発火する（GitHub Community Discussion #26753）。
#   - そのため opened イベントも監視し、ジョブレベル if で対象ラベルを持つ Issue のみ実行する。
#   - opened イベント時は github.event.label が null のため LABEL_NAME は空文字列になる。
#   - 既存の冪等化ガード（asdw-web:initialized チェック）により、opened + labeled が同時発火しても安全。
on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: ''
      issue_number:
        required: true
        type: string
      event_action:
        required: false
        type: string
        default: ''
      label_name:
        required: false
        type: string
        default: ''
      issue_labels:
        required: false
        type: string
        default: '[]'
      enable_agentic_retrieval:
        required: false
        type: string
        default: 'auto'
      agentic_data_source_modes:
        required: false
        type: string
        default: 'indexer'
      foundry_mcp_integration:
        required: false
        type: string
        default: 'true'
      agentic_data_sources_hint:
        required: false
        type: string
        default: ''
      agentic_existing_design_diff_only:
        required: false
        type: string
        default: 'false'
      foundry_sku_fallback_policy:
        required: false
        type: string
        default: 'standard_allowed'
      runner_type:
        description: "実行 Runner 種別: github-hosted | self-hosted"
        required: false
        type: string
        default: "github-hosted"

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ${{ fromJSON(inputs.runner_type == 'self-hosted' && '["self-hosted","linux","x64","aca"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 360
    concurrency:
      group: asdw-web-orchestrator-${{ inputs.issue_number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}

    steps:
      # ----------------------------------------------------------------
      # 1. 実行ゲート: auto-app-dev-microservice-web 系ラベルあり + asdw-web:initialized なし
      # ----------------------------------------------------------------
      - name: 実行ゲートチェック
        id: gate
        env:
          ISSUE_LABELS: ${{ inputs.issue_labels }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EVENT_ACTION: ${{ inputs.event_action }}
          LABEL_NAME: "${{ inputs.label_name }}"
        run: |
          set -euo pipefail

          # Issue title を API 経由で安全に取得（YAML 展開問題を回避）
          ISSUE_TITLE=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          export ISSUE_TITLE

          # labeled イベントの処理
          if [[ "${EVENT_ACTION}" == "labeled" ]]; then
            if [[ "${LABEL_NAME}" == "asdw-web:done" ]]; then
              echo "mode=state_transition" >> "$GITHUB_OUTPUT"
              echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
              exit 0
            elif [[ "${LABEL_NAME}" == "auto-app-dev-microservice" || "${LABEL_NAME}" == "auto-app-dev-microservice-web" ]]; then
              # auto-app-dev-microservice-web 系ラベルが後から付与された場合:
              # 下の has_asdw / has_init チェックが未初期化かどうかを判定し、未初期化なら initialize に進む。
              # 既に asdw-web:initialized 済みの場合は has_init チェックで skip になる。
              echo "auto-app-dev-microservice-web 系ラベルの labeled イベント: initialize ゲートチェックへ進みます。"
            else
              echo "asdw-web:done / auto-app-dev-microservice 系以外の labeled イベント（${LABEL_NAME}）。スキップ。"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # closed イベントの処理
          if [[ "${EVENT_ACTION}" == "closed" ]]; then
            # [ASDW-WEB] Sub Issue のみ処理
            if [[ "${ISSUE_TITLE}" =~ ^\[ASDW-WEB\] ]]; then
              # ---- ラベル一覧はイベントペイロードのものを使用（API 呼び出しを削減） ----
              # 既に asdw-web:done がついている場合は closed イベントで再判定に進む
              has_done=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          print('true' if 'asdw-web:done' in labels else 'false')
          PY
              )
              if [[ "${has_done}" == "true" ]]; then
                # asdw-web:done labeled 時は Issue 未クローズのため自動クローズ判定が失敗する。
                # closed イベントで再度コンテナ自動クローズ判定のみ実行する。
                echo "asdw-web:done ラベル済み + closed イベント: コンテナ自動クローズ判定のみ実行。"
                echo "mode=container_close_check" >> "$GITHUB_OUTPUT"
                echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              # asdw-web:done がない場合は closed イベントから直接 state_transition を起動
              echo "mode=state_transition" >> "$GITHUB_OUTPUT"
              echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "closed イベント: [ASDW-WEB] Sub Issue 以外のためスキップ。"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # [ASDW-WEB] プレフィックスを持つ Sub Issue は初期化をスキップ
          # （Sub Issue の opened イベントによる再帰的な初期化を防止）
          if [[ "${ISSUE_TITLE}" =~ ^\[ASDW-WEB\] ]]; then
            echo "[ASDW-WEB] Sub Issue のため初期化対象外。スキップ。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ---- リアルタイムにラベル一覧を API 経由で取得（payload はスナップショットのため） ----
          ISSUE_LABELS=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.dumps([l['name'] for l in json.load(sys.stdin).get('labels',[])]))")
          echo "リアルタイムラベル: ${ISSUE_LABELS}"
          # auto-app-dev-microservice-web 系ラベルを持つか確認
          has_asdw=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          triggers = {'auto-app-dev-microservice', 'auto-app-dev-microservice-web'}
          print('true' if any(l in triggers for l in labels) else 'false')
          PY
          )

          if [[ "${has_asdw}" != "true" ]]; then
            echo "auto-app-dev-microservice-web 系ラベルなし。スキップ。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # asdw-web:initialized / asdw-web:ready / asdw-web:running / asdw-web:done / asdw-web:blocked
          # のいずれかを持つ場合はスキップ（冪等化・Sub Issue への誤再初期化防止）
          has_init=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          skip_labels = {'asdw-web:initialized', 'asdw-web:ready', 'asdw-web:running', 'asdw-web:done', 'asdw-web:blocked', 'asdw-web:qa-ready'}
          print('true' if any(l in skip_labels for l in labels) else 'false')
          PY
          )

          if [[ "${has_init}" == "true" ]]; then
            echo "asdw-web:* ラベル済み。スキップ（冪等化）。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=initialize" >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: ゲート結果のデバッグ出力
        if: always()
        env:
          GATE_MODE: ${{ steps.gate.outputs.mode }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EVENT_ACTION: ${{ inputs.event_action }}
        run: |
          echo "::notice::ゲート判定結果: mode=${GATE_MODE}, event=${EVENT_ACTION}, issue=#${ISSUE_NUMBER}"
          if [[ "${GATE_MODE}" == "skip" ]]; then
            echo "::notice::Issue #${ISSUE_NUMBER} のゲートチェックは skip でした（event: ${EVENT_ACTION}）"
          fi

      # ----------------------------------------------------------------
      # 2. ラベル bootstrap
      # ----------------------------------------------------------------
      - name: ラベル bootstrap
        if: steps.gate.outputs.mode == 'initialize'
        run: |
          set -euo pipefail

          # ラベル作成関数（インライン定義: checkout 前でも動作可能にするため）
          create_label() {
            local name="$1" color="$2" desc="${3:-}"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/labels" \
              -d "{\"name\":\"${name}\",\"color\":\"${color}\",\"description\":\"${desc}\"}")
            case "${http_code}" in
              201) echo "ラベル作成: ${name}" ;;
              422) echo "ラベル既存（スキップ）: ${name}" ;;
              *)   echo "ラベル作成エラー: ${name} HTTP ${http_code}" ;;
            esac
            sleep 1
          }

          create_label "auto-app-dev-microservice-web" "0E8A16" "Web App Dev & Deploy ワークフロートリガー"
                    create_label "auto-app-dev-microservice"         "1D76DB" "run AI agent dev and deploy workflow (AAGD)"
          create_label "asdw-web:initialized"           "C5DEF5" ""
          create_label "asdw-web:ready"                 "0075CA" ""
          create_label "asdw-web:running"               "E4E669" ""
          create_label "asdw-web:done"                  "0E8A16" ""
          create_label "asdw-web:blocked"               "D73A4A" ""
          create_label "asdw-web:test-failed"           "EE0701" "test execution failed (TDD RED not confirmed or GREEN not reached)"
          create_label "auto-context-review"       "1D76DB" "auto context review trigger for copilot-auto-review workflow"
          create_label "auto-qa"                    "BFD4F2" "auto qa trigger for copilot-auto-qa workflow"
          create_label "auto-approve-ready"          "1D76DB" "Ready for auto-approve and auto-merge"

      # ----------------------------------------------------------------
      # 2.5. 即時 asdw-web:initialized 付与（二重実行防止）
      # ----------------------------------------------------------------
      - name: 即時 asdw-web:initialized 付与（二重実行防止）
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail
          max_retries=5
          attempt=1
          http_code=""
          while (( attempt <= max_retries )); do
            http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/labels" \
              -d '{"labels":["asdw-web:initialized"]}')
            if [[ "${http_code}" =~ ^2 ]]; then
              echo "asdw-web:initialized を Issue #${ISSUE_NUMBER} に付与しました。（HTTP ${http_code}）"
              break
            fi
            if (( attempt == max_retries )); then
              echo "ERROR: asdw-web:initialized の付与に失敗しました。HTTP ${http_code}（試行回数: ${attempt}/${max_retries}）" >&2
              exit 1
            fi
            echo "WARN: asdw-web:initialized の付与に失敗しました。HTTP ${http_code}（試行回数: ${attempt}/${max_retries}）。リトライします..." >&2
            sleep $(( 2 ** (attempt - 1) ))
            attempt=$(( attempt + 1 ))
          done

      # ----------------------------------------------------------------
      # 2.6. リポジトリ checkout（state_transition で auto-close.sh を利用するため）
      # ----------------------------------------------------------------
      - name: Checkout repository
        if: steps.gate.outputs.mode != 'skip'
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 3. Issue body パース & Step Issue 生成
      # ----------------------------------------------------------------
      - name: 成果物ディレクトリの事前作成
        if: steps.gate.outputs.mode == 'initialize'
        run: |
          # 成果物ディレクトリの事前作成
          mkdir -p docs/catalog
          mkdir -p docs/batch
          mkdir -p docs/batch/jobs
          mkdir -p docs/services
          mkdir -p docs/screen
          mkdir -p docs/test-specs
          mkdir -p docs/agent
          mkdir -p docs/azure
          mkdir -p docs/usecase

      - name: Issue 初期化とStep Issue 生成
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
          INPUT_ENABLE_AGENTIC_RETRIEVAL: ${{ inputs.enable_agentic_retrieval }}
          INPUT_AGENTIC_DATA_SOURCE_MODES: ${{ inputs.agentic_data_source_modes }}
          INPUT_FOUNDRY_MCP_INTEGRATION: ${{ inputs.foundry_mcp_integration }}
          INPUT_AGENTIC_DATA_SOURCES_HINT: ${{ inputs.agentic_data_sources_hint }}
          INPUT_AGENTIC_EXISTING_DESIGN_DIFF_ONLY: ${{ inputs.agentic_existing_design_diff_only }}
          INPUT_FOUNDRY_SKU_FALLBACK_POLICY: ${{ inputs.foundry_sku_fallback_policy }}
        run: |
          set -euo pipefail

          # Issue body を API 経由で安全に取得（YAML 展開問題を回避）
          ISSUE_BODY=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          export ISSUE_BODY

          if [[ -z "${COPILOT_PAT}" ]]; then
            echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインは全てスキップされます。" >&2
          fi

          ROOT_ISSUE="${ISSUE_NUMBER}"

          # ---- ユーティリティ関数 ----

          # リトライ付き curl
          api_call() {
            local method="$1"; shift
            local url="$1"; shift
            local data="${1:-}"
            local max_retry=5
            local wait=1
            local http_code response body

            for i in $(seq 1 "${max_retry}"); do
              if [[ -n "${data}" ]]; then
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  -H "Content-Type: application/json" \
                  "${url}" \
                  -d "${data}")
              else
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${url}")
              fi
              http_code=$(echo "${response}" | tail -1)
              body=$(echo "${response}" | head -n -1)
              if [[ "${http_code}" =~ ^2 ]]; then
                echo "${body}"
                return 0
              fi
              echo "API エラー: HTTP ${http_code}、${wait}秒後にリトライ (${i}/${max_retry})" >&2
              sleep "${wait}"
              wait=$((wait * 2))
            done
            echo "API 呼び出し失敗: ${method} ${url}" >&2
            return 1
          }

          # Issue 作成
          create_issue() {
            local title="$1"
            local body="$2"
            local labels_json="$3"
            local data
            data=$(python3 - "${title}" "${body}" "${labels_json}" <<'PY'
          import json, sys
          title = sys.argv[1]
          body  = sys.argv[2]
          labels = json.loads(sys.argv[3])
          print(json.dumps({'title': title, 'body': body, 'labels': labels}))
          PY
          )
            api_call POST "https://api.github.com/repos/${REPO}/issues" "${data}"
          }

          # Sub Issue 紐付け
          link_sub_issue() {
            local parent_num="$1"
            local child_id="$2"
            local data="{\"sub_issue_id\":${child_id}}"
            if ! api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${parent_num}/sub_issues" \
              "${data}" > /dev/null 2>&1; then
              echo "::warning::link_sub_issue 失敗: parent=#${parent_num} child_id=${child_id}"
            fi
            sleep 1
          }

          # ラベル付与
          add_label() {
            local issue_num="$1"
            local label="$2"
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/labels" \
              "{\"labels\":[\"${label}\"]}" > /dev/null
            sleep 1
          }

          # アサイン
          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/assign-copilot.sh"

          # コメント投稿
          post_comment() {
            local issue_num="$1"
            local comment_body="$2"
            local data
            data=$(python3 -c "import sys,json; print(json.dumps({'body': sys.argv[1]}))" "${comment_body}")
            if ! api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/comments" \
              "${data}" > /dev/null; then
              echo "::warning::post_comment 失敗: issue_num=${issue_num}"
            fi
            sleep 1
          }

          # Issue body から Custom Agent 名を抽出
          extract_custom_agent() {
            local body="$1"
            echo "${body}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'## Custom Agent\s*\n\s*`([^`]+)`', body)
          print(m.group(1) if m else '')
          PY
          }

          # ---- Issue body パース ----
          PARSED=$(python3 - <<'PYEOF'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")

          # ブランチ名抽出（input フォームの値）
          branch = "main"
          m = re.search(r"###\s*対象ブランチ\s*\n+(.+)", body)
          if m:
              branch = m.group(1).strip()
              if not branch or branch == "_No response_":
                  branch = "main"

          # リソースグループ名抽出
          resource_group = ""
          m = re.search(r"###\s*リソースグループ名\s*\n+(.+)", body)
          if m:
              resource_group = m.group(1).strip()
              if resource_group == "_No response_":
                  resource_group = ""

          # 実行するステップからスキップ対象を検出
          skip_steps = set()
          exec_section = re.search(
              r"###\s*実行するステップ\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if exec_section:
              section_text = exec_section.group(1)
              all_items = re.findall(
                  r"-\s*\[[ xX]\]\s*Step\.(\d+)",
                  section_text
              )
              all_steps = set(all_items)
              checked_items = re.findall(
                  r"-\s*\[[xX]\]\s*Step\.(\d+)",
                  section_text
              )
              exec_steps = set(checked_items)
              skip_steps = all_steps - exec_steps
              # チェックが1つもない場合は「全ステップ実行」とみなしてスキップなし
              if not exec_steps and all_steps:
                  skip_steps = set()

          # 追加コメント抽出
          additional_comment = ""
          m = re.search(r"###\s*追加コメント[^\n]*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              additional_comment = m.group(1).strip()
              if additional_comment == "_No response_":
                  additional_comment = ""

          # ユースケースID抽出
          usecase_id = ""
          m = re.search(r"###\s*ユースケースID\s*\n+(.+)", body)
          if m:
              usecase_id = m.group(1).strip()
              if usecase_id == "_No response_":
                  usecase_id = ""

          # レビュー設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          # 後方互換: 旧形式「スキップする」はロジック反転（未チェック → 有効）
          auto_context_review = False
          review_section = re.search(
              r"###\s*レビュー設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if review_section:
              section_text = review_section.group(1)
              if re.search(r"スキップする", section_text):
                  # 旧形式（後方互換）: 未チェック = スキップしない = 有効
                  auto_context_review = not bool(re.search(r"-\s*\[[xX]\]", section_text))
              else:
                  # 新形式: チェック → 有効
                  auto_context_review = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # 質問票設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          # 後方互換: 旧形式「スキップする」はロジック反転（未チェック → 有効）
          auto_qa = False
          qa_section = re.search(
              r"###\s*質問票設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if qa_section:
              section_text = qa_section.group(1)
              if re.search(r"スキップする", section_text):
                  # 旧形式（後方互換）: 未チェック = スキップしない = 有効
                  auto_qa = not bool(re.search(r"-\s*\[[xX]\]", section_text))
              else:
                  # 新形式: チェック → 有効
                  auto_qa = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # PR完全自動化設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          auto_merge = False
          merge_section = re.search(
              r"###\s*PR完全自動化設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if merge_section:
              section_text = merge_section.group(1)
              auto_merge = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # APP-ID 抽出（複数 APP-ID に対応：カンマ区切りで分割・正規化）
          app_ids_raw = ""
          m = re.search(r"###\s*対象アプリケーション.*?\n+(.+)", body)
          if m:
              app_ids_raw = m.group(1).strip()
              if app_ids_raw == "_No response_":
                  app_ids_raw = ""

          # カンマ区切りで分割し、空要素を除去
          app_ids_list = [s.strip() for s in app_ids_raw.split(",") if s.strip()] if app_ids_raw else []
          # 後方互換: 単一 APP-ID の場合は app_id にも設定
          app_id = app_ids_list[0] if len(app_ids_list) == 1 else ""

          # TDD GREEN リトライ最大回数
          tdd_max_retries = "5"
          m_tdd = re.search(r"###\s*TDD GREEN リトライ最大回数\s*\n+([^\n]+)", body)
          if m_tdd:
              raw_tdd = m_tdd.group(1).strip()
              nm_tdd = re.search(r'\d+', raw_tdd)
              tdd_max_retries = nm_tdd.group() if nm_tdd else "5"

          # 自己改善設定
          enable_self_improve = False
          si_section = re.search(r"###\s*自己改善ループ設定\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
          if si_section:
              enable_self_improve = bool(re.search(r"-\s*\[[xX]\]", si_section.group(1)))

          # Remote MCP Server 実装オプション: デフォルト True（後方互換）
          create_remote_mcp_server = True
          mcp_match = re.search(
              r"###\s*Remote MCP Server 実装\s*\n(.*?)(?=###|\Z)",
              body,
              re.DOTALL,
          )
          if mcp_match:
              value = mcp_match.group(1).strip()
              if "作成しない" in value:
                  create_remote_mcp_server = False
              elif "作成する" in value:
                  create_remote_mcp_server = True

          self_improve_max_iterations = "3"
          m = re.search(r"###\s*自己改善\s*最大イテレーション数.*?\n+(.+)", body)
          if m:
              val = m.group(1).strip()
              n = re.match(r"(\d+)", val)
              if n:
                  self_improve_max_iterations = n.group(1)

          self_improve_quality_threshold = "80"
          q = re.search(r"###\s*自己改善\s*品質スコア閾値.*?\n+(.+)", body)
          if q:
              val = q.group(1).strip()
              n = re.match(r"(\d+)", val)
              if n:
                  self_improve_quality_threshold = n.group(1)

          result = {"branch": branch, "resource_group": resource_group, "skip_steps": list(skip_steps), "additional_comment": additional_comment, "usecase_id": usecase_id, "auto_context_review": auto_context_review, "auto_qa": auto_qa, "auto_merge": auto_merge, "app_ids": app_ids_list, "app_id": app_id, "tdd_max_retries": tdd_max_retries, "enable_self_improve": enable_self_improve, "self_improve_max_iterations": self_improve_max_iterations, "self_improve_quality_threshold": self_improve_quality_threshold, "create_remote_mcp_server": create_remote_mcp_server}
          print(json.dumps(result))
          PYEOF
          )

          BRANCH=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['branch'])")
          RESOURCE_GROUP=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['resource_group'])")
          SKIP_STEPS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(' '.join(d['skip_steps']))")
          ADDITIONAL_COMMENT=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['additional_comment'])")
          USECASE_ID=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('usecase_id',''))")
          AUTO_CONTEXT_REVIEW=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_context_review') else 'false')")
          AUTO_QA=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_qa') else 'false')")
          AUTO_MERGE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_merge') else 'false')")
          ENABLE_SELF_IMPROVE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('enable_self_improve') else 'false')")
          SELF_IMPROVE_MAX_ITER=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('self_improve_max_iterations','3'))")
          SELF_IMPROVE_QUALITY_THRESHOLD=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('self_improve_quality_threshold','80'))")
          CREATE_REMOTE_MCP_SERVER=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('create_remote_mcp_server', True) else 'false')")
          MODEL_RAW=$(extract_model "${ISSUE_BODY}")
          SELECTED_MODEL=$(resolve_model "${MODEL_RAW}")
          REVIEW_MODEL_RAW=$(extract_review_model "${ISSUE_BODY}")
          SELECTED_REVIEW_MODEL=$(resolve_model "${REVIEW_MODEL_RAW}")
          QA_MODEL_RAW=$(extract_qa_model "${ISSUE_BODY}")
          SELECTED_QA_MODEL=$(resolve_model "${QA_MODEL_RAW}")
          APP_IDS_JSON=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('app_ids',[])))")
          APP_IDS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(', '.join(d.get('app_ids',[])))")
          APP_ID=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('app_id',''))")
          TDD_MAX_RETRIES=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tdd_max_retries','5'))")
          [[ -z "${TDD_MAX_RETRIES}" ]] && TDD_MAX_RETRIES="5"
          ENABLE_AGENTIC_RETRIEVAL=$(python3 - "${INPUT_ENABLE_AGENTIC_RETRIEVAL:-auto}" <<'PY'
          import sys
          value = (sys.argv[1] or "auto").strip().lower()
          print(value if value in {"auto", "yes", "no"} else "auto")
          PY
          )
          AGENTIC_DATA_SOURCE_MODES=$(python3 - "${INPUT_AGENTIC_DATA_SOURCE_MODES:-indexer}" <<'PY'
          import re, sys
          raw = (sys.argv[1] or "indexer").lower()
          tokens = [t for t in re.split(r"[\s,]+", raw) if t]
          values = []
          for token in tokens:
              if token in {"indexer", "push"} and token not in values:
                  values.append(token)
          if not values:
              values = ["indexer"]
          print(",".join(values))
          PY
          )
          FOUNDRY_MCP_INTEGRATION=$(python3 - "${INPUT_FOUNDRY_MCP_INTEGRATION:-true}" <<'PY'
          import sys
          value = (sys.argv[1] or "true").strip().lower()
          print("false" if value == "false" else "true")
          PY
          )
          AGENTIC_DATA_SOURCES_HINT=$(python3 - "${INPUT_AGENTIC_DATA_SOURCES_HINT:-}" <<'PY'
          import re, sys
          value = (sys.argv[1] or "").replace("\r", " ").replace("\n", " / ").strip()
          value = " ".join(value.split())
          value = value.replace("<", "＜").replace(">", "＞")
          value = value.replace("-->", "→")
          value = re.sub(r"--+", lambda m: "- " * (len(m.group()) - 1) + "-", value)
          print(value)
          PY
          )
          AGENTIC_EXISTING_DESIGN_DIFF_ONLY=$(python3 - "${INPUT_AGENTIC_EXISTING_DESIGN_DIFF_ONLY:-false}" <<'PY'
          import sys
          value = (sys.argv[1] or "false").strip().lower()
          print("true" if value == "true" else "false")
          PY
          )
          FOUNDRY_SKU_FALLBACK_POLICY=$(python3 - "${INPUT_FOUNDRY_SKU_FALLBACK_POLICY:-standard_allowed}" <<'PY'
          import sys
          value = (sys.argv[1] or "standard_allowed").strip().lower()
          print(value if value in {"standard_allowed", "global_required"} else "standard_allowed")
          PY
          )
          if [[ "${ENABLE_AGENTIC_RETRIEVAL}" == "no" ]]; then
            FOUNDRY_MCP_INTEGRATION="false"
            FOUNDRY_SKU_FALLBACK_POLICY="standard_allowed"
          fi

          echo "対象ブランチ: ${BRANCH}"
          echo "リソースグループ名: ${RESOURCE_GROUP}"
          echo "スキップ Steps: ${SKIP_STEPS}"
          echo "ユースケースID: ${USECASE_ID}"
          echo "対象 APP-IDs（フィルタ前）: ${APP_IDS:-（未指定 = 推薦アーキテクチャから自動選択）}"
          echo "セルフレビュー (auto-context-review): ${AUTO_CONTEXT_REVIEW}"
          echo "質問票 (auto-qa): ${AUTO_QA}"
          echo "PR完全自動化 (auto-merge): ${AUTO_MERGE}"
          echo "Agentic Retrieval: ${ENABLE_AGENTIC_RETRIEVAL}, data_source_modes=${AGENTIC_DATA_SOURCE_MODES}, foundry_mcp_integration=${FOUNDRY_MCP_INTEGRATION}, diff_only=${AGENTIC_EXISTING_DESIGN_DIFF_ONLY}, sku_fallback=${FOUNDRY_SKU_FALLBACK_POLICY}"

          # ---- 推薦アーキテクチャ APP-ID フィルタ ----
          FILTER_RESULT=$(python3 -m hve.app_arch_filter \
            --workflow asdw-web \
            ${APP_IDS:+--app-ids "${APP_IDS}"} \
            --catalog docs/catalog/app-arch-catalog.md) || {
            echo "ERROR: app-arch-catalog.md が見つからないか読み取れません。処理を中止します。" >&2
            post_comment "${ROOT_ISSUE}" "⚠️ エラー: \`docs/catalog/app-arch-catalog.md\` が見つかりません。Architecture Design (AAS) を先に実行してください。"
            exit 1
          }

          FILTER_ERROR=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',''))" 2>/dev/null || echo "")
          if [[ -n "${FILTER_ERROR}" ]]; then
            echo "ERROR: app-arch filter エラー: ${FILTER_ERROR}" >&2
            post_comment "${ROOT_ISSUE}" "⚠️ エラー: app-arch filter: ${FILTER_ERROR}"
            exit 1
          fi

          APP_IDS_JSON=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('matched_app_ids',[])))")
          APP_IDS=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(', '.join(d.get('matched_app_ids',[])))")
          APP_ID=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); ids=d.get('matched_app_ids',[]); print(ids[0] if len(ids)==1 else '')")
          APP_ARCH_SCOPE_SECTION=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('markdown_section',''))")

          echo "対象 APP-IDs（フィルタ後）: ${APP_IDS:-（0件）}"

          if [[ -z "${APP_IDS}" ]]; then
            echo "推薦アーキテクチャ APP-ID フィルタ: 対象 APP-ID が 0 件です。Step Issue を作成しません。"
            post_comment "${ROOT_ISSUE}" "ℹ️ 推薦アーキテクチャ \`Webフロントエンド + クラウド\` に該当する APP-ID が見つかりませんでした。\`docs/catalog/app-arch-catalog.md\` の \`A) サマリ表（全APP横断）\` を確認してください。"
            exit 0
          fi

          export APP_IDS APP_IDS_JSON APP_ID APP_ARCH_SCOPE_SECTION

          # ---- ROOT_REF（リソースグループメタコメント含む）----
          ROOT_REF=$(printf '<!-- root-issue: #%s -->\n<!-- branch: %s -->\n<!-- resource-group: %s -->' \
            "${ROOT_ISSUE}" "${BRANCH}" "${RESOURCE_GROUP}")
          if [[ -n "${APP_IDS}" ]]; then
            ROOT_REF+=$(printf '\n<!-- app-ids: %s -->' "${APP_IDS}")
          fi
          ROOT_REF+=$(printf '\n<!-- auto-context-review: %s -->\n<!-- auto-qa: %s -->\n<!-- auto-merge: %s -->' \
            "${AUTO_CONTEXT_REVIEW}" "${AUTO_QA}" "${AUTO_MERGE}")
          ROOT_REF+=$(printf '\n<!-- create-remote-mcp-server: %s -->' "${CREATE_REMOTE_MCP_SERVER}")
          ROOT_REF+=$(printf '\n<!-- enable-agentic-retrieval: %s -->\n<!-- agentic-data-source-modes: %s -->\n<!-- foundry-mcp-integration: %s -->\n<!-- agentic-data-sources-hint: %s -->\n<!-- agentic-existing-design-diff-only: %s -->\n<!-- foundry-sku-fallback-policy: %s -->' \
            "${ENABLE_AGENTIC_RETRIEVAL}" "${AGENTIC_DATA_SOURCE_MODES}" "${FOUNDRY_MCP_INTEGRATION}" "${AGENTIC_DATA_SOURCES_HINT}" "${AGENTIC_EXISTING_DESIGN_DIFF_ONLY}" "${FOUNDRY_SKU_FALLBACK_POLICY}")

          # 追加コンテキスト参照セクション（QA/Review 反映ルール — Phase 3 追加）
          QA_REVIEW_SECTION=$(printf '\n\n## 追加コンテキストの参照\n\n以下が存在する場合は必ず参照してください。存在しない情報は推測せず、必要に応じて不足事項として記録してください。\n\n- `qa/` 配下の、この Root Issue / Step / PR に関連する QA 回答\n- この PR または関連 Issue のレビュー指摘\n- Self-Improve 結果または改善計画（存在する場合のみ）\n- `## 入力` に記載された前 Step 成果物\n- 追加で注入された既存成果物・reuse context\n\n参照した QA / Review / Self-Improve の内容は、成果物へ反映してください。反映しない場合は理由を完了コメントまたは成果物内に記録してください。')
          if [[ -n "${ADDITIONAL_COMMENT}" ]]; then
            ADDITIONAL_SECTION="${QA_REVIEW_SECTION}$(printf '\n\n## 追加コメント\n%s' "${ADDITIONAL_COMMENT}")"
          else
            ADDITIONAL_SECTION="${QA_REVIEW_SECTION}"
          fi

          # ---- Root Issue の title に APP-ID(s) を追記 ----
          if [[ -n "${APP_IDS}" ]]; then
            CURRENT_TITLE=$(curl -sf \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))") || CURRENT_TITLE=""
            if [[ -n "${CURRENT_TITLE}" ]] && [[ "${CURRENT_TITLE}" != *"(${APP_IDS})"* ]]; then
              NEW_TITLE="${CURRENT_TITLE} (${APP_IDS})"
              api_call PATCH "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
                "$(python3 -c "import sys,json; print(json.dumps({'title': sys.argv[1]}))" "${NEW_TITLE}")" > /dev/null || true
              echo "Root Issue #${ROOT_ISSUE} のタイトルに APP-ID(s) を追記しました: ${NEW_TITLE}"
            fi
          fi

          # ---- Root Issue body からスキップ対象のステップ行を除去して更新 ----
          # （注意: ISSUE_BODY シェル変数は古い値のまま。パースは完了済みなので影響なし）
          if [[ -n "${SKIP_STEPS}" ]]; then
            echo "Root Issue body から未チェックのステップを除去します..."

            PATCH_JSON_FILE=$(mktemp)

            python3 - "${SKIP_STEPS}" "${PATCH_JSON_FILE}" <<'PYBODY'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")
          skip_steps_str = sys.argv[1]
          output_file = sys.argv[2]

          skip_steps = set(skip_steps_str.split()) if skip_steps_str.strip() else set()

          if skip_steps:
              lines = body.split('\n')
              new_lines = []
              for line in lines:
                  # 未チェック行のみ除去（チェック済み行 - [x] は残す）
                  m = re.match(r'^\s*-\s*\[[ ]\]\s*Step\.(\d+)\b', line)
                  if m and m.group(1) in skip_steps:
                      continue
                  new_lines.append(line)

              # 連続空行を最大2行に制限
              cleaned = []
              blank_count = 0
              for line in new_lines:
                  if line.strip() == '':
                      blank_count += 1
                      if blank_count <= 2:
                          cleaned.append(line)
                  else:
                      blank_count = 0
                      cleaned.append(line)

              body = '\n'.join(cleaned)

          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump({'body': body}, f, ensure_ascii=False)
          PYBODY

            api_call PATCH \
              "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
              "$(cat "${PATCH_JSON_FILE}")" > /dev/null \
              && echo "Root Issue #${ROOT_ISSUE} の body を更新しました（未チェックのステップ行を除去）。" \
              || echo "WARNING: Root Issue body の更新に失敗しました。処理を続行します。" >&2

            rm -f "${PATCH_JSON_FILE}"

            # PYBODY が body を更新したため、PYREVIEW 用に最新の body を再取得する
            _refreshed=$(gh api "/repos/${REPO}/issues/${ROOT_ISSUE}" --jq '.body // ""' 2>/dev/null) \
              && ISSUE_BODY="${_refreshed}" && export ISSUE_BODY \
              || echo "WARNING: ISSUE_BODY の再取得に失敗しました。スキップステップ除去後の body で auto-context-review タグが埋め込まれない可能性があります。" >&2
          else
            echo "全ステップ実行のため Root Issue body の更新は不要です。"
          fi

          # ---- Root Issue に auto-context-review タグを埋め込み ----
          REVIEW_TAG_FILE=$(mktemp)
          python3 - "${AUTO_CONTEXT_REVIEW}" "${AUTO_MERGE}" "${TDD_MAX_RETRIES}" "${BRANCH}" "${ENABLE_SELF_IMPROVE}" "${SELF_IMPROVE_MAX_ITER}" "${SELF_IMPROVE_QUALITY_THRESHOLD}" "${CREATE_REMOTE_MCP_SERVER}" "${ENABLE_AGENTIC_RETRIEVAL}" "${AGENTIC_DATA_SOURCE_MODES}" "${FOUNDRY_MCP_INTEGRATION}" "${AGENTIC_DATA_SOURCES_HINT}" "${AGENTIC_EXISTING_DESIGN_DIFF_ONLY}" "${FOUNDRY_SKU_FALLBACK_POLICY}" "${REVIEW_TAG_FILE}" <<'PYMERGE'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")
          auto_context_review = sys.argv[1]
          auto_merge = sys.argv[2]
          tdd_max_retries = sys.argv[3]
          branch = sys.argv[4]
          enable_si = sys.argv[5]
          si_max_iter = sys.argv[6]
          si_quality_threshold = sys.argv[7]
          create_remote_mcp_server = sys.argv[8]
          enable_agentic_retrieval = sys.argv[9]
          agentic_data_source_modes = sys.argv[10]
          foundry_mcp_integration = sys.argv[11]
          agentic_data_sources_hint = sys.argv[12]
          agentic_existing_design_diff_only = sys.argv[13]
          foundry_sku_fallback_policy = sys.argv[14]
          output_file = sys.argv[15]

          tags = [
              ("auto-context-review", auto_context_review),
              ("auto-merge", auto_merge),
              ("tdd-max-retries", tdd_max_retries),
              ("branch", branch),
              ("enable-self-improve", enable_si),
              ("self-improve-max-iterations", si_max_iter),
              ("self-improve-quality-threshold", si_quality_threshold),
              ("create-remote-mcp-server", create_remote_mcp_server),
              ("enable-agentic-retrieval", enable_agentic_retrieval),
              ("agentic-data-source-modes", agentic_data_source_modes),
              ("foundry-mcp-integration", foundry_mcp_integration),
              ("agentic-data-sources-hint", agentic_data_sources_hint),
              ("agentic-existing-design-diff-only", agentic_existing_design_diff_only),
              ("foundry-sku-fallback-policy", foundry_sku_fallback_policy),
          ]

          for key, value in tags:
              tag = f"<!-- {key}: {value} -->"
              pat = re.compile(rf"<!--\s*{re.escape(key)}\s*:[^>]*-->")
              if pat.search(body):
                  body = pat.sub(tag, body, count=1)
              else:
                  body = body.rstrip() + "\n" + tag + "\n"

          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump({'body': body}, f, ensure_ascii=False)
          PYMERGE

          api_call PATCH \
            "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
            "$(cat "${REVIEW_TAG_FILE}")" > /dev/null \
            && echo "Root Issue #${ROOT_ISSUE} に auto-context-review / auto-merge / tdd-max-retries / branch / self-improve / create-remote-mcp-server / agentic-retrieval タグを埋め込みました。" \
            || echo "WARNING: Root Issue body のタグ埋め込みに失敗しました。" >&2

          rm -f "${REVIEW_TAG_FILE}"

          add_label "${ROOT_ISSUE}" "asdw-web:initialized"
          echo "asdw-web:initialized を付与しました。"

          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-context-review"
            echo "Root Issue #${ROOT_ISSUE} に auto-context-review ラベルを付与しました。"
          fi

          if [[ "${AUTO_QA}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-qa"
            echo "Root Issue #${ROOT_ISSUE} に auto-qa ラベルを付与しました。"
          fi

          if [[ "${AUTO_MERGE}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-approve-ready"
            echo "Root Issue #${ROOT_ISSUE} に auto-approve-ready ラベルを付与しました。"
          fi
          if [[ -n "${SELECTED_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "model/${SELECTED_MODEL}" || true
          fi
          if [[ -n "${SELECTED_REVIEW_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "review-model/${SELECTED_REVIEW_MODEL}" || true
          fi
          if [[ -n "${SELECTED_QA_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "qa-model/${SELECTED_QA_MODEL}" || true
          fi

          # skip_step helper: SKIP_STEPS に Step 番号が含まれていれば true
          skip_step() { echo " ${SKIP_STEPS} " | grep -q " $1 "; }

          # ---- APP-ID スコープセクション（複数 APP-ID 対応）----
          if [[ -n "${APP_IDS}" ]]; then
            APP_ID_SECTION=$(APP_IDS="${APP_IDS}" python3 -c 'import os; ids=[s.strip() for s in os.environ.get("APP_IDS","").split(",") if s.strip()]; id_list=", ".join("`"+aid+"`" for aid in ids); print("\\n\\n## 対象アプリケーション\\n- APP-ID: "+id_list+"\\n- この Step では上記 APP-ID に関連するサービス/エンティティ/画面のみを対象とする\\n- `docs/catalog/app-catalog.md` を参照し、対象 APP-ID に紐づく項目を特定する\\n- 共有サービス/エンティティ（複数 APP で利用されるもの）も対象に含む")')
          else
            APP_ID_SECTION=""
          fi

          # Step Issue タイトルに APP-ID(s) を付加するサフィックス
          APP_ID_SUFFIX="${APP_IDS:+ (${APP_IDS})}"

          # Step Issue に付与するラベルセット
          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]] && [[ "${AUTO_QA}" == "true" ]]; then
            STEP_LABELS='["auto-app-dev-microservice-web","auto-context-review","auto-qa"]'
          elif [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
