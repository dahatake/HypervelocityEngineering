              echo "WARNING: Step.2.1 へのアサイン失敗。asdw-web:running は付与しません。"
            fi
          elif [[ -n "${S30T_NUM}" ]]; then
            add_label "${S30T_NUM}" "asdw-web:ready"
            CA=$(extract_custom_agent "${BODY_S30T}")
            if assign_copilot "${S30T_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S30T_NUM}" "asdw-web:running"
              echo "Step.1/2 がスキップ済み: Step.3.0T (#${S30T_NUM}) を起動しました。"
            else
              echo "WARNING: Step.3.0T へのアサイン失敗。asdw-web:running は付与しません。"
            fi
          elif [[ -n "${S30TC_NUM}" ]]; then
            add_label "${S30TC_NUM}" "asdw-web:ready"
            CA=$(extract_custom_agent "${BODY_S30TC}")
            if assign_copilot "${S30TC_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S30TC_NUM}" "asdw-web:running"
              echo "Step.1/2 がスキップ済み: Step.3.0TC (#${S30TC_NUM}) を起動しました。"
            else
              echo "WARNING: Step.3.0TC へのアサイン失敗。asdw-web:running は付与しません。"
            fi
          elif [[ -n "${S31_NUM}" ]]; then
            add_label "${S31_NUM}" "asdw-web:ready"
            CA=$(extract_custom_agent "${BODY_S31}")
            if assign_copilot "${S31_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S31_NUM}" "asdw-web:running"
              echo "Step.1/2 がスキップ済み: Step.3.1 (#${S31_NUM}) を起動しました。"
            else
              echo "WARNING: Step.3.1 へのアサイン失敗。asdw-web:running は付与しません。"
            fi
          elif [[ -n "${S32_NUM}" ]]; then
            add_label "${S32_NUM}" "asdw-web:ready"
            CA=$(extract_custom_agent "${BODY_S32}")
            if assign_copilot "${S32_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S32_NUM}" "asdw-web:running"
              echo "Step.1/2 がスキップ済み: Step.3.2 (#${S32_NUM}) を起動しました。"
            else
              echo "WARNING: Step.3.2 へのアサイン失敗。asdw-web:running は付与しません。"
            fi
          elif [[ -n "${S33_NUM}" ]]; then
            add_label "${S33_NUM}" "asdw-web:ready"
            CA=$(extract_custom_agent "${BODY_S33}")
            if assign_copilot "${S33_NUM}" "${CA}" "${BRANCH}" ""; then
              add_label "${S33_NUM}" "asdw-web:running"
              echo "Step.1/2 がスキップ済み: Step.3.3 (#${S33_NUM}) を起動しました。"
            else
              echo "WARNING: Step.3.3 へのアサイン失敗。asdw-web:running は付与しません。"
            fi
          elif [[ -n "${S41_NUM}" ]] || [[ -n "${S42_NUM}" ]]; then
            if [[ -n "${S41_NUM}" ]]; then
              add_label "${S41_NUM}" "asdw-web:ready"
              CA=$(extract_custom_agent "${BODY_S41}")
              if assign_copilot "${S41_NUM}" "${CA}" "${BRANCH}" ""; then
                add_label "${S41_NUM}" "asdw-web:running"
                echo "Step.1/2/3 がスキップ済み: Step.4.1 (#${S41_NUM}) を起動しました。"
              else
                echo "WARNING: Step.4.1 へのアサイン失敗。asdw-web:running は付与しません。"
              fi
            fi
            if [[ -n "${S42_NUM}" ]]; then
              add_label "${S42_NUM}" "asdw-web:ready"
              CA=$(extract_custom_agent "${BODY_S42}")
              if assign_copilot "${S42_NUM}" "${CA}" "${BRANCH}" ""; then
                add_label "${S42_NUM}" "asdw-web:running"
                echo "Step.1/2/3 がスキップ済み: Step.4.2 (#${S42_NUM}) を起動しました。"
              else
                echo "WARNING: Step.4.2 へのアサイン失敗。asdw-web:running は付与しません。"
              fi
            fi
          else
            echo "起動可能な leaf Step が存在しません。初期化をスキップします。"
          fi

          echo "初期化完了。"

      # ----------------------------------------------------------------
      # 4. 状態遷移: asdw-web:done ラベル付与時
      # ----------------------------------------------------------------
      - name: 状態遷移処理
        if: steps.gate.outputs.mode == 'state_transition'
        env:
          DONE_ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail

          # Issue の body と title を API 経由で安全に取得（YAML 展開問題を回避）
          _ISSUE_JSON=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}")
          DONE_ISSUE_BODY=$(echo "${_ISSUE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          DONE_ISSUE_TITLE=$(echo "${_ISSUE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          export DONE_ISSUE_BODY DONE_ISSUE_TITLE

          # closed イベント由来の場合: asdw-web:done ラベルをまだ持っていなければ付与する
          # （labeled(asdw-web:done) イベントと closed イベントのどちらで state_transition に来ても正しく動作するための冪等処理）
          _HAS_DONE_LABEL=$(echo "${_ISSUE_JSON}" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          labels = [l['name'] for l in d.get('labels', [])]
          print('true' if 'asdw-web:done' in labels else 'false')
          ")
          if [[ "${_HAS_DONE_LABEL}" == "false" ]]; then
            echo "asdw-web:done ラベルを付与します（closed イベント由来）..."
            # add_label関数の定義より前なので直接curl（リトライなし・エラーは無視）
            curl -s -o /dev/null \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}/labels" \
              -d '{"labels":["asdw-web:done"]}' || true
            echo "asdw-web:done ラベルを付与しました。"
            sleep 2
          fi

          if [[ -z "${COPILOT_PAT}" ]]; then
            echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインは全てスキップされます。" >&2
          fi

          # ---- ユーティリティ関数（再定義） ----
          api_call() {
            local method="$1"; shift
            local url="$1"; shift
            local data="${1:-}"
            local max_retry=5
            local wait=1
            local http_code response body

            for i in $(seq 1 "${max_retry}"); do
              if [[ -n "${data}" ]]; then
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  -H "Content-Type: application/json" \
                  "${url}" \
                  -d "${data}")
              else
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${url}")
              fi
              http_code=$(echo "${response}" | tail -1)
              body=$(echo "${response}" | head -n -1)
              if [[ "${http_code}" =~ ^2 ]]; then
                echo "${body}"
                return 0
              fi
              echo "API エラー: HTTP ${http_code}、${wait}秒後にリトライ (${i}/${max_retry})" >&2
              sleep "${wait}"
              wait=$((wait * 2))
            done
            echo "API 呼び出し失敗: ${method} ${url}" >&2
            return 1
          }

          add_label() {
            local issue_num="$1"
            local label="$2"
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/labels" \
              "{\"labels\":[\"${label}\"]}" > /dev/null
            sleep 1
          }

          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/assign-copilot.sh"

          post_comment() {
            local issue_num="$1"
            local body="$2"
            local data
            data=$(python3 -c "import sys,json; print(json.dumps({'body': sys.argv[1]}))" "${body}")
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/comments" \
              "${data}" > /dev/null
            sleep 1
          }

          # Issue body から Custom Agent 名を抽出
          extract_custom_agent() {
            local body="$1"
            echo "${body}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'## Custom Agent\s*\n\s*`([^`]+)`', body)
          print(m.group(1) if m else '')
          PY
          }

          activate_issue() {
            local issue_num="$1"
            local issue_body
            issue_body=$(curl -sf \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))") || true
            local agent_name
            agent_name=$(extract_custom_agent "${issue_body}") || true
            add_label "${issue_num}" "asdw-web:ready"
            if assign_copilot "${issue_num}" "${agent_name}" "${BRANCH:-main}" ""; then
              add_label "${issue_num}" "asdw-web:running"
              echo "Issue #${issue_num} を asdw-web:ready + copilot アサイン + asdw-web:running に設定しました。(custom_agent: ${agent_name})"
            else
              echo "WARNING: Issue #${issue_num} へのアサイン失敗。asdw-web:running は付与しません。"
            fi
          }

          # ---- done Issue の title から Step 番号を特定 ----
          STEP_MATCH=$(echo "${DONE_ISSUE_TITLE}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          title = sys.stdin.read().strip()
          m = re.search(r'\] Step\.(\d+(?:\.\d+)?[A-Z]{0,2})', title)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${STEP_MATCH}" ]]; then
            echo "Step 番号が特定できません（title: ${DONE_ISSUE_TITLE}）。スキップ。"
            exit 0
          fi

          echo "完了した Step: ${STEP_MATCH}"

          # ---- Root Issue 番号の取得 ----
          ROOT_ISSUE=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!-- root-issue: #(\d+) -->', body)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${ROOT_ISSUE}" ]]; then
            echo "Root Issue 番号が取得できません。スキップ。"
            exit 0
          fi

          echo "Root Issue: #${ROOT_ISSUE}"

          # ---- ブランチ名の取得 ----
          BRANCH=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!-- branch: (.+?) -->', body)
          print(m.group(1).strip() if m else 'main')
          PY
          )

          echo "対象ブランチ: ${BRANCH}"

          # ---- auto-context-review / auto-qa PR ラベル付与 ----
          AUTO_CONTEXT_REVIEW=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!--\s*auto-context-review:\s*(true|false)\s*-->', body)
          print(m.group(1) if m else 'false')
          PY
          )
          AUTO_QA=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!--\s*auto-qa:\s*(true|false)\s*-->', body)
          print(m.group(1) if m else 'false')
          PY
          )
          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]] || [[ "${AUTO_QA}" == "true" ]]; then
            # Timeline API で Issue を close する open PR を逆引き（gh pr list --search では "closes:#N" 構文が機能しないため）
            LINKED_PRS=$(gh api "/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}/timeline?per_page=100" \
              --jq '[.[] | select(.event == "cross-referenced" and .source.type == "pull_request" and .source.issue.state == "open") | .source.issue.number] | unique | .[]' \
              2>/dev/null || true)
            if [[ -n "${LINKED_PRS}" ]]; then
              while IFS= read -r pr_num; do
                if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
                  gh pr edit "${pr_num}" --repo "${REPO}" --add-label "auto-context-review" 2>/dev/null \
                    && echo "PR #${pr_num} に auto-context-review ラベルを付与しました。" \
                    || echo "WARNING: PR #${pr_num} への auto-context-review ラベル付与に失敗しました。" >&2
                fi
                if [[ "${AUTO_QA}" == "true" ]]; then
                  gh pr edit "${pr_num}" --repo "${REPO}" --add-label "auto-qa" 2>/dev/null \
                    && echo "PR #${pr_num} に auto-qa ラベルを付与しました。" \
                    || echo "WARNING: PR #${pr_num} への auto-qa ラベル付与に失敗しました。" >&2
                fi
              done <<< "${LINKED_PRS}"
            fi
          fi

          # ---- Root Issue の Sub Issues を取得して Step Issue を特定 ----
          get_sub_issue_number() {
            local pattern="$1"
            # Root Issue から全 Sub Issues を取得
            local resp
            resp=$(api_call GET \
              "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues")
            echo "${resp}" | python3 /dev/fd/3 "${pattern}" 3<<'PY'
          import sys, re, json
          issues = json.load(sys.stdin)
          pattern = sys.argv[1]
          for issue in issues:
              title = issue.get('title', '')
              if re.search(pattern, title):
                  print(issue['number'])
                  break
          PY
          }

          get_sub_issue_number_from_parent() {
            local parent_num="$1"
            local pattern="$2"
            local resp
            resp=$(api_call GET \
              "https://api.github.com/repos/${REPO}/issues/${parent_num}/sub_issues")
            echo "${resp}" | python3 /dev/fd/3 "${pattern}" 3<<'PY'
          import sys, re, json
          issues = json.load(sys.stdin)
          pattern = sys.argv[1]
          for issue in issues:
              title = issue.get('title', '')
              if re.search(pattern, title):
                  print(issue['number'])
                  break
          PY
          }

          # ---- 依存関係マップに基づき次 Step を特定 & 起動 ----
          case "${STEP_MATCH}" in

            "1.1")
              # Step.1.1 完了 → Step.1.2 を起動
              S1_NUM=$(get_sub_issue_number '\] Step\.1:')
              if [[ -n "${S1_NUM}" ]]; then
                S12_NUM=$(get_sub_issue_number_from_parent "${S1_NUM}" '\] Step\.1\.2:')
                if [[ -n "${S12_NUM}" ]]; then
                  activate_issue "${S12_NUM}"
                else
                  echo "WARNING: Step.1.2 が見つかりません。"
                fi
              else
                echo "WARNING: Step.1 コンテナが見つかりません。"
              fi
              ;;

            "1.2")
              # Step.1.2 完了 → Step.1 コンテナに asdw-web:done → Step.2.1 を起動
              S1_NUM=$(get_sub_issue_number '\] Step\.1:')
              if [[ -n "${S1_NUM}" ]]; then
                add_label "${S1_NUM}" "asdw-web:done"
                echo "Step.1 コンテナに asdw-web:done を付与しました。"
              fi
              S2_NUM=$(get_sub_issue_number '\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S21_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.1:')
                if [[ -n "${S21_NUM}" ]]; then
                  activate_issue "${S21_NUM}"
                else
                  echo "WARNING: Step.2.1 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.1")
              # Step.2.1 完了 → Step.2.2 を起動
              S2_NUM=$(get_sub_issue_number '\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S22_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.2:')
                if [[ -n "${S22_NUM}" ]]; then
                  activate_issue "${S22_NUM}"
                else
                  echo "WARNING: Step.2.2 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.2")
              # Step.2.2 完了 → Step.2.3 を起動
              S2_NUM=$(get_sub_issue_number '\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S23_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.3:')
                if [[ -n "${S23_NUM}" ]]; then
                  activate_issue "${S23_NUM}"
                else
                  echo "WARNING: Step.2.3 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.3")
              # Step.2.3 完了 → Step.2.3T (TDD RED テスト仕様書生成) を起動
              S2_NUM=$(get_sub_issue_number '\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S23T_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.3T:')
                if [[ -n "${S23T_NUM}" ]]; then
                  activate_issue "${S23T_NUM}"
                else
                  echo "WARNING: Step.2.3T が見つかりません。Step.2.3TC にフォールバック。"
                  S23TC_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.3TC:')
                  if [[ -n "${S23TC_NUM}" ]]; then
                    activate_issue "${S23TC_NUM}"
                  else
                    echo "WARNING: Step.2.3TC が見つかりません。Step.2.4 にフォールバック。"
                    S24_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.4:')
                    if [[ -n "${S24_NUM}" ]]; then
                      activate_issue "${S24_NUM}"
                    else
                      echo "WARNING: Step.2.4 も見つかりません。"
                    fi
                  fi
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.3T")
              # Step.2.3T 完了 → Step.2.3TC (TDD RED テストコード生成) を起動
              S2_NUM=$(get_sub_issue_number '\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S23TC_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.3TC:')
                if [[ -n "${S23TC_NUM}" ]]; then
                  activate_issue "${S23TC_NUM}"
                else
                  echo "WARNING: Step.2.3TC が見つかりません。Step.2.4 にフォールバック。"
                  S24_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.4:')
                  if [[ -n "${S24_NUM}" ]]; then
                    activate_issue "${S24_NUM}"
                  else
                    echo "WARNING: Step.2.4 も見つかりません。"
                  fi
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.3TC")
              # Step.2.3TC 完了 → Step.2.4 を起動
              S2_NUM=$(get_sub_issue_number '\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S24_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.4:')
                if [[ -n "${S24_NUM}" ]]; then
                  activate_issue "${S24_NUM}"
                else
                  echo "WARNING: Step.2.4 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.4")
              # Step.2.4 完了 → Step.2.5 を起動
              S2_NUM=$(get_sub_issue_number '\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S25_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.5:')
                if [[ -n "${S25_NUM}" ]]; then
                  activate_issue "${S25_NUM}"
                else
                  echo "WARNING: Step.2.5 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.5")
              # Step.2.5 完了 → Step.2.6 を起動
              S2_NUM=$(get_sub_issue_number '\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S26_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.6:')
                if [[ -n "${S26_NUM}" ]]; then
                  activate_issue "${S26_NUM}"
                else
                  echo "WARNING: Step.2.6 が見つかりません。"
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.6")
              # Step.2.6 完了 → Step.2.7T (AI Agent テスト仕様書 TDD RED) を起動
              S2_NUM=$(get_sub_issue_number '\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S27T_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.7T:')
                if [[ -n "${S27T_NUM}" ]]; then
                  activate_issue "${S27T_NUM}"
                else
                  echo "WARNING: Step.2.7T が見つかりません。Step.2.7TC にフォールバック。"
                  S27TC_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.7TC:')
                  if [[ -n "${S27TC_NUM}" ]]; then
                    activate_issue "${S27TC_NUM}"
                  else
                    echo "WARNING: Step.2.7TC が見つかりません。Step.2.7 にフォールバック。"
                    S27_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.7:')
                    if [[ -n "${S27_NUM}" ]]; then
                      activate_issue "${S27_NUM}"
                    else
                      echo "WARNING: Step.2.7 も見つかりません。Step.2.8 にフォールバック。"
                      S28_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.8:')
                      if [[ -n "${S28_NUM}" ]]; then
                        activate_issue "${S28_NUM}"
                      else
                        echo "WARNING: Step.2.8 も見つかりません。Step.2 コンテナを完了扱いにします。"
                        add_label "${S2_NUM}" "asdw-web:done"
                        echo "Step.2 コンテナに asdw-web:done を付与しました。"
                        S3_NUM=$(get_sub_issue_number '\] Step\.3:')
                        if [[ -n "${S3_NUM}" ]]; then
                          S30T_NUM=$(get_sub_issue_number_from_parent "${S3_NUM}" '\] Step\.3\.0T:')
                          if [[ -n "${S30T_NUM}" ]]; then
                            activate_issue "${S30T_NUM}"
                          else
                            echo "WARNING: Step.3.0T が見つかりません。Step.3.0TC にフォールバック。"
                            S30TC_NUM=$(get_sub_issue_number_from_parent "${S3_NUM}" '\] Step\.3\.0TC:')
                            if [[ -n "${S30TC_NUM}" ]]; then
                              activate_issue "${S30TC_NUM}"
                            else
                              echo "WARNING: Step.3.0TC が見つかりません。Step.3.1 にフォールバック。"
                              S31_NUM=$(get_sub_issue_number_from_parent "${S3_NUM}" '\] Step\.3\.1:')
                              if [[ -n "${S31_NUM}" ]]; then
                                activate_issue "${S31_NUM}"
                              else
                                echo "WARNING: Step.3.1 も見つかりません。"
                              fi
                            fi
                          fi
                        else
                          echo "WARNING: Step.3 コンテナが見つかりません。"
                        fi
                      fi
                    fi
                  fi
                fi
              else
                echo "WARNING: Step.2 コンテナが見つかりません。"
              fi
              ;;

            "2.7T")
              # Step.2.7T 完了 → Step.2.7TC (AI Agent テストコード生成 TDD RED) を起動
              S2_NUM=$(get_sub_issue_number '\] Step\.2:')
              if [[ -n "${S2_NUM}" ]]; then
                S27TC_NUM=$(get_sub_issue_number_from_parent "${S2_NUM}" '\] Step\.2\.7TC:')
