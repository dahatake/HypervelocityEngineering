                fi
              else
                echo "WARNING: Step.4 コンテナが見つかりません。"
              fi
              ;;

            "4.1"|"4.2")
              # Step.4.1 or Step.4.2 完了 → 両方完了確認 → Step.4 コンテナに asdw-web:done → Root に asdw-web:done + 完了コメント
              S4_NUM=$(get_sub_issue_number '\] Step\.4:')
              if [[ -n "${S4_NUM}" ]]; then
                # Step.4.1 と Step.4.2 の両方が asdw-web:done かチェック
                S4_SUBS=$(api_call GET \
                  "https://api.github.com/repos/${REPO}/issues/${S4_NUM}/sub_issues")
                BOTH_DONE=$(echo "${S4_SUBS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          issues = json.load(sys.stdin)
          # Step.4.1 と Step.4.2 の label に asdw-web:done が含まれるか確認
          done_count = 0
          for issue in issues:
              labels = [l['name'] for l in issue.get('labels', [])]
              if 'asdw-web:done' in labels:
                  done_count += 1
          # 両方(2つ)が done なら true
          print('true' if done_count >= 2 else 'false')
          PY
                )
                if [[ "${BOTH_DONE}" == "true" ]]; then
                  add_label "${S4_NUM}" "asdw-web:done"
                  echo "Step.4 コンテナに asdw-web:done を付与しました。"
                  # Root Issue に asdw-web:done を付与してワークフロー完了を示す
                  add_label "${ROOT_ISSUE}" "asdw-web:done"
                  echo "Root Issue #${ROOT_ISSUE} に asdw-web:done を付与しました。"
                  # Root Issue に完了コメント
                  post_comment "${ROOT_ISSUE}" "🎉 全ての開発ステップが完了しました！Root Issue #${ROOT_ISSUE} の Web App on Azure 開発ワークフローが正常に終了しました。"
                  echo "Root Issue #${ROOT_ISSUE} に完了コメントを投稿しました。"
                else
                  echo "Step.4 の両方の Sub Issue がまだ完了していません。もう一方の完了を待ちます。"
                fi
              else
                echo "WARNING: Step.4 コンテナが見つかりません。"
              fi
              ;;

            *)
              echo "未定義の Step: ${STEP_MATCH}。スキップ。"
              ;;
          esac
          # ── 自動クローズ判定（auto-merge 有効時）──────────────
          if [[ -f "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh" ]]; then
            source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh"

            # コンテナ Issue の自動クローズ判定
            _AC_CONTAINER_NUM=""
            if [[ "${DONE_ISSUE_TITLE}" =~ ^\[ASDW-WEB\]\ Step\.[0-9]+\.[0-9] ]]; then
              _AC_PARENT_STEP=$(echo "${DONE_ISSUE_TITLE}" \
                | grep -oP '\]\s*Step\.\K\d+' | head -1)
              if [[ -n "${_AC_PARENT_STEP}" ]]; then
                _AC_CONTAINER_NUM=$(gh api --paginate \
                  "/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues?per_page=100" \
                  --jq ".[] | select(.title | test(\"\\\\\\\] Step\\\\.${_AC_PARENT_STEP}:\")) | .number" \
                  2>/dev/null | head -1) || _AC_CONTAINER_NUM=""
              fi
            fi

            if [[ -n "${_AC_CONTAINER_NUM}" && "${_AC_CONTAINER_NUM}" =~ ^[0-9]+$ ]]; then
              echo "=== コンテナ Issue #${_AC_CONTAINER_NUM} の自動クローズ判定 ==="
              auto_close_container_if_done "${_AC_CONTAINER_NUM}" "${REPO}" || true
            fi

            echo "=== Root Issue #${ROOT_ISSUE} の自動クローズ判定 ==="
            auto_close_root_if_all_done "${ROOT_ISSUE}" "${REPO}" || true
          fi

      # ----------------------------------------------------------------
      # 4.5. closed イベント時のコンテナ/Root 自動クローズ判定
      # ----------------------------------------------------------------
      - name: コンテナ自動クローズ判定（closed イベント）
        if: steps.gate.outputs.mode == 'container_close_check'
        env:
          DONE_ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail

          # ── 完了した Issue の情報取得 ──
          if ! DONE_ISSUE_JSON=$(gh api "/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}" 2>/dev/null); then
            echo "::warning::Issue #${DONE_ISSUE_NUMBER} の取得に失敗しました（削除済みまたはアクセス不可）。"
            DONE_ISSUE_JSON='{}'
          fi
          DONE_ISSUE_TITLE=$(printf '%s' "${DONE_ISSUE_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('title',''))")
          DONE_ISSUE_BODY=$(printf '%s' "${DONE_ISSUE_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('body','') or '')")

          # ── Root Issue 番号の抽出 ──
          ROOT_ISSUE=$(echo "${DONE_ISSUE_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          b = sys.stdin.read()
          m = re.search(r'<!--\s*root-issue:\s*#(\d+)\s*-->', b)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${ROOT_ISSUE}" || ! "${ROOT_ISSUE}" =~ ^[0-9]+$ ]]; then
            echo "Root Issue を特定できないためスキップ。"
            exit 0
          fi
          echo "Root Issue: #${ROOT_ISSUE}"

          # ── auto-close.sh の読み込み ──
          if [[ ! -f "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh" ]]; then
            echo "auto-close.sh が見つかりません。スキップ。"
            exit 0
          fi
          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh"

          # ── コンテナ Issue の自動クローズ判定 ──
          _AC_CONTAINER_NUM=""
          if [[ "${DONE_ISSUE_TITLE}" =~ ^\[ASDW-WEB\]\ Step\.[0-9]+\.[0-9] ]]; then
            _AC_PARENT_STEP=$(echo "${DONE_ISSUE_TITLE}" \
              | grep -oP '\]\s*Step\.\K\d+' | head -1)
            if [[ -n "${_AC_PARENT_STEP}" ]]; then
              _AC_CONTAINER_NUM=$(gh api --paginate \
                "/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues?per_page=100" \
                --jq ".[] | select(.title | test(\"\\\\\\\] Step\\\\.${_AC_PARENT_STEP}:\")) | .number" \
                2>/dev/null | head -1) || _AC_CONTAINER_NUM=""
            fi
          fi

          if [[ -n "${_AC_CONTAINER_NUM}" && "${_AC_CONTAINER_NUM}" =~ ^[0-9]+$ ]]; then
            echo "=== コンテナ Issue #${_AC_CONTAINER_NUM} の自動クローズ判定 ==="
            auto_close_container_if_done "${_AC_CONTAINER_NUM}" "${REPO}" || true
          else
            echo "コンテナ Issue が特定できないためスキップ。"
          fi

          # ── Root Issue の自動クローズ判定 ──
          echo "=== Root Issue #${ROOT_ISSUE} の自動クローズ判定 ==="
          auto_close_root_if_all_done "${ROOT_ISSUE}" "${REPO}" || true

  self-improve:
    needs: orchestrate
    if: needs.orchestrate.result == 'success'
    runs-on: ${{ fromJSON(inputs.runner_type == 'self-hosted' && '["self-hosted","linux","x64","aca"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 180
    steps:
      - name: Parse Self-Improve settings
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          body=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" --jq '.body // ""' 2>/dev/null || true)
          enable=$(printf '%s' "${body}" | sed -n 's/^.*<!-- enable-self-improve: *\([^>]*\) *-->.*$/\1/p' | head -1 | tr '[:upper:]' '[:lower:]' | xargs || true)
          max_iter=$(printf '%s' "${body}" | sed -n 's/^.*<!-- self-improve-max-iterations: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          branch=$(printf "%s" "${body}" | sed -n 's/^.*<!-- branch: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          quality_threshold=$(printf '%s' "${body}" | sed -n 's/^.*<!-- self-improve-quality-threshold: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          if [[ -z "${enable}" ]]; then
            enable=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善ループ設定.*?\n(.*?)(?=###|\Z)', body, re.DOTALL)
          print('true' if (m and re.search(r'-\s*\[[xX]\]', m.group(1))) else 'false')
          " 2>/dev/null || echo "false")
          fi
          if [[ -z "${max_iter}" ]]; then
            max_iter=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善\s*最大イテレーション数.*?\n+(.+)', body)
          if m:
              n = re.match(r'(\d+)', m.group(1).strip())
              print(n.group(1) if n else '3')
          else:
              print('3')
          " 2>/dev/null || echo "3")
          fi
          if [[ -z "${quality_threshold}" ]]; then
            quality_threshold=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善\s*品質スコア閾値.*?\n+(.+)', body)
          if m:
              n = re.match(r'(\d+)', m.group(1).strip())
              print(n.group(1) if n else '80')
          else:
              print('80')
          " 2>/dev/null || echo "80")
          fi
          if [[ -z "${branch}" ]]; then
            branch=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*対象ブランチ.*?\n+(.+)', body)
          if m:
              val = m.group(1).strip()
              print(val if val and val != '_No response_' else 'main')
          else:
              print('main')
          " 2>/dev/null || echo "main")
          fi
          [[ -z "${enable}" ]] && enable="false"
          [[ -z "${max_iter}" ]] && max_iter="3"
          [[ -z "${quality_threshold}" ]] && quality_threshold="80"
          [[ -z "${branch}" ]] && branch="main"
          echo "enable=${enable}" >> "$GITHUB_OUTPUT"
          echo "max_iter=${max_iter}" >> "$GITHUB_OUTPUT"
          echo "quality_threshold=${quality_threshold}" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          ref: ${{ steps.parse.outputs.branch }}

      - name: Skip Self-Improve when branch is missing
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch == ''
        run: |
          echo "Skip Self-Improve: issue body に branch 情報がありません。"
      - uses: actions/setup-python@v5
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          node-version: "20"
      - name: Install dependencies
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        run: |
          pip install ruff pytest pytest-cov
          npm install -g markdownlint-cli
      - name: Run Self-Improve
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        env:
          MAX_ITERATIONS: ${{ steps.parse.outputs.max_iter }}
          QUALITY_THRESHOLD: ${{ steps.parse.outputs.quality_threshold }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c "
          import os
          from hve.self_improve import run_improvement_loop
          from hve.config import SDKConfig
          config = SDKConfig.from_env()
          config.auto_self_improve = True
          config.self_improve_scope = "workflow"
          config.self_improve_max_iterations = int(os.environ.get('MAX_ITERATIONS', '3'))
          config.self_improve_quality_threshold = int(os.environ.get('QUALITY_THRESHOLD', '80'))
          result = run_improvement_loop(config=config, repo_root='.')
          print(f'Self-Improve: {result[\"stopped_reason\"]} (score={result[\"final_score\"]})')
          "
      - name: Commit improvements
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != '' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "[Self-Improve] 自動品質改善"
          git push origin HEAD:${{ steps.parse.outputs.branch }}
