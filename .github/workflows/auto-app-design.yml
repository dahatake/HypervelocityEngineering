            # Step.8.1
            if ! skip_step "8.1"; then
              BODY_S81=$(printf '%s\n## 目的\nユースケース記述を入力として、AI Agent のアプリケーション定義書を作成する。\n\n## 入力\n- `docs/catalog/use-case-catalog.md`（ユースケース記述）\n- `docs/catalog/service-catalog-matrix.md`\n- `docs/catalog/domain-analytics.md`\n- `docs/catalog/data-model.md`\n- `docs/catalog/service-catalog.md`\n- `docs/services/SVC-*.md`（関連サービスのみ）\n- `docs/catalog/app-catalog.md`（アプリケーション一覧）\n- `users-guide/08-ai-agent.md`（設計ガイドライン Step 1）\n\n## 出力\n- `docs/agent/agent-application-definition.md`\n\n## Custom Agent\n`Arch-AIAgentDesign` を使用\n\n## 依存\n- Step.7.3（TDDテスト仕様書）が `aad:done` であること\n\n## アプリケーション粒度\n📋 `docs/catalog/app-catalog.md` のアプリケーション一覧（APP-ID）を参照し、Agent の対象 APP-ID を明記すること。\n\n## 完了条件\n- `docs/agent/agent-application-definition.md` が作成されている\n- 完了時に自身に `aad:done` ラベルを付与すること%s' \
                "${ROOT_REF}" "${ADDITIONAL_SECTION}")
              if RESP=$(create_issue \
                "[AAD] Step.8.1: AI Agent アプリケーション定義" \
                "${BODY_S81}" \
                "${STEP_LABELS}"); then
                S81_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
                S81_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
                echo "Step.8.1 作成: #${S81_NUM}"
                sleep 3
              else
                post_comment "${ROOT_ISSUE}" "⚠️ Step Issue 生成失敗: [AAD] Step.8.1: AI Agent アプリケーション定義 (ワークフローログを確認し、再実行または手動対応してください)" || true
                echo "ERROR: create_issue failed for: [AAD] Step.8.1: AI Agent アプリケーション定義" >&2
              fi
            fi

            # Step.8.2
            if ! skip_step "8.2"; then
              BODY_S82=$(printf '%s\n## 目的\nStep.8.1 のアプリケーション定義を入力として、AI Agent の粒度設計（Single/Multi 判断）とアーキテクチャ骨格を設計する。\n\n## 入力\n- `docs/agent/agent-application-definition.md`（Step.8.1 の成果物）\n- `docs/catalog/service-catalog-matrix.md`\n- `docs/catalog/domain-analytics.md`\n- `docs/catalog/data-model.md`\n- `docs/catalog/app-catalog.md`（アプリケーション一覧）\n- `users-guide/08-ai-agent.md`（設計ガイドライン Step 2）\n\n## 出力\n- `docs/agent/agent-architecture.md`\n\n## Custom Agent\n`Arch-AIAgentDesign` を使用\n\n## 依存\n- Step.8.1（AI Agent アプリケーション定義）が `aad:done` であること\n\n## 完了条件\n- `docs/agent/agent-architecture.md` が作成されている\n- 完了時に自身に `aad:done` ラベルを付与すること%s' \
                "${ROOT_REF}" "${ADDITIONAL_SECTION}")
              if RESP=$(create_issue \
                "[AAD] Step.8.2: AI Agent 粒度設計" \
                "${BODY_S82}" \
                "${STEP_LABELS}"); then
                S82_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
                S82_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
                echo "Step.8.2 作成: #${S82_NUM}"
                sleep 3
              else
                post_comment "${ROOT_ISSUE}" "⚠️ Step Issue 生成失敗: [AAD] Step.8.2: AI Agent 粒度設計 (ワークフローログを確認し、再実行または手動対応してください)" || true
                echo "ERROR: create_issue failed for: [AAD] Step.8.2: AI Agent 粒度設計" >&2
              fi
            fi

            # Step.8.3
            if ! skip_step "8.3"; then
              BODY_S83=$(printf '%s\n## 目的\nStep.8.2 の Agent Catalog の各 Agent について詳細設計書を作成し、Agent 一覧を更新する。\n\n## 入力\n- `docs/agent/agent-architecture.md`（Step.8.2 の成果物）\n- `docs/agent/agent-application-definition.md`（Step.8.1 の成果物）\n- `docs/catalog/service-catalog-matrix.md`\n- `docs/services/SVC-*.md`（関連サービスのみ）\n- `docs/catalog/app-catalog.md`（アプリケーション一覧）\n- `users-guide/08-ai-agent.md`（設計ガイドライン Step 3）\n\n## 出力\n- `docs/agent/agent-detail-<Agent-ID>-<Agent名>.md`（Agent ごとに1ファイル）\n- `docs/ai-agent-catalog.md`（Agent 一覧）\n\n## Custom Agent\n`Arch-AIAgentDesign` を使用\n\n## 依存\n- Step.8.2（AI Agent 粒度設計）が `aad:done` であること\n\n## 完了条件\n- `docs/agent/` 配下に Agent ごとの詳細設計書が作成されている\n- `docs/ai-agent-catalog.md` が作成/更新されている\n- 完了時に自身に `aad:done` ラベルを付与すること%s' \
                "${ROOT_REF}" "${ADDITIONAL_SECTION}")
              if RESP=$(create_issue \
                "[AAD] Step.8.3: AI Agent 詳細設計" \
