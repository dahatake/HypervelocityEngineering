                S73_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
                echo "Step.7.3 作成: #${S73_NUM}"
                sleep 3
              else
                post_comment "${ROOT_ISSUE}" "⚠️ Step Issue 生成失敗: [AAD] Step.7.3: TDDテスト仕様書 (ワークフローログを確認し、再実行または手動対応してください)" || true
                echo "ERROR: create_issue failed for: [AAD] Step.7.3: TDDテスト仕様書" >&2
              fi
            fi
          fi

          # ---- Step.8 ----
          if ! skip_step "8" && ! skip_step "7" && ! skip_step "7.3"; then
            BODY_S8=$(printf '%s\n## Step.8 コンテナ\nStep.8 はコンテナ Issue。Sub Task（Step.8.1, Step.8.2, Step.8.3）の完了を待つ。%s' \
              "${ROOT_REF}" "${ADDITIONAL_SECTION}")
            if RESP=$(create_issue \
              "[AAD] Step.8: AI Agent 設計" \
              "${BODY_S8}" \
              "${STEP_LABELS}"); then
              S8_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
              S8_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
              echo "Step.8 作成: #${S8_NUM}"
              sleep 3
            else
              post_comment "${ROOT_ISSUE}" "⚠️ Step Issue 生成失敗: [AAD] Step.8: AI Agent 設計 (ワークフローログを確認し、再実行または手動対応してください)" || true
              echo "ERROR: create_issue failed for: [AAD] Step.8: AI Agent 設計" >&2
