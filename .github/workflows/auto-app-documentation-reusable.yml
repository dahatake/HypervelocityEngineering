name: ADOC Orchestrator

# auto-app-documentation ラベル付き Issue の opened/labeled/closed イベントで起動
on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: ''
      issue_number:
        required: true
        type: string
      event_action:
        required: false
        type: string
        default: ''
      label_name:
        required: false
        type: string
        default: ''
      issue_labels:
        required: false
        type: string
        default: '[]'

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: adoc-orchestrator-${{ inputs.issue_number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}

    steps:
      - name: 実行ゲートチェック
        id: gate
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EVENT_ACTION: ${{ inputs.event_action }}
          LABEL_NAME: "${{ inputs.label_name }}"
        run: |
          set -euo pipefail

          if ! ISSUE_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}"); then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ISSUE_TITLE=$(echo "${ISSUE_RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          ISSUE_LABELS=$(echo "${ISSUE_RESPONSE}" | python3 -c "import sys,json; print(json.dumps([l['name'] for l in json.load(sys.stdin).get('labels',[])]))")
          export ISSUE_TITLE

          if [[ "${EVENT_ACTION}" == "labeled" ]]; then
            if [[ "${LABEL_NAME}" == "adoc:done" ]]; then
              if [[ "${ISSUE_TITLE}" =~ ^\[ADOC\] ]]; then
                echo "mode=delegate_advance" >> "$GITHUB_OUTPUT"
                echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            elif [[ "${LABEL_NAME}" != "auto-app-documentation" ]]; then
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [[ "${EVENT_ACTION}" == "closed" ]]; then
            if [[ "${ISSUE_TITLE}" =~ ^\[ADOC\] ]]; then
              # adoc:done の有無に関わらず closed 時は skip
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${ISSUE_TITLE}" =~ ^\[ADOC\] ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_adoc=$(echo "${ISSUE_LABELS}" | python3 -c "import sys, json; labels = json.load(sys.stdin); print('true' if 'auto-app-documentation' in labels else 'false')")

          if [[ "${has_adoc}" != "true" ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_init=$(echo "${ISSUE_LABELS}" | python3 -c "import sys, json; labels = json.load(sys.stdin); skip_labels = {'adoc:initialized', 'adoc:ready', 'adoc:running', 'adoc:done', 'adoc:blocked', 'adoc:qa-ready'}; print('true' if any(l in skip_labels for l in labels) else 'false')")

          if [[ "${has_init}" == "true" ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=initialize" >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: ラベル bootstrap
        if: steps.gate.outputs.mode == 'initialize'
        run: |
          set -euo pipefail
          # ラベル作成関数（インライン定義: checkout 前でも動作可能にするため）
          create_label() {
            local name="$1" color="$2" desc="${3:-}"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/labels" \
              -d "{\"name\":\"${name}\",\"color\":\"${color}\",\"description\":\"${desc}\"}")
            case "${http_code}" in
              201) echo "ラベル作成: ${name}" ;;
              422) echo "ラベル既存（スキップ）: ${name}" ;;
              *)   echo "ラベル作成エラー: ${name} HTTP ${http_code}" ;;
            esac
            sleep 1
          }

          create_label "auto-app-documentation" "0E8A16" "run app documentation workflow (progressive documentation generation)"
          create_label "adoc:initialized" "C5DEF5" ""
          create_label "adoc:ready" "0075CA" ""
          create_label "adoc:running" "E4E669" ""
          create_label "adoc:done" "0E8A16" ""
          create_label "adoc:blocked" "D73A4A" ""
          create_label "auto-context-review" "1D76DB" "auto context review trigger for copilot-auto-review workflow"
          create_label "auto-qa" "BFD4F2" "auto qa trigger for copilot-auto-qa workflow"
          create_label "auto-approve-ready" "1D76DB" "Ready for auto-approve and auto-merge"

      - name: 即時 adoc:initialized 付与（二重実行防止）
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail
          success=0
          for attempt in 1 2 3; do
            if curl -sf -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/labels" \
              -d '{"labels":["adoc:initialized"]}' > /dev/null; then
              success=1
              break
            fi
            sleep 2
          done
          [[ "${success}" -eq 1 ]]

      - name: Checkout repository
        if: steps.gate.outputs.mode == 'initialize'
        uses: actions/checkout@v4

      - name: Issue 初期化と Step.1 生成
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
          # 状態メモ用途: ADOC はテンプレートファイル単一ソース方式で運用している。
          # USE_HVE_ADOC はその状態を明示的に記録するための変数であり、
          # このワークフロー内の分岐条件には未使用。
          # vars.USE_HVE_ADOC を切り替えても、このワークフローの挙動は変わらない。
          # 実際のテンプレート利用は advance-subissues.yml の adoc:done ハンドラ側。
          USE_HVE_ADOC: ${{ vars.USE_HVE_ADOC || 'true' }}
        run: |
          set -euo pipefail

          ISSUE_BODY=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          export ISSUE_BODY
          ROOT_ISSUE="${ISSUE_NUMBER}"

          # ---- ユーティリティ関数（auto-app-selection.yml と同一） ----
          api_call() {
            local method="$1"; shift
            local url="$1"; shift
            local data="${1:-}"
            local max_retry=5
            local wait=1
            local http_code response body

            for i in $(seq 1 "${max_retry}"); do
              if [[ -n "${data}" ]]; then
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  -H "Content-Type: application/json" \
                  "${url}" \
                  -d "${data}")
              else
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${url}")
              fi
              http_code=$(echo "${response}" | tail -1)
              body=$(echo "${response}" | head -n -1)
              if [[ "${http_code}" =~ ^2 ]]; then
                echo "${body}"
                return 0
              fi
              sleep "${wait}"
              wait=$((wait * 2))
            done
            return 1
          }

          create_issue() {
            local title="$1"
            local body="$2"
            local labels_json="$3"
            local data
            data=$(python3 - "${title}" "${body}" "${labels_json}" <<'PY'
          import json, sys
          title = sys.argv[1]
          body  = sys.argv[2]
          labels = json.loads(sys.argv[3])
          print(json.dumps({'title': title, 'body': body, 'labels': labels}))
          PY
            )
            api_call POST "https://api.github.com/repos/${REPO}/issues" "${data}"
          }

          link_sub_issue() {
            local parent_num="$1"
            local child_id="$2"
            local data="{\"sub_issue_id\":${child_id}}"
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${parent_num}/sub_issues" \
              "${data}" || true
            sleep 1
          }

          add_label() {
            local issue_num="$1"
            local label="$2"
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/labels" \
              "{\"labels\":[\"${label}\"]}" > /dev/null
            sleep 1
          }

          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/assign-copilot.sh"

          post_comment() {
            local issue_num="$1"
            local body="$2"
            local data
            data=$(python3 -c "import sys,json; print(json.dumps({'body': sys.argv[1]}))" "${body}")
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/comments" \
              "${data}" > /dev/null
            sleep 1
          }

          extract_custom_agent() {
            local body="$1"
            echo "${body}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'## Custom Agent\s*\n\s*`([^`]+)`', body)
          print(m.group(1) if m else '')
          PY
          }

          PARSED=$(python3 - <<'PYEOF'
          import os, re, json
          body = os.environ.get("ISSUE_BODY", "")

          branch = "main"
          m = re.search(r"###\s*対象ブランチ\s*\n+(.+)", body)
          if m:
              val = m.group(1).strip()
              if val and val != "_No response_":
                  branch = val

          skip_steps = set()
          exec_section = re.search(r"###\s*実行するステップ\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
          if exec_section:
              section = exec_section.group(1)
              all_items = re.findall(r"-\s*\[[ xX]\]\s*Step\.(\d+)", section)
              checked = re.findall(r"-\s*\[[xX]\]\s*Step\.(\d+)", section)
              all_steps = set(all_items)
              checked_steps = set(checked)
              skip_steps = all_steps - checked_steps
              if not checked_steps and all_steps:
                  skip_steps = set()

          additional_comment = ""
          m = re.search(r"###\s*追加コメント[^\n]*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              val = m.group(1).strip()
              if val != "_No response_":
                  additional_comment = val


          def parse_checkbox(title):
              sec = re.search(rf"###\s*{re.escape(title)}\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
              if not sec:
                  return False
              txt = sec.group(1)
              if re.search(r"スキップする", txt):
                  return not bool(re.search(r"-\s*\[[xX]\]", txt))
              return bool(re.search(r"-\s*\[[xX]\]", txt))

          auto_context_review = parse_checkbox("レビュー設定")
          auto_qa = parse_checkbox("質問票設定")
          auto_merge = parse_checkbox("PR完全自動化設定")

          def parse_field(title, default=""):
              m = re.search(rf"###\s*{re.escape(title)}[^\n]*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
              if not m:
                  return default
              value = m.group(1).strip()
              if not value or value == "_No response_":
                  return default
              return value

          target_dirs = parse_field("対象ディレクトリ（任意）", "")
          exclude_patterns = parse_field("除外パターン（任意）", "node_modules/,vendor/,dist/,*.lock,__pycache__/")
          doc_purpose = parse_field("ドキュメントの主目的", "all")
          max_file_lines = parse_field("大規模ファイル分割閾値", "500")

          si_section = re.search(r"###\s*自己改善ループ設定\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
          enable_self_improve = bool(si_section and re.search(r"-\s*\[[xX]\]", si_section.group(1)))

          si_iter_raw = parse_field("自己改善 最大イテレーション数", "3 (デフォルト)")
          n = re.match(r"(\d+)", si_iter_raw.strip())
          self_improve_max_iterations = n.group(1) if n else "3"

          si_qual_raw = parse_field("自己改善 品質スコア閾値", "80 (デフォルト)")
          q = re.match(r"(\d+)", si_qual_raw.strip())
          self_improve_quality_threshold = q.group(1) if q else "80"

          result = {
              "branch": branch,
              "skip_steps": sorted(list(skip_steps)),
              "additional_comment": additional_comment,
              "auto_context_review": auto_context_review,
              "auto_qa": auto_qa,
              "auto_merge": auto_merge,
              "target_dirs": target_dirs,
              "exclude_patterns": exclude_patterns,
              "doc_purpose": doc_purpose,
              "max_file_lines": max_file_lines,
              "enable_self_improve": enable_self_improve,
              "self_improve_max_iterations": self_improve_max_iterations,
              "self_improve_quality_threshold": self_improve_quality_threshold,
          }
          print(json.dumps(result))
          PYEOF
          )

          BRANCH=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['branch'])")
          SKIP_STEPS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(' '.join(d['skip_steps']))")
          ADDITIONAL_COMMENT=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['additional_comment'])")
          AUTO_CONTEXT_REVIEW=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_context_review') else 'false')")
          AUTO_QA=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_qa') else 'false')")
          AUTO_MERGE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_merge') else 'false')")
          ENABLE_SELF_IMPROVE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('enable_self_improve') else 'false')")
          SELF_IMPROVE_MAX_ITER=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('self_improve_max_iterations','3'))")
          SELF_IMPROVE_QUALITY_THRESHOLD=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('self_improve_quality_threshold','80'))")
          MODEL_RAW=$(extract_model "${ISSUE_BODY}")
          SELECTED_MODEL=$(resolve_model "${MODEL_RAW}")
          TARGET_DIRS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['target_dirs'])")
          EXCLUDE_PATTERNS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['exclude_patterns'])")
          DOC_PURPOSE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['doc_purpose'])")
          MAX_FILE_LINES=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['max_file_lines'])")

          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-context-review"
          fi
          if [[ "${AUTO_QA}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-qa"
          fi
          if [[ "${AUTO_MERGE}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-approve-ready"
          fi
          if [[ -n "${SELECTED_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "model/${SELECTED_MODEL}" || true
          fi

          # ---- Root Issue body に auto-context-review / auto-qa / auto-merge / branch / self-improve タグを埋め込み ----
          export AUTO_CONTEXT_REVIEW AUTO_QA AUTO_MERGE BRANCH ENABLE_SELF_IMPROVE SELF_IMPROVE_MAX_ITER SELF_IMPROVE_QUALITY_THRESHOLD
          _ROOT_UPDATED=$(python3 - <<'PY'
          import os, re
          body = os.environ.get("ISSUE_BODY", "")
          meta = [
              ("auto-context-review", os.environ.get("AUTO_CONTEXT_REVIEW", "false")),
              ("auto-qa", os.environ.get("AUTO_QA", "false")),
              ("auto-merge", os.environ.get("AUTO_MERGE", "false")),
              ("branch", os.environ.get("BRANCH", "main")),
              ("enable-self-improve", os.environ.get("ENABLE_SELF_IMPROVE", "false")),
              ("self-improve-max-iterations", os.environ.get("SELF_IMPROVE_MAX_ITER", "3")),
              ("self-improve-quality-threshold", os.environ.get("SELF_IMPROVE_QUALITY_THRESHOLD", "80")),
          ]
          updated = body
          for key, value in meta:
              tag = f"<!-- {key}: {value} -->"
              pat = re.compile(rf"<!--\s*{re.escape(key)}\s*:[^>]*-->")
              if pat.search(updated):
                  updated = pat.sub(tag, updated, count=1)
              else:
                  updated += f"\n{tag}"
          print(updated)
          PY
          )
          export _ROOT_UPDATED
          _ROOT_PAYLOAD=$(python3 - <<'PY'
          import json, os
          print(json.dumps({"body": os.environ.get("_ROOT_UPDATED", "")}))
          PY
          )
          api_call PATCH "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" "${_ROOT_PAYLOAD}" > /dev/null || true

          ROOT_REF=$(printf '<!-- root-issue: #%s -->\n<!-- branch: %s -->\n<!-- auto-context-review: %s -->\n<!-- auto-qa: %s -->\n<!-- auto-merge: %s -->\n<!-- target-dirs: %s -->\n<!-- exclude-patterns: %s -->\n<!-- doc-purpose: %s -->\n<!-- max-file-lines: %s -->' "${ROOT_ISSUE}" "${BRANCH}" "${AUTO_CONTEXT_REVIEW}" "${AUTO_QA}" "${AUTO_MERGE}" "${TARGET_DIRS}" "${EXCLUDE_PATTERNS}" "${DOC_PURPOSE}" "${MAX_FILE_LINES}")

          # 追加コンテキスト参照セクション（QA/Review 反映ルール — Phase 3 追加）
          QA_REVIEW_SECTION=$(printf '\n\n## 追加コンテキストの参照\n\n以下が存在する場合は必ず参照してください。存在しない情報は推測せず、必要に応じて不足事項として記録してください。\n\n- `qa/` 配下の、この Root Issue / Step / PR に関連する QA 回答\n- この PR または関連 Issue のレビュー指摘\n- Self-Improve 結果または改善計画（存在する場合のみ）\n- `## 入力` に記載された前 Step 成果物\n- 追加で注入された既存成果物・reuse context\n\n参照した QA / Review / Self-Improve の内容は、成果物へ反映してください。反映しない場合は理由を完了コメントまたは成果物内に記録してください。')
          if [[ -n "${ADDITIONAL_COMMENT}" ]]; then
            ADDITIONAL_SECTION="${QA_REVIEW_SECTION}$(printf '\n\n## 追加コメント\n%s' "${ADDITIONAL_COMMENT}")"
          else
            ADDITIONAL_SECTION="${QA_REVIEW_SECTION}"
          fi
            post_comment "${ROOT_ISSUE}" "⚠️ Step.1 がスキップ指定のため、初期Waveで作成される Sub-issue はありません。"
            exit 0
          fi

          TEMPLATE_PATH="${GITHUB_WORKSPACE}/.github/scripts/templates/adoc/step-1.md"
          BODY_S1=$(python3 - "${TEMPLATE_PATH}" "${ROOT_REF}" "${TARGET_DIRS}" "${EXCLUDE_PATTERNS}" "${DOC_PURPOSE}" "${MAX_FILE_LINES}" "${ADDITIONAL_SECTION}" <<'PY'
          import sys
          from pathlib import Path
          p = Path(sys.argv[1])
          body = p.read_text(encoding='utf-8')
          body = body.replace('{root_ref}', sys.argv[2])
          body = body.replace('{target_dirs}', sys.argv[3])
          body = body.replace('{exclude_patterns}', sys.argv[4])
          body = body.replace('{doc_purpose}', sys.argv[5])
          body = body.replace('{max_file_lines}', str(sys.argv[6]))
          body = body.replace('{additional_section}', sys.argv[7])
          print(body)
          PY
          )

          STEP_LABELS=$(python3 - "${AUTO_CONTEXT_REVIEW}" "${AUTO_QA}" "${AUTO_MERGE}" <<'PY'
          import json, sys
          labels = ["auto-app-documentation"]
          if sys.argv[1] == "true":
              labels.append("auto-context-review")
          if sys.argv[2] == "true":
              labels.append("auto-qa")
          if sys.argv[3] == "true":
              labels.append("auto-approve-ready")
          print(json.dumps(labels))
          PY
          )
          if [[ -n "${SELECTED_MODEL}" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c --arg ml "model/${SELECTED_MODEL}" '. + [$ml]')
          fi

          RESP=$(create_issue "[ADOC] Step.1: ファイルインベントリ" "${BODY_S1}" "${STEP_LABELS}")
          S1_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
          S1_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")

          link_sub_issue "${ROOT_ISSUE}" "${S1_ID}"
          if [[ "${AUTO_QA}" == "true" ]]; then
            add_label "${S1_NUM}" "adoc:qa-ready"
            echo "Step.1 (#${S1_NUM}) に adoc:qa-ready を付与しました（QA 完了待ち）。Copilot アサインは QA 回答後に実行されます。"
          else
            add_label "${S1_NUM}" "adoc:ready"
            CA=$(extract_custom_agent "${BODY_S1}")
            if assign_copilot "${S1_NUM}" "${CA}" "${BRANCH}" "" "${SELECTED_MODEL}"; then
              add_label "${S1_NUM}" "adoc:running"
            fi
          fi

      - name: 状態遷移は advance-subissues.yml に委譲
        if: steps.gate.outputs.mode == 'delegate_advance'
        run: |
          echo "adoc:done を検知しました。advance-subissues.yml が次ステップ生成を担当します。"

  self-improve:
    needs: orchestrate
    if: needs.orchestrate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Parse Self-Improve settings
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          body=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" --jq '.body // ""' 2>/dev/null || true)
          # HTML コメント形式（workflow init で埋め込まれた場合）を優先
          enable=$(printf '%s' "${body}" | sed -n 's/^.*<!-- enable-self-improve: *\([^>]*\) *-->.*$/\1/p' | head -1 | tr '[:upper:]' '[:lower:]' | xargs || true)
          max_iter=$(printf '%s' "${body}" | sed -n 's/^.*<!-- self-improve-max-iterations: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          branch=$(printf "%s" "${body}" | sed -n 's/^.*<!-- branch: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          quality_threshold=$(printf '%s' "${body}" | sed -n 's/^.*<!-- self-improve-quality-threshold: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          # フォールバック: Issue Form Markdown 形式
          if [[ -z "${enable}" ]]; then
            enable=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善ループ設定.*?\n(.*?)(?=###|\Z)', body, re.DOTALL)
          print('true' if (m and re.search(r'-\s*\[[xX]\]', m.group(1))) else 'false')
          " 2>/dev/null || echo "false")
          fi
          if [[ -z "${max_iter}" ]]; then
            max_iter=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善\s*最大イテレーション数.*?\n+(.+)', body)
          if m:
              n = re.match(r'(\d+)', m.group(1).strip())
              print(n.group(1) if n else '3')
          else:
              print('3')
          " 2>/dev/null || echo "3")
          fi
          if [[ -z "${quality_threshold}" ]]; then
            quality_threshold=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善\s*品質スコア閾値.*?\n+(.+)', body)
          if m:
              n = re.match(r'(\d+)', m.group(1).strip())
              print(n.group(1) if n else '80')
          else:
              print('80')
          " 2>/dev/null || echo "80")
          fi
          if [[ -z "${branch}" ]]; then
            branch=$(printf "%s" "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*対象ブランチ.*?\n+(.+)', body)
          if m:
              val = m.group(1).strip()
              print(val if val and val != '_No response_' else 'main')
          else:
              print('main')
          " 2>/dev/null || echo "main")
          fi
          [[ -z "${enable}" ]] && enable="false"
          [[ -z "${max_iter}" ]] && max_iter="3"
          [[ -z "${quality_threshold}" ]] && quality_threshold="80"
          echo "enable=${enable}" >> "$GITHUB_OUTPUT"
          echo "max_iter=${max_iter}" >> "$GITHUB_OUTPUT"
          echo "quality_threshold=${quality_threshold}" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          ref: ${{ steps.parse.outputs.branch }}

      - name: Skip Self-Improve when branch is missing
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch == ''
        run: |
          echo "Skip Self-Improve: issue body に branch 情報がありません。"
      - uses: actions/setup-python@v5
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          node-version: "20"
      - name: Install dependencies
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        run: |
          pip install ruff pytest pytest-cov
          npm install -g markdownlint-cli
      - name: Run Self-Improve
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        env:
          MAX_ITERATIONS: ${{ steps.parse.outputs.max_iter }}
          QUALITY_THRESHOLD: ${{ steps.parse.outputs.quality_threshold }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c "
          import os
          from hve.self_improve import run_improvement_loop
          from hve.config import SDKConfig
          config = SDKConfig.from_env()
          config.auto_self_improve = True
          config.self_improve_scope = "workflow"
          config.self_improve_max_iterations = int(os.environ.get('MAX_ITERATIONS', '3'))
          config.self_improve_quality_threshold = int(os.environ.get('QUALITY_THRESHOLD', '80'))
          result = run_improvement_loop(config=config, repo_root='.')
          print(f'Self-Improve: {result[\"stopped_reason\"]} (score={result[\"final_score\"]})')
          "
      - name: Commit improvements
        if: steps.parse.outputs.enable == 'true' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "[Self-Improve] 自動品質改善"
          branch='${{ steps.parse.outputs.branch }}'
          git check-ref-format --branch "${branch}" >/dev/null 2>&1 || {
            echo "Invalid branch name: ${branch}" >&2
            exit 1
          }
          git push origin "HEAD:refs/heads/${branch}"
