name: ABDV Orchestrator

# auto-batch-dev ラベル付き Issue の opened/labeled/closed イベントで起動。
#
# 設計メモ:
#   - Issue Template の labels: でラベルを付与した場合、GitHub は issues.labeled イベントを
#     発火せず issues.opened のみを発火する（GitHub Community Discussion #26753）。
#   - そのため opened イベントも監視し、ジョブレベル if で対象ラベルを持つ Issue のみ実行する。
#   - opened イベント時は github.event.label が null のため LABEL_NAME は空文字列になる。
#   - 既存の冪等化ガード（abdv:initialized チェック）により、opened + labeled が同時発火しても安全。
#
# ワークフロー概要（ABDV = Batch Dev）:
#   Step.1.1 — データサービス選定          (Dev-Microservice-Azure-DataDesign)
#   Step.1.2 — Azure リソース Deploy        (Dev-Microservice-Azure-DataDeploy)          ← Step.1.1 完了後
#   Step.2.1 — TDD RED: テストコード作成   (Dev-Batch-TestCoding)              ← Step.1.2 完了後
#   Step.2.2 — TDD GREEN: 本実装           (Dev-Batch-ServiceCoding)            ← Step.2.1 完了後
#   Step.3   — Azure Functions/コンテナ Deploy (Dev-Batch-FunctionsDeploy)               ← Step.2.2 完了後
#   Step.4.1 — WAF レビュー                (QA-AzureArchitectureReview)        ← Step.3 完了後（並列）
#   Step.4.2 — 整合性チェック              (QA-AzureDependencyReview)          ← Step.3 完了後（並列）
#
# 状態ラベル（abdv: プレフィックス）:
#   abdv:initialized — Bootstrap 完了（Sub Issue 生成済み）
#   abdv:ready       — 実行待ち
#   abdv:running     — Copilot 実行中
#   abdv:done        — Step 完了（Sub Issue に付与 → 次 Step の起動トリガー）
#   abdv:blocked     — 依存先未完了でブロック中
#
# 依存関係 DAG:
#   Step.1.1 → Step.1.2 → Step.2.1 → Step.2.2 → Step.3 → Step.4.1 ‖ Step.4.2
#   Step.4.1 AND Step.4.2 → Root abdv:done（AND 依存）
on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: ''
      issue_number:
        required: true
        type: string
      event_action:
        required: false
        type: string
        default: ''
      label_name:
        required: false
        type: string
        default: ''
      issue_labels:
        required: false
        type: string
        default: '[]'
      runner_type:
        description: "実行 Runner 種別: github-hosted | self-hosted"
        required: false
        type: string
        default: "github-hosted"

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  check_qa_skip:
    uses: ./.github/workflows/check-auto-qa-skip-reusable.yml
    with:
      issue_number: ${{ fromJSON(inputs.issue_number) }}
      issue_labels: ${{ inputs.issue_labels }}
      issue_body: ''
    secrets: inherit

  orchestrate:
    needs: check_qa_skip
    runs-on: ${{ fromJSON(inputs.runner_type == 'self-hosted' && '["self-hosted","linux","x64","aca"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 360
    concurrency:
      group: abdv-orchestrator-${{ inputs.issue_number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}
      SKIP_AUTO_QA: ${{ needs.check_qa_skip.outputs.skip_auto_qa }}
      SKIP_AUTO_QA_REASON: ${{ needs.check_qa_skip.outputs.skip_reason }}

    steps:
      # ----------------------------------------------------------------
      # 1. 実行ゲート: auto-batch-dev ラベルあり + abdv:initialized なし
      # ----------------------------------------------------------------
      - name: 実行ゲートチェック
        id: gate
        env:
          ISSUE_LABELS: ${{ inputs.issue_labels }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EVENT_ACTION: ${{ inputs.event_action }}
          LABEL_NAME: "${{ inputs.label_name }}"
        run: |
          set -euo pipefail

          # Issue title を API 経由で安全に取得（YAML 展開問題を回避）
          ISSUE_TITLE=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          export ISSUE_TITLE

          # labeled イベントの処理
          if [[ "${EVENT_ACTION}" == "labeled" ]]; then
            if [[ "${LABEL_NAME}" == "abdv:done" ]]; then
              echo "mode=state_transition" >> "$GITHUB_OUTPUT"
              echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
              exit 0
            elif [[ "${LABEL_NAME}" == "auto-batch-dev" ]]; then
              # auto-batch-dev ラベルが後から付与された場合:
              # 下の has_abdv / has_init チェックが未初期化かどうかを判定し、未初期化なら initialize に進む。
              # 既に abdv:initialized 済みの場合は has_init チェックで skip になる。
              echo "auto-batch-dev labeled イベント: initialize ゲートチェックへ進みます。"
            else
              echo "abdv:done / auto-batch-dev 以外の labeled イベント（${LABEL_NAME}）。スキップ。"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # closed イベントの処理
          if [[ "${EVENT_ACTION}" == "closed" ]]; then
            # [ABDV] Sub Issue のみ処理
            if [[ "${ISSUE_TITLE}" =~ ^\[ABDV\] ]]; then
              # ---- ラベル一覧はイベント payload から取得（env: ISSUE_LABELS） ----
              echo "ラベル（closed payload）: ${ISSUE_LABELS}"
              # 既に abdv:done がついている場合は closed イベントで再判定に進む
              has_done=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          print('true' if 'abdv:done' in labels else 'false')
          PY
              )
              if [[ "${has_done}" == "true" ]]; then
                # abdv:done labeled 時は Issue 未クローズのため自動クローズ判定が失敗する。
                # closed イベントで再度コンテナ自動クローズ判定のみ実行する。
                echo "abdv:done ラベル済み + closed イベント: コンテナ自動クローズ判定のみ実行。"
                echo "mode=container_close_check" >> "$GITHUB_OUTPUT"
                echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              # abdv:done がない場合は closed イベントから直接 state_transition を起動
              echo "mode=state_transition" >> "$GITHUB_OUTPUT"
              echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "closed イベント: [ABDV] Sub Issue 以外のためスキップ。"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # [ABDV] プレフィックスを持つ Sub Issue は初期化をスキップ
          # （Sub Issue の opened イベントによる再帰的な初期化を防止）
          if [[ "${ISSUE_TITLE}" =~ ^\[ABDV\] ]]; then
            echo "[ABDV] Sub Issue のため初期化対象外。スキップ。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ---- リアルタイムにラベル一覧を API 経由で取得（payload はスナップショットのため） ----
          ISSUE_LABELS=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.dumps([l['name'] for l in json.load(sys.stdin).get('labels',[])]))")
          echo "リアルタイムラベル: ${ISSUE_LABELS}"
          # auto-batch-dev ラベルを持つか確認
          has_abdv=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          print('true' if 'auto-batch-dev' in labels else 'false')
          PY
          )

          if [[ "${has_abdv}" != "true" ]]; then
            echo "auto-batch-dev ラベルなし。スキップ。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # abdv:initialized / abdv:ready / abdv:running / abdv:done / abdv:blocked
          # のいずれかを持つ場合はスキップ（冪等化・Sub Issue への誤再初期化防止）
          has_init=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          skip_labels = {'abdv:initialized', 'abdv:ready', 'abdv:running', 'abdv:done', 'abdv:blocked', 'abdv:qa-ready'}
          print('true' if any(l in skip_labels for l in labels) else 'false')
          PY
          )

          if [[ "${has_init}" == "true" ]]; then
            echo "abdv:* ラベル済み。スキップ（冪等化）。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=initialize" >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: ゲート結果のデバッグ出力
        if: always()
        env:
          GATE_MODE: ${{ steps.gate.outputs.mode }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EVENT_ACTION: ${{ inputs.event_action }}
        run: |
          echo "::notice::ゲート判定結果: mode=${GATE_MODE}, event=${EVENT_ACTION}, issue=#${ISSUE_NUMBER}"
          if [[ "${GATE_MODE}" == "skip" ]]; then
            echo "::notice::Issue #${ISSUE_NUMBER} のゲートチェックは skip でした（event: ${EVENT_ACTION}）"
          fi

      # ----------------------------------------------------------------
      # 1.5. リポジトリ checkout（abd-common.sh を利用するため）
      # ----------------------------------------------------------------
      - name: Checkout repository
        if: steps.gate.outputs.mode != 'skip'
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. ラベル bootstrap
      # ----------------------------------------------------------------
      - name: ラベル bootstrap
        if: steps.gate.outputs.mode == 'initialize'
        run: |
          set -euo pipefail

          # ラベルを作成する関数（422 = 既存の場合は無視）
          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/label-helpers.sh"

          create_label "auto-batch-dev" "0E8A16" "run full batch dev workflow (Azure resource, coding, deploy, review)"
          create_label "abdv:initialized"            "C5DEF5" ""
          create_label "abdv:ready"                  "0075CA" ""
          create_label "abdv:running"                "E4E669" ""
          create_label "abdv:done"                   "0E8A16" ""
          create_label "abdv:blocked"                "D73A4A" ""
          create_label "auto-context-review"        "1D76DB" "auto context review trigger for copilot-auto-review workflow"
          create_label "auto-qa"                     "BFD4F2" "auto QA trigger for copilot-auto-qa workflow"
          create_label "auto-approve-ready"          "1D76DB" "trigger auto-approve and auto-merge for PR (added by orchestrators when auto-merge is enabled)"

      # ----------------------------------------------------------------
      # 2.5. 即時 abdv:initialized 付与（二重実行防止）
      # ----------------------------------------------------------------
      - name: 即時 abdv:initialized 付与（二重実行防止）
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail
          # 共通ユーティリティ（ラベル付与・API リトライなど）を読み込む
          source .github/scripts/abd-common.sh

          echo "二重実行防止のため abdv:initialized を即座に付与します..."
          add_label "${ISSUE_NUMBER}" "abdv:initialized"
          echo "abdv:initialized を Issue #${ISSUE_NUMBER} に付与しました。"

      # ----------------------------------------------------------------
      # 3. Issue 初期化と Step Issue 生成
      # ----------------------------------------------------------------
      - name: Issue 初期化とStep Issue 生成
        if: steps.gate.outputs.mode == 'initialize'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail

          # Issue body を API 経由で安全に取得（YAML 展開問題を回避）
          ISSUE_BODY=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          export ISSUE_BODY

          if [[ -z "${COPILOT_PAT:-}" ]]; then
            echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインは全てスキップされます。" >&2
          fi

          ROOT_ISSUE="${ISSUE_NUMBER}"

          # ---- ユーティリティ関数 ----
          source "${GITHUB_WORKSPACE}/.github/scripts/abd-common.sh"
          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/assign-copilot.sh"

          # ---- 共通: app-arch filter エラー分類関数 ----
          _post_app_arch_filter_error() {
            local _root="$1"
            local _result="$2"
            local _catalog="$3"
            local _err
            _err=$(echo "${_result}" | python3 "${GITHUB_WORKSPACE}/.github/scripts/python/parse_filter_error.py" 2>/dev/null || echo "")

            local _msg
            if [[ -z "${_err}" ]]; then
              _msg="⚠️ エラー: app-arch filter が予期せず失敗しました（exit 1, 詳細不明）。ワークフローログを確認してください。catalog: \`${_catalog}\`"
            else
              case "${_err}" in
                *"catalog ファイルが見つかりません"*)
                  _msg="⚠️ エラー: \`${_catalog}\` が見つかりません。Architecture Design (AAS) を先に実行してください。"
                  ;;
                *"セクションが見つかりません"*)
                  _msg="⚠️ エラー: \`${_catalog}\` の見出し \`## A) サマリ表（全APP横断）\` セクションが見つかりません。出力契約 (.github/skills/planning/architecture-questionnaire/assets/output-format.md §7.2) に沿って見出しを修正するか、AAS Step.2 を再実行してください。詳細: ${_err}"
                  ;;
                *"Markdown テーブルが見つかりません"*)
                  _msg="⚠️ エラー: \`${_catalog}\` の \`A) サマリ表\` セクションに Markdown テーブルが見つかりません。詳細: ${_err}"
                  ;;
                *"\`APP-ID\` 列が見つかりません"*|*"\`推薦アーキテクチャ\` 列が見つかりません"*)
                  _msg="⚠️ エラー: \`${_catalog}\` のサマリ表に必要な列（\`APP-ID\` または \`推薦アーキテクチャ\`）が見つかりません。詳細: ${_err}"
                  ;;
                *)
                  _msg="⚠️ エラー: app-arch filter: ${_err}"
                  ;;
              esac
            fi
            echo "ERROR: app-arch filter: ${_err:-（詳細なし）}" >&2
            post_comment "${_root}" "${_msg}"
          }

          # ---- Issue body パース ----
          PARSED=$(python3 - <<'PYEOF'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")

          # ブランチ名抽出（input フォームの値）
          branch = "main"
          m = re.search(r"###\s*対象ブランチ\s*\n+(.+)", body)
          if m:
              branch = m.group(1).strip()
              if not branch or branch == "_No response_":
                  branch = "main"

          # リソースグループ名抽出
          resource_group = ""
          m = re.search(r"###\s*リソースグループ名\s*\n+(.+)", body)
          if m:
              resource_group = m.group(1).strip()
              if resource_group == "_No response_":
                  resource_group = ""

          # 対象バッチジョブ ID 抽出
          batch_job_ids = ""
          m = re.search(r"###\s*対象バッチジョブ\s*ID（カンマ区切り）\s*\n+(.+)", body)
          if m:
              batch_job_ids = m.group(1).strip()
              if batch_job_ids == "_No response_":
                  batch_job_ids = ""

          # 実行するステップからスキップ対象を検出
          # checkboxes は Step.1 / Step.2 / Step.3 / Step.4 の4項目
          skip_steps = set()
          exec_section = re.search(
              r"###\s*実行するステップ\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if exec_section:
              section_text = exec_section.group(1)
              all_items = re.findall(
                  r"-\s*\[[ xX]\]\s*Step\.(\d+)",
                  section_text
              )
              all_steps = set(all_items)
              checked_items = re.findall(
                  r"-\s*\[[xX]\]\s*Step\.(\d+)",
                  section_text
              )
              exec_steps = set(checked_items)
              skip_steps = all_steps - exec_steps
              # 全チェックなし = 全ステップ実行（デフォルト動作）
              if not exec_steps and all_steps:
                  skip_steps = set()

          # 追加コメント抽出
          additional_comment = ""
          m = re.search(r"###\s*追加コメント[^\n]*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              additional_comment = m.group(1).strip()
              if additional_comment == "_No response_":
                  additional_comment = ""

          # レビュー設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          # 後方互換: 旧形式「スキップする」はロジック反転（未チェック → 有効）
          auto_context_review = False
          review_section = re.search(
              r"###\s*レビュー設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if review_section:
              section_text = review_section.group(1)
              if re.search(r"スキップする", section_text):
                  # 旧形式（後方互換）: 未チェック = スキップしない = 有効
                  auto_context_review = not bool(re.search(r"-\s*\[[xX]\]", section_text))
              else:
                  # 新形式: チェック → 有効
                  auto_context_review = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # 質問票設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          # 後方互換: 旧形式「スキップする」はロジック反転（未チェック → 有効）
          auto_qa = False
          qa_section = re.search(
              r"###\s*質問票設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if qa_section:
              section_text = qa_section.group(1)
              if re.search(r"スキップする", section_text):
                  # 旧形式（後方互換）: 未チェック = スキップしない = 有効
                  auto_qa = not bool(re.search(r"-\s*\[[xX]\]", section_text))
              else:
                  # 新形式: チェック → 有効
                  auto_qa = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # PR完全自動化設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          auto_merge = False
          merge_section = re.search(
              r"###\s*PR完全自動化設定\s*\n(.*?)(?=###|\Z)",
              body, re.DOTALL
          )
          if merge_section:
              section_text = merge_section.group(1)
              auto_merge = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # APP-ID 抽出（カンマ区切りで分割・正規化）
          app_ids_raw = ""
          m = re.search(r"###\s*対象アプリケーション[^\n]*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              app_ids_raw = m.group(1).strip()
              if app_ids_raw == "_No response_":
                  app_ids_raw = ""

          app_ids_list = []
          if app_ids_raw:
              for token in re.split(r"[\s,]+", app_ids_raw):
                  normalized = token.strip().upper()
                  if normalized and re.fullmatch(r"APP-\d{2,}", normalized):
                      if normalized not in app_ids_list:
                          app_ids_list.append(normalized)

          # TDD GREEN リトライ最大回数
          tdd_max_retries = "5"
          m_tdd = re.search(r"###\s*TDD GREEN リトライ最大回数\s*\n+([^\n]+)", body)
          if m_tdd:
              raw_tdd = m_tdd.group(1).strip()
              nm_tdd = re.search(r'\d+', raw_tdd)
              tdd_max_retries = nm_tdd.group() if nm_tdd else "5"

          # 自己改善設定
          enable_self_improve = False
          si_section = re.search(r"###\s*自己改善ループ設定\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
          if si_section:
              enable_self_improve = bool(re.search(r"-\s*\[[xX]\]", si_section.group(1)))

          self_improve_max_iterations = "3"
          m = re.search(r"###\s*自己改善\s*最大イテレーション数.*?\n+(.+)", body)
          if m:
              val = m.group(1).strip()
              n = re.match(r"(\d+)", val)
              if n:
                  self_improve_max_iterations = n.group(1)

          self_improve_quality_threshold = "80"
          q = re.search(r"###\s*自己改善\s*品質スコア閾値.*?\n+(.+)", body)
          if q:
              val = q.group(1).strip()
              n = re.match(r"(\d+)", val)
              if n:
                  self_improve_quality_threshold = n.group(1)

          result = {
              "branch": branch,
              "resource_group": resource_group,
              "batch_job_ids": batch_job_ids,
              "app_ids": app_ids_list,
              "skip_steps": list(skip_steps),
              "additional_comment": additional_comment,
              "auto_context_review": auto_context_review,
              "auto_qa": auto_qa,
              "auto_merge": auto_merge,
              "tdd_max_retries": tdd_max_retries,
              "enable_self_improve": enable_self_improve,
              "self_improve_max_iterations": self_improve_max_iterations,
              "self_improve_quality_threshold": self_improve_quality_threshold,
          }
          print(json.dumps(result))
          PYEOF
          )

          BRANCH=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['branch'])")
          RESOURCE_GROUP=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['resource_group'])")
          BATCH_JOB_IDS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['batch_job_ids'])")
          SKIP_STEPS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(' '.join(d['skip_steps']))")
          ADDITIONAL_COMMENT=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['additional_comment'])")
          AUTO_CONTEXT_REVIEW=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_context_review') else 'false')")
          AUTO_QA=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_qa') else 'false')")
          if [[ "${AUTO_QA}" == "true" && "${SKIP_AUTO_QA}" == "true" ]]; then
            echo "既存 QA 検知により AUTO_QA を false に上書きします: ${SKIP_AUTO_QA_REASON}"
            AUTO_QA="false"
          fi
          AUTO_MERGE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_merge') else 'false')")
          ENABLE_SELF_IMPROVE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('enable_self_improve') else 'false')")
          SELF_IMPROVE_MAX_ITER=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('self_improve_max_iterations','3'))")
          SELF_IMPROVE_QUALITY_THRESHOLD=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('self_improve_quality_threshold','80'))")
          APP_IDS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(', '.join(d.get('app_ids',[])))")
          TDD_MAX_RETRIES=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tdd_max_retries','5'))")
          [[ -z "${TDD_MAX_RETRIES}" ]] && TDD_MAX_RETRIES="5"

          MODEL_RAW=$(extract_model "${ISSUE_BODY}")
          SELECTED_MODEL=$(resolve_model "${MODEL_RAW}")
          REVIEW_MODEL_RAW=$(extract_review_model "${ISSUE_BODY}")
          SELECTED_REVIEW_MODEL=$(resolve_model "${REVIEW_MODEL_RAW}")
          QA_MODEL_RAW=$(extract_qa_model "${ISSUE_BODY}")
          SELECTED_QA_MODEL=$(resolve_model "${QA_MODEL_RAW}")

          echo "対象ブランチ: ${BRANCH}"
          echo "リソースグループ名: ${RESOURCE_GROUP}"
          echo "対象バッチジョブ ID: ${BATCH_JOB_IDS}"
          echo "スキップ Steps: ${SKIP_STEPS}"
          echo "セルフレビュー (auto-context-review): ${AUTO_CONTEXT_REVIEW}"
          echo "質問票 (auto-qa): ${AUTO_QA}"
          echo "PR完全自動化 (auto-merge): ${AUTO_MERGE}"
          echo "対象 APP-IDs（フィルタ前）: ${APP_IDS:-（未指定 = 推薦アーキテクチャから自動選択）}"

          # ---- 推薦アーキテクチャ APP-ID フィルタ ----
          FILTER_RESULT=$(python3 -m hve.app_arch_filter \
            --workflow abdv \
            ${APP_IDS:+--app-ids "${APP_IDS}"} \
            --catalog docs/catalog/app-arch-catalog.md) || {
            _post_app_arch_filter_error "${ROOT_ISSUE}" "${FILTER_RESULT:-}" "docs/catalog/app-arch-catalog.md"
            exit 1
          }

          # フェイルセーフ: Python が exit 0 でも JSON に error が含まれる場合
          FILTER_ERROR=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',''))" 2>/dev/null || echo "")
          if [[ -n "${FILTER_ERROR}" ]]; then
            _post_app_arch_filter_error "${ROOT_ISSUE}" "${FILTER_RESULT}" "docs/catalog/app-arch-catalog.md"
            exit 1
          fi

          APP_IDS=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(', '.join(d.get('matched_app_ids',[])))")
          APP_ARCH_SCOPE_SECTION=$(echo "${FILTER_RESULT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('markdown_section',''))")

          echo "対象 APP-IDs（フィルタ後）: ${APP_IDS:-（0件）}"

          if [[ -z "${APP_IDS}" ]]; then
            echo "推薦アーキテクチャ APP-ID フィルタ: 対象 APP-ID が 0 件です。Step Issue を作成しません。"
            post_comment "${ROOT_ISSUE}" "ℹ️ 推薦アーキテクチャ \`データバッチ処理\` / \`バッチ\` に該当する APP-ID が見つかりませんでした。\`docs/catalog/app-arch-catalog.md\` の \`A) サマリ表（全APP横断）\` を確認してください。"
            exit 0
          fi

          export APP_IDS APP_ARCH_SCOPE_SECTION

          # ---- Root Issue body に auto-context-review / auto-merge タグを埋め込み ----
          REVIEW_TAG_FILE=$(mktemp)
          python3 - "${AUTO_CONTEXT_REVIEW}" "${AUTO_MERGE}" "${TDD_MAX_RETRIES}" "${BRANCH}" "${ENABLE_SELF_IMPROVE}" "${SELF_IMPROVE_MAX_ITER}" "${SELF_IMPROVE_QUALITY_THRESHOLD}" "${REVIEW_TAG_FILE}" <<'PYMERGE'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")
          auto_context_review = sys.argv[1]
          auto_merge = sys.argv[2]
          tdd_max_retries = sys.argv[3]
          branch = sys.argv[4]
          enable_si = sys.argv[5]
          si_max_iter = sys.argv[6]
          si_quality_threshold = sys.argv[7]
          output_file = sys.argv[8]

          tags = [
              ("auto-context-review", auto_context_review),
              ("auto-merge", auto_merge),
              ("tdd-max-retries", tdd_max_retries),
              ("branch", branch),
              ("enable-self-improve", enable_si),
              ("self-improve-max-iterations", si_max_iter),
              ("self-improve-quality-threshold", si_quality_threshold),
          ]

          for key, value in tags:
              tag = f"<!-- {key}: {value} -->"
              pat = re.compile(rf"<!--\s*{re.escape(key)}\s*:[^>]*-->")
              if pat.search(body):
                  body = pat.sub(tag, body, count=1)
              else:
                  body = body.rstrip() + "\n" + tag + "\n"

          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump({'body': body}, f, ensure_ascii=False)
          PYMERGE

          api_call PATCH \
            "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
            "$(cat "${REVIEW_TAG_FILE}")" > /dev/null \
            && echo "Root Issue #${ROOT_ISSUE} に auto-context-review / auto-merge / tdd-max-retries / branch / self-improve タグを埋め込みました。" \
            || echo "WARNING: Root Issue body のタグ埋め込みに失敗しました。" >&2

          rm -f "${REVIEW_TAG_FILE}"

          # ---- Root Issue に abdv:initialized を付与 ----
          add_label "${ROOT_ISSUE}" "abdv:initialized"
          echo "abdv:initialized を付与しました。"

          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-context-review"
            echo "Root Issue #${ROOT_ISSUE} に auto-context-review ラベルを付与しました。"
          fi

          if [[ "${AUTO_QA}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-qa"
            echo "Root Issue #${ROOT_ISSUE} に auto-qa ラベルを付与しました。"
          fi

          if [[ "${AUTO_MERGE}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-approve-ready"
            echo "Root Issue #${ROOT_ISSUE} に auto-approve-ready ラベルを付与しました。"
          fi
          if [[ -n "${SELECTED_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "model/${SELECTED_MODEL}" || true
          fi
          if [[ -n "${SELECTED_REVIEW_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "review-model/${SELECTED_REVIEW_MODEL}" || true
          fi
          if [[ -n "${SELECTED_QA_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "qa-model/${SELECTED_QA_MODEL}" || true
          fi

          # ---- Step Issue に埋め込む共通メタ情報 ----
          # root-issue / branch / resource-group / batch-job-ids / auto-context-review / auto-qa / auto-merge を埋め込む
          ROOT_REF=$(printf '<!-- root-issue: #%s -->\n<!-- branch: %s -->\n<!-- resource-group: %s -->\n<!-- batch-job-ids: %s -->\n<!-- auto-context-review: %s -->\n<!-- auto-qa: %s -->\n<!-- auto-merge: %s -->' \
            "${ROOT_ISSUE}" "${BRANCH}" "${RESOURCE_GROUP}" "${BATCH_JOB_IDS}" "${AUTO_CONTEXT_REVIEW}" "${AUTO_QA}" "${AUTO_MERGE}")

          # 追加コンテキスト参照セクション（QA/Review 反映ルール — Phase 3 追加）
          QA_REVIEW_SECTION=$(printf '\n\n## 追加コンテキストの参照\n\n以下が存在する場合は必ず参照してください。存在しない情報は推測せず、必要に応じて不足事項として記録してください。\n\n- `qa/` 配下の、この Root Issue / Step / PR に関連する QA 回答\n- この PR または関連 Issue のレビュー指摘\n- Self-Improve 結果または改善計画（存在する場合のみ）\n- `## 入力` に記載された前 Step 成果物\n- 追加で注入された既存成果物・reuse context\n\n参照した QA / Review / Self-Improve の内容は、成果物へ反映してください。反映しない場合は理由を完了コメントまたは成果物内に記録してください。')
          # 追加コメントセクション（空の場合は空文字）
          if [[ -n "${ADDITIONAL_COMMENT}" ]]; then
            ADDITIONAL_SECTION="${QA_REVIEW_SECTION}$(printf '\n\n## 追加コメント\n%s' "${ADDITIONAL_COMMENT}")"
          else
            ADDITIONAL_SECTION="${QA_REVIEW_SECTION}"
          fi

          # リソースグループ／ジョブID セクション（存在する場合のみ）
          if [[ -n "${RESOURCE_GROUP}" ]]; then
            RG_SECTION=$(printf '\n\n## リソースグループ\n`%s`' "${RESOURCE_GROUP}")
          else
            RG_SECTION=""
          fi

          if [[ -n "${BATCH_JOB_IDS}" ]]; then
            JOB_SECTION=$(printf '\n\n## 対象バッチジョブ ID\n`%s`' "${BATCH_JOB_IDS}")
          else
            JOB_SECTION=""
          fi

          # Step Issue に付与するラベルセット
          # auto-batch-dev を付与することで Issue 一覧のラベル絞り込み検索が可能になる（ABD = Batch Design と同パターン）
          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]] && [[ "${AUTO_QA}" == "true" ]]; then
            STEP_LABELS='["abdv:blocked","auto-batch-dev","auto-context-review","auto-qa"]'
          elif [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
            STEP_LABELS='["abdv:blocked","auto-batch-dev","auto-context-review"]'
          elif [[ "${AUTO_QA}" == "true" ]]; then
            STEP_LABELS='["abdv:blocked","auto-batch-dev","auto-qa"]'
          else
            STEP_LABELS='["abdv:blocked","auto-batch-dev"]'
          fi

          if [[ "${AUTO_MERGE}" == "true" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c '. + ["auto-approve-ready"]')
          fi
          if [[ -n "${SELECTED_MODEL}" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c --arg ml "model/${SELECTED_MODEL}" '. + [$ml]')
          fi
          if [[ -n "${SELECTED_REVIEW_MODEL}" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c --arg rml "review-model/${SELECTED_REVIEW_MODEL}" '. + [$rml]')
          fi
          if [[ -n "${SELECTED_QA_MODEL}" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c --arg qml "qa-model/${SELECTED_QA_MODEL}" '. + [$qml]')
          fi

          # ---- Step Issue 生成 ----
          # 各 Step の issue_number と id を保存する変数
          S11_NUM="" S11_ID=""
          S12_NUM="" S12_ID=""
          S21_NUM="" S21_ID=""
          S22_NUM="" S22_ID=""
          S3_NUM=""  S3_ID=""
          S41_NUM="" S41_ID=""
          S42_NUM="" S42_ID=""

          # ---- Step.1.1: データサービス選定 ----
          if [[ ! " ${SKIP_STEPS} " =~ " 1 " ]]; then
            BODY_S11=$(printf '%s\n## 目的\nバッチジョブ設計書・サービスカタログを根拠に、必要な Azure データ系リソースを特定し、リソース作成スクリプトと検証スクリプトを準備する。\n\n## 入力\n- `docs/batch/batch-domain-analytics.md`\n- `docs/batch/batch-data-source-analysis.md`\n- `docs/batch/batch-data-model.md`\n- `docs/batch/batch-job-catalog.md`\n- `docs/batch/batch-service-catalog.md`\n- `docs/batch/batch-test-strategy.md`（テスト戦略書: データストア選定の参考）\n\n## 出力\n- `infra/azure/batch/create-batch-resources.sh`（Azure CLI リソース作成スクリプト）\n- `infra/azure/batch/verify-batch-resources.sh`（Azure CLI リソース検証スクリプト）\n\n## Custom Agent\n`Dev-Batch-DataServiceSelect` を使用\n\n## 依存\n- 依存なし（最初の Step）\n\n## 完了条件\n- `infra/azure/batch/create-batch-resources.sh` が作成されている\n- `infra/azure/batch/verify-batch-resources.sh` が作成されている\n- 完了時に自身に `abdv:done` ラベルを付与すること%s%s%s' \
              "${ROOT_REF}" "${RG_SECTION}" "${JOB_SECTION}" "${ADDITIONAL_SECTION}")
            S11_RESP=$(create_issue \
              "[ABDV] Step.1.1: データサービス選定" \
              "${BODY_S11}" \
              "${STEP_LABELS}")
            S11_NUM=$(echo "${S11_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('number',''))")
            S11_ID=$(echo "${S11_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
            echo "Step.1.1 作成: #${S11_NUM}"
            sleep 3
          else
            echo "Step.1 はスキップ対象のため Step.1.1 は作成しません。"
          fi

          # ---- Step.1.2: Azure リソース Deploy ----
          if [[ ! " ${SKIP_STEPS} " =~ " 1 " ]]; then
            BODY_S12=$(printf '%s\n## 目的\nStep.1.1 で作成したリソース作成スクリプトを実行し、Azure データ系リソースを冪等的に作成・検証する。\n\n## 入力\n- `infra/azure/batch/create-batch-resources.sh`（Step.1.1 の成果物）\n- `infra/azure/batch/verify-batch-resources.sh`（Step.1.1 の成果物）\n- `docs/batch/batch-service-catalog.md`\n- `docs/batch/batch-monitoring-design.md`（監視設計: データリソースの冗長性・バックアップ要件）\n\n## 出力\n- Azure データ系リソースの作成・検証完了\n- 実行・検証ログ（`{WORK}deploy-work-status.md`）\n\n## Custom Agent\n`Dev-Batch-DataDeploy` を使用\n\n## 依存\n- Step.1.1（データサービス選定）が `abdv:done` であること\n\n## 完了条件\n- Azure データ系リソースが作成/確認されている\n- `infra/azure/batch/verify-batch-resources.sh` の実行結果が全項目 PASS であること\n- 完了時に自身に `abdv:done` ラベルを付与すること%s%s%s' \
              "${ROOT_REF}" "${RG_SECTION}" "${JOB_SECTION}" "${ADDITIONAL_SECTION}")
            S12_RESP=$(create_issue \
              "[ABDV] Step.1.2: Azure データリソース Deploy" \
              "${BODY_S12}" \
              "${STEP_LABELS}")
            S12_NUM=$(echo "${S12_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('number',''))")
            S12_ID=$(echo "${S12_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
            echo "Step.1.2 作成: #${S12_NUM}"
            sleep 3
          else
            echo "Step.1 はスキップ対象のため Step.1.2 は作成しません。"
          fi

          # ---- Step.2.1: TDD RED: テストコード作成 ----
          if [[ ! " ${SKIP_STEPS} " =~ " 2 " ]]; then
            # Step.2.1 の依存先: Step.1.2 が存在すれば Step.1.2、なければ依存なし
            if [[ -n "${S12_NUM}" ]]; then
              _S21_DEP="Step.1.2（Azure データリソース Deploy）が \`abdv:done\` であること"
            else
              _S21_DEP="依存なし（Step.1 がスキップされたため）"
            fi
            BODY_S21=$(printf '%s\n## 目的\nTDD テスト仕様書を根拠に、バッチジョブの失敗するテストコード（TDD RED フェーズ）を作成する。\n\n⚠️ **注意**: `{jobId}` はこの Issue の `## 対象バッチジョブ ID` セクションに記載のジョブ ID を使用すること（例: `BJ-001`）。\n\n## 入力\n- `docs/test-specs/{jobId}-test-spec.md`（TDD テスト仕様書。ABD ワークフローの Arch-Batch-TDDTestSpec が生成）\n- `docs/batch/batch-job-catalog.md`\n- `docs/batch/batch-service-catalog.md`\n- `docs/batch/batch-test-strategy.md`（テスト戦略書）\n- `docs/batch/jobs/{jobId}-{jobNameSlug}-spec.md`（ジョブ詳細仕様書）\n- `docs/batch/batch-monitoring-design.md`（監視設計書）\n\n## 出力\n- `test/batch/{jobId}-{jobNameSlug}.Tests/` 配下のテストコード（xUnit / C#）\n\n## Custom Agent\n`Dev-Batch-TestCoding` を使用\n\n## 依存\n- %s\n\n## 完了条件\n- テストコードが作成され、`dotnet test` で失敗（TDD RED）が確認されている\n- 完了時に自身に `abdv:done` ラベルを付与すること%s%s%s' \
              "${ROOT_REF}" "${_S21_DEP}" "${RG_SECTION}" "${JOB_SECTION}" "${ADDITIONAL_SECTION}")
            S21_RESP=$(create_issue \
              "[ABDV] Step.2.1: TDD RED — テストコード作成" \
              "${BODY_S21}" \
              "${STEP_LABELS}")
            S21_NUM=$(echo "${S21_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('number',''))")
            S21_ID=$(echo "${S21_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
            echo "Step.2.1 作成: #${S21_NUM}"
            sleep 3
          else
            echo "Step.2 はスキップ対象のため Step.2.1 は作成しません。"
          fi

          # ---- Step.2.2: TDD GREEN: 本実装 ----
          if [[ ! " ${SKIP_STEPS} " =~ " 2 " ]]; then
            BODY_S22=$(printf '%s\n## 目的\nテストコードを通過させるバッチジョブ本実装（TDD GREEN フェーズ）を行う。\n\n## 入力\n- `test/batch/{jobId}-{jobNameSlug}.Tests/`（テストコード）\n- `docs/batch/jobs/{jobId}-{jobNameSlug}-spec.md`（ジョブ詳細仕様書）\n- `docs/batch/batch-service-catalog.md`\n- `docs/batch/batch-test-strategy.md`（テスト戦略書）\n- `docs/batch/batch-monitoring-design.md`（監視設計書: 構造化ログ・アラート要件）\n- `docs/azure/azure-services-data.md`（データストア接続情報）\n\n## 出力\n- `src/batch/{jobId}-{jobNameSlug}/` 配下の本実装コード\n\n## Custom Agent\n`Dev-Batch-ServiceCoding` を使用\n\n## 依存\n- Step.2.1（TDD RED: テストコード作成）が `abdv:done` であること\n\n## 完了条件\n- `dotnet test` が全テスト PASS（TDD GREEN）になっている\n- 完了時に自身に `abdv:done` ラベルを付与すること\n\n## TDD GREEN リトライルール\n- テストが PASS にならない場合、最大 %s 回まで実装を修正して再試行する\n- %s 回で全 PASS にならない場合: `abdv:blocked` ラベルを付与し、未 PASS テスト一覧と試行回数を報告する\n- テストコード（`test/batch/`）は原則変更禁止%s%s%s' \
              "${ROOT_REF}" "${TDD_MAX_RETRIES}" "${TDD_MAX_RETRIES}" "${RG_SECTION}" "${JOB_SECTION}" "${ADDITIONAL_SECTION}")
            S22_RESP=$(create_issue \
              "[ABDV] Step.2.2: TDD GREEN — バッチジョブ本実装" \
              "${BODY_S22}" \
              "${STEP_LABELS}")
            S22_NUM=$(echo "${S22_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('number',''))")
            S22_ID=$(echo "${S22_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
            echo "Step.2.2 作成: #${S22_NUM}"
            sleep 3
          else
            echo "Step.2 はスキップ対象のため Step.2.2 は作成しません。"
          fi

          # ---- Step.3: Azure Functions/コンテナ Deploy ----
          if [[ ! " ${SKIP_STEPS} " =~ " 3 " ]]; then
            # Step.3 の依存先: Step.2.2 が存在すれば Step.2.2、なければ Step.1.2、なければ依存なし
            if [[ -n "${S22_NUM}" ]]; then
              _S3_DEP="Step.2.2（TDD GREEN: バッチジョブ本実装）が \`abdv:done\` であること"
            elif [[ -n "${S12_NUM}" ]]; then
              _S3_DEP="Step.1.2（Azure データリソース Deploy）が \`abdv:done\` であること"
            else
              _S3_DEP="依存なし（Step.1 / Step.2 がスキップされたため）"
            fi
            BODY_S3=$(printf '%s\n## 目的\nバッチジョブ実装コードを Azure Functions またはコンテナとして Azure にデプロイする。\n\n## 入力\n- `src/` または `functions/` 配下の本実装コード\n- `docs/azure/azure-services-data.md`（データストア設計）\n- `docs/batch/batch-service-catalog.md`（サービスカタログ）\n- `docs/batch/batch-monitoring-design.md`（監視設計書: アラート・ログ・スケーリング設定）\n- `docs/azure/azure-services-compute.md`（コンピュート設計: 存在する場合のみ参照）\n\n## 出力\n- Azure Functions / コンテナのデプロイ完了\n- CI/CD パイプライン設定（`.github/workflows/deploy-batch-functions.yml` 等）\n- `infra/azure/batch/README.md`（インフラ手順・環境変数一覧・トラブルシューティング）\n\n## Custom Agent\n`Dev-Batch-FunctionsDeploy` を使用\n\n## 依存\n- %s\n\n## 完了条件\n- バッチジョブが Azure 上で稼働している\n- 完了時に自身に `abdv:done` ラベルを付与すること%s%s%s' \
              "${ROOT_REF}" "${_S3_DEP}" "${RG_SECTION}" "${JOB_SECTION}" "${ADDITIONAL_SECTION}")
            S3_RESP=$(create_issue \
              "[ABDV] Step.3: Azure Functions/コンテナ Deploy" \
              "${BODY_S3}" \
              "${STEP_LABELS}")
            S3_NUM=$(echo "${S3_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('number',''))")
            S3_ID=$(echo "${S3_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
            echo "Step.3 作成: #${S3_NUM}"
            sleep 3
          else
            echo "Step.3 はスキップ対象のため作成しません。"
          fi

          # ---- Step.4.1: WAF レビュー ----
          if [[ ! " ${SKIP_STEPS} " =~ " 4 " ]]; then
            # Step.4.1 の依存先: Step.3 が存在すれば Step.3、なければ最後に完了した Step
            if [[ -n "${S3_NUM}" ]]; then
              _S41_DEP="Step.3（Azure Functions/コンテナ Deploy）が \`abdv:done\` であること"
            elif [[ -n "${S22_NUM}" ]]; then
              _S41_DEP="Step.2.2（TDD GREEN: バッチジョブ本実装）が \`abdv:done\` であること"
            elif [[ -n "${S12_NUM}" ]]; then
              _S41_DEP="Step.1.2（Azure データリソース Deploy）が \`abdv:done\` であること"
            else
              _S41_DEP="依存なし（前段 Step がスキップされたため）"
            fi
            BODY_S41=$(printf '%s\n## 目的\nデプロイ済みの Azure リソース構成を Azure Well-Architected Framework（WAF）5本柱で評価する。\n\n## 入力\n- デプロイ済みの Azure リソース（Azure Portal / CLI で確認）\n- `docs/azure/azure-services-data.md`\n- `docs/batch/batch-service-catalog.md`\n- `docs/batch/batch-monitoring-design.md`（監視設計書: WAF「運用の優秀性」柱の根拠）\n- `docs/azure/azure-services-compute.md`（存在する場合のみ参照）\n\n## 出力\n- WAF レビューレポート（`docs/azure/waf-review.md`）\n\n## Custom Agent\n`QA-AzureArchitectureReview` を使用\n\n## 依存\n- %s\n\n## 完了条件\n- `docs/azure/waf-review.md` が作成されている\n- 完了時に自身に `abdv:done` ラベルを付与すること%s%s%s' \
              "${ROOT_REF}" "${_S41_DEP}" "${RG_SECTION}" "${JOB_SECTION}" "${ADDITIONAL_SECTION}")
            S41_RESP=$(create_issue \
              "[ABDV] Step.4.1: WAF レビュー" \
              "${BODY_S41}" \
              "${STEP_LABELS}")
            S41_NUM=$(echo "${S41_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('number',''))")
            S41_ID=$(echo "${S41_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
            echo "Step.4.1 作成: #${S41_NUM}"
            sleep 3
          else
            echo "Step.4 はスキップ対象のため Step.4.1 は作成しません。"
          fi

          # ---- Step.4.2: 整合性チェック ----
          if [[ ! " ${SKIP_STEPS} " =~ " 4 " ]]; then
            BODY_S42=$(printf '%s\n## 目的\nサービスカタログ準拠で Azure 依存（参照・設定・IaC）を証跡付きで点検し、設計書との整合性を確認する。\n\n## 入力\n- `docs/azure/azure-services-data.md`\n- `docs/batch/batch-service-catalog.md`\n- `docs/batch/batch-monitoring-design.md`（監視設計書: アラート・ダッシュボード設定の整合確認）\n- `docs/azure/azure-services-compute.md`（存在する場合のみ参照）\n\n## 出力\n- 整合性チェックレポート（`docs/azure/dependency-review.md`）\n\n## Custom Agent\n`QA-AzureDependencyReview` を使用\n\n## 依存\n- Step.4.1 と同じ前段 Step が `abdv:done` であること（Step.3 → 並列起動）\n\n## 完了条件\n- `docs/azure/dependency-review.md` が作成されている\n- 完了時に自身に `abdv:done` ラベルを付与すること%s%s%s' \
              "${ROOT_REF}" "${RG_SECTION}" "${JOB_SECTION}" "${ADDITIONAL_SECTION}")
            S42_RESP=$(create_issue \
              "[ABDV] Step.4.2: 整合性チェック" \
              "${BODY_S42}" \
              "${STEP_LABELS}")
            S42_NUM=$(echo "${S42_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('number',''))")
            S42_ID=$(echo "${S42_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
            echo "Step.4.2 作成: #${S42_NUM}"
            sleep 3
          else
            echo "Step.4 はスキップ対象のため Step.4.2 は作成しません。"
          fi

          # ---- Sub Issue を Root Issue に紐付け ----
          [[ -n "${S11_NUM}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S11_ID}"; echo "Root → Step.1.1 紐付け完了"; }
          [[ -n "${S12_NUM}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S12_ID}"; echo "Root → Step.1.2 紐付け完了"; }
          [[ -n "${S21_NUM}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S21_ID}"; echo "Root → Step.2.1 紐付け完了"; }
          [[ -n "${S22_NUM}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S22_ID}"; echo "Root → Step.2.2 紐付け完了"; }
          [[ -n "${S3_NUM}" ]]  && { link_sub_issue "${ROOT_ISSUE}" "${S3_ID}";  echo "Root → Step.3 紐付け完了"; }
          [[ -n "${S41_NUM}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S41_ID}"; echo "Root → Step.4.1 紐付け完了"; }
          [[ -n "${S42_NUM}" ]] && { link_sub_issue "${ROOT_ISSUE}" "${S42_ID}"; echo "Root → Step.4.2 紐付け完了"; }

          # ---- 最初に実行すべき Step を起動 ----
          # Step.1.1 が存在 → Step.1.1 から開始
          # Step.1 がスキップ → Step.2.1 から開始
          # Step.1/2 がスキップ → Step.3 から開始
          # Step.1/2/3 がスキップ → Step.4.1/4.2 から並列開始
          # 初回起動ヘルパー: abdv:blocked を除去して abdv:ready + Copilot アサイン + abdv:running を設定
          activate_first_step() {
            local issue_num="$1"
            local custom_agent="$2"
            # abdv:blocked ラベルを除去（URLエンコード: : → %3A）
            curl -s -o /dev/null \
              -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/labels/abdv%3Ablocked" || true
            add_label "${issue_num}" "abdv:ready"
            if assign_copilot "${issue_num}" "${custom_agent}" "${BRANCH}" ""; then
              add_label "${issue_num}" "abdv:running"
              echo "Issue #${issue_num} に Copilot アサイン + abdv:running 付与完了"
            else
              echo "WARNING: Issue #${issue_num} へのアサイン失敗。abdv:running は付与しません。"
            fi
          }

          if [[ -n "${S11_NUM}" ]]; then
            if [[ "${AUTO_QA}" == "true" ]]; then
              add_label "${S11_NUM}" "abdv:qa-ready"
              echo "Step.1.1 (#${S11_NUM}) に abdv:qa-ready を付与しました（QA 完了待ち）。Copilot アサインは QA 回答後に実行されます。"
            else
              activate_first_step "${S11_NUM}" "Dev-Batch-DataServiceSelect"
              echo "Step.1.1 (#${S11_NUM}) を起動しました。"
            fi
          elif [[ -n "${S21_NUM}" ]]; then
            activate_first_step "${S21_NUM}" "Dev-Batch-TestCoding"
            echo "Step.1 がスキップ済み: Step.2.1 (#${S21_NUM}) を起動しました。"
          elif [[ -n "${S3_NUM}" ]]; then
            activate_first_step "${S3_NUM}" "Dev-Batch-FunctionsDeploy"
            echo "Step.1〜2 がスキップ済み: Step.3 (#${S3_NUM}) を起動しました。"
          else
            # Step.1/2/3 全スキップ → Step.4.1 と Step.4.2 を並列起動
            if [[ -n "${S41_NUM}" ]]; then
              activate_first_step "${S41_NUM}" "QA-AzureArchitectureReview"
              echo "Step.4.1 (#${S41_NUM}) を起動しました（Step.1〜3 スキップ）。"
            fi
            if [[ -n "${S42_NUM}" ]]; then
              activate_first_step "${S42_NUM}" "QA-AzureDependencyReview"
              echo "Step.4.2 (#${S42_NUM}) を起動しました（Step.1〜3 スキップ）。"
            fi
            if [[ -z "${S41_NUM}" ]] && [[ -z "${S42_NUM}" ]]; then
              # 全ステップがスキップ → 即完了
              add_label "${ROOT_ISSUE}" "abdv:done"
              post_comment "${ROOT_ISSUE}" "⚠️ 全てのステップがスキップされました。Root Issue #${ROOT_ISSUE} をワークフロー完了とマークします。"
            fi
          fi

          # ---- 完了通知コメント ----
          SUBISSUE_LIST=""
          [[ -n "${S11_NUM}" ]] && SUBISSUE_LIST="${SUBISSUE_LIST}- #${S11_NUM} Step.1.1: データサービス選定\n"
          [[ -n "${S12_NUM}" ]] && SUBISSUE_LIST="${SUBISSUE_LIST}- #${S12_NUM} Step.1.2: Azure データリソース Deploy\n"
          [[ -n "${S21_NUM}" ]] && SUBISSUE_LIST="${SUBISSUE_LIST}- #${S21_NUM} Step.2.1: TDD RED — テストコード作成\n"
          [[ -n "${S22_NUM}" ]] && SUBISSUE_LIST="${SUBISSUE_LIST}- #${S22_NUM} Step.2.2: TDD GREEN — バッチジョブ本実装\n"
          [[ -n "${S3_NUM}" ]]  && SUBISSUE_LIST="${SUBISSUE_LIST}- #${S3_NUM} Step.3: Azure Functions/コンテナ Deploy\n"
          [[ -n "${S41_NUM}" ]] && SUBISSUE_LIST="${SUBISSUE_LIST}- #${S41_NUM} Step.4.1: WAF レビュー\n"
          [[ -n "${S42_NUM}" ]] && SUBISSUE_LIST="${SUBISSUE_LIST}- #${S42_NUM} Step.4.2: 整合性チェック\n"

          INIT_COMMENT=$(printf '✅ ABDV ワークフローを初期化しました。\n\n**生成された Sub Issue:**\n%s\n**実行順序（DAG）:**\nStep.1.1 → Step.1.2 → Step.2.1 → Step.2.2 → Step.3 → Step.4.1 ‖ Step.4.2\n\n各 Step に `abdv:done` ラベルを付与すると次の Step が自動的に起動します。' \
            "${SUBISSUE_LIST}")
          post_comment "${ROOT_ISSUE}" "${INIT_COMMENT}" \
            || echo "WARNING: Root Issue へのコメント投稿に失敗しました。" >&2

      # ----------------------------------------------------------------
      # 4. 状態遷移処理: abdv:done ラベル付与時
      # ----------------------------------------------------------------
      - name: 状態遷移処理
        if: steps.gate.outputs.mode == 'state_transition'
        env:
          DONE_ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail

          # Issue の body と title を API 経由で安全に取得
          _ISSUE_JSON=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}")
          DONE_ISSUE_BODY=$(echo "${_ISSUE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          DONE_ISSUE_TITLE=$(echo "${_ISSUE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          export DONE_ISSUE_BODY DONE_ISSUE_TITLE

          # closed イベント由来の場合: abdv:done ラベルをまだ持っていなければ付与する
          _HAS_DONE_LABEL=$(echo "${_ISSUE_JSON}" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          labels = [l['name'] for l in d.get('labels', [])]
          print('true' if 'abdv:done' in labels else 'false')
          ")
          if [[ "${_HAS_DONE_LABEL}" == "false" ]]; then
            echo "abdv:done ラベルを付与します（closed イベント由来）..."
            curl -s -o /dev/null \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}/labels" \
              -d '{"labels":["abdv:done"]}' || true
            echo "abdv:done ラベルを付与しました。"
            sleep 2
          fi

          if [[ -z "${COPILOT_PAT:-}" ]]; then
            echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインは全てスキップされます。" >&2
          fi

          # ---- ユーティリティ関数（再定義） ----
          source "${GITHUB_WORKSPACE}/.github/scripts/abd-common.sh"

          # Issue が abdv:done ラベルを持つか確認（AND依存チェック用）
          check_abdv_done() {
            local issue_num="$1"
            api_call GET "https://api.github.com/repos/${REPO}/issues/${issue_num}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if 'abdv:done' in [l['name'] for l in d.get('labels',[])] else 'false')"
          }

          # Issue を abdv:ready + Copilot アサイン + abdv:running に設定
          activate_issue() {
            local issue_num="$1"
            local issue_body
            issue_body=$(curl -sf \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))") || true
            local agent_name
            agent_name=$(extract_custom_agent "${issue_body}") || true
            # abdv:blocked を除去して abdv:ready を付与
            curl -s -o /dev/null \
              -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/labels/abdv%3Ablocked" || true
            add_label "${issue_num}" "abdv:ready"
            if assign_copilot "${issue_num}" "${agent_name}" "${BRANCH:-main}" ""; then
              add_label "${issue_num}" "abdv:running"
              echo "Issue #${issue_num} を abdv:ready + Copilot アサイン + abdv:running に設定しました。(custom_agent: ${agent_name})"
            else
              echo "WARNING: Issue #${issue_num} へのアサイン失敗。abdv:running は付与しません。"
            fi
          }

          # ---- done Issue の title から Step 番号を特定 ----
          STEP_MATCH=$(echo "${DONE_ISSUE_TITLE}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          title = sys.stdin.read().strip()
          m = re.search(r'\[ABDV\] Step\.(\d+(?:\.\d+)?)', title)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${STEP_MATCH}" ]]; then
            echo "Step 番号が特定できません（title: ${DONE_ISSUE_TITLE}）。スキップ。"
            exit 0
          fi

          echo "完了した Step: ${STEP_MATCH}"

          # ---- Root Issue 番号の取得 ----
          ROOT_ISSUE=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!-- root-issue: #(\d+) -->', body)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${ROOT_ISSUE}" ]]; then
            echo "Root Issue 番号が取得できません。スキップ。"
            exit 0
          fi

          echo "Root Issue: #${ROOT_ISSUE}"

          # ---- ブランチ名の取得 ----
          BRANCH=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!-- branch: (.+?) -->', body)
          print(m.group(1).strip() if m else 'main')
          PY
          )

          echo "対象ブランチ: ${BRANCH}"

          # ---- auto-context-review / auto-qa PR ラベル付与 ----
          AUTO_CONTEXT_REVIEW=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!--\s*auto-context-review:\s*(true|false)\s*-->', body)
          print(m.group(1) if m else 'false')
          PY
          )
          AUTO_QA=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!--\s*auto-qa:\s*(true|false)\s*-->', body)
          print(m.group(1) if m else 'false')
          PY
          )
          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]] || [[ "${AUTO_QA}" == "true" ]]; then
            LINKED_PRS=$(gh api "/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}/timeline?per_page=100" \
              --jq '[.[] | select(.event == "cross-referenced" and .source.type == "pull_request" and .source.issue.state == "open") | .source.issue.number] | unique | .[]' \
              2>/dev/null || true)
            if [[ -n "${LINKED_PRS}" ]]; then
              while IFS= read -r pr_num; do
                if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
                  gh pr edit "${pr_num}" --repo "${REPO}" --add-label "auto-context-review" 2>/dev/null \
                    && echo "PR #${pr_num} に auto-context-review ラベルを付与しました。" \
                    || echo "WARNING: PR #${pr_num} への auto-context-review ラベル付与に失敗しました。" >&2
                fi
                if [[ "${AUTO_QA}" == "true" ]]; then
                  gh pr edit "${pr_num}" --repo "${REPO}" --add-label "auto-qa" 2>/dev/null \
                    && echo "PR #${pr_num} に auto-qa ラベルを付与しました。" \
                    || echo "WARNING: PR #${pr_num} への auto-qa ラベル付与に失敗しました。" >&2
                fi
              done <<< "${LINKED_PRS}"
            fi
          fi

          # ---- Root Issue の Sub Issues から Step Issue 番号を取得 ----
          get_sub_issue_number() {
            local pattern="$1"
            local resp
            resp=$(api_call GET \
              "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues")
            echo "${resp}" | python3 /dev/fd/3 "${pattern}" 3<<'PY'
          import sys, re, json
          issues = json.load(sys.stdin)
          pattern = sys.argv[1]
          for issue in issues:
              title = issue.get('title', '')
              if re.search(pattern, title):
                  print(issue['number'])
                  break
          PY
          }

          # ---- 依存関係 DAG に基づき次 Step を特定 & 起動 ----
          # DAG: Step.1.1 → Step.1.2 → Step.2.1 → Step.2.2 → Step.3 → Step.4.1 ‖ Step.4.2
          #       Step.4.1 AND Step.4.2 → Root abdv:done
          case "${STEP_MATCH}" in
            "1.1")
              # Step.1.1 完了 → Step.1.2 を起動
              S12_NUM=$(get_sub_issue_number '\[ABDV\] Step\.1\.2:')
              if [[ -n "${S12_NUM}" ]]; then
                activate_issue "${S12_NUM}"
                echo "Step.1.2 (#${S12_NUM}) を起動しました。"
              else
                # Step.1.2 が存在しない（スキップ済み）→ Step.2.1 を起動
                S21_NUM=$(get_sub_issue_number '\[ABDV\] Step\.2\.1:')
                if [[ -n "${S21_NUM}" ]]; then
                  activate_issue "${S21_NUM}"
                  echo "Step.1.2 が存在しないため Step.2.1 (#${S21_NUM}) を起動しました。"
                else
                  # Step.2.1 もスキップ → Step.2.2 → Step.3 → Step.4 の順にフォールバック
                  S22_NUM=$(get_sub_issue_number '\[ABDV\] Step\.2\.2:')
                  if [[ -n "${S22_NUM}" ]]; then
                    activate_issue "${S22_NUM}"
                  else
                    S3_NUM=$(get_sub_issue_number '\[ABDV\] Step\.3:')
                    if [[ -n "${S3_NUM}" ]]; then
                      activate_issue "${S3_NUM}"
                    else
                      S41_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.1:')
                      S42_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.2:')
                      [[ -n "${S41_NUM}" ]] && activate_issue "${S41_NUM}"
                      [[ -n "${S42_NUM}" ]] && activate_issue "${S42_NUM}"
                      if [[ -z "${S41_NUM}" ]] && [[ -z "${S42_NUM}" ]]; then
                        add_label "${ROOT_ISSUE}" "abdv:done"
                        post_comment "${ROOT_ISSUE}" "🎉 全ての ABDV ワークフローステップが完了しました！Root Issue #${ROOT_ISSUE} のワークフローが正常に終了しました。"
                      fi
                    fi
                  fi
                fi
              fi
              ;;

            "1.2")
              # Step.1.2 完了 → Step.2.1 を起動
              S21_NUM=$(get_sub_issue_number '\[ABDV\] Step\.2\.1:')
              if [[ -n "${S21_NUM}" ]]; then
                activate_issue "${S21_NUM}"
                echo "Step.2.1 (#${S21_NUM}) を起動しました。"
              else
                # Step.2.1 がスキップ → Step.2.2 → Step.3 → Step.4 の順にフォールバック
                S22_NUM=$(get_sub_issue_number '\[ABDV\] Step\.2\.2:')
                if [[ -n "${S22_NUM}" ]]; then
                  activate_issue "${S22_NUM}"
                else
                  S3_NUM=$(get_sub_issue_number '\[ABDV\] Step\.3:')
                  if [[ -n "${S3_NUM}" ]]; then
                    activate_issue "${S3_NUM}"
                  else
                    S41_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.1:')
                    S42_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.2:')
                    [[ -n "${S41_NUM}" ]] && activate_issue "${S41_NUM}"
                    [[ -n "${S42_NUM}" ]] && activate_issue "${S42_NUM}"
                    if [[ -z "${S41_NUM}" ]] && [[ -z "${S42_NUM}" ]]; then
                      add_label "${ROOT_ISSUE}" "abdv:done"
                      post_comment "${ROOT_ISSUE}" "🎉 全ての ABDV ワークフローステップが完了しました！Root Issue #${ROOT_ISSUE} のワークフローが正常に終了しました。"
                    fi
                  fi
                fi
              fi
              ;;

            "2.1")
              # Step.2.1 完了 → Step.2.2 を起動
              S22_NUM=$(get_sub_issue_number '\[ABDV\] Step\.2\.2:')
              if [[ -n "${S22_NUM}" ]]; then
                activate_issue "${S22_NUM}"
                echo "Step.2.2 (#${S22_NUM}) を起動しました。"
              else
                # Step.2.2 がスキップ → Step.3 → Step.4 の順にフォールバック
                S3_NUM=$(get_sub_issue_number '\[ABDV\] Step\.3:')
                if [[ -n "${S3_NUM}" ]]; then
                  activate_issue "${S3_NUM}"
                else
                  S41_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.1:')
                  S42_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.2:')
                  [[ -n "${S41_NUM}" ]] && activate_issue "${S41_NUM}"
                  [[ -n "${S42_NUM}" ]] && activate_issue "${S42_NUM}"
                  if [[ -z "${S41_NUM}" ]] && [[ -z "${S42_NUM}" ]]; then
                    add_label "${ROOT_ISSUE}" "abdv:done"
                    post_comment "${ROOT_ISSUE}" "🎉 全ての ABDV ワークフローステップが完了しました！Root Issue #${ROOT_ISSUE} のワークフローが正常に終了しました。"
                  fi
                fi
              fi
              ;;

            "2.2")
              # Step.2.2 完了 → Step.3 を起動
              S3_NUM=$(get_sub_issue_number '\[ABDV\] Step\.3:')
              if [[ -n "${S3_NUM}" ]]; then
                activate_issue "${S3_NUM}"
                echo "Step.3 (#${S3_NUM}) を起動しました。"
              else
                # Step.3 がスキップ → Step.4.1/4.2 を並列起動
                S41_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.1:')
                S42_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.2:')
                [[ -n "${S41_NUM}" ]] && activate_issue "${S41_NUM}"
                [[ -n "${S42_NUM}" ]] && activate_issue "${S42_NUM}"
                if [[ -z "${S41_NUM}" ]] && [[ -z "${S42_NUM}" ]]; then
                  add_label "${ROOT_ISSUE}" "abdv:done"
                  post_comment "${ROOT_ISSUE}" "🎉 全ての ABDV ワークフローステップが完了しました！Root Issue #${ROOT_ISSUE} のワークフローが正常に終了しました。"
                fi
              fi
              ;;

            "3")
              # Step.3 完了 → Step.4.1 と Step.4.2 を並列で起動
              S41_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.1:')
              S42_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.2:')
              if [[ -n "${S41_NUM}" ]]; then
                activate_issue "${S41_NUM}"
                echo "Step.4.1 (#${S41_NUM}) を起動しました。"
              fi
              if [[ -n "${S42_NUM}" ]]; then
                activate_issue "${S42_NUM}"
                echo "Step.4.2 (#${S42_NUM}) を起動しました。"
              fi
              if [[ -z "${S41_NUM}" ]] && [[ -z "${S42_NUM}" ]]; then
                # Step.4 が両方スキップ → ワークフロー完了
                add_label "${ROOT_ISSUE}" "abdv:done"
                post_comment "${ROOT_ISSUE}" "🎉 全ての ABDV ワークフローステップが完了しました！Root Issue #${ROOT_ISSUE} のワークフローが正常に終了しました。"
              fi
              ;;

            "4.1"|"4.2")
              # AND 依存チェック: Step.4.1 または Step.4.2 完了
              # → 両方 abdv:done になった後に Root Issue をワークフロー完了とする
              S41_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.1:')
              S42_NUM=$(get_sub_issue_number '\[ABDV\] Step\.4\.2:')

              S41_DONE="false"
              S42_DONE="false"
              # api_call のエラーはすでに stderr に出力される（api_call 関数参照）。
              # ここでは API エラー時に "false" を返してワークフローを止めないようにする。
              if [[ -n "${S41_NUM}" ]]; then
                S41_DONE=$(check_abdv_done "${S41_NUM}") \
                  || { echo "WARNING: check_abdv_done #${S41_NUM} 失敗 → incomplete として扱う。" >&2; S41_DONE="false"; }
              fi
              if [[ -n "${S42_NUM}" ]]; then
                S42_DONE=$(check_abdv_done "${S42_NUM}") \
                  || { echo "WARNING: check_abdv_done #${S42_NUM} 失敗 → incomplete として扱う。" >&2; S42_DONE="false"; }
              fi

              # 存在しない（スキップ済み）場合は完了とみなす
              [[ -z "${S41_NUM}" ]] && S41_DONE="true"
              [[ -z "${S42_NUM}" ]] && S42_DONE="true"

              if [[ "${S41_DONE}" == "true" ]] && [[ "${S42_DONE}" == "true" ]]; then
                add_label "${ROOT_ISSUE}" "abdv:done"
                echo "Root Issue #${ROOT_ISSUE} に abdv:done を付与しました。"
                post_comment "${ROOT_ISSUE}" "🎉 全ての ABDV ワークフローステップが完了しました！Root Issue #${ROOT_ISSUE} のワークフローが正常に終了しました。（Step.4.1: ${S41_DONE}, Step.4.2: ${S42_DONE}）"
                echo "Root Issue #${ROOT_ISSUE} に完了コメントを投稿しました。"
              else
                echo "AND 依存待機: Step.4.1/4.2 の両方完了を待機中です。（Step.4.1: ${S41_DONE}, Step.4.2: ${S42_DONE}）"
              fi
              ;;

            *)
              echo "未定義の Step: ${STEP_MATCH}。スキップ。"
              ;;
          esac
          # ── 自動クローズ判定（auto-merge 有効時）──────────────
          if [[ -f "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh" ]]; then
            source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh"

            # コンテナ Issue の自動クローズ判定
            _AC_CONTAINER_NUM=""
            if [[ "${DONE_ISSUE_TITLE}" =~ ^\[ABDV\]\ Step\.[0-9]+\.[0-9] ]]; then
              _AC_PARENT_STEP=$(echo "${DONE_ISSUE_TITLE}" \
                | grep -oP '\[ABDV\]\s*Step\.\K\d+' | head -1)
              if [[ -n "${_AC_PARENT_STEP}" ]]; then
                _AC_CONTAINER_NUM=$(gh api --paginate \
                  "/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues?per_page=100" \
                  --jq ".[] | select(.title | test(\"\\\\[ABDV\\\\] Step\\\\.${_AC_PARENT_STEP}:\")) | .number" \
                  2>/dev/null | head -1) || _AC_CONTAINER_NUM=""
              fi
            fi

            if [[ -n "${_AC_CONTAINER_NUM}" && "${_AC_CONTAINER_NUM}" =~ ^[0-9]+$ ]]; then
              echo "=== コンテナ Issue #${_AC_CONTAINER_NUM} の自動クローズ判定 ==="
              auto_close_container_if_done "${_AC_CONTAINER_NUM}" "${REPO}" || true
            fi

            echo "=== Root Issue #${ROOT_ISSUE} の自動クローズ判定 ==="
            auto_close_root_if_all_done "${ROOT_ISSUE}" "${REPO}" || true
          fi

      # ----------------------------------------------------------------
      # 4.5. closed イベント時のコンテナ/Root 自動クローズ判定
      # ----------------------------------------------------------------
      - name: コンテナ自動クローズ判定（closed イベント）
        if: steps.gate.outputs.mode == 'container_close_check'
        env:
          DONE_ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail

          # ── 完了した Issue の情報取得 ──
          if ! DONE_ISSUE_JSON=$(gh api "/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}" 2>/dev/null); then
            echo "::warning::Issue #${DONE_ISSUE_NUMBER} の取得に失敗しました（削除済みまたはアクセス不可）。"
            DONE_ISSUE_JSON='{}'
          fi
          DONE_ISSUE_TITLE=$(printf '%s' "${DONE_ISSUE_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('title',''))")
          DONE_ISSUE_BODY=$(printf '%s' "${DONE_ISSUE_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('body','') or '')")

          # ── Root Issue 番号の抽出 ──
          ROOT_ISSUE=$(echo "${DONE_ISSUE_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          b = sys.stdin.read()
          m = re.search(r'<!--\s*root-issue:\s*#(\d+)\s*-->', b)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${ROOT_ISSUE}" || ! "${ROOT_ISSUE}" =~ ^[0-9]+$ ]]; then
            echo "Root Issue を特定できないためスキップ。"
            exit 0
          fi
          echo "Root Issue: #${ROOT_ISSUE}"

          # ── auto-close.sh の読み込み ──
          if [[ ! -f "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh" ]]; then
            echo "auto-close.sh が見つかりません。スキップ。"
            exit 0
          fi
          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh"

          # ── コンテナ Issue の自動クローズ判定 ──
          _AC_CONTAINER_NUM=""
          if [[ "${DONE_ISSUE_TITLE}" =~ ^\[ABDV\]\ Step\.[0-9]+\.[0-9] ]]; then
            _AC_PARENT_STEP=$(echo "${DONE_ISSUE_TITLE}" \
              | grep -oP '\[ABDV\]\s*Step\.\K\d+' | head -1)
            if [[ -n "${_AC_PARENT_STEP}" ]]; then
              _AC_CONTAINER_NUM=$(gh api --paginate \
                "/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues?per_page=100" \
                --jq ".[] | select(.title | test(\"\\\\[ABDV\\\\] Step\\\\.${_AC_PARENT_STEP}:\")) | .number" \
                2>/dev/null | head -1) || _AC_CONTAINER_NUM=""
            fi
          fi

          if [[ -n "${_AC_CONTAINER_NUM}" && "${_AC_CONTAINER_NUM}" =~ ^[0-9]+$ ]]; then
            echo "=== コンテナ Issue #${_AC_CONTAINER_NUM} の自動クローズ判定 ==="
            auto_close_container_if_done "${_AC_CONTAINER_NUM}" "${REPO}" || true
          else
            echo "コンテナ Issue が特定できないためスキップ。"
          fi

          # ── Root Issue の自動クローズ判定 ──
          echo "=== Root Issue #${ROOT_ISSUE} の自動クローズ判定 ==="
          auto_close_root_if_all_done "${ROOT_ISSUE}" "${REPO}" || true

  self-improve:
    needs: orchestrate
    if: needs.orchestrate.result == 'success'
    runs-on: ${{ fromJSON(inputs.runner_type == 'self-hosted' && '["self-hosted","linux","x64","aca"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 180
    steps:
      - name: Parse Self-Improve settings
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          body=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" --jq '.body // ""' 2>/dev/null || true)
          enable=$(printf '%s' "${body}" | sed -n 's/^.*<!-- enable-self-improve: *\([^>]*\) *-->.*$/\1/p' | head -1 | tr '[:upper:]' '[:lower:]' | xargs || true)
          max_iter=$(printf '%s' "${body}" | sed -n 's/^.*<!-- self-improve-max-iterations: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          branch=$(printf "%s" "${body}" | sed -n 's/^.*<!-- branch: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          quality_threshold=$(printf '%s' "${body}" | sed -n 's/^.*<!-- self-improve-quality-threshold: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          if [[ -z "${enable}" ]]; then
            enable=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善ループ設定.*?\n(.*?)(?=###|\Z)', body, re.DOTALL)
          print('true' if (m and re.search(r'-\s*\[[xX]\]', m.group(1))) else 'false')
          " 2>/dev/null || echo "false")
          fi
          if [[ -z "${max_iter}" ]]; then
            max_iter=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善\s*最大イテレーション数.*?\n+(.+)', body)
          if m:
              n = re.match(r'(\d+)', m.group(1).strip())
              print(n.group(1) if n else '3')
          else:
              print('3')
          " 2>/dev/null || echo "3")
          fi
          if [[ -z "${quality_threshold}" ]]; then
            quality_threshold=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善\s*品質スコア閾値.*?\n+(.+)', body)
          if m:
              n = re.match(r'(\d+)', m.group(1).strip())
              print(n.group(1) if n else '80')
          else:
              print('80')
          " 2>/dev/null || echo "80")
          fi
          if [[ -z "${branch}" ]]; then
            branch=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*対象ブランチ.*?\n+(.+)', body)
          if m:
              val = m.group(1).strip()
              print(val if val and val != '_No response_' else 'main')
          else:
              print('main')
          " 2>/dev/null || echo "main")
          fi
          [[ -z "${enable}" ]] && enable="false"
          [[ -z "${max_iter}" ]] && max_iter="3"
          [[ -z "${quality_threshold}" ]] && quality_threshold="80"
          [[ -z "${branch}" ]] && branch="main"
          echo "enable=${enable}" >> "$GITHUB_OUTPUT"
          echo "max_iter=${max_iter}" >> "$GITHUB_OUTPUT"
          echo "quality_threshold=${quality_threshold}" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          ref: ${{ steps.parse.outputs.branch }}

      - name: Skip Self-Improve when branch is missing
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch == ''
        run: |
          echo "Skip Self-Improve: issue body に <!-- branch: ... --> がありません。"
      - uses: actions/setup-python@v5
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          node-version: "20"
      - name: Install dependencies
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        run: |
          pip install ruff pytest pytest-cov
          npm install -g markdownlint-cli
      - name: Run Self-Improve
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        env:
          MAX_ITERATIONS: ${{ steps.parse.outputs.max_iter }}
          QUALITY_THRESHOLD: ${{ steps.parse.outputs.quality_threshold }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import os
          from hve.self_improve import run_improvement_loop
          from hve.config import SDKConfig
          config = SDKConfig.from_env()
          config.auto_self_improve = True
          config.self_improve_scope = "workflow"
          config.self_improve_max_iterations = int(os.environ.get('MAX_ITERATIONS', '3'))
          config.self_improve_quality_threshold = int(os.environ.get('QUALITY_THRESHOLD', '80'))
          result = run_improvement_loop(config=config, repo_root='.')
          print(f'Self-Improve: {result["stopped_reason"]} (score={result["final_score"]})')
          PY
      - name: Commit improvements
        if: steps.parse.outputs.enable == 'true' && success()
        env:
          BRANCH: ${{ steps.parse.outputs.branch }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          branch="${BRANCH}"

          git check-ref-format --branch "${branch}" >/dev/null 2>&1 || {
            echo "::error::Invalid branch name: ${branch}" >&2
            exit 1
          }

          git add -A

          if git diff --cached --quiet; then
            echo "No Self-Improve changes to commit."
            exit 0
          fi

          git commit -m "[Self-Improve] 自動品質改善"

          pushed=false
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3 to ${branch}"

            if git push origin "HEAD:refs/heads/${branch}"; then
              pushed=true
              break
            fi

            if [ "${attempt}" -lt 3 ]; then
              echo "Push failed. Fetching and rebasing onto origin/${branch}..."
              git fetch origin "${branch}"

              if ! git rebase "origin/${branch}"; then
                echo "::error::Rebase failed due to conflicts. Aborting rebase." >&2
                git rebase --abort || true
                exit 1
              fi
            fi
          done

          if [ "${pushed}" != "true" ]; then
            echo "::error::git push failed after 3 attempts." >&2
            exit 1
          fi
