name: レビュー完了 → auto-approve-ready 自動遷移

# copilot-auto-review.yml がレビュー指示を投稿し、Copilot が修正コミットを push した後、
# レビュー結果を検証して auto-approve-ready ラベルを PR に付与する。
#
# 判定条件（すべて満たす必要あり）:
#   1. PR に auto-context-review ラベルが付いている
#   2. PR に auto-approve-ready ラベルがまだ付いていない
#   3. PR が draft でない（job if の pull_request_target 分岐で `&& !github.event.pull_request.draft` を判定。issue_comment 分岐では判定しない）
#   4. <!-- copilot-auto-review-posted --> マーカーが PR コメントに存在する（レビュー指示済み）
#   5. レビュー指示後の Copilot コメントの <!-- review-verdict: --> マーカーを確認:
#      - PASS マーカー発見 → 即完了
#      - FAIL マーカー発見 → ブロック（修正完了待ち）
#      - マーカーなし → 条件 6 のフォールバック判定を使用
#   6. synchronize イベントの場合: 最新コミット日時がレビュー指示日時より後（フォールバック）
#      issue_comment イベントの場合: Bot の回答コメントが存在する（フォールバック）
#
# トリガー: pull_request_target: [synchronize], issue_comment: [created]
#   - synchronize = PR へのコミット push（Copilot がタスク完了後に push する）
#   - issue_comment = PR へのコメント（Bot が完了報告のみでコメントした場合のフォールバック）
#
# 注意:
#   - pull_request_target を使用（Copilot が作成した PR のブランチには
#     ワークフロー定義がない可能性があるため、ベースブランチの定義で実行）
#   - COPILOT_PAT 優先、未設定時は GITHUB_TOKEN にフォールバック
#   - ${{ }} 式をシェル変数に直接展開せず、env 経由で渡す（スクリプトインジェクション対策）

on:
  workflow_call:
    inputs:
      event_name:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      pr_body:
        required: false
        type: string
        default: ''
      pr_labels:
        required: false
        type: string
        default: '[]'

concurrency:
  group: auto-review-to-approve-${{ inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  transition:
    # 事前フィルタ（pull_request_target の場合）:
    #   - PR に auto-context-review ラベルが付いている
    #   - PR に auto-approve-ready ラベルがまだ付いていない
    #   - PR が draft でない
    # 事前フィルタ（issue_comment の場合）:
    #   - PR へのコメントである（issue.pull_request が存在する）
    #   - Copilot Bot のコメントである（copilot-swe-agent または Copilot ログインで限定）
    #   - draft 判定は行わない（issue_comment 経路は draft PR でも遷移判定を継続）
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ inputs.pr_number }}
      EVENT_NAME: ${{ inputs.event_name }}
      PR_BODY: ${{ inputs.pr_body }}
      RECHECK_MAX_ATTEMPTS: "2"

    steps:
      - name: リポジトリをチェックアウト（共通スクリプト読み込みのため）
        uses: actions/checkout@v4

      - name: PR 情報を取得（issue_comment 対応）
        id: pr-info
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "issue_comment" ]; then
            pr_api_err=$(mktemp)
            pr_data=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}" 2>"${pr_api_err}") || {
              echo "PR #${PR_NUMBER} の情報取得に失敗しました。スキップします。エラー詳細:"
              cat "${pr_api_err}" || true
              rm -f "${pr_api_err}"
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              exit 0
            }
            rm -f "${pr_api_err}"
            has_context_review=$(echo "${pr_data}" | jq -r '[.labels[].name] | if contains(["auto-context-review"]) then "true" else "false" end')
            has_approve_ready=$(echo "${pr_data}" | jq -r '[.labels[].name] | if contains(["auto-approve-ready"]) then "true" else "false" end')
            if [ "${has_context_review}" != "true" ] || [ "${has_approve_ready}" = "true" ]; then
              echo "スキップ条件: auto-context-review=${has_context_review}, auto-approve-ready=${has_approve_ready}"
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            # PR body を GITHUB_ENV に設定（find_issue_number Method 2 用）
            pr_body=$(echo "${pr_data}" | jq -r '.body // ""')
            EOF_MARKER=$(uuidgen 2>/dev/null || printf '%s-%s' "$(date +%s)" "${RANDOM}")
            {
              echo "PR_BODY<<${EOF_MARKER}"
              echo "${pr_body}"
              echo "${EOF_MARKER}"
            } >> "${GITHUB_ENV}"
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: 紐づく Issue 番号を特定
        id: find-issue
        if: steps.pr-info.outputs.skip != 'true'
        env:
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          source "${GITHUB_WORKSPACE}/.github/scripts/pr-common.sh"
          find_issue_number
          echo "issue_number=${ISSUE_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: レビュー完了条件を判定
        id: check-review-complete
        if: steps.pr-info.outputs.skip != 'true'
        env:
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.issue_number }}
        run: |
          set -euo pipefail

          echo "=== レビュー完了条件チェック開始 ==="
          review_complete="false"
          issue_auto_merge="false"
          reason=""
          echo "issue_number=${ISSUE_NUMBER}" >> "${GITHUB_OUTPUT}"

          if [ -n "${ISSUE_NUMBER}" ]; then
            issue_body=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" --jq 'select(.pull_request == null) | .body // ""' 2>/dev/null || echo "")
            if [ -z "${issue_body}" ]; then
              reason="紐づく #${ISSUE_NUMBER} は Issue として検証できないため auto-merge 判定ができません。"
              echo "${reason}"
              echo "review_complete=false" >> "${GITHUB_OUTPUT}"
              echo "issue_auto_merge=${issue_auto_merge}" >> "${GITHUB_OUTPUT}"
              echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            if printf '%s' "${issue_body}" | grep -Eq '<!--[[:space:]]*auto-merge:[[:space:]]*true[[:space:]]*-->'; then
              issue_auto_merge="true"
            else
              reason="紐づく Issue #${ISSUE_NUMBER} に <!-- auto-merge: true --> がありません。"
              echo "${reason}"
              echo "review_complete=false" >> "${GITHUB_OUTPUT}"
              echo "issue_auto_merge=${issue_auto_merge}" >> "${GITHUB_OUTPUT}"
              echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          else
            # --- フォールバック: Issue 未特定時、sync-issue-labels コメントから復元 ---
            echo "⚠️ find_issue_number() で Issue を特定できませんでした。"
            echo "=== フォールバック: sync-issue-labels コメントから Issue 番号を復元 ==="
            FALLBACK_ISSUE=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --paginate \
              --jq '.[]' 2>/dev/null \
              | jq -rs '[.[]
                  | select(.user.type == "Bot")
                  | select((.user.login == "github-actions[bot]") or (.user.login == "copilot-swe-agent[bot]"))
                  | select(.body | contains("<!-- sync-issue-labels-done -->"))
                  | select(.body | contains("sync-issue-labels-to-pr.yml"))
                  | .body] | .[0] // ""' \
              | grep -oP 'Issue #\K[0-9]+' \
              | head -1) || FALLBACK_ISSUE=""
            if [ -n "${FALLBACK_ISSUE}" ]; then
              echo "✅ フォールバック成功: Issue #${FALLBACK_ISSUE}"
              ISSUE_NUMBER="${FALLBACK_ISSUE}"
              echo "issue_number=${ISSUE_NUMBER}" >> "${GITHUB_OUTPUT}"
              issue_body=$(gh api "/repos/${REPO}/issues/${FALLBACK_ISSUE}" --jq 'select(.pull_request == null) | .body // ""' 2>/dev/null || echo "")
              if [ -z "${issue_body}" ]; then
                reason="フォールバックで復元した #${FALLBACK_ISSUE} は Issue として検証できないため auto-merge 判定ができません。"
                echo "${reason}"
                echo "review_complete=false" >> "${GITHUB_OUTPUT}"
                echo "issue_auto_merge=${issue_auto_merge}" >> "${GITHUB_OUTPUT}"
                echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
                exit 0
              elif printf '%s' "${issue_body}" | grep -Eq '<!--[[:space:]]*auto-merge:[[:space:]]*true[[:space:]]*-->'; then
                issue_auto_merge="true"
              else
                reason="フォールバック Issue #${FALLBACK_ISSUE} に <!-- auto-merge: true --> がありません。"
                echo "${reason}"
                echo "review_complete=false" >> "${GITHUB_OUTPUT}"
                echo "issue_auto_merge=${issue_auto_merge}" >> "${GITHUB_OUTPUT}"
                echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
            else
              reason="紐づく Issue を特定できないため auto-merge 判定ができません。（sync-issue-labels コメントも未検出）"
              echo "${reason}"
              echo "review_complete=false" >> "${GITHUB_OUTPUT}"
              echo "issue_auto_merge=${issue_auto_merge}" >> "${GITHUB_OUTPUT}"
              echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          # PR コメント一覧を取得（以降の条件チェックで使用）
          pr_comments=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' 2>/dev/null | jq -s '.' 2>/dev/null) || pr_comments="[]"

          # 条件 4: レビュー指示コメント（初回 or 再レビュー）が存在するか
          review_posted_count=$(echo "${pr_comments}" \
            | jq '[.[] | select(
                (.body | contains("<!-- copilot-auto-review-posted -->"))
                or (.body | contains("<!-- copilot-auto-recheck-posted -->"))
              )] | length')
          echo "レビュー指示コメント数: ${review_posted_count}"

          if [ "${review_posted_count:-0}" -eq 0 ]; then
            reason="レビュー指示コメント（初回/再レビュー）が見つかりません。レビュー未開始です。"
            echo "${reason}"
            echo "review_complete=false" >> "${GITHUB_OUTPUT}"
            echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # レビュー指示コメントの投稿日時を取得（初回/再レビューの最新を使用）
          review_instruction_at=$(echo "${pr_comments}" \
            | jq -r '[.[] | select(
                (.body | contains("<!-- copilot-auto-review-posted -->"))
                or (.body | contains("<!-- copilot-auto-recheck-posted -->"))
              )] | .[-1].created_at')
          echo "レビュー指示日時: ${review_instruction_at}"

          # 条件 5: レビュー指示後の Copilot コメントの review-verdict マーカーを確認
          # copilot-auto-review.yml の指示で Copilot は結果末尾に以下のいずれかを出力する:
          #   <!-- review-verdict: PASS -->  (Critical = 0)
          #   <!-- review-verdict: FAIL -->  (Critical > 0)
          # 最新の verdict マーカーが FAIL なら修正完了待ちでブロック
          # PASS なら条件 6 に進む。マーカーなし（旧形式）はフォールバック判定を使用。
          bot_comments_after_review=$(echo "${pr_comments}" \
            | jq --arg review_at "${review_instruction_at}" \
              '[.[] | select(
                .created_at > $review_at
                and (.user.type == "Bot")
                and ((.user.login | startswith("copilot-swe-agent")) or .user.login == "Copilot")
              )]')
          echo "レビュー指示後の Copilot コメント数: $(echo "${bot_comments_after_review}" | jq 'length')"

          # review-verdict マーカーを含む最新コメントを検索
          latest_verdict=$(echo "${bot_comments_after_review}" \
            | jq -r '
              [ .[] | select(
                  (.body | contains("<!-- review-verdict: PASS -->"))
                  or (.body | contains("<!-- review-verdict: FAIL -->"))
                )
              ] | .[-1] |
              if . == null then "none"
              elif (.body | contains("<!-- review-verdict: FAIL -->")) then "FAIL"
              else "PASS"
              end
            ')
          echo "最新の review-verdict: ${latest_verdict}"

          # review-verdict マーカーがない旧形式コメント向けフォールバック判定
          if [ "${latest_verdict}" = "none" ]; then
            bot_comment_count=$(echo "${bot_comments_after_review}" | jq 'length')
            fallback_verdict="none"
            if [ "${bot_comment_count}" -gt 0 ] 2>/dev/null; then
              for i in $(seq $((bot_comment_count - 1)) -1 0); do
                body=$(echo "${bot_comments_after_review}" | jq -r ".[$i].body")
                if echo "${body}" | grep -q "合格判定" && echo "${body}" | grep -q "✅" && echo "${body}" | grep -qi "PASS"; then
                  fallback_verdict="PASS"
                  break
                elif echo "${body}" | grep -q "合格判定" && echo "${body}" | grep -q "❌" && echo "${body}" | grep -qi "FAIL"; then
                  fallback_verdict="FAIL"
                  break
                fi
              done
            fi
            if [ "${fallback_verdict}" != "none" ]; then
              latest_verdict="${fallback_verdict}"
              echo "フォールバック判定の review-verdict: ${latest_verdict}"
            fi
          fi

          if [ "${latest_verdict}" = "FAIL" ]; then
            fail_comment_at=$(echo "${bot_comments_after_review}" \
              | jq -r '[ .[] | select(.body | contains("<!-- review-verdict: FAIL -->")) ] | .[-1].created_at')
            if [ -z "${fail_comment_at}" ] || [ "${fail_comment_at}" = "null" ]; then
              fail_comment_at=$(echo "${bot_comments_after_review}" | jq -r '.[-1].created_at // ""')
            fi
            latest_commit_at=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/commits" \
              --paginate \
              --jq '.[-1].commit.committer.date' 2>/dev/null | tail -1) || latest_commit_at=""

            if [ -n "${latest_commit_at}" ] && [ -n "${fail_comment_at}" ] \
              && [ "$(date -d "${latest_commit_at}" +%s 2>/dev/null || echo 0)" \
                -gt "$(date -d "${fail_comment_at}" +%s 2>/dev/null || echo 0)" ]; then
              echo "review_complete=false" >> "${GITHUB_OUTPUT}"
              echo "needs_recheck=true" >> "${GITHUB_OUTPUT}"
              echo "latest_verdict=FAIL" >> "${GITHUB_OUTPUT}"
              echo "issue_auto_merge=${issue_auto_merge}" >> "${GITHUB_OUTPUT}"
              echo "reason=FAIL 後に修正コミットを検知。再レビューを実行します。" >> "${GITHUB_OUTPUT}"
            else
              reason="review-verdict: FAIL。Copilot の修正完了を待っています。"
              echo "${reason}"
              echo "review_complete=false" >> "${GITHUB_OUTPUT}"
              echo "needs_recheck=false" >> "${GITHUB_OUTPUT}"
              echo "latest_verdict=FAIL" >> "${GITHUB_OUTPUT}"
              echo "issue_auto_merge=${issue_auto_merge}" >> "${GITHUB_OUTPUT}"
              echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
            fi
            exit 0
          fi

          # PASS 判定の場合は条件 6 をスキップして即完了
          if [ "${latest_verdict}" = "PASS" ]; then
            echo "✅ review-verdict: PASS マーカーを検知しました。レビュー完了と判定します。"
            echo "review_complete=true" >> "${GITHUB_OUTPUT}"
            echo "needs_recheck=false" >> "${GITHUB_OUTPUT}"
            echo "latest_verdict=PASS" >> "${GITHUB_OUTPUT}"
            echo "issue_auto_merge=${issue_auto_merge}" >> "${GITHUB_OUTPUT}"
            echo "reason=レビュー完了: review-verdict: PASS マーカーが確認されました。" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # マーカーなし（フォールバック）: 旧形式またはまだ verdict が出ていない場合
          if [ "${EVENT_NAME}" = "pull_request_target" ]; then
            # synchronize イベント: 最新コミット日時がレビュー指示日時より後であれば完了
            latest_commit_at=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/commits" \
              --paginate \
              --jq '.[-1].commit.committer.date' 2>/dev/null | tail -1) || latest_commit_at=""
            echo "最新コミット日時: ${latest_commit_at}"

            if [ -n "${latest_commit_at}" ] && [ "$(date -d "${latest_commit_at}" +%s 2>/dev/null || echo 0)" -gt "$(date -d "${review_instruction_at}" +%s 2>/dev/null || echo 0)" ]; then
              echo "✅ レビュー指示後にコミットが存在します。レビュー完了と判定します。"
              review_complete="true"
              reason="レビュー完了: レビュー指示後に Copilot がコミットを push しました（verdict マーカーなしフォールバック）。"
            else
              reason="レビュー指示後にコミットがまだありません。Copilot の修正完了待ちです。"
              echo "${reason}"
            fi
          elif [ "${EVENT_NAME}" = "issue_comment" ]; then
            # issue_comment イベント: Bot の回答コメントが存在すれば完了
            bot_reply_count=$(echo "${bot_comments_after_review}" | jq 'length')
            if [ "${bot_reply_count:-0}" -gt 0 ]; then
              echo "✅ レビュー指示後に Copilot の回答コメントが存在します。レビュー完了と判定します。"
              review_complete="true"
              reason="レビュー完了: Copilot がレビュー指示に対して回答しました（verdict マーカーなしフォールバック）。"
            else
              reason="レビュー指示後に Copilot の回答コメントがまだありません。"
              echo "${reason}"
            fi
          fi

          echo "review_complete=${review_complete}" >> "${GITHUB_OUTPUT}"
          echo "needs_recheck=false" >> "${GITHUB_OUTPUT}"
          echo "latest_verdict=none" >> "${GITHUB_OUTPUT}"
          echo "issue_auto_merge=${issue_auto_merge}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"

      - name: 再レビュー指示を PR に投稿
        if: >
          steps.pr-info.outputs.skip != 'true'
          && steps.check-review-complete.outputs.needs_recheck == 'true'
        env:
          ISSUE_NUMBER: ${{ steps.check-review-complete.outputs.issue_number }}
          LIMIT_NOTICE_BODY: |
            ## ⚠️ 自動再レビュー上限に到達しました

            <!-- copilot-auto-recheck-limit-reached -->
            再レビューは上限（2回）に到達しました。以降は手動で確認してください。
          COMMENT_BODY: |
            <!-- copilot-auto-recheck-posted -->
            @copilot

            ## 再レビュー実行指示

            前回レビューで `review-verdict: FAIL` が検出されましたが、その後に修正コミットを検知しました。
            最新コミットを対象に再レビューを実行してください。

            ### 要件
            1. 5軸レビュー → 修正実行 → 修正後の残存 Critical 再カウントの順で実施すること。
            2. 最終サマリーの合格判定直後に、必ず次のいずれかを出力すること。
               - `<!-- review-verdict: PASS -->`（残存 Critical = 0）
               - `<!-- review-verdict: FAIL -->`（残存 Critical > 0）
            3. 捏造は絶対に禁止です。
        run: |
          set -euo pipefail

          pr_comments=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' 2>/dev/null | jq -s '.' 2>/dev/null) || pr_comments="[]"
          recheck_count=$(echo "${pr_comments}" \
            | jq '[.[] | select(.body | contains("<!-- copilot-auto-recheck-posted -->"))] | length')

          # recheck_count は「再レビュー指示（copilot-auto-recheck-posted）」件数のみを数える。
          # 初回レビュー1回 + 再レビュー2回（recheck_count=2）で打ち切る。
          if [ "${recheck_count:-0}" -ge "${RECHECK_MAX_ATTEMPTS}" ] 2>/dev/null; then
            gh pr comment "${PR_NUMBER}" \
              --repo "${REPO}" \
              --body "${LIMIT_NOTICE_BODY}"
            echo "再レビュー上限に到達したため手動対応通知を投稿しました。"
            exit 0
          fi

          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "${COMMENT_BODY}"
          echo "✅ 再レビュー指示を投稿しました。"

      - name: FAIL 時 @copilot 修正指示コメントを PR に投稿
        # review-verdict: FAIL かつ修正コミット未検知の場合に、
        # @copilot 宛の修正指示コメントを投稿する。
        # head SHA ベースの冪等マーカーにより同一コミットへの重複投稿を防ぐ。
        if: >
          steps.pr-info.outputs.skip != 'true'
          && steps.check-review-complete.outputs.review_complete != 'true'
          && steps.check-review-complete.outputs.needs_recheck != 'true'
          && steps.check-review-complete.outputs.latest_verdict == 'FAIL'
        run: |
          set -euo pipefail

          # PR の head SHA を取得（冪等マーカーに使用）
          head_sha=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}" \
            --jq '.head.sha // ""' 2>/dev/null || echo '')
          if [ -z "${head_sha}" ]; then
            echo "WARNING: head SHA の取得に失敗しました。修正指示コメントの投稿をスキップします。"
            exit 0
          fi

          SHA_MARKER="<!-- copilot-auto-review-fix-requested: ${head_sha} -->"

          # 冪等性チェック: 同一 head SHA に対して既に投稿済みならスキップ
          pr_comments=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' 2>/dev/null | jq -s '.' 2>/dev/null) || pr_comments="[]"

          existing_count=$(echo "${pr_comments}" \
            | jq --arg sha_marker "${SHA_MARKER}" \
              '[.[] | select(.body | contains($sha_marker))] | length' 2>/dev/null || echo 0)

          if [ "${existing_count:-0}" -gt 0 ]; then
            echo "同一 head SHA (${head_sha}) への修正指示は既に投稿済みです。スキップします。"
            exit 0
          fi

          # FAIL レビューコメント本文を取得（最新の review-verdict: FAIL コメント）
          fail_comment_body=$(echo "${pr_comments}" \
            | jq -r '[ .[] | select(
                (.body | contains("<!-- review-verdict: FAIL -->"))
                and (.user.type == "Bot")
              )] | .[-1].body // ""' 2>/dev/null || echo '')

          if [ -z "${fail_comment_body}" ]; then
            fail_comment_body="（レビュー指摘内容を取得できませんでした。最新のレビューコメントを参照してください。）"
          fi

          # @copilot 修正指示コメントを投稿
          COMMENT_BODY=$(printf '%s\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n%s\n%s\n%s\n%s\n\n%s\n\n%s' \
            "<!-- copilot-auto-review-fix-requested -->" \
            "${SHA_MARKER}" \
            "@copilot" \
            "The automated context review returned **FAIL**." \
            "Please update the existing changes in this pull request by addressing the review findings below." \
            "**Requirements:**" \
            "- Do not create unrelated changes." \
            "- Modify the artifacts produced by the main task." \
            "- Keep the diff minimal." \
            "- Push a new commit to this PR." \
            "**Review findings:**" \
            "${fail_comment_body}")

          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "${COMMENT_BODY}"
          echo "✅ FAIL 修正指示コメントを PR #${PR_NUMBER} に投稿しました（head SHA: ${head_sha}）。"

      - name: auto-approve-ready ラベルを PR に付与
        if: >
          steps.pr-info.outputs.skip != 'true'
          && steps.check-review-complete.outputs.review_complete == 'true'
          && steps.check-review-complete.outputs.issue_auto_merge == 'true'
        run: |
          set -euo pipefail
          echo "=== auto-approve-ready ラベルを PR #${PR_NUMBER} に付与します ==="
          gh pr edit "${PR_NUMBER}" \
            --repo "${REPO}" \
            --add-label "auto-approve-ready"
          echo "✅ auto-approve-ready ラベルを付与しました。auto-approve-and-merge.yml が発火します。"

      - name: サマリーコメントを PR に投稿（遷移完了）
        if: steps.pr-info.outputs.skip != 'true' && steps.check-review-complete.outputs.review_complete == 'true'
        env:
          ISSUE_NUMBER: ${{ steps.check-review-complete.outputs.issue_number }}
          REASON: ${{ steps.check-review-complete.outputs.reason }}
        run: |
          set -euo pipefail

          COMMENT=$(printf '%s\n\n%s\n\n%s\n%s\n\n%s\n%s\n\n%s' \
            '## 🔄 レビュー完了 → Approve 自動遷移' \
            'レビュー完了を検知しました。`auto-approve-ready` ラベルを PR に付与しました。' \
            "- 📋 **紐づく Issue**: #${ISSUE_NUMBER}" \
            "- 🔍 **判定理由**: ${REASON}" \
            '次のステップ:' \
            '- `auto-approve-and-merge.yml` が自動発火し、PR の Approve と Auto-merge が実行されます。' \
            '> ℹ️ このコメントは `auto-review-to-approve-transition.yml` によって自動投稿されました。')

          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "${COMMENT}"
          echo "✅ サマリーコメントを PR #${PR_NUMBER} に投稿しました。"

      - name: サマリーコメントを PR に投稿（未完了）
        if: steps.pr-info.outputs.skip != 'true' && steps.check-review-complete.outputs.review_complete != 'true'
        env:
          REASON: ${{ steps.check-review-complete.outputs.reason }}
        run: |
          set -euo pipefail
          # 未完了の場合はログのみ出力（PR コメントは投稿しない。synchronize は頻繁に発火するため）
          echo "⏳ レビュー完了条件を満たしていません: ${REASON}"
          echo "次の synchronize または issue_comment イベントで再チェックします。"
