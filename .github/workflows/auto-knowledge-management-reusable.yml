name: AKM Orchestrator

# knowledge-management ラベル付き Issue の opened/labeled/closed イベントで起動
#
# 設計メモ:
#   - Issue Template の labels: 由来の起動では、issues.opened と issues.labeled の
#     両イベントが到達し得る前提で扱う。
#   - そのため opened イベントも監視し、ジョブレベル if で対象ラベルを持つ Issue のみ実行する。
#   - opened イベント時は github.event.label が null のため LABEL_NAME は空文字列になる。
#   - 既存の冪等化ガード（akm:initialized チェック）により、opened + labeled が同時発火しても安全。
on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: ''
      issue_number:
        required: true
        type: string
      event_action:
        required: false
        type: string
        default: ''
      label_name:
        required: false
        type: string
        default: ''
      issue_labels:
        required: false
        type: string
        default: '[]'

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    concurrency:
      group: akm-orchestrator-${{ inputs.issue_number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}

    steps:
      # ----------------------------------------------------------------
      # 1. 実行ゲート: knowledge-management ラベルあり + akm:initialized なし
      # ----------------------------------------------------------------
      - name: 実行ゲートチェック
        id: gate
        env:
          ISSUE_LABELS: ${{ inputs.issue_labels }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EVENT_ACTION: ${{ inputs.event_action }}
          LABEL_NAME: "${{ inputs.label_name }}"
        run: |
          set -euo pipefail
          AKM_STEP_RE='^\[AKM\] Step\.'

          # Issue の情報を API 経由で一括取得（YAML 展開問題を回避・API 呼び出し回数を削減）
          if ! ISSUE_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}"); then
            echo "WARNING: Issue API 取得に失敗しました。スキップします。" >&2
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ISSUE_TITLE=$(echo "${ISSUE_RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          ISSUE_LABELS=$(echo "${ISSUE_RESPONSE}" | python3 -c "import sys,json; print(json.dumps([l['name'] for l in json.load(sys.stdin).get('labels',[])]))")
          export ISSUE_TITLE
          echo "リアルタイムラベル: ${ISSUE_LABELS}"

          # labeled イベントの処理
          if [[ "${EVENT_ACTION}" == "labeled" ]]; then
            if [[ "${LABEL_NAME}" == "akm:done" ]]; then
              if [[ "${ISSUE_TITLE}" =~ $AKM_STEP_RE ]]; then
                echo "Sub Issue ([AKM] Step.N タイトル) への akm:done 付与を検知: state_transition に進みます。"
                echo "mode=state_transition" >> "$GITHUB_OUTPUT"
                echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "Root Issue への akm:done 付与を検知: ワークフローはスキップします。"
                echo "mode=skip" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            elif [[ "${LABEL_NAME}" == "knowledge-management" ]]; then
              # knowledge-management ラベルが後から付与された場合:
              # 下の has_akm_init チェックが未初期化かどうかを判定し、未初期化なら initialize に進む。
              # 既に akm:initialized 済みの場合は has_akm_init チェックで skip になる。
              echo "knowledge-management labeled イベント: initialize ゲートチェックへ進みます。"
            else
              echo "akm:done / knowledge-management 以外の labeled イベント（${LABEL_NAME}）。スキップ。"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # closed イベントの処理
          if [[ "${EVENT_ACTION}" == "closed" ]]; then
            # [AKM] Step.N Sub Issue のみ処理
            if [[ "${ISSUE_TITLE}" =~ $AKM_STEP_RE ]]; then
              # 既に akm:done がついている場合は closed イベントで再判定に進む
              has_done=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          print('true' if 'akm:done' in labels else 'false')
          PY
              )
              if [[ "${has_done}" == "true" ]]; then
                # akm:done labeled 時は Issue 未クローズのため自動クローズ判定が失敗する。
                # closed イベントで再度コンテナ自動クローズ判定のみ実行する。
                echo "akm:done ラベル済み + closed イベント: コンテナ自動クローズ判定のみ実行。"
                echo "mode=container_close_check" >> "$GITHUB_OUTPUT"
                echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              # akm:done がない場合は closed イベントから直接 state_transition を起動
              echo "mode=state_transition" >> "$GITHUB_OUTPUT"
              echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "closed イベント: [AKM] Sub Issue 以外のためスキップ。"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # [AKM] Step.N プレフィックスを持つ Sub Issue は初期化をスキップ
          # （Sub Issue の opened イベントによる再帰的な初期化を防止）
          if [[ "${ISSUE_TITLE}" =~ $AKM_STEP_RE ]]; then
            echo "[AKM] Step.N Sub Issue のため初期化対象外。スキップ。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # knowledge-management ラベルを持つか確認
          has_akm=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          print('true' if 'knowledge-management' in labels else 'false')
          PY
          )

          if [[ "${has_akm}" != "true" ]]; then
            echo "knowledge-management ラベルなし。スキップ。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # akm:initialized / akm:ready / akm:running / akm:done / akm:blocked
          # のいずれかを持つ場合はスキップ（冪等化・Sub Issue への誤再初期化防止）
          has_akm_init=$(echo "${ISSUE_LABELS}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          labels = json.load(sys.stdin)
          skip_labels = {'akm:initialized', 'akm:ready', 'akm:running', 'akm:done', 'akm:blocked'}
          print('true' if any(l in skip_labels for l in labels) else 'false')
          PY
          )

          if [[ "${has_akm_init}" == "true" ]]; then
            echo "akm:* ラベル済み。スキップ（冪等化）。"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=initialize" >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: ゲート結果のデバッグ出力
        if: always()
        env:
          GATE_MODE: ${{ steps.gate.outputs.mode }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EVENT_ACTION: ${{ inputs.event_action }}
        run: |
          echo "::notice::ゲート判定結果: mode=${GATE_MODE}, event=${EVENT_ACTION}, issue=#${ISSUE_NUMBER}"
          if [[ "${GATE_MODE}" == "skip" ]]; then
            echo "::notice::Issue #${ISSUE_NUMBER} のゲートチェックは skip でした（event: ${EVENT_ACTION}）"
          fi

      # ----------------------------------------------------------------
      # 2. ラベル bootstrap
      # ----------------------------------------------------------------
      - name: ラベル bootstrap
        if: steps.gate.outputs.mode == 'initialize'
        run: |
          set -euo pipefail

          # ラベル作成関数（インライン定義: checkout 前でも動作可能にするため）
          create_label() {
            local name="$1" color="$2" desc="${3:-}"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/labels" \
              -d "{\"name\":\"${name}\",\"color\":\"${color}\",\"description\":\"${desc}\"}")
            case "${http_code}" in
              201) echo "ラベル作成: ${name}" ;;
              422) echo "ラベル既存（スキップ）: ${name}" ;;
              *)   echo "ラベル作成エラー: ${name} HTTP ${http_code}" ;;
            esac
            sleep 1
          }

          create_label "knowledge-management" "0E8A16" "run QA requirement classification workflow (qa/ files to D01-D21 mapping)"
          create_label "akm:initialized"  "C5DEF5" ""
          create_label "akm:ready"        "0075CA" ""
          create_label "akm:running"      "E4E669" ""
          create_label "akm:done"         "0E8A16" ""
          create_label "akm:blocked"      "D73A4A" ""
          create_label "auto-qa"          "BFD4F2" "auto qa trigger for copilot-auto-qa workflow"
          create_label "auto-approve-ready" "1D76DB" "Ready for auto-approve and auto-merge"

      # ----------------------------------------------------------------
      # 2.5 akm:initialized 即時付与（二重実行防止）
      # ----------------------------------------------------------------
      - name: 即時 akm:initialized 付与（二重実行防止）
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail
          echo "二重実行防止のため akm:initialized を即座に付与します..."
          success=0
          for attempt in 1 2 3; do
            echo "akm:initialized 付与試行 ${attempt}/3..."
            if curl -sf -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/labels" \
              -d '{"labels":["akm:initialized"]}' > /dev/null; then
              success=1
              break
            fi
            echo "WARN: akm:initialized の付与に失敗しました。リトライします..." >&2
            sleep 2
          done
          if [[ "${success}" -ne 1 ]]; then
            echo "ERROR: akm:initialized の付与に失敗しました（3回試行後も失敗）。" >&2
            exit 1
          fi
          echo "akm:initialized を Issue #${ISSUE_NUMBER} に付与しました。"

      # ----------------------------------------------------------------
      # 2.6 リポジトリチェックアウト
      # ----------------------------------------------------------------
      - name: Checkout repository
        if: steps.gate.outputs.mode != 'skip'
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 3. Issue body パース & Step Issue 生成
      # ----------------------------------------------------------------
      - name: Issue 初期化と Step Issue 生成
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail

          # Issue body を API 経由で安全に取得（YAML 展開問題を回避）
          ISSUE_BODY=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          export ISSUE_BODY

          if [[ -z "${COPILOT_PAT:-}" ]]; then
            echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインは全てスキップされます。" >&2
          fi

          ROOT_ISSUE="${ISSUE_NUMBER}"

          # ---- ユーティリティ関数 ----
          source "${GITHUB_WORKSPACE}/.github/scripts/akm-common.sh"

          # ERR トラップを関数にも継承させる（auto-app-detail-design.yml と同様）
          set -E
          trap 'set +e; trap - ERR; post_comment "${ROOT_ISSUE}" "⚠️ ワークフローエラー: Step 処理中に予期しないエラーが発生しました (exit code: $?)" || true' ERR

          # ---- Issue body パース ----
          PARSED=$(python3 - <<'PYEOF'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")

          # ブランチ名抽出（Issue Template の対象ブランチフィールドから取得、なければ "main"）
          branch = "main"
          m = re.search(r"###\s*対象ブランチ\s*\n+(.+)", body)
          if m:
              val = m.group(1).strip()
              if val and val != "_No response_":
                  branch = val

          # sources 抽出
          sources = "qa"
          m = re.search(r"###\s*ソース\s*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              source_text = m.group(1).strip()
              if "original-docs のみ" in source_text:
                  sources = "original-docs"
              elif "両方" in source_text:
                  sources = "both"

          # 対象ファイル抽出（1行1ファイル）
          target_files = ""
          m = re.search(r"###\s*target_files.*?\n+(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              raw = m.group(1).strip()
              if raw and raw != "_No response_":
                  lines = [l.strip() for l in raw.splitlines() if l.strip() and not l.strip().startswith("#")]
                  target_files = " ".join(lines)

          # force_refresh 抽出（チェックボックス）
          # "- [x] 既存 status.md を完全に再生成する" → True / 未チェック → False
          force_refresh = False
          m = re.search(r"###\s*再生成オプション\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              section_text = m.group(1)
              force_refresh = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # 質問票設定: チェック [x] → auto-qa 有効
          auto_qa = False
          m = re.search(r"###\s*質問票設定\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              section_text = m.group(1)
              auto_qa = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # PR完全自動化設定: チェック [x] → 有効 (True)、未チェック → 無効 (False)
          auto_merge = False
          m = re.search(r"###\s*PR完全自動化設定\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              section_text = m.group(1)
              auto_merge = bool(re.search(r"-\s*\[[xX]\]", section_text))

          # 追加コメント抽出
          additional_comment = ""
          m = re.search(r"###\s*追加コメント[^\n]*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              val = m.group(1).strip()
              if val and val != "_No response_":
                  additional_comment = val
          custom_source_dir = []
          for line in additional_comment.splitlines():
              mm = re.match(r"^custom_source_dir:\s*(.+?)\s*$", line.strip())
              if mm:
                  custom_source_dir.append(mm.group(1))

          # 自己改善設定
          enable_self_improve = False
          si_section = re.search(r"###\s*自己改善ループ設定\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
          if si_section:
              enable_self_improve = bool(re.search(r"-\s*\[[xX]\]", si_section.group(1)))

          self_improve_max_iterations = "3"
          m = re.search(r"###\s*自己改善\s*最大イテレーション数.*?\n+(.+)", body)
          if m:
              val = m.group(1).strip()
              n = re.match(r"(\d+)", val)
              if n:
                  self_improve_max_iterations = n.group(1)

          self_improve_quality_threshold = "80"
          q = re.search(r"###\s*自己改善\s*品質スコア閾値.*?\n+(.+)", body)
          if q:
              val = q.group(1).strip()
              n = re.match(r"(\d+)", val)
              if n:
                  self_improve_quality_threshold = n.group(1)

          result = {
              "branch": branch,
              "sources": sources,
              "target_files": target_files,
              "custom_source_dir": " ".join(custom_source_dir),
              "force_refresh": force_refresh,
              "auto_qa": auto_qa,
              "auto_merge": auto_merge,
              "additional_comment": additional_comment,
              "enable_self_improve": enable_self_improve,
              "self_improve_max_iterations": self_improve_max_iterations,
              "self_improve_quality_threshold": self_improve_quality_threshold,
          }
          print(json.dumps(result))
          PYEOF
          )

          BRANCH=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['branch'])")
          SOURCES=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['sources'])")
          TARGET_FILES=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['target_files'])")
          CUSTOM_SOURCE_DIR=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('custom_source_dir',''))")
          FORCE_REFRESH=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('force_refresh') else 'false')")
          AUTO_QA=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_qa') else 'false')")
          AUTO_MERGE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_merge') else 'false')")
          ADDITIONAL_COMMENT=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['additional_comment'])")
          ENABLE_SELF_IMPROVE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('enable_self_improve') else 'false')")
          SELF_IMPROVE_MAX_ITER=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('self_improve_max_iterations','3'))")
          SELF_IMPROVE_QUALITY_THRESHOLD=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('self_improve_quality_threshold','80'))")

          echo "対象ブランチ: ${BRANCH}"
          echo "sources: ${SOURCES}"
          echo "対象ファイル: ${TARGET_FILES}"
          echo "custom_source_dir: ${CUSTOM_SOURCE_DIR}"
          echo "force_refresh: ${FORCE_REFRESH}"
          echo "質問票 (auto-qa): ${AUTO_QA}"
          echo "PR完全自動化 (auto-merge): ${AUTO_MERGE}"

          # ---- Root Issue body に auto-qa / auto-merge / branch / self-improve タグを埋め込み ----
          MERGE_TAG_FILE=$(mktemp)
          python3 - "${AUTO_QA}" "${AUTO_MERGE}" "${BRANCH}" "${ENABLE_SELF_IMPROVE}" "${SELF_IMPROVE_MAX_ITER}" "${SELF_IMPROVE_QUALITY_THRESHOLD}" "${MERGE_TAG_FILE}" <<'PYMERGE'
          import sys, os, re, json

          body = os.environ.get("ISSUE_BODY", "")
          auto_qa = sys.argv[1]
          auto_merge = sys.argv[2]
          branch = sys.argv[3]
          enable_si = sys.argv[4]
          si_max_iter = sys.argv[5]
          si_quality_threshold = sys.argv[6]
          output_file = sys.argv[7]

          tags = [
              ("auto-qa", auto_qa),
              ("auto-merge", auto_merge),
              ("branch", branch),
              ("enable-self-improve", enable_si),
              ("self-improve-max-iterations", si_max_iter),
              ("self-improve-quality-threshold", si_quality_threshold),
          ]

          for key, value in tags:
              tag = f"<!-- {key}: {value} -->"
              pat = re.compile(rf"<!--\s*{re.escape(key)}\s*:[^>]*-->")
              if pat.search(body):
                  body = pat.sub(tag, body, count=1)
              else:
                  body = body.rstrip() + "\n" + tag + "\n"

          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump({'body': body}, f, ensure_ascii=False)
          PYMERGE

          api_call PATCH \
            "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" \
            "$(cat "${MERGE_TAG_FILE}")" > /dev/null \
            && echo "Root Issue #${ROOT_ISSUE} に auto-qa / auto-merge / branch / self-improve タグを埋め込みました。" \
            || echo "WARNING: Root Issue body のタグ埋め込みに失敗しました。" >&2

          rm -f "${MERGE_TAG_FILE}"

          # ---- Root Issue に akm:initialized を付与（Step bootstrap で付与済みだが念のため） ----
          add_label "${ROOT_ISSUE}" "akm:initialized"
          echo "akm:initialized を付与しました。"

          if [[ "${AUTO_QA}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-qa"
            echo "Root Issue #${ROOT_ISSUE} に auto-qa ラベルを付与しました。"
          fi

          if [[ "${AUTO_MERGE}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-approve-ready"
            echo "Root Issue #${ROOT_ISSUE} に auto-approve-ready ラベルを付与しました。"
          fi

          # ---- Step Issue の body に埋め込む共通メタ情報 ----
          ROOT_REF=$(printf '<!-- root-issue: #%s -->\n<!-- branch: %s -->\n<!-- auto-qa: %s -->\n<!-- auto-merge: %s -->' "${ROOT_ISSUE}" "${BRANCH}" "${AUTO_QA}" "${AUTO_MERGE}")

          # 追加コメントが存在する場合のフッター
          if [[ -n "${ADDITIONAL_COMMENT}" ]]; then
            ADDITIONAL_SECTION=$(printf '\n\n## 追加コメント\n%s' "${ADDITIONAL_COMMENT}")
          else
            ADDITIONAL_SECTION=""
          fi

          # Step Issue に付与するラベルセット
          STEP_LABELS='["knowledge-management"]'

          if [[ "${AUTO_QA}" == "true" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c '. + ["auto-qa"]')
          fi

          if [[ "${AUTO_MERGE}" == "true" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c '. + ["auto-approve-ready"]')
          fi

          # ---- Step.1 ----
          # force_refresh の表示テキストを用意
          FORCE_REFRESH_DISPLAY="無効（差分更新）"
          if [[ "${FORCE_REFRESH}" == "true" ]]; then
            FORCE_REFRESH_DISPLAY="有効（完全再生成）"
          fi

          # 対象ファイルの表示テキストを用意
          TARGET_FILES_DISPLAY="（未指定）"
          if [[ -n "${TARGET_FILES}" ]]; then
            TARGET_FILES_DISPLAY=$(printf '%s' "${TARGET_FILES}" | tr ' ' '\n' | sed 's/^/- /')
          fi
          CUSTOM_SOURCE_DISPLAY="（未指定）"
          if [[ -n "${CUSTOM_SOURCE_DIR}" ]]; then
            CUSTOM_SOURCE_DISPLAY=$(printf '%s' "${CUSTOM_SOURCE_DIR}" | tr ' ' '\n' | sed 's/^/- /')
          fi

          BODY_S1=$(printf '%s\n## 目的\n`qa/` / `original-docs/` から knowledge ファイルを生成・更新する。\n\n## 実行パラメータ\n\n| パラメータ | 値 |\n|-----------|----|\n| sources | %s |\n| force_refresh | %s |\n\n### target_files\n%s\n\n### custom_source_dir\n%s\n\n## 入力\n- `qa/*.md`（sources=qa,both）\n- `original-docs/*`（sources=original-docs,both）\n- `template/business-requirement-document-master-list.md`\n\n## 出力\n- `knowledge/business-requirement-document-status.md`\n- `knowledge/D{NN}-<文書名>.md`\n\n## Custom Agent\n`KnowledgeManager`\n\n## 依存\n- なし（単独ステップ）\n\n## 完了条件\n- `knowledge/business-requirement-document-status.md` が生成されている\n- `knowledge/D{NN}-<文書名>.md` が更新されている\n- 完了時に自身に `akm:done` ラベルを付与すること%s' \
            "${ROOT_REF}" "${SOURCES}" "${FORCE_REFRESH_DISPLAY}" "${TARGET_FILES_DISPLAY}" "${CUSTOM_SOURCE_DISPLAY}" "${ADDITIONAL_SECTION}")

          if RESP=$(create_issue \
            "[AKM] Step.1: knowledge/ ドキュメント生成・管理" \
            "${BODY_S1}" \
            "${STEP_LABELS}"); then
            S1_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
            S1_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
            echo "Step.1 作成: #${S1_NUM}"
            sleep 3
          else
            post_comment "${ROOT_ISSUE}" "⚠️ Step Issue の作成に失敗しました: [AKM] Step.1 (ワークフローログを確認してください)" || true
            echo "ERROR: create_issue に失敗しました。ワークフローを中断します。" >&2
            exit 1
          fi

          # ---- Sub Issue 紐付け ----
          echo "Sub Issue 紐付けを開始します..."
          link_sub_issue "${ROOT_ISSUE}" "${S1_ID}"
          echo "Root → Step.1 紐付け完了"

          # ---- Step.1 を起動 ----
          add_label "${S1_NUM}" "akm:ready"
          CUSTOM_INSTRUCTIONS=""
          if [[ "${FORCE_REFRESH}" == "true" ]]; then
            CUSTOM_INSTRUCTIONS="force_refresh が有効です。既存の knowledge/business-requirement-document-status.md を完全に再生成してください。"
          fi
          CA=$(extract_custom_agent "${BODY_S1}")
          if assign_copilot "${S1_NUM}" "${CA}" "${BRANCH}" "${CUSTOM_INSTRUCTIONS}"; then
            add_label "${S1_NUM}" "akm:running"
            echo "Step.1 に copilot アサイン + akm:running 付与完了"
          else
            echo "WARNING: Step.1 へのアサイン失敗。akm:running は付与しません。"
          fi

          echo "初期化完了。"

      # ----------------------------------------------------------------
      # 4. 状態遷移: akm:done ラベル付与時
      # ----------------------------------------------------------------
      - name: 状態遷移処理
        if: steps.gate.outputs.mode == 'state_transition'
        env:
          DONE_ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail
          AKM_SUBSTEP_RE='^\[AKM\] Step\.[0-9]+\.[0-9]'

          # Issue の body と title を API 経由で安全に取得（YAML 展開問題を回避）
          _ISSUE_JSON=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}")
          DONE_ISSUE_BODY=$(echo "${_ISSUE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          DONE_ISSUE_TITLE=$(echo "${_ISSUE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          export DONE_ISSUE_BODY DONE_ISSUE_TITLE

          # closed イベント由来の場合: akm:done ラベルをまだ持っていなければ付与する
          _HAS_DONE_LABEL=$(echo "${_ISSUE_JSON}" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          labels = [l['name'] for l in d.get('labels', [])]
          print('true' if 'akm:done' in labels else 'false')
          ")
          if [[ "${_HAS_DONE_LABEL}" == "false" ]]; then
            echo "akm:done ラベルを付与します（closed イベント由来）..."
            curl -s -o /dev/null \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}/labels" \
              -d '{"labels":["akm:done"]}' || true
            echo "akm:done ラベルを付与しました。"
            sleep 2
          fi

          # ---- ユーティリティ関数 ----
          source "${GITHUB_WORKSPACE}/.github/scripts/akm-common.sh"

          # ---- done Issue の title から Step 番号を特定 ----
          STEP_MATCH=$(echo "${DONE_ISSUE_TITLE}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          title = sys.stdin.read().strip()
          m = re.search(r'\[AKM\] Step\.(\d+(?:\.\d+)?)', title)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${STEP_MATCH}" ]]; then
            echo "Step 番号が特定できません（title: ${DONE_ISSUE_TITLE}）。スキップ。"
            exit 0
          fi

          echo "完了した Step: ${STEP_MATCH}"

          # ---- Root Issue 番号の取得 ----
          ROOT_ISSUE=$(python3 - <<'PY'
          import os, re
          body = os.environ.get('DONE_ISSUE_BODY', '')
          m = re.search(r'<!-- root-issue: #(\d+) -->', body)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${ROOT_ISSUE}" ]]; then
            echo "Root Issue 番号が取得できません。スキップ。"
            exit 0
          fi

          echo "Root Issue: #${ROOT_ISSUE}"

          # ---- 依存関係マップに基づき処理 ----
          # AKM はステップが 1 つのみ: Step.1 完了 → Root Issue に akm:done + 完了コメント
          case "${STEP_MATCH}" in
            "1")
              add_label "${ROOT_ISSUE}" "akm:done"
              echo "Root Issue #${ROOT_ISSUE} に akm:done を付与しました。"
              _done_msg=$(printf '🎉 knowledge/ ドキュメント生成・管理（AKM）が完了しました！\n\n**生成された成果物:**\n- `knowledge/business-requirement-document-status.md` — D01〜D21 クラス別ステータス・カバレッジギャップ・詳細マッピング\n- `knowledge/D{NN}-<文書名>.md` — QA マッピングが存在する D クラスごとの個別文書ファイル\n- `work/KnowledgeManager/Issue-xxx/plan.md` — 実行計画')
              post_comment "${ROOT_ISSUE}" "${_done_msg}"
              echo "Root Issue #${ROOT_ISSUE} に完了コメントを投稿しました。"
              ;;

            *)
              echo "未定義の Step: ${STEP_MATCH}。スキップ。"
              ;;
          esac
          # ── 自動クローズ判定（auto-merge 有効時）──────────────
          if [[ -f "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh" ]]; then
            source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh"

            # コンテナ Issue の自動クローズ判定
            _AC_CONTAINER_NUM=""
            if [[ "${DONE_ISSUE_TITLE}" =~ $AKM_SUBSTEP_RE ]]; then
              _AC_PARENT_STEP=$(echo "${DONE_ISSUE_TITLE}" \
                | grep -oP '\[AKM\]\s*Step\.\K\d+' | head -1)
              if [[ -n "${_AC_PARENT_STEP}" ]]; then
                _AC_CONTAINER_NUM=$(gh api --paginate \
                  "/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues?per_page=100" \
                  --jq ".[] | select(.title | test(\"\\\\[AKM\\\\] Step\\\\.${_AC_PARENT_STEP}:\")) | .number" \
                  2>/dev/null | head -1) || _AC_CONTAINER_NUM=""
              fi
            fi

            if [[ -n "${_AC_CONTAINER_NUM}" && "${_AC_CONTAINER_NUM}" =~ ^[0-9]+$ ]]; then
              echo "=== コンテナ Issue #${_AC_CONTAINER_NUM} の自動クローズ判定 ==="
              auto_close_container_if_done "${_AC_CONTAINER_NUM}" "${REPO}" || true
            fi

            echo "=== Root Issue #${ROOT_ISSUE} の自動クローズ判定 ==="
            auto_close_root_if_all_done "${ROOT_ISSUE}" "${REPO}" || true
          fi

      # ----------------------------------------------------------------
      # 4.5. closed イベント時のコンテナ/Root 自動クローズ判定
      # ----------------------------------------------------------------
      - name: コンテナ自動クローズ判定（closed イベント）
        if: steps.gate.outputs.mode == 'container_close_check'
        env:
          DONE_ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail

          source "${GITHUB_WORKSPACE}/.github/scripts/akm-common.sh"

          # ── 完了した Issue の情報取得 ──
          if ! DONE_ISSUE_JSON=$(gh api "/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}" 2>/dev/null); then
            echo "::warning::Issue #${DONE_ISSUE_NUMBER} の取得に失敗しました（削除済みまたはアクセス不可）。"
            DONE_ISSUE_JSON='{}'
          fi
          DONE_ISSUE_TITLE=$(printf '%s' "${DONE_ISSUE_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('title',''))")
          DONE_ISSUE_BODY=$(printf '%s' "${DONE_ISSUE_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('body','') or '')")

          # ── Root Issue 番号の抽出 ──
          ROOT_ISSUE=$(echo "${DONE_ISSUE_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          b = sys.stdin.read()
          m = re.search(r'<!--\s*root-issue:\s*#(\d+)\s*-->', b)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${ROOT_ISSUE}" || ! "${ROOT_ISSUE}" =~ ^[0-9]+$ ]]; then
            echo "Root Issue を特定できないためスキップ。"
            exit 0
          fi
          echo "Root Issue: #${ROOT_ISSUE}"

          # ── auto-close.sh の読み込み ──
          if [[ ! -f "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh" ]]; then
            echo "auto-close.sh が見つかりません。スキップ。"
            exit 0
          fi
          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/auto-close.sh"

          # ── コンテナ Issue の自動クローズ判定 ──
          _AC_CONTAINER_NUM=""
          if [[ "${DONE_ISSUE_TITLE}" =~ ^\[AKM\]\ Step\.[0-9]+\.[0-9] ]]; then
            _AC_PARENT_STEP=$(echo "${DONE_ISSUE_TITLE}" \
              | grep -oP '\[AKM\]\s*Step\.\K\d+' | head -1)
            if [[ -n "${_AC_PARENT_STEP}" ]]; then
              _AC_CONTAINER_NUM=$(gh api --paginate \
                "/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues?per_page=100" \
                --jq ".[] | select(.title | test(\"\\\\[AKM\\\\] Step\\\\.${_AC_PARENT_STEP}:\")) | .number" \
                2>/dev/null | head -1) || _AC_CONTAINER_NUM=""
            fi
          fi

          if [[ -n "${_AC_CONTAINER_NUM}" && "${_AC_CONTAINER_NUM}" =~ ^[0-9]+$ ]]; then
            echo "=== コンテナ Issue #${_AC_CONTAINER_NUM} の自動クローズ判定 ==="
            auto_close_container_if_done "${_AC_CONTAINER_NUM}" "${REPO}" || true
          else
            echo "コンテナ Issue が特定できないためスキップ。"
          fi

          # ── Root Issue の自動クローズ判定 ──
          echo "=== Root Issue #${ROOT_ISSUE} の自動クローズ判定 ==="
          auto_close_root_if_all_done "${ROOT_ISSUE}" "${REPO}" || true

  self-improve:
    needs: orchestrate
    if: needs.orchestrate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Parse Self-Improve settings
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          body=$(gh api "/repos/${REPO}/issues/${ISSUE_NUMBER}" --jq '.body // ""' 2>/dev/null || true)
          # HTML コメント形式（workflow init で埋め込まれた場合）を優先
          enable=$(printf '%s' "${body}" | sed -n 's/^.*<!-- enable-self-improve: *\([^>]*\) *-->.*$/\1/p' | head -1 | tr '[:upper:]' '[:lower:]' | xargs || true)
          max_iter=$(printf '%s' "${body}" | sed -n 's/^.*<!-- self-improve-max-iterations: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          branch=$(printf "%s" "${body}" | sed -n 's/^.*<!-- branch: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          quality_threshold=$(printf '%s' "${body}" | sed -n 's/^.*<!-- self-improve-quality-threshold: *\([^>]*\) *-->.*$/\1/p' | head -1 | xargs || true)
          # フォールバック: Issue Form Markdown 形式
          if [[ -z "${enable}" ]]; then
            enable=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善ループ設定.*?\n(.*?)(?=###|\Z)', body, re.DOTALL)
          print('true' if (m and re.search(r'-\s*\[[xX]\]', m.group(1))) else 'false')
          " 2>/dev/null || echo "false")
          fi
          if [[ -z "${max_iter}" ]]; then
            max_iter=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善\s*最大イテレーション数.*?\n+(.+)', body)
          if m:
              n = re.match(r'(\d+)', m.group(1).strip())
              print(n.group(1) if n else '3')
          else:
              print('3')
          " 2>/dev/null || echo "3")
          fi
          if [[ -z "${quality_threshold}" ]]; then
            quality_threshold=$(printf '%s' "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*自己改善\s*品質スコア閾値.*?\n+(.+)', body)
          if m:
              n = re.match(r'(\d+)', m.group(1).strip())
              print(n.group(1) if n else '80')
          else:
              print('80')
          " 2>/dev/null || echo "80")
          fi
          if [[ -z "${branch}" ]]; then
            branch=$(printf "%s" "${body}" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*対象ブランチ.*?\n+(.+)', body)
          if m:
              val = m.group(1).strip()
              print(val if val and val != '_No response_' else 'main')
          else:
              print('main')
          " 2>/dev/null || echo "main")
          fi
          [[ -z "${enable}" ]] && enable="false"
          [[ -z "${max_iter}" ]] && max_iter="3"
          [[ -z "${quality_threshold}" ]] && quality_threshold="80"
          echo "enable=${enable}" >> "$GITHUB_OUTPUT"
          echo "max_iter=${max_iter}" >> "$GITHUB_OUTPUT"
          echo "quality_threshold=${quality_threshold}" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          ref: ${{ steps.parse.outputs.branch }}

      - name: Skip Self-Improve when branch is missing
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch == ''
        run: |
          echo "Skip Self-Improve: issue body に branch 情報がありません。"
      - uses: actions/setup-python@v5
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        with:
          node-version: "20"
      - name: Install dependencies
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        run: |
          pip install ruff pytest pytest-cov
          npm install -g markdownlint-cli
      - name: Run Self-Improve
        if: steps.parse.outputs.enable == 'true' && steps.parse.outputs.branch != ''
        env:
          MAX_ITERATIONS: ${{ steps.parse.outputs.max_iter }}
          QUALITY_THRESHOLD: ${{ steps.parse.outputs.quality_threshold }}
        run: |
          python -c "
          import os
          from hve.self_improve import run_improvement_loop
          from hve.config import SDKConfig
          config = SDKConfig(
              auto_self_improve=True,
              self_improve_max_iterations=int(os.environ.get('MAX_ITERATIONS', '3')),
              self_improve_quality_threshold=int(os.environ.get('QUALITY_THRESHOLD', '80')),
          )
          result = run_improvement_loop(config=config, repo_root='.')
          print(f'Self-Improve: {result[\"stopped_reason\"]} (score={result[\"final_score\"]})')
          "
      - name: Commit improvements
        if: steps.parse.outputs.enable == 'true' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "[Self-Improve] 自動品質改善"
          branch='${{ steps.parse.outputs.branch }}'
          git check-ref-format --branch "${branch}" >/dev/null 2>&1 || {
            echo "Invalid branch name: ${branch}" >&2
            exit 1
          }
          git push origin "HEAD:refs/heads/${branch}"
