name: Advance Sub Issues

# PRマージ時に、クローズされた Sub Issue の依存関係を評価し、
# 依存が全て解決された Sub Issue に Copilot + Custom Agent を自動アサインする。
#
# 対応する依存関係フォーマット（どちらも検出）:
#   - ## ⏳ 前提条件（Dependencies） セクション内の - #NNN 行（Issue番号形式）
#   - <!-- depends_on: 213,216 --> HTML コメント（Issue番号形式）
#
# 親 Issue の特定方法（優先順）:
#   Method 1: Sub Issue body の <!-- parent-issue: #NNN --> （新規作成分）
#   Method 2: Sub Issue body の <!-- pr-number: NNN --> → その PR の closingIssuesReferences
#   Method 3a: GraphQL trackedInIssues クエリ（既存 Sub Issue に対応）
#   Method 3b: <!-- subissues-created --> PR コメント経由（3a 失敗時フォールバック）

on:
  pull_request:
    types: [closed]
  issues:
    types: [labeled]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('advance-subissues-pr-{0}', github.event.pull_request.number) || format('advance-subissues-issue-{0}', github.event.issue.number) }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  advance:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}
      PR_HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
      PR_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout helper scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Advance sub issues on PR merge
        run: |
          set -euo pipefail
          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/yaml-safe-helpers.sh"

          # GitHub API state propagation: PR merge → issue state "closed" の反映を待つ
          # (実測で 2-3秒でGitHub REST API に反映されることが多い。依存チェックの前に余裕を持たせる)
          sleep 3

          if [[ -z "${COPILOT_PAT:-}" ]]; then
            echo "WARNING: COPILOT_PAT が設定されていません。Copilot アサインはスキップされます（エラーではありません）。" >&2
          fi

          OWNER="${REPO%/*}"
          REPO_NAME="${REPO#*/}"

          # ── assign_copilot() ─────────────────────────────────────────────
          # auto-app-dev-microservice-azure.yml / create-subissues-from-pr.yml と同じパターン
          source "${GITHUB_WORKSPACE}/.github/scripts/bash/lib/assign-copilot.sh"

          # ── find_parent_issue() ──────────────────────────────────────────
          # 優先度順の4段階フォールバックで親 Issue 番号を解決する。
          # 診断メッセージは全て >&2（stderr）に出力し、
          # stdout には親 Issue 番号（数字のみ）または空文字を出力する。
          find_parent_issue() {
            local issue_num="$1"
            local issue_body="$2"
            local result_parent=""

            # Method 1: Sub Issue body の <!-- parent-issue: #NNN -->（新規作成分）
            result_parent=$(printf '%s' "${issue_body}" \
              | grep -oP '<!--\s*parent-issue:\s*#\K\d+' | head -1 || true)
            if [[ "${result_parent}" =~ ^[0-9]+$ ]]; then
              echo "  Method 1 (parent-issue comment): #${result_parent}" >&2
              printf '%s\n' "${result_parent}"
              return 0
            fi

            # Method 2: Sub Issue body の <!-- pr-number: NNN --> → その PR の closingIssuesReferences
            local source_pr
            source_pr=$(printf '%s' "${issue_body}" \
              | grep -oP '<!--\s*pr-number:\s*\K\d+' | head -1 || true)
            if [[ "${source_pr}" =~ ^[0-9]+$ ]] && [ "${source_pr}" != "${PR_NUMBER}" ]; then
              result_parent=$(gh pr view "${source_pr}" --repo "${REPO}" \
                --json closingIssuesReferences \
                --jq '.closingIssuesReferences[0].number | tostring' 2>/dev/null \
                | grep -E '^[0-9]+$' | head -1 || true)
              if [[ "${result_parent}" =~ ^[0-9]+$ ]]; then
                echo "  Method 2 (pr-number comment): #${result_parent} via PR #${source_pr}" >&2
                printf '%s\n' "${result_parent}"
                return 0
              fi
            fi

            # Method 3a: GraphQL trackedInIssues（GitHub Sub Issues ネイティブ関係）
            result_parent=$(gh api graphql \
              -f query="
          query(\$owner: String!, \$repo: String!, \$num: Int!) {
            repository(owner: \$owner, name: \$repo) {
              issue(number: \$num) {
                trackedInIssues(first: 1) {
                  nodes { number }
                }
              }
            }
          }
              " \
              -f owner="${OWNER}" \
              -f repo="${REPO_NAME}" \
              -F num="${issue_num}" \
              --jq '.data.repository.issue.trackedInIssues.nodes[0].number | tostring' 2>/dev/null \
              | grep -E '^[0-9]+$' | head -1 || true)
            if [[ "${result_parent}" =~ ^[0-9]+$ ]]; then
              echo "  Method 3a (GraphQL trackedInIssues): #${result_parent}" >&2
              printf '%s\n' "${result_parent}"
              return 0
            fi

            # Method 3b: <!-- subissues-created --> PR コメント経由（全フォールバック）
            # この Issue の timeline から cross-reference PRs を取得し、
            # <!-- subissues-created --> マーカーを持つ PR を特定して親 Issue を解決する
            local xref_prs
            xref_prs=$(gh api "/repos/${REPO}/issues/${issue_num}/timeline?per_page=100" \
              --jq '[.[] | select(.event == "cross-referenced") | select(.source.issue.pull_request != null) | .source.issue.number] | .[]' \
              2>/dev/null || true)

            for xref_pr in $xref_prs; do
              [[ "${xref_pr}" =~ ^[0-9]+$ ]] || continue
              # 現在マージされた PR は skip（それ自体は作成PR ではなく作業PR）
              [ "${xref_pr}" = "${PR_NUMBER}" ] && continue

              local marker_count
              marker_count=$(gh api "/repos/${REPO}/issues/${xref_pr}/comments?per_page=100" \
                --jq '[.[] | select(.body | contains("<!-- subissues-created -->"))] | length' \
                2>/dev/null || echo "0")
              if [ "${marker_count:-0}" -gt 0 ] 2>/dev/null; then
                result_parent=$(gh pr view "${xref_pr}" --repo "${REPO}" \
                  --json closingIssuesReferences \
                  --jq '.closingIssuesReferences[0].number | tostring' 2>/dev/null \
                  | grep -E '^[0-9]+$' | head -1 || true)
                if [[ "${result_parent}" =~ ^[0-9]+$ ]]; then
                  echo "  Method 3b (subissues-created): #${result_parent} via PR #${xref_pr}" >&2
                  printf '%s\n' "${result_parent}"
                  return 0
                fi
              fi
              sleep 0.5  # API レート制限対策（Method 3b の各 PR チェック間）
            done

            # 親 Issue 特定不可
            echo "  WARNING: 全 Method で親 Issue を特定できませんでした。" >&2
            return 1
          }

          # ── マージされた PR のクローズ Issue を取得 ──────────────────────────
          CLOSING_ISSUES=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" \
            --json closingIssuesReferences \
            --jq '.closingIssuesReferences[].number' 2>/dev/null || true)

          if [ -z "${CLOSING_ISSUES}" ]; then
            echo "closingIssuesReferences が空です。PR 本文から Fixes/Closes/Resolves キーワードを直接パースします..."

            PR_BODY=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json body --jq '.body // ""' 2>/dev/null || true)

            CLOSING_ISSUES=$( { printf '%s' "${PR_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          body = sys.stdin.read()
          # Fixes/Fixed/Closes/Resolves (大文字小文字不問) の後に owner/repo# または # で続く Issue 番号を抽出
          pattern = r'(?:fix(?:e[sd])?|close[sd]?|resolve[sd]?)\s+(?:[\w\-\.]+/[\w\-\.]+)?#(\d+)'
          nums = re.findall(pattern, body, re.IGNORECASE)
          # dict.fromkeys: 挿入順を保持しつつ重複排除（Python 3.7+）
          for n in dict.fromkeys(nums):
              print(n)
          PY
            } 2>/dev/null || true )

            if [ -n "${CLOSING_ISSUES}" ]; then
              echo "PR 本文から検出した closing issues: $(printf '%s' "${CLOSING_ISSUES}" | tr '\n' ' ')"
            fi
          fi

          if [ -z "${CLOSING_ISSUES}" ]; then
            echo "PR #${PR_NUMBER} に closing issue 参照（Fixes/Closes/Resolves #N）がありません。処理をスキップします。"
            exit 0
          fi

          echo "Closing issues: $(printf '%s' "${CLOSING_ISSUES}" | tr '\n' ' ')"

          # ── 非デフォルトブランチマージ対応: Issue を明示的にクローズ ──────────
          # GitHub の仕様: Fixes/Closes/Resolves キーワードによる自動クローズは
          # PR がデフォルトブランチにマージされた場合のみ動作する。
          # 非デフォルトブランチへのマージではキーワードが無視されるため、
          # ワークフロー側で明示的に Issue をクローズする。
          # 既にクローズ済みの Issue に対しては冪等（no-op）。
          PR_BASE_BRANCH="${PR_BASE_BRANCH:-}"
          DEFAULT_BRANCH=$(gh api "/repos/${REPO}" --jq '.default_branch' 2>/dev/null || echo "main")

          if [ "${PR_BASE_BRANCH}" != "${DEFAULT_BRANCH}" ]; then
            echo "PR base branch (${PR_BASE_BRANCH}) はデフォルトブランチ (${DEFAULT_BRANCH}) ではありません。"
            echo "Fixes キーワードによる自動クローズが動作しないため、明示的に Issue をクローズします。"

            for CLOSE_NUM in ${CLOSING_ISSUES}; do
              [[ "${CLOSE_NUM}" =~ ^[0-9]+$ ]] || continue
              CURRENT_STATE=$(gh api "/repos/${REPO}/issues/${CLOSE_NUM}" --jq '.state' 2>/dev/null || echo "unknown")
              if [ "${CURRENT_STATE}" = "open" ] || [ "${CURRENT_STATE}" = "unknown" ]; then
                echo "  Issue #${CLOSE_NUM} の現在の状態は \"${CURRENT_STATE}\" です。明示的にクローズを試行します..."
                if gh issue close "${CLOSE_NUM}" --repo "${REPO}" --reason completed 2>&1; then
                  echo "  Issue #${CLOSE_NUM} をクローズしました。"
                else
                  CLOSE_STATUS=$?
                  echo "::warning::Issue #${CLOSE_NUM} のクローズに失敗しました (exit code: ${CLOSE_STATUS})。後続の依存判定に影響する可能性があります。"
                fi
              else
                echo "  Issue #${CLOSE_NUM} は既に ${CURRENT_STATE} です。スキップ。"
              fi
              sleep 1
            done
            # クローズ状態が API に反映されるのを待つ
            sleep 3
          else
            echo "PR base branch はデフォルトブランチです。GitHub の自動クローズが動作します。"
          fi

          declare -A PROCESSED_PARENTS
          SUMMARY_ROWS=""

          for ISSUE_NUM in ${CLOSING_ISSUES}; do
            # 数値バリデーション
            [[ "${ISSUE_NUM}" =~ ^[0-9]+$ ]] || { echo "WARNING: 不正な Issue 番号: ${ISSUE_NUM}。スキップ。" >&2; continue; }

            echo "=== Closing issue #${ISSUE_NUM} ==="

            # Issue の title と body を API 経由で取得
            if ! ISSUE_JSON=$(gh api "/repos/${REPO}/issues/${ISSUE_NUM}" 2>/dev/null); then
              echo "::warning::Issue #${ISSUE_NUM} の取得に失敗しました（削除済みまたはアクセス不可）。空扱いで続行します。"
              ISSUE_JSON='{}'
            fi
            ISSUE_TITLE=$(printf '%s' "${ISSUE_JSON}" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('title',''))" 2>/dev/null || true)
            ISSUE_BODY=$(printf '%s' "${ISSUE_JSON}" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('body','') or '')" 2>/dev/null || true)

            # [ASD]/[ASDW]/[AAS]/[AAD]/[AAD-WEB]/[ASDW-WEB]/[AAG]/[AAGD] は専用ワークフローで処理する
            if [[ "${ISSUE_TITLE}" =~ ^\[ASD\] ]] || [[ "${ISSUE_TITLE}" =~ ^\[ASDW\] ]] || [[ "${ISSUE_TITLE}" =~ ^\[AAS\] ]] || [[ "${ISSUE_TITLE}" =~ ^\[AAD\] ]] || [[ "${ISSUE_TITLE}" =~ ^\[AAD-WEB\] ]] || [[ "${ISSUE_TITLE}" =~ ^\[ASDW-WEB\] ]] || [[ "${ISSUE_TITLE}" =~ ^\[AAG\] ]] || [[ "${ISSUE_TITLE}" =~ ^\[AAGD\] ]]; then
              echo "  Skipping workflow-managed issue: ${ISSUE_TITLE}"
              continue
            fi

            # 親 Issue を特定（4段階フォールバック）
            # find_parent_issue は stdout に親 Issue 番号のみを出力し、診断は stderr へ
            PARENT=$(find_parent_issue "${ISSUE_NUM}" "${ISSUE_BODY}" || true)

            if [[ ! "${PARENT:-}" =~ ^[0-9]+$ ]]; then
              echo "  Issue #${ISSUE_NUM} の親 Issue を特定できませんでした。スキップ。"
              continue
            fi

            echo "  Parent issue: #${PARENT}"

            # 同一 PR 内で同一親 Issue を重複処理しない
            if [ -n "${PROCESSED_PARENTS[${PARENT}]:-}" ]; then
              echo "  Parent #${PARENT} はこの実行で既に処理済みです。スキップ。"
              continue
            fi
            PROCESSED_PARENTS[${PARENT}]=1

            # 親 Issue の全 Sub Issues を取得（per_page=100 でページネーション対応）
            SUB_ISSUES_JSON=$(gh api "/repos/${REPO}/issues/${PARENT}/sub_issues?per_page=100" \
              2>/dev/null || echo "[]")

            # SUB_ISSUES_JSON が配列でない場合（API エラー等）の防御処理
            SUB_COUNT=$(echo "${SUB_ISSUES_JSON}" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else 0)" 2>/dev/null || echo "0")
            if [ "${SUB_COUNT:-0}" -eq 0 ] 2>/dev/null; then
              echo "  Parent #${PARENT} の Sub Issues が取得できませんでした（0件または取得エラー）。スキップ。"
              continue
            fi
            echo "  Sub Issues: ${SUB_COUNT} 件"

            # 各 Sub Issue の依存関係を評価してアサインを実施
            while IFS=$'\t' read -r sub_num sub_state sub_title; do
              [ -z "${sub_num}" ] && continue
              [[ "${sub_num}" =~ ^[0-9]+$ ]] || continue

              # タイトルのパイプ文字をエスケープ（マークダウンテーブル崩れ防止）
              sub_title_safe="${sub_title//|/&#124;}"

              echo "  Sub-issue #${sub_num} (${sub_state}): ${sub_title}"

              # クローズ済みはスキップ
              if [ "${sub_state}" = "closed" ]; then
                echo "    Already closed. Skipping."
                continue
              fi

              # [ASD]/[ASDW]/[AAS]/[AAD]/[AAD-WEB]/[ASDW-WEB]/[AAG]/[AAGD] Sub Issue は専用ワークフローが処理する
              if [[ "${sub_title}" =~ ^\[ASD\] ]] || [[ "${sub_title}" =~ ^\[ASDW\] ]] || [[ "${sub_title}" =~ ^\[AAS\] ]] || [[ "${sub_title}" =~ ^\[AAD\] ]] || [[ "${sub_title}" =~ ^\[AAD-WEB\] ]] || [[ "${sub_title}" =~ ^\[ASDW-WEB\] ]] || [[ "${sub_title}" =~ ^\[AAG\] ]] || [[ "${sub_title}" =~ ^\[AAGD\] ]]; then
                echo "    Skipping workflow-managed sub-issue."
                continue
              fi

              # Sub Issue の body を取得
              SUB_BODY=$(gh api "/repos/${REPO}/issues/${sub_num}" \
                --jq '.body // ""' 2>/dev/null || true)

              # 依存関係を抽出
              # Method A: ## ⏳ 前提条件（Dependencies） セクションの - #NNN 行（Issue番号形式）
              # Method B: <!-- depends_on: 213,216 --> HTML コメント（Issue番号形式）
              #   ※ <!-- depends_on: 1,4 --> のようなブロックインデックス形式は対象外
              DEP_NUMS=$(echo "${SUB_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          body = sys.stdin.read()
          deps = []
          # Method A: 前提条件セクション
          m = re.search(r'##\s*⏳\s*前提条件（Dependencies）[^\n]*\n(.*?)(?=\n##\s|\Z)', body, re.DOTALL)
          if m:
              deps = re.findall(r'-\s*#(\d+)', m.group(1))
          # Method B: depends_on HTML comment（Issue番号として解釈できる場合のみ）
          if not deps:
              m2 = re.search(r'<!--\s*depends_on:\s*(.*?)\s*-->', body)
              if m2:
                  candidates = re.findall(r'#?(\d+)', m2.group(1))
                  # ブロックインデックス（通常1-9程度）とIssue番号（通常100以上）を区別するため
                  # 閾値10を使用。Issue #1-#10 への依存がある場合はMethod A（前提条件セクション）を使うこと
                  deps = [c for c in candidates if int(c) > 10]
          print(' '.join(deps))
          PY
              ) || true

              if [ -z "${DEP_NUMS}" ]; then
                echo "    No issue-number dependencies found. Skipping (root nodes are handled at creation time)."
                continue
              fi

              echo "    Dependencies: ${DEP_NUMS}"

              # 全依存 Issue がクローズ済み（または completed）か確認
              ALL_DEPS_CLOSED=true
              for DEP_NUM in ${DEP_NUMS}; do
                [[ "${DEP_NUM}" =~ ^[0-9]+$ ]] || continue
                # API レート制限対策: 依存 Issue ごとに 0.5秒 待機
                sleep 0.5
                DEP_STATE=$(gh api "/repos/${REPO}/issues/${DEP_NUM}" \
                  --jq '.state // "open"' 2>/dev/null || echo "open")
                echo "    Dep #${DEP_NUM}: ${DEP_STATE}"
                # "closed" および GitHub Issue Types の "completed" 状態を完了とみなす
                if [ "${DEP_STATE}" != "closed" ] && [ "${DEP_STATE}" != "completed" ]; then
                  ALL_DEPS_CLOSED=false
                  break
                fi
              done

              if [ "${ALL_DEPS_CLOSED}" = "true" ]; then
                echo "    All dependencies resolved. Proceeding with Copilot assignment..."

                # Custom Agent 名を Sub Issue body から抽出
                AGENT=$(echo "${SUB_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'>\s*\*\*Custom agent used:\s*([^*]+)\*\*', body)
          print(m.group(1).strip() if m else '')
          PY
                ) || true

                # base_branch = マージされた PR の head branch
                # （そのブランチに前の Sub Issue の作業結果ファイルが存在するため）
                ASSIGN_STATUS=""
                if [ -z "${COPILOT_PAT:-}" ]; then
                  echo "    COPILOT_PAT 未設定のため Copilot アサインをスキップします。"
                  ASSIGN_STATUS="⏭️ スキップ（COPILOT_PAT未設定）"
                else
                  assign_result_code=0
                  assign_copilot "${sub_num}" "${AGENT}" "${PR_HEAD_BRANCH}" "" || assign_result_code=$?
                  case "${assign_result_code}" in
                    0) ASSIGN_STATUS="✅ アサイン済み" ;;
                    2) ASSIGN_STATUS="⏭️ スキップ（COPILOT_PAT未設定）" ;;
                    *) ASSIGN_STATUS="⚠️ 失敗" ;;
                  esac
                fi
                SUMMARY_ROWS="${SUMMARY_ROWS}| #${sub_num} | ${sub_title_safe} | ${AGENT:-—} | \`${PR_HEAD_BRANCH}\` | ${ASSIGN_STATUS} |\n"
              else
                echo "    Not all dependencies closed yet. Skipping."
              fi
            done < <(echo "${SUB_ISSUES_JSON}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          try:
              issues = json.load(sys.stdin)
              if not isinstance(issues, list):
                  issues = []
          except Exception:
              issues = []
          for i in issues:
              num = str(i.get('number', ''))
              state = i.get('state', 'open')
              # タブ・改行を除去してパース崩れを防ぐ
              title = i.get('title', '').replace('\t', ' ').replace('\n', ' ').replace('\r', ' ')
              if num:
                  print(num + '\t' + state + '\t' + title)
          PY
            )
          done

          # ── PR コメントとして結果サマリーを投稿 ──────────────────────────
          if [ -n "${SUMMARY_ROWS}" ]; then
            {
              printf '## 🚀 Sub Issue 自動アサイン\n\n'
              printf 'マージされた PR #%s（head branch: `%s`）を起点に、依存関係が解決された Sub Issue に Copilot をアサインしました。\n\n' \
                "${PR_NUMBER}" "${PR_HEAD_BRANCH}"
              printf '| # | タイトル | Custom Agent | base branch | 状態 |\n'
              printf '|---|--------|-------------|------------|------|\n'
              printf '%b' "${SUMMARY_ROWS}"
            } > /tmp/advance_comment.md
            gh pr comment "${PR_NUMBER}" \
              --repo "${REPO}" \
              --body-file /tmp/advance_comment.md || true
          else
            echo "この実行では前進させた Sub Issue はありませんでした（依存関係が未解決、または対象なし）。"
          fi

          # ── 親 Issue 自動クローズ判定（auto-merge 有効時のみ）────────────────────
          has_auto_close_marker() {
            local issue_num="$1"
            local page=1
            while true; do
              local comments_json
              if ! comments_json=$(gh api "/repos/${REPO}/issues/${issue_num}/comments?per_page=100&page=${page}" 2>/dev/null); then
                echo "::warning::Issue #${issue_num} のコメント取得に失敗しました。空配列として続行します。"
                comments_json='[]'
              fi
              local has_marker
              has_marker=$(echo "${comments_json}" | wh_has_marker)
              has_marker="${has_marker:-false}"
              if [[ "${has_marker}" == "true" ]]; then
                return 0
              fi
              local count
              count=$(echo "${comments_json}" | wh_count_items) || count=0
              if (( count < 100 )); then
                break
              fi
              page=$((page + 1))
            done
            return 1
          }

          all_sub_issues_closed() {
            local issue_num="$1"
            local page=1
            while true; do
              local subs_json
              subs_json=$(gh api "/repos/${REPO}/issues/${issue_num}/sub_issues?per_page=100&page=${page}" 2>/dev/null) || {
                printf '%s\n' "WARNING: #${issue_num} の sub_issues 取得に失敗しました。安全のため自動クローズをスキップします。" >&2
                return 1
              }
              local all_closed
              all_closed=$(echo "${subs_json}" | wh_all_closed)
              all_closed="${all_closed:-false}"
              if [[ "${all_closed}" != "true" ]]; then
                return 1
              fi
              local count
              count=$(echo "${subs_json}" | wh_count_items) || count=0
              if (( count < 100 )); then
                break
              fi
              page=$((page + 1))
            done
            return 0
          }

          for PARENT_NUM in "${!PROCESSED_PARENTS[@]}"; do
            [[ "${PARENT_NUM}" =~ ^[0-9]+$ ]] || continue
            echo "=== Parent #${PARENT_NUM} 自動クローズ判定 ==="

            if ! PARENT_JSON=$(gh api "/repos/${REPO}/issues/${PARENT_NUM}" 2>/dev/null); then
              echo "::warning::Parent #${PARENT_NUM} の取得に失敗しました（削除済みまたはアクセス不可）。"
              PARENT_JSON='{}'
            fi
            PARENT_STATE=$(printf '%s' "${PARENT_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('state',''))" 2>/dev/null || echo "")
            if [[ "${PARENT_STATE}" != "open" ]]; then
              echo "  Parent #${PARENT_NUM} は open ではありません（state=${PARENT_STATE:-unknown}）。スキップ。"
              continue
            fi

            AUTO_MERGE_ENABLED=$(echo "${PARENT_JSON}" | wh_check_auto_merge) || AUTO_MERGE_ENABLED="false"
            if [[ "${AUTO_MERGE_ENABLED}" != "true" ]]; then
              echo "  Parent #${PARENT_NUM} は auto-merge 無効のためスキップ。"
              continue
            fi

            if has_auto_close_marker "${PARENT_NUM}"; then
              echo "  Parent #${PARENT_NUM} は auto-close マーカー済みのためスキップ。"
              continue
            fi

            if ! all_sub_issues_closed "${PARENT_NUM}"; then
              echo "  Parent #${PARENT_NUM} は未完了 Sub Issue があるためクローズしません。"
              continue
            fi

            PARENT_CLOSE_COMMENT=$(printf '## ✅ Auto Close\n\n全ての Sub Issue が完了したため、この親 Issue を自動クローズします。\n\n<!-- auto-close-done -->')
            gh issue comment "${PARENT_NUM}" --repo "${REPO}" --body "${PARENT_CLOSE_COMMENT}" >/dev/null 2>&1 || true
            if gh issue close "${PARENT_NUM}" --repo "${REPO}" --reason completed >/dev/null 2>&1; then
              echo "  Parent #${PARENT_NUM} を自動クローズしました。"
            else
              echo "::warning::Parent #${PARENT_NUM} の自動クローズに失敗しました。"
            fi
          done

  advance_adoc:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'adoc:done'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}
      DONE_ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Advance ADOC sub issues
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          source "${GITHUB_WORKSPACE}/.github/scripts/akm-common.sh"

          if ! DONE_ISSUE_JSON=$(api_call GET "https://api.github.com/repos/${REPO}/issues/${DONE_ISSUE_NUMBER}"); then
            echo "::warning::Issue #${DONE_ISSUE_NUMBER} の取得に失敗しました（削除済みまたはアクセス不可）。"
            DONE_ISSUE_JSON='{}'
          fi
          DONE_ISSUE_TITLE=$(printf '%s' "${DONE_ISSUE_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('title',''))")
          DONE_ISSUE_BODY=$(printf '%s' "${DONE_ISSUE_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('body','') or '')")
          SELECTED_MODEL_RAW=$(printf '%s' "${DONE_ISSUE_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); labels=[l.get('name','') for l in d.get('labels',[]) if isinstance(l,dict)]; vals=[x.split('/',1)[1] for x in labels if x.startswith('model/')]; print(vals[0] if vals else '')")
          SELECTED_MODEL=$(resolve_model "${SELECTED_MODEL_RAW}")

          if [[ ! "${DONE_ISSUE_TITLE}" =~ ^\[ADOC\] ]]; then
            echo "[ADOC] Sub Issue 以外は処理しません。"
            exit 0
          fi

          STEP_DONE=$(echo "${DONE_ISSUE_TITLE}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          t = sys.stdin.read().strip()
          m = re.search(r'\[ADOC\] Step\.(\d+(?:\.\d+)?)', t)
          print(m.group(1) if m else '')
          PY
          )

          ROOT_ISSUE=$(echo "${DONE_ISSUE_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          b = sys.stdin.read()
          m = re.search(r'<!--\s*root-issue:\s*#(\d+)\s*-->', b)
          print(m.group(1) if m else '')
          PY
          )

          if [[ -z "${STEP_DONE}" ]] || [[ -z "${ROOT_ISSUE}" ]]; then
            echo "Step または Root Issue を特定できないためスキップ。"
            exit 0
          fi

          BRANCH=$(echo "${DONE_ISSUE_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          b = sys.stdin.read()
          m = re.search(r'<!--\s*branch:\s*(.+?)\s*-->', b)
          print(m.group(1) if m else 'main')
          PY
          )
          AUTO_CONTEXT_REVIEW=$(echo "${DONE_ISSUE_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          b = sys.stdin.read()
          m = re.search(r'<!--\s*auto-context-review:\s*(true|false)\s*-->', b)
          print(m.group(1) if m else 'false')
          PY
          )
          AUTO_QA=$(echo "${DONE_ISSUE_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          b = sys.stdin.read()
          m = re.search(r'<!--\s*auto-qa:\s*(true|false)\s*-->', b)
          print(m.group(1) if m else 'false')
          PY
          )
          TARGET_DIRS=$(echo "${DONE_ISSUE_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          b = sys.stdin.read()
          m = re.search(r'<!--\s*target-dirs:\s*(.*?)\s*-->', b)
          print(m.group(1) if m else '')
          PY
          )
          EXCLUDE_PATTERNS=$(echo "${DONE_ISSUE_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          b = sys.stdin.read()
          m = re.search(r'<!--\s*exclude-patterns:\s*(.*?)\s*-->', b)
          print(m.group(1) if m else 'node_modules/,vendor/,dist/,*.lock,__pycache__/')
          PY
          )
          DOC_PURPOSE=$(echo "${DONE_ISSUE_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          b = sys.stdin.read()
          m = re.search(r'<!--\s*doc-purpose:\s*(.*?)\s*-->', b)
          print(m.group(1) if m else 'all')
          PY
          )
          MAX_FILE_LINES=$(echo "${DONE_ISSUE_BODY}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          b = sys.stdin.read()
          m = re.search(r'<!--\s*max-file-lines:\s*(.*?)\s*-->', b)
          print(m.group(1) if m else '500')
          PY
          )

          if ! SUB_ISSUES_JSON=$(api_call GET "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues?per_page=100"); then
            echo "::warning::Root #${ROOT_ISSUE} の Sub Issues 取得に失敗しました。空配列として続行します。"
            SUB_ISSUES_JSON='[]'
          fi
          export SUB_ISSUES_JSON

          ANALYSIS=$(python3 - <<'PY'
          import os, json, re
          ADOC_DAG = {
              "1":   [],
              "2.1": ["1"], "2.2": ["1"], "2.3": ["1"], "2.4": ["1"], "2.5": ["1"],
              "3.1": ["2.1","2.2","2.3","2.4","2.5"],
              "3.2": ["2.1","2.2","2.3","2.4","2.5"],
              "3.3": ["2.1","2.2","2.3","2.4","2.5"],
              "3.4": ["2.2"],
              "3.5": ["2.1","2.2","2.3","2.4","2.5"],
              "4":   ["3.1","3.2","3.3","3.4","3.5"],
              "5.1": ["4"], "5.2": ["4"], "5.3": ["4"],
              "5.4": ["4","3.4","3.5"],
              "6.1": ["5.1","5.2"],
              "6.2": ["5.2","5.4","3.5"],
              "6.3": ["5.1","5.3","5.4"],
          }
          STEP_TITLES = {
              "1": "ファイルインベントリ",
              "2.1": "ファイルサマリー（プロダクションコード）",
              "2.2": "ファイルサマリー（テストコード）",
              "2.3": "ファイルサマリー（設定・IaC）",
              "2.4": "ファイルサマリー（CI/CD）",
              "2.5": "ファイルサマリー（大規模ファイル分割）",
              "3.1": "コンポーネント設計書",
              "3.2": "API 仕様書",
              "3.3": "データモデル定義書",
              "3.4": "テスト仕様サマリー",
              "3.5": "技術的負債一覧",
              "4": "コンポーネントインデックス",
              "5.1": "アーキテクチャ概要",
              "5.2": "依存関係マップ",
              "5.3": "インフラ依存分析",
              "5.4": "非機能要件現状分析",
              "6.1": "オンボーディングガイド",
              "6.2": "リファクタリングガイド",
              "6.3": "移行アセスメント",
          }
          try:
              issues = json.loads(os.environ.get("SUB_ISSUES_JSON", "[]"))
              if not isinstance(issues, list):
                  issues = []
          except Exception:
              issues = []

          existing = set()
          completed = set()
          for i in issues:
              title = i.get('title', '')
              m = re.search(r'\[ADOC\] Step\.(\d+(?:\.\d+)?)', title)
              if not m:
                  continue
              sid = m.group(1)
              existing.add(sid)
              labels = {l.get('name', '') for l in i.get('labels', []) if isinstance(l, dict)}
              if 'adoc:done' in labels:
                  completed.add(sid)

          ready = []
          for sid, deps in ADOC_DAG.items():
              if sid in existing:
                  continue
              if all(d in completed for d in deps):
                  ready.append(sid)

          all_done = all(sid in completed for sid in ADOC_DAG)
          print(json.dumps({'ready': ready, 'all_done': all_done, 'step_titles': STEP_TITLES}))
          PY
          )

          READY_IDS=$(echo "${ANALYSIS}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(' '.join(d.get('ready', [])))")
          ALL_DONE=$(echo "${ANALYSIS}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('all_done') else 'false')")

          ROOT_REF=$(printf '<!-- root-issue: #%s -->\n<!-- branch: %s -->\n<!-- auto-context-review: %s -->\n<!-- auto-qa: %s -->\n<!-- target-dirs: %s -->\n<!-- exclude-patterns: %s -->\n<!-- doc-purpose: %s -->\n<!-- max-file-lines: %s -->' "${ROOT_ISSUE}" "${BRANCH}" "${AUTO_CONTEXT_REVIEW}" "${AUTO_QA}" "${TARGET_DIRS}" "${EXCLUDE_PATTERNS}" "${DOC_PURPOSE}" "${MAX_FILE_LINES}")

          if [[ -n "${READY_IDS}" ]]; then
            for STEP_ID in ${READY_IDS}; do
              TEMPLATE_PATH="${GITHUB_WORKSPACE}/.github/scripts/templates/adoc/step-${STEP_ID}.md"
              if [[ ! -f "${TEMPLATE_PATH}" ]]; then
                continue
              fi

              STEP_TITLE=$(echo "${ANALYSIS}" | python3 - "${STEP_ID}" <<'PY'
          import sys, json
          info = json.load(sys.stdin)
          step_id = sys.argv[1]
          print(info.get('step_titles', {}).get(step_id, step_id))
          PY
              )

              BODY=$(python3 - "${TEMPLATE_PATH}" "${ROOT_REF}" "${TARGET_DIRS}" "${EXCLUDE_PATTERNS}" "${DOC_PURPOSE}" "${MAX_FILE_LINES}" <<'PY'
          import sys
          from pathlib import Path
          p = Path(sys.argv[1])
          body = p.read_text(encoding='utf-8')
          body = body.replace('{root_ref}', sys.argv[2])
          body = body.replace('{target_dirs}', sys.argv[3])
          body = body.replace('{exclude_patterns}', sys.argv[4])
          body = body.replace('{doc_purpose}', sys.argv[5])
          body = body.replace('{max_file_lines}', str(sys.argv[6]))
          body = body.replace('{additional_section}', '')
          print(body)
          PY
              )

              if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]] && [[ "${AUTO_QA}" == "true" ]]; then
                STEP_LABELS='["auto-app-documentation","auto-context-review","auto-qa"]'
              elif [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
                STEP_LABELS='["auto-app-documentation","auto-context-review"]'
              elif [[ "${AUTO_QA}" == "true" ]]; then
                STEP_LABELS='["auto-app-documentation","auto-qa"]'
              else
                STEP_LABELS='["auto-app-documentation"]'
              fi
              if [[ -n "${SELECTED_MODEL}" ]]; then
                STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c --arg ml "model/${SELECTED_MODEL}" '. + [$ml]')
              fi

              ALREADY_EXISTS=$(api_call GET "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}/sub_issues?per_page=100" \
                | python3 /dev/fd/3 "${STEP_ID}" 3<<'PY'
          import sys, json, re
          step_id = sys.argv[1]
          try:
              issues = json.load(sys.stdin)
              if not isinstance(issues, list):
                  issues = []
          except Exception:
              issues = []
          pattern = re.compile(rf'^\[ADOC\] Step\.{re.escape(step_id)}:\s')
          print('true' if any(pattern.search(i.get('title', '')) for i in issues) else 'false')
          PY
              )
              if [[ "${ALREADY_EXISTS}" == "true" ]]; then
                echo "Step.${STEP_ID} は既存のため作成をスキップします。"
                continue
              fi

              RESP=$(create_issue "[ADOC] Step.${STEP_ID}: ${STEP_TITLE}" "${BODY}" "${STEP_LABELS}")
              NEW_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
              NEW_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")

              link_sub_issue "${ROOT_ISSUE}" "${NEW_ID}"
              add_label "${NEW_NUM}" "adoc:ready"
              CA=$(extract_custom_agent "${BODY}")
              if assign_copilot "${NEW_NUM}" "${CA}" "${BRANCH}" "" "${SELECTED_MODEL}"; then
                add_label "${NEW_NUM}" "adoc:running"
              fi
            done
          fi

          if [[ "${ALL_DONE}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "adoc:done"

            AUTO_MERGE=$(echo "${DONE_ISSUE_BODY}" | python3 -c "import re,sys; body=sys.stdin.read(); m=re.search(r'<!--\\s*auto-merge:\\s*(true|false)\\s*-->', body); print(m.group(1) if m else 'false')")

            if [[ "${AUTO_MERGE}" == "true" ]]; then
              ROOT_STATE=$(api_call GET "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('state',''))" 2>/dev/null || echo "")
              if [[ "${ROOT_STATE}" == "open" ]]; then
                if ! HAS_MARKER=$(gh api --paginate "/repos/${REPO}/issues/${ROOT_ISSUE}/comments" 2>/dev/null | \
                  jq -s 'flatten | any(.[]; (.body // "") | contains("<!-- auto-close-done -->"))' 2>/dev/null); then
                  echo "WARNING: Root #${ROOT_ISSUE} の auto-close マーカー確認に失敗したため、安全のため自動クローズをスキップします。" >&2
                else
                  if [[ "${HAS_MARKER}" != "true" ]]; then
                    ROOT_CLOSE_COMMENT=$(printf '## ✅ Auto Close\n\n全ての ADOC Sub Issue が完了したため、Root Issue を自動クローズします。\n\n<!-- auto-close-done -->')
                    gh issue comment "${ROOT_ISSUE}" --repo "${REPO}" --body "${ROOT_CLOSE_COMMENT}" >/dev/null 2>&1 || true
                  fi
                  gh issue close "${ROOT_ISSUE}" --repo "${REPO}" --reason completed >/dev/null 2>&1 || true
                fi
              fi
            fi
          fi
