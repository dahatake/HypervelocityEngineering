name: PR 自動 Approve & Auto-merge

# auto-approve-ready ラベルが付与された PR に対して、自動 Approve → auto-merge（squash）を有効化する。
#
# 安全装置:
#   - split-mode ラベル付き PR はジョブ条件で除外
#   - 冪等化マーカー（done/partial/failed）で重複実行防止とリトライ制御
#   - 既存 Approve レビューの API 直接確認（dismiss 考慮）
#   - Approve/Merge 失敗時のグレースフルフォールバック（手動対応を促すコメント）
#
# 注意:
#   - pull_request_target を使用（Copilot が作成した PR のブランチには
#     ワークフロー定義がない可能性があるため、ベースブランチの定義で実行）
#   - COPILOT_PAT 優先、未設定時は GITHUB_TOKEN にフォールバック
#   - ${{ }} 式をシェル変数に直接展開せず、env 経由で渡す（スクリプトインジェクション対策）

on:
  pull_request_target:
    types: [labeled, ready_for_review, synchronize]

concurrency:
  group: auto-approve-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  notify-split-mode-skip:
    if: >
      (
        (github.event.action == 'labeled' && github.event.label.name == 'auto-approve-ready')
        || (github.event.action == 'ready_for_review' && contains(github.event.pull_request.labels.*.name, 'auto-approve-ready'))
        || (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'auto-approve-ready'))
      )
      && contains(github.event.pull_request.labels.*.name, 'split-mode')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: 冪等チェック
        id: guard
        run: |
          set -euo pipefail
          marker='<!-- auto-approve-and-merge-skipped-split-mode -->'
          existing=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' 2>/dev/null \
            | jq -s --arg marker "${marker}" '[.[] | select(.body | contains($marker))] | length' \
            2>/dev/null) || existing=0
          if [ "${existing:-0}" -gt 0 ]; then
            echo "posted=true" >> "${GITHUB_OUTPUT}"
          else
            echo "posted=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: スキップ通知コメント投稿
        if: steps.guard.outputs.posted != 'true'
        run: |
          set -euo pipefail
          comment_body=$(printf '%s\n\n%s\n\n%s\n%s\n%s' \
            '<!-- auto-approve-and-merge-skipped-split-mode -->' \
            '## ℹ️ split-mode のため auto-approve/auto-merge をスキップしました' \
            'この PR は `split-mode` のため `auto-approve-and-merge.yml` 対象外です。' \
            'このジョブで PR 差分に `subissues.md` を検出した場合、`create-subissues` ラベルを自動付与します。' \
            '> ⚠️ **フォールバック**: PR 差分に `subissues.md` がない場合は、手動で `create-subissues` ラベルを付与してください。')
          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "${comment_body}"

      - name: split-mode 用 create-subissues ラベル付与
        run: |
          set -euo pipefail

          gh_api_with_retry() {
            local attempt=1
            local max_attempts=5
            local delay=2
            while true; do
              if gh api "$@"; then
                return 0
              fi
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                return 1
              fi
              echo "::warning::gh api failed (attempt ${attempt}/${max_attempts}); retrying in ${delay}s: $*"
              sleep "${delay}"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          post_fallback_comment_once() {
            local reason="$1"
            local marker='<!-- auto-approve-and-merge-subissues-missing -->'
            local existing=0
            if ! existing=$(gh_api_with_retry "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --paginate \
              --jq '.[]' 2>/dev/null \
              | jq -s --arg marker "${marker}" '[.[] | select(.body | contains($marker))] | length' \
              2>/dev/null); then
              echo "::warning::フォールバックコメント一覧の取得またはフィルタリングに失敗したため、コメント投稿をスキップします。"
              return 0
            fi
            if [ "${existing:-0}" -gt 0 ]; then
              echo "フォールバック案内コメントは投稿済みです。"
              return 0
            fi

            fallback_comment=$(printf '%s\n\n%s\n\n%s\n%s' \
              "${marker}" \
              '## ⚠️ `create-subissues` を自動付与できませんでした' \
              "${reason}" \
              '`subissues.md` を確認し、必要に応じて手動で `create-subissues` ラベルを付与してください。')
            if ! gh_api_with_retry --method POST "/repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="${fallback_comment}" >/dev/null; then
              echo "::warning::フォールバック案内コメントの投稿に失敗しました。"
            fi
          }

          if ! labels_json=$(gh_api_with_retry "/repos/${REPO}/issues/${PR_NUMBER}/labels" --jq '.[].name' | jq -R -s -c 'split("\n")[:-1]'); then
            echo "::warning::PR ラベル取得に失敗したため、create-subissues ラベル自動付与をスキップします。"
            post_fallback_comment_once 'PR ラベル取得で GitHub API エラーが発生しました。'
            exit 0
          fi
          has_create_subissues=$(printf '%s' "${labels_json}" | jq -r 'if index("create-subissues") then "true" else "false" end')
          if [ "${has_create_subissues}" = "true" ]; then
            echo "create-subissues ラベルは既に付与済みです。"
            exit 0
          fi

          if ! subissues_files=$(gh_api_with_retry "/repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --paginate \
            --jq '.[] | select(.filename | test("(^|/)subissues\\.md$")) | select(.status == "added" or .status == "modified") | .filename'); then
            echo "::warning::PR 差分ファイル取得に失敗したため、create-subissues ラベル自動付与をスキップします。"
            post_fallback_comment_once 'PR 差分ファイル取得で GitHub API エラーが発生しました。'
            exit 0
          fi
          if [ -n "${subissues_files}" ]; then
            echo "PR 差分に subissues.md を検出したため create-subissues ラベルを付与します。"
            if ! gh pr edit "${PR_NUMBER}" --repo "${REPO}" --add-label create-subissues; then
              echo "::warning::create-subissues ラベル付与に失敗しました。手動対応を案内します。"
              post_fallback_comment_once 'PR ラベル付与（`gh pr edit --add-label create-subissues`）に失敗しました。'
            fi
            exit 0
          fi

          post_fallback_comment_once '`subissues.md` が PR 差分に見つかりませんでした。'

  approve-and-merge:
    # labeled イベント: auto-approve-ready ラベルが付与された時
    # ready_for_review イベント: draft → ready 遷移後に auto-approve-ready ラベルがある場合
    # （draft 中にラベルが付いた場合、labeled では !draft 条件を満たさず実行されないため）
    if: >
      (
        (
          github.event.action == 'labeled'
          && github.event.label.name == 'auto-approve-ready'
        )
        || (
          github.event.action == 'ready_for_review'
          && contains(github.event.pull_request.labels.*.name, 'auto-approve-ready')
        )
        || (
          github.event.action == 'synchronize'
          && contains(github.event.pull_request.labels.*.name, 'auto-approve-ready')
        )
      )
      && !github.event.pull_request.draft
      && !contains(github.event.pull_request.labels.*.name, 'split-mode')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: 冪等化チェック（既に完了・Approve 済みかどうか確認）
        id: guard
        run: |
          set -euo pipefail

          # <!-- auto-approve-and-merge-done --> は完全成功済み（再実行不要）
          MARKER_DONE="<!-- auto-approve-and-merge-done -->"
          existing_done=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' 2>/dev/null \
            | jq -s --arg marker "${MARKER_DONE}" '[.[] | select(.body | contains($marker))] | length' \
            2>/dev/null) || existing_done=0
          echo "done マーカーコメント数: ${existing_done}"

          if [ "${existing_done:-0}" -gt 0 ]; then
            echo "auto-approved マーカーが存在します。ワークフロー完了済みです。スキップします。"
            echo "already_done=true" >> "${GITHUB_OUTPUT}"
            echo "already_approved=true" >> "${GITHUB_OUTPUT}"
            echo "is_retry=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # failed マーカーは同一 head SHA での再実行を抑止（コメントスパム防止）
          MARKER_FAILED="<!-- auto-approve-and-merge-failed -->"
          SHA_MARKER="<!-- auto-approve-and-merge-head-sha: ${HEAD_SHA} -->"
          existing_failed_same_sha=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' \
            | jq -s --arg marker "${MARKER_FAILED}" --arg sha_marker "${SHA_MARKER}" \
              '[.[] | select(.body | contains($marker) and contains($sha_marker))] | length' \
              2>/dev/null) || {
                echo "::warning::failed マーカー判定に失敗しました。API エラーの可能性があるためログを確認してください。"
                existing_failed_same_sha=0
              }
          echo "failed マーカー（同一 SHA）コメント数: ${existing_failed_same_sha}"
          if [ "${existing_failed_same_sha:-0}" -gt 0 ]; then
            echo "同一 head SHA で failed マーカーを検出したため、再実行をスキップします。"
            echo "already_done=true" >> "${GITHUB_OUTPUT}"
            echo "already_approved=false" >> "${GITHUB_OUTPUT}"
            echo "is_retry=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # <!-- auto-approve-and-merge-partial --> は Approve 済み・merge 再試行対象
          MARKER_PARTIAL="<!-- auto-approve-and-merge-partial -->"
          existing_partial=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' 2>/dev/null \
            | jq -s --arg marker "${MARKER_PARTIAL}" '[.[] | select(.body | contains($marker))] | length' \
            2>/dev/null) || existing_partial=0
          echo "partial マーカーコメント数: ${existing_partial}"

          echo "already_done=false" >> "${GITHUB_OUTPUT}"
          if [ "${existing_partial:-0}" -gt 0 ]; then
            echo "partial マーカーを検出しました。前回 Approve 済みの可能性があるため、現在の Approve 状態を API で再確認して必要なら再 Approve します。"
            echo "is_retry=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_retry=false" >> "${GITHUB_OUTPUT}"
          fi

          # 既存 Approve レビューの API 直接確認（dismiss 考慮）
          # Approve 済みの場合は Approve ステップのみスキップ（Auto-merge は引き続き実行）
          approved_count=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length' \
            2>/dev/null) || approved_count=0
          echo "既存 Approve レビュー数: ${approved_count}"

          if [ "${approved_count:-0}" -gt 0 ]; then
            echo "既に Approve 済みです。Approve ステップをスキップし Auto-merge のみ実行します。"
            echo "already_approved=true" >> "${GITHUB_OUTPUT}"
          else
            echo "already_approved=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: 検証実施確認（auto-approve 前提条件）
        # .github/copilot-instructions.md §0 要件: 最低1つの検証を実施。
        # PR body またはコメントに検証実施記録（marker/見出し/箇条書き）が存在することを確認する。
        # 存在しない場合は自動 Approve/Merge をスキップし、不足コメントを投稿する（冪等化）。
        id: check-validation
        if: steps.guard.outputs.already_done != 'true'
        run: |
          set -euo pipefail
          VALIDATION_MARKER='<!-- auto-approve-validation-missing -->'
          VALIDATION_CONFIRMED_MARKER='<!-- validation-confirmed -->'
          HEADING_REGEX='^#{1,6}[[:space:]]+.*(検証|Validation|Verification)'
          BULLET_REGEX='^[[:space:]*>-]*(\*\*|__)?(検証|Validation|Verification)(\*\*|__)?[[:space:]]*[:：]'
          LEGACY_REGEX='(^#{1,6}[[:space:]]+|^)(Validation|検証)'

          # PR body を取得
          pr_body=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}" \
            --jq '.body // ""' 2>/dev/null || echo '')

          # PR コメントを取得（検証不足通知コメントは判定対象から除外）
          pr_comments_all=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate --jq '.[]' 2>/dev/null | jq -s '.' 2>/dev/null || echo '[]')
          pr_comments=$(echo "${pr_comments_all}" \
            | jq --arg marker "${VALIDATION_MARKER}" '[.[] | select(.body | contains($marker) | not)]' \
            2>/dev/null || echo '[]')

          # 1) HTML コメントマーカー方式（最優先）
          combined_text=$(printf '%s\n%s\n' "${pr_body}" "$(echo "${pr_comments}" | jq -r '.[].body' 2>/dev/null)")
          if printf '%s' "${combined_text}" | grep -qiF "${VALIDATION_CONFIRMED_MARKER}"; then
            echo "✅ PR body/コメントに validation-confirmed マーカーを確認しました。"
            echo "has_validation=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # 2) 見出し方式（PR body）
          if printf '%s' "${pr_body}" | grep -qiE "${HEADING_REGEX}"; then
            echo "✅ PR body に検証実施記録を確認しました。"
            echo "has_validation=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # 3) 箇条書き/強調方式（PR body）
          if printf '%s' "${pr_body}" | grep -qiE "${BULLET_REGEX}"; then
            echo "✅ PR body に検証実施記録（箇条書き/強調）を確認しました。"
            echo "has_validation=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # 互換フォールバック: 旧判定（行頭 Validation/検証）
          if printf '%s' "${pr_body}" | grep -qiE "${LEGACY_REGEX}"; then
            echo "✅ PR body に検証実施記録（互換フォールバック）を確認しました。"
            echo "has_validation=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # 4) 見出し方式（PR コメント）
          if echo "${pr_comments}" | jq -r '.[].body' 2>/dev/null \
              | grep -qiE "${HEADING_REGEX}"; then
            echo "✅ PR コメントに検証実施記録を確認しました。"
            echo "has_validation=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # 5) 箇条書き/強調方式（PR コメント）
          if echo "${pr_comments}" | jq -r '.[].body' 2>/dev/null \
              | grep -qiE "${BULLET_REGEX}"; then
            echo "✅ PR コメントに検証実施記録（箇条書き/強調）を確認しました。"
            echo "has_validation=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # 互換フォールバック: 旧判定（行頭 Validation/検証）
          if echo "${pr_comments}" | jq -r '.[].body' 2>/dev/null \
              | grep -qiE "${LEGACY_REGEX}"; then
            echo "✅ PR コメントに検証実施記録（互換フォールバック）を確認しました。"
            echo "has_validation=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # 6) 全不一致
          echo "has_validation=false" >> "${GITHUB_OUTPUT}"
          echo "⚠️ PR body・コメントに検証実施記録（marker/見出し/箇条書き）が見つかりません。"

          # 冪等性チェック: 同一 HEAD SHA での不足通知コメントが既に投稿済みならスキップ
          # failed マーカーと同様に HEAD SHA 単位で判定し、新コミット push 時は再評価する
          SHA_MARKER="<!-- auto-approve-and-merge-head-sha: ${HEAD_SHA} -->"
          existing_count=$(echo "${pr_comments_all}" \
            | jq --arg marker "${VALIDATION_MARKER}" --arg sha_marker "${SHA_MARKER}" \
              '[.[] | select(.body | contains($marker) and contains($sha_marker))] | length' 2>/dev/null || echo 0)
          if [ "${existing_count:-0}" -gt 0 ]; then
            echo "同一 HEAD SHA (${HEAD_SHA}) で検証不足通知コメントは既に投稿済みです。スキップします。"
            exit 0
          fi

          # 不足通知コメントを投稿（末尾に HEAD SHA フッターを付与して冪等化）
          comment_body="$(
            {
              printf '%s\n' "${VALIDATION_MARKER}"
              printf '\n'
              printf '%s\n' "## ⚠️ 検証実施記録が確認できません"
              printf '\n'
              printf '%s\n' "PR body またはコメントに検証実施記録（\`validation-confirmed\` マーカー / \`Validation\`・\`検証\` 見出し / \`検証:\` 形式）が見つからないため、自動 Approve/Merge をスキップしました。"
              printf '\n'
              printf '%s\n' "**.github/copilot-instructions.md §0 要件**: 最低1つの検証を実施すること（テスト/ビルド/静的解析のいずれかを行い、できない場合は理由と代替を明記すること）。"
              printf '\n'
              printf '%s\n' "### 対処方法"
              printf '\n'
              printf '%s\n' "以下いずれかを PR body またはコメントに追記してください（推奨順）:"
              printf '\n'
              printf '%s\n' "1. HTML コメントマーカー（推奨）"
              printf '%s\n' "   - \`<!-- validation-confirmed -->\`"
              printf '%s\n' "2. 見出し方式"
              printf '%s\n' "   - \`## 検証\`"
              printf '%s\n' "   - \`## 検証結果\`"
              printf '%s\n' "   - \`## Validation\`"
              printf '%s\n' "3. 箇条書き / 強調方式"
              printf '%s\n' "   - \`- 検証: pytest 実行済\`"
              printf '%s\n' "   - \`**検証**: ビルド成功\`"
              printf '%s\n' "   - \`> Validation: lint OK\`"
              printf '\n'
              printf '%s\n' "### 再実行手順"
              printf '\n'
              printf '%s\n' "1. PR body またはコメントへ検証実施記録を追記する"
              printf '%s\n' "2. 新しいコミットを push すると \`synchronize\` イベントで自動的に再評価されます"
              printf '%s\n' "3. または \`auto-approve-ready\` ラベルを一度外して再付与することでも再実行できます"
              printf '\n'
              printf '%s\n' "> ℹ️ このコメントは \`auto-approve-and-merge.yml\` によって自動投稿されました。"
              printf '\n'
              printf '%s\n' "${SHA_MARKER}"
            }
          )"
          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "${comment_body}" || echo "WARNING: 検証不足通知コメントの投稿に失敗しました。"
          echo "検証不足通知コメントを PR #${PR_NUMBER} に投稿しました。"

      - name: QA Reference チェック結果確認（auto-approve 前提条件）
        # verify-qa-reference-in-pr.yml が required モードで FAIL を出した場合に自動 Approve/Merge をスキップする。
        # warning モードの FAIL またはマーカーコメントが存在しない場合は後方互換のためスキップしない。
        id: check-qa-reference
        if: steps.guard.outputs.already_done != 'true'
        run: |
          set -euo pipefail
          QA_REF_MARKER='<!-- auto-approve-qa-reference-missing -->'
          QA_REF_RESULT_MARKER='<!-- qa-reference-check-result -->'
          SHA_MARKER="<!-- auto-approve-and-merge-head-sha: ${HEAD_SHA} -->"
          REQUIRED_MODE_PATTERN='モード: `required`'
          FAIL_PATTERN='❌ FAIL'

          # PR コメントを全件取得（API エラーとコメント0件を区別する）
          api_err_file=$(mktemp)
          if ! pr_comments_raw=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate --jq '.[]' 2>"${api_err_file}"); then
            err_msg=$(cat "${api_err_file}" 2>/dev/null || echo "unknown error")
            rm -f "${api_err_file}"
            echo "::warning::PR コメントの取得に失敗しました: ${err_msg}。QA Reference チェックをスキップします（qa_reference_passed=true）。"
            echo "qa_reference_passed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          rm -f "${api_err_file}"
          # コメント0件は正常（warn 不要）
          pr_comments=$(printf '%s' "${pr_comments_raw}" | jq -s '.' 2>/dev/null || echo '[]')

          # <!-- qa-reference-check-result --> マーカー付きコメントを検索（最新1件、updated_at 付き）
          qa_ref_data=$(printf '%s' "${pr_comments}" \
            | jq -c --arg marker "${QA_REF_RESULT_MARKER}" \
              '[.[] | select(.body | contains($marker))] | last // null' \
            2>/dev/null || echo 'null')
          qa_ref_comment=$(printf '%s' "${qa_ref_data}" | jq -r '.body // ""' 2>/dev/null || echo '')
          qa_ref_updated_at=$(printf '%s' "${qa_ref_data}" | jq -r '.updated_at // ""' 2>/dev/null || echo '')

          qa_reference_passed="true"
          if [ -n "${qa_ref_comment}" ]; then
            # required モード かつ FAIL を含む場合のみ詳細チェックへ
            if printf '%s' "${qa_ref_comment}" | grep -qF "${REQUIRED_MODE_PATTERN}" && \
               printf '%s' "${qa_ref_comment}" | grep -qF "${FAIL_PATTERN}"; then

              # verify-qa-reference-in-pr.yml は PASS 時にコメントを更新しないため、
              # FAIL コメントの updated_at が HEAD コミット日時より前なら「スタール」として PASS 扱いにする
              stale="false"
              if [ -n "${qa_ref_updated_at}" ]; then
                head_commit_date=$(gh api "/repos/${REPO}/commits/${HEAD_SHA}" \
                  --jq '.commit.committer.date // ""' 2>/dev/null || echo '')
                if [ -n "${head_commit_date}" ]; then
                  qa_updated_epoch=$(date -d "${qa_ref_updated_at}" +%s 2>/dev/null || echo '')
                  head_commit_epoch=$(date -d "${head_commit_date}" +%s 2>/dev/null || echo '')
                  if [ -n "${qa_updated_epoch}" ] && [ -n "${head_commit_epoch}" ] && \
                     [ "${qa_updated_epoch}" -lt "${head_commit_epoch}" ]; then
                    stale="true"
                    echo "::notice::QA Reference FAIL コメント（${qa_ref_updated_at}）は HEAD コミット（${head_commit_date}）より前の結果です。スタールとして扱います。"
                  fi
                fi
              fi

              if [ "${stale}" = "false" ]; then
                qa_reference_passed="false"
              fi
            fi
          fi

          echo "qa_reference_passed=${qa_reference_passed}" >> "${GITHUB_OUTPUT}"

          if [ "${qa_reference_passed}" = "true" ]; then
            echo "✅ QA Reference チェック: PASS または warning モード FAIL（スキップなし）"
            exit 0
          fi

          echo "⚠️ QA Reference チェック: required モードで FAIL を検出。Approve/Merge をスキップします。"

          # 冪等性チェック: 同一 SHA の案内コメントが既に投稿済みならスキップ
          existing_count=0
          if ! existing_count=$(echo "${pr_comments}" \
            | jq --arg marker "${QA_REF_MARKER}" --arg sha_marker "${SHA_MARKER}" \
              '[.[] | select(.body | contains($marker) and contains($sha_marker))] | length' \
            2>/dev/null); then
            echo "::warning::冪等性チェック（jq）に失敗しました。重複投稿を避けるため案内コメントをスキップします。"
            exit 0
          fi
          if [ "${existing_count:-0}" -gt 0 ]; then
            echo "QA Reference 案内コメントは同一 SHA で既に投稿済みです。スキップします。"
            exit 0
          fi

          # 案内コメントを投稿（SHA フッター付き）
          comment_body="$(
            {
              printf '%s\n' "${QA_REF_MARKER}"
              printf '\n'
              printf '%s\n' '## ⚠️ QA Reference チェックが required モードで失敗しています'
              printf '\n'
              printf '%s\n' '`verify-qa-reference-in-pr.yml` が **`required` モード** で **❌ FAIL** を検出したため、自動 Approve/Merge をスキップしました。'
              printf '\n'
              printf '%s\n' '### 対処方法'
              printf '\n'
              printf '%s\n' '1. PR 本文の `<!-- qa-reference-start -->` ～ `<!-- qa-reference-end -->` セクションに、参照した QA ファイルのパス（`qa/...`）を記載してください'
              printf '%s\n' '2. QA 参照が不要な場合は `参照なし: 理由 = <理由>` と明記してください'
              printf '%s\n' '3. `verify-qa-reference-in-pr.yml` のチェックが PASS になったことを確認してください'
              printf '\n'
              printf '%s\n' '### 再実行手順'
              printf '\n'
              printf '%s\n' '1. 上記対処を PR 本文に反映する'
              printf '%s\n' '2. `auto-approve-ready` ラベルを一度外す'
              printf '%s\n' '3. `auto-approve-ready` ラベルを再付与してワークフローを再実行する'
              printf '\n'
              printf '%s\n' '> ℹ️ このコメントは `auto-approve-and-merge.yml` によって自動投稿されました。'
              printf '%s\n' "${SHA_MARKER}"
            }
          )"
          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "${comment_body}" || echo "WARNING: QA Reference 案内コメントの投稿に失敗しました。"
          echo "QA Reference 案内コメントを PR #${PR_NUMBER} に投稿しました。"

      - name: PR を Approve
        id: approve
        if: steps.guard.outputs.already_done != 'true' && steps.guard.outputs.already_approved != 'true' && steps.check-validation.outputs.has_validation != 'false' && steps.check-qa-reference.outputs.qa_reference_passed != 'false'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          approved="true"
          if gh pr review "${PR_NUMBER}" \
            --repo "${REPO}" \
            --approve \
            --body "✅ 自動 Approve（auto-approve-and-merge.yml）"; then
            echo "✅ PR #${PR_NUMBER} を Approve しました。"
          else
            echo "::warning::PR #${PR_NUMBER} の Approve に失敗しました。手動で Approve してください。"
            approved="false"
          fi
          echo "approved=${approved}" >> "${GITHUB_OUTPUT}"

      - name: Auto-merge を有効化（squash）
        id: merge
        if: steps.guard.outputs.already_done != 'true' && steps.check-validation.outputs.has_validation != 'false' && steps.check-qa-reference.outputs.qa_reference_passed != 'false'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          merge_enabled="true"
          merge_error=""
          merge_output_file=$(mktemp)
          if gh pr merge "${PR_NUMBER}" \
            --repo "${REPO}" \
            --auto \
            --squash 2>"${merge_output_file}"; then
            echo "✅ PR #${PR_NUMBER} の Auto-merge（squash）を有効化しました。"
          else
            merge_error=$(cat "${merge_output_file}" 2>/dev/null || echo "(stderr 取得失敗)")
            echo "::warning::PR #${PR_NUMBER} の Auto-merge 有効化に失敗しました。エラー: ${merge_error}"
            merge_enabled="false"
          fi
          rm -f "${merge_output_file}"
          echo "merge_enabled=${merge_enabled}" >> "${GITHUB_OUTPUT}"
          EOF_MARKER=$(uuidgen 2>/dev/null || printf 'EOF_%s_%s' "$(date +%s%N 2>/dev/null || date +%s)" "$$")
          {
            echo "merge_error<<${EOF_MARKER}"
            echo "${merge_error}"
            echo "${EOF_MARKER}"
          } >> "${GITHUB_OUTPUT}"

      - name: サマリーコメントを PR に投稿
        if: steps.guard.outputs.already_done != 'true' && steps.check-validation.outputs.has_validation != 'false' && steps.check-qa-reference.outputs.qa_reference_passed != 'false'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          APPROVED: ${{ steps.guard.outputs.already_approved == 'true' && 'true' || steps.approve.outputs.approved }}
          MERGE_ENABLED: ${{ steps.merge.outputs.merge_enabled }}
          MERGE_ERROR: ${{ steps.merge.outputs.merge_error }}
        run: |
          set -euo pipefail

          MARKER='<!-- auto-approve-and-merge-failed -->'
          if [ "${APPROVED}" = "true" ] && [ "${MERGE_ENABLED}" = "true" ]; then
            MARKER='<!-- auto-approve-and-merge-done -->'
            STATUS_ICON="✅"
            STATUS_TEXT="Approve と Auto-merge（squash）の有効化が完了しました。全ての必須チェックが通過次第、自動マージされます。"
          elif [ "${APPROVED}" = "true" ]; then
            MARKER='<!-- auto-approve-and-merge-partial -->'
            STATUS_ICON="⚠️"
            STATUS_TEXT="Approve は完了しましたが、Auto-merge の有効化に失敗しました。手動でマージしてください。"
          elif [ "${MERGE_ENABLED}" = "true" ]; then
            STATUS_ICON="⚠️"
            STATUS_TEXT="Auto-merge（squash）は有効化しましたが、Approve に失敗しました。手動で Approve してください。"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="Approve と Auto-merge の両方に失敗しました。手動で Approve → Merge してください。"
          fi

          COMMENT=$(printf '%s\n\n%s %s\n\n%s\n%s\n\n%s' \
            "${MARKER}" \
            "## ${STATUS_ICON} 自動 Approve & Auto-merge" \
            "${STATUS_TEXT}" \
            "- 🔑 **Approve**: $([ "${APPROVED}" = "true" ] && echo "✅ 完了" || echo "❌ 失敗（手動対応が必要です）")" \
            "- 🔀 **Auto-merge（squash）**: $([ "${MERGE_ENABLED}" = "true" ] && echo "✅ 有効化済み" || echo "❌ 失敗（手動対応が必要です）")" \
            '> ℹ️ このコメントは `auto-approve-and-merge.yml` によって自動投稿されました。')
          if [ "${MERGE_ENABLED}" != "true" ] && [ -n "${MERGE_ERROR}" ]; then
            SAFE_MERGE_ERROR=$(printf '%s' "${MERGE_ERROR}" | sed 's/```/[triple-backtick]/g')
            COMMENT=$(printf '%s\n\n%s\n%s\n%s' \
              "${COMMENT}" \
              '<details><summary>🔍 merge エラー詳細</summary>' \
              "" \
              "\`\`\`"$'\n'"${SAFE_MERGE_ERROR}"$'\n'"\`\`\`"$'\n'"</details>")
          fi
          COMMENT=$(printf '%s\n%s' "${COMMENT}" "<!-- auto-approve-and-merge-head-sha: ${HEAD_SHA} -->")

          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "${COMMENT}"
          echo "✅ サマリーコメントを PR #${PR_NUMBER} に投稿しました。"
