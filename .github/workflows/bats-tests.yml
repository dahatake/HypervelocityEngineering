name: Bats Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/azure/**'
      - 'tests/bats/**'
      - '.github/workflows/bats-tests.yml'

permissions:
  contents: read

jobs:
  bats:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      - name: Run bats tests
        run: bats tests/bats/
