# validate-plan.yml
#
# 責務: plan.md のメタデータ整合性チェック
#   - estimate > 15 かつ decision = PROCEED → NG (§2.2)
#   - decision = SPLIT_REQUIRED かつ implementation_files = true → NG (§2.3)
#   - decision = SPLIT_REQUIRED かつ subissues.md 不在 → NG (§2.3)
#
# スキャン対象: PR 差分に含まれる work/**/plan.md のみ
# 関連ワークフロー: check-split-mode.yml（PR差分の実装ファイル存在チェック）
# 定期監査: audit-plans.yml（main の全 plan.md を週次スキャン）
name: Validate plan.md split decision

on:
  pull_request:
    paths:
      - 'work/**/plan.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Check split decision consistency
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # PR の差分ファイルのみを取得（check-split-mode.yml と同じ方式）
          if ! ALL_CHANGED=$(gh pr diff "$PR_NUMBER" --name-only); then
            echo "::error::gh pr diff の実行に失敗しました（PR: #${PR_NUMBER}）"
            exit 1
          fi

          CHANGED_PLANS=$(echo "$ALL_CHANGED" | grep -E '^work/.*/plan\.md$' || true)

          if [ -z "$CHANGED_PLANS" ]; then
            echo "✅ この PR で変更された plan.md はありません。チェックをスキップします。"
            exit 0
          fi

          echo "📋 検査対象の plan.md:"
          echo "$CHANGED_PLANS" | while IFS= read -r p; do echo "  - $p"; done

          HAS_ERROR=false

          while IFS= read -r plan; do
            if [ ! -f "$plan" ]; then
              echo "⏭️ $plan は削除されたためスキップします。"
              continue
            fi

            if ! bash .github/scripts/bash/validate-plan.sh --path "$plan"; then
              HAS_ERROR=true
            fi
          done <<< "$CHANGED_PLANS"

          if [ "$HAS_ERROR" = true ]; then
            exit 1
          fi

          echo "✅ 全チェック完了（違反なし）"
