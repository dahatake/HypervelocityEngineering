name: Plan Validation and Labeling

on:
  pull_request:
    paths:
      - 'work/**/plan.md'

jobs:
  validate-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Check split decision consistency
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # PR の差分ファイルのみを取得（check-split-mode.yml と同じ方式）
          if ! ALL_CHANGED=$(gh pr diff "$PR_NUMBER" --name-only); then
            echo "::error::gh pr diff の実行に失敗しました（PR: #${PR_NUMBER}）"
            exit 1
          fi

          CHANGED_PLANS=$(echo "$ALL_CHANGED" | grep -E '^work/.*/plan\.md$' || true)

          if [ -z "$CHANGED_PLANS" ]; then
            echo "✅ この PR で変更された plan.md はありません。チェックをスキップします。"
            exit 0
          fi

          echo "📋 検査対象の plan.md:"
          echo "$CHANGED_PLANS" | while IFS= read -r p; do echo "  - $p"; done

          HAS_ERROR=false

          while IFS= read -r plan; do
            if [ ! -f "$plan" ]; then
              echo "⏭️ $plan は削除されたためスキップします。"
              continue
            fi

            if ! bash .github/scripts/bash/validate-plan.sh --path "$plan"; then
              HAS_ERROR=true
            fi
          done <<< "$CHANGED_PLANS"

          if [ "$HAS_ERROR" = true ]; then
            exit 1
          fi

          echo "✅ 全チェック完了（違反なし）"

  check-split-mode:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Detect split mode violations
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # GitHub API 経由で PR の正確なファイル差分を取得する
          # git diff BASE_SHA...HEAD ではなく gh pr diff を使うことで、
          # base ブランチの SHA タイミングによる余分なファイル混入を排除する
          if ! ALL_CHANGED=$(gh pr diff "$PR_NUMBER" --name-only); then
            echo "::error::gh pr diff の実行に失敗しました（PR: #${PR_NUMBER}）"
            exit 1
          fi

          # この PR で変更・追加された work/**/plan.md のみを対象にする
          # （main ブランチに既存だが PR で未変更の plan.md は対象外）
          # ワークフロートリガーの paths: 'work/**/plan.md' に合わせて ^work/ に限定する
          # grep の 0件マッチ (exit 1) のみ || true で抑制する
          CHANGED_PLANS=$(echo "$ALL_CHANGED" | grep -E '^work/.*/plan\.md$' || true)

          if [ -z "$CHANGED_PLANS" ]; then
            echo "✅ この PR で変更された plan.md はありません。チェックをスキップします。"
            exit 0
          fi

          echo "📋 検査対象の plan.md:"
          echo "$CHANGED_PLANS" | while IFS= read -r p; do echo "  - $p"; done

          HAS_ERROR=false

          # PR diff から実装ファイルを一度だけ検出（work/ 配下は除外）
          # ループ内で繰り返し計算しないよう事前に確定する
          IMPL_FILES=$(echo "$ALL_CHANGED" | grep -E '\.(sh|py|ts|js|sql|html|css)$' | grep -v '^work/' || true)

          while IFS= read -r plan; do
            # ファイルが存在するか確認（削除された場合はスキップ）
            if [ ! -f "$plan" ]; then
              echo "⏭️ $plan は削除されたためスキップします。"
              continue
            fi

            decision=$(grep -oE '<!-- split_decision: [A-Z_]+ -->' "$plan" | grep -oE 'PROCEED|SPLIT_REQUIRED' || echo "MISSING")
            echo "🔍 $plan → split_decision: $decision"

            if [ "$decision" = "SPLIT_REQUIRED" ]; then
              echo "⚠️ Split mode 検出: $plan"
              echo "  実装ファイルの存在を確認します..."

              if [ -n "$IMPL_FILES" ]; then
                echo "::error::Split mode PR に実装ファイルが含まれています (Skill task-dag-planning §2.3 違反)。原因: $plan が SPLIT_REQUIRED です。"
                echo "該当ファイル:"
                echo "$IMPL_FILES"
                HAS_ERROR=true
              else
                echo "✅ 実装ファイルは検出されませんでした（work/ 配下を除く）"
              fi
            fi
          done <<< "$CHANGED_PLANS"

          if [ "$HAS_ERROR" = true ]; then
            exit 1
          fi

          echo "✅ Split mode compliance チェック完了（違反なし）"

  label-split-mode:
    needs: [validate-plan, check-split-mode]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Add or remove split mode labels based on PR diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              }
            );

            const changedPlans = files
              .filter(f => /^work\/.*\/plan\.md$/.test(f.filename));

            core.info(`PR diff に含まれる plan.md: ${changedPlans.length} 件`);
            for (const p of changedPlans) {
              core.info(`  - ${p.filename} (${p.status})`);
            }

            if (changedPlans.length === 0) {
              core.info('PR 差分に plan.md がないため、ラベル操作をスキップします。');
              return;
            }

            let hasSplitRequired = false;
            let splitRequiredFile = '';

            for (const plan of changedPlans) {
              const planPath = plan.filename;

              if (!(plan.status === 'added' || plan.status === 'modified')) {
                core.info(`${planPath} は ${plan.status} のため split_decision 読み取りをスキップします。`);
                continue;
              }

              if (!fs.existsSync(planPath)) {
                core.info(`${planPath} はディスク上に存在しません（削除/renamed?）。スキップします。`);
                continue;
              }

              const content = fs.readFileSync(planPath, 'utf8');
              const match = content.match(/<!-- split_decision: (\w+) -->/);
              const decision = match ? match[1] : 'MISSING';
              core.info(`${planPath} → split_decision: ${decision}`);

              if (decision === 'SPLIT_REQUIRED') {
                hasSplitRequired = true;
                splitRequiredFile = planPath;
                break;
              }
            }

            const prNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (hasSplitRequired) {
              core.info(`SPLIT_REQUIRED を検出: ${splitRequiredFile}`);
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ['split-mode', 'plan-only']
              });
              core.info('✅ split-mode / plan-only ラベルを付与しました。');
            } else {
              core.info('PR 差分の plan.md に SPLIT_REQUIRED はありません。');

              const currentLabels = await github.paginate(
                github.rest.issues.listLabelsOnIssue,
                {
                  owner,
                  repo,
                  issue_number: prNumber,
                  per_page: 100,
                }
              );
              const labelNames = currentLabels.map(l => l.name);

              for (const label of ['split-mode', 'plan-only']) {
                if (!labelNames.includes(label)) continue;
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: prNumber,
                    name: label,
                  });
                  core.info(`🏷️ ${label} ラベルを除去しました。`);
                } catch (e) {
                  if (e.status !== 404) throw e;
                }
              }
              core.info('✅ ラベル除去チェック完了。');
            }
