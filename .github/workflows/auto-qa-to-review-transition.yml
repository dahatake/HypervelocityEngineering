name: QA 完了 → auto-context-review 自動遷移

# auto-qa のラベルが付いた PR に対して、QA が完了したと判定した場合に
# auto-context-review ラベルを自動で付与する。
# これにより copilot-auto-review.yml がチェーン発火し、レビュー指示が自動投稿される。
#
# QA 完了の判定条件:
#   1. PR に auto-qa ラベルが付いている
#   2. PR に auto-context-review ラベルがまだ付いていない
#   3. 紐づく Issue の auto-context-review ラベルを確認し、後続ステップで分岐する
#      - ラベルあり → auto-context-review ラベルを PR に付与してレビューへ遷移
#      - ラベルなし → auto-approve-ready ラベルを PR に直接付与（レビューなしパス）
#   4. <!-- copilot-auto-qa-posted --> マーカーが PR コメントに存在する（QA 指示済み）
#   5. QA 指示後に以下いずれかの回答シグナルが存在する
#      - ユーザー（bot 以外）の @copilot メンションコメント
#      - <!-- auto-qa-default-answered --> マーカーコメント（auto-qa-default-answer.yml）
#      ※「質問なし」パターン: user_reply_count == 0 かつ auto_answered_count == 0 かつ
#         QA 指示後の Bot コメントが質問票形式（チェックボックス / Qxx / 質問ID / 選択肢）を含まない場合も QA 完了と判定
#   6. 以下のいずれかで QA 完了と判定
#      - パスA: 回答後にコミットが存在（latest_commit_at > reply_at）し、
#               default-answer 経由時は Copilot の反映完了コメントも検出
#      - パスB: default-answer 投稿済みかつ PR diff に qa/*answer*.md が存在
#      ※ issue_comment トリガー経由でも判定可能
# ※ draft 状態でも動作する（最終的な Ready 化・Merge は別ワークフローで安全に制御）
#
# トリガー: pull_request_target: [synchronize], issue_comment: [created]
#   - synchronize = PR へのコミット push（Copilot がタスク完了後に push する）
#   - issue_comment = PR へのコメント（Bot が「質問なし」とコメントのみで回答した場合のフォールバック）
#
# 全体フロー:
#   sync-issue-labels-to-pr.yml → auto-qa のみ PR に付与
#     ↓ labeled イベント
#   copilot-auto-qa.yml → QA 指示コメント投稿 (<!-- copilot-auto-qa-posted -->)
#     ↓ Copilot が質問票作成、またはコメントのみで「質問なし」と回答
#   [質問ありの場合] ユーザーが @copilot で回答投稿
#   [質問ありの場合] auto-qa-default-answer.yml が既定値回答コメント投稿 (<!-- auto-qa-default-answered -->)
#     ↓ issue_comment イベント（このワークフロー発火 ← 既定値回答フォールバックパス）
#     ↓
#   Copilot がタスク実行・コミット push
#     ↓ synchronize イベント（このワークフロー発火）
#   [質問なしの場合] Bot が「質問なし」コメント投稿
#     ↓ issue_comment イベント（このワークフロー発火 ← フォールバックパス）
#   auto-qa-to-review-transition.yml → auto-context-review を PR に付与
#     ↓ labeled イベント
#   copilot-auto-review.yml → レビュー指示コメント投稿
#
# 注意:
#   - pull_request_target を使用（Copilot が作成した PR のブランチには
#     ワークフロー定義がない可能性があるため、ベースブランチの定義で実行）
#   - COPILOT_PAT 優先、未設定時は GITHUB_TOKEN にフォールバック
#   - ${{ }} 式をシェル変数に直接展開せず、env 経由で渡す（スクリプトインジェクション対策）

on:
  workflow_call:
    inputs:
      event_name:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      pr_body:
        required: false
        type: string
        default: ''
      pr_labels:
        required: false
        type: string
        default: '[]'

concurrency:
  group: auto-qa-to-review-${{ inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  transition:
    # 事前フィルタ（pull_request_target の場合）:
    #   - PR に auto-qa ラベルが付いている
    #   - PR に auto-context-review ラベルがまだ付いていない
    # 事前フィルタ（issue_comment の場合）:
    #   - PR へのコメントである（issue.pull_request が存在する）
    #   - Copilot Bot のコメント（copilot-swe-agent または Copilot）である
    #   - または <!-- auto-qa-default-answered --> マーカー付きコメントであり、投稿者が OWNER/MEMBER/COLLABORATOR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ inputs.pr_number }}
      PR_BODY: ${{ inputs.pr_body }}
      EVENT_NAME: ${{ inputs.event_name }}

    steps:
      - name: リポジトリをチェックアウト（共通スクリプト読み込みのため）
        uses: actions/checkout@v4

      - name: PR 情報を取得（issue_comment 対応）
        id: pr-info
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "issue_comment" ]; then
            pr_api_err=$(mktemp)
            pr_data=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}" 2>"${pr_api_err}") || {
              echo "PR #${PR_NUMBER} の情報取得に失敗しました。スキップします。エラー詳細:"
              cat "${pr_api_err}" || true
              rm -f "${pr_api_err}"
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              exit 0
            }
            rm -f "${pr_api_err}"
            has_auto_qa=$(echo "${pr_data}" | jq -r '[.labels[].name] | if contains(["auto-qa"]) then "true" else "false" end')
            has_auto_review=$(echo "${pr_data}" | jq -r '[.labels[].name] | if contains(["auto-context-review"]) then "true" else "false" end')
            if [ "${has_auto_qa}" != "true" ] || [ "${has_auto_review}" = "true" ]; then
              echo "スキップ条件: auto-qa=${has_auto_qa}, auto-context-review=${has_auto_review}"
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            # PR body を GITHUB_ENV に設定（find_issue_number Method 2 用）
            pr_body=$(echo "${pr_data}" | jq -r '.body // ""')
            EOF_MARKER=$(uuidgen 2>/dev/null || printf '%s-%s' "$(date +%s)" "${RANDOM}")
            {
              echo "PR_BODY<<${EOF_MARKER}"
              echo "${pr_body}"
              echo "${EOF_MARKER}"
            } >> "${GITHUB_ENV}"
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: 紐づく Issue 番号を特定
        id: find-issue
        if: steps.pr-info.outputs.skip != 'true'
        env:
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          source "${GITHUB_WORKSPACE}/.github/scripts/pr-common.sh"
          find_issue_number
          echo "issue_number=${ISSUE_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: QA 完了条件を判定
        id: check-qa-complete
        if: steps.pr-info.outputs.skip != 'true'
        env:
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.issue_number }}
        run: |
          set -euo pipefail

          echo "=== QA 完了条件チェック開始 ==="
          qa_complete="false"
          direct_approve="false"
          reason=""
          echo "issue_number=${ISSUE_NUMBER}" >> "${GITHUB_OUTPUT}"

          write_reason_output() {
            local reason_text="$1"
            local reason_eof
            reason_eof=$(uuidgen 2>/dev/null || date +reason-%s%N)
            {
              echo "reason<<${reason_eof}"
              echo "${reason_text}"
              echo "${reason_eof}"
            } >> "${GITHUB_OUTPUT}"
          }

          load_issue_flags() {
            local issue_number="$1"
            local current_issue_data=""
            current_issue_data=$(gh api "/repos/${REPO}/issues/${issue_number}" --jq 'select(.pull_request == null)' 2>/dev/null) || current_issue_data=''
            if [ -z "${current_issue_data}" ]; then
              return 1
            fi
            issue_labels=$(echo "${current_issue_data}" | jq '[.labels[].name] // []' 2>/dev/null) || issue_labels="[]"
            has_issue_review_label=$(echo "${issue_labels}" \
              | jq -r 'if contains(["auto-context-review"]) then "true" else "false" end')
            issue_body=$(echo "${current_issue_data}" | jq -r '.body // ""')
            has_issue_auto_merge="false"
            if printf '%s' "${issue_body}" | grep -Eq '<!--[[:space:]]*auto-merge:[[:space:]]*true[[:space:]]*-->'; then
              has_issue_auto_merge="true"
            fi
            return 0
          }

          # 条件 3: 紐づく Issue の auto-context-review ラベル有無と auto-merge タグを確認
          # （pull_request_target / issue_comment の両経路で共通して実施）
          # ※ レビューなしの場合でも QA 完了判定は続行し、後続で分岐する
          has_issue_review_label="false"
          has_issue_auto_merge="false"
          if [ -n "${ISSUE_NUMBER}" ]; then
            if ! load_issue_flags "${ISSUE_NUMBER}"; then
              reason="紐づく #${ISSUE_NUMBER} は Issue として検証できません。QA 完了判定をスキップします。"
              echo "${reason}"
              echo "qa_complete=false" >> "${GITHUB_OUTPUT}"
              echo "direct_approve=false" >> "${GITHUB_OUTPUT}"
              write_reason_output "${reason}"
              exit 0
            fi
            echo "Issue #${ISSUE_NUMBER} の auto-context-review ラベル: ${has_issue_review_label}"
            echo "Issue #${ISSUE_NUMBER} の auto-merge タグ: ${has_issue_auto_merge}"
          else
            # --- フォールバック: Issue 未特定時、sync-issue-labels コメントから復元 ---
            echo "⚠️ find_issue_number() で Issue を特定できませんでした。"
            echo "=== フォールバック: sync-issue-labels コメントから Issue 番号を復元 ==="
            FALLBACK_ISSUE=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --paginate \
              --jq '.[]' 2>/dev/null \
              | jq -rs '[.[]
                  | select(.user.type == "Bot")
                  | select((.user.login == "github-actions[bot]") or (.user.login == "copilot-swe-agent[bot]"))
                  | select(.body | contains("<!-- sync-issue-labels-done -->"))
                  | select(.body | contains("sync-issue-labels-to-pr.yml"))
                  | .body] | .[0] // ""' \
              | grep -oP 'Issue #\K[0-9]+' \
              | head -1) || FALLBACK_ISSUE=""
            if [ -n "${FALLBACK_ISSUE}" ]; then
              echo "✅ フォールバック成功: Issue #${FALLBACK_ISSUE}"
              ISSUE_NUMBER="${FALLBACK_ISSUE}"
              echo "issue_number=${ISSUE_NUMBER}" >> "${GITHUB_OUTPUT}"
              if ! load_issue_flags "${ISSUE_NUMBER}"; then
                reason="フォールバックで復元した #${ISSUE_NUMBER} は Issue として検証できません。QA 完了判定をスキップします。"
                echo "${reason}"
                echo "qa_complete=false" >> "${GITHUB_OUTPUT}"
                echo "direct_approve=false" >> "${GITHUB_OUTPUT}"
                write_reason_output "${reason}"
                exit 0
              fi
              echo "Issue #${ISSUE_NUMBER} の auto-context-review ラベル: ${has_issue_review_label}"
              echo "Issue #${ISSUE_NUMBER} の auto-merge タグ: ${has_issue_auto_merge}"
            else
              reason="Issue 番号が特定できませんでした。QA 完了判定をスキップします。（sync-issue-labels コメントも未検出）"
              echo "${reason}"
              echo "qa_complete=false" >> "${GITHUB_OUTPUT}"
              echo "direct_approve=false" >> "${GITHUB_OUTPUT}"
              write_reason_output "${reason}"
              exit 0
            fi
          fi

          # PR コメント一覧を取得（以降の条件チェックで使用）
          # --paginate + --jq '.' は複数ページで各ページの JSON 配列を別々に出力するため
          # 不正な JSON になる。--jq '.[]' で各要素を出力し jq -s '.' でひとつの配列に集約する。
          pr_comments=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' 2>/dev/null | jq -s '.' 2>/dev/null) || pr_comments="[]"

          # 条件 4: <!-- copilot-auto-qa-posted --> マーカーが PR コメントに存在するか
          qa_posted_count=$(echo "${pr_comments}" \
            | jq '[.[] | select(.body | startswith("<!-- copilot-auto-qa-posted -->"))] | length')
          echo "QA 指示コメント数: ${qa_posted_count}"

          if [ "${qa_posted_count:-0}" -eq 0 ]; then
            reason="QA 指示コメント（<!-- copilot-auto-qa-posted -->）が見つかりません。QA 未開始です。"
            echo "${reason}"
            echo "qa_complete=false" >> "${GITHUB_OUTPUT}"
            write_reason_output "${reason}"
            exit 0
          fi

          # QA 指示コメントの投稿日時を取得（最新のものを使用）
          # 複数サイクルがある場合は最新の QA 指示を基準にすることで、古いサイクルを誤判定しない
          qa_posted_at=$(echo "${pr_comments}" \
            | jq -r '[.[] | select(.body | startswith("<!-- copilot-auto-qa-posted -->"))] | .[-1].created_at')
          echo "QA 指示日時: ${qa_posted_at}"

          # 条件 5: QA 指示後の回答検知
          # パターン 1: ユーザー（bot 以外）の @copilot メンションコメント
          user_reply_count=$(echo "${pr_comments}" \
            | jq --arg qa_at "${qa_posted_at}" \
              '[.[] |
                select(.created_at > $qa_at) |
                select(.user.type != "Bot") |
                select(.body | ascii_downcase | contains("@copilot"))
              ] | length')
          # パターン 2: ワークフロー自動回答マーカー
          auto_answered_count=$(echo "${pr_comments}" \
            | jq --arg qa_at "${qa_posted_at}" \
              '[.[] |
                select(.created_at > $qa_at) |
                select((.user.type != "Bot") or (.user.login == "github-actions[bot]")) |
                select(
                  (.body // "")
                  | split("\n")
                  | map(select(startswith(">") | not))
                  | join("\n")
                  | contains("<!-- auto-qa-default-answered -->")
                )
              ] | length')
          echo "ユーザー回答数: ${user_reply_count}, 自動デフォルト回答数: ${auto_answered_count}"

          if [ "${user_reply_count:-0}" -eq 0 ] && [ "${auto_answered_count:-0}" -eq 0 ]; then
            # 「質問なし」パターンの検知:
            # QA 指示後の Copilot Bot コメントが存在し、チェックボックス（- [ ]）を含まない場合は
            # 質問票なし = QA 完了（質問なし）と判定する
            # Copilot に限定するため user.type == "Bot" かつ user.login が
            # "copilot-swe-agent" から始まるか "Copilot" であるものを対象とする
            bot_replies_after_qa=$(echo "${pr_comments}" \
              | jq --arg qa_at "${qa_posted_at}" \
                '[.[] | select(.created_at > $qa_at and (.user.type == "Bot") and ((.user.login | startswith("copilot-swe-agent")) or .user.login == "Copilot"))]')
            bot_reply_count=$(echo "${bot_replies_after_qa}" | jq 'length')
            if [ "${bot_reply_count:-0}" -gt 0 ]; then
              has_questionnaire=$(echo "${bot_replies_after_qa}" \
                | jq '[.[] | select(
                    (.body | test("^\\s*- \\[ \\]"; "m"))
                    or (.body | test("\\*\\*\\[Q\\d+\\]\\*\\*"; "i"))
                    or (.body | test("\\*\\*\\[質問ID\\]\\*\\*"; "i"))
                    or (.body | test("^\\s*選択肢[:：]"; "m"))
                    or (.body | test("優先順位付き質問票"))
                  )] | length')
              if [ "${has_questionnaire:-0}" -eq 0 ]; then
                # 質問なしパターン → QA 完了
                echo "✅ 質問なしパターンを検知しました。QA 完了と判定します。"
                if [ "${has_issue_review_label}" != "true" ] && [ "${has_issue_auto_merge}" = "true" ]; then
                  direct_approve="true"
                fi
                echo "qa_complete=true" >> "${GITHUB_OUTPUT}"
                echo "direct_approve=${direct_approve}" >> "${GITHUB_OUTPUT}"
                write_reason_output "QA 完了（質問なし）: Copilot が QA 指示に対して質問なしと回答しました。"
                echo "has_issue_review_label=${has_issue_review_label}" >> "${GITHUB_OUTPUT}"
                echo "has_issue_auto_merge=${has_issue_auto_merge}" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
            fi
            # 従来の判定: ユーザー回答待ち（Bot コメントなし、またはチェックボックス付き質問票あり）
            reason="QA 指示後にユーザーの @copilot メンションコメントが見つかりません。ユーザーの回答待ちです。"
            echo "${reason}"
            echo "qa_complete=false" >> "${GITHUB_OUTPUT}"
            write_reason_output "${reason}"
            exit 0
          fi

          # 最初の回答日時（ユーザー回答 or 自動デフォルト回答）を取得
          reply_at=$(echo "${pr_comments}" \
            | jq -r --arg qa_at "${qa_posted_at}" \
              '[.[] |
                select(.created_at > $qa_at) |
                select(
                  ((.user.type != "Bot") and (.body | ascii_downcase | contains("@copilot")))
                  or (
                    ((.user.type != "Bot") or (.user.login == "github-actions[bot]"))
                    and (
                      (.body // "")
                      | split("\n")
                      | map(select(startswith(">") | not))
                      | join("\n")
                      | contains("<!-- auto-qa-default-answered -->")
                    )
                  )
                )
              ] | .[0].created_at')
          echo "回答日時: ${reply_at}"

          if [ -z "${reply_at}" ] || [ "${reply_at}" = "null" ]; then
            reason="回答日時を特定できませんでした。QA 完了判定は安全側で未完了とします。"
            echo "${reason}"
            echo "qa_complete=false" >> "${GITHUB_OUTPUT}"
            write_reason_output "${reason}"
            exit 0
          fi

          reply_at_epoch=$(date -d "${reply_at}" +%s 2>/dev/null || true)
          if [ -z "${reply_at_epoch}" ]; then
            reason="回答日時の解析に失敗しました（reply_at=${reply_at}）。QA 完了判定は安全側で未完了とします。"
            echo "${reason}"
            echo "qa_complete=false" >> "${GITHUB_OUTPUT}"
            write_reason_output "${reason}"
            exit 0
          fi

          # auto-qa-default-answered の有無を判定
          has_default_answer=$(echo "${pr_comments}" \
            | jq --arg qa_at "${qa_posted_at}" \
              '[.[] |
                select(.created_at > $qa_at) |
                select((.user.type != "Bot") or (.user.login == "github-actions[bot]")) |
                select(
                  (.body // "")
                  | split("\n")
                  | map(select(startswith(">") | not))
                  | join("\n")
                  | contains("<!-- auto-qa-default-answered -->")
                )
              ] | length')

          has_answer_files_in_diff="false"
          if [ "${has_default_answer:-0}" -gt 0 ]; then
            answer_files=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/files" --paginate \
              --jq '.[] | select(.filename | test("^qa/.*answer.*\\.md$")) | .filename' 2>/dev/null) || answer_files=""
            if [ -n "${answer_files}" ]; then
              has_answer_files_in_diff="true"
            fi
          fi

          # default-answer 経由の場合: Copilot の反映完了コメントを要求
          copilot_acknowledged_default="false"
          if [ "${has_default_answer:-0}" -gt 0 ]; then
            copilot_ack_count=$(echo "${pr_comments}" \
              | jq --arg reply_at "${reply_at}" \
                '[.[] |
                  select(.created_at > $reply_at) |
                  select(
                    (.user.type == "Bot")
                    and (
                      (.user.login | startswith("copilot-swe-agent"))
                      or .user.login == "Copilot"
                    )
                  ) |
                  select(
                    (.body // "")
                    | split("\n")
                    | map(select(startswith(">") | not))
                    | join("\n")
                    | (
                      contains("auto-qa-default-answered")
                      or contains("既定値")
                      or contains("デフォルト")
                      or contains("反映しました")
                      or contains("適用しました")
                      or contains("採用しました")
                      or contains("確認しました")
                    )
                  )
                ] | length')
            if [ "${copilot_ack_count:-0}" -gt 0 ]; then
              copilot_acknowledged_default="true"
            fi
            echo "default-answer Copilot 反映確認: ${copilot_acknowledged_default} (count=${copilot_ack_count})"
          fi

          # 条件 6: synchronize イベント（Copilot がコミットを push した）は
          # pull_request_target 経路ではジョブの if 条件（event_name == pull_request_target）で保証済み。
          # issue_comment 経路では条件6を適用しない（ヘッダー記載どおり）。
          # ここでは「ユーザー回答後」のコミットかどうかを追加確認する。
          # ※ 「質問なし」分岐（user_reply_count == 0 かつ質問票なし）は上の exit 0 で
          #   先に抜けるため、ここに到達するのはユーザー回答がある場合のみ。
          # PR の最新コミット日時を取得
          # --paginate + --jq '.[-1]...' は複数ページで各ページの最後のコミット日時を出力するため
          # 改行区切りの文字列になる。tail -1 で最後のページの最後のコミット日時を取得する。
          # （GitHub は commits を時系列順で返すため、最後のページの最後の要素が最新コミット）
          latest_commit_at=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/commits" \
            --paginate \
            --jq '.[-1].commit.committer.date' 2>/dev/null | tail -1) || latest_commit_at=""
          echo "最新コミット日時: ${latest_commit_at}"

          latest_commit_epoch=""
          if [ -n "${latest_commit_at}" ] && [ "${latest_commit_at}" != "null" ]; then
            latest_commit_epoch=$(date -d "${latest_commit_at}" +%s 2>/dev/null || true)
            if [ -z "${latest_commit_epoch}" ]; then
              reason="最新コミット日時の解析に失敗しました（latest_commit_at=${latest_commit_at}）。QA 完了判定は安全側で未完了とします。"
              echo "${reason}"
              echo "qa_complete=false" >> "${GITHUB_OUTPUT}"
              write_reason_output "${reason}"
              exit 0
            fi
          fi

          has_commit_after_reply="false"
          if [ -n "${latest_commit_epoch}" ] && [ "${latest_commit_epoch}" -gt "${reply_at_epoch}" ]; then
            has_commit_after_reply="true"
          fi

          if [ "${has_commit_after_reply}" = "true" ]; then
            # default-answer 経由の場合: Copilot の反映コメントも必要
            if [ "${has_default_answer:-0}" -gt 0 ] && [ "${copilot_acknowledged_default}" != "true" ]; then
              reason="auto-qa-default-answered 後にコミットは存在しますが、Copilot の反映完了コメントが未検出です。反映作業の完了待ちです。"
              echo "${reason}"
            else
              echo "✅ ユーザー回答後にコミットが存在し、Copilot の反映も確認済みです。QA 完了と判定します。"
              qa_complete="true"
              reason="QA 完了: ユーザーの @copilot 回答投稿後に Copilot がコミットを push し、反映完了を確認しました。"
              if [ "${has_issue_review_label}" != "true" ] && [ "${has_issue_auto_merge}" = "true" ]; then
                direct_approve="true"
              fi
            fi
          elif [ "${has_default_answer:-0}" -gt 0 ] && [ "${has_answer_files_in_diff}" = "true" ]; then
            echo "✅ default-answer 後の回答ファイル（qa/*answer*.md）が PR diff に存在するため、先回りコミットとして QA 完了と判定します。"
            qa_complete="true"
            reason="QA 完了: auto-qa-default-answered 投稿時点で qa/*answer*.md が PR diff に存在する先回りコミットを検知しました。"
            if [ "${has_issue_review_label}" != "true" ] && [ "${has_issue_auto_merge}" = "true" ]; then
              direct_approve="true"
            fi
          else
            reason="ユーザーの回答後にコミットがまだありません。Copilot のタスク実行待ちです。"
            echo "${reason}"
          fi

          echo "qa_complete=${qa_complete}" >> "${GITHUB_OUTPUT}"
          echo "direct_approve=${direct_approve}" >> "${GITHUB_OUTPUT}"
          write_reason_output "${reason}"
          echo "has_issue_review_label=${has_issue_review_label}" >> "${GITHUB_OUTPUT}"
          echo "has_issue_auto_merge=${has_issue_auto_merge}" >> "${GITHUB_OUTPUT}"

      - name: auto-context-review ラベルを PR に付与
        if: >
          steps.pr-info.outputs.skip != 'true'
          && steps.check-qa-complete.outputs.qa_complete == 'true'
          && steps.check-qa-complete.outputs.has_issue_review_label == 'true'
        run: |
          set -euo pipefail
          echo "=== auto-context-review ラベルを PR #${PR_NUMBER} に付与します ==="
          gh pr edit "${PR_NUMBER}" \
            --repo "${REPO}" \
            --add-label "auto-context-review"
          echo "✅ auto-context-review ラベルを付与しました。copilot-auto-review.yml が発火します。"

      - name: サマリーコメントを PR に投稿（遷移完了）
        if: >
          steps.pr-info.outputs.skip != 'true'
          && steps.check-qa-complete.outputs.qa_complete == 'true'
          && steps.check-qa-complete.outputs.has_issue_review_label == 'true'
        env:
          ISSUE_NUMBER: ${{ steps.check-qa-complete.outputs.issue_number }}
          REASON: ${{ steps.check-qa-complete.outputs.reason }}
        run: |
          set -euo pipefail

          COMMENT=$(printf '%s\n\n%s\n\n%s\n%s\n\n%s\n%s\n\n%s' \
            '## 🔄 QA → レビュー 自動遷移' \
            'QA 完了を検知しました。`auto-context-review` ラベルを PR に付与しました。' \
            "- 📋 **紐づく Issue**: #${ISSUE_NUMBER}" \
            "- 🔍 **判定理由**: ${REASON}" \
            '次のステップ:' \
            '- `copilot-auto-review.yml` が自動発火し、レビュー指示コメントが投稿されます。' \
            '> ℹ️ このコメントは `auto-qa-to-review-transition.yml` によって自動投稿されました。')

          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "${COMMENT}"
          echo "✅ サマリーコメントを PR #${PR_NUMBER} に投稿しました。"

      - name: サマリーコメントを PR に投稿（未完了）
        if: steps.pr-info.outputs.skip != 'true' && steps.check-qa-complete.outputs.qa_complete != 'true'
        env:
          REASON: ${{ steps.check-qa-complete.outputs.reason }}
        run: |
          set -euo pipefail
          # 未完了の場合はログのみ出力（PR コメントは投稿しない。synchronize は頻繁に発火するため）
          echo "⏳ QA 完了条件を満たしていません: ${REASON}"
          echo "次の synchronize または issue_comment イベントで再チェックします。"

      - name: QA 完了（手動レビュー待ち）通知
        if: >
          steps.pr-info.outputs.skip != 'true'
          && steps.check-qa-complete.outputs.qa_complete == 'true'
          && steps.check-qa-complete.outputs.has_issue_review_label != 'true'
          && steps.check-qa-complete.outputs.direct_approve != 'true'
        env:
          ISSUE_NUMBER: ${{ steps.check-qa-complete.outputs.issue_number }}
          REASON: ${{ steps.check-qa-complete.outputs.reason }}
        run: |
          set -euo pipefail
          MARKER='<!-- qa-complete-manual-review -->'

          existing_manual_review_comment=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' 2>/dev/null \
            | jq -s --arg marker "${MARKER}" '[.[] | select(.body | contains($marker))] | length' \
            2>/dev/null) || existing_manual_review_comment=0

          if [ "${existing_manual_review_comment:-0}" -gt 0 ]; then
            echo "手動レビュー待ちコメントは既に投稿済みです。"
            exit 0
          fi

          has_auto_qa=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}" \
            --jq '[.labels[].name] | if contains(["auto-qa"]) then "true" else "false" end' 2>/dev/null) || has_auto_qa="false"
          if [ "${has_auto_qa}" = "true" ]; then
            gh pr edit "${PR_NUMBER}" --repo "${REPO}" --remove-label "auto-qa"
            echo "auto-qa ラベルを除去しました。"
          fi

          # shellcheck disable=SC2016
          COMMENT=$(printf '%s\n\n%s\n\n%s\n%s\n\n%s\n%s\n\n%s' \
            "${MARKER}" \
            '## ✅ QA 完了（手動レビュー待ち）' \
            'QA 完了を検知しました。Issue 設定により auto-context-review / auto-approve-ready は自動付与されません。' \
            "- 📋 **紐づく Issue**: #${ISSUE_NUMBER}" \
            "- 🔍 **判定理由**: ${REASON}" \
            '- 🙋 **次のアクション**: レビュアーが手動でレビューと承認を進めてください。' \
            '> ℹ️ このコメントは `auto-qa-to-review-transition.yml` によって自動投稿されました。')
          gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body "${COMMENT}"
          echo "✅ 手動レビュー待ちコメントを投稿しました。"

      - name: auto-approve-ready ラベルを PR に付与（レビューなしパス）
        if: >
          steps.pr-info.outputs.skip != 'true'
          && steps.check-qa-complete.outputs.qa_complete == 'true'
          && steps.check-qa-complete.outputs.issue_number != ''
          && steps.check-qa-complete.outputs.direct_approve == 'true'
        env:
          ISSUE_NUMBER: ${{ steps.check-qa-complete.outputs.issue_number }}
        run: |
          set -euo pipefail
          # 冪等チェック: 既に直接遷移済みならスキップ
          MARKER='<!-- qa-to-approve-direct-done -->'
          existing_direct=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[]' 2>/dev/null \
            | jq -s --arg marker "${MARKER}" '[.[] | select(.body | contains($marker))] | length' \
            2>/dev/null) || existing_direct=0

          if [ "${existing_direct:-0}" -gt 0 ]; then
            echo "既に direct-approve 遷移済みです。スキップします。"
            exit 0
          fi

          # 検証マーカーチェック（auto-approve-ready 付与前）
          # auto-approve-and-merge.yml の check-validation ステップと同じ判定パターンを使用
          VALIDATION_MISSING_MARKER='<!-- auto-qa-to-review-validation-missing -->'
          VALIDATION_CONFIRMED_MARKER='<!-- validation-confirmed -->'
          HEADING_REGEX='^#{1,6}[[:space:]]+.*(検証|Validation|Verification)'
          BULLET_REGEX='^[[:space:]*>-]*(\*\*|__)?(検証|Validation|Verification)(\*\*|__)?[[:space:]]*[:：]'
          LEGACY_REGEX='(^#{1,6}[[:space:]]+|^)(Validation|検証)'

          # PR body を取得
          pr_body=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}" \
            --jq '.body // ""' 2>/dev/null || echo '')

          # PR コメントを取得（検証不足通知コメントは判定対象から除外）
          pr_comments_all=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate --jq '.[]' 2>/dev/null | jq -s '.' 2>/dev/null || echo '[]')
          pr_comments=$(echo "${pr_comments_all}" \
            | jq --arg marker "${VALIDATION_MISSING_MARKER}" '[.[] | select(.body | contains($marker) | not)]' \
            2>/dev/null || echo '[]')

          has_validation="false"
          combined_text=$(printf '%s\n%s\n' "${pr_body}" "$(echo "${pr_comments}" | jq -r '.[].body' 2>/dev/null || echo '')")

          # 1) HTML コメントマーカー方式（最優先）
          if printf '%s' "${combined_text}" | grep -qiF "${VALIDATION_CONFIRMED_MARKER}"; then
            has_validation="true"
          # 2) 見出し方式（PR body）
          elif printf '%s' "${pr_body}" | grep -qiE "${HEADING_REGEX}"; then
            has_validation="true"
          # 3) 箇条書き/強調方式（PR body）
          elif printf '%s' "${pr_body}" | grep -qiE "${BULLET_REGEX}"; then
            has_validation="true"
          # 互換フォールバック: 旧判定（行頭 Validation/検証、PR body）
          elif printf '%s' "${pr_body}" | grep -qiE "${LEGACY_REGEX}"; then
            has_validation="true"
          # 4) 見出し方式（PR コメント）
          elif echo "${pr_comments}" | jq -r '.[].body' 2>/dev/null \
              | grep -qiE "${HEADING_REGEX}"; then
            has_validation="true"
          # 5) 箇条書き/強調方式（PR コメント）
          elif echo "${pr_comments}" | jq -r '.[].body' 2>/dev/null \
              | grep -qiE "${BULLET_REGEX}"; then
            has_validation="true"
          # 互換フォールバック: 旧判定（行頭 Validation/検証、PR コメント）
          elif echo "${pr_comments}" | jq -r '.[].body' 2>/dev/null \
              | grep -qiE "${LEGACY_REGEX}"; then
            has_validation="true"
          fi

          if [ "${has_validation}" = "false" ]; then
            echo "⚠️ PR body・コメントに検証実施記録（marker/見出し/箇条書き）が見つかりません。"

            # issue_comment 経路では PR body 自動追記もスキップ（競合回避）
            # （auto-qa-default-answer.yml 投稿直後に発火するため、Copilot のメインタスク完了前に
            #   チェックが走り誤検出する競合を回避する。synchronize 経路でのみ実施）
            if [ "${EVENT_NAME}" = "issue_comment" ]; then
              echo "ℹ️ issue_comment 経路のため処理をスキップします。"
              echo "   次回 synchronize イベント（Copilot の commit push 後）で再評価します。"
              exit 0
            fi

            # PR 変更ファイルを取得してコード変更の有無を判定
            # API 失敗・空結果はフェイルクローズ（「不明」扱いで警告コメント経路へ）
            pr_files_rc=0
            pr_files=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/files" \
              --paginate --jq '.[].filename' 2>/dev/null) || pr_files_rc=$?
            has_code_changes="false"

            if [ "${pr_files_rc}" -ne 0 ] || [ -z "${pr_files}" ]; then
              if [ "${pr_files_rc}" -ne 0 ]; then
                echo "⚠️ PR 変更ファイル一覧の取得に失敗しました（rc=${pr_files_rc}）。安全のためコード変更ありと見なします（フェイルクローズ）。"
              else
                echo "⚠️ PR 変更ファイル一覧が空です（rc=0 / files=空）。安全のためコード変更ありと見なします（フェイルクローズ）。"
              fi
              has_code_changes="true"
            else
              # 実行系拡張子ブラックリスト
              EXT_REGEX='\.(py|sh|bash|zsh|yml|yaml|json|toml|ini|cfg|js|ts|tsx|jsx|mjs|cjs|go|rs|java|kt|rb|php|cs|cpp|c|h|hpp)$'
              # ビルド設定ファイルのファイル名ブラックリスト
              FILE_REGEX='(^|/)(Dockerfile|Makefile|requirements\.txt|pyproject\.toml|package\.json|package-lock\.json|yarn\.lock|poetry\.lock|Pipfile|Pipfile\.lock|go\.mod|go\.sum)$'
              if printf '%s\n' "${pr_files}" | grep -qiE "${EXT_REGEX}"; then
                has_code_changes="true"
              elif printf '%s\n' "${pr_files}" | grep -qiE "${FILE_REGEX}"; then
                has_code_changes="true"
              fi
            fi

            if [ "${has_code_changes}" = "true" ]; then
              # コード変更あり: 従来通り警告コメントを投稿して exit

              # 冪等性チェック: 既に検証不足通知コメントが投稿済みならスキップ
              existing_validation_comment=$(echo "${pr_comments_all}" \
                | jq --arg marker "${VALIDATION_MISSING_MARKER}" \
                  '[.[] | select(.body | contains($marker))] | length' 2>/dev/null || echo 0)

              if [ "${existing_validation_comment:-0}" -gt 0 ]; then
                echo "検証不足通知コメントは既に投稿済みです。スキップします。"
                exit 0
              fi

              # @copilot メンションで検証追記を指示するコメントを投稿
              MISSING_COMMENT="$(
                {
                  printf '%s\n' "${VALIDATION_MISSING_MARKER}"
                  printf '\n'
                  printf '%s\n' "## ⚠️ 検証実施記録が確認できません（auto-approve-ready 付与保留）"
                  printf '\n'
                  printf '%s\n' "@copilot PR body に \`## 検証結果\` セクションと \`<!-- validation-confirmed -->\` マーカーを追記してください。"
                  printf '\n'
                  printf '%s\n' "PR body またはコメントに検証実施記録（\`validation-confirmed\` マーカー / \`Validation\`・\`検証\` 見出し / \`検証:\` 形式）が見つからないため、\`auto-approve-ready\` ラベルの付与を保留しました。"
                  printf '\n'
                  printf '%s\n' "**.github/copilot-instructions.md §0 要件**: 最低1つの検証を実施すること（テスト/ビルド/静的解析のいずれかを行い、できない場合は理由と代替を明記すること）。"
                  printf '\n'
                  printf '%s\n' "### 対処方法"
                  printf '\n'
                  printf '%s\n' "以下いずれかを PR body またはコメントに追記してください（推奨順）:"
                  printf '\n'
                  printf '%s\n' "1. HTML コメントマーカー（推奨）"
                  printf '%s\n' "   - \`<!-- validation-confirmed -->\`"
                  printf '%s\n' "2. 見出し方式"
                  printf '%s\n' "   - \`## 検証\`"
                  printf '%s\n' "   - \`## 検証結果\`"
                  printf '%s\n' "   - \`## Validation\`"
                  printf '%s\n' "3. 箇条書き / 強調方式"
                  printf '%s\n' "   - \`- 検証: pytest 実行済\`"
                  printf '%s\n' "   - \`**検証**: ビルド成功\`"
                  printf '%s\n' "   - \`> Validation: lint OK\`"
                  printf '\n'
                  printf '%s\n' "> ℹ️ このコメントは \`auto-qa-to-review-transition.yml\` によって自動投稿されました。"
                }
              )"
              gh pr comment "${PR_NUMBER}" \
                --repo "${REPO}" \
                --body "${MISSING_COMMENT}" || echo "WARNING: 検証不足通知コメントの投稿に失敗しました。"
              echo "検証不足通知コメントを PR #${PR_NUMBER} に投稿しました。auto-approve-ready 付与をスキップします。"
              exit 0
            fi

            # コード変更なし: PR body に検証セクションを自動追記
            AUTO_APPENDED_MARKER='<!-- validation-auto-appended -->'

            # PR body 冪等性チェック: ## 検証 見出しの存在を基準にする（通知コメントとは独立）
            current_body=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}" \
              --jq '.body // ""' 2>/dev/null || echo '')

            if printf '%s' "${current_body}" | grep -qiE "${HEADING_REGEX}"; then
              echo "ℹ️ PR body に既に検証セクションが存在します。PR body 追記をスキップします。"
            else
              VALIDATION_APPEND="$(printf '\n---\n\n## 検証\n\n%s\n%s\n\n<!-- validation-confirmed -->\n<!-- validation-auto-appended-by: auto-qa-to-review-transition.yml -->\n' \
                '該当なし: 理由 = PR 差分にコード変更（実行系ファイル）が含まれません。差分は文書・QA ファイルのみです。' \
                '代替 = PR 差分ファイル一覧の確認（実行系拡張子・ビルド設定ファイルなし）')"
              NEW_BODY="${current_body}${VALIDATION_APPEND}"
              new_body_json=$(jq -n --arg body "${NEW_BODY}" '{"body": $body}')
              echo "${new_body_json}" | gh api --method PATCH "/repos/${REPO}/pulls/${PR_NUMBER}" \
                --input - 2>/dev/null \
                || echo "WARNING: PR body の更新に失敗しました。処理を継続します。"
              echo "✅ PR body に検証セクションを自動追記しました。"
            fi

            # 通知コメント冪等性チェック: コメントマーカーで判定（PR body 追記とは独立）
            existing_appended=$(echo "${pr_comments_all}" \
              | jq --arg marker "${AUTO_APPENDED_MARKER}" \
                '[.[] | select(.body | contains($marker))] | length' 2>/dev/null || echo 0)

            if [ "${existing_appended:-0}" -le 0 ]; then
              # 通知コメントを投稿
              APPENDED_COMMENT="$(
                {
                  printf '%s\n' "${AUTO_APPENDED_MARKER}"
                  printf '\n'
                  printf '%s\n' "## ℹ️ 検証セクションを自動追記しました"
                  printf '\n'
                  printf '%s\n' "PR 差分にコード変更（実行系ファイル）が含まれないため、\`auto-qa-to-review-transition.yml\` が PR body 末尾に検証セクション（該当なし + 代替）を自動追記しました。"
                  printf '\n'
                  printf '%s\n' "- 📋 **判定根拠**: 変更ファイル一覧に実行系拡張子・ビルド設定ファイルなし"
                  printf '%s\n' "- 🔍 **対象拡張子（ブラックリスト）**: \`.py\`/\`.sh\`/\`.yml\`/\`.json\`/\`.ts\`/\`.go\`/\`.rs\` 等、および \`Dockerfile\`/\`Makefile\`/\`requirements.txt\` 等"
                  printf '%s\n' "- 📝 **追記マーカー**: \`<!-- validation-auto-appended-by: auto-qa-to-review-transition.yml -->\`"
                  printf '\n'
                  printf '%s\n' "この自動追記は §0 要件「検証実施／できない場合は理由と代替を明記」を満たすためのフェイルセーフです。"
                  printf '\n'
                  printf '%s\n' "> ℹ️ このコメントは \`auto-qa-to-review-transition.yml\` によって自動投稿されました。"
                }
              )"
              gh pr comment "${PR_NUMBER}" \
                --repo "${REPO}" \
                --body "${APPENDED_COMMENT}" || echo "WARNING: 通知コメントの投稿に失敗しました。処理を継続します。"
              echo "✅ 通知コメントを投稿しました。"
            else
              echo "ℹ️ 検証セクション自動追記済みコメントが既に存在します。スキップします。"
            fi

            echo "✅ コード変更なし確認。auto-approve-ready ラベルの付与を継続します。"
          fi

          echo "✅ PR body/コメントに検証実施記録を確認しました。auto-approve-ready ラベルを付与します。"

          # 紐づく Issue に auto-context-review ラベルがなく、auto-merge 有効の場合のみ直接遷移
          echo "Issue に auto-context-review ラベルがなく、auto-merge が有効なため直接 auto-approve-ready に遷移します。"

          # draft → ready_for_review に遷移（auto-approve-and-merge.yml の !draft 条件を満たすため）
          IS_DRAFT=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}" --jq '.draft' 2>/dev/null || echo 'false')
          DRAFT_TRANSITIONED="false"
          if [ "${IS_DRAFT}" = "true" ]; then
            echo "PR は draft 状態です。ready_for_review に遷移します。"
            if gh pr ready "${PR_NUMBER}" --repo "${REPO}" 2>/dev/null; then
              echo "✅ PR を draft → ready_for_review に遷移しました。"
              DRAFT_TRANSITIONED="true"
            else
              echo "WARNING: gh pr ready の実行に失敗しました。処理を継続します。"
            fi
          fi

          gh pr edit "${PR_NUMBER}" --repo "${REPO}" --add-label "auto-approve-ready"
          DRAFT_NOTE=""
          if [ "${DRAFT_TRANSITIONED}" = "true" ]; then
            DRAFT_NOTE=$(printf '\n- 📝 **draft → ready_for_review に遷移しました**（`auto-approve-and-merge.yml` の起動条件を満たすため）')
          fi
          COMMENT=$(printf '%s\n\n%s\n\n%s\n%s\n%s\n\n%s' \
            '<!-- qa-to-approve-direct-done -->' \
            '## 🔄 QA → Approve 直接遷移（レビューなしパス）' \
            'QA 完了を検知しました。Issue にレビュー設定がなく、`auto-merge: true` のため `auto-approve-ready` ラベルを直接 PR に付与しました。' \
            "- 📋 **紐づく Issue**: #${ISSUE_NUMBER}" \
            "- 🔍 **判定理由**: Issue に auto-context-review ラベルなし + \`auto-merge: true\`${DRAFT_NOTE}" \
            '> ℹ️ このコメントは `auto-qa-to-review-transition.yml` によって自動投稿されました。')
          gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body "${COMMENT}"
          echo "✅ auto-approve-ready ラベルを PR に付与しました（レビューなしパス）。"
