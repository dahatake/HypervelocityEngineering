name: Audit all plan.md (scheduled)

on:
  schedule:
    - cron: '0 3 * * 1'  # 毎週月曜 3:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Scan all plan.md for plan.md metadata violations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # 既存の共有スクリプトで全 plan.md を検証
          # || EXIT_CODE=$? で set -e による早期終了を防ぎ、終了コードを保存する
          EXIT_CODE=0
          VIOLATION_LOG=$(bash .github/scripts/bash/validate-plan.sh --directory work 2>&1) || EXIT_CODE=$?

          echo "$VIOLATION_LOG"

          if [ "$EXIT_CODE" -ne 0 ]; then
            VIOLATION_COUNT=$(echo "$VIOLATION_LOG" | grep -c '^::error::' || true)
            echo "::error::${VIOLATION_COUNT} 件の plan.md メタデータ違反が検出されました"

            CURRENT_DATETIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            AUDIT_DATE=$(date -u +%Y-%m-%d)

            {
              printf '## 🚨 plan.md 監査で plan.md メタデータ違反を検出\n\n'
              printf '**検出日**: %s\n' "$CURRENT_DATETIME"
              printf '**違反数**: %s 件\n\n' "$VIOLATION_COUNT"
              printf '### 違反詳細\n\n'
              printf '```\n%s\n```\n\n' "$VIOLATION_LOG"
              printf '### 対応方法\n\n'
              printf '各 plan.md のメタデータを `.github/skills/task-dag-planning/SKILL.md` §2.2/§2.3 に準拠するよう修正してください。\n\n'
              printf -- '- `split_decision: SPLIT_REQUIRED` の場合: `implementation_files: false` + `subissues_count >= 1` + `subissues.md` 必須\n'
              printf -- '- `task_scope: multi` の場合: `split_decision: SPLIT_REQUIRED` 必須\n'
              printf -- '- `context_size: large` の場合: `split_decision: SPLIT_REQUIRED` 必須\n'
            } | gh issue create \
              --title "[Audit] plan.md メタデータ違反検出 (${AUDIT_DATE})" \
              --body-file - \
              --label "bug"
            exit 1
          fi

          echo "✅ 全 plan.md の監査完了（違反なし）"
