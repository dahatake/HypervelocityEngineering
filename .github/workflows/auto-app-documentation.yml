name: ADOC Orchestrator

# auto-app-documentation ラベル付き Issue の opened/labeled/closed イベントで起動
on:
  issues:
    types: [opened, labeled, closed]

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    if: >
      github.event.action != 'opened'
      || (
        contains(github.event.issue.labels.*.name, 'auto-app-documentation')
        && contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
      )
    concurrency:
      group: adoc-orchestrator-${{ github.event.issue.number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      REPO: ${{ github.repository }}

    steps:
      - name: 実行ゲートチェック
        id: gate
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: "${{ github.event.label.name || '' }}"
        run: |
          set -euo pipefail

          if ! ISSUE_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}"); then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ISSUE_TITLE=$(echo "${ISSUE_RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))")
          ISSUE_LABELS=$(echo "${ISSUE_RESPONSE}" | python3 -c "import sys,json; print(json.dumps([l['name'] for l in json.load(sys.stdin).get('labels',[])]))")
          export ISSUE_TITLE

          if [[ "${EVENT_ACTION}" == "labeled" ]]; then
            if [[ "${LABEL_NAME}" == "adoc:done" ]]; then
              if [[ "${ISSUE_TITLE}" =~ ^\[ADOC\] ]]; then
                echo "mode=delegate_advance" >> "$GITHUB_OUTPUT"
                echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            elif [[ "${LABEL_NAME}" != "auto-app-documentation" ]]; then
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [[ "${EVENT_ACTION}" == "closed" ]]; then
            if [[ "${ISSUE_TITLE}" =~ ^\[ADOC\] ]]; then
              # adoc:done の有無に関わらず closed 時は skip
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${ISSUE_TITLE}" =~ ^\[ADOC\] ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_adoc=$(echo "${ISSUE_LABELS}" | python3 -c "import sys, json; labels = json.load(sys.stdin); print('true' if 'auto-app-documentation' in labels else 'false')")

          if [[ "${has_adoc}" != "true" ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_init=$(echo "${ISSUE_LABELS}" | python3 -c "import sys, json; labels = json.load(sys.stdin); skip_labels = {'adoc:initialized', 'adoc:ready', 'adoc:running', 'adoc:done', 'adoc:blocked'}; print('true' if any(l in skip_labels for l in labels) else 'false')")

          if [[ "${has_init}" == "true" ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=initialize" >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: ラベル bootstrap
        if: steps.gate.outputs.mode == 'initialize'
        run: |
          set -euo pipefail
          create_label() {
            local name="$1"
            local color="$2"
            local desc="$3"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/labels" \
              -d "{\"name\":\"${name}\",\"color\":\"${color}\",\"description\":\"${desc}\"}")
            if [[ "${http_code}" != "201" ]] && [[ "${http_code}" != "422" ]]; then
              echo "ラベル作成エラー: ${name} HTTP ${http_code}"
            fi
            sleep 1
          }

          create_label "auto-app-documentation" "0E8A16" "run app documentation workflow (progressive documentation generation)"
          create_label "adoc:initialized" "C5DEF5" ""
          create_label "adoc:ready" "0075CA" ""
          create_label "adoc:running" "E4E669" ""
          create_label "adoc:done" "0E8A16" ""
          create_label "adoc:blocked" "D73A4A" ""
          create_label "auto-context-review" "1D76DB" "auto context review trigger for copilot-auto-review workflow"
          create_label "auto-qa" "BFD4F2" "auto qa trigger for copilot-auto-qa workflow"
          create_label "auto-approve-ready" "1D76DB" "Ready for auto-approve and auto-merge"

      - name: 即時 adoc:initialized 付与（二重実行防止）
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail
          success=0
          for attempt in 1 2 3; do
            if curl -sf -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/labels" \
              -d '{"labels":["adoc:initialized"]}' > /dev/null; then
              success=1
              break
            fi
            sleep 2
          done
          [[ "${success}" -eq 1 ]]

      - name: Checkout repository
        if: steps.gate.outputs.mode == 'initialize'
        uses: actions/checkout@v4

      - name: Issue 初期化と Step.1 生成
        if: steps.gate.outputs.mode == 'initialize'
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          set -euo pipefail

          ISSUE_BODY=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
          export ISSUE_BODY
          ROOT_ISSUE="${ISSUE_NUMBER}"

          # ---- ユーティリティ関数（auto-app-selection.yml と同一） ----
          api_call() {
            local method="$1"; shift
            local url="$1"; shift
            local data="${1:-}"
            local max_retry=5
            local wait=1
            local http_code response body

            for i in $(seq 1 "${max_retry}"); do
              if [[ -n "${data}" ]]; then
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  -H "Content-Type: application/json" \
                  "${url}" \
                  -d "${data}")
              else
                response=$(curl -s -w "\n%{http_code}" \
                  -X "${method}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${url}")
              fi
              http_code=$(echo "${response}" | tail -1)
              body=$(echo "${response}" | head -n -1)
              if [[ "${http_code}" =~ ^2 ]]; then
                echo "${body}"
                return 0
              fi
              sleep "${wait}"
              wait=$((wait * 2))
            done
            return 1
          }

          create_issue() {
            local title="$1"
            local body="$2"
            local labels_json="$3"
            local data
            data=$(python3 - "${title}" "${body}" "${labels_json}" <<'PY'
          import json, sys
          title = sys.argv[1]
          body  = sys.argv[2]
          labels = json.loads(sys.argv[3])
          print(json.dumps({'title': title, 'body': body, 'labels': labels}))
          PY
            )
            api_call POST "https://api.github.com/repos/${REPO}/issues" "${data}"
          }

          link_sub_issue() {
            local parent_num="$1"
            local child_id="$2"
            local data="{\"sub_issue_id\":${child_id}}"
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${parent_num}/sub_issues" \
              "${data}" || true
            sleep 1
          }

          add_label() {
            local issue_num="$1"
            local label="$2"
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/labels" \
              "{\"labels\":[\"${label}\"]}" > /dev/null
            sleep 1
          }

          assign_copilot() {
            local issue_num="$1"
            local custom_agent="${2:-}"
            local base_branch="${3:-main}"
            local custom_instructions="${4:-}"
            local model_raw="${5:-}"
            local selected_model
            selected_model="$(resolve_model "${model_raw}")"

            if [[ -z "${COPILOT_PAT:-}" ]]; then
              echo "WARNING: COPILOT_PAT が未設定のため assign をスキップ"
              return 1
            fi

            local OWNER="${REPO%/*}"
            local REPO_NAME="${REPO#*/}"
            local query_result bot_id issue_node_id repo_node_id result is_assigned

            query_result=$(GH_TOKEN="${COPILOT_PAT}" gh api graphql \
              -f query="
          query(\$issueNumber: Int!) {
            repository(owner: \"${OWNER}\", name: \"${REPO_NAME}\") {
              id
              issue(number: \$issueNumber) { id }
              suggestedActors(capabilities: [CAN_BE_ASSIGNED], first: 100) {
                nodes {
                  login
                  ... on Bot { id databaseId }
                }
              }
            }
          }
              " \
              -F issueNumber="${issue_num}" \
              2>/dev/null || true)

            IFS=$'\t' read -r bot_id issue_node_id repo_node_id < <(echo "${query_result}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          try:
              d = json.load(sys.stdin)
              repo = d.get('data', {}).get('repository', {})
              bot = ''
              for a in repo.get('suggestedActors', {}).get('nodes', []):
                  if a.get('login') == 'copilot-swe-agent':
                      bot = a.get('id', '')
                      break
              issue = repo.get('issue', {}).get('id', '')
              print(bot + '\t' + issue + '\t' + repo.get('id', ''))
          except Exception:
              print('\t\t')
          PY
            ) || true

            if [[ -z "${bot_id}" ]] || [[ -z "${issue_node_id}" ]] || [[ -z "${repo_node_id}" ]]; then
              return 1
            fi

            result=$(GH_TOKEN="${COPILOT_PAT}" gh api graphql \
              -H 'GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection' \
              -f query="
          mutation(\$assignableId: ID!, \$botId: ID!, \$targetRepositoryId: ID!, \$baseRef: String!, \$customInstructions: String!, \$customAgent: String!, \$model: String!) {
            addAssigneesToAssignable(input: {
              assignableId: \$assignableId,
              assigneeIds: [\$botId],
              agentAssignment: {
                targetRepositoryId: \$targetRepositoryId,
                baseRef: \$baseRef,
                customInstructions: \$customInstructions,
                customAgent: \$customAgent,
                model: \$model
              }
            }) {
              assignable {
                ... on Issue {
                  assignees(first: 10) { nodes { login } }
                }
              }
            }
          }
              " \
              -f assignableId="${issue_node_id}" \
              -f botId="${bot_id}" \
              -f targetRepositoryId="${repo_node_id}" \
              -f baseRef="${base_branch}" \
              -f customInstructions="${custom_instructions}" \
              -f customAgent="${custom_agent}" \
              -f model="${selected_model}" \
              2>/dev/null || true)

            is_assigned=$(echo "${result}" | python3 /dev/fd/3 3<<'PY'
          import sys, json
          try:
              d = json.load(sys.stdin)
              nodes = d.get('data', {}).get('addAssigneesToAssignable', {}).get('assignable', {}).get('assignees', {}).get('nodes', [])
              print('true' if any(a.get('login') in ('copilot-swe-agent', 'Copilot') for a in nodes) else 'false')
          except Exception:
              print('false')
          PY
            ) || true

            [[ "${is_assigned}" == "true" ]]
          }

          post_comment() {
            local issue_num="$1"
            local body="$2"
            local data
            data=$(python3 -c "import sys,json; print(json.dumps({'body': sys.argv[1]}))" "${body}")
            api_call POST \
              "https://api.github.com/repos/${REPO}/issues/${issue_num}/comments" \
              "${data}" > /dev/null
            sleep 1
          }

          extract_custom_agent() {
            local body="$1"
            echo "${body}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'## Custom Agent\s*\n\s*`([^`]+)`', body)
          print(m.group(1) if m else '')
          PY
          }

          extract_model() {
            local body="$1"
            echo "${body}" | python3 /dev/fd/3 3<<'PY'
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'###\s*使用するモデル\s*\n+([^\n#]+)', body)
          if not m:
              print("")
              raise SystemExit(0)
          val = m.group(1).strip()
          allowed = {"Auto", "claude-opus-4.7", "claude-opus-4-7", "claude-opus-4.6", "claude-sonnet-4.6", "gpt-5.4", "gpt-5.3-codex", "gemini-2.5-pro"}
          if val == "claude-opus-4-7":
              val = "claude-opus-4.7"
          print(val if val in allowed else "")
          PY
          }

          resolve_model() {
            local raw="$1"
            if [[ -z "${raw}" || "${raw}" == "Auto" ]]; then
              echo "claude-opus-4.7"; return
            fi
            if [[ "${raw}" == "claude-opus-4-7" ]]; then
              echo "WARNING: 'claude-opus-4-7' は旧表記です。'claude-opus-4.7' に自動変換します。" >&2
              echo "claude-opus-4.7"; return
            fi
            echo "${raw}"
          }

          PARSED=$(python3 - <<'PYEOF'
          import os, re, json
          body = os.environ.get("ISSUE_BODY", "")
          
          branch = "main"
          m = re.search(r"###\s*対象ブランチ\s*\n+(.+)", body)
          if m:
              val = m.group(1).strip()
              if val and val != "_No response_":
                  branch = val
          
          skip_steps = set()
          exec_section = re.search(r"###\s*実行するステップ\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
          if exec_section:
              section = exec_section.group(1)
              all_items = re.findall(r"-\s*\[[ xX]\]\s*Step\.(\d+)", section)
              checked = re.findall(r"-\s*\[[xX]\]\s*Step\.(\d+)", section)
              all_steps = set(all_items)
              checked_steps = set(checked)
              skip_steps = all_steps - checked_steps
              if not checked_steps and all_steps:
                  skip_steps = set()
          
          additional_comment = ""
          m = re.search(r"###\s*追加コメント[^\n]*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
          if m:
              val = m.group(1).strip()
              if val != "_No response_":
                  additional_comment = val
          
          
          def parse_checkbox(title):
              sec = re.search(rf"###\s*{re.escape(title)}\s*\n(.*?)(?=###|\Z)", body, re.DOTALL)
              if not sec:
                  return False
              txt = sec.group(1)
              if re.search(r"スキップする", txt):
                  return not bool(re.search(r"-\s*\[[xX]\]", txt))
              return bool(re.search(r"-\s*\[[xX]\]", txt))
          
          auto_context_review = parse_checkbox("レビュー設定")
          auto_qa = parse_checkbox("質問票設定")
          auto_merge = parse_checkbox("PR完全自動化設定")
          
          def parse_field(title, default=""):
              m = re.search(rf"###\s*{re.escape(title)}[^\n]*\n+(.*?)(?=###|\Z)", body, re.DOTALL)
              if not m:
                  return default
              value = m.group(1).strip()
              if not value or value == "_No response_":
                  return default
              return value
          
          target_dirs = parse_field("対象ディレクトリ（任意）", "")
          exclude_patterns = parse_field("除外パターン（任意）", "node_modules/,vendor/,dist/,*.lock,__pycache__/")
          doc_purpose = parse_field("ドキュメントの主目的", "all")
          max_file_lines = parse_field("大規模ファイル分割閾値", "500")
          
          result = {
              "branch": branch,
              "skip_steps": sorted(list(skip_steps)),
              "additional_comment": additional_comment,
              "auto_context_review": auto_context_review,
              "auto_qa": auto_qa,
              "auto_merge": auto_merge,
              "target_dirs": target_dirs,
              "exclude_patterns": exclude_patterns,
              "doc_purpose": doc_purpose,
              "max_file_lines": max_file_lines,
          }
          print(json.dumps(result))
          PYEOF
          )

          BRANCH=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['branch'])")
          SKIP_STEPS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(' '.join(d['skip_steps']))")
          ADDITIONAL_COMMENT=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['additional_comment'])")
          AUTO_CONTEXT_REVIEW=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_context_review') else 'false')")
          AUTO_QA=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_qa') else 'false')")
          AUTO_MERGE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('auto_merge') else 'false')")
          MODEL_RAW=$(extract_model "${ISSUE_BODY}")
          SELECTED_MODEL=$(resolve_model "${MODEL_RAW}")
          TARGET_DIRS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['target_dirs'])")
          EXCLUDE_PATTERNS=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['exclude_patterns'])")
          DOC_PURPOSE=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['doc_purpose'])")
          MAX_FILE_LINES=$(echo "${PARSED}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['max_file_lines'])")

          if [[ "${AUTO_CONTEXT_REVIEW}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-context-review"
          fi
          if [[ "${AUTO_QA}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-qa"
          fi
          if [[ "${AUTO_MERGE}" == "true" ]]; then
            add_label "${ROOT_ISSUE}" "auto-approve-ready"
          fi
          if [[ -n "${SELECTED_MODEL}" ]]; then
            add_label "${ROOT_ISSUE}" "model/${SELECTED_MODEL}" || true
          fi

          # ---- Root Issue body に auto-context-review / auto-qa / auto-merge タグを埋め込み ----
          export AUTO_CONTEXT_REVIEW AUTO_QA AUTO_MERGE
          _ROOT_UPDATED=$(python3 - <<'PY'
          import os, re
          body = os.environ.get("ISSUE_BODY", "")
          meta = [
              ("auto-context-review", os.environ.get("AUTO_CONTEXT_REVIEW", "false")),
              ("auto-qa", os.environ.get("AUTO_QA", "false")),
              ("auto-merge", os.environ.get("AUTO_MERGE", "false")),
          ]
          updated = body
          for key, value in meta:
              tag = f"<!-- {key}: {value} -->"
              pat = re.compile(rf"<!--\s*{re.escape(key)}\s*:\s*(true|false)\s*-->")
              if pat.search(updated):
                  updated = pat.sub(tag, updated, count=1)
              else:
                  updated += f"\n{tag}"
          print(updated)
          PY
          )
          export _ROOT_UPDATED
          _ROOT_PAYLOAD=$(python3 - <<'PY'
          import json, os
          print(json.dumps({"body": os.environ.get("_ROOT_UPDATED", "")}))
          PY
          )
          api_call PATCH "https://api.github.com/repos/${REPO}/issues/${ROOT_ISSUE}" "${_ROOT_PAYLOAD}" > /dev/null || true

          ROOT_REF=$(printf '<!-- root-issue: #%s -->\n<!-- branch: %s -->\n<!-- auto-context-review: %s -->\n<!-- auto-qa: %s -->\n<!-- auto-merge: %s -->\n<!-- target-dirs: %s -->\n<!-- exclude-patterns: %s -->\n<!-- doc-purpose: %s -->\n<!-- max-file-lines: %s -->' "${ROOT_ISSUE}" "${BRANCH}" "${AUTO_CONTEXT_REVIEW}" "${AUTO_QA}" "${AUTO_MERGE}" "${TARGET_DIRS}" "${EXCLUDE_PATTERNS}" "${DOC_PURPOSE}" "${MAX_FILE_LINES}")

          if [[ -n "${ADDITIONAL_COMMENT}" ]]; then
            ADDITIONAL_SECTION=$(printf '\n\n## 追加コメント\n%s' "${ADDITIONAL_COMMENT}")
          else
            ADDITIONAL_SECTION=""
          fi

          if echo " ${SKIP_STEPS} " | grep -q " 1 "; then
            post_comment "${ROOT_ISSUE}" "⚠️ Step.1 がスキップ指定のため、初期Waveで作成される Sub-issue はありません。"
            exit 0
          fi

          TEMPLATE_PATH="${GITHUB_WORKSPACE}/.github/scripts/templates/adoc/step-1.md"
          BODY_S1=$(python3 - "${TEMPLATE_PATH}" "${ROOT_REF}" "${TARGET_DIRS}" "${EXCLUDE_PATTERNS}" "${DOC_PURPOSE}" "${MAX_FILE_LINES}" "${ADDITIONAL_SECTION}" <<'PY'
          import sys
          from pathlib import Path
          p = Path(sys.argv[1])
          body = p.read_text(encoding='utf-8')
          body = body.replace('{root_ref}', sys.argv[2])
          body = body.replace('{target_dirs}', sys.argv[3])
          body = body.replace('{exclude_patterns}', sys.argv[4])
          body = body.replace('{doc_purpose}', sys.argv[5])
          body = body.replace('{max_file_lines}', str(sys.argv[6]))
          body = body.replace('{additional_section}', sys.argv[7])
          print(body)
          PY
          )

          STEP_LABELS=$(python3 - "${AUTO_CONTEXT_REVIEW}" "${AUTO_QA}" "${AUTO_MERGE}" <<'PY'
          import json, sys
          labels = ["auto-app-documentation"]
          if sys.argv[1] == "true":
              labels.append("auto-context-review")
          if sys.argv[2] == "true":
              labels.append("auto-qa")
          if sys.argv[3] == "true":
              labels.append("auto-approve-ready")
          print(json.dumps(labels))
          PY
          )
          if [[ -n "${SELECTED_MODEL}" ]]; then
            STEP_LABELS=$(echo "${STEP_LABELS}" | jq -c --arg ml "model/${SELECTED_MODEL}" '. + [$ml]')
          fi

          RESP=$(create_issue "[ADOC] Step.1: ファイルインベントリ" "${BODY_S1}" "${STEP_LABELS}")
          S1_NUM=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['number'])")
          S1_ID=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")

          link_sub_issue "${ROOT_ISSUE}" "${S1_ID}"
          add_label "${S1_NUM}" "adoc:ready"
          CA=$(extract_custom_agent "${BODY_S1}")
          if assign_copilot "${S1_NUM}" "${CA}" "${BRANCH}" "" "${SELECTED_MODEL}"; then
            add_label "${S1_NUM}" "adoc:running"
          fi

      - name: 状態遷移は advance-subissues.yml に委譲
        if: steps.gate.outputs.mode == 'delegate_advance'
        run: |
          echo "adoc:done を検知しました。advance-subissues.yml が次ステップ生成を担当します。"
