inputs:
- path: docs/test-specs/{serviceId}-test-spec.md
  required: true
  kind: agent_artifact
  producer: Arch-TDD-TestSpec
- path: docs/catalog/test-strategy.md
  required: true
  kind: agent_artifact
  producer: Arch-TDD-TestStrategy
- path: docs/catalog/app-catalog.md
  required: true
  kind: agent_artifact
  producer: Arch-ApplicationAnalytics
- path: docs/services/{serviceId}-{serviceNameSlug}-description.md
  required: true
  kind: agent_artifact
  producer: Arch-Microservice-ServiceDetail
- path: docs/catalog/service-catalog-matrix.md
  required: true
  kind: agent_artifact
  producer: Arch-Microservice-ServiceCatalog
- path: docs/catalog/data-model.md
  required: true
  kind: agent_artifact
  producer: Arch-DataModeling
- path: docs/azure/azure-services-*.md
  required: true
  kind: external
- path: src/test/api/
  required: true
  kind: agent_artifact
  producer: Dev-Microservice-Azure-ServiceCoding-AzureFunctions
outputs:
- path: src/test/api/{serviceNameSlug}.Tests/
  required: false
  mode: create
- path: src/test/api/{serviceNameSlug}.Tests/README.md
  required: true
  mode: create
- path: '{WORK}'
  required: true
  mode: create
- path: knowledge/
  required: false
  mode: create
- path: knowledge/D06-業務ルール-判定表仕様書.md
  required: true
  mode: create
- path: knowledge/D17-品質保証-UAT-受入パッケージ.md
  required: true
  mode: create
