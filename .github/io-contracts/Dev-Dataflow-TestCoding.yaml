inputs:
- path: docs/test-specs/{jobId}-test-spec.md
  required: true
  kind: agent_artifact
  producer: Arch-Dataflow-TDD-TestSpec
- path: docs/dataflow/dataflow-test-strategy.md
  required: true
  kind: agent_artifact
  producer: Arch-Dataflow-TestStrategy
- path: docs/dataflow/apps/{jobId}-{jobNameSlug}-spec.md
  required: true
  kind: agent_artifact
  producer: Arch-Dataflow-AppSpec
- path: docs/dataflow/dataflow-data-model.md
  required: true
  kind: agent_artifact
  producer: Arch-Dataflow-DataModel
- path: docs/dataflow/dataflow-service-catalog.md
  required: true
  kind: agent_artifact
  producer: Arch-Dataflow-ServiceCatalog
- path: src/test/dataflow/
  required: false
  kind: agent_artifact
  producer: Dev-Dataflow-TestCoding
outputs:
- path: src/test/dataflow/{jobId}-{jobNameSlug}.Tests/
  required: false
  mode: create
- path: src/test/dataflow/{jobId}-{jobNameSlug}.Tests/README.md
  required: true
  mode: create
- path: '{WORK}'
  required: true
  mode: create
- path: knowledge/
  required: false
  mode: create
- path: knowledge/D06-業務ルール-判定表仕様書.md
  required: true
  mode: create
- path: knowledge/D17-品質保証-UAT-受入パッケージ.md
  required: true
  mode: create
