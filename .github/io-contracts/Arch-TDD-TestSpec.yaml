inputs:
- path: docs/catalog/test-strategy.md
  required: true
  kind: agent_artifact
  producer: Arch-TDD-TestStrategy
- path: docs/catalog/service-catalog-matrix.md
  required: true
  kind: agent_artifact
  producer: Arch-Microservice-ServiceCatalog
- path: template/atdd-template.md
  required: true
  kind: static
- path: docs/services/{serviceId}-{serviceNameSlug}-description.md
  required: true
  kind: agent_artifact
  producer: Arch-Microservice-ServiceDetail
- path: docs/screen/{screenId}-{screenNameSlug}-description.md
  required: true
  kind: agent_artifact
  producer: Arch-UI-Detail
- path: docs/catalog/app-catalog.md
  required: true
  kind: agent_artifact
  producer: Arch-ApplicationAnalytics
- path: docs/catalog/data-model.md
  required: true
  kind: agent_artifact
  producer: Arch-DataModeling
- path: docs/catalog/domain-analytics.md
  required: true
  kind: agent_artifact
  producer: Arch-Microservice-DomainAnalytics
- path: knowledge/D05-ユースケース-シナリオカタログ.md
  required: true
  kind: static
outputs:
- path: docs/test-specs/{serviceId}-test-spec.md
  required: true
  mode: create
- path: docs/test-specs/{screenId}-test-spec.md
  required: true
  mode: create
- path: docs/test-specs/{agentId}-test-spec.md
  required: true
  mode: create
- path: work/Arch-TDD-TestSpec/Issue-<識別子>/plan.md
  required: true
  mode: create
- path: subissues.md
  required: true
  mode: create
