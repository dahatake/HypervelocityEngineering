inputs:
- path: docs/catalog/app-catalog.md
  required: true
  kind: agent_artifact
  producer: Arch-ApplicationAnalytics
- path: docs/catalog/service-catalog.md
  required: true
  kind: agent_artifact
  producer: Arch-Microservice-ServiceIdentify
- path: docs/services/{serviceId}-*-description.md
  required: true
  kind: agent_artifact
  producer: Arch-Microservice-ServiceDetail
- path: knowledge/D05-ユースケース・シナリオカタログ.md
  required: true
  kind: static
- path: knowledge/
  required: true
  kind: static
- path: docs/catalog/domain-analytics.md
  required: true
  kind: agent_artifact
  producer: Arch-Microservice-DomainAnalytics
outputs:
- path: docs/services/{serviceId}-agentic-retrieval-spec.md
  required: true
  mode: create
- path: '{WORK}work-status.md'
  required: true
  mode: upsert
- path: '{WORK}plan.md'
  required: true
  mode: create
- path: '{WORK}issue-prompt-<NNN>.md'
  required: false
  mode: create
