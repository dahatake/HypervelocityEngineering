inputs:
- path: docs/screen/{screenId}-{screenNameSlug}-description.md
  required: true
  kind: agent_artifact
  producer: Arch-UI-Detail
- path: docs/catalog/screen-catalog.md
  required: true
  kind: agent_artifact
  producer: Arch-UI-List
- path: docs/catalog/service-catalog-matrix.md
  required: true
  kind: agent_artifact
  producer: Arch-Microservice-ServiceCatalog
- path: docs/catalog/use-case-catalog.md
  required: true
  kind: agent_artifact
  producer: Arch-ARD-UseCaseCatalog
- path: src/data/sample-data.json
  required: true
  kind: agent_artifact
  producer: Arch-DataModeling
- path: docs/test-specs/{screenId}-test-spec.md
  required: true
  kind: agent_artifact
  producer: Arch-TDD-TestSpec
- path: docs/catalog/app-catalog.md
  required: true
  kind: agent_artifact
  producer: Arch-ApplicationAnalytics
outputs:
- path: src/app/
  required: true
  mode: create
- path: src/app/package.json
  required: true
  mode: create
- path: src/app/main.js
  required: true
  mode: create
- path: '{WORK}work-status.md'
  required: true
  mode: upsert
- path: src/test/ui/
  required: true
  mode: create
