name: "Original Docs Review"
description: "original-docs/ を横断分析し、不明瞭点・矛盾点の質問票を自動生成する"
title: "[AQOD-ROOT] original-docs 質問票生成"
labels:
  - "original-docs-review"
body:
  - type: markdown
    attributes:
      value: |
        ## Original Docs Review

        `original-docs/` 配下を横断分析し、質問票 (`qa/QA-DocConsistency-Issue-<N>.md`) を生成します。

        - mode: `original-docs-questionnaire`
        - custom agent: `QA-DocConsistency`

  - type: input
    id: branch
    attributes:
      label: "対象ブランチ"
      description: "qa/ 成果物をコミットするブランチ名を入力してください"
      placeholder: "例: main, develop, feature/aqod"
      value: "main"
    validations:
      required: true

  - type: input
    id: target_scope
    attributes:
      label: "対象スコープ"
      description: "分析対象ディレクトリ（省略時: original-docs/）"
      placeholder: "original-docs/"
    validations:
      required: false

  - type: dropdown
    id: depth
    attributes:
      label: "分析の深さ"
      description: "standard=全カテゴリ、lightweight=不明瞭/矛盾のみ"
      options:
        - "standard"
        - "lightweight"
      default: 0
    validations:
      required: true

  - type: input
    id: focus_areas
    attributes:
      label: "重点観点（任意）"
      description: "例: データ整合性、冪等性、運用設計"
      placeholder: "データ整合性、冪等性"
    validations:
      required: false

  - type: checkboxes
    id: enable_qa
    attributes:
      label: "質問票設定"
      description: "チェックを入れると、auto-qa ラベルが付与され、質問票が自動作成されます。"
      options:
        - label: "質問票の作成を有効にする（チェックすると auto-qa ラベルが付与され、質問票が自動作成されます）"

  - type: checkboxes
    id: enable_self_improve
    attributes:
      label: "自己改善ループ設定"
      description: |
        チェックを入れると、全ステップ完了後に自己改善ループが実行されます。
        ruff（lint）/ pytest（テスト+カバレッジ）/ markdownlint（ドキュメント品質）を
        スキャンし、品質スコアが目標値に達するまで改善を繰り返します。
        デフォルト（チェックなし）では自己改善は実行されません。
      options:
        - label: "自己改善ループを有効にする"

  - type: dropdown
    id: self_improve_max_iterations
    attributes:
      label: "自己改善 最大イテレーション数"
      description: "自己改善ループを有効にした場合の最大繰り返し回数"
      options:
        - "1"
        - "2"
        - "3 (デフォルト)"
      default: 2
    validations:
      required: false

  - type: dropdown
    id: self_improve_quality_threshold
    attributes:
      label: "自己改善 品質スコア目標値"
      description: "この値に達した時点で改善完了とみなします"
      options:
        - "70（最低基準）"
        - "80（標準）"
        - "90（高品質）"
      default: 1
    validations:
      required: false

  - type: checkboxes
    id: enable_auto_merge
    attributes:
      label: "PR完全自動化設定"
      options:
        - label: "PR の自動 Approve & Auto-merge を有効にする"

  - type: dropdown
    id: model
    attributes:
      label: "使用するモデル"
      description: |
        「Auto」を選んだ場合は、GitHub が最適モデルを動的に選択します（10% ディスカウント適用）。空欄時も Auto として扱われます。
      options:
        - "Auto"
        - "gpt-5.5"
        - "claude-opus-4.7"
        - "claude-opus-4.6"
        - "claude-sonnet-4.6"
        - "gpt-5.4"
        - "gpt-5.3-codex"
        - "gemini-2.5-pro"
      default: 0
    validations:
      required: false
