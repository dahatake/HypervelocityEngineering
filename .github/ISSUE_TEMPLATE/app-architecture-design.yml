name: "Architecture Design（アーキテクチャ設計）"
description: "要求定義からサブシステム共通のアーキテクチャ設計を自動実行します (Step.1〜Step.7)"
title: "[Architecture Design] アーキテクチャ設計"
labels:
  - "auto-app-selection"
body:
  - type: markdown
    attributes:
      value: |
        ## Architecture Design（アーキテクチャ設計）
        このフォームから Issue を作成すると、要求定義からサブシステム共通のアーキテクチャ設計タスクが
        Sub-issue として生成され、Copilot が依存関係に従って実行します。

        ### 実行されるステップ
        | ステップ | 内容 | 旧ワークフロー |
        |---------|------|---------------|
        | **Step.1** | アプリケーションリストの作成 | AAS Step.1 |
        | **Step.2** | ソフトウェアアーキテクチャの推薦 | AAS Step.2 |
        | **Step.3.1** | ドメイン分析 | AAD Step.1.1 |
        | **Step.3.2** | サービス一覧抽出 | AAD Step.1.2 |
        | **Step.4** | データモデル作成 | AAD Step.2 |
        | **Step.5** | データカタログ作成 | AAD Step.3 |
        | **Step.6** | サービスカタログ | AAD Step.5 |
        | **Step.7** | テスト戦略書 | AAD Step.6 |

        ※ 旧 AAD Step.4（画面一覧と遷移図）は Web App Design（`web-app-design.yml`）へ移管されています。

        ⚠️ **前提条件**: このワークフローを実行する前に、以下のファイルが存在することを確認してください。
        - `docs/catalog/use-case-catalog.md`

        ✅ **完了後の次ステップ**:
        - Web App Design（`web-app-design.yml`）
        - Batch Design（`batch-design.yml`）
        - AI Agent Design（`ai-agent-design.yml`）

        📚 **knowledge/ 参照**: `knowledge/` フォルダーに業務要件ドキュメント（D01〜D21: 事業意図、スコープ、業務プロセス、ユースケース、データモデル、セキュリティ等）が存在する場合、各ステップで業務コンテキストとして自動参照されます。設計精度を高めるため、事前に `knowledge-management` ワークフローを実行して `knowledge/` を充実させることを推奨します。

  - type: input
    id: branch
    attributes:
      label: "対象ブランチ"
      description: "設計ドキュメントをコミットするブランチ名を入力してください"
      placeholder: "例: main, develop, feature/design-v2"
      value: "main"
    validations:
      required: true

  - type: checkboxes
    id: steps
    attributes:
      label: "実行するステップ"
      description: |
        実行したいステップにチェックを入れてください。
        ✅ **デフォルト（全チェックなし）: すべてのチェックを外した状態で Issue を作成すると、全 Step が実行されます。**
        ⚠️ チェックを入れた場合: チェックを入れたステップだけが実行されます。依存関係があるステップは前段も必ずチェックしてください。
        📋 **依存関係**:
        Step.1 → Step.2 → Step.3.1 → Step.3.2 → Step.4 → Step.5 → Step.6 → Step.7
      options:
        - label: "Step.1 — アプリケーションリストの作成"
        - label: "Step.2 — ソフトウェアアーキテクチャの推薦 ※ Step.1 が必須"
        - label: "Step.3.1 — ドメイン分析 ※ Step.2 が必須"
        - label: "Step.3.2 — サービス一覧抽出 ※ Step.3.1 が必須"
        - label: "Step.4 — データモデル作成 ※ Step.3.2 が必須"
        - label: "Step.5 — データカタログ作成 ※ Step.4 が必須"
        - label: "Step.6 — サービスカタログ ※ Step.5 が必須"
        - label: "Step.7 — テスト戦略書 ※ Step.6 が必須"

  - type: dropdown
    id: model
    attributes:
      label: "使用するモデル"
      description: |
        Copilot cloud agent が使用する AI モデルを選択してください。
        「Auto」を選んだ場合は、GitHub が最適モデルを動的に選択します（10% ディスカウント適用）。空欄時も Auto として扱われます。
        ※ 選択したモデルが API 側で未対応の場合、自動的に既定にフォールバックします。
      options:
        - "Auto"
        - "gpt-5.5"
        - "claude-opus-4.7"
        - "claude-opus-4.6"
        - "claude-sonnet-4.6"
        - "gpt-5.4"
        - "gpt-5.3-codex"
        - "gemini-2.5-pro"
      default: 0
    validations:
      required: false

  - type: checkboxes
    id: enable_review
    attributes:
      label: "レビュー設定"
      description: |
        チェックを入れると、Copilot が PR を完成させた際にセルフレビュー（auto-context-review）を自動実行します。
        デフォルト（チェックなし）ではセルフレビューは実行されません。
      options:
        - label: "セルフレビューを有効にする（チェックすると auto-context-review ラベルが付与され、セルフレビューが自動実行されます）"

  - type: checkboxes
    id: enable_qa
    attributes:
      label: "質問票設定"
      description: |
        チェックを入れると、Copilot がタスクに不明瞭な点があった場合に選択式の質問票を作成し、PR にコメントとして投稿します。
        デフォルト（チェックなし）では質問票は作成されません。
      options:
        - label: "質問票の作成を有効にする（チェックすると auto-qa ラベルが付与され、質問票が自動作成されます）"

  - type: checkboxes
    id: enable_self_improve
    attributes:
      label: "自己改善ループ設定"
      description: |
        チェックを入れると、全ステップ完了後に自己改善ループが実行されます。
        ruff（lint）/ pytest（テスト+カバレッジ）/ markdownlint（ドキュメント品質）を
        スキャンし、品質スコアが目標値に達するまで改善を繰り返します。
        デフォルト（チェックなし）では自己改善は実行されません。
      options:
        - label: "自己改善ループを有効にする"

  - type: dropdown
    id: self_improve_max_iterations
    attributes:
      label: "自己改善 最大イテレーション数"
      description: "自己改善ループを有効にした場合の最大繰り返し回数"
      options:
        - "1"
        - "2"
        - "3 (デフォルト)"
      default: 2
    validations:
      required: false

  - type: dropdown
    id: self_improve_quality_threshold
    attributes:
      label: "自己改善 品質スコア目標値"
      description: "この値に達した時点で改善完了とみなします"
      options:
        - "70（最低基準）"
        - "80（標準）"
        - "90（高品質）"
      default: 1
    validations:
      required: false

  - type: checkboxes
    id: enable_auto_merge
    attributes:
      label: "PR完全自動化設定"
      description: |
        チェックを入れると、QA・レビュー完了後に PR の自動 Approve と Auto-merge（squash）が実行されます。
        ⚠️ この設定を有効にすると、人間によるレビュー・承認なしで PR がマージされます。
        本番ブランチへの直接マージには十分ご注意ください。
      options:
        - label: "PR の自動 Approve & Auto-merge を有効にする"

  - type: textarea
    id: additional_comment
    attributes:
      label: "追加コメント（任意）"
      description: "補足・制約・注意事項があれば記載してください。各 Step issue にも引用されます。"
      placeholder: "例: ユースケースは docs/catalog/use-case-catalog.md に記載済み。APP は3〜5個想定。"
    validations:
      required: false
