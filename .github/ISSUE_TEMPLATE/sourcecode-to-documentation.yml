name: "Source Codeからのドキュメント作成"
description: "Issue からSource Codeからのドキュメント生成ワークフロー (Step.1〜Step.6) を自動起動します"
title: "[Source Codeからのドキュメント作成] Source Codeからのドキュメント作成"
labels:
  - "auto-app-documentation"
body:
  - type: markdown
    attributes:
      value: |
        ## Source Codeからのドキュメント作成
        このフォームから Issue を作成すると、自動で Step.1〜Step.6 のドキュメント生成タスクが
        Sub-issue として生成され、Copilot が依存関係に従って順次・並列実行するワークフローです。

        ### 4層構造
        - レイヤー1: ファイルインベントリ + 個別ファイルサマリー
        - レイヤー2: コンポーネント/モジュール分析
        - レイヤー2.5: コンポーネントインデックス
        - レイヤー3〜4: 横断分析 + 目的特化ドキュメント生成

  - type: input
    id: branch
    attributes:
      label: "対象ブランチ"
      description: "ドキュメントをコミットするブランチ名を入力してください"
      placeholder: "例: main, develop, feature/adoc"
      value: "main"
    validations:
      required: true

  - type: dropdown
    id: runner_type
    attributes:
      label: "実行 Runner"
      description: |
        ワークフローを実行する Runner を選択します。
        - **GitHub Hosted**: `ubuntu-latest`（GitHub 提供の標準ランナー）
        - **Self-hosted (ACA)**: `[self-hosted, linux, x64, aca]`（Azure Container Apps 上のセルフホストランナー）
        - Self-hosted runner はオプションです（GitHub Hosted を使う場合はスキップ可能）
        - Self-hosted を選ぶ場合は runner が online であり、label が一致していることを確認してください（詳細: `users-guide/setup-self-hosted-runner.md`）
      options:
        - "GitHub Hosted"
        - "Self-hosted (ACA)"
      default: 0
    validations:
      required: true

  - type: input
    id: target_dirs
    attributes:
      label: "対象ディレクトリ（任意）"
      description: "ドキュメント生成対象ディレクトリ（カンマ区切り）。未指定時はリポジトリ全体が対象です"
      placeholder: "例: src/,hve/,infra/"
    validations:
      required: false

  - type: input
    id: exclude_patterns
    attributes:
      label: "除外パターン（任意）"
      description: "除外対象パターン（カンマ区切り）"
      value: "node_modules/,vendor/,dist/,*.lock,__pycache__/"
    validations:
      required: false

  - type: dropdown
    id: doc_purpose
    attributes:
      label: "ドキュメントの主目的"
      description: "内部ID（CLI と同一値）: all / onboarding / refactoring / migration"
      options:
        - "all"
        - "onboarding"
        - "refactoring"
        - "migration"
    validations:
      required: true

  - type: dropdown
    id: max_file_lines
    attributes:
      label: "大規模ファイル分割閾値"
      description: "閾値を超えるファイルは分割してサマリー化します"
      options:
        - "300"
        - "500"
        - "1000"
    validations:
      required: true

  - type: checkboxes
    id: steps
    attributes:
      label: "実行するステップ"
      description: |
        実行したいステップにチェックを入れてください。
        ✅ **デフォルト（全チェックなし）: すべてのチェックを外した状態で Issue を作成すると、全 Step が実行されます。**
      options:
        - label: "Step.1 — ファイルインベントリ"
        - label: "Step.2 — ファイルサマリー（2.1〜2.5 並列）"
        - label: "Step.3 — コンポーネント分析（3.1〜3.5 並列）"
        - label: "Step.4 — コンポーネントインデックス"
        - label: "Step.5 — アーキテクチャ横断分析（5.1〜5.4 並列）"
        - label: "Step.6 — 目的特化ドキュメント（6.1〜6.3 並列）"

  - type: dropdown
    id: model
    attributes:
      label: "使用するモデル"
      description: |
        Copilot cloud agent が使用するモデルを選択します（hve CLI `--model` と同等）。
        - `Auto`: GitHub が最適モデルを動的選択（プレミアムリクエスト 0.9x、推奨）
        - その他: hve/config.py の `MODEL_CHOICES` と同一の選択肢
        ※ `HVE_MODEL_OVERRIDE` 環境変数が設定されている場合はそちらが優先されます。
      options:
        - "Auto"
        - "claude-opus-4.7"
        - "claude-opus-4.6"
        - "gpt-5.5"
        - "gpt-5.4"
      default: 0
    validations:
      required: false
  - type: dropdown
    id: review_model
    attributes:
      label: "レビュー用モデル（任意）"
      description: |
        敵対的レビュー（auto-context-review）/ Code Review Agent で使用するモデル（hve CLI `--review-model` 相当）。
        `Auto` を選ぶと Copilot が最適モデルを自動選択します。明示指定でモデルを固定できます。
      options:
        - "Auto"
        - "claude-opus-4.7"
        - "claude-opus-4.6"
        - "gpt-5.5"
        - "gpt-5.4"
      default: 0
    validations:
      required: false

  - type: dropdown
    id: qa_model
    attributes:
      label: "QA 用モデル（任意）"
      description: |
        実行前 QA（auto-qa）の質問票生成で使用するモデル（hve CLI `--qa-model` 相当）。
        `Auto` を選ぶと Copilot が最適モデルを自動選択します。明示指定でモデルを固定できます。
      options:
        - "Auto"
        - "claude-opus-4.7"
        - "claude-opus-4.6"
        - "gpt-5.5"
        - "gpt-5.4"
      default: 0
    validations:
      required: false

  - type: checkboxes
    id: enable_review
    attributes:
      label: "レビュー設定"
      description: |
        チェックを入れると、Copilot が PR を完成させた際にセルフレビュー（auto-context-review）を自動実行します。
        デフォルト（チェックなし）ではセルフレビューは実行されません。
      options:
        - label: "セルフレビューを有効にする（チェックすると auto-context-review ラベルが付与され、セルフレビューが自動実行されます）"

  - type: checkboxes
    id: enable_qa
    attributes:
      label: "質問票設定"
      description: |
        チェックを入れると、Copilot がステップ実行前に選択式の質問票（事前 QA）を作成します。回答後に実行が開始されます。
        デフォルト（チェックなし）では質問票は作成されません。
        詳細: `docs/operations/auto-qa-skip-if-existing.md` を参照してください。
      options:
        - label: "実行前 QA を実施する（チェックすると auto-qa ラベルが付与され、ステップ実行前に質問票が作成されます）"

  - type: checkboxes
    id: enable_self_improve
    attributes:
      label: "自己改善ループ設定"
      description: |
        チェックを入れると、全ステップ完了後に自己改善ループが実行されます。
        ruff（lint）/ pytest（テスト+カバレッジ）/ markdownlint（ドキュメント品質）を
        スキャンし、品質スコアが目標値に達するまで改善を繰り返します。
        デフォルト（チェックなし）では自己改善は実行されません。
      options:
        - label: "自己改善ループを有効にする"

  - type: dropdown
    id: self_improve_max_iterations
    attributes:
      label: "自己改善 最大イテレーション数"
      description: "自己改善ループを有効にした場合の最大繰り返し回数"
      options:
        - "1"
        - "2"
        - "3 (デフォルト)"
      default: 2
    validations:
      required: false

  - type: dropdown
    id: self_improve_quality_threshold
    attributes:
      label: "自己改善 品質スコア目標値"
      description: "この値に達した時点で改善完了とみなします"
      options:
        - "70（最低基準）"
        - "80（標準）"
        - "90（高品質）"
      default: 1
    validations:
      required: false

  - type: checkboxes
    id: enable_auto_merge
    attributes:
      label: "PR完全自動化設定"
      description: |
        チェックを入れると、QA・レビュー完了後に PR の自動 Approve と Auto-merge（squash）が実行されます。
        ⚠️ この設定を有効にすると、人間によるレビュー・承認なしで PR がマージされます。
        本番ブランチへの直接マージには十分ご注意ください。
      options:
        - label: "PR の自動 Approve & Auto-merge を有効にする"

  - type: textarea
    id: additional_comment
    attributes:
      label: "追加コメント（任意）"
      description: "補足・制約・注意事項があれば記載してください。各 Step issue にも引用されます。"
      placeholder: "例: docs-generated/ 配下のみ更新したい。"
    validations:
      required: false
