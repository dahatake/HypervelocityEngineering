name: "knowledge/ ドキュメント生成・管理"
description: "qa/original-docs/custom source から knowledge/ D01〜D21 を生成・管理する"
title: "knowledge/ 生成・管理"
labels:
  - "knowledge-management"
body:
  - type: input
    id: branch
    attributes:
      label: "対象ブランチ"
      description: "knowledge/ ドキュメントをコミットするブランチ名を入力してください"
      placeholder: "例: main, develop, feature/km"
      value: "main"
    validations:
      required: true

  - type: dropdown
    id: sources
    attributes:
      label: "ソース"
      description: "取り込み対象を選択してください"
      options:
        - "qa のみ"
        - "original-docs のみ"
        - "両方"
      default: 0
    validations:
      required: true

  - type: textarea
    id: target_files
    attributes:
      label: "target_files（任意）"
      description: "選択ソース内のサブセットを 1 行 1 ファイルで指定"
      placeholder: |
        qa/AAS-Step1-context-review.md
        original-docs/requirements.md
    validations:
      required: false

  - type: checkboxes
    id: force_refresh
    attributes:
      label: "再生成オプション"
      options:
        - label: "既存 knowledge/ 出力を完全に再生成する（force_refresh）"

  - type: checkboxes
    id: enable_review
    attributes:
      label: "レビュー設定"
      description: |
        チェックを入れると、Copilot が PR を完成させた際にセルフレビュー（auto-context-review）を自動実行します。
        デフォルト（チェックなし）ではセルフレビューは実行されません。
      options:
        - label: "セルフレビューを有効にする（チェックすると auto-context-review ラベルが付与され、セルフレビューが自動実行されます）"

  - type: checkboxes
    id: enable_qa
    attributes:
      label: "質問票設定"
      description: "チェックを入れると、ステップ実行前に質問票が作成されます（auto-qa ラベルが付与）。"
      options:
        - label: "実行前 QA を実施する（チェックすると auto-qa ラベルが付与され、ステップ実行前に質問票が作成されます）"

  - type: checkboxes
    id: enable_self_improve
    attributes:
      label: "自己改善ループ設定"
      description: |
        チェックを入れると、全ステップ完了後に自己改善ループが実行されます。
        ruff（lint）/ pytest（テスト+カバレッジ）/ markdownlint（ドキュメント品質）を
        スキャンし、品質スコアが目標値に達するまで改善を繰り返します。
        デフォルト（チェックなし）では自己改善は実行されません。
      options:
        - label: "自己改善ループを有効にする"

  - type: dropdown
    id: self_improve_max_iterations
    attributes:
      label: "自己改善 最大イテレーション数"
      description: "自己改善ループを有効にした場合の最大繰り返し回数"
      options:
        - "1"
        - "2"
        - "3 (デフォルト)"
      default: 2
    validations:
      required: false

  - type: dropdown
    id: self_improve_quality_threshold
    attributes:
      label: "自己改善 品質スコア目標値"
      description: "この値に達した時点で改善完了とみなします"
      options:
        - "70（最低基準）"
        - "80（標準）"
        - "90（高品質）"
      default: 1
    validations:
      required: false

  - type: checkboxes
    id: enable_auto_merge
    attributes:
      label: "PR完全自動化設定"
      options:
        - label: "PR の自動 Approve & Auto-merge を有効にする"

  - type: textarea
    id: additional_comment
    attributes:
      label: "追加コメント（任意）"
      description: "`custom_source_dir: <path>` を 1 行ずつ指定できます（複数可）"
      placeholder: |
        custom_source_dir: docs/specs
        custom_source_dir: work/input
    validations:
      required: false

  - type: dropdown
    id: model
    attributes:
      label: "使用するモデル"
      description: |
        GitHub が自動的に最適なモデルを選択します（Auto）。
        特定モデルを指定する場合は `HVE_MODEL_OVERRIDE` 環境変数を使用してください。
      options:
        - "Auto"
      default: 0
    validations:
      required: false
