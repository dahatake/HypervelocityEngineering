name: "knowledge/ ドキュメント生成・管理"
description: "qa/original-docs/custom source から knowledge/ D01〜D21 を生成・管理する"
title: "knowledge/ 生成・管理"
labels:
  - "knowledge-management"
body:
  - type: dropdown
    id: sources
    attributes:
      label: "ソース"
      description: "取り込み対象を選択してください"
      options:
        - "qa のみ"
        - "original-docs のみ"
        - "両方"
      default: 0
    validations:
      required: true

  - type: textarea
    id: target_files
    attributes:
      label: "target_files（任意）"
      description: "選択ソース内のサブセットを 1 行 1 ファイルで指定"
      placeholder: |
        qa/AAS-Step1-context-review.md
        original-docs/requirements.md
    validations:
      required: false

  - type: checkboxes
    id: force_refresh
    attributes:
      label: "再生成オプション"
      options:
        - label: "既存 knowledge/ 出力を完全に再生成する（force_refresh）"

  - type: checkboxes
    id: enable_auto_merge
    attributes:
      label: "PR完全自動化設定"
      options:
        - label: "PR の自動 Approve & Auto-merge を有効にする"

  - type: input
    id: custom_source_dir
    attributes:
      label: "カスタムソースディレクトリ（任意）"
      description: "knowledge/ 生成元として追加するディレクトリをスペース区切りで指定"
      placeholder: "例: docs/specs work/input"
    validations:
      required: false

  - type: checkboxes
    id: enable_review
    attributes:
      label: "レビュー設定"
      description: |
        チェックを入れると、Copilot が PR を完成させた際にセルフレビュー（auto-context-review）を自動実行します。
        デフォルト（チェックなし）ではセルフレビューは実行されません。
      options:
        - label: "セルフレビューを有効にする（チェックすると auto-context-review ラベルが付与され、セルフレビューが自動実行されます）"

  - type: checkboxes
    id: enable_qa
    attributes:
      label: "質問票設定"
      description: |
        チェックを入れると、Copilot がタスクに不明瞭な点があった場合に選択式の質問票を作成し、PR にコメントとして投稿します。
        デフォルト（チェックなし）では質問票は作成されません。
      options:
        - label: "質問票の作成を有効にする（チェックすると auto-qa ラベルが付与され、質問票が自動作成されます）"

  - type: textarea
    id: additional_comment
    attributes:
      label: "追加コメント（任意）"
      description: "補足・制約・注意事項があれば記載してください"
      placeholder: "例: D01〜D05 のみ再生成したい"
    validations:
      required: false

  - type: dropdown
    id: model
    attributes:
      label: "使用するモデル"
      description: |
        「Auto」を選んだ場合は、GitHub が最適モデルを動的に選択します（10% ディスカウント適用）。空欄時も Auto として扱われます。
      options:
        - "Auto"
        - "claude-opus-4.7"
        - "claude-opus-4.6"
        - "claude-sonnet-4.6"
        - "gpt-5.4"
        - "gpt-5.3-codex"
        - "gemini-2.5-pro"
      default: 0
    validations:
      required: false
