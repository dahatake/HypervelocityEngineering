name: "qa/ 質問 → knowledge/ ドキュメント生成・管理"
description: "qa/ の質問ファイルから knowledge/ ドキュメント（D01〜D21）を生成・管理し、ステータスを更新する"
title: "[QA Classification] qa/ 質問 → knowledge/ ドキュメント生成・管理"
labels:
  - "qa-knowledge-management"
body:
  - type: markdown
    attributes:
      value: |
        ## qa/ 質問データから knowledge/ ドキュメントの生成・管理

        `qa/` フォルダーに蓄積された質問ファイル（コンテキスト確認・品質チェックリスト等）を
        `template/business-requirement-document-master-list.md` の D01〜D21 文書クラスに分類し、
        `knowledge/business-requirement-document-status.md` を生成・更新します。

        ### 処理フロー
        1. `qa/*.md` の全ファイルを読み取り、質問項目を抽出
        2. 各質問を D01〜D21 に分類（Primary / Contributing）
        3. 状態判定（Confirmed / Tentative / Unknown）
        4. カバレッジギャップ分析
        5. `knowledge/business-requirement-document-status.md` を生成・更新

        ### 受け入れ条件（AC）
        - [ ] `qa/` 配下の全 `.md` ファイルが処理対象に含まれている
        - [ ] 各質問が D01〜D21 のいずれかに Primary マッピングされている
        - [ ] マッピング根拠が全質問に記載されている（捏造なし）
        - [ ] `knowledge/business-requirement-document-status.md` が正しいフォーマットで生成されている
        - [ ] サマリーの集計値と詳細マッピングの行数が一致している
        - [ ] QA マッピングがある D クラスについて `knowledge/D{NN}-<文書名>.md` が生成されている
        - [ ] QA マッピングがない D クラスの `knowledge/` ファイルは生成されていない
        - [ ] `qa/`、`docs/`、`template/` のファイルが変更されていない
        - [ ] `knowledge/` ファイルが新テンプレートのセクション構造（§1 目的と背景〜§8 関連文書 + 付録A）に準拠していること
        - [ ] 各 `knowledge/` ファイルの付録 A に QA 回答の原文が保存されていること
        - [ ] 各 `knowledge/` ファイルの §5 に master-list 最低内容のカバー状況テーブルが含まれていること


        📚 **knowledge/ D01〜D21 参照**: このワークフローが生成・管理する `knowledge/` ファイルの一覧（**QA マッピングが存在する D クラスのみ生成されます**。マッピングがない D クラスのファイルは生成されません）：
        - `knowledge/D01-事業意図-成功条件定義書.md` — 経営課題・KPI・成功条件
        - `knowledge/D02-スコープ-対象境界定義書.md` — スコープ・対象境界
        - `knowledge/D04-業務プロセス仕様書.md` — 業務プロセス
        - `knowledge/D05-ユースケース-シナリオカタログ.md` — ユースケース・シナリオ
        - `knowledge/D06-業務ルール-判定表仕様書.md` — 業務ルール・判定表
        - `knowledge/D07-用語集-ドメインモデル定義書.md` — 用語・ドメインモデル
        - `knowledge/D08-データモデル-SoR-SoT-データ品質仕様書.md` — データモデル・SoR/SoT
        - `knowledge/D09-システムコンテキスト-責任境界-再利用方針書.md` — システムコンテキスト・責任境界
        - `knowledge/D10-API-Event-File-連携契約パック.md` — API/イベント/ファイル連携契約
        - `knowledge/D11-画面-UX-操作意味仕様書.md` — 画面UX・操作仕様
        - `knowledge/D12-権限-認可-職務分掌設計書.md` — 権限・認可・職務分掌
        - `knowledge/D13-セキュリティ-プライバシー-監査-法規マトリクス.md` — セキュリティ・プライバシー・監査
        - `knowledge/D14-国際化-地域差分仕様書.md` — 国際化・地域差分
        - `knowledge/D15-非機能-運用-監視-DR-仕様書.md` — 非機能・運用・監視・DR
        - `knowledge/D16-移行-導入-ロールアウト計画書.md` — 移行・導入計画
        - `knowledge/D17-品質保証-UAT-受入パッケージ.md` — 品質保証・UAT
        - `knowledge/D18-Prompt-ガバナンス-入力統制パック.md` — Promptガバナンス
        - `knowledge/D19-ソフトウェアアーキテクチャ-ADR-パック.md` — ソフトウェアアーキテクチャ・ADR
        - `knowledge/D20-セキュア設計-実装ガードレール.md` — セキュア設計・実装ガードレール
        - `knowledge/D21-CI-CD-ビルド-リリース-供給網管理仕様書.md` — CI/CD・ビルド・リリース
  - type: dropdown
    id: scope
    attributes:
      label: "対象スコープ"
      description: "分類対象の qa/ ファイルの範囲を選択してください"
      options:
        - "全ファイル — qa/ 配下の全 .md ファイルを対象"
        - "指定ファイルのみ — 下の「対象ファイル」欄で指定したファイルのみ対象"
    validations:
      required: true

  - type: textarea
    id: target_files
    attributes:
      label: "対象ファイル（スコープが「指定ファイルのみ」の場合）"
      description: |
        対象にする qa/ 配下のファイルを1行1ファイルで記載してください。
        スコープが「全ファイル」の場合は空欄で構いません。
      placeholder: |
        qa/AAS-Step1-context-review.md
        qa/AAD-Step1-2-service-list-context-review.md
    validations:
      required: false

  - type: checkboxes
    id: force_refresh
    attributes:
      label: "再生成オプション"
      description: |
        チェックを入れると、既存の `knowledge/business-requirement-document-status.md` を完全に再生成します。
        チェックなしの場合は差分更新を試みます。
        ※ Agent はこのチェックボックスの状態を Issue body から直接検知します。
      options:
        - label: "既存 status.md を完全に再生成する（force-refresh）"

  - type: checkboxes
    id: enable_auto_merge
    attributes:
      label: "PR完全自動化設定"
      description: |
        チェックを入れると、QA・レビュー完了後に PR の自動 Approve と Auto-merge（squash）が実行されます。
        ⚠️ この設定を有効にすると、人間によるレビュー・承認なしで PR がマージされます。
        本番ブランチへの直接マージには十分ご注意ください。
      options:
        - label: "PR の自動 Approve & Auto-merge を有効にする"

  - type: textarea
    id: additional_comment
    attributes:
      label: "追加コメント（任意）"
      description: "補足・制約・注意事項があれば記載してください。"
      placeholder: "例: 新しく追加した qa/XXX.md のみ差分分類してほしい"
    validations:
      required: false
