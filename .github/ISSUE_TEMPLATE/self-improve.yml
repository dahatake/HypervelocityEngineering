name: "Self-Improve: 自己改善ループ"
description: "コードベースの品質を自動スキャン・改善し続ける自己改善ループタスクを起動します（最大3イテレーション）"
title: "[Self-Improve] 自己改善ループ実行"
labels:
  - "self-improve"
body:
  - type: markdown
    attributes:
      value: |
        ## 🔄 Self-Improve: 自己改善ループ

        このフォームから Issue を作成すると、Copilot cloud agent が以下のループを実行します:

        1. **Phase 4a**: コードベーススキャン（ruff / pytest --cov / markdownlint）
        2. **Phase 4b**: LLM 統合評価 + 改善計画策定（Skill: `task-dag-planning` 準拠）
        3. **Phase 4c**: 改善実装（セッション内）
        4. **Phase 4d**: 改善後検証（§10.1 Verification Loop）
        5. **Phase 4e**: 学習ログ記録（`work/Issue-<N>/artifacts/learning-NNN.md`）
        6. **Phase 4f**: デグレード検知（スコア悪化 or テスト FAIL で即時停止）

        ### 成功判定
        - 敵対的レビュー PASS (Critical = 0)
        - quality_score ≥ 80

        ### 競合制御
        - `work/self-improve/run-{run_id}/.self-improve-lock` ファイルで排他制御
        - 確認コマンド例: `find work/self-improve -type f -name '.self-improve-lock'`
        - Issue open = 実行中 / closed = 完了

        ### ⚠️ ブランチ・直接 push に関する注意
        - Issue Template 経由で実行された場合、Copilot cloud agent は **現在アクティブなブランチへ直接コミット/push** します。
        - マージ済みブランチや保護ブランチへの直接 push を避けるため、実行前に専用の作業ブランチを作成することを推奨します。
        - hve ローカル実行（`--self-improve`）の場合も同様に、実行開始時に使用ブランチが標準出力に表示されます。

        ### 使用 Custom Agents
        - `QA-CodeQualityScan` — コード品質スキャン
        - `QA-DocConsistency` — ドキュメント整合性チェック
        - `Arch-ImprovementPlanner` — 改善計画立案
        - `QA-PostImproveVerify` — 改善後検証

        ⚠️ **注意**: この Issue に Copilot をアサインすると、Skill `task-dag-planning` の分割判定が実行されます。
        見積合計 > 15分の場合は `plan.md` と `subissues.md` のみ作成し、Sub Issue に分割されます。


        📚 **knowledge/ 参照**: 改善計画で `knowledge/` の業務要件ドキュメント（D01〜D21）との整合性も確認対象とします。
  - type: input
    id: target_scope
    attributes:
      label: "改善対象スコープ"
      description: |
        改善するディレクトリ・ファイルのパスを指定します。
        ⚠️ 以下の新仕様は **`HVE_SELF_IMPROVE_NEW_SCOPE_RESOLVER=1`** 環境変数が設定されている場合のみ有効です。未設定時は従来挙動（空=リポジトリ全体）になります。
        - 未入力 : そのステップで生成された成果物が対象（`work/` 配下は自動除外）
        - `*`    : 標準対象一括 (`data`, `docs`, `docs-generated`, `knowledge`, `src` のうち実在するもの。存在しないパスは警告ログを出してスキップ)
        - 任意   : カンマまたは空白区切りで複数パス指定可（例: `src/ hve/`）
        ※ `-` で始まるトークンは安全のため禁止されています。
      placeholder: "（空 = ステップ成果物） / * / src/ docs/"
    validations:
      required: false

  - type: textarea
    id: task_goal
    attributes:
      label: "自己改善ゴール（任意）"
      description: |
        改善ループの目標説明を記載します。省略した場合、ワークフロー種別の標準ゴールまたは
        .github/agents/ / knowledge/ / docs/ の自動解析結果が適用されます。
      placeholder: |
        例: テスト失敗を 0 件にし lint エラーを解消する
        例: knowledge/ D01〜D21 の整合性を確保する
    validations:
      required: false

  - type: dropdown
    id: max_iterations
    attributes:
      label: "最大イテレーション数"
      description: "自己改善ループの最大繰り返し回数（デフォルト: 3回）"
      options:
        - "1"
        - "2"
        - "3 (デフォルト)"
      default: 2
    validations:
      required: true

  - type: dropdown
    id: quality_threshold
    attributes:
      label: "品質スコア目標値"
      description: "この値に達した時点で改善完了とみなします"
      options:
        - "70（最低基準）"
        - "80（標準）"
        - "90（高品質）"
      default: 1
    validations:
      required: true

  - type: checkboxes
    id: improvement_targets
    attributes:
      label: "改善対象カテゴリ"
      description: "改善するカテゴリを選択してください（デフォルト: 全て）"
      options:
        - label: "コード品質（lint/型チェック）"
          required: false
        - label: "テスト（カバレッジ・テスト失敗修正）"
          required: false
        - label: "ドキュメント（Markdown 整合性）"
          required: false
        - label: "copilot-instructions.md 準拠チェック"
          required: false

  - type: textarea
    id: additional_context
    attributes:
      label: "追加コンテキスト（任意）"
      description: "改善時に特に注意してほしいこと、除外したいファイル・ディレクトリなどを記載してください。"
      placeholder: |
        例:
        - node_modules/ と dist/ は除外してください
        - hve/tests/ のカバレッジを優先的に改善してください
        - 既存の API 互換性を壊さないようにしてください
    validations:
      required: false

  - type: checkboxes
    id: enable_auto_merge
    attributes:
      label: "PR完全自動化設定"
      description: |
        チェックを入れると、QA・レビュー完了後に PR の自動 Approve と Auto-merge（squash）が実行されます。
        ⚠️ この設定を有効にすると、人間によるレビュー・承認なしで PR がマージされます。
        本番ブランチへの直接マージには十分ご注意ください。
      options:
        - label: "PR の自動 Approve & Auto-merge を有効にする"

  - type: checkboxes
    id: confirmation
    attributes:
      label: "実行前確認"
      options:
        - label: "`work/self-improve/run-*` 配下に `.self-improve-lock` が存在しないことを確認しました（既存のループが実行中でないことを確認）"
          required: true
        - label: "この Issue の実行が完了したら Issue を close することを理解しました"
          required: true

  - type: dropdown
    id: model
    attributes:
      label: "使用するモデル"
      description: |
        GitHub が自動的に最適なモデルを選択します（Auto）。
        特定モデルを指定する場合は `HVE_MODEL_OVERRIDE` 環境変数を使用してください。
      options:
        - "Auto"
      default: 0
    validations:
      required: false

