name: "Web App Dev & Deploy"
description: "Issue から Web アプリ開発・デプロイワークフロー (Step.1〜4) を自動起動します"
title: "[Web App Dev] "
labels:
  - "auto-app-dev-microservice-web"
body:
  - type: markdown
    attributes:
      value: |
        ## Web App Dev & Deploy
        このフォームから Issue を作成すると、自動で以下の開発タスクが
        Sub-issue として生成され、Copilot cloud agent が順次実行します。

        **本ワークフローは 1 度の実行で複数のアプリケーション (APP-ID) を対象とできます（カンマ区切り）。**

        ### 前提条件
        - アプリケーション設計ワークフロー（Web App Design / AAD-WEB）が完了し、以下のドキュメントが存在していること:
          - `docs/catalog/domain-analytics.md`, `docs/catalog/service-catalog.md`, `docs/catalog/data-model.md`
          - `docs/catalog/screen-catalog.md`, `docs/catalog/service-catalog-matrix.md`
          - `docs/catalog/use-case-catalog.md`
          - `docs/screen/`, `docs/services/` 配下の定義書
          - `src/data/sample-data.json`
          - `docs/catalog/test-strategy.md`（設計ワークフローの TDD テスト戦略書生成ステップで作成済み）
          - `docs/test-specs/{serviceId}-test-spec.md`（設計ワークフロー Step.2.3 の成果物。サービス別テスト仕様書）
          - `docs/test-specs/{screenId}-test-spec.md`（設計ワークフロー Step.2.3 の成果物。画面別テスト仕様書）
          - `docs/catalog/app-catalog.md`（アプリケーション一覧。Architecture Design の成果物。存在しない場合はアプリケーション名を直接入力可）
        - リポジトリに以下のシークレットが設定されていること:
          - `COPILOT_PAT`（HVE Cloud Agent Orchestrator の Copilot 自動アサイン用）
          - `AZURE_CLIENT_ID`, `AZURE_TENANT_ID`, `AZURE_SUBSCRIPTION_ID`（SWA/Azure deploy の OIDC 用）
          - `GITHUB_TOKEN` は GitHub Actions の自動付与トークン（ユーザーによる Secret 作成は不要）
          - HVE CLI Orchestrator 用の `GH_TOKEN` はこの Cloud 実行では必須ではありません
          - Step.3.2 の SWA デプロイは OIDC + `az staticwebapp secrets list` による deploy token の動的取得を前提とするため、通常 `AZURE_STATIC_WEB_APPS_API_TOKEN` / `GITHUB_PAT` の手動設定は不要
          - 詳細方針: `users-guide/getting-started.md`（認証・認可 / Azure OIDC Secrets）, `users-guide/web-ui-guide.md`

        ### 実行されるステップ（Step.4 のみ並列、それ以外は順次実行）
        | ステップ | 内容 | サブステップ |
        |---------|------|------------|
        | **Step.1** | データ | 1.1 Azure データストア選定 → 1.2 Azure データサービス Deploy |
        | **Step.2** | マイクロサービス作成 | 2.1 コンピュート選定 → 2.2 追加サービス選定 → 2.3 追加サービス Deploy → **2.3T テスト仕様書 (TDD RED)** → **2.3TC テストコード生成 (TDD RED)** → 2.4 サービスコード実装 (TDD GREEN) → 2.5 Azure Compute Deploy |
        | **Step.3** | UI 作成 | **3.0T UI テスト仕様書 (TDD RED)** → **3.0TC UI テストコード生成 (TDD RED)** → 3.1 UI 実装 (TDD GREEN) → 3.2 Web アプリ Deploy (Azure Static Web Apps) → 3.3 E2E テスト (Playwright) |
        | **Step.4** | アーキテクチャレビュー | 4.1 WAF アーキテクチャレビュー ‖ 4.2 整合性チェック（Step.3.3 PASS 後に並列実行） |

        ℹ️ Step.2 のサブステップである Step.2.3T / Step.2.3TC は Dev フェーズで追加生成する TDD RED 成果物です。設計フェーズ（Web App Design Step.2.3）で作成したテスト仕様書を入力として利用します。

        📚 **knowledge/ 参照**: `knowledge/` フォルダーに業務要件ドキュメント（D01〜D21: 事業意図、スコープ、業務プロセス、ユースケース、データモデル、セキュリティ等）が存在する場合、各ステップで業務コンテキストとして自動参照されます。設計精度を高めるため、事前に `knowledge-management` ワークフローを実行して `knowledge/` を充実させることを推奨します。

  - type: input
    id: app_ids
    attributes:
      label: "対象アプリケーション (APP-ID) — 複数指定可（任意）"
      description: |
        `docs/catalog/app-catalog.md` のアプリ一覧（アーキタイプ）概要セクションから APP-ID を入力してください（カンマ区切りで複数指定可）。
        指定した場合: 指定 APP-ID のうち `Webフロントエンド + クラウド` の推薦アーキテクチャのもののみ対象になります。
        未指定の場合: `docs/catalog/app-arch-catalog.md` の `A) サマリ表（全APP横断）` から `Webフロントエンド + クラウド` の APP-ID が自動選択されます。
      placeholder: "例: APP-01 または APP-01, APP-02, APP-03"
    validations:
      required: false

  - type: input
    id: branch
    attributes:
      label: "対象ブランチ"
      description: "コード/ドキュメントをコミットするブランチ名を入力してください"
      placeholder: "例: main, develop, feature/dev-v2"
    validations:
      required: true

  - type: dropdown
    id: runner_type
    attributes:
      label: "実行 Runner"
      description: |
        ワークフローを実行する Runner を選択します。
        - **GitHub Hosted**: `ubuntu-latest`（GitHub 提供の標準ランナー）
        - **Self-hosted (ACA)**: `[self-hosted, linux, x64, aca]`（Azure Container Apps 上のセルフホストランナー）
        - Self-hosted runner はオプションです（GitHub Hosted を使う場合はスキップ可能）
        - Self-hosted を選ぶ場合は runner が online であり、label が一致していることを確認してください（詳細: `users-guide/setup-self-hosted-runner.md`）
      options:
        - "GitHub Hosted"
        - "Self-hosted (ACA)"
      default: 0
    validations:
      required: true

  - type: input
    id: resource_group
    attributes:
      label: "リソースグループ名"
      description: "Azure のリソースグループ名を入力してください。各ステップの Azure CLI スクリプトおよび Sub-issue のタスク指示に埋め込まれます。"
      placeholder: "例: rg-royalty-service-dev"
    validations:
      required: true

  - type: checkboxes
    id: steps
    attributes:
      label: "実行するステップ"
      description: |
        実行したいステップにチェックを入れてください。
        **未選択の場合は全ステップを実行します。**
        **注意**: 依存関係があるため、後段のステップには前段の成果物が必要です。
        前段をスキップする場合は、対応するドキュメント／リソースが既に存在していることを確認してください。
        ⚠️ **TDD 警告**: Step.2 をスキップすると、TDD RED フェーズ（テスト仕様書・テストコード生成）が未実施のままサービス実装（Step.2.4）が開始されます。
        テスト仕様書（`docs/test-specs/{serviceId}-test-spec.md`）は設計フェーズ（Web App Design Step.2.3）で生成済みであることを前提とします。Step.2 をスキップする場合は `docs/test-specs/` 配下に対応するテスト仕様書とテストコードが存在していることを確認してください。
        Step.3 をスキップすると、UI テスト仕様書・テストコード生成（Step.3.0T / Step.3.0TC）が未実施のまま UI 実装をスキップすることになります。
        Step.3 をスキップする場合は、`docs/test-specs/` と `test/` 配下に対応するテスト仕様書・テストコードが既に存在していることを確認してください。
      options:
        - label: "Step.1 — データ (Step.1.1 Azure データストア選定 / Step.1.2 Azure データサービス Deploy)"
        - label: "Step.2 — マイクロサービス作成 (Step.2.1〜2.5 + Step.2.3T, Step.2.3TC)"
        - label: "Step.3 — UI 作成 (Step.3.0T, Step.3.0TC, Step.3.1 UI 実装 / Step.3.2 Web アプリ Deploy / Step.3.3 E2E)"
        - label: "Step.4 — アーキテクチャレビュー (Step.4.1 WAF レビュー / Step.4.2 整合性チェック)"

  - type: dropdown
    id: model
    attributes:
      label: "使用するモデル"
      description: |
        Copilot cloud agent が使用するモデルを選択します（hve CLI `--model` と同等）。
        - `Auto`: GitHub が最適モデルを動的選択（プレミアムリクエスト 0.9x、推奨）
        - その他: hve/config.py の `MODEL_CHOICES` と同一の選択肢
        ※ `HVE_MODEL_OVERRIDE` 環境変数が設定されている場合はそちらが優先されます。
      options:
        - "Auto"
        - "claude-opus-4.7"
        - "claude-opus-4.6"
        - "gpt-5.5"
        - "gpt-5.4"
      default: 0
    validations:
      required: false
  - type: dropdown
    id: review_model
    attributes:
      label: "レビュー用モデル（任意）"
      description: |
        敵対的レビュー（auto-context-review）/ Code Review Agent で使用するモデル（hve CLI `--review-model` 相当）。
        `Auto` を選ぶと Copilot が最適モデルを自動選択します。明示指定でモデルを固定できます。
      options:
        - "Auto"
        - "claude-opus-4.7"
        - "claude-opus-4.6"
        - "gpt-5.5"
        - "gpt-5.4"
      default: 0
    validations:
      required: false

  - type: dropdown
    id: qa_model
    attributes:
      label: "QA 用モデル（任意）"
      description: |
        実行前 QA（auto-qa）の質問票生成で使用するモデル（hve CLI `--qa-model` 相当）。
        `Auto` を選ぶと Copilot が最適モデルを自動選択します。明示指定でモデルを固定できます。
      options:
        - "Auto"
        - "claude-opus-4.7"
        - "claude-opus-4.6"
        - "gpt-5.5"
        - "gpt-5.4"
      default: 0
    validations:
      required: false

  - type: checkboxes
    id: enable_review
    attributes:
      label: "レビュー設定"
      description: |
        チェックを入れると、Copilot が PR を完成させた際にセルフレビュー（auto-context-review）を自動実行します。
        デフォルト（チェックなし）ではセルフレビューは実行されません。
      options:
        - label: "セルフレビューを有効にする（チェックすると auto-context-review ラベルが付与され、セルフレビューが自動実行されます）"

  - type: checkboxes
    id: enable_qa
    attributes:
      label: "質問票設定"
      description: |
        チェックを入れると、Copilot がステップ実行前に選択式の質問票（事前 QA）を作成します。回答後に実行が開始されます。
        デフォルト（チェックなし）では質問票は作成されません。
      options:
        - label: "実行前 QA を実施する（チェックすると auto-qa ラベルが付与され、ステップ実行前に質問票が作成されます）"

  - type: checkboxes
    id: enable_self_improve
    attributes:
      label: "自己改善ループ設定"
      description: |
        チェックを入れると、全ステップ完了後に自己改善ループが実行されます。
        ruff（lint）/ pytest（テスト+カバレッジ）/ markdownlint（ドキュメント品質）を
        スキャンし、品質スコアが目標値に達するまで改善を繰り返します。
        デフォルト（チェックなし）では自己改善は実行されません。
      options:
        - label: "自己改善ループを有効にする"

  - type: dropdown
    id: tdd_max_retries
    attributes:
      label: "TDD GREEN リトライ最大回数"
      description: |
        TDD GREEN フェーズでテストが全 PASS にならない場合、
        実装を修正しながら最大この回数まで再試行します。
        上限を超えた場合は blocked ラベルを付与して停止します。
      options:
        - "3"
        - "5 (デフォルト)"
        - "7"
        - "10"
      default: 1
    validations:
      required: false

  - type: dropdown
    id: create_remote_mcp_server
    attributes:
      label: Remote MCP Server 実装
      description: |
        API 作成時に Remote MCP Server として公開するための実装を追加するかを選択してください。
        実装方式、SDK、Transport、Cloud 固有の構成は実装フェーズで最適なものを選定します。
      options:
        - 作成する
        - 作成しない
      default: 0
    validations:
      required: true

  - type: dropdown
    id: enable_agentic_retrieval
    attributes:
      label: "Agentic Retrieval を使用する"
      description: |
        Chat-Bot / AI Agent を機能要件に含むアプリ向け。
        `Arch-AgenticRetrieval-Detail` Custom Agent の自動判定結果に従います。明示的な上書きも可能です。
        「しない」を選ぶと AAD-WEB / ASDW-WEB の Agentic Retrieval 関連ステップは生成されません。
      options:
        - する
        - しない
        - 自動判定に従う
      default: 2
    validations:
      required: false

  - type: checkboxes
    id: agentic_data_source_modes
    attributes:
      label: "データソース投入方式"
      description: |
        Indexer 対応データソースは保守性の観点から Indexer を優先します。
        Indexer 非対応のデータは Push API。両方の併用も可。
        対応一覧は実行時に Microsoft Learn MCP で確認します。
      options:
        - label: "Indexer (Pull)"
          selected: true
        - label: "Push API"

  - type: dropdown
    id: foundry_mcp_integration
    attributes:
      label: "Microsoft Foundry 連携（Remote MCP Server）"
      description: |
        「する」を選ぶと Foundry プロジェクトの新規作成・モデルの Global Deployment・
        MCP 接続設定までを IaC が自動構成します。
      options:
        - する
        - しない
      default: 0
    validations:
      required: false

  - type: textarea
    id: agentic_data_sources_hint
    attributes:
      label: "想定データソース（任意）"
      description: |
        起点となるデータソース想定を 1 行 1 件で記述。空でも可。
        例: `Blob: rg-xxx/sa-docs/raw`
      placeholder: "例: Blob: rg-xxx/sa-docs/raw"
    validations:
      required: false

  - type: checkboxes
    id: agentic_existing_design_diff_only
    attributes:
      label: "既存設計の差分更新"
      description: |
        チェック時、`docs/azure/agentic-retrieval/` の既存設計を上書きせず差分更新します。
      options:
        - label: "既存設計を差分更新する（チェックなし＝上書き）"

  - type: dropdown
    id: foundry_sku_fallback_policy
    attributes:
      label: "Foundry モデル SKU フォールバック"
      description: |
        Global Standard クォータ枯渇時に Standard SKU へフォールバックを許容するか。
        `cli-evidence.md` に根拠記録されます。
      options:
        - "Global 必須（Standard 拒否）"
        - "Standard 許容"
      default: 1
    validations:
      required: false

  - type: dropdown
    id: self_improve_max_iterations
    attributes:
      label: "自己改善 最大イテレーション数"
      description: "自己改善ループを有効にした場合の最大繰り返し回数"
      options:
        - "1"
        - "2"
        - "3 (デフォルト)"
      default: 2
    validations:
      required: false

  - type: dropdown
    id: self_improve_quality_threshold
    attributes:
      label: "自己改善 品質スコア目標値"
      description: "この値に達した時点で改善完了とみなします"
      options:
        - "70（最低基準）"
        - "80（標準）"
        - "90（高品質）"
      default: 1
    validations:
      required: false

  - type: checkboxes
    id: enable_auto_merge
    attributes:
      label: "PR完全自動化設定"
      description: |
        チェックを入れると、QA・レビュー完了後に PR の自動 Approve と Auto-merge（squash）が実行されます。
        ⚠️ この設定を有効にすると、人間によるレビュー・承認なしで PR がマージされます。
        本番ブランチへの直接マージには十分ご注意ください。
      options:
        - label: "PR の自動 Approve & Auto-merge を有効にする"

  - type: textarea
    id: additional_comment
    attributes:
      label: "追加コメント（任意）"
      description: "補足・制約・注意事項があれば記載してください。各 Step の Sub-issue にも引用されます。"
      placeholder: |
        例:
        - リージョンは Japan East 優先
        - Azure Functions は C# で実装
        - UI は HTML5/CSS/JavaScript で実装
        - 認証は Azure AD B2C を使用
    validations:
      required: false
